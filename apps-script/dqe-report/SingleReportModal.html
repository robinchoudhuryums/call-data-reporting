<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 25px; background-color: #f4f6f9; color: #333; }
    .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
    .section-title { font-weight: bold; margin-bottom: 15px; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 16px;}
    .row { display: flex; gap: 20px; margin-bottom: 20px; }
    .col { flex: 1; }
    label { display: block; font-weight: 600; font-size: 12px; color: #666; margin-bottom: 2px; }
    input[type="date"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
    .agent-list-box { border: 1px solid #ddd; border-radius: 4px; height: 150px; overflow-y: auto; padding: 15px; background: #fff; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .agent-item { display: flex; align-items: center; font-size: 13px; background: #f9f9f9; padding: 5px; border-radius: 4px;}
    .agent-item input { margin-right: 8px; transform: scale(1.1); }
    button { background: #007bff; color: white; border: none; padding: 12px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; transition: background 0.2s; white-space: nowrap; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
    .loading { text-align: center; color: #666; font-style: italic; margin-top: 10px; display: none; }
    #resultsArea { display: none; }
    .main-report-header { display: flex; align-items: baseline; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
    .main-report-title { font-size: 22px; font-weight: bold; color: #333; }
    .main-report-date { font-size: 16px; color: #666; margin-left: 12px; font-weight: normal; }
    .report-card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    .card-title { font-size: 18px; font-weight: bold; color: #444; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .copy-data-btn { font-size: 12px; color: #007bff; cursor: pointer; text-decoration: none; font-weight: normal; }
    .copy-data-btn:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; color: #555; font-weight: 700; }
    td:first-child { text-align: left; font-weight: bold; color: #333; }
    .charts-row { display: flex; gap: 20px; height: 450px; /* Increased height for footer */ }
    .chart-wrapper { flex: 1; position: relative; border: 1px solid #eee; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; background: #fff; }
    .chart-header { text-align: center; font-weight: bold; font-size: 14px; color: #666; margin-bottom: 5px; }
    .chart-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; font-size: 11px; color: #555; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .delta-badge { display: inline-flex; align-items: center; gap: 3px; background: #f8f9fa; padding: 2px 6px; border-radius: 4px; border: 1px solid #eee; }
    .trend-options-box { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
    .trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .trend-item { font-size: 13px; display: flex; align-items: center; }
    .trend-item input { margin-right: 8px; }
    #trendChartsContainer { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .trend-chart-wrapper { height: 450px; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fff; display: flex; flex-direction: column; }
    .toggle-box { text-align: right; margin-bottom: 10px; padding: 0 5px; }
    .toggle-label { display: inline-flex; align-items: center; cursor: pointer; font-size: 13px; color: #555; background: #fff; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-weight: 600; }
    .toggle-label:hover { background: #f8f9fa; }
    .toggle-label input { width: auto; margin-right: 8px; transform: scale(1.1); }
    
    .delta-val { font-size: 11px; font-weight: normal; margin-left: 4px; display:block; margin-top:2px; }
    .d-pos { color: #28a745; } .d-neg { color: #dc3545; } .d-neu { color: #888; }
  </style>
</head>
<body>

  <div class="form-container" id="inputForm">
    <div class="section-title">1. Select Date Range</div>
    <div class="row"><div class="col"><label>Quick Select</label>
      <select id="datePreset" onchange="applyPreset()">
        <option value="custom">Custom Range</option>
        <option value="last30">Last 30 Days</option>
        <option value="last3Months">Last 3 Months</option>
        <option value="last12Months">Last 12 Months</option>
        <option value="thisMonth">This Month</option>
        <option value="lastMonth">Last Month</option>
        <option value="lastYear">Last Year</option>
      </select>
    </div></div>
    <div class="row"><div class="col"><label>Start Date</label><input type="date" id="start" onchange="refreshAgents(); resetPreset();"></div><div class="col"><label>End Date</label><input type="date" id="end" onchange="refreshAgents(); resetPreset();"></div></div>
    
    <div style="margin-bottom: 10px;"><label style="display:flex; align-items:center; cursor:pointer; font-weight:bold; color:#007bff;"><input type="checkbox" id="includeTrend" style="width:auto; margin-right:8px;" onchange="toggleTrendOptions()" checked> Include Department Trends Chart</label></div>
    
    <div class="trend-options-box" id="trendOptions"><div style="font-size:12px; font-weight:bold; color:#666; border-bottom:1px solid #ddd; padding-bottom:5px;">Select Metrics to Graph:</div><div class="trend-grid"><label class="trend-item"><input type="checkbox" name="trendMetric" value="1" data-type="volume" checked> Total Calls</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="2" data-type="volume"> Call Menu</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="3" data-type="volume"> Internal</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="4" data-type="volume"> Misc</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="5" data-type="time"> Longest Wait Time</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="6" data-type="time" checked> Avg Answer Time</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="7" data-type="percent" checked> Abandoned %</label><label class="trend-item"><input type="checkbox" name="trendMetric" value="8" data-type="small_count" checked> Violations</label></div></div>
    
    <div class="section-title">2. Select Agents</div>
    <div id="agentLoader">Finding Agents...</div>
    <div id="refreshStatus" style="font-size:11px; color:#666; margin-bottom:5px; font-style:italic;"></div>
    <div class="agent-list-box" id="agentContainer" style="display:none;"></div>
    <div style="text-align:right; margin: 10px 0 20px; font-size:12px;"><a href="#" onclick="toggleAll(true)">Select All</a> | <a href="#" onclick="toggleAll(false)">Select None</a></div>
    <button onclick="runReport()" id="runBtn" disabled>Generate Report</button>
    <div class="loading" id="loader">Processing data...</div>
  </div>

  <div id="resultsArea">
    <div class="main-report-header"><span class="main-report-title">Q Performance Report</span><span id="mainDateLabel" class="main-report-date"></span></div>
    
    <div class="btn-group" id="actionButtons"><button onclick="resetForm()" style="background: #6c757d; width:auto;">&laquo; Back</button><button onclick="copyReportImage()" style="background: #17a2b8; width:auto;" id="copyBtn">&#128247; Copy Image</button><button onclick="sendVisualEmail()" style="background: #28a745; width:auto;" id="emailImgBtn">&#9993; Email (Image)</button><button onclick="sendHtmlEmail()" style="background: #007bff; width:auto;" id="emailHtmlBtn">&#9993; Email (HTML)</button></div>
    <div class="report-card"><div class="card-title">Performance Summary<span class="copy-data-btn" onclick="copyTableData()">&#128203; Copy Data</span></div><div id="tableContainer"></div></div>
    
    <div class="toggle-box" id="dataLabelToggleBox"><label class="toggle-label"><input type="checkbox" id="showDataLabels" onchange="updateAllCharts()"> Show Data Labels</label></div>
    
    <div class="charts-row">
      <div class="chart-wrapper"><div class="chart-header">Share of Answered Calls (Total)</div><div style="flex:1; position:relative;"><canvas id="pieChart"></canvas></div></div>
      <div class="chart-wrapper"><div class="chart-header">Volume & Efficiency</div><div style="flex:1; position:relative;"><canvas id="barChart"></canvas></div></div>
    </div>
    <div id="trendChartsContainer"></div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    window.lastData = null;
    let pieChartInstance = null; let barChartInstance = null; let trendChartInstances = [];

    window.onload = function() {
      google.script.run.withSuccessHandler(populateAgentsAndDates).withFailureHandler(handleError).getDashboardAgentsSingle();
    };

    function populateAgentsAndDates(response) {
      document.getElementById('agentLoader').style.display = 'none';
      if(response && response.defaultStart && !document.getElementById('start').value) {
         document.getElementById('start').value = response.defaultStart;
         document.getElementById('end').value = response.defaultEnd;
      }
      const agents = response ? response.agents : [];
      const container = document.getElementById('agentContainer');
      const statusDiv = document.getElementById('refreshStatus');
      container.style.display = 'grid';
      container.innerHTML = ""; statusDiv.innerHTML = ""; 
      if(!agents || agents.length === 0) {
         container.innerHTML = "<div style='grid-column:1/-1; color:#dc3545; padding:10px; font-style:italic;'>No agents found. Check selected range.</div>";
         return;
      }
      agents.forEach(a => { container.innerHTML += `<div class="agent-item"><label><input type="checkbox" name="agentCheck" value="${a}"> ${a}</label></div>`; });
      document.getElementById('runBtn').disabled = false;
      toggleTrendOptions();
    }

    function refreshAgents() {
        const s = document.getElementById('start').value;
        const e = document.getElementById('end').value;
        if(s && e) {
            document.getElementById('refreshStatus').innerHTML = "Refreshing agent list...";
            document.getElementById('runBtn').disabled = true;
            google.script.run.withSuccessHandler(populateAgentsAndDates).withFailureHandler(handleError).getDashboardAgentsSingle(s, e);
        }
    }

    function renderReport(data) { 
        try {
            window.lastData = data; 
            if (!data) throw new Error("No data received from server.");

            document.getElementById('mainDateLabel').innerText = `(${data.dateLabel})`; 
            let html = `<table><thead><tr><th>Agent</th><th>Total Rung</th><th>Missed</th><th>Answered</th><th>% Ans</th><th>TTT</th><th>ATT</th></tr></thead><tbody>`; 
            
            if (data.agents && data.agents.length > 0) {
                data.agents.forEach(a => { 
                    html += `<tr><td>${a.name}</td><td>${a.stats.rung}</td><td style="color:#dc3545; font-weight:bold;">${a.stats.missed}</td><td style="color:#28a745; font-weight:bold;">${a.stats.answeredCount}</td><td>${a.stats.pctAnswered}</td><td>${a.stats.ttt}</td><td>${a.stats.att}</td></tr>`; 
                });
            } else { html += `<tr><td colspan="7">No agent data found.</td></tr>`; }
            
            if(data.teamStats) {
                const getDeltaHtml = (val, type) => {
                    if (val === 0) return '';
                    let color = 'd-neu';
                    if (type === 'pos') color = val > 0 ? 'd-pos' : 'd-neg';
                    if (type === 'neg') color = val < 0 ? 'd-pos' : 'd-neg';
                    return `<span class="delta-val ${color}">(${val > 0 ? '+' : ''}${val.toFixed(1)}%)</span>`;
                };

                // FIXED: DIVIDE BY 60 FOR TTT/ATT BECAUSE BACKEND SENDS SECONDS
                html += `<tr style="background-color:#e8f0fe; font-weight:bold; border-top:2px solid #ccc;">
                    <td style="text-align:left;">Department Totals <span style="font-size:10px; color:#666; font-weight:normal;">(vs Prior Period)</span></td>
                    <td>${data.teamStats.rung.val.toLocaleString()}${getDeltaHtml(data.teamStats.rung.delta, 'pos')}</td>
                    <td>${data.teamStats.missed.val.toLocaleString()}${getDeltaHtml(data.teamStats.missed.delta, 'neg')}</td>
                    <td>${data.teamStats.answered.val.toLocaleString()}${getDeltaHtml(data.teamStats.answered.delta, 'pos')}</td>
                    <td>${(data.teamStats.pct.val * 100).toFixed(1)}%${getDeltaHtml(data.teamStats.pct.delta, 'pos')}</td>
                    <td>${formatTime(data.teamStats.ttt.val / 60)}${getDeltaHtml(data.teamStats.ttt.delta, 'neg')}</td>
                    <td>${formatTime(data.teamStats.att.val / 60)}${getDeltaHtml(data.teamStats.att.delta, 'neg')}</td>
                </tr>`;
            }

            html += `</tbody></table>`; 
            document.getElementById('tableContainer').innerHTML = html; 
            
            updateAllCharts(); 
            
            document.getElementById('inputForm').style.display = 'none'; 
            document.getElementById('resultsArea').style.display = 'block'; 
        } catch (e) {
            alert("Error rendering report: " + e.message);
            console.error(e);
        } finally {
            document.getElementById('runBtn').disabled = false; 
            document.getElementById('loader').style.display = 'none'; 
        }
    }

    function updateAllCharts() {
        if (!window.lastData || !window.lastData.agents) return;
        const names = []; const answeredData = []; const missedData = [];
        window.lastData.agents.forEach(a => { 
            names.push(a.name); answeredData.push(a.raw.answeredCount); missedData.push(a.raw.missed); 
        });
        
        const pieNames = [...names]; 
        const pieData = [...answeredData];
        const palette = ['#007bff', '#28a745', '#ffc107', '#dc3545', '#17a2b8', '#6610f2', '#fd7e14', '#20c997'];
        const pieColors = names.map((_, i) => palette[i % palette.length]);
        
        const otherCount = (window.lastData.globalTotalAnswered || 0) - (window.lastData.totalAnswered || 0);
        if (otherCount > 0) { pieNames.push("Other Agents"); pieData.push(otherCount); pieColors.push("#6c757d"); }
        
        renderPieChart(pieNames, pieData, pieColors);
        renderBarChart(names, answeredData, missedData);
        
        const trendContainer = document.getElementById('trendChartsContainer');
        trendContainer.innerHTML = "";
        trendChartInstances.forEach(c => c.destroy());
        trendChartInstances = [];
        
        if (document.getElementById('includeTrend').checked && window.lastData.trendData) {
            renderTrendCharts(window.lastData.trendData, trendContainer);
        }
    }

    function handleError(e) {
        alert("Server Error: " + e.message);
        document.getElementById('runBtn').disabled = false;
        document.getElementById('loader').style.display = 'none';
    }

    function copyTableData() {
        const table = document.querySelector("#tableContainer table");
        if(!table) return;
        let tsv = "";
        for(let row of table.rows) {
            let cells = Array.from(row.cells).map(cell => cell.innerText.replace(/\n/g, " ").trim());
            tsv += cells.join("\t") + "\n";
        }
        navigator.clipboard.writeText(tsv).then(() => alert("Table data copied to clipboard!"));
    }

    function applyPreset() { 
        const preset = document.getElementById('datePreset').value; 
        const today = new Date(); 
        let start, end; 
        if (preset === 'custom') return; 
        end = new Date(today);
        if (preset === 'lastMonth') { start = new Date(today.getFullYear(), today.getMonth() - 1, 1); end = new Date(today.getFullYear(), today.getMonth(), 0); } 
        else if (preset === 'lastYear') { start = new Date(today.getFullYear() - 1, 0, 1); end = new Date(today.getFullYear() - 1, 11, 31); } 
        else if (preset === 'thisMonth') { start = new Date(today.getFullYear(), today.getMonth(), 1); } 
        else if (preset === 'last30') { start = new Date(today); start.setDate(today.getDate() - 30); } 
        else if (preset === 'last3Months') { start = new Date(today); start.setMonth(today.getMonth() - 3); }
        else if (preset === 'last12Months') { start = new Date(today); start.setFullYear(today.getFullYear() - 1); }
        if(start && end) { 
            document.getElementById('start').valueAsDate = start; 
            document.getElementById('end').valueAsDate = end; 
            refreshAgents(); 
        } 
    }
    
    function resetPreset() { document.getElementById('datePreset').value = "custom"; }
    function toggleTrendOptions() { const chk = document.getElementById('includeTrend'); document.getElementById('trendOptions').style.display = chk.checked ? 'block' : 'none'; }
    function toggleAll(check) { const boxes = document.getElementsByName('agentCheck'); for(let b of boxes) b.checked = check; }
    
    function runReport() { const s = document.getElementById('start').value; const e = document.getElementById('end').value; const boxes = document.getElementsByName('agentCheck'); const selected = []; for(let b of boxes) if(b.checked) selected.push(b.value); if(!s || !e) return alert("Select dates"); if(selected.length === 0) return alert("Select agents"); document.getElementById('runBtn').disabled = true; document.getElementById('loader').style.display = 'block'; google.script.run.withSuccessHandler(renderReport).withFailureHandler(handleError).processSingleReport(s, e, selected); }

    function formatTime(minutes) { if(minutes === null || minutes === undefined) return ""; const val = parseFloat(minutes); if(isNaN(val)) return ""; const m = Math.floor(val); const s = Math.round((val - m) * 60); return `${m}:${s.toString().padStart(2, '0')}`; }

    // === TRENDS WITH DELTA FOOTER & FIXED LABELS ===
    function renderTrendCharts(rawData, container) { 
        if(!rawData || rawData.length === 0) return;
        const showLabels = document.getElementById('showDataLabels').checked;
        const inputs = document.querySelectorAll('input[name="trendMetric"]:checked'); 
        if(inputs.length === 0) return; 
        const groups = {}; const labels = {}; 
        inputs.forEach(input => { const type = input.dataset.type; const colIdx = parseInt(input.value); const label = input.parentElement.innerText.trim(); if (!groups[type]) { groups[type] = []; labels[type] = []; } groups[type].push(colIdx); labels[type].push(label); }); 
        
        Object.keys(groups).forEach(type => { 
            const wrapper = document.createElement('div'); wrapper.className = 'trend-chart-wrapper'; 
            const canvas = document.createElement('canvas'); wrapper.appendChild(canvas); 
            
            // NEW: Footer for Deltas
            const footer = document.createElement('div'); footer.className = 'chart-footer'; 
            
            container.appendChild(wrapper); 
            const ctx = canvas.getContext('2d'); 
            const colIndices = groups[type]; const colLabels = labels[type]; 
            const months = rawData.map(row => row[0]); 
            
            const datasets = colLabels.map((lbl, i) => {
                const color = getTrendColor(i);
                // Extract Data Points
                const values = rawData.map(row => { if(type === 'time') return (row[colIndices[i]] / 60).toFixed(2); return row[colIndices[i]]; });
                
                // CALC DELTA
                const startVal = parseFloat(values[0]) || 0;
                const endVal = parseFloat(values[values.length-1]) || 0;
                let deltaStr = "-";
                if(startVal !== 0) {
                    const diff = ((endVal - startVal) / startVal) * 100;
                    deltaStr = (diff > 0 ? "+" : "") + diff.toFixed(1) + "%";
                } else if(endVal > 0) { deltaStr = "+100%"; }

                // Add to footer
                const badge = document.createElement('span');
                badge.className = 'delta-badge';
                badge.innerHTML = `<span style="width:8px;height:8px;background:${color};border-radius:2px;"></span> <strong>${lbl}:</strong> ${deltaStr} <span style="color:#888;font-size:10px;">(Start to End)</span>`;
                footer.appendChild(badge);

                return { label: lbl, data: values, borderColor: color, backgroundColor: color, tension: 0.4, pointRadius: 3 };
            }); 
            
            let limit = null; if(type === 'small_count') limit = 3; if(type === 'percent') limit = 5; 
            if(limit !== null) { datasets.push({ label: 'Goal Limit', data: new Array(months.length).fill(limit), borderColor: '#dc3545', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, fill: false, order: 0 }); } 
            
            let globalMax = 0; datasets.forEach(ds => { const dsMax = Math.max(...ds.data.map(v => parseFloat(v) || 0)); if(dsMax > globalMax) globalMax = dsMax; }); 
            const suggestedMax = globalMax > 0 ? globalMax * 1.1 : 1; 
            
            const chartOptions = { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { 
                    title: { display: true, text: getTrendTitle(type) }, 
                    datalabels: { 
                        display: (context) => {
                            // FIXED: Explicitly handle display logic here
                            if (!showLabels) return false;
                            if (context.dataset.label && context.dataset.label.includes("Goal")) return false; 
                            return true;
                        },
                        align: 'end', anchor: 'end', offset: 4,
                        
                        backgroundColor: 'rgba(255,255,255,0.9)', 
                        borderColor: (context) => context.dataset.borderColor,
                        borderWidth: 1, borderRadius: 3,
                        color: (context) => context.dataset.borderColor, 
                        font: {size: 10, weight: 'bold'},
                        
                        formatter: (value) => {
                            if (!value || value == 0) return "";
                            if (type === 'time') return formatTime(value);
                            const valNum = parseFloat(value);
                            if (type === 'percent') return valNum.toFixed(2) + '%';
                            return valNum.toFixed(2).replace(/[.,]00$/, ""); 
                        }
                    }, 
                    tooltip: { callbacks: { label: function(context) { let label = context.dataset.label || ''; if (label) { label += ': '; } if (type === 'time') label += formatTime(context.parsed.y); else if (type === 'percent') label += context.parsed.y + '%'; else label += context.parsed.y; return label; } } } 
                }, 
                scales: { 
                    y: { beginAtZero: true, suggestedMax: suggestedMax, grid: { borderDash: [5, 5] }, ticks: {} },
                    x: { grid: { borderDash: [5, 5] } }
                } 
            }; 
            if (type === 'percent') chartOptions.scales.y.ticks.callback = function(value) { return value + '%'; }; 
            if (type === 'time') chartOptions.scales.y.ticks.callback = function(value) { return formatTime(value); }; 
            const chart = new Chart(ctx, { type: 'line', data: { labels: months, datasets: datasets }, options: chartOptions }); 
            trendChartInstances.push(chart);
            
            wrapper.appendChild(footer); // Add footer after chart creation
        }); 
    }

    function renderPieChart(labels, data, colors) { 
        const ctx = document.getElementById('pieChart').getContext('2d'); 
        if(pieChartInstance) pieChartInstance.destroy(); 
        const showLabels = document.getElementById('showDataLabels').checked;
        pieChartInstance = new Chart(ctx, { 
            type: 'pie', 
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1 }] }, 
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { 
                    title: { display: false }, 
                    legend: { position: 'left', labels: { boxWidth: 12, font: { size: 11 } } }, 
                    datalabels: { 
                        color: '#fff', font: { weight: 'bold', size: 12 }, textAlign: 'center',
                        formatter: (value, ctx) => { 
                            let sum = 0; 
                            let dataArr = ctx.chart.data.datasets[0].data; 
                            dataArr.map(data => { sum += data; }); 
                            let percentage = (value * 100 / sum).toFixed(1) + "%"; 
                            if ((value * 100 / sum) > 3) { return showLabels ? `${percentage}\n(${value})` : percentage; }
                            return ""; 
                        } 
                    } 
                } 
            } 
        }); 
    }

    function renderBarChart(labels, ansData, missData) { 
        const ctx = document.getElementById('barChart').getContext('2d'); 
        if(barChartInstance) barChartInstance.destroy(); 
        const showLabels = document.getElementById('showDataLabels').checked;
        barChartInstance = new Chart(ctx, { 
            type: 'bar', 
            data: { labels: labels, datasets: [{ label: 'Answered', data: ansData, backgroundColor: '#28a745' }, { label: 'Missed', data: missData, backgroundColor: '#dc3545' }] }, 
            options: { 
                responsive: true, maintainAspectRatio: false, 
                layout: { padding: { top: 25 } }, 
                scales: { x: { stacked: true, grid: { drawOnChartArea: true, color: '#ccc', borderDash: [5, 5] }, ticks: { maxRotation: 45, minRotation: 45 } }, y: { stacked: true, beginAtZero: true, grid: { borderDash: [5, 5] } } }, 
                plugins: { 
                    title: { display: false }, 
                    datalabels: { 
                        display: showLabels, 
                        anchor: 'center', 
                        backgroundColor: 'rgba(255,255,255,0.9)', 
                        borderColor: (context) => context.dataset.backgroundColor, 
                        borderWidth: 1,
                        borderRadius: 3,
                        color: (context) => context.dataset.backgroundColor, 
                        font: { weight: 'bold', size: 10 },
                        formatter: (value) => value > 0 ? value : '' 
                    } 
                } 
            } 
        }); 
    }

    function getTrendTitle(type) { if(type === 'volume') return 'Call Volume Trends'; if(type === 'time') return 'Time Trends'; if(type === 'percent') return 'Percentage Trends'; return 'Count Trends'; }
    function getTrendColor(i) { const colors = ['#007bff', '#28a745', '#dc3545', '#fd7e14', '#6610f2']; return colors[i % colors.length]; }
    
    function resetForm() { document.getElementById('inputForm').style.display = 'block'; document.getElementById('resultsArea').style.display = 'none'; }
    
    function copyReportImage() { const btn = document.getElementById('copyBtn'); const originalText = btn.innerHTML; btn.innerText = "Capturing..."; html2canvas(document.getElementById('resultsArea'), getCaptureOptions()).then(canvas => { canvas.toBlob(blob => { navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]); alert('Copied!'); btn.innerHTML = originalText; }); }); }
    function sendVisualEmail() { const btn = document.getElementById('emailImgBtn'); const originalText = btn.innerHTML; btn.innerText = "Sending..."; html2canvas(document.getElementById('resultsArea'), getCaptureOptions()).then(canvas => { google.script.run.withSuccessHandler((e) => { alert("Visual Report Sent to " + e); btn.disabled = false; btn.innerHTML = originalText; }).withFailureHandler((e) => { alert("Error: " + e.message); btn.disabled = false; btn.innerHTML = originalText; }).sendVisualReportEmail(base64Data, window.lastData.dateLabel); }); }
    function sendHtmlEmail() { const btn = document.getElementById('emailHtmlBtn'); btn.disabled = true; btn.innerText = "Sending..."; const selectedTrendIndices = []; if(document.getElementById('includeTrend').checked) { document.querySelectorAll('input[name="trendMetric"]:checked').forEach(input => { selectedTrendIndices.push(parseInt(input.value)); }); } google.script.run.withSuccessHandler((e) => { alert("Sent to " + e); btn.disabled = false; btn.innerHTML = "&#9993; Email (HTML)"; }).sendSingleReportEmail(JSON.stringify(window.lastData), selectedTrendIndices); }
    
    function getCaptureOptions() {
      return {
        scale: 2, 
        useCORS: true, 
        backgroundColor: null, 
        onclone: (clonedDoc) => {
          const element = clonedDoc.getElementById('resultsArea');
          const btnGroup = clonedDoc.getElementById('actionButtons');
          if (btnGroup) btnGroup.style.display = 'none';
          const toggleBox = clonedDoc.getElementById('dataLabelToggleBox');
          if(toggleBox) toggleBox.style.display = 'none';
          const copyBtn = clonedDoc.querySelector('.copy-data-btn');
          if(copyBtn) copyBtn.style.display = 'none';
          
          element.style.backgroundColor = "#f4f6f9"; 
          element.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/robinchoudhuryums/marketing-images@main/Patient%20Portal%20Background_portrait.png')";
          element.style.backgroundSize = "cover";
          element.style.backgroundPosition = "center";
          element.style.padding = "40px"; 
          element.style.boxSizing = "border-box";
          element.style.width = "1200px"; 
          element.style.height = "auto";  

          const setupFlexContainer = (container) => {
            if (!container) return;
            container.style.display = "flex";
            container.style.flexWrap = "wrap";
            container.style.justifyContent = "center";
            container.style.gap = "40px"; 
            container.style.marginTop = "0";
            container.style.marginBottom = "30px";
          };

          const resizeWrapper = (w) => {
            w.style.flex = "0 0 46%"; 
            w.style.width = "46%";
            w.style.maxWidth = "none"; 
            w.style.height = "400px";
            w.style.margin = "0";
            w.style.overflow = "hidden"; 
            const canvas = w.querySelector('canvas');
            if (canvas) {
              canvas.style.width = "100%";
              canvas.style.height = "100%";
              canvas.style.display = "block";
            }
          };

          const chartsRow = clonedDoc.querySelector('.charts-row'); 
          setupFlexContainer(chartsRow);
          const mainWrappers = clonedDoc.querySelectorAll('.chart-wrapper');
          mainWrappers.forEach(resizeWrapper);
          const trendGrid = clonedDoc.getElementById('trendChartsContainer');
          setupFlexContainer(trendGrid);
          const trendWrappers = clonedDoc.querySelectorAll('.trend-chart-wrapper');
          trendWrappers.forEach(resizeWrapper);
        }
      };
    }
  </script>
</body>
</html>
