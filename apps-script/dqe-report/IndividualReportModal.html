<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 25px; background-color: #f4f6f9; color: #333; }
    .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
    .section-title { font-weight: bold; margin-bottom: 15px; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 16px;}
    .row { display: flex; gap: 20px; margin-bottom: 20px; }
    .col { flex: 1; }
    label { display: block; font-weight: 600; font-size: 12px; color: #666; margin-bottom: 2px; }
    input[type="date"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
    .agent-list-box { border: 1px solid #ddd; border-radius: 4px; height: 150px; overflow-y: auto; padding: 15px; background: #fff; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .agent-item { display: flex; align-items: center; font-size: 13px; background: #f9f9f9; padding: 5px; border-radius: 4px;}
    .agent-item input { margin-right: 8px; transform: scale(1.1); }
    button { background: #007bff; color: white; border: none; padding: 12px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; transition: background 0.2s; white-space: nowrap; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
    #resultsArea { display: none; }
    .main-report-header { display: flex; align-items: baseline; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
    .main-report-title { font-size: 22px; font-weight: bold; color: #333; }
    .main-report-date { font-size: 16px; color: #666; margin-left: 12px; font-weight: normal; }
    .loading { text-align: center; color: #666; font-style: italic; margin-top: 10px; display: none; }
    .summary-card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
    
    .summary-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .copy-data-btn { font-size: 12px; color: #007bff; cursor: pointer; text-decoration: none; font-weight: normal; margin-left: 10px; }
    .copy-data-btn:hover { text-decoration: underline; }

    .comp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .comp-table th { text-align: left; padding: 8px; color: #666; border-bottom: 2px solid #eee; font-size: 12px; text-transform: uppercase; }
    .comp-table td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .comp-table .metric-col { font-weight: 600; color: #555; width: 25%; }
    .comp-table .agent-col { font-weight: bold; font-size: 14px; color: #000; width: 25%; }
    .comp-table .team-col { color: #777; font-style: italic; width: 25%; }
    .comp-table .diff-col { width: 25%; text-align: right; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; min-width: 50px; text-align: center; }
    .badge-pos { background-color: #d4edda; color: #155724; }
    .badge-neg { background-color: #f8d7da; color: #721c24; }
    .badge-neu { background-color: #e2e3e5; color: #383d41; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .chart-wrapper { border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fff; height: 350px; display: flex; flex-direction: column; }
    .chart-header { text-align: center; font-weight: bold; font-size: 14px; color: #666; margin-bottom: 5px; }
    .full-width { grid-column: 1 / -1; }
    #statusText { font-size: 11px; color: #999; text-align: center; margin-top: 5px; }

    .toggle-box { text-align: right; margin-bottom: 10px; padding: 0 5px; }
    .toggle-label { display: inline-flex; align-items: center; cursor: pointer; font-size: 13px; color: #555; background: #fff; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-weight: 600; }
    .toggle-label:hover { background: #f8f9fa; }
    .toggle-label input { width: auto; margin-right: 8px; transform: scale(1.1); }
  </style>
</head>
<body>

  <div class="form-container" id="inputForm">
    <div class="section-title">1. Select Date Range</div>
    <div class="row"><div class="col"><label>Quick Select</label>
      <select id="datePreset" onchange="applyPreset()">
        <option value="custom">Custom Range</option>
        <option value="lastMonth">Last Month</option>
        <option value="lastYear">Last Year</option>
        <option value="thisMonth">This Month</option>
        <option value="last30">Last 30 Days</option>
        <option value="last3Months">Last 3 Months</option>
        <option value="last12Months">Last 12 Months</option>
      </select>
    </div></div>
    
    <div class="row"><div class="col"><label>Start Date</label><input type="date" id="start" onchange="refreshAgents(); resetPreset();"></div><div class="col"><label>End Date</label><input type="date" id="end" onchange="refreshAgents(); resetPreset();"></div></div>

    <div class="section-title">2. Select Agent(s)</div>
    <div style="font-size:11px; color:#666; margin-bottom:8px;">Select 1 for Individual Report. Select multiple for Comparison Mode.</div>
    <div id="agentLoader">Finding Agents...</div>
    <div id="statusText" style="font-style:italic;"></div>
    <div class="agent-list-box" id="agentContainer" style="display:none;"></div>
    <div style="text-align:right; margin: 10px 0 20px; font-size:12px;"><a href="#" onclick="toggleAll(true)">Select All</a> | <a href="#" onclick="toggleAll(false)">Select None</a></div>

    <button onclick="runReport()" id="runBtn" disabled>Generate Report</button>
    <div class="loading" id="loader">Processing data...</div>
  </div>

  <div id="resultsArea">
    <div class="main-report-header">
      <span class="main-report-title" id="reportTitle">Individual Report</span>
      <span id="mainDateLabel" class="main-report-date"></span>
    </div>

    <div class="btn-group" id="actionButtons">
      <button onclick="resetForm()" style="background: #6c757d; width:auto;">&laquo; Back</button>
      <button onclick="copyReportImage()" style="background: #17a2b8; width:auto;" id="copyBtn">&#128247; Copy Image</button>
      <button onclick="sendVisualEmail()" style="background: #28a745; width:auto;" id="emailImgBtn">&#9993; Email (Image)</button>
    </div>

    <div id="summaryContainer"></div>

    <div class="toggle-box" id="dataLabelToggleBox">
        <label class="toggle-label">
            <input type="checkbox" id="showDataLabels" onchange="updateAllCharts()"> Show Data Labels
        </label>
    </div>

    <div class="chart-grid" id="chartsContainer">
      <div class="chart-wrapper full-width" id="wrap-vol"><div class="chart-header">Volume Trends</div><div style="flex:1; position:relative;"><canvas id="volChart"></canvas></div></div>
      <div class="chart-wrapper" id="wrap-eff"><div class="chart-header">Efficiency (% Answered)</div><div style="flex:1; position:relative;"><canvas id="effChart"></canvas></div></div>
      <div class="chart-wrapper" id="wrap-dur"><div class="chart-header">Duration (ATT)</div><div style="flex:1; position:relative;"><canvas id="durChart"></canvas></div></div>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    window.lastData = null;
    let chartInstances = [];

    window.onload = function() {
      document.getElementById('datePreset').value = "custom";
      const today = new Date();
      const thirtyAgo = new Date(); thirtyAgo.setDate(today.getDate() - 30);
      document.getElementById('start').valueAsDate = thirtyAgo;
      document.getElementById('end').valueAsDate = today;
      google.script.run.withSuccessHandler(populateAgents).getIndividualToolData();
    };

    function populateAgents(data) {
      document.getElementById('agentLoader').style.display = 'none';
      if(data.defaultStart && !document.getElementById('start').value) {
         document.getElementById('start').value = data.defaultStart;
         document.getElementById('end').value = data.defaultEnd;
      }
      const container = document.getElementById('agentContainer');
      const statusDiv = document.getElementById('statusText');
      container.style.display = 'grid';
      container.innerHTML = ""; statusDiv.innerHTML = ""; 
      
      if(!data.agents || data.agents.length === 0) return;
      data.agents.forEach(a => { container.innerHTML += `<div class="agent-item"><label><input type="checkbox" name="agentCheck" value="${a}"> ${a}</label></div>`; });
      document.getElementById('runBtn').disabled = false;
    }

    function refreshAgents() {
        const s = document.getElementById('start').value;
        const e = document.getElementById('end').value;
        if(s && e) {
            document.getElementById('statusText').innerText = "Refreshing agent list...";
            document.getElementById('runBtn').disabled = true;
            google.script.run.withSuccessHandler(populateAgents).getIndividualToolData(s, e);
        }
    }

    function copyTableData(btn) {
        const card = btn.closest('.summary-card');
        const table = card.querySelector('table');
        if(!table) return;
        let tsv = "";
        for(let row of table.rows) {
            let cells = Array.from(row.cells).map(cell => cell.innerText.replace(/\n/g, " ").trim());
            tsv += cells.join("\t") + "\n";
        }
        navigator.clipboard.writeText(tsv).then(() => alert("Data for this agent copied to clipboard!"));
    }

    function updateAllCharts() {
        if (!window.lastData) return;
        chartInstances.forEach(c => c.destroy());
        chartInstances = [];
        renderCharts(window.lastData);
    }

    function applyPreset() { 
        const preset = document.getElementById('datePreset').value; 
        const today = new Date(); 
        let start, end; 
        if (preset === 'custom') return; 
        end = new Date(today);
        if (preset === 'lastMonth') { start = new Date(today.getFullYear(), today.getMonth() - 1, 1); end = new Date(today.getFullYear(), today.getMonth(), 0); } 
        else if (preset === 'lastYear') { start = new Date(today.getFullYear() - 1, 0, 1); end = new Date(today.getFullYear() - 1, 11, 31); } 
        else if (preset === 'thisMonth') { start = new Date(today.getFullYear(), today.getMonth(), 1); } 
        else if (preset === 'last30') { start = new Date(today); start.setDate(today.getDate() - 30); } 
        else if (preset === 'last3Months') { start = new Date(today); start.setMonth(today.getMonth() - 3); }
        else if (preset === 'last12Months') { start = new Date(today); start.setFullYear(today.getFullYear() - 1); }
        if(start && end) { 
            document.getElementById('start').valueAsDate = start; 
            document.getElementById('end').valueAsDate = end; 
            refreshAgents(); 
        } 
    }
    
    function resetPreset() { document.getElementById('datePreset').value = "custom"; }
    function toggleAll(check) { const boxes = document.getElementsByName('agentCheck'); for(let b of boxes) b.checked = check; }
    function resetForm() { document.getElementById('inputForm').style.display = 'block'; document.getElementById('resultsArea').style.display = 'none'; }

    function runReport() {
      const s = document.getElementById('start').value;
      const e = document.getElementById('end').value;
      const boxes = document.getElementsByName('agentCheck');
      const selected = [];
      for(let b of boxes) if(b.checked) selected.push(b.value);
      if(selected.length === 0) return alert("Select at least one agent.");
      document.getElementById('runBtn').disabled = true;
      document.getElementById('loader').style.display = 'block';
      google.script.run.withSuccessHandler(renderReport).processIndividualReport(s, e, selected);
    }

    function renderReport(data) {
      window.lastData = data;
      document.getElementById('mainDateLabel').innerText = `(${data.dateLabel})`;
      document.getElementById('reportTitle').innerText = data.mode === 'comparison' ? 'Peer Comparison Report' : 'Individual Performance Report';
      
      document.getElementById('inputForm').style.display = 'none';
      document.getElementById('resultsArea').style.display = 'block';
      document.getElementById('runBtn').disabled = false;
      document.getElementById('loader').style.display = 'none';

      renderSummary(data.summaryData, data.teamAvg);

      chartInstances.forEach(c => c.destroy());
      chartInstances = [];
      renderCharts(data);
    }

    function renderSummary(summaryData, teamAvg) {
      const container = document.getElementById('summaryContainer');
      container.innerHTML = "";
      
      const getDiffBadge = (agentVal, teamVal, type) => {
        if(teamVal === 0) return `<span class="badge badge-neu">-</span>`;
        let pctDiff = ((agentVal - teamVal) / teamVal) * 100;
        let label = (pctDiff > 0 ? "+" : "") + pctDiff.toFixed(1) + "%";
        let colorClass = 'badge-neu';
        if (type === 'pos') { 
           if (pctDiff > 0) colorClass = 'badge-pos';
           else if (pctDiff < 0) colorClass = 'badge-neg';
        } else if (type === 'neg') { 
           if (pctDiff < 0) colorClass = 'badge-pos';
           else if (pctDiff > 0) colorClass = 'badge-neg';
        }
        return `<span class="badge ${colorClass}">${label}</span>`;
      };

      summaryData.forEach(agent => {
        // === CHANGED: ATT CALCULATION ===
        let attRawDiff = teamAvg.raw.att > 0 ? ((agent.raw.att - teamAvg.raw.att) / teamAvg.raw.att) * 100 : 0;
        let attString = (agent.raw.att > teamAvg.raw.att ? '> Avg' : '< Avg') + ` (${attRawDiff > 0 ? '+' : ''}${attRawDiff.toFixed(1)}%)`;

        const html = `
          <div class="summary-card">
            <div class="summary-title">
                ${agent.name} <span style="font-weight:normal; color:#888; font-size:13px; margin-left:10px;">vs Team Average</span>
                <span class="copy-data-btn" onclick="copyTableData(this)">&#128203; Copy Data</span>
            </div>
            <table class="comp-table">
              <thead><tr><th>Metric</th><th>${agent.name}</th><th>Team Avg</th><th style="text-align:right;">Diff</th></tr></thead>
              <tbody>
                <tr><td class="metric-col">Total Rung</td><td class="agent-col">${agent.stats.rung}</td><td class="team-col">${teamAvg.rung}</td><td class="diff-col">${getDiffBadge(agent.raw.rung, teamAvg.raw.rung, 'pos')}</td></tr>
                <tr><td class="metric-col">Answered</td><td class="agent-col">${agent.stats.answered}</td><td class="team-col">${teamAvg.answered}</td><td class="diff-col">${getDiffBadge(agent.raw.answered, teamAvg.raw.answered, 'pos')}</td></tr>
                <tr><td class="metric-col">Missed</td><td class="agent-col">${agent.stats.missed}</td><td class="team-col">${teamAvg.missed}</td><td class="diff-col">${getDiffBadge(agent.raw.missed, teamAvg.raw.missed, 'neg')}</td></tr>
                <tr><td class="metric-col">% Answered</td><td class="agent-col">${agent.stats.pct}</td><td class="team-col">${teamAvg.pct}</td><td class="diff-col">${getDiffBadge(agent.raw.pct, teamAvg.raw.pctAnswered, 'pos')}</td></tr>
                <tr><td class="metric-col">Talk Time (ATT)</td><td class="agent-col">${agent.stats.att}</td><td class="team-col">${teamAvg.att}</td><td class="diff-col"><span class="badge badge-neu" style="color:#007bff;">${attString}</span></td></tr>
              </tbody>
            </table>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function renderCharts(data) {
      const showLabels = document.getElementById('showDataLabels').checked;
      const labels = data.trendData.labels;
      const datasets = data.trendData.datasets;
      const agents = Object.keys(datasets);
      const colors = ['#007bff', '#28a745', '#dc3545', '#fd7e14', '#6610f2', '#17a2b8'];

      // VOL
      const volCtx = document.getElementById('volChart').getContext('2d');
      const volData = [];
      if (data.mode === 'individual') {
        const d = datasets[agents[0]];
        volData.push({ label: 'Total Rung', data: d.map(x=>x.rung), borderColor: '#007bff', backgroundColor: '#007bff', tension: 0.4 });
        volData.push({ label: 'Answered', data: d.map(x=>x.answered), borderColor: '#28a745', backgroundColor: '#28a745', tension: 0.4 });
        volData.push({ label: 'Missed', data: d.map(x=>x.missed), borderColor: '#dc3545', backgroundColor: '#dc3545', tension: 0.4 });
      } else {
        agents.forEach((ag, i) => {
          volData.push({ label: ag + ' (Ans)', data: datasets[ag].map(x=>x.answered), borderColor: colors[i%colors.length], backgroundColor: colors[i%colors.length], tension: 0.4 });
        });
      }
      createChart(volCtx, 'Call Volume', labels, volData, false, false, showLabels);

      // EFF
      const effCtx = document.getElementById('effChart').getContext('2d');
      const effData = agents.map((ag, i) => ({
        label: ag + ' %',
        data: datasets[ag].map(x => x.pct.toFixed(1)),
        borderColor: colors[i%colors.length],
        backgroundColor: colors[i%colors.length],
        tension: 0.4
      }));
      effData.push({ label: 'Goal', data: new Array(labels.length).fill(95), borderColor: '#ffc107', borderDash: [5,5], pointRadius: 0 });
      createChart(effCtx, '% Answered', labels, effData, true, false, showLabels);

      // DUR
      const durCtx = document.getElementById('durChart').getContext('2d');
      const durData = agents.map((ag, i) => ({
        label: ag + ' ATT',
        data: datasets[ag].map(x => (x.att/60).toFixed(2)),
        borderColor: colors[i%colors.length],
        backgroundColor: colors[i%colors.length],
        tension: 0.4
      }));
      createChart(durCtx, 'Avg Talk Time', labels, durData, false, true, showLabels);
    }

    function createChart(ctx, title, labels, datasets, isPercent=false, isTime=false, showLabels=false) {
      let globalMax = 0;
      datasets.forEach(ds => { if(ds.data) { const m = Math.max(...ds.data.map(v=>parseFloat(v)||0)); if(m>globalMax) globalMax=m; } });
      const suggestedMax = globalMax > 0 ? globalMax * 1.1 : 1;

      const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true, 
          maintainAspectRatio: false,
          animation: false, 
          devicePixelRatio: 1, 
          plugins: { 
            title: { display: true, text: title }, 
            legend: { position: 'bottom', labels:{boxWidth:10} },
            
            datalabels: { 
                display: showLabels,
                align: 'top', 
                anchor: 'center', 
                backgroundColor: 'rgba(255,255,255,0.9)', 
                
                borderColor: (context) => context.dataset.borderColor, 
                borderWidth: 1,
                borderRadius: 3,
                color: (context) => context.dataset.borderColor, 

                font: {size: 10, weight: 'bold'},
                formatter: (value, context) => {
                    if (context.dataset.label === 'Goal') return ""; 
                    if (!value || value == 0) return "";
                    if (isTime) return formatTime(value);
                    if (isPercent) return parseFloat(value).toFixed(1) + '%';
                    return value;
                }
            }, 
            
            tooltip: { callbacks: { label: function(ctx) { let l = ctx.dataset.label || ''; if(l) l+=': '; return isTime ? l+formatTime(ctx.parsed.y) : (isPercent ? l+ctx.parsed.y+'%' : l+ctx.parsed.y); } } } 
          },
          scales: { 
              y: { beginAtZero: true, suggestedMax: suggestedMax, grid: { borderDash: [5, 5] }, ticks: { callback: function(val) { return isPercent ? val+'%' : (isTime ? formatTime(val) : val); } } },
              x: { grid: { borderDash: [5, 5] } }
          }
        }
      });
      chartInstances.push(chart);
    }

    function formatTime(minutes) {
      if(minutes == null) return "";
      const val = parseFloat(minutes);
      if(isNaN(val)) return "";
      const m = Math.floor(val);
      const s = Math.round((val - m) * 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function getCaptureOptions() {
      const canvasMap = {};
      document.querySelectorAll('canvas').forEach(cvs => {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });

      return {
        scale: 2, useCORS: true, backgroundColor: null,
        onclone: (clonedDoc) => {
          const el = clonedDoc.getElementById('resultsArea');
          const btn = clonedDoc.getElementById('actionButtons');
          if(btn) btn.style.display = 'none';
          
          const toggle = clonedDoc.getElementById('dataLabelToggleBox');
          if(toggle) toggle.style.display = 'none';

          const copyBtns = clonedDoc.querySelectorAll('.copy-data-btn');
          copyBtns.forEach(b => b.style.display = 'none');
          
          el.style.backgroundColor = "#f4f6f9"; 
          el.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/robinchoudhuryums/marketing-images@main/Patient%20Portal%20Background_portrait.png')";
          el.style.backgroundSize = "cover"; el.style.backgroundPosition = "center";
          el.style.padding = "40px"; el.style.boxSizing = "border-box";
          el.style.width = "1200px"; el.style.height = "auto";

          const chartGrid = clonedDoc.getElementById('chartsContainer');
          chartGrid.style.display = 'flex';
          chartGrid.style.flexWrap = 'wrap'; 
          chartGrid.style.flexDirection = 'row'; 
          chartGrid.style.justifyContent = 'space-between'; 
          chartGrid.style.gap = '20px'; 

          ['volChart', 'effChart', 'durChart'].forEach(id => {
            const shortId = id.substring(0,3);
            const wrapper = clonedDoc.getElementById('wrap-' + shortId);
            
            if(wrapper) {
               if(shortId === 'vol') { wrapper.style.width = "100%"; wrapper.style.flex = "0 0 100%"; } 
               else { wrapper.style.width = "47%"; wrapper.style.flex = "0 0 47%"; }
               wrapper.style.height = "auto";
               wrapper.classList.remove('full-width'); 
               
               const cvs = wrapper.querySelector('canvas');
               if(cvs && canvasMap[id]) {
                 const img = clonedDoc.createElement('img');
                 img.src = canvasMap[id];
                 img.style.width = "100%"; 
                 img.style.height = "auto";
                 img.style.display = "block";
                 cvs.parentNode.replaceChild(img, cvs);
               }
            }
          });
        }
      };
    }

    function copyReportImage() { const btn = document.getElementById('copyBtn'); const originalText = btn.innerHTML; btn.innerText = "Capturing..."; html2canvas(document.getElementById('resultsArea'), getCaptureOptions()).then(canvas => { canvas.toBlob(blob => { navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]); alert('Copied!'); btn.innerHTML = originalText; }); }); }
    function sendVisualEmail() { const btn = document.getElementById('emailImgBtn'); const originalText = btn.innerHTML; btn.innerText = "Sending..."; html2canvas(document.getElementById('resultsArea'), getCaptureOptions()).then(canvas => { google.script.run.withSuccessHandler(() => { alert("Sent!"); btn.innerHTML = originalText; }).sendIndividualVisualEmail(canvas.toDataURL('image/png'), window.lastData.dateLabel); }); }
  </script>
</body>
</html>
