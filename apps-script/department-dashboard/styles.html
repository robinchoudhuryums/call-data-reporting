    display: inline-flex;
    align-items: baseline;
    gap: 8px;
  }
  .agent-tier {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 1px 6px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .agent-tier--high { background: var(--warn-soft); color: var(--warn); }
  .agent-tier--med  { background: var(--paper-2);   color: var(--muted); }
  .agent-tier--low  { background: var(--good-soft); color: var(--good); }

  /* R11-C4: per-card chart-scope button (■ chart / ✕ chart) + the toolbar
     chip that names the active scope. The button sits inside the card's
     <summary>; its clicks are intercepted before the <details> toggle. */
  .agent-scope-btn {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 1px 7px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--paper-card);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .agent-scope-btn:hover { border-color: var(--accent); color: var(--accent); }
  .agent-scope-btn.is-on {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .missed-scope-chip {
    margin-right: auto;                 /* toolbar is flex-end; chip sits left */
    align-self: center;
    font-size: 12px;
    color: var(--ink);
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 2px 10px;
    white-space: nowrap;
  }
  .missed-scope-chip .scope-chip-x {
    border: 0;
    background: none;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    padding: 0 0 0 4px;
    line-height: 1;
  }
  .missed-scope-chip .scope-chip-x:hover { color: var(--ink); }

  /* Collapsible Missed cards: the queue-only card and each per-agent
     timeline card are <details>, so managers can fold the timestamp
     lists away. A custom caret replaces the native disclosure triangle. */
  .queue-only-card > summary.qname,
  .agent-card > summary.agent-card-head {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    /* R11-C6: on a narrow (220px) card the meta (tier chip + "N missed" +
       the "■ chart" button) can outrun the row and get clipped by the card's
       overflow:hidden. Let the row wrap so the meta drops to a second line
       fully visible instead of the button being cut off at the right edge. */
    flex-wrap: wrap;
    row-gap: 6px;
  }
  .agent-card > summary.agent-card-head .agent-name { min-width: 0; }
  .agent-card-meta { flex-wrap: wrap; margin-left: auto; }
  .queue-only-card > summary.qname::-webkit-details-marker,
  .agent-card > summary.agent-card-head::-webkit-details-marker { display: none; }
  .queue-only-card > summary.qname::after,
  .agent-card > summary.agent-card-head::after {
    content: '▸';
    color: var(--muted);
    font-size: 10px;
    transition: transform var(--dur-1, 0.18s) var(--ease, ease);
  }
  .queue-only-card[open] > summary.qname::after,
  .agent-card[open] > summary.agent-card-head::after { transform: rotate(90deg); }
  /* Inside the flex summary the name + total sit on one row -- drop the
     stacked-layout bottom margins carried over from the old <div> markup. */
  .agent-card > summary.agent-card-head { margin: 0; }
  .agent-card[open] > summary.agent-card-head { margin-bottom: 10px; }
  .agent-card > summary .agent-name,
  .agent-card > summary .agent-total { margin-bottom: 0; }

  /* -------- Individual Report modal -------------------------------- */
  /* Form: date picker + agent multi-select. Section titles use the
     mono-kicker convention; inputs match the dashboard's sharp-corner
     control language. */
  .ir-form { padding: 6px 4px; }
  .ir-section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 18px 0 12px;
  }
  .ir-section-title:first-child { margin-top: 0; }
  .ir-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 4px;
  }
  .ir-col label {
    display: block;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .ir-col select,
  .ir-col input[type="date"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    box-sizing: border-box;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
  }
  .ir-hint { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.55; }
  .ir-loader { padding: 0; }
  .ir-skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
    padding: 10px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .ir-skeleton-row {
    height: 24px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--paper-2) 0%, var(--line) 50%, var(--paper-2) 100%);
    background-size: 200% 100%;
    animation: irShimmer 1.2s linear infinite;
  }
  .ir-skeleton-label {
    text-align: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  @keyframes irShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* No-data empty state shown when every selected agent had zero
     activity in the chosen range. */
  .ir-empty-card {
    background: var(--paper-card);
    border: 1px dashed var(--line);
    border-radius: 2px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 14px;
  }
  .ir-empty-icon  { font-size: 28px; opacity: 0.45; margin-bottom: 6px; }
  .ir-empty-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .ir-empty-sub   { font-size: 12px; color: var(--muted); }
  .ir-agent-list {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    background: var(--paper-2);
    padding: 5px 8px;
    border-radius: 2px;
    cursor: pointer;
    user-select: none;
  }
  .ir-agent-item input { margin-right: 6px; transform: scale(1.05); }
  .ir-agent-empty { padding: 12px; font-size: 13px; color: var(--muted); text-align: center; }

  /* Active / inactive groupings inside the agent picker. Active
     items render normally; inactive (no data in range) get muted
     styling so they're still pickable but visually de-prioritized. */
  .ir-agent-group-label {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin: 8px 2px 4px;
  }
  .ir-agent-group-label-muted { color: var(--muted); margin-top: 12px; }
  .ir-agent-group-count { color: var(--muted); font-weight: 500; }
  .ir-agent-group {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-group-muted .ir-agent-item {
    background: var(--paper-2);
    color: var(--muted);
    font-style: italic;
  }
  .ir-agent-group-muted .ir-agent-item input { accent-color: var(--muted); }
  /* QUEUE chip embedded in each floater picker item (INV-53). Lives
     to the right of the agent name; smaller-than-default font-size
     to keep the picker row compact. Reuses .src-chip-queue colors
     from My Department's Source column for visual consistency. */
  .ir-agent-floater-chip {
    margin-left: 6px;
    font-size: 9px;
    padding: 1px 6px;
    font-style: normal;
  }

  /* Collapsible inactive group. Hides the default disclosure marker
     and renders our own caret next to the label that rotates when
     the details element is open. */
  .ir-agent-details { grid-column: 1 / -1; }
  .ir-agent-details > summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .ir-agent-details > summary::-webkit-details-marker { display: none; }
  .ir-agent-details > summary::before {
    content: "\25B8";   /* right-pointing triangle */
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: var(--muted);
    margin-right: 2px;
    transition: transform 0.15s ease;
  }
  .ir-agent-details[open] > summary::before {
    transform: rotate(90deg);
  }
  .ir-agent-details > .ir-agent-group { margin-top: 6px; }

  /* Search row shared by main form picker and edit popover. */
  .ir-search-row { margin-bottom: 8px; }
  .ir-search-row input[type="search"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
    box-sizing: border-box;
  }
  .ir-search-row input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .ir-agent-actions {
    text-align: right;
    margin: 8px 2px 14px;
    font-size: 12px;
  }
  .ir-agent-actions a { color: var(--accent); text-decoration: none; }
  .ir-agent-actions a:hover { text-decoration: underline; }
  .ir-agent-actions .sep { color: var(--line); margin: 0 6px; }

  /* Results area — hairline divider with the report title in display
     font + mono date strip. Mirrors the dashboard header pattern at a
     smaller scale. */
  .ir-results { padding-top: 4px; }
  .ir-results-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ir-results-header-left { flex: 1; min-width: 0; }
  .ir-results-title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; }
  .ir-results-title {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .ir-results-date  {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .ir-action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .ir-action-buttons .btn { width: auto; padding: 6px 12px; font-size: 12px; }

  /* Export dropdown: single button collapses Copy / Email / Print
     menu items. Caret rotates slightly when the menu is open. */
  .ir-export-wrap { position: relative; display: inline-block; }
  .ir-export-caret {
    display: inline-block;
    margin-left: 4px;
    font-size: 9px;
    transition: transform 0.15s;
  }
  #ir-export-btn.open .ir-export-caret { transform: rotate(180deg); }
  .ir-export-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
    min-width: 160px;
    padding: 4px;
    z-index: 100;
  }
  .ir-export-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
  }
  .ir-export-menu button:hover { background: var(--paper-2); }

  /* "Showing: Sarah, Maria · change" sticky in the results header.
     Click the change link to open the inline edit popover. */
  .ir-editing-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .ir-editing-label { font-weight: 600; color: var(--muted); }
  .ir-editing-agents {
    color: var(--ink);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60vw;
  }
  .ir-editing-edit {
    background: transparent;
    border: 0;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0 2px;
    text-decoration: underline;
  }
  .ir-editing-edit:hover { color: var(--accent); }

  /* Edit-selection popover: floats below the results header,
     contains a compact agent picker that lets the user re-run
     the report with different agents without going back to the
     form. */
  .ir-edit-popover {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    padding: 14px 16px;
    margin: 0 0 14px;
  }
  .ir-edit-popover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .ir-edit-popover-close {
    background: transparent;
    border: 0;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
  }
  .ir-edit-popover-close:hover { color: var(--ink); }
  .ir-agent-list-compact { max-height: 220px; }
  .ir-edit-popover-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
  }
  .ir-edit-popover-actions a { color: var(--accent); text-decoration: none; }
  .ir-edit-popover-actions a:hover { text-decoration: underline; }
  .ir-edit-popover-actions .sep { color: var(--line); }
  .ir-edit-popover-actions .btn {
    margin-left: auto;
    width: auto;
    padding: 6px 14px;
    font-size: 12px;
  }

  /* #1: date + compare controls inside the in-results "Change" popover, so a
     manager can change agents AND the date range without returning to the
     setup form. */
  .ir-edit-dates-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ir-edit-date-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
  }
  .ir-edit-date-field input[type="date"],
  .ir-edit-date-field select {
    font-size: 12px;
    padding: 5px 7px;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--paper);
    color: var(--ink);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .ir-edit-date-field select { min-width: 180px; }

  /* #1 Part B: drill-through loader (Insights / My Department -> IR auto-run).
     Shown in place of the setup form so the form doesn't flash before the
     report renders. */
  .ir-drill-loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    min-height: 280px;
    color: var(--muted);
  }
  .ir-drill-spinner {
    width: 34px;
    height: 34px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: irDrillSpin 0.7s linear infinite;
  }
  .ir-drill-loader-text {
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  @keyframes irDrillSpin { to { transform: rotate(360deg); } }

  /* Inline button spinner: a small ring shown inside a button while its
     action is in flight (e.g. Dept Config Save). */
  .btn-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 6px;
    vertical-align: -1px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: irDrillSpin 0.7s linear infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .btn-spinner { animation-duration: 1.6s; }
  }

  /* Sort dropdown above the per-agent summary cards. Only shown
     in peer-comparison mode (2+ agents); hidden for single-agent
     reports where sort is meaningless. */
  .ir-cards-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .ir-sort-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--paper-card);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--muted);
  }
  .ir-sort-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
  }
  .ir-sort-control select {
    background: transparent;
    border: 0;
    padding: 2px 4px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
  }
  .ir-sort-control select:focus { outline: none; }

  /* Per-agent summary card — hairline panel with display-font agent
     name. KPI grid below uses paper-2 inner tiles for separation. */
  .ir-summary-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .ir-summary-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ir-summary-title .ir-vs {
    font-family: var(--mono);
    font-weight: 400;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  /* "EXCLUDED FROM TEAM AVG" pill (E4, Phase E). Surfaces on agents
     listed in TEAM_AVG_EXCLUDES[dept] so the manager sees why their
     numbers don't move the team average (INV-26). Subdued muted-soft
     palette -- it's reference info, not a warning. */
  .ir-excluded-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    cursor: help;
  }
  .ir-copy-tsv {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent-soft);
    border-radius: 2px;
    padding: 4px 9px;
    cursor: pointer;
  }
  .ir-copy-tsv:hover { background: var(--accent-soft); }

  /* KPI tile grid: a single row of metric tiles per agent. Big
     number + sparkline up top, team-avg + delta badge below. */
  .ir-kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  /* IR sparkline SVG (the per-tile trend; the tile chrome itself migrated to
     ds-kpi -- the dead .ir-kpi-* tile rules were removed). */
  .ir-spark-svg { display: block; }

  /* Insights callout — rendered above the KPI grid per agent.
     3px accent stripe + soft-bg fill, mono kicker, lists up to
     3 rules-based observations vs team avg. */
  .ir-insights {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .ir-insights-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .ir-insights-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.5;
  }
  .ir-insight-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 3px 0;
  }
  .ir-insight-text { flex: 1; }
  /* Colored circular markers double-encode direction: blue / up
     arrow = positive, orange / down arrow = negative, grey / bullet
     = neutral. Color + shape distinction so CVD users get the same
     signal as everyone else. */
  .ir-insight-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }
  /* #11a: green (not blue) so the positive ↑ stands out from the blue-tinted
     Insights banner instead of blending into it. */
  .ir-insight-mark-positive { background: var(--good-soft); color: var(--good); }
  .ir-insight-mark-negative { background: var(--warn-soft); color: var(--warn); }
  .ir-insight-mark-neutral  { background: var(--paper-2); color: var(--muted); }
  /* Compact form hint for the resolved prior-range preview under
     the Compare-with row. */
  .ir-prior-hint {
    margin-top: -8px;
    margin-bottom: 12px;
    color: var(--muted);
    font-size: 12px;
  }
  @media (max-width: 900px) {
    .ir-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .ir-badge {
    padding: 3px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    display: inline-block;
    min-width: 60px;
    text-align: center;
  }
  /* Diverging blue (good) / orange (bad) pair instead of green/red:
     readable for deuteranopia + protanopia users, who can't reliably
     distinguish red and green badges. */
  .ir-badge-pos { background: var(--accent-soft); color: var(--accent); }
  .ir-badge-neg { background: var(--warn-soft); color: var(--warn); }
  .ir-badge-neu { background: var(--paper-2); color: var(--ink); }

  /* Charts: stacked grid. Volume goes full-width, efficiency + duration
     side-by-side below. */
  .ir-toggle-box { text-align: right; margin: 4px 4px 10px; }
  .ir-toggle-label {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    background: var(--paper-card);
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-weight: 500;
  }
  .ir-toggle-label:hover { background: var(--paper-2); }
  .ir-toggle-label input { margin-right: 6px; }

  /* Tabbed chart container: only one of Volume/Efficiency/Duration
     is visible at a time so each gets the full container width. */
  .ir-chart-tabs {
    display: flex;
    flex-wrap: wrap;           /* inline chart controls wrap on narrow widths */
    gap: 4px;
    margin-top: 16px;          /* vertical rhythm: breathing room before the chart zone */
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  /* Chart controls (data-labels toggle / monthly-daily view toggle)
     pinned to the right end of the tab strip so they share one band with
     the tabs instead of stacking on their own row. align-self: center
     stops them stretching the way the tab buttons do. */
  .ir-chart-tabs > .ir-toggle-box,
  .ir-chart-tabs > .qcd-view-toggle {
    margin: 0 2px 0 auto;
    align-self: center;
  }
  .ir-tab {
    background: transparent;
    border: 0;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .ir-tab:hover { color: var(--ink); }
  .ir-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Shared chip legend rendered above the chart panels in
     comparison mode. Each chip toggles its agent's series across
     all three charts; hover dims the others. */
  .ir-shared-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 4px;
    margin-bottom: 6px;
  }
  .ir-legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .ir-legend-chip:hover { background: var(--paper-2); }
  .ir-legend-chip.inactive {
    opacity: 0.42;
    text-decoration: line-through;
  }
  /* Pinned/isolated chip (click-to-isolate) -- accented outline so the
     active spotlight selection is obvious. */
  .ir-legend-chip.pinned {
    border-color: var(--chip-color, var(--accent));
    box-shadow: 0 0 0 1px var(--chip-color, var(--accent)) inset;
    font-weight: 600;
  }
  .ir-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--chip-color, var(--accent));
    flex-shrink: 0;
  }
  .ir-legend-name { font-weight: 500; }

  .ir-chart-area { display: block; }
  .ir-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  .ir-chart-header {
    text-align: center;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .ir-chart-canvas-wrap { flex: 1; position: relative; }

  /* #4: "All at once" toggle + stacked layout. The button sits just after the
     Duration tab (the data-labels box stays right-pinned). In all-mode the tab
     buttons go inert and the three chart panels stack as small multiples. */
  .ir-allcharts-toggle {
    align-self: center;
    margin-left: 8px;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .ir-allcharts-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .ir-allcharts-toggle.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }
  /* In all-at-once mode the tabs are dimmed (none is "selected") but stay
     clickable -- clicking one exits all-mode and jumps to that chart. */
  .ir-tabs-allmode .ir-tab { opacity: 0.5; }
  .ir-charts-all { display: flex; flex-direction: column; gap: 14px; }
  .ir-charts-all .ir-chart-wrap { height: 300px; }

  /* Reset .btn defaults that look out of place inside the modal. */
  #individual-modal .btn { width: auto; }

  /* -------- Performance Report ----------------------------------- */
  /* Inline prior-period hint on the form -- shows the user what
     "vs prior" will compare against before they click Generate. */
  .pr-prior-hint {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin: -4px 2px 12px;
  }
  /* Side-by-side current vs prior date display in the results
     header. Replaces the inline "(date)" + a quiet "Comparing
     against..." line with a single structured pair. */
  .pr-date-pair {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 4px;
  }
  .pr-date-block {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 8px 12px;
    line-height: 1.3;
    min-width: 0;
  }
  .pr-date-current { border-left: 3px solid var(--accent); }
  .pr-date-prior   { border-left: 3px solid var(--muted); }
  .pr-date-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .pr-date-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .pr-date-divider {
    align-self: center;
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
  }

  /* Subset hint banner: appears when the user picked fewer than
     the full roster. Accent-stripe panel reads as "selection
     scope is limited". */
  .pr-subset-hint {
    background: var(--accent-soft);
    color: var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 9px 14px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  /* KPI tile row at the top of the report: 6 tiles, big number +
     delta vs prior period. Distinct from the Individual Report's
     KPI tiles -- no sparkline, no team-avg context. */
  .pr-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  /* .pr-kpi-tile / -row-top / -spark / -label / -value / -delta retired:
     every KPI-tile renderer now uses the shared .ds-kpi component (Phase 1
     ds-* migration). .pr-kpi-row (the grid container above) and the .pr-delta*
     badge classes below are still in use, so they stay. */
  .pr-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .pr-delta-pos { background: var(--accent-soft); color: var(--accent); }
  .pr-delta-neg { background: var(--warn-soft); color: var(--warn); }
  .pr-delta-neu { background: var(--paper-2); color: var(--muted); }
  /* Arrow span inside the delta badge -- bumped so the up/down
     direction is legible at a glance instead of blending into
     the digit run.  Sans-serif so the triangle glyph reads as a
     directional cue rather than a mono character. */
  .pr-delta-arrow {
    font-family: var(--ui);
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
  }
  .pr-delta-cap {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  @media (max-width: 1100px) {
    .pr-kpi-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .pr-kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* Per-agent table — document-row aesthetic matching the main
     agent table, scoped to the Performance Report. */
  .pr-agent-table-wrap { overflow-x: auto; margin-bottom: 18px; }
  .pr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: var(--paper-card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .pr-agent-table th, .pr-agent-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .pr-agent-table th {
    background: var(--paper-2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .pr-agent-table .num {
    text-align: right;
    font-family: var(--mono);
  }
  .pr-agent-table tbody tr:last-child td { border-bottom: 0; }
  .pr-agent-table tbody tr:hover { background: var(--paper-2); }

  /* Sortable headers: cursor + hover affordance + active-sort
     highlight when this column is the current sort key. */
  .pr-th-sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .pr-th-sortable:hover { background: var(--paper-2) !important; color: var(--ink) !important; }

  /* Sub-tabs inside the 12-Month Trend chart panel: switches the
     metric shown on the line chart (Answered / % Answered / ATT). */
  .pr-trend-subtabs {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .pr-trend-subtab {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pr-trend-subtab:hover { background: var(--paper-2); }
  .pr-trend-subtab.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }

  /* -------- Compare Ranges Report -------------------------------- */
  /* Period blocks in the form — sharp-cornered panels with a 3px left
     stripe encoding baseline (muted) vs comparison (accent). */
  .cr-period-block {
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 12px 14px 4px;
    margin-bottom: 12px;
    background: var(--paper-2);
  }
  .cr-period-baseline { border-left-color: var(--muted); }
  .cr-period-compare  { border-left-color: var(--accent); }
  .cr-period-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .cr-period-baseline .cr-period-label { color: var(--muted); }
  .cr-period-compare  .cr-period-label { color: var(--accent); }

  /* Centered Swap button — sharp pill with mono label. */
  .cr-swap-row {
    display: flex;
    justify-content: center;
    margin: -2px 0 10px;
  }
  .cr-swap-btn {
    background: var(--paper-card);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 2px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cr-swap-btn:hover { background: var(--paper-2); color: var(--ink); }

  /* Period length hint below the date blocks — mono so it reads as
     metadata; check/warn variants tinted via --good / --warn. */
  .cr-length-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin: -4px 2px 14px;
    letter-spacing: 0.04em;
  }
  .cr-length-spec strong { color: var(--ink); font-weight: 500; }
  .cr-length-ok { color: var(--good); font-weight: 500; }
  /* Sub-threshold difference -- noted but not alarming.  Muted
     ink rather than warn-orange so it doesn't compete with the
     real volume-incomparable warning. */
  .cr-length-diff { color: var(--muted); }
  .cr-length-diff strong { color: var(--ink); }
  .cr-length-warn { color: var(--warn); font-weight: 500; }

  /* Length-mismatch banner — warn-stripe panel with soft-bg fill,
     same shape as the queue-only section so the visual grammar of
     "this needs attention" is consistent across the app. */
  /* .cr-length-warning retired -- Compare Ranges' length-mismatch banner now
     uses the shared .ds-banner is-warn (Phase 1 ds-* migration), like Insights. */

  /* Per-day caption inside KPI tiles (volume + time metrics
     when length-mismatch). Small mono line under the delta. */
  .pr-kpi-perday {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px dashed var(--line);
    margin-top: 6px;
    padding-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .pr-kpi-perday strong { color: var(--ink); font-weight: 500; }

  /* Comparison chart wrapper: matches the ir-chart-wrap shape but
     fixed taller height for the bar chart. */
  .cr-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 380px;
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .cr-chart-summary {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .cr-chart-summary strong { color: var(--ink); font-weight: 500; }

  /* Per-agent cards stack vertically; on wide screens flow into a
     two-column grid for density. */
  /* -------- Insights report (combined rollup + per-agent cards) --- */
  .ins-compare-line { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .ins-rollup-cap { font-family: var(--ui); font-size: 11px; font-weight: 400; color: var(--muted); }
  .ins-agent-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  /* A1 triage group headers + A2 rail legend. Both span the full card grid
     (grid-column: 1 / -1) so the cards keep flowing in the same grid. */
  .ins-group-head, .ins-group-legend { grid-column: 1 / -1; }
  .ins-group-head {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 0 0;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--line);
    font: 600 11px/1.2 var(--ui);
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink);
  }
  .ins-group-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .ins-group-head--warn .ins-group-dot { background: var(--warn); }
  .ins-group-head--good .ins-group-dot { background: var(--good); }
  .ins-group-head--muted .ins-group-dot { background: var(--muted); }
  .ins-group-count {
    font: 500 11px var(--mono); color: var(--muted);
    background: var(--paper-2); border-radius: var(--r-pill); padding: 1px 8px;
  }
  .ins-group-legend {
    display: flex; align-items: center; gap: 4px;
    font: 500 10px/1.4 var(--mono);
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted);
    margin: 2px 0 -2px;
  }
  .ins-leg-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin: 0 3px 0 8px; }
  .ins-leg-good  { background: var(--good); }
  .ins-leg-warn  { background: var(--warn); }
  .ins-leg-muted { background: var(--muted); }
  /* Per-agent cards ride the shared ds-card--rail (Phase 4): .ds-card supplies
     the border / radius / shadow / bg, ds-card--rail draws the left status rail
     (color via inline --status -- improved=accent / regressed=warn / mixed=muted
     / floater=warn, set in insBuildCard_). .ins-card only contributes padding
     now (kept as the print + layout hook). */
  .ins-card { padding: 12px 14px; }
  .ins-metric-perday {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }

  /* Answer-first headline block at the top of every report's results
     (the anti-intimidation layer): plain sentences before any chart. */
  /* Answer-first headline — restyled to the toned ds-banner aesthetic
     (decision: status-toned banner). Neutral = accent; is-good / is-warn tint
     the background, rail, and badge from the 92% / 5% company standards ONLY.
     Shared by reportHeadline_ (7 reports) + the My-Department missed glance, so
     the tone class is opt-in: no class = neutral (untoned surfaces unchanged). */
  .report-headline {
    margin: 10px 0 14px;
    padding: 12px 16px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: var(--r-lg);
  }
  .report-headline.is-good { background: var(--good-soft); border-left-color: var(--good); }
  .report-headline.is-warn { background: var(--warn-soft); border-left-color: var(--warn); }
  .report-headline-kicker {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: var(--paper-card);
    border-radius: var(--r-pill);
    padding: 3px 9px;
    margin-bottom: 6px;
  }
  .report-headline.is-good .report-headline-kicker { color: var(--good); }
  .report-headline.is-warn .report-headline-kicker { color: var(--warn); }
  .report-headline-line {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
  }
  .report-headline-line + .report-headline-line { margin-top: 2px; }
  /* Lost-abandoned-detail note in the Missed Calls headline (corrupted rows). */
  .missed-lost-note { color: var(--warn); }
  .missed-lost-note strong { color: var(--warn); }

  /* Overview question launcher (anti-intimidation layer): four
     plain-English questions, each routing to a pre-primed report. */
  .ov-launcher { margin: 12px 0 16px; }
  /* R10-1: quick-start row's home is the Help modal now -- a strip between
     the modal header and the two-pane help layout, with the tour-replay
     button beside it. Horizontal padding matches .modal-panel-body. */
  .help-quickstart { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap;
    padding: 14px 40px 0; }
  .help-quickstart .ov-launcher { margin: 0; flex: 1 1 auto; }
  .help-tour-btn { flex: 0 0 auto; white-space: nowrap; }
  /* Injected copies at the top of the Insights + My Department pages
     (owner note) -- same chips, slightly tighter spacing. */
  /* (R10-1: .ov-launcher--page retired -- the chip row's only host is the
     Help modal's .help-quickstart now.) */
  /* Quick-start chip landing spotlight (qsSpotlight_): a brief accent
     ring pulse on the section that answers the clicked question.
     Reduced-motion users get a static ring for the same duration. */
  .qs-spotlight { animation: qs-pulse 2.4s ease; border-radius: var(--r); }
  @keyframes qs-pulse {
    0%   { box-shadow: 0 0 0 0 transparent; }
    12%  { box-shadow: 0 0 0 4px var(--accent-soft), 0 0 0 1.5px var(--accent); }
    70%  { box-shadow: 0 0 0 4px var(--accent-soft), 0 0 0 1.5px var(--accent); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    .qs-spotlight {
      animation: none;
      box-shadow: 0 0 0 4px var(--accent-soft), 0 0 0 1.5px var(--accent);
    }
  }
  /* Companion dim for qsSpotlight_ (qsDimOutside_): a transparent, click-through
     box positioned over the target that dims the rest of the page via a huge
     box-shadow -- so the section pops while the ring pulses. Below every modal
     (100+) but above page content. The transparent hole lets the target + its
     accent ring show through un-dimmed. */
  .qs-dim {
    position: absolute;
    z-index: 80;
    border-radius: var(--r);
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0);
    pointer-events: none;
    transition: box-shadow 0.35s var(--ease);
  }
  .qs-dim.is-on { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.42); }
  @media (prefers-reduced-motion: reduce) {
    /* Still dim (the emphasis is the point) but without the fade. */
    .qs-dim { transition: none; }
  }
  .ov-launcher-kicker {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .ov-launcher-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .ov-launcher-q {
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink);
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 14px;
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .ov-launcher-q:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* Metric glossary: matched labels get a hover/tap definition via
     title=; the dotted underline + help cursor advertise it. */
  .gloss {
    cursor: pointer;
  }
  /* Circled "i" appended to any term that has a glossary definition -- the
     "hover for the definition" indicator. Only lands where initMetricGlossary_
     matched a defined term (th / KPI labels / dept labels), so it never appears
     on undefined text. Hidden by default; fades in on hover/focus so it's an
     on-demand hint, not persistent chrome. Opacity (not display) keeps the
     glyph's space reserved so revealing it never shifts the label. */
  .gloss::after {
    content: '\00a0\24D8';
    color: var(--muted);
    font-size: 0.85em;
    font-style: normal;
    font-weight: 400;
    text-decoration: none;
    vertical-align: baseline;
    opacity: 0;
    transition: opacity var(--dur-1, 120ms) var(--ease, ease-out);
  }
  .gloss:hover::after,
  .gloss:focus::after,
  .gloss:focus-visible::after { opacity: 1; }
  @media (prefers-reduced-motion: reduce) { .gloss::after { transition: none; } }
  /* Sortable headers keep their click affordance. */
  th[data-sort].gloss { cursor: pointer; }
  /* Inline "Different window lengths" flag (Insights compare line). Carries
     its own warning glyph + the explanation in a hover tooltip (.gloss), so
     it must NOT also get the circled-i ::after. */
  .ins-length-flag {
    margin-left: 8px;
    font-weight: 600;
    color: var(--warn);
    white-space: nowrap;
  }
  .ins-length-flag::after { content: none !important; }
  .ins-length-flag__icon { font-style: normal; }
  /* Styled glossary tooltip (replaces the native title= popover). Positioned
     in JS (initGlossTooltip_); pointer-events:none keeps it out of the hover
     hit-test. z-index sits above modals so in-modal terms tooltip correctly. */
  .ds-tooltip {
    position: fixed;
    z-index: 100000;
    max-width: 280px;
    padding: 8px 11px;
    background: var(--paper-card);
    border: 1px solid var(--accent);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-2);
    font: 400 12px/1.5 var(--ui);
    color: var(--ink);
    pointer-events: none;
    animation: ds-tip-in var(--dur-1, 120ms) var(--ease, ease-out);
  }
  @keyframes ds-tip-in { from { opacity: 0; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .ds-tooltip { animation: none; } }
  /* Rich glossary tooltip: a titled definition + an optional benchmark chip
     (the 92% / 5% company standards). Plain-text tooltips are unaffected. */
  .ds-tooltip--rich { padding: 9px 12px; }
  .ds-tooltip .ds-tip-title {
    display: block;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: 0.01em;
  }
  .ds-tooltip .ds-tip-bench {
    display: inline-block;
    margin-top: 6px;
    padding: 1px 8px;
    border-radius: var(--r-pill, 999px);
    font-size: 11px;
    font-weight: 600;
    background: var(--paper-soft, var(--paper));
    color: var(--muted);
  }
  .ds-tooltip .ds-tip-bench.is-good { background: var(--good-soft); color: var(--good); }
  .ds-tooltip .ds-tip-bench.is-warn { background: var(--warn-soft); color: var(--warn); }

  /* Insights: share-of-answered pie (PR port) + card IR drill link. */
  .ins-share-canvas-wrap { height: 220px; position: relative; }
  .ins-card-ir-link {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px 8px;
    cursor: pointer;
  }
  .ins-card-ir-link:hover { border-color: var(--accent); background: var(--accent-soft); }

  /* Tab asterisk: reports pending consolidation review. */
  .tab-review-star { color: var(--warn); cursor: help; }

  /* Insights: Queue health controls row (sub-queue toggle + view seg). */
  .ins-qh-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 2px 0 8px;
  }
  /* Consolidated trend chart: header + Monthly/Daily toggle on one row. */
  .ins-trend-headrow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Insights: Queue health section (QCD consolidation). */
  .ins-qh-chart-wrap { margin: 10px 0 12px; }
  .ins-qh-canvas-wrap { height: 190px; position: relative; }
  .ins-qh-footnote {
    font-size: 11px;
    color: var(--muted);
    margin: 6px 0 14px;
  }
  .ins-qh-viol summary { cursor: pointer; display: inline; }
  .ins-qh-viol-dates {
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    max-width: 260px;
    white-space: normal;
  }
  /* 4c: per-queue top-abandon-source annotation in the Queue health table. */
  .ins-qh-topsrc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .ins-qh-topsrc strong { color: var(--ink); font-weight: 600; }

  /* #1: secondary QCD metrics (Answered / Longest wait / Avg answer). Muted
     dept-total line under the tiles + the same strip inside each per-queue
     expand -- kept off the headline tiles/columns. */
  .ins-qh-secondary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    margin: -2px 0 12px;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .ins-qh-qstats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    margin: 0 0 8px;
    font-size: 12px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .ins-qh-qstat-k {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    margin-right: 4px;
  }

  /* My Department: Missed Calls drill-down section + modal range row. */
  /* The dept Missed radar reuses the modal's .chart-section card; keep it
     from stretching too wide when no drill-in is open. */
  /* Radar mode keeps the compact 480px cap; bars mode uses the wider
     .chart-row.mode-bars cap (760px). The :not() keeps this ID rule from
     out-specificity-ing the bars widening. */
  #dept-missed-chart-row:not(.mode-bars) .chart-section { max-width: 480px; }
  .dept-missed-open { margin-left: auto; }
  .missed-range-row { margin-bottom: 10px; }

  /* Sub-queue scope toggle (still used by the Insights Queue-health
     section; the QCD report's copy was retired). */
  .qcd-sub-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    padding-top: 7px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* QCD breakdown: sub-queues shown separately, below a divider, and
     never folded into the department total (the toggle was retired). */
  .qcd-subqueue-divider td {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: var(--paper);
    padding: 7px 8px 4px !important;
    border-top: 1px solid var(--line);
  }
  .qcd-subqueue-row td:first-child { padding-left: 16px; }
  .qcd-table-note td {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    background: transparent;
    padding: 5px 8px 2px !important;
    text-align: left;
  }

  /* Orphan Fix: inline "new hire" add-to-roster form row. */
  .of-action-cell { white-space: nowrap; }
  .of-add-row td { background: var(--paper-2); }
  .of-add-form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 6px 2px;
    font-size: 12.5px;
  }
  .of-add-exts { width: 200px; }
  .of-add-hint {
    flex-basis: 100%;
    font-size: 11px;
    color: var(--muted);
  }
  /* Batch 4: searchable "Map to roster name" input (an <input list>). */
  .of-row-select { width: 100%; min-width: 150px; box-sizing: border-box; }

  /* Outlier Fix: batch-apply toolbar + checkbox column. */
  .of-batch-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 10px;
    flex-wrap: wrap;
  }
  .of-batch-hint { margin: 0; }
  .of-check-col { width: 34px; text-align: center; }
  .of-check-col input { cursor: pointer; }
  .of-check-col input:disabled { cursor: not-allowed; }
  /* While a write is in flight the whole body dims + goes non-interactive so
     clicks can't queue up behind the async round-trip (belt to the JS
     disabled-controls suspenders). */
  .of-busy { opacity: 0.6; pointer-events: none; }
  #of-run-status.status-loading { pointer-events: none; }

  /* Launcher loading pane: replaces the form while a question-chip run
     generates, so the user never sees a form flash. */
  .launcher-loading { padding: 8px 0 16px; }
  .launcher-loading-q {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .launcher-loading-cap {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-top: 10px;
  }

  /* Universal benchmark tints: the 92% answer-rate target and the 5%
     abandoned-% violation threshold, applied to KPI values / cells by
     script.html::benchValueCls_. */
  .bm-target { color: var(--good); }
  .bm-over   { color: var(--warn); }

  /* Caller Lookup: one timeline card per inbound call. */
  /* R11-E (item 1): per-day collapsible grouping of the call cards. */
  .cl-day { margin-bottom: 10px; border: 1px solid var(--line); border-radius: var(--r); background: var(--paper-2); }
  .cl-day > summary.cl-day-head {
    cursor: pointer; list-style: none;
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    padding: 8px 12px;
  }
  .cl-day > summary.cl-day-head::-webkit-details-marker { display: none; }
  .cl-day > summary.cl-day-head::after {
    content: '▸'; color: var(--muted); font-size: 10px; margin-left: 4px;
    transition: transform var(--dur-1, 0.18s) var(--ease, ease);
  }
  .cl-day[open] > summary.cl-day-head::after { transform: rotate(90deg); }
  .cl-day-date { font-weight: 600; font-size: 13px; color: var(--ink); }
  .cl-day-count { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .cl-day-cards { padding: 0 10px 8px; }
  .cl-day-cards .cl-call-card:last-child { margin-bottom: 0; }

  .cl-call-card {
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 12px 14px;
    margin-bottom: 10px;
    background: var(--paper-card);
  }
  .cl-call-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cl-call-when {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
    color: var(--ink);
    font-weight: 600;
  }
  .cl-chip {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .cl-chip-good  { background: var(--good-soft); color: var(--good); }
  .cl-chip-warn  { background: var(--warn-soft); color: var(--warn); }
  .cl-chip-muted { background: var(--paper-2);   color: var(--muted); }
  .cl-call-facts {
    font-size: 12px;
    color: var(--muted);
    margin: 5px 0 2px;
  }
  /* Compact arrow-chain path summary above the detailed timeline. */
  .cl-chain {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .cl-tok {
    font-size: 11.5px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--paper-2);
    color: var(--ink);
    white-space: nowrap;
  }
  .cl-tok-queue  { border-color: var(--accent); background: var(--accent-soft); }
  .cl-tok-answer { border-color: var(--good);   background: var(--good-soft); }
  .cl-tok-missed { color: var(--muted); }
  .cl-tok-ivr    { color: var(--muted); }
  .cl-arrow { color: var(--muted); font-size: 11px; }

  .cl-journey { margin-top: 8px; }
  .cl-ev {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    padding: 2px 0 2px 4px;
    border-left: 2px solid var(--line);
  }
  .cl-ev-queue  { border-left-color: var(--accent); }
  .cl-ev-answer { border-left-color: var(--good); }
  /* Synthetic terminal row (owner note): marks the real hang-up moment --
     the last leg's start + duration -- so a long abandoned wait doesn't
     read as if the caller disconnected at the leg's START time. */
  .cl-ev-end {
    border-left-color: var(--warn);
    color: var(--muted);
    margin-top: 2px;
    padding-top: 4px;
    border-top: 1px dashed var(--line);
  }
  .cl-ev-time {
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
    color: var(--muted);
    min-width: 58px;
  }
  .cl-ev-icon { color: var(--muted); }
  .cl-ev-answer .cl-ev-icon { color: var(--good); }
  .cl-ev-name { color: var(--ink); }
  .cl-ev-bits { color: var(--muted); }
  .cl-journey-summary {
    margin-top: 8px;
    font-size: 12.5px;
  }
  .cl-journey-note { color: var(--muted); font-size: 11.5px; }

  /* Inbound report: per-insurer daily drill-down (click-to-expand row). */
  .inbound-insurer-row { cursor: pointer; }
  .inbound-insurer-row:hover td { background: var(--paper-2); }
  .inbound-drill-chevron {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.12s ease;
  }
  .inbound-insurer-row.drill-open .inbound-drill-chevron { transform: rotate(90deg); }
  .inbound-drill-row > td {
    background: var(--paper-2);
    padding: 10px 14px 14px;
  }
  .inbound-drill-canvas-wrap {
    position: relative;
    height: 180px;
    margin-top: 6px;
  }
  .ins-card-head { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; margin-bottom: 10px; }
  .ins-card-name { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--ink); }
  .ins-card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px 10px; }
  .ins-metric { min-width: 0; }
  /* Inline current-vs-prior mini-bars on each Insights card (#3). */
  .ins-card-bars { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .ins-bar-row { display: flex; align-items: center; gap: 6px; }
  .ins-bar-lbl { font-size: 10px; color: var(--muted); flex: 0 0 52px; text-align: right;
                 font-family: 'IBM Plex Mono', monospace; }
  .ins-bar-track { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .ins-bar { height: 5px; border-radius: var(--r); min-width: 1px; }
  .ins-bar-prev { background: var(--line); }
  .ins-bar-cur.ins-bar-rung { background: var(--accent); }
  .ins-bar-cur.ins-bar-ans  { background: var(--good); }
  .ins-bar-cur.ins-bar-miss { background: var(--warn); }
  /* #5 redesign: featured primary metric bars vs the TEAM AVERAGE marker. */
  .ins-card-bars2 { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .ins-cbar-row { display: flex; align-items: center; gap: 6px; }
  .ins-cbar-lbl { font-size: 10px; color: var(--muted); flex: 0 0 50px; text-align: right;
                  font-family: 'IBM Plex Mono', monospace; }
  .ins-cbar-track { position: relative; flex: 1 1 auto; min-width: 0; height: 15px;
                    background: var(--paper); border-radius: var(--r); }
  .ins-cbar-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: var(--r); }
  .ins-cbar-fill.ins-cbar-pct  { background: var(--accent-soft); }
  .ins-cbar-fill.ins-cbar-ans  { background: var(--good-soft); }
  .ins-cbar-fill.ins-cbar-miss { background: var(--warn-soft); }
  .ins-cbar-team { position: absolute; top: -1px; bottom: -1px; width: 2px;
                   background: var(--ink); opacity: 0.5; }
  /* #3: value beside the track (own column), so it never paints over the
     team-average marker. Fixed min-width keeps the numbers right-aligned. */
  .ins-cbar-val { flex: 0 0 auto; min-width: 42px; text-align: right;
                  line-height: 15px; font-size: 10px; font-weight: 600;
                  color: var(--ink); font-variant-numeric: tabular-nums; }
  .ins-cbar-delta { flex: 0 0 auto; }
  .ins-card-more { margin-top: 8px; }
  .ins-card-more > summary { font-size: 10.5px; color: var(--muted); cursor: pointer;
                             letter-spacing: 0.04em; list-style-position: inside; }
  .ins-card-grid-sec { margin-top: 6px; }
  .ins-metric-label {
    font-family: var(--mono); font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--muted);
  }
  .ins-metric-val {
    font-family: var(--mono); font-variant-numeric: tabular-nums;
    font-size: 14px; color: var(--ink); margin-top: 2px;
  }
  .ins-metric-delta { margin-top: 3px; }

  .cr-agent-cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 1200px) {
    .cr-agent-cards { grid-template-columns: 1fr 1fr; }
  }
  /* Per-agent cards ride the shared ds-card--rail (Phase 4): .ds-card supplies
     border / radius / shadow / bg; ds-card--rail draws the left status rail
     whose color (improved=accent / regressed=warn / mixed=muted) encodes the
     agent's aggregate direction, set via inline --status in crBuildCard_.
     .cr-agent-card keeps padding (and stays the print + quiet-details hook). */
  .cr-agent-card { padding: 14px 16px; }

  .cr-agent-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 10px;
  }
  /* "vs Team" badge in card header. Three states: above team,
     in line, below team. Same color tokens as the existing
     valence palette for consistency. */
  .cr-vs-team {
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-left: auto;
  }
  .cr-vs-team-pos  { background: var(--accent-soft); color: var(--accent); }
  .cr-vs-team-neg  { background: var(--warn-soft); color: var(--warn); }
  .cr-vs-team-flat { background: var(--paper-2); color: var(--muted); }
  /* Insights trend pill -- names the card's left-rail color (trend vs prior).
     Sits next to the agent name (no margin-left:auto, unlike the vs-team chip
     which pushes right). */
  .ins-trend-pill {
    padding: 2px 8px;
    border-radius: var(--r-pill, 999px);
    font: 500 10px/1 var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .ins-trend-up   { background: var(--good-soft);   color: var(--good); }
  .ins-trend-down { background: var(--warn-soft);   color: var(--warn); }
  .ins-trend-flat { background: var(--paper-2);     color: var(--muted); }

  /* Per-cell "X/day" annotation inside the cards' P1/P2 cells
     when periods differ. Mono so it reads as metadata. */
  .cr-cell-perday {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Collapsible "quiet agents" section below the main card grid.
     Agents whose metrics didn't move beyond the noise floor are
     stashed here so the main grid focuses on the notable movers. */
  .cr-quiet-details {
    margin-top: 14px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .cr-quiet-summary {
    cursor: pointer;
    user-select: none;
    list-style: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .cr-quiet-summary::-webkit-details-marker { display: none; }
  .cr-quiet-summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: 4px;
    font-size: 10px;
    transition: transform 0.15s ease;
  }
  .cr-quiet-details[open] > .cr-quiet-summary::before {
    transform: rotate(90deg);
  }
  .cr-quiet-details .cr-agent-card { opacity: 0.85; }
  .cr-agent-name {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .cr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .cr-agent-table th {
    text-align: left;
    padding: 7px 8px;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .cr-agent-table td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--paper-2);
    color: var(--ink);
    font-family: var(--mono);
  }
  .cr-agent-table .num { text-align: right; }
  .cr-agent-table tbody tr:last-child td { border-bottom: 0; }
  /* Delta column (last cell) reads better center-aligned -- the
     delta badge is a wide pill that looks marooned against the
     right edge, especially when the percentage is small. */
  .cr-agent-table thead th:last-child,
  .cr-agent-table tbody td:last-child { text-align: center; }
  .cr-metric {
    font-family: var(--ui);
    font-weight: 500;
    color: var(--muted);
  }

  /* -------- Alerts modal (admin-only) ---------------------------- */
  /* All color values use the design-system tokens (introduced by
     the visual-redesign branch) so the modal participates in the
     light/dark mode toggle. */
  .al-section { margin-bottom: 22px; }
  /* Vertical rhythm: a hairline divider before each subsequent titled
     section so stacked report / admin sections read as distinct blocks.
     :not(:first-of-type) keeps the line off the leading section. */
  .al-section:not(:first-of-type) {
    border-top: 1px solid var(--line);
    padding-top: 20px;
  }
  .al-section-title {
    font-weight: 600;
    color: var(--accent);
    border-bottom: 2px solid var(--line);
    padding-bottom: 4px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  /* #6: ON/OFF state pill next to a toggle section's title. */
  .al-state-pill {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 9px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    vertical-align: middle;
  }
  .al-state-pill:empty { display: none; }
  .al-state-pill.is-on  { background: var(--good-soft); color: var(--good); }
  .al-state-pill.is-off { background: var(--line); color: var(--muted); }
  /* Batch 3: unified Report Subscribers section (Digest + Queue Report). */
  .al-section-subtitle {
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    margin-bottom: 2px;
  }
  .al-rs-types { display: flex; gap: 18px; flex-wrap: wrap; }
  .al-rs-schedules { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
  .al-rs-schedule { flex: 1 1 300px; min-width: 0; }
  /* Digest-only form fields hide when the Manager Digest type is unticked. */
  .al-rs-hide-digest .al-rs-digest-only { display: none; }
  /* Report-type chip in the unified subscriber table. */
  .al-report-chip {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .al-report-chip.al-report-digest { background: var(--accent-soft); color: var(--accent); }
  .al-report-chip.al-report-queue  { background: var(--good-soft); color: var(--good); }
  .al-hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
  .al-hint a { color: var(--accent); text-decoration: none; }
  /* F2 Neon mirror-health line (sheet-vs-Neon DQE max-date check). */
  .al-neon-mirror { font-size: 12px; line-height: 1.4; margin: 0 0 10px;
                    padding: 8px 10px; border-radius: var(--r); }
  .al-neon-mirror-ok   { background: var(--good-soft); color: var(--good); }
  .al-neon-mirror-warn { background: var(--warn-soft); color: var(--warn); }
  .al-hint a:hover { text-decoration: underline; }

  /* Config table + log table + results table share base
     treatment so the alerts modal reads as a single panel. */
  /* QCD per-source breakdown table. Same shape as .al-config-table
     so the dashboard's existing table styling carries over; the
     Total Calls row is bolded via .qcd-row-total. */
  /* Chart-view toggle (Monthly / Daily) above the QCD trend chart.
     Borrows the .segmented / .seg-btn look from the scope toggle so
     it reads as part of the dashboard's existing chrome vocabulary. */
  .qcd-view-toggle {
    display: inline-flex;
    gap: 0;
    margin: -4px 0 12px;
    border-radius: var(--r);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .qcd-view-toggle .seg-btn {
    background: var(--paper-card);
    color: var(--muted);
    border: none;
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .qcd-view-toggle .seg-btn + .seg-btn { border-left: 1px solid var(--line); }
  .qcd-view-toggle .seg-btn:hover { color: var(--ink); }
  .qcd-view-toggle .seg-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  /* Daily table below the chart. Scrolls vertically when the range
     is long so the modal stays a sane height. Header is sticky so
     the columns stay labeled while scrolling. */
  .qcd-daily-table-wrap {
    max-height: 380px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--paper-card);
  }
  .qcd-daily-table {
    /* override .qcd-source-table outer margins so it fills the
       scroll container cleanly */
    margin: 0;
    border: none;
    border-radius: 0;
  }
  .qcd-daily-table thead th {
    position: sticky;
    top: 0;
    background: var(--paper-2);
    z-index: 1;
  }
  .qcd-daily-table .qcd-daily-warn { color: var(--warn); font-weight: 600; }

  .qcd-source-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
    margin: 8px 0 16px;
  }
  .qcd-source-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--paper-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--line);
  }
  .qcd-source-table th.num,
  .qcd-source-table td.num {
    text-align: right;
    font-family: var(--mono);
  }
  .qcd-source-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
  }
  .qcd-source-table tr:last-child td { border-bottom: none; }
  /* R10-9: sticky column headers on the Inbound + Direct report tables.
     These long tables scroll inside .modal-panel-body; the header row pins
     to the top of that scrollport (th already has the opaque --paper-2
     background). `overflow: clip` replaces the table's `hidden` in these two
     modals ONLY -- hidden creates a scroll container, which would trap the
     sticky th inside the (non-scrolling) table; clip keeps the rounded-
     corner clipping without becoming a scroll container. The box-shadow
     stands in for the collapsed border-bottom, which doesn't travel with a
     stuck header. */
  #inbound-modal .qcd-source-table,
  #direct-call-modal .qcd-source-table { overflow: clip; }
  #inbound-modal .qcd-source-table th,
  #direct-call-modal .qcd-source-table th {
    position: sticky; top: 0; z-index: 3;
    box-shadow: 0 1px 0 var(--line);
  }
  /* R11-B10: the stuck header should hug the modal's top bar -- the scroll
     body's 18px top padding read as an awkward gap strip above the pinned
     row (rows scrolling through it). Move that breathing room onto the
     first child instead, so the scrollport's top edge is flush. */
  #inbound-modal .modal-panel-body,
  #direct-call-modal .modal-panel-body { padding-top: 0; }
  #inbound-modal .modal-panel-body > :first-child,
  #direct-call-modal .modal-panel-body > :first-child { margin-top: 14px; }
  /* R11-C5: Direct report company view -- per-dept cards that expand into
     that dept's agent table. <details> disclosure like the missed agent
     cards; the summary carries the dept's aggregate headline stats. */
  .direct-dept-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .direct-dept-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: var(--r);
  }
  /* R11-M: per-dept answer-rate tone rail (92% standard) so a struggling dept
     reads distinct at a glance. */
  .direct-dept-card.ddc-tone-good  { border-left-color: var(--good); }
  .direct-dept-card.ddc-tone-warn  { border-left-color: var(--warn); }
  .direct-dept-card.ddc-tone-muted { border-left-color: var(--line); }
  .direct-dept-card > summary.direct-dept-head {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    padding: 10px 14px;
  }
  .direct-dept-card > summary.direct-dept-head::-webkit-details-marker { display: none; }
  .direct-dept-card > summary.direct-dept-head::after {
    content: '▸';
    color: var(--muted);
    font-size: 10px;
    margin-left: auto;
    transition: transform var(--dur-1, 0.18s) var(--ease, ease);
  }
  .direct-dept-card[open] > summary.direct-dept-head::after { transform: rotate(90deg); }
  .direct-dept-name { font-weight: 600; font-size: 14px; }
  .direct-dept-stats {
    display: inline-flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .ddc-stat { white-space: nowrap; }
  .ddc-stat b {
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .direct-dept-body { padding: 0 14px 12px; border-top: 1px solid var(--line); }
  .direct-dept-body .qcd-source-table { margin-top: 10px; }

  /* R11-B11: click-to-sort headers on the report tables. */
  .qcd-source-table th[data-sort] { cursor: pointer; -webkit-user-select: none; user-select: none; }
  .qcd-source-table th[data-sort]:hover { color: var(--ink); }
  .qcd-source-table th.srt-asc::after  { content: ' \25B4'; font-size: 9px; }
  .qcd-source-table th.srt-desc::after { content: ' \25BE'; font-size: 9px; }
  .qcd-source-table .qcd-row-total td {
    font-weight: 700;
    background: var(--accent-soft);
  }
  .qcd-warn-light { color: var(--warn); font-weight: 600; }
  /* S2-4: use the --bad token (lightens to #e06a56 for AA on dark paper)
     instead of a hardcoded dark red (#c0392b ~2.5:1 on the dark card). */
  .qcd-warn-strong { color: var(--bad); font-weight: 700; }
  .qcd-expandable { cursor: pointer; }
  .qcd-expandable:hover td { background: var(--accent-soft); }
  .qcd-expand-icon { font-size: 10px; margin-left: 4px; color: var(--muted); }
  .qcd-detail-row td { padding: 0 !important; }
  .qcd-detail-wrap {
    padding: 8px 16px 8px 28px;
    font-size: 12px;
    color: var(--muted);
    background: var(--paper-2);
    border-top: 1px dashed var(--line);
  }
  /* 4a: per-call-source breakdown nested under an expanded queue row. */
  .qcd-source-subtable { width: 100%; border-collapse: collapse; margin: 2px 0; }
  .qcd-source-subtable th, .qcd-source-subtable td {
    padding: 3px 8px; text-align: left; font-size: 11.5px;
    border-bottom: 1px solid var(--line);
  }
  .qcd-source-subtable th { color: var(--muted); font-weight: 600; }
  .qcd-source-subtable td.num, .qcd-source-subtable th.num {
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .qcd-source-subtable .qcd-source-overall td { font-weight: 600; color: var(--ink); }
  .qcd-detail-viol { margin-top: 6px; }
  /* Violation-date -> Daily-breakdown drill (Insights Queue health). */
  .ins-viol-date {
    display: inline-block; margin: 1px 2px 1px 0; padding: 1px 7px;
    font: 500 11px/1.5 var(--mono); color: var(--ink);
    background: var(--warn-soft); border: 1px solid var(--line);
    border-radius: var(--r-pill, 999px); cursor: pointer;
  }
  .ins-viol-date:hover, .ins-viol-date:focus-visible {
    border-color: var(--accent); color: var(--accent);
  }
  @keyframes ins-daily-hit {
    0%, 60% { background: var(--warn-soft); }
    100%    { background: transparent; }
  }
  .ins-daily-hit td { animation: ins-daily-hit 1.6s var(--ease, ease-out); }
  @media (prefers-reduced-motion: reduce) { .ins-daily-hit td { animation: none; background: var(--warn-soft); } }

  /* 4b: all-departments daily call queue report (Overview; open to managers). */
  .ov-admin-actions { margin: 8px 0 12px; }
  /* In-modal date changer in the results header. */
  .qcd-alldept-daterow {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }
  .qcd-alldept-daterow select,
  .qcd-alldept-daterow input[type="date"] { padding: 4px 6px; font-size: 13px; }
  .qcd-alldept-daterow .qcd-alldept-dash { color: var(--muted); }
  .qcd-alldept-daterow .status { margin: 0 0 0 6px; padding: 2px 6px; }
  /* Verdict layer (design update): KPI band + callout above the all-dept table. */
  .qcd-verdict-band { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px; margin: 4px 0 12px; }
  .qcd-verdict-tile { border: 1px solid var(--line); border-left: 3px solid var(--muted);
    border-radius: var(--r-lg); background: var(--paper-card); padding: 10px 14px; }
  .qcd-verdict--warn { border-left-color: var(--warn); }
  .qcd-verdict--good { border-left-color: var(--good); }
  .qcd-verdict--neu  { border-left-color: var(--line); }
  .qcd-verdict-label { font: 600 10px/1 var(--mono); letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); }
  /* R10-8: tile values read at KPI weight (were 24px -- too small beside the
     hero, owner note). R11-B1: the three secondary tiles CENTER their
     label+value and the row is slightly smaller overall. */
  .qcd-verdict-value { font: 700 28px/1.1 var(--display); font-variant-numeric: tabular-nums;
    color: var(--ink); margin-top: 6px; }
  .qcd-verdict-rest .qcd-verdict-tile { text-align: center; padding: 9px 10px; }
  .qcd-verdict--warn .qcd-verdict-value { color: var(--warn); }
  .qcd-verdict--good .qcd-verdict-value { color: var(--good); }
  .qcd-verdict-callout { margin: 0 0 14px; }
  @media (max-width: 720px) { .qcd-verdict-band { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

  /* QV-3: hero layout -- the company abandon% leads at ~2x weight, the three
     secondary tiles stack beside it. Tones stay the binary 5%-standard pair. */
  .qcd-verdict-band--hero { grid-template-columns: minmax(0, 1.4fr) minmax(0, 2fr); align-items: stretch; }
  .qcd-verdict-rest { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
  .qcd-hero { border: 1px solid var(--line); border-left: 4px solid var(--good);
    border-radius: var(--r-lg); background: var(--paper-card); padding: 12px 16px; }
  .qcd-hero--warn { border-left-color: var(--warn); background: var(--warn-soft); }
  .qcd-hero--warn .qcd-hero-value { color: var(--warn); }
  .qcd-hero--good .qcd-hero-value { color: var(--good); }
  /* R10-8: hero refresh -- bigger value, a thicker labeled target bar (the
     bare 8px bar + unlabeled floating tick "didn't look right", owner note),
     and a minimum visible fill so a healthy sub-1% day still registers. */
  .qcd-hero-value { font: 700 36px/1.05 var(--display); font-variant-numeric: tabular-nums;
    margin-top: 4px; color: var(--ink); }   /* R11-B1: 42 -> 36, row slightly smaller */
  .qcd-hero-bar { position: relative; height: 12px; margin: 14px 0 8px;
    background: var(--paper-inset, var(--line)); border-radius: var(--r-pill); overflow: visible; }
  .qcd-hero-fill { position: absolute; left: 0; top: 0; bottom: 0; min-width: 5px;
    background: currentColor; border-radius: var(--r-pill); }
  .qcd-hero--warn .qcd-hero-fill { background: var(--warn); }
  .qcd-hero--good .qcd-hero-fill { background: var(--good); }
  .qcd-hero-tick { position: absolute; left: 50%; top: -4px; bottom: -4px; width: 2px;
    background: var(--ink); opacity: 0.45; }
  .qcd-hero-tick-lbl { position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    font: 600 9px/1 var(--mono); letter-spacing: 0.08em; color: var(--muted); }
  .qcd-hero-sub { font: 500 12px/1.3 var(--body, inherit); color: var(--muted); }
  @media (max-width: 720px) {
    .qcd-verdict-band--hero { grid-template-columns: 1fr; }
    .qcd-verdict-rest { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  /* QV-1: the 5%-threshold tick on the all-dept split bars. Positioned by
     inline left:(answered% + 5%); the red segment crossing it == over the
