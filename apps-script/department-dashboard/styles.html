    margin-top: 10px;
  }

  /* Universal benchmark tints: the 92% answer-rate target and the 5%
     abandoned-% violation threshold, applied to KPI values / cells by
     script.html::benchValueCls_. */
  .bm-target { color: var(--good); }
  .bm-over   { color: var(--warn); }

  /* Caller Lookup: one timeline card per inbound call. */
  .cl-call-card {
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 12px 14px;
    margin-bottom: 10px;
    background: var(--paper-card);
  }
  .cl-call-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cl-call-when {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
    color: var(--ink);
    font-weight: 600;
  }
  .cl-chip {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .cl-chip-good  { background: var(--good-soft); color: var(--good); }
  .cl-chip-warn  { background: var(--warn-soft); color: var(--warn); }
  .cl-chip-muted { background: var(--paper-2);   color: var(--muted); }
  .cl-call-facts {
    font-size: 12px;
    color: var(--muted);
    margin: 5px 0 2px;
  }
  /* Compact arrow-chain path summary above the detailed timeline. */
  .cl-chain {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .cl-tok {
    font-size: 11.5px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--paper-2);
    color: var(--ink);
    white-space: nowrap;
  }
  .cl-tok-queue  { border-color: var(--accent); background: var(--accent-soft); }
  .cl-tok-answer { border-color: var(--good);   background: var(--good-soft); }
  .cl-tok-missed { color: var(--muted); }
  .cl-tok-ivr    { color: var(--muted); }
  .cl-arrow { color: var(--muted); font-size: 11px; }

  .cl-journey { margin-top: 8px; }
  .cl-ev {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    padding: 2px 0 2px 4px;
    border-left: 2px solid var(--line);
  }
  .cl-ev-queue  { border-left-color: var(--accent); }
  .cl-ev-answer { border-left-color: var(--good); }
  .cl-ev-time {
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
    color: var(--muted);
    min-width: 58px;
  }
  .cl-ev-icon { color: var(--muted); }
  .cl-ev-answer .cl-ev-icon { color: var(--good); }
  .cl-ev-name { color: var(--ink); }
  .cl-ev-bits { color: var(--muted); }
  .cl-journey-summary {
    margin-top: 8px;
    font-size: 12.5px;
  }
  .cl-journey-note { color: var(--muted); font-size: 11.5px; }

  /* Inbound report: per-insurer daily drill-down (click-to-expand row). */
  .inbound-insurer-row { cursor: pointer; }
  .inbound-insurer-row:hover td { background: var(--paper-2); }
  .inbound-drill-chevron {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.12s ease;
  }
  .inbound-insurer-row.drill-open .inbound-drill-chevron { transform: rotate(90deg); }
  .inbound-drill-row > td {
    background: var(--paper-2);
    padding: 10px 14px 14px;
  }
  .inbound-drill-canvas-wrap {
    position: relative;
    height: 180px;
    margin-top: 6px;
  }
  .ins-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ins-card-name { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--ink); }
  .ins-card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px 10px; }
  .ins-metric { min-width: 0; }
  .ins-metric-label {
    font-family: var(--mono); font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--muted);
  }
  .ins-metric-val {
    font-family: var(--mono); font-variant-numeric: tabular-nums;
    font-size: 14px; color: var(--ink); margin-top: 2px;
  }
  .ins-metric-delta { margin-top: 3px; }

  .cr-agent-cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 1200px) {
    .cr-agent-cards { grid-template-columns: 1fr 1fr; }
  }
  .cr-agent-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 14px 16px;
  }
  /* Left-stripe color encodes the agent's aggregate direction
     across the 4 valenced metrics so scanning the grid surfaces
     the movers without reading every cell. */
  .cr-card-improved  { border-left-color: var(--accent); }
  .cr-card-regressed { border-left-color: var(--warn); }
  .cr-card-mixed     { border-left-color: var(--muted); }

  .cr-agent-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 10px;
  }
  /* "vs Team" badge in card header. Three states: above team,
     in line, below team. Same color tokens as the existing
     valence palette for consistency. */
  .cr-vs-team {
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-left: auto;
  }
  .cr-vs-team-pos  { background: var(--accent-soft); color: var(--accent); }
  .cr-vs-team-neg  { background: var(--warn-soft); color: var(--warn); }
  .cr-vs-team-flat { background: var(--paper-2); color: var(--muted); }

  /* Per-cell "X/day" annotation inside the cards' P1/P2 cells
     when periods differ. Mono so it reads as metadata. */
  .cr-cell-perday {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Collapsible "quiet agents" section below the main card grid.
     Agents whose metrics didn't move beyond the noise floor are
     stashed here so the main grid focuses on the notable movers. */
  .cr-quiet-details {
    margin-top: 14px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .cr-quiet-summary {
    cursor: pointer;
    user-select: none;
    list-style: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .cr-quiet-summary::-webkit-details-marker { display: none; }
  .cr-quiet-summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: 4px;
    font-size: 10px;
    transition: transform 0.15s ease;
  }
  .cr-quiet-details[open] > .cr-quiet-summary::before {
    transform: rotate(90deg);
  }
  .cr-quiet-details .cr-agent-card { opacity: 0.85; }
  .cr-agent-name {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .cr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .cr-agent-table th {
    text-align: left;
    padding: 7px 8px;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .cr-agent-table td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--paper-2);
    color: var(--ink);
    font-family: var(--mono);
  }
  .cr-agent-table .num { text-align: right; }
  .cr-agent-table tbody tr:last-child td { border-bottom: 0; }
  /* Delta column (last cell) reads better center-aligned -- the
     delta badge is a wide pill that looks marooned against the
     right edge, especially when the percentage is small. */
  .cr-agent-table thead th:last-child,
  .cr-agent-table tbody td:last-child { text-align: center; }
  .cr-metric {
    font-family: var(--ui);
    font-weight: 500;
    color: var(--muted);
  }

  /* -------- Alerts modal (admin-only) ---------------------------- */
  /* All color values use the design-system tokens (introduced by
     the visual-redesign branch) so the modal participates in the
     light/dark mode toggle. */
  .al-section { margin-bottom: 22px; }
  /* Vertical rhythm: a hairline divider before each subsequent titled
     section so stacked report / admin sections read as distinct blocks.
     :not(:first-of-type) keeps the line off the leading section. */
  .al-section:not(:first-of-type) {
    border-top: 1px solid var(--line);
    padding-top: 20px;
  }
  .al-section-title {
    font-weight: 600;
    color: var(--accent);
    border-bottom: 2px solid var(--line);
    padding-bottom: 4px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .al-hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
  .al-hint a { color: var(--accent); text-decoration: none; }
  .al-hint a:hover { text-decoration: underline; }

  /* Config table + log table + results table share base
     treatment so the alerts modal reads as a single panel. */
  /* QCD per-source breakdown table. Same shape as .al-config-table
     so the dashboard's existing table styling carries over; the
     Total Calls row is bolded via .qcd-row-total. */
  /* Chart-view toggle (Monthly / Daily) above the QCD trend chart.
     Borrows the .segmented / .seg-btn look from the scope toggle so
     it reads as part of the dashboard's existing chrome vocabulary. */
  .qcd-view-toggle {
    display: inline-flex;
    gap: 0;
    margin: -4px 0 12px;
    border-radius: var(--r);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .qcd-view-toggle .seg-btn {
    background: var(--paper-card);
    color: var(--muted);
    border: none;
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .qcd-view-toggle .seg-btn + .seg-btn { border-left: 1px solid var(--line); }
  .qcd-view-toggle .seg-btn:hover { color: var(--ink); }
  .qcd-view-toggle .seg-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  /* Daily table below the chart. Scrolls vertically when the range
     is long so the modal stays a sane height. Header is sticky so
     the columns stay labeled while scrolling. */
  .qcd-daily-table-wrap {
    max-height: 380px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--paper-card);
  }
  .qcd-daily-table {
    /* override .qcd-source-table outer margins so it fills the
       scroll container cleanly */
    margin: 0;
    border: none;
    border-radius: 0;
  }
  .qcd-daily-table thead th {
    position: sticky;
    top: 0;
    background: var(--paper-2);
    z-index: 1;
  }
  .qcd-daily-table .qcd-daily-warn { color: var(--warn); font-weight: 600; }

  .qcd-source-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
    margin: 8px 0 16px;
  }
  .qcd-source-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--paper-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--line);
  }
  .qcd-source-table th.num,
  .qcd-source-table td.num {
    text-align: right;
    font-family: var(--mono);
  }
  .qcd-source-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
  }
  .qcd-source-table tr:last-child td { border-bottom: none; }
  .qcd-source-table .qcd-row-total td {
    font-weight: 700;
    background: var(--accent-soft);
  }
  .qcd-warn-light { color: var(--warn); font-weight: 600; }
  .qcd-warn-strong { color: #c0392b; font-weight: 700; }
  .qcd-expandable { cursor: pointer; }
  .qcd-expandable:hover td { background: var(--accent-soft); }
  .qcd-expand-icon { font-size: 10px; margin-left: 4px; color: var(--muted); }
  .qcd-detail-row td { padding: 0 !important; }
  .qcd-detail-wrap {
    padding: 8px 16px 8px 28px;
    font-size: 12px;
    color: var(--muted);
    background: var(--paper-2);
    border-top: 1px dashed var(--line);
  }

  .al-config-table, .al-log-table, .al-results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  .al-config-table th, .al-log-table th, .al-results-table th {
    background: var(--paper-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
  }
  .al-config-table td, .al-log-table td, .al-results-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
  }
  .al-config-table .num,
  .al-log-table .num,
  .al-results-table .num { text-align: right; }
  .al-config-table tbody tr:last-child td,
  .al-log-table tbody tr:last-child td,
  .al-results-table tbody tr:last-child td { border-bottom: 0; }
  .al-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 16px;
  }
  .al-empty-inline { color: var(--muted); opacity: 0.7; }
  .al-active {
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .al-active-yes { background: var(--accent-soft); color: var(--accent); }
  .al-active-no  { background: var(--paper-2);     color: var(--muted); }

  /* E10 threshold-drift chip. Per-dept summary of the last ~30
     daily-trigger Alert Log entries (fire count + mean answer
     rate). Severity-driven palette: chronic = warn (alert
     fatigue likely), lenient = muted (informational), ok =
     neutral, cold = muted (not enough data). Tooltip carries
     the full explanation. */
  .al-drift-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: var(--r);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .al-drift-ok       { background: var(--good-soft); color: var(--good); }
  .al-drift-chronic  { background: var(--warn-soft); color: var(--warn); }
  .al-drift-lenient  { background: var(--paper-2);   color: var(--muted); }
  .al-drift-cold     { background: transparent;      color: var(--muted); }

  /* Run section: date + Preview + Send sit on one row; results
     summary + table render below when populated. */
  .al-run-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .al-run-row label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .al-run-row input[type="date"] {
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--paper-card);
    color: var(--ink);
  }
  .al-run-row .btn { width: auto; padding: 6px 14px; font-size: 13px; }
  .al-results-summary {
    font-size: 12px;
    color: var(--muted);
    margin: 10px 0 6px;
    font-style: italic;
  }
  .al-recipients-cell {
    max-width: 320px;
    word-break: break-word;
    font-size: 12px;
  }
  /* Subtle row tinting by status so the "will alert" rows pop.
     Soft-tint tokens carry through into dark mode automatically. */
  .al-row-would-send,
  .al-row-sent { background: var(--warn-soft); }
  .al-row-above-threshold { background: var(--good-soft); }
  .al-row-error,
  .al-row-no-recipients { background: var(--warn-soft); }

  .al-trigger-actions { display: flex; gap: 8px; }
  .al-trigger-actions .btn { width: auto; padding: 6px 14px; font-size: 12px; }

  /* -------- Print stylesheet ------------------------------------- */
  /* Only activates when the user clicks Print on the Individual
     Report; the body gets `.ir-printing` set just before
     window.print() and unset right after. Everything outside the
     report panel is hidden so the page contains just the report. */
  @media print {
    body.ir-printing > .container { display: none !important; }
    body.ir-printing .modal-backdrop { display: none !important; }
    body.ir-printing #individual-modal {
      position: static !important;
      background: transparent !important;
    }
    body.ir-printing #individual-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: none !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    body.ir-printing #individual-form,
    body.ir-printing .modal-close,
    body.ir-printing #ir-action-buttons,
    body.ir-printing #ir-datalabels-box,
    body.ir-printing #ir-chart-tabs,
    body.ir-printing #ir-cards-toolbar,
    body.ir-printing #ir-edit-popover,
    body.ir-printing .ir-editing-edit,
    body.ir-printing .ir-copy-tsv,
    body.ir-printing #ir-results-status {
      display: none !important;
    }
    /* Force all three chart panels visible for print -- the tab UI
       only shows one at a time on screen. */
    body.ir-printing #ir-charts-container [data-panel] {
      display: flex !important;
      margin-bottom: 14px !important;
    }
    body.ir-printing .ir-chart-wrap { page-break-inside: avoid; }
    body.ir-printing .ir-summary-card { page-break-inside: avoid; }

    body.pr-printing > .container { display: none !important; }
    body.pr-printing .modal-backdrop { display: none !important; }
    body.pr-printing #performance-modal {
      position: static !important;
      background: transparent !important;
    }
    body.pr-printing #performance-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: none !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    body.pr-printing #performance-form,
    body.pr-printing #performance-modal .modal-close,
    body.pr-printing #performance-results .ir-action-buttons,
    body.pr-printing #pr-chart-tabs,
    body.pr-printing #pr-trend-subtabs,
    body.pr-printing #pr-datalabels-box,
    body.pr-printing #pr-results-status {
      display: none !important;
    }
    body.pr-printing #pr-charts-container [data-panel] {
      display: flex !important;
      margin-bottom: 14px !important;
    }
    body.pr-printing .ir-chart-wrap,
    body.pr-printing .pr-kpi-tile,
    body.pr-printing .pr-agent-table { page-break-inside: avoid; }

    body.cr-printing > .container { display: none !important; }
    body.cr-printing .modal-backdrop { display: none !important; }
    body.cr-printing #compare-modal {
      position: static !important;
      background: transparent !important;
    }
    body.cr-printing #compare-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: none !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    body.cr-printing #compare-form,
    body.cr-printing #compare-modal .modal-close,
    body.cr-printing #compare-results .ir-action-buttons,
    body.cr-printing .ir-editing-edit,
    body.cr-printing #cr-edit-popover,
    body.cr-printing #cr-chart-tabs,
    body.cr-printing #cr-cards-toolbar,
    body.cr-printing #cr-datalabels-box,
    body.cr-printing .ir-copy-tsv,
    body.cr-printing #cr-results-status {
      display: none !important;
    }
    /* Open the quiet-agents section for print so the full
       comparison is on the page. */
    body.cr-printing .cr-quiet-details > .cr-quiet-summary {
      display: none !important;
    }
    body.cr-printing .cr-quiet-details { border-top: 0 !important; padding-top: 0 !important; }
    body.cr-printing .cr-quiet-details > #cr-quiet-cards { display: grid !important; }
    body.cr-printing .cr-chart-wrap,
    body.cr-printing .pr-kpi-tile,
    body.cr-printing .cr-agent-card { page-break-inside: avoid; }

    body.ins-printing > .container { display: none !important; }
    body.ins-printing .modal-backdrop { display: none !important; }
    body.ins-printing #insights-modal {
      position: static !important;
      background: transparent !important;
    }
    body.ins-printing #insights-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: none !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    body.ins-printing #insights-form,
    body.ins-printing #insights-modal .modal-close,
    body.ins-printing #insights-results .ir-action-buttons,
    body.ins-printing #ins-trend-subtabs,
    body.ins-printing #ins-cards-toolbar,
    body.ins-printing #ins-results-status {
      display: none !important;
    }
    /* Open the quiet-agents section for print so the full
       comparison is on the page (CR pattern). */
    body.ins-printing #ins-quiet-details > .cr-quiet-summary {
      display: none !important;
    }
    body.ins-printing #ins-quiet-details { border-top: 0 !important; padding-top: 0 !important; }
    body.ins-printing #ins-quiet-details > #ins-quiet-cards { display: grid !important; }
    body.ins-printing .ir-chart-wrap,
    body.ins-printing .pr-kpi-tile,
    body.ins-printing .ins-card { page-break-inside: avoid; }
  }

  /* -------- Company Overview modal ------------------------------ */
  /* Cross-dept landing snapshot.  Layout: small date kicker at top,
     grid of dept tiles in the middle, multi-line answer-rate trend
     chart below. */
  .ov-summary-line {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    /* Allow the mono kicker line to wrap mid-separator on narrow
       viewports rather than producing a horizontal scroll bar. */
    line-height: 1.7;
  }
  .ov-summary-line strong { color: var(--ink); font-weight: 500; }
  .ov-summary-label { color: var(--muted); }
  /* Inline separator dot between summary segments. Wider tracking so
     the bullet visually breathes against the uppercase kicker spacing. */
  .ov-summary-sep { color: var(--line-2, var(--line)); margin: 0 4px; }
  /* Admin-only status banner used by both the Pipeline Health (E1)
     and Orphan Fix (E12-reframed) surfaces. Default is the neutral
     accent tone; .is-warn / .is-bad variants are picked per surface. */
  .ov-status-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--r);
    font-size: 13px;
    color: var(--ink);
  }
  .ov-status-banner.is-warn {
    background: var(--warn-soft);
    border-left-color: var(--warn);
  }
  .ov-status-banner.is-bad {
    background: var(--bad-soft);
    border-left-color: var(--bad);
  }
  .ov-status-banner-kicker {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-right: 6px;
    flex-shrink: 0;
  }
  .ov-status-banner.is-warn .ov-status-banner-kicker { color: var(--warn); }
  .ov-status-banner.is-bad  .ov-status-banner-kicker { color: var(--bad);  }
  .ov-status-banner-body { flex: 1 1 auto; line-height: 1.5; }
  .ov-status-banner-body strong { font-weight: 500; color: var(--ink); }
  .ov-status-banner-action {
    flex-shrink: 0;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid currentColor;
    border-radius: var(--r);
    color: inherit;
    font-family: var(--ui);
    font-size: 12px;
    cursor: pointer;
  }
  .ov-status-banner-action:hover { background: var(--paper-card); }
  .ov-dept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
    align-items: start;
  }
  /* Each parent dept + its sub-queues stack vertically in a
     single grid cell. Children inherit the parent's tile color
     (slot in IR_CHART_COLORS) via inline-set color but get an
     accent strip on the left + accent-tinted background to
     signal the relationship. */
  .ov-dept-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .ov-dept-tile-child {
    border-left: 4px solid var(--accent);
    margin-left: 24px;
    padding: 9px 13px;
    background: var(--accent-soft);
    /* Distinct rounded-corner profile vs parent's square tile,
       reinforcing "this is a child element of the row above". */
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    position: relative;
  }
  /* Tree-line connector: a short L-shape suggesting the child
     branches off its parent. Sits in the indent gap so it
     doesn't push the tile content around. */
  .ov-dept-tile-child::before {
    content: '';
    position: absolute;
    left: -16px;
    top: -4px;
    width: 12px;
    height: 22px;
    border-left: 1px solid var(--accent);
    border-bottom: 1px solid var(--accent);
    border-bottom-left-radius: 4px;
    opacity: 0.55;
  }
  .ov-dept-tile-child .ov-dept-name {
    font-size: 14px;
  }
  .ov-dept-tile-child .ov-dept-name::before {
    content: '↳ ';
    color: var(--accent);
    font-weight: 600;
    margin-right: 1px;
  }
  .ov-dept-tile-child .ov-dept-tile-pct {
    font-size: 18px;
  }
  .ov-dept-parent-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
  }
  .ov-dept-tile {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .ov-dept-tile-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .ov-dept-name {
