<style>
  /* Reset + baseline */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.55 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    background: #f9fafb;
    color: #1f2937;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 600; }
  a { color: #1d4ed8; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, select, input {
    font: inherit;
    color: inherit;
  }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }

  /* Header */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 20px;
  }
  .dash-header h1 { font-size: 20px; }
  .dash-header .sub { color: #6b7280; font-size: 13px; margin-top: 4px; }
  .header-meta {
    font-size: 13px;
    color: #4b5563;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-meta .email { font-family: ui-monospace, Menlo, Consolas, monospace; }

  /* Help button (opens FAQ modal) */
  .help-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #4b5563;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .help-btn:hover {
    background: #1f2937;
    color: #fff;
    border-color: #1f2937;
  }
  .help-btn:focus-visible {
    outline: 2px solid #93c5fd;
    outline-offset: 2px;
  }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .tag-admin   { background: #dcfce7; color: #166534; }
  .tag-manager { background: #dbeafe; color: #1e40af; }
  .tag-none    { background: #fee2e2; color: #991b1b; }

  /* Mock banner */
  .mock-banner {
    background: #fef3c7;
    border: 1px solid #fde68a;
    color: #92400e;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .control input[type="date"],
  .control select {
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    min-width: 140px;
  }
  .control input[type="date"]:focus,
  .control select:focus {
    outline: 2px solid #93c5fd;
    border-color: #3b82f6;
  }
  .btn {
    padding: 7px 14px;
    background: #1f2937;
    color: #fff;
    border: 0;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { background: #111827; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-secondary {
    background: #fff;
    color: #1f2937;
    border: 1px solid #d1d5db;
  }
  .btn-secondary:hover { background: #f3f4f6; color: #111827; }
  .control-reports { margin-left: auto; }

  /* Status */
  .status {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .status-loading { background: #eff6ff; color: #1e40af; }
  .status-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .status-empty   { background: #f3f4f6; color: #4b5563; }

  /* Table */
  .agents {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
  }
  .agents th, .agents td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid #f1f5f9;
  }
  .agents th:first-child, .agents td:first-child { text-align: left; }
  .agents thead th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .agents thead th:hover { background: #f3f4f6; }
  .agents thead th .arrow {
    display: inline-block;
    width: 10px;
    margin-left: 4px;
    color: #9ca3af;
    font-size: 10px;
  }
  .agents tbody tr:hover { background: #f9fafb; }
  .agents tbody td.agent-name { font-weight: 500; color: #111827; }
  .agents .num { font-variant-numeric: tabular-nums; }
  .agents .missed-high { color: #b91c1c; font-weight: 600; }

  .agents tfoot td {
    background: #f9fafb;
    font-weight: 600;
    border-top: 2px solid #e5e7eb;
    border-bottom: 0;
  }

  /* Footer info line (rows scanned, cache state, compute time) */
  .info-line {
    margin-top: 12px;
    font-size: 12px;
    color: #6b7280;
    text-align: right;
  }
  .info-line .pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    background: #f3f4f6;
    margin-left: 6px;
  }
  .info-line .pill-cache  { background: #dcfce7; color: #166534; }
  .info-line .pill-fresh  { background: #dbeafe; color: #1e40af; }

  /* Segmented control (scope toggle) */
  .segmented {
    display: inline-flex;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    overflow: hidden;
    background: #fff;
  }
  .seg-btn {
    padding: 7px 12px;
    background: #fff;
    color: #374151;
    border: 0;
    border-right: 1px solid #d1d5db;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    min-width: 70px;
  }
  .seg-btn:last-child { border-right: 0; }
  .seg-btn:hover { background: #f9fafb; }
  .seg-btn.active {
    background: #1f2937;
    color: #fff;
  }
  .seg-btn.active:hover { background: #111827; }

  /* Diagnostics panel */
  .diagnostics {
    margin-top: 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
  }
  .diagnostics summary {
    cursor: pointer;
    font-weight: 600;
    color: #374151;
    user-select: none;
    padding: 2px 0;
  }
  .diagnostics summary:hover { color: #111827; }
  .diag-count {
    color: #6b7280;
    font-weight: 400;
    margin-left: 4px;
  }
  .diag-section {
    margin-top: 12px;
  }
  .diag-section h3 {
    font-size: 12px;
    color: #6b7280;
    margin: 0 0 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .diag-section p { margin: 0; color: #4b5563; }
  .diag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .diag-chip {
    display: inline-block;
    padding: 2px 8px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    font-size: 12px;
    color: #1f2937;
  }
  .agents .via-queue td:first-child::after {
    content: " (queue-only)";
    font-size: 11px;
    color: #d97706;
    font-weight: 400;
    margin-left: 4px;
  }

  /* Access denied */
  .denied-card {
    max-width: 560px;
    margin: 60px auto;
    padding: 28px 32px;
    border-left: 4px solid #ef4444;
  }
  .denied-card h1 { font-size: 18px; margin-bottom: 10px; }
  .denied-card p { color: #4b5563; margin: 8px 0; }
  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    margin: 16px 0;
    font-size: 13px;
  }
  .kv dt { color: #6b7280; font-weight: 500; }
  .kv dd { margin: 0; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .small { font-size: 12px; color: #6b7280; }

  /* Modal (used by Help & FAQ; will be reused by upcoming report modals) */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
  }
  .modal-panel {
    position: relative;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px 36px 24px;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 0;
    color: #6b7280;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: #f3f4f6;
    color: #111827;
  }
  .modal-panel h2 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 16px;
    color: #111827;
    padding-right: 40px;
  }
  .modal-content h3 {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    margin: 20px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-content h3:first-of-type { margin-top: 0; }
  .modal-content p {
    margin: 8px 0;
    color: #374151;
    line-height: 1.55;
  }
  .modal-content ul {
    margin: 8px 0 12px 0;
    padding-left: 20px;
  }
  .modal-content ul li {
    margin-bottom: 8px;
    color: #374151;
    line-height: 1.55;
  }
  .modal-content code {
    background: #f3f4f6;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .modal-content strong { color: #111827; }
  .modal-content a { color: #1d4ed8; text-decoration: none; }
  .modal-content a:hover { text-decoration: underline; }
  .modal-content em { color: #6b7280; }

  /* Wide modal variant (for reports with charts + tables) */
  .modal.modal-wide { padding: 16px; }
  .modal-panel.modal-panel-wide {
    max-width: 1200px;
    width: 100%;
    max-height: 92vh;
    padding: 24px 28px 20px;
  }

  /* Report summary line at top of report modals */
  .report-summary {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0 0 16px;
    padding: 12px 16px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
  }
  .report-summary .label { color: #6b7280; }
  .report-summary .val { color: #111827; font-weight: 600; }
  .report-summary .sep { color: #d1d5db; }

  /* Chart row: grid that holds the radar chart on the left and (when
     visible) the bucket-detail drill-in on the right. With .no-detail
     the row collapses to a single centered column. */
  .chart-row {
    display: grid;
    gap: 16px;
    grid-template-columns: 480px minmax(0, 1fr);
    margin-bottom: 16px;
    align-items: start;
  }
  .chart-row.no-detail {
    grid-template-columns: 480px;
    justify-content: center;
  }
  .chart-section {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px 16px 10px;
    margin: 0;
    min-width: 0;
  }
  .chart-section canvas {
    display: block;
    max-width: 100%;
  }
  .chart-loading {
    margin: 0;
    padding: 80px 0;
    text-align: center;
    color: #6b7280;
    font-size: 13px;
  }

  /* Drill-in panel that appears next to the chart when a bucket is
     clicked. Lives inside the .chart-row grid so it sits to the right
     of the chart; collapses entirely when display:none. */
  .bucket-detail {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 16px 14px;
    margin: 0;
    min-width: 0;
  }
  .bucket-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    border-bottom: 1px solid #f1f5f9;
    padding-bottom: 6px;
  }
  .bucket-detail-header strong {
    font-size: 14px;
    color: #111827;
  }
  .link-btn {
    background: none;
    border: 0;
    color: #6b7280;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
  }
  .link-btn:hover { color: #111827; text-decoration: underline; }
  .bucket-detail-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    max-height: 280px;
    overflow-y: auto;
  }
  .bucket-detail-list li {
    padding: 4px 0;
    border-bottom: 1px solid #f3f4f6;
    display: grid;
    grid-template-columns: 80px 1fr 110px;
    gap: 12px;
    align-items: baseline;
  }
  .bucket-detail-list li:last-child { border-bottom: 0; }
  .bucket-detail-list li.abandoned {
    color: #b91c1c;
    font-weight: 500;
  }
  .bucket-detail-list .ring-date  { color: #6b7280; }
  .bucket-detail-list .ring-agent { color: #111827; }
  .bucket-detail-list .ring-time  { text-align: right; }
  /* Widen the time column when parent-id chips are present so the
     #1776... ID doesn't squeeze the timestamp out. */
  .bucket-detail-list li {
    grid-template-columns: 80px 1fr auto;
  }

  /* Parent-call-ID chip + copy button. Renders inline next to the
     siren on abandoned timestamps. Compact in normal flow, with the
     ID in monospace so it's recognizable at a glance and the copy
     button click target is large enough on mobile. */
  .parent-id {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
    padding: 1px 4px 1px 6px;
    border: 1px solid rgba(127, 29, 29, 0.18);
    border-radius: 999px;
    background: rgba(254, 226, 226, 0.55);
    font-size: 11px;
    line-height: 1.4;
    color: #7f1d1d;
    font-weight: 500;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .parent-id .pid-num {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 10.5px;
  }
  .parent-id .pid-copy {
    border: 0;
    background: transparent;
    color: inherit;
    padding: 0 2px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    border-radius: 3px;
  }
  .parent-id .pid-copy:hover { background: rgba(127, 29, 29, 0.12); }
  .parent-id .pid-copy.copied { color: #065f46; }

  /* Cross-queue overflow tag on queue-only entries:
     "[also rang Backup CSR]". Muted so it reads as metadata. */
  .also-in {
    margin-left: 6px;
    font-size: 11px;
    color: #92400e;
    font-style: italic;
    font-weight: 400;
    white-space: nowrap;
  }
  .bucket-detail-empty {
    color: #6b7280;
    font-size: 13px;
    margin: 0;
  }

  /* Queue-only abandoned section (no agent rang) */
  .queue-only-section {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 12px 16px 14px;
    margin-bottom: 16px;
  }
  .queue-only-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(220, 38, 38, 0.15);
  }
  .queue-only-header strong { color: #991b1b; font-size: 14px; }
  .queue-only-header .muted { color: #b45309; font-size: 12px; }
  .queue-only-card {
    margin-top: 8px;
  }
  .queue-only-card:first-child { margin-top: 0; }
  .queue-only-card .qname {
    color: #991b1b;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .queue-only-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .queue-only-list li {
    color: #b91c1c;
    padding: 2px 0;
    border-bottom: 1px solid rgba(220, 38, 38, 0.1);
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
  }
  .queue-only-list li:last-child { border-bottom: 0; }
  .queue-only-list .ring-date { color: #b45309; }
  .queue-only-list .ring-time { text-align: right; }

  /* Per-agent card grid for the Missed Calls report */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .agent-card .agent-name {
    font-weight: 600;
    color: #111827;
    margin-bottom: 4px;
  }
  .agent-card .agent-total {
    color: #6b7280;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .agent-card .missed-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 220px;
    overflow-y: auto;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .agent-card .missed-list li {
    padding: 2px 0;
    color: #374151;
    border-bottom: 1px solid #f3f4f6;
  }
  .agent-card .missed-list li:last-child { border-bottom: 0; }
  .agent-card .missed-list li.abandoned {
    color: #b91c1c;
    font-weight: 500;
  }
  .agent-card .missed-list .date {
    color: #6b7280;
    margin-right: 6px;
  }
  .agent-card.no-data {
    background: #f9fafb;
    color: #6b7280;
    text-align: center;
    padding: 20px;
  }

  /* -------- Individual Report modal -------------------------------- */
  /* Form: date picker + agent multi-select. Mirrors the structure of
     the legacy IndividualReportModal but uses dashboard tokens. */
  .ir-form { padding: 6px 4px; }
  .ir-section-title {
    font-weight: 600;
    color: #1d4ed8;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 4px;
    margin: 14px 0 10px;
    font-size: 14px;
  }
  .ir-section-title:first-child { margin-top: 0; }
  .ir-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 4px;
  }
  .ir-col label {
    display: block;
    font-weight: 600;
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .ir-col select,
  .ir-col input[type="date"] {
    width: 100%;
    padding: 7px 8px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 13px;
    background: #fff;
  }
  .ir-hint { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
  .ir-loader { padding: 0; }
  .ir-skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
    padding: 10px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
  }
  .ir-skeleton-row {
    height: 24px;
    border-radius: 4px;
    background: linear-gradient(90deg, #f3f4f6 0%, #e5e7eb 50%, #f3f4f6 100%);
    background-size: 200% 100%;
    animation: irShimmer 1.2s linear infinite;
  }
  .ir-skeleton-label {
    text-align: center;
    margin-top: 8px;
    font-size: 11px;
    color: #9ca3af;
    font-style: italic;
  }
  @keyframes irShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* No-data empty state shown when every selected agent had zero
     activity in the chosen range. */
  .ir-empty-card {
    background: #fff;
    border: 1px dashed #d1d5db;
    border-radius: 8px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 14px;
  }
  .ir-empty-icon  { font-size: 28px; opacity: 0.45; margin-bottom: 6px; }
  .ir-empty-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 4px; }
  .ir-empty-sub   { font-size: 12px; color: #6b7280; }
  .ir-agent-list {
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    background: #fff;
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    background: #f9fafb;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
  }
  .ir-agent-item input { margin-right: 6px; transform: scale(1.05); }
  .ir-agent-empty { padding: 12px; font-size: 13px; color: #6b7280; text-align: center; }

  /* Active / inactive groupings inside the agent picker. Active
     items render normally; inactive (no data in range) get muted
     styling so they're still pickable but visually de-prioritized. */
  .ir-agent-group-label {
    grid-column: 1 / -1;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #4b5563;
    margin: 8px 2px 4px;
  }
  .ir-agent-group-label-muted { color: #9ca3af; margin-top: 12px; }
  .ir-agent-group-count { color: #9ca3af; font-weight: 500; }
  .ir-agent-group {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-group-muted .ir-agent-item {
    background: #fafafa;
    color: #9ca3af;
    font-style: italic;
  }
  .ir-agent-group-muted .ir-agent-item input { accent-color: #9ca3af; }

  /* Collapsible inactive group. Hides the default disclosure marker
     and renders our own caret next to the label that rotates when
     the details element is open. */
  .ir-agent-details { grid-column: 1 / -1; }
  .ir-agent-details > summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .ir-agent-details > summary::-webkit-details-marker { display: none; }
  .ir-agent-details > summary::before {
    content: "\25B8";   /* right-pointing triangle */
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: #9ca3af;
    margin-right: 2px;
    transition: transform 0.15s ease;
  }
  .ir-agent-details[open] > summary::before {
    transform: rotate(90deg);
  }
  .ir-agent-details > .ir-agent-group { margin-top: 6px; }

  /* Search row shared by main form picker and edit popover. */
  .ir-search-row { margin-bottom: 8px; }
  .ir-search-row input[type="search"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
    box-sizing: border-box;
  }
  .ir-search-row input[type="search"]:focus {
    outline: none;
    border-color: #1d4ed8;
    box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.12);
  }
  .ir-agent-actions {
    text-align: right;
    margin: 8px 2px 14px;
    font-size: 12px;
  }
  .ir-agent-actions a { color: #1d4ed8; text-decoration: none; }
  .ir-agent-actions a:hover { text-decoration: underline; }
  .ir-agent-actions .sep { color: #d1d5db; margin: 0 6px; }

  /* Results area */
  .ir-results { padding-top: 4px; }
  .ir-results-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 2px solid #1d4ed8;
    padding-bottom: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .ir-results-header-left { flex: 1; min-width: 0; }
  .ir-results-title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px; }
  .ir-results-title { font-size: 18px; font-weight: 700; color: #111827; }
  .ir-results-date  { font-size: 13px; color: #6b7280; margin-left: 4px; }
  .ir-action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .ir-action-buttons .btn { width: auto; padding: 6px 12px; font-size: 12px; }

  /* Export dropdown: single button collapses Copy / Email / Print
     menu items. Caret rotates slightly when the menu is open. */
  .ir-export-wrap { position: relative; display: inline-block; }
  .ir-export-caret {
    display: inline-block;
    margin-left: 4px;
    font-size: 9px;
    transition: transform 0.15s;
  }
  #ir-export-btn.open .ir-export-caret { transform: rotate(180deg); }
  .ir-export-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
    min-width: 160px;
    padding: 4px;
    z-index: 100;
  }
  .ir-export-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 8px 12px;
    font-size: 13px;
    color: #1f2937;
    cursor: pointer;
    border-radius: 4px;
  }
  .ir-export-menu button:hover { background: #f3f4f6; }

  /* "Showing: Sarah, Maria · change" sticky in the results header.
     Click the change link to open the inline edit popover. */
  .ir-editing-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 4px;
    font-size: 12px;
    color: #6b7280;
    flex-wrap: wrap;
  }
  .ir-editing-label { font-weight: 600; color: #6b7280; }
  .ir-editing-agents {
    color: #111827;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60vw;
  }
  .ir-editing-edit {
    background: transparent;
    border: 0;
    color: #1d4ed8;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0 2px;
    text-decoration: underline;
  }
  .ir-editing-edit:hover { color: #1e3a8a; }

  /* Edit-selection popover: floats below the results header,
     contains a compact agent picker that lets the user re-run
     the report with different agents without going back to the
     form. */
  .ir-edit-popover {
    position: relative;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    padding: 12px 14px;
    margin: 0 0 14px;
  }
  .ir-edit-popover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .ir-edit-popover-close {
    background: transparent;
    border: 0;
    font-size: 18px;
    color: #6b7280;
    cursor: pointer;
    line-height: 1;
  }
  .ir-edit-popover-close:hover { color: #1f2937; }
  .ir-agent-list-compact { max-height: 220px; }
  .ir-edit-popover-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
  }
  .ir-edit-popover-actions a { color: #1d4ed8; text-decoration: none; }
  .ir-edit-popover-actions a:hover { text-decoration: underline; }
  .ir-edit-popover-actions .sep { color: #d1d5db; }
  .ir-edit-popover-actions .btn {
    margin-left: auto;
    width: auto;
    padding: 6px 14px;
    font-size: 12px;
  }

  /* Per-agent summary card. Comp table inside lays out
     Metric | Agent | Team Avg | Diff. */
  .ir-summary-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .ir-summary-title {
    font-size: 14px;
    font-weight: 700;
    color: #111827;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 8px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ir-summary-title .ir-vs { font-weight: 400; color: #6b7280; font-size: 12px; }
  .ir-copy-tsv {
    margin-left: auto;
    font-size: 11px;
    color: #1d4ed8;
    background: transparent;
    border: 1px solid #c7d2fe;
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .ir-copy-tsv:hover { background: #eef2ff; }

  /* KPI tile grid: a single row of metric tiles per agent. Big
     number + sparkline up top, team-avg + delta badge below. */
  .ir-kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .ir-kpi-tile {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  .ir-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ir-kpi-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #6b7280;
  }
  .ir-kpi-spark { height: 22px; line-height: 0; }
  .ir-spark-svg { display: block; }
  .ir-kpi-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .ir-kpi-value {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Subtle "X.X% of dept" tag inline with the big value. Lighter
     weight + smaller size so the absolute number stays primary. */
  .ir-kpi-share {
    font-size: 11px;
    color: #6b7280;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Insights callout: rendered above the KPI grid per agent. Lists
     up to 3 rules-based observations vs team avg. */
  .ir-insights {
    background: #EFF6FF;
    border-left: 3px solid #2563EB;
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 10px;
  }
  .ir-insights-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #1E40AF;
    margin-bottom: 4px;
  }
  .ir-insights-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    font-size: 12.5px;
    color: #1F2937;
    line-height: 1.5;
  }
  .ir-insight-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 3px 0;
  }
  .ir-insight-text { flex: 1; }
  /* Colored circular markers double-encode direction: blue / up
     arrow = positive, orange / down arrow = negative, grey / bullet
     = neutral. Color + shape distinction so CVD users get the same
     signal as everyone else. */
  .ir-insight-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ir-insight-mark-positive { background: #DBEAFE; color: #1E40AF; }
  .ir-insight-mark-negative { background: #FFEDD5; color: #9A3412; }
  .ir-insight-mark-neutral  { background: #E5E7EB; color: #4B5563; }
  .ir-kpi-row-bot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ir-kpi-team {
    font-size: 11px;
    color: #6b7280;
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 900px) {
    .ir-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .ir-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    display: inline-block;
    min-width: 60px;
    text-align: center;
  }
  /* Diverging blue (good) / orange (bad) pair instead of green/red:
     readable for deuteranopia + protanopia users, who can't reliably
     distinguish red and green badges. */
  .ir-badge-pos { background: #DBEAFE; color: #1E40AF; }
  .ir-badge-neg { background: #FFEDD5; color: #9A3412; }
  .ir-badge-neu { background: #E5E7EB; color: #374151; }

  /* Charts: stacked grid. Volume goes full-width, efficiency + duration
     side-by-side below. */
  .ir-toggle-box { text-align: right; margin: 4px 4px 10px; }
  .ir-toggle-label {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    font-size: 12px;
    color: #4b5563;
    background: #fff;
    padding: 5px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-weight: 600;
  }
  .ir-toggle-label:hover { background: #f9fafb; }
  .ir-toggle-label input { margin-right: 6px; }

  /* Tabbed chart container: only one of Volume/Efficiency/Duration
     is visible at a time so each gets the full container width. */
  .ir-chart-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    border-bottom: 2px solid #e5e7eb;
  }
  .ir-tab {
    background: transparent;
    border: 0;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .ir-tab:hover { color: #1f2937; }
  .ir-tab.active {
    color: #1d4ed8;
    border-bottom-color: #1d4ed8;
  }

  /* Shared chip legend rendered above the chart panels in
     comparison mode. Each chip toggles its agent's series across
     all three charts; hover dims the others. */
  .ir-shared-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 4px;
    margin-bottom: 6px;
  }
  .ir-legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 6px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 999px;
    font-size: 12px;
    color: #1f2937;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .ir-legend-chip:hover { background: #f3f4f6; }
  .ir-legend-chip.inactive {
    opacity: 0.42;
    text-decoration: line-through;
  }
  .ir-legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--chip-color, #4E79A7);
    flex-shrink: 0;
  }
  .ir-legend-name { font-weight: 600; }

  .ir-chart-area { display: block; }
  .ir-chart-wrap {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #fff;
    padding: 12px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  .ir-chart-header {
    text-align: center;
    font-weight: 600;
    font-size: 13px;
    color: #4b5563;
    margin-bottom: 6px;
  }
  .ir-chart-canvas-wrap { flex: 1; position: relative; }

  /* Reset .btn defaults that look out of place inside the modal. */
  #individual-modal .btn { width: auto; }

  /* -------- Performance Report ----------------------------------- */
  /* Inline prior-period hint on the form -- shows the user what
     "vs prior" will compare against before they click Generate. */
  .pr-prior-hint {
    font-size: 11px;
    color: #6b7280;
    font-style: italic;
    margin: -4px 2px 12px;
  }
  /* Side-by-side current vs prior date display in the results
     header. Replaces the inline "(date)" + a quiet "Comparing
     against..." line with a single structured pair. */
  .pr-date-pair {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 4px;
  }
  .pr-date-block {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 6px 10px;
    line-height: 1.25;
    min-width: 0;
  }
  .pr-date-current { border-left: 3px solid #1d4ed8; }
  .pr-date-prior   { border-left: 3px solid #9CA3AF; }
  .pr-date-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #6b7280;
  }
  .pr-date-value { font-size: 13px; color: #111827; font-weight: 500; }
  .pr-date-divider {
    align-self: center;
    color: #9ca3af;
    font-size: 16px;
    font-weight: 700;
  }

  /* Subset hint banner: appears when the user picked fewer than
     the full roster. Subtle blue bar to disambiguate "team totals
     reflect selection". */
  .pr-subset-hint {
    background: #EFF6FF;
    color: #1E40AF;
    border-left: 3px solid #2563EB;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    margin-bottom: 12px;
  }

  /* KPI tile row at the top of the report: 6 tiles, big number +
     delta vs prior period. Distinct from the Individual Report's
     KPI tiles -- no sparkline, no team-avg context. */
  .pr-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .pr-kpi-tile {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  /* Label + inline sparkline on the top row. Mirrors the IR
     summary-card tile layout for visual consistency. */
  .pr-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .pr-kpi-spark { height: 22px; line-height: 0; }
  .pr-kpi-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #6b7280;
  }
  .pr-kpi-value {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pr-kpi-delta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .pr-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 11px;
  }
  .pr-delta-pos { background: #DBEAFE; color: #1E40AF; }
  .pr-delta-neg { background: #FFEDD5; color: #9A3412; }
  .pr-delta-neu { background: #E5E7EB; color: #4B5563; }
  .pr-delta-cap { color: #9ca3af; font-weight: 500; font-style: italic; }
  @media (max-width: 1100px) {
    .pr-kpi-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .pr-kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* Per-agent table sitting between KPI tiles and the chart trio. */
  .pr-agent-table-wrap { overflow-x: auto; margin-bottom: 16px; }
  .pr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
  }
  .pr-agent-table th, .pr-agent-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #f3f4f6;
    text-align: left;
  }
  .pr-agent-table th {
    background: #f9fafb;
    color: #6b7280;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .pr-agent-table .num { text-align: right; }
  .pr-agent-table tbody tr:last-child td { border-bottom: 0; }
  .pr-agent-table tbody tr:hover { background: #f9fafb; }

  /* Sortable headers: cursor + hover affordance + active-sort
     highlight when this column is the current sort key. */
  .pr-th-sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .pr-th-sortable:hover { background: #f3f4f6 !important; color: #1f2937 !important; }

  /* Sub-tabs inside the 12-Month Trend chart panel: switches the
     metric shown on the line chart (Answered / % Answered / ATT). */
  .pr-trend-subtabs {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .pr-trend-subtab {
    background: transparent;
    border: 1px solid #e5e7eb;
    color: #4b5563;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pr-trend-subtab:hover { background: #f3f4f6; }
  .pr-trend-subtab.active {
    background: #1d4ed8;
    color: #fff;
    border-color: #1d4ed8;
  }

  /* -------- Print stylesheet ------------------------------------- */
  /* Only activates when the user clicks Print on the Individual
     Report; the body gets `.ir-printing` set just before
     window.print() and unset right after. Everything outside the
     report panel is hidden so the page contains just the report. */
  @media print {
    body.ir-printing > .container { display: none !important; }
    body.ir-printing .modal-backdrop { display: none !important; }
    body.ir-printing #individual-modal {
      position: static !important;
      background: transparent !important;
    }
    body.ir-printing #individual-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
