<style>
  /* ==============================================================
     Design tokens — slate palette, warm-paper-inspired.
     Mirrors the Call Analyzer design bundle so the two tools read
     as siblings. Hex fallbacks declared first; modern browsers
     upgrade to OKLCH via @supports below. If html2canvas exports
     come back washed out, delete the @supports blocks and the hex
     fallbacks continue to work unchanged.

     Surfaces: --paper, --paper-2, --paper-card
     Text:     --ink (primary), --muted (secondary)
     Lines:    --line (hairline borders, dividers)
     Accent:   --accent, --accent-soft  (slate blue)
     Good:     --good,   --good-soft    (sage — admin / success)
     Warn:     --warn,   --warn-soft    (warm orange — negative valence)

     Fonts:    --display (Inter Tight), --ui (Inter), --mono (IBM Plex Mono)
     ============================================================== */
  :root {
    /* Warm-paper neutrals: visibly warm/cream rather than the
       earlier very-subtle blue-gray which read as "same light
       gray as before". Tunable -- the design system holds these
       in just the three tokens below. */
    --paper:       #f7f2e6;
    --paper-2:     #ede6d3;
    --paper-card:  #ffffff;
    --ink:         #101418;
    --muted:       #606872;
    --line:        #d6d1c2;

    --accent:      #4e7bc4;
    --accent-soft: #e3edf8;
    --good:        #3d9476;
    --good-soft:   #e0efe6;
    --warn:        #c66b4b;
    --warn-soft:   #f6e2d4;
    /* --bad is a step deeper than --warn for hard error / critical states
       (irrecoverable failures, validation errors). --warn stays the default
       for negative-valence-but-not-fatal cases (low answer rate, abandoned %
       crossing threshold). */
    --bad:         #b23a2c;
    --bad-soft:    #f1d7d2;

    --display: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --ui:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono:    'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

    --r: 2px;
  }
  @supports (color: oklch(50% 0.1 240)) {
    :root {
      --accent:      oklch(55% 0.12 240);
      --accent-soft: oklch(93% 0.04 240);
      --good:        oklch(58% 0.10 160);
      --good-soft:   oklch(93% 0.04 160);
      --warn:        oklch(60% 0.16 30);
      --warn-soft:   oklch(93% 0.04 30);
      --bad:         oklch(50% 0.16 25);
      --bad-soft:    oklch(91% 0.04 25);
    }
  }
  /* Light-mode theme variants -- swapped via body[data-theme="..."]
     from the Settings modal. The :root tokens above are the warm
     palette; first-time visitors are bootstrapped to cool by
     initThemePreference_ in script.html (so the absence of a
     data-theme attribute on body means a returning visitor who
     explicitly saved 'warm'). Each theme override only redefines
     the neutrals; accent / good / warn stay constant so chart
     palette semantics don't drift across themes. body[data-mode="dark"]
     below takes precedence over any light theme. */
  body[data-theme="cool"] {
    --paper:       #f0f6fa;
    --paper-2:     #dde9f3;
    --line:        #c8d8e6;
  }
  body[data-theme="clinical"] {
    --paper:       #fafafa;
    --paper-2:     #f0f0f0;
    --line:        #d8d8d8;
  }

  /* Dark mode overlay — toggled via body[data-mode="dark"] from the
     header button. Only the token values shift; every selector below
     keeps using the same var() refs. color-scheme: dark hints the
     browser to render native form controls (date pickers, scrollbars,
     option lists) in a dark style instead of the default light one. */
  body[data-mode="dark"] {
    color-scheme: dark;
    --paper:       #0c0f14;
    --paper-2:     #151a22;
    --paper-card:  #13171e;
    --ink:         #ecf0f6;
    --muted:       #7d8694;
    --line:        #242a34;
    --accent-soft: #1d2945;
    --good-soft:   #1a2f24;
    --warn-soft:   #3a1e15;
    --bad-soft:    #3a1410;
    /* Brand + semantics, lightened for the dark surface (constant hue).
       Contrast vs --paper #0c0f14: accent 7.4:1, good 7.7:1, warn 7.3:1,
       bad 5.8:1 — all clear AA text (light-paper values were 3.2–5.2:1). */
    --accent: #7ba3df;
    --good:   #5cb494;
    --warn:   #e08a63;
    --bad:    #e06a56;
  }
  /* Native calendar-picker icon: by default the WebKit/Chromium
     SVG is black, which disappears against the dark paper. Invert
     it for dark mode so the icon stays legible. */
  body[data-mode="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.85;
  }
  @supports (color: oklch(50% 0.1 240)) {
    body[data-mode="dark"] {
      --accent-soft: oklch(28% 0.05 240);
      --good-soft:   oklch(26% 0.04 160);
      --warn-soft:   oklch(26% 0.05 30);
      --bad-soft:    oklch(24% 0.05 25);
      /* Base brand/semantics lightened to clear AA on the dark surface
         (mirrors the hex overrides above, constant hue). */
      --accent: oklch(70% 0.12 250);
      --good:   oklch(73% 0.10 165);
      --warn:   oklch(73% 0.13 45);
      --bad:    oklch(67% 0.16 28);
    }
  }

  /* Reset + baseline */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--ui);
    font-size: 14px;
    line-height: 1.55;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 {
    margin: 0;
    font-weight: 500;
    font-family: var(--display);
    letter-spacing: -0.2px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, select, input {
    font: inherit;
    color: inherit;
  }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }
  .card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  /* Top-level page sections. The Overview and My Department views
     live side by side in the DOM and are toggled via the body's
     data-page attribute (driven by the header buttons). Default
     state is overview-visible; switch by clicking "My Department"
     in the nav. */
  .page { display: block; margin-top: 6px; }
  body[data-page="overview"] #dept-page { display: none; }
  body[data-page="dept"]     #overview-page { display: none; }
  /* Loading skeleton is centered with extra breathing room for
     the inline (non-modal) presentation. */
  #overview-page > #ov-loading { padding: 64px 32px; }

  /* Header — document-style: small mono kicker over a display-font
     dept name. Hairline divider below. */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .dash-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .dash-header h1 {
    font-family: var(--display);
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.6px;
    line-height: 1.1;
    color: var(--ink);
  }
  /* Legacy .sub selector kept around in case any include reuses it. */
  .dash-header .sub {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .header-meta {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-meta .email { font-family: var(--mono); font-size: 12px; }

  /* Data-freshness pill: sits in .header-meta showing "Data through
     Mon May 19 · 14h ago".  Color cools when data is stale relative
     to a normal daily-ingest cadence (24h+).  Hidden by default
     until the client knows the latest data date; see
     setFreshnessPill_ in script.html. */
  .freshness-pill {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.2;
    padding: 4px 8px;
    border-radius: 999px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    color: var(--muted);
    white-space: nowrap;
  }
  .freshness-pill.is-stale {
    background: var(--warn-soft);
    border-color: var(--warn);
    color: var(--warn);
  }
  .freshness-pill .freshness-date { color: var(--ink); }

  /* Work-window pill (E2, Phase E). Inline mono kicker below the
     dept-page controls explaining what time-of-day the Rung /
     Missed / Answered / TTT / ATT columns are scoped to. Lighter
     weight than the freshness pill -- this is reference info, not
     a status indicator. Hidden until the client populates it from
     window.__WORK_WINDOW__. */
  .work-window-pill {
    display: none;
    margin: 0 0 12px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.4;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    width: max-content;
  }
  .work-window-pill strong { color: var(--ink); font-weight: 500; }
  .work-window-pill .work-window-sep { color: var(--line-2, var(--line)); margin: 0 6px; }

  /* Days-to-violation forecast banner (E9, Phase E). Compact
     warn-soft block above the QCD KPI tiles when a linear regression
     on the last 7 days of abandonedPct projects a 5% threshold
     crossing within 7 days. Hidden in healthy states. */
  .qcd-forecast {
    margin: 0 0 12px;
    padding: 8px 12px;
    background: var(--warn-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    border-radius: var(--r);
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
  }
  .qcd-forecast-kicker {
    display: inline-block;
    margin-right: 6px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--warn);
    font-weight: 500;
  }
  .qcd-forecast strong { font-weight: 500; color: var(--ink); }

  /* Header nav menus (Reports + Admin dropdowns).  Sit between the
     dept title block and the .header-meta utility cluster.  On
     narrow viewports the whole header wraps and the nav drops to a
     new row -- the dropdowns still anchor right-aligned to their
     trigger buttons. */
  .header-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-self: flex-end;
    margin-bottom: 6px;
    /* Allow the row of tabs to wrap once it gets wider than the
       header column; the Phase C flattened nav has 7 manager-visible
       tabs and 9 admin-visible tabs. On the typical wide deploy this
       fits a single row; on narrower viewports the second row drops
       below cleanly without breaking the header-meta column to the
       right. */
    justify-content: flex-end;
  }
  .header-menu { position: relative; }
  .header-menu-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--ink);
    font-family: var(--ui);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s, border-color 0.12s;
  }
  .header-menu-btn:hover { background: var(--paper-2); }
  .header-menu-btn[aria-expanded="true"] {
    background: var(--paper-2);
    border-color: var(--muted);
  }
  /* Active-page indicator on the Overview / My Department nav
     buttons. Inverted styling matches the .btn primary pattern
     (var(--ink) on var(--paper)) so light and dark modes both
     read as "this button is the current page". */
  .header-menu-btn.header-nav-current,
  .header-menu-btn.header-nav-current:hover {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .header-menu-caret {
    font-size: 13px;
    line-height: 1;
    color: var(--muted);
    transition: transform 0.15s;
    margin-top: 1px;
  }
  .header-menu-btn[aria-expanded="true"] .header-menu-caret {
    transform: rotate(180deg);
  }
  .header-menu-list {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
    min-width: 200px;
    padding: 4px;
    z-index: 100;
  }
  .header-menu-item {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 8px 12px;
    font-family: var(--ui);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
    line-height: 1.4;
  }
  .header-menu-item:hover { background: var(--paper-2); }
  .header-menu-item:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  /* Help button (opens FAQ modal) */
  .help-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper-card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .help-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .help-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Tags — warm-paper soft-bg pills with mono uppercase labels. */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .tag-admin   { background: var(--good-soft); color: var(--good); }
  .tag-manager { background: var(--accent-soft); color: var(--accent); }
  .tag-none    { background: var(--warn-soft); color: var(--warn); }

  /* Mock banner */
  .mock-banner {
    background: var(--warn-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 2px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* Controls — mono-uppercase kicker labels, sharp-cornered inputs. */
  .controls {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 18px;
  }
  .control { display: flex; flex-direction: column; gap: 6px; }
  .control label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .control input[type="date"],
  .control select {
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    min-width: 140px;
    font-family: var(--ui);
  }
  .control input[type="date"]:focus,
  .control select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 0;
    border-color: var(--accent);
  }
  .btn {
    padding: 7px 14px;
    background: var(--ink);
    color: var(--paper);
    border: 0;
    border-radius: 2px;
    font-family: var(--ui);
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-secondary {
    background: var(--paper-card);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { background: var(--paper-2); color: var(--ink); }
  .control-reports { margin-left: auto; }

  /* Status — flat soft-bg banners with a 3px valence stripe on the left
     instead of the prior pill chrome. Matches the Call Analyzer pattern. */
  .status {
    padding: 10px 14px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-size: 13px;
    border-left: 3px solid var(--line);
  }
  .status-loading { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); }
  .status-error   { background: var(--bad-soft);    color: var(--bad);    border-left-color: var(--bad);    }
  .status-empty   { background: var(--paper-2);     color: var(--muted);  border-left-color: var(--muted); }

  /* Agents table — document-row aesthetic: hairline rows, no rounded
     card chrome, mono-uppercase column headers, mono numerics in the
     stat columns. Hover lifts the row with a subtle paper-2 tint.
     Top + bottom hairlines frame the table; .container provides the
     surrounding paper bg. */
  .agents {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper-card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .agents th, .agents td {
    padding: 11px 12px;
    text-align: right;
    border-bottom: 1px solid var(--line);
  }
  .agents tbody tr:last-child td { border-bottom: 0; }
  .agents th:first-child, .agents td:first-child {
    text-align: left;
    padding-left: 14px;
  }
  .agents th:last-child, .agents td:last-child { padding-right: 14px; }
  .agents thead th {
    background: var(--paper-2);
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--line);
  }
  .agents thead th:hover { color: var(--ink); }
  .agents thead th .arrow {
    display: inline-block;
    width: 10px;
    margin-left: 4px;
    color: var(--accent);
    font-size: 10px;
  }
  .agents tbody tr:hover { background: var(--paper-2); }
  /* Drill-through affordance: agent rows are clickable (open the
     Individual Report for that agent). Only the My Department table
     carries data-agent, so the Overview detail table is unaffected. */
  .agents tbody tr[data-agent] { cursor: pointer; }
  .agents tbody td.agent-name {
    font-weight: 500;
    color: var(--ink);
    font-family: var(--ui);
  }
  .agents .num {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 12.5px;
  }
  .agents .missed-high { color: var(--warn); font-weight: 500; }
  /* Recede zero-valued cells so dense tables read as "mostly quiet"
     instead of a uniform wall of numbers. Applied by zeroCell_/fmtCell
     to 0 and 0:00:00 cells. */
  .cell-zero { color: var(--muted); opacity: 0.5; }

  .agents tfoot td {
    background: var(--paper-2);
    font-family: var(--mono);
    font-weight: 500;
    color: var(--ink);
    border-top: 1px solid var(--line);
    border-bottom: 0;
  }
  .agents tfoot td:first-child {
    font-family: var(--ui);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 11px;
    color: var(--muted);
  }

  /* Footer info line — mono kicker · status pills. Sits below the table
     and surfaces "rows scanned · cache state · compute time" telemetry. */
  .info-line {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }
  .info-line .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--paper-2);
    color: var(--muted);
    margin-left: 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .info-line .pill-cache  { background: var(--good-soft); color: var(--good); }
  .info-line .pill-fresh  { background: var(--accent-soft); color: var(--accent); }

  /* Segmented control (scope toggle) — sharp corners, mono-uppercase labels. */
  .segmented {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
    background: var(--paper-card);
  }
  .seg-btn {
    padding: 7px 14px;
    background: var(--paper-card);
    color: var(--muted);
    border: 0;
    border-right: 1px solid var(--line);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    min-width: 70px;
  }
  .seg-btn:last-child { border-right: 0; }
  .seg-btn:hover { background: var(--paper-2); color: var(--ink); }
  .seg-btn.active {
    background: var(--ink);
    color: var(--paper);
  }
  .seg-btn.active:hover { opacity: 0.88; }

  /* Diagnostics panel — hairline-bordered, sharp corners. The summary
     line is the click target; expanded content uses mono kicker
     subheaders for each section. */
  /* "Yesterday's QCD" snapshot strip ABOVE the agent table on My
     Department. Compact tile row; warn-tinted values when the
     abandoned %% or violation thresholds are hit. The bottom
     margin gives breathing room between the snapshot and the
     agent table that immediately follows. */
  .dept-qcd-snapshot {
    margin-top: 24px;
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: var(--r);
  }
  .dept-qcd-header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .dept-qcd-header strong {
    font-family: var(--display);
    font-size: 14px;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .dept-qcd-date {
    color: var(--ink);
    font-weight: 500;
  }
  .dept-qcd-hint {
    flex: 1 1 100%;
    font-size: 11px;
    color: var(--muted);
  }
  .dept-qcd-tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
  }
  /* Per-queue separation: each queue renders its own full-width row of
     tiles (sub-queues can behave very differently from the parent, so
     they're never summed away); the all-queues total renders last,
     visually secondary. Single-queue depts keep flat tiles. */
  .dept-qcd-queue-row { grid-column: 1 / -1; }
  .dept-qcd-tiles-inner {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
  }
  .dept-qcd-queue-name {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin: 6px 0 4px;
  }
  .dept-qcd-subtag {
    text-transform: none;
    letter-spacing: 0;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: 1px 8px;
  }
  .dept-qcd-total-row { border-top: 1px solid var(--line); padding-top: 6px; opacity: 0.85; }
  .dept-qcd-tile {
    padding: 8px 12px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--r);
    text-align: center;
  }
  .dept-qcd-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
  }
  .dept-qcd-value {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-top: 2px;
  }
  .dept-qcd-value.dept-qcd-warn { color: var(--warn); }

  .diagnostics {
    margin-top: 24px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px 16px;
    font-size: 13px;
  }
  .diagnostics summary {
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    user-select: none;
    padding: 2px 0;
  }
  .diagnostics summary:hover { color: var(--ink); }
  /* Severity-colored variants (E3, Phase E). Card-edge tinting drives
     visual urgency: warn-soft for 1-5 issues, bad-soft for >5. The
     summary text also picks up the matching --warn / --bad color so
     the chip-like header reads as the same severity from a distance. */
  .diagnostics.diag-severity-warn {
    background: var(--warn-soft);
    border-left: 3px solid var(--warn);
  }
  .diagnostics.diag-severity-bad {
    background: var(--bad-soft);
    border-left: 3px solid var(--bad);
  }
  .diagnostics.diag-severity-warn summary { color: var(--warn); }
  .diagnostics.diag-severity-bad  summary { color: var(--bad);  }
  .diagnostics.diag-severity-warn summary:hover,
  .diagnostics.diag-severity-bad  summary:hover { color: var(--ink); }
  .diag-count {
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }
  .diagnostics.diag-severity-warn .diag-count { color: var(--warn); font-weight: 500; }
  .diagnostics.diag-severity-bad  .diag-count { color: var(--bad);  font-weight: 500; }
  .diag-section {
    margin-top: 14px;
  }
  .diag-section h3 {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin: 0 0 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .diag-section p { margin: 0; color: var(--muted); }
  .diag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .diag-chip {
    display: inline-block;
    padding: 2px 8px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--ink);
  }
  /* Phase D: per-row Source chip (replaces the old "(queue-only)"
     after-text on .via-queue rows). The chip renders inside a
     dedicated Source column so it sits in its own cell rather than
     dangling off the Agent name. Three variants -- ROSTER (accent),
     BOTH (good), QUEUE (warn) -- match the three matched-via states
     the server returns per row. The small dot prefix gives the chip
     visual weight at small sizes. */
  .src-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
    white-space: nowrap;
  }
  .src-chip .src-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .src-chip-roster {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .src-chip-both {
    background: var(--good-soft);
    color: var(--good);
  }
  .src-chip-queue {
    background: var(--warn-soft);
    color: var(--warn);
  }
  /* E5 prior-period delta chip. Lives inline after the metric value
     in totalRung / totalMissed / totalAnswered cells on the agent
     table. Compact mono font + minimal padding so the cell stays
     tight; valence variants reuse the design-token good/warn
     palette already established in Phase A. The muted variant
     applies to (a) zero deltas and (b) small deltas (< 3 calls)
     so day-to-day noise doesn't paint the table orange/sage. */
  .wow-chip {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: var(--r);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0;
    line-height: 1.4;
    vertical-align: 1px;
    white-space: nowrap;
  }
  .wow-chip-good  { background: var(--good-soft); color: var(--good); }
  .wow-chip-warn  { background: var(--warn-soft); color: var(--warn); }
  .wow-chip-muted { background: var(--paper-2);   color: var(--muted); }

  /* Source column cell: tighter padding + left-align so the chip
     hugs the agent name's column without being pushed to a
     numeric-style right-align. */
  .agents td.src-cell,
  .agents th.src-cell {
    text-align: left;
    padding-left: 8px;
    padding-right: 8px;
  }

  /* Access denied — warn-stripe document panel. */
  .denied-card {
    max-width: 560px;
    margin: 60px auto;
    padding: 32px 36px;
    border-left: 3px solid var(--warn);
  }
  .denied-card h1 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin-bottom: 12px;
  }
  .denied-card p { color: var(--muted); margin: 8px 0; line-height: 1.6; }
  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 14px;
    margin: 18px 0;
    font-size: 13px;
  }
  .kv dt {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
    align-self: center;
  }
  .kv dd { margin: 0; font-family: var(--mono); }
  .small { font-size: 12px; color: var(--muted); }

  /* Modal — paper panel with hairline border + soft drop shadow. Same
     chrome powers Help & FAQ and all four report modals. The shadow is
     intentionally subtle; the hairline border is the primary boundary. */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
  }
  .modal-panel {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  /* Sticky modal header: keeps the report title + close X
     visible while the body scrolls. The close button stays at
     the top-right of the modal panel via absolute positioning
     within this relative-positioned header. */
  .modal-panel-header {
    position: relative;
    flex-shrink: 0;
    padding: 28px 40px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-card);
  }
  .modal-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 40px 28px;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: var(--paper-2);
    color: var(--ink);
  }
  /* "Open in new tab" affordance on report modal headers (Phase C).
     Sits to the left of the close button so the close X stays in
     its expected top-right slot. Wired up by the central router in
     script.html via data-open-tab-route -- opens DASHBOARD_URL with
     the current modal's route as a hash fragment so the new tab
     lands directly on this report, enabling side-by-side comparison
     via OS-tiled browser windows. Hidden when DASHBOARD_URL is unset. */
  .modal-open-tab-btn {
    position: absolute;
    top: 14px;
    right: 54px;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    border-radius: var(--r);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-open-tab-btn:hover {
    background: var(--paper-2);
    color: var(--ink);
  }
  /* Hidden when there's no DASHBOARD_URL property to base the
     shareable target on. The router toggles this class at init. */
  .modal-open-tab-btn.is-disabled {
    display: none;
  }
  /* Modal header: optional kicker over the display-font title.
     Together they reproduce the kicker+title pattern used on the
     dashboard header. */
  .modal-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
    padding-right: 40px;
  }
  .modal-panel h2 {
    font-family: var(--display);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.4px;
    line-height: 1.15;
    margin: 0 0 20px;
    color: var(--ink);
    padding-right: 40px;
  }
  /* Help-modal subsection headers — mono kicker, slightly larger
     letter-spacing than the dashboard kickers for vertical rhythm
     inside the modal. */
  .modal-content h3 {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    margin: 24px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .modal-content h3:first-of-type { margin-top: 0; }
  .modal-content p {
    margin: 8px 0;
    color: var(--ink);
    line-height: 1.6;
  }
  .modal-content ul {
    margin: 8px 0 14px 0;
    padding-left: 20px;
  }
  .modal-content ul li {
    margin-bottom: 8px;
    color: var(--ink);
    line-height: 1.6;
  }
  .modal-content code {
    background: var(--paper-2);
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 12px;
    font-family: var(--mono);
  }
  .modal-content strong { color: var(--ink); }
  .modal-content a { color: var(--accent); text-decoration: none; }
  .modal-content a:hover { text-decoration: underline; }
  .modal-content em { color: var(--muted); }

  /* Wide modal variant (report modals with charts + tables). */
  .modal.modal-wide { padding: 16px; }
  .modal-panel.modal-panel-wide {
    max-width: 1200px;
    width: 100%;
    max-height: 92vh;
  }
  .modal-panel-header { cursor: grab; }
  .modal-panel-header:active { cursor: grabbing; }
  .modal-resize-handle {
    position: absolute; right: 0; bottom: 0; width: 18px; height: 18px;
    cursor: nwse-resize; z-index: 2; opacity: 0.4;
    background: linear-gradient(135deg, transparent 40%, var(--muted) 40%, var(--muted) 50%, transparent 50%, transparent 60%, var(--muted) 60%, var(--muted) 70%, transparent 70%);
  }
  .modal-resize-handle:hover { opacity: 0.7; }
  /* Wide modals get tighter header/body padding -- their content
     is denser and the wider canvas can absorb less chrome. */
  .modal-panel-wide .modal-panel-header { padding: 22px 28px 14px; }
  .modal-panel-wide .modal-panel-body   { padding: 14px 28px 22px; }

  /* Report summary strip at the top of report modals — label / value
     pairs separated by hairline dividers. Mono labels for the kicker
     feel; bold values in the UI font. */
  .report-summary {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    margin: 0 0 18px;
    padding: 12px 16px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 13px;
  }
  .report-summary .label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .report-summary .val {
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .report-summary .sep { color: var(--line); }

  /* Chart row: grid that holds the radar chart on the left and (when
     visible) the bucket-detail drill-in on the right. With .no-detail
     the row collapses to a single centered column. */
  .chart-row {
    display: grid;
    gap: 16px;
    grid-template-columns: 480px minmax(0, 1fr);
    margin-bottom: 16px;
    align-items: start;
  }
  .chart-row.no-detail {
    grid-template-columns: 480px;
    justify-content: center;
  }
  .chart-section {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px 16px 10px;
    margin: 0;
    min-width: 0;
  }
  .chart-section canvas {
    display: block;
    max-width: 100%;
  }
  .chart-loading {
    margin: 0;
    padding: 80px 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* Drill-in panel that appears next to the chart when a bucket is
     clicked. Lives inside the .chart-row grid so it sits to the right
     of the chart; collapses entirely when display:none. */
  .bucket-detail {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 16px 14px;
    margin: 0;
    min-width: 0;
  }
  .bucket-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }
  .bucket-detail-header strong {
    font-size: 14px;
    color: var(--ink);
  }
  .link-btn {
    background: none;
    border: 0;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
  }
  .link-btn:hover { color: var(--ink); text-decoration: underline; }
  .bucket-detail-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 13px;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    max-height: 280px;
    overflow-y: auto;
  }
  .bucket-detail-list li {
    padding: 4px 0;
    border-bottom: 1px solid var(--paper-2);
    display: grid;
    grid-template-columns: 80px 1fr 110px;
    gap: 12px;
    align-items: baseline;
  }
  .bucket-detail-list li:last-child { border-bottom: 0; }
  .bucket-detail-list li.abandoned {
    color: var(--warn);
    font-weight: 500;
  }
  .bucket-detail-list .ring-date  { color: var(--muted); }
  .bucket-detail-list .ring-agent { color: var(--ink); font-family: var(--ui); }
  .bucket-detail-list .ring-time  { text-align: right; }
  /* Widen the time column when parent-id chips are present so the
     #1776... ID doesn't squeeze the timestamp out. */
  .bucket-detail-list li {
    grid-template-columns: 80px 1fr auto;
  }

  /* Parent-call-ID chip + copy button. Renders inline next to the
     siren on abandoned timestamps. Compact in normal flow, with the
     ID in monospace so it's recognizable at a glance and the copy
     button click target is large enough on mobile. */
  .parent-id {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
    padding: 1px 4px 1px 6px;
    border: 1px solid var(--warn-soft);
    border-radius: 999px;
    background: var(--warn-soft);
    font-size: 11px;
    line-height: 1.4;
    color: var(--warn);
    font-weight: 500;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .parent-id .pid-num {
    font-family: var(--mono);
    font-size: 10.5px;
  }
  .parent-id .pid-copy {
    border: 0;
    background: transparent;
    color: inherit;
    padding: 0 2px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    border-radius: var(--r);
  }
  .parent-id .pid-copy:hover { background: var(--paper-2); }
  .parent-id .pid-copy.copied { color: var(--good); }

  /* Cross-queue overflow tag on queue-only entries:
     "[also rang Backup CSR]". Muted so it reads as metadata. */
  .also-in {
    margin-left: 6px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
    white-space: nowrap;
  }
  .bucket-detail-empty {
    color: var(--muted);
    font-size: 13px;
    margin: 0;
  }

  /* Queue-only abandoned section (no agent rang) — warn-stripe panel
     with a soft-bg fill. The 3px left stripe carries the urgency so the
     fill can stay quiet enough that the inner per-queue lists stay
     readable. */
  .queue-only-section {
    background: var(--warn-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    border-radius: 2px;
    padding: 12px 16px 14px;
    margin-bottom: 16px;
  }
  .queue-only-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  .queue-only-header strong {
    color: var(--warn);
    font-family: var(--display);
    font-size: 14px;
    font-weight: 500;
  }
  .queue-only-header .muted {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .queue-only-card {
    margin-top: 10px;
  }
  .queue-only-card:first-child { margin-top: 0; }
  .queue-only-card .qname {
    color: var(--warn);
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .queue-only-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .queue-only-list li {
    color: var(--warn);
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
  }
  .queue-only-list li:last-child { border-bottom: 0; }
  .queue-only-list .ring-date { color: var(--muted); }
  .queue-only-list .ring-time { text-align: right; }

  /* Per-agent card grid for the Missed Calls report — hairline panels
     with mono name kicker + numeric timestamps in mono. */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .agent-card .agent-name {
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .agent-card .agent-total {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .agent-card .missed-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 220px;
    overflow-y: auto;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .agent-card .missed-list li {
    padding: 3px 0;
    color: var(--ink);
    border-bottom: 1px solid var(--paper-2);
  }
  .agent-card .missed-list li:last-child { border-bottom: 0; }
  .agent-card .missed-list li.abandoned {
    color: var(--warn);
    font-weight: 500;
  }
  .agent-card .missed-list .date {
    color: var(--muted);
    margin-right: 6px;
  }
  .agent-card.no-data {
    background: var(--paper-2);
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }

  /* -------- Individual Report modal -------------------------------- */
  /* Form: date picker + agent multi-select. Section titles use the
     mono-kicker convention; inputs match the dashboard's sharp-corner
     control language. */
  .ir-form { padding: 6px 4px; }
  .ir-section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 18px 0 12px;
  }
  .ir-section-title:first-child { margin-top: 0; }
  .ir-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 4px;
  }
  .ir-col label {
    display: block;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .ir-col select,
  .ir-col input[type="date"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    box-sizing: border-box;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
  }
  .ir-hint { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.55; }
  .ir-loader { padding: 0; }
  .ir-skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
    padding: 10px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .ir-skeleton-row {
    height: 24px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--paper-2) 0%, var(--line) 50%, var(--paper-2) 100%);
    background-size: 200% 100%;
    animation: irShimmer 1.2s linear infinite;
  }
  .ir-skeleton-label {
    text-align: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  @keyframes irShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* No-data empty state shown when every selected agent had zero
     activity in the chosen range. */
  .ir-empty-card {
    background: var(--paper-card);
    border: 1px dashed var(--line);
    border-radius: 2px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 14px;
  }
  .ir-empty-icon  { font-size: 28px; opacity: 0.45; margin-bottom: 6px; }
  .ir-empty-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .ir-empty-sub   { font-size: 12px; color: var(--muted); }
  .ir-agent-list {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    background: var(--paper-2);
    padding: 5px 8px;
    border-radius: 2px;
    cursor: pointer;
    user-select: none;
  }
  .ir-agent-item input { margin-right: 6px; transform: scale(1.05); }
  .ir-agent-empty { padding: 12px; font-size: 13px; color: var(--muted); text-align: center; }

  /* Active / inactive groupings inside the agent picker. Active
     items render normally; inactive (no data in range) get muted
     styling so they're still pickable but visually de-prioritized. */
  .ir-agent-group-label {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin: 8px 2px 4px;
  }
  .ir-agent-group-label-muted { color: var(--muted); margin-top: 12px; }
  .ir-agent-group-count { color: var(--muted); font-weight: 500; }
  .ir-agent-group {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-group-muted .ir-agent-item {
    background: var(--paper-2);
    color: var(--muted);
    font-style: italic;
  }
  .ir-agent-group-muted .ir-agent-item input { accent-color: var(--muted); }
  /* QUEUE chip embedded in each floater picker item (INV-53). Lives
     to the right of the agent name; smaller-than-default font-size
     to keep the picker row compact. Reuses .src-chip-queue colors
     from My Department's Source column for visual consistency. */
  .ir-agent-floater-chip {
    margin-left: 6px;
    font-size: 9px;
    padding: 1px 6px;
    font-style: normal;
  }

  /* Collapsible inactive group. Hides the default disclosure marker
     and renders our own caret next to the label that rotates when
     the details element is open. */
  .ir-agent-details { grid-column: 1 / -1; }
  .ir-agent-details > summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .ir-agent-details > summary::-webkit-details-marker { display: none; }
  .ir-agent-details > summary::before {
    content: "\25B8";   /* right-pointing triangle */
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: var(--muted);
    margin-right: 2px;
    transition: transform 0.15s ease;
  }
  .ir-agent-details[open] > summary::before {
    transform: rotate(90deg);
  }
  .ir-agent-details > .ir-agent-group { margin-top: 6px; }

  /* Search row shared by main form picker and edit popover. */
  .ir-search-row { margin-bottom: 8px; }
  .ir-search-row input[type="search"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
    box-sizing: border-box;
  }
  .ir-search-row input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .ir-agent-actions {
    text-align: right;
    margin: 8px 2px 14px;
    font-size: 12px;
  }
  .ir-agent-actions a { color: var(--accent); text-decoration: none; }
  .ir-agent-actions a:hover { text-decoration: underline; }
  .ir-agent-actions .sep { color: var(--line); margin: 0 6px; }

  /* Results area — hairline divider with the report title in display
     font + mono date strip. Mirrors the dashboard header pattern at a
     smaller scale. */
  .ir-results { padding-top: 4px; }
  .ir-results-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ir-results-header-left { flex: 1; min-width: 0; }
  .ir-results-title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; }
  .ir-results-title {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .ir-results-date  {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .ir-action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .ir-action-buttons .btn { width: auto; padding: 6px 12px; font-size: 12px; }

  /* Export dropdown: single button collapses Copy / Email / Print
     menu items. Caret rotates slightly when the menu is open. */
  .ir-export-wrap { position: relative; display: inline-block; }
  .ir-export-caret {
    display: inline-block;
    margin-left: 4px;
    font-size: 9px;
    transition: transform 0.15s;
  }
  #ir-export-btn.open .ir-export-caret { transform: rotate(180deg); }
  .ir-export-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
    min-width: 160px;
    padding: 4px;
    z-index: 100;
  }
  .ir-export-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
  }
  .ir-export-menu button:hover { background: var(--paper-2); }

  /* "Showing: Sarah, Maria · change" sticky in the results header.
     Click the change link to open the inline edit popover. */
  .ir-editing-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .ir-editing-label { font-weight: 600; color: var(--muted); }
  .ir-editing-agents {
    color: var(--ink);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60vw;
  }
  .ir-editing-edit {
    background: transparent;
    border: 0;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0 2px;
    text-decoration: underline;
  }
  .ir-editing-edit:hover { color: var(--accent); }

  /* Edit-selection popover: floats below the results header,
     contains a compact agent picker that lets the user re-run
     the report with different agents without going back to the
     form. */
  .ir-edit-popover {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    padding: 14px 16px;
    margin: 0 0 14px;
  }
  .ir-edit-popover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .ir-edit-popover-close {
    background: transparent;
    border: 0;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
  }
  .ir-edit-popover-close:hover { color: var(--ink); }
  .ir-agent-list-compact { max-height: 220px; }
  .ir-edit-popover-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
  }
  .ir-edit-popover-actions a { color: var(--accent); text-decoration: none; }
  .ir-edit-popover-actions a:hover { text-decoration: underline; }
  .ir-edit-popover-actions .sep { color: var(--line); }
  .ir-edit-popover-actions .btn {
    margin-left: auto;
    width: auto;
    padding: 6px 14px;
    font-size: 12px;
  }

  /* Sort dropdown above the per-agent summary cards. Only shown
     in peer-comparison mode (2+ agents); hidden for single-agent
     reports where sort is meaningless. */
  .ir-cards-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .ir-sort-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--paper-card);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--muted);
  }
  .ir-sort-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
  }
  .ir-sort-control select {
    background: transparent;
    border: 0;
    padding: 2px 4px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
  }
  .ir-sort-control select:focus { outline: none; }

  /* Per-agent summary card — hairline panel with display-font agent
     name. KPI grid below uses paper-2 inner tiles for separation. */
  .ir-summary-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .ir-summary-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ir-summary-title .ir-vs {
    font-family: var(--mono);
    font-weight: 400;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  /* "EXCLUDED FROM TEAM AVG" pill (E4, Phase E). Surfaces on agents
     listed in TEAM_AVG_EXCLUDES[dept] so the manager sees why their
     numbers don't move the team average (INV-26). Subdued muted-soft
     palette -- it's reference info, not a warning. */
  .ir-excluded-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    cursor: help;
  }
  .ir-copy-tsv {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent-soft);
    border-radius: 2px;
    padding: 4px 9px;
    cursor: pointer;
  }
  .ir-copy-tsv:hover { background: var(--accent-soft); }

  /* KPI tile grid: a single row of metric tiles per agent. Big
     number + sparkline up top, team-avg + delta badge below. */
  .ir-kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .ir-kpi-tile {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  .ir-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ir-kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .ir-kpi-spark { height: 22px; line-height: 0; }
  .ir-spark-svg { display: block; }
  .ir-kpi-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .ir-kpi-value {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--ink);
    line-height: 1.05;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Subtle "X.X% of dept" tag inline with the big value. Mono so it
     reads as metadata; the display-font absolute number stays primary. */
  .ir-kpi-share {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Insights callout — rendered above the KPI grid per agent.
     3px accent stripe + soft-bg fill, mono kicker, lists up to
     3 rules-based observations vs team avg. */
  .ir-insights {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .ir-insights-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .ir-insights-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.5;
  }
  .ir-insight-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 3px 0;
  }
  .ir-insight-text { flex: 1; }
  /* Colored circular markers double-encode direction: blue / up
     arrow = positive, orange / down arrow = negative, grey / bullet
     = neutral. Color + shape distinction so CVD users get the same
     signal as everyone else. */
  .ir-insight-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ir-insight-mark-positive { background: var(--accent-soft); color: var(--accent); }
  .ir-insight-mark-negative { background: var(--warn-soft); color: var(--warn); }
  .ir-insight-mark-neutral  { background: var(--paper-2); color: var(--muted); }
  .ir-kpi-row-bot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  /* Same-agent YoY vs Prior period row. Sits below ir-kpi-row-bot
     when summaryData.priorStats is present (Individual Report
     "Compare with" mode). Same layout / typography as the team-vs
     row above but with a small top border to visually distinguish
     "vs Team" from "vs Prior". */
  .ir-kpi-row-prior {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-top: 4px;
    padding-top: 4px;
    border-top: 1px dashed var(--line);
  }

  /* Compact form hint for the resolved prior-range preview under
     the Compare-with row. */
  .ir-prior-hint {
    margin-top: -8px;
    margin-bottom: 12px;
    color: var(--muted);
    font-size: 12px;
  }
  .ir-kpi-team {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 900px) {
    .ir-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .ir-badge {
    padding: 3px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    display: inline-block;
    min-width: 60px;
    text-align: center;
  }
  /* Diverging blue (good) / orange (bad) pair instead of green/red:
     readable for deuteranopia + protanopia users, who can't reliably
     distinguish red and green badges. */
  .ir-badge-pos { background: var(--accent-soft); color: var(--accent); }
  .ir-badge-neg { background: var(--warn-soft); color: var(--warn); }
  .ir-badge-neu { background: var(--paper-2); color: var(--ink); }

  /* Charts: stacked grid. Volume goes full-width, efficiency + duration
     side-by-side below. */
  .ir-toggle-box { text-align: right; margin: 4px 4px 10px; }
  .ir-toggle-label {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    background: var(--paper-card);
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-weight: 500;
  }
  .ir-toggle-label:hover { background: var(--paper-2); }
  .ir-toggle-label input { margin-right: 6px; }

  /* Tabbed chart container: only one of Volume/Efficiency/Duration
     is visible at a time so each gets the full container width. */
  .ir-chart-tabs {
    display: flex;
    flex-wrap: wrap;           /* inline chart controls wrap on narrow widths */
    gap: 4px;
    margin-top: 16px;          /* vertical rhythm: breathing room before the chart zone */
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  /* Chart controls (data-labels toggle / monthly-daily view toggle)
     pinned to the right end of the tab strip so they share one band with
     the tabs instead of stacking on their own row. align-self: center
     stops them stretching the way the tab buttons do. */
  .ir-chart-tabs > .ir-toggle-box,
  .ir-chart-tabs > .qcd-view-toggle {
    margin: 0 2px 0 auto;
    align-self: center;
  }
  .ir-tab {
    background: transparent;
    border: 0;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .ir-tab:hover { color: var(--ink); }
  .ir-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Shared chip legend rendered above the chart panels in
     comparison mode. Each chip toggles its agent's series across
     all three charts; hover dims the others. */
  .ir-shared-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 4px;
    margin-bottom: 6px;
  }
  .ir-legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .ir-legend-chip:hover { background: var(--paper-2); }
  .ir-legend-chip.inactive {
    opacity: 0.42;
    text-decoration: line-through;
  }
  /* Pinned/isolated chip (click-to-isolate) -- accented outline so the
     active spotlight selection is obvious. */
  .ir-legend-chip.pinned {
    border-color: var(--chip-color, var(--accent));
    box-shadow: 0 0 0 1px var(--chip-color, var(--accent)) inset;
    font-weight: 600;
  }
  .ir-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--chip-color, var(--accent));
    flex-shrink: 0;
  }
  .ir-legend-name { font-weight: 500; }

  .ir-chart-area { display: block; }
  .ir-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  .ir-chart-header {
    text-align: center;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .ir-chart-canvas-wrap { flex: 1; position: relative; }

  /* Reset .btn defaults that look out of place inside the modal. */
  #individual-modal .btn { width: auto; }

  /* -------- Performance Report ----------------------------------- */
  /* Inline prior-period hint on the form -- shows the user what
     "vs prior" will compare against before they click Generate. */
  .pr-prior-hint {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin: -4px 2px 12px;
  }
  /* Side-by-side current vs prior date display in the results
     header. Replaces the inline "(date)" + a quiet "Comparing
     against..." line with a single structured pair. */
  .pr-date-pair {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 4px;
  }
  .pr-date-block {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 8px 12px;
    line-height: 1.3;
    min-width: 0;
  }
  .pr-date-current { border-left: 3px solid var(--accent); }
  .pr-date-prior   { border-left: 3px solid var(--muted); }
  .pr-date-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .pr-date-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .pr-date-divider {
    align-self: center;
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
  }

  /* Subset hint banner: appears when the user picked fewer than
     the full roster. Accent-stripe panel reads as "selection
     scope is limited". */
  .pr-subset-hint {
    background: var(--accent-soft);
    color: var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 9px 14px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  /* KPI tile row at the top of the report: 6 tiles, big number +
     delta vs prior period. Distinct from the Individual Report's
     KPI tiles -- no sparkline, no team-avg context. */
  .pr-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .pr-kpi-tile {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  /* Label + inline sparkline on the top row. Mirrors the IR
     summary-card tile layout for visual consistency. */
  .pr-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .pr-kpi-spark { height: 22px; line-height: 0; }
  .pr-kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .pr-kpi-value {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--ink);
    line-height: 1.05;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pr-kpi-delta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .pr-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .pr-delta-pos { background: var(--accent-soft); color: var(--accent); }
  .pr-delta-neg { background: var(--warn-soft); color: var(--warn); }
  .pr-delta-neu { background: var(--paper-2); color: var(--muted); }
  /* Arrow span inside the delta badge -- bumped so the up/down
     direction is legible at a glance instead of blending into
     the digit run.  Sans-serif so the triangle glyph reads as a
     directional cue rather than a mono character. */
  .pr-delta-arrow {
    font-family: var(--ui);
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
  }
  .pr-delta-cap {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  @media (max-width: 1100px) {
    .pr-kpi-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .pr-kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* Per-agent table — document-row aesthetic matching the main
     agent table, scoped to the Performance Report. */
  .pr-agent-table-wrap { overflow-x: auto; margin-bottom: 18px; }
  .pr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: var(--paper-card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .pr-agent-table th, .pr-agent-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .pr-agent-table th {
    background: var(--paper-2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .pr-agent-table .num {
    text-align: right;
    font-family: var(--mono);
  }
  .pr-agent-table tbody tr:last-child td { border-bottom: 0; }
  .pr-agent-table tbody tr:hover { background: var(--paper-2); }

  /* Sortable headers: cursor + hover affordance + active-sort
     highlight when this column is the current sort key. */
  .pr-th-sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .pr-th-sortable:hover { background: var(--paper-2) !important; color: var(--ink) !important; }

  /* Sub-tabs inside the 12-Month Trend chart panel: switches the
     metric shown on the line chart (Answered / % Answered / ATT). */
  .pr-trend-subtabs {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .pr-trend-subtab {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pr-trend-subtab:hover { background: var(--paper-2); }
  .pr-trend-subtab.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }

  /* -------- Compare Ranges Report -------------------------------- */
  /* Period blocks in the form — sharp-cornered panels with a 3px left
     stripe encoding baseline (muted) vs comparison (accent). */
  .cr-period-block {
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 12px 14px 4px;
    margin-bottom: 12px;
    background: var(--paper-2);
  }
  .cr-period-baseline { border-left-color: var(--muted); }
  .cr-period-compare  { border-left-color: var(--accent); }
  .cr-period-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .cr-period-baseline .cr-period-label { color: var(--muted); }
  .cr-period-compare  .cr-period-label { color: var(--accent); }

  /* Centered Swap button — sharp pill with mono label. */
  .cr-swap-row {
    display: flex;
    justify-content: center;
    margin: -2px 0 10px;
  }
  .cr-swap-btn {
    background: var(--paper-card);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 2px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cr-swap-btn:hover { background: var(--paper-2); color: var(--ink); }

  /* Period length hint below the date blocks — mono so it reads as
     metadata; check/warn variants tinted via --good / --warn. */
  .cr-length-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin: -4px 2px 14px;
    letter-spacing: 0.04em;
  }
  .cr-length-spec strong { color: var(--ink); font-weight: 500; }
  .cr-length-ok { color: var(--good); font-weight: 500; }
  /* Sub-threshold difference -- noted but not alarming.  Muted
     ink rather than warn-orange so it doesn't compete with the
     real volume-incomparable warning. */
  .cr-length-diff { color: var(--muted); }
  .cr-length-diff strong { color: var(--ink); }
  .cr-length-warn { color: var(--warn); font-weight: 500; }

  /* Length-mismatch banner — warn-stripe panel with soft-bg fill,
     same shape as the queue-only section so the visual grammar of
     "this needs attention" is consistent across the app. */
  .cr-length-warning {
    background: var(--warn-soft);
    color: var(--warn);
    border-left: 3px solid var(--warn);
    border-radius: 2px;
    padding: 10px 14px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }
  .cr-length-warning strong { color: var(--warn); font-weight: 500; }

  /* Per-day caption inside KPI tiles (volume + time metrics
     when length-mismatch). Small mono line under the delta. */
  .pr-kpi-perday {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px dashed var(--line);
    margin-top: 6px;
    padding-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .pr-kpi-perday strong { color: var(--ink); font-weight: 500; }

  /* Comparison chart wrapper: matches the ir-chart-wrap shape but
     fixed taller height for the bar chart. */
  .cr-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 380px;
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .cr-chart-summary {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .cr-chart-summary strong { color: var(--ink); font-weight: 500; }

  /* Per-agent cards stack vertically; on wide screens flow into a
     two-column grid for density. */
  /* -------- Insights report (combined rollup + per-agent cards) --- */
  .ins-compare-line { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .ins-rollup-cap { font-family: var(--ui); font-size: 11px; font-weight: 400; color: var(--muted); }
  .ins-agent-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  .ins-card {
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--paper-card);
    padding: 12px 14px;
    border-left: 3px solid var(--line);
  }
  /* Classification tints (CR pattern). Floater's warn border wins --
     the JS only applies a classification class to non-floaters. */
  .ins-card-improved  { border-left-color: var(--accent); }
  .ins-card-regressed { border-left-color: var(--warn); }
  .ins-card-mixed     { border-left-color: var(--muted); }
  .ins-card-floater { border-left: 3px solid var(--warn); }
  .ins-metric-perday {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }

  /* Answer-first headline block at the top of every report's results
     (the anti-intimidation layer): plain sentences before any chart. */
  .report-headline {
    margin: 10px 0 14px;
    padding: 12px 16px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: var(--r);
  }
  .report-headline-kicker {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .report-headline-line {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
  }
  .report-headline-line + .report-headline-line { margin-top: 2px; }

  /* Overview question launcher (anti-intimidation layer): four
     plain-English questions, each routing to a pre-primed report. */
  .ov-launcher { margin: 12px 0 16px; }
  .ov-launcher-kicker {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .ov-launcher-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .ov-launcher-q {
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink);
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 14px;
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .ov-launcher-q:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* Metric glossary: matched labels get a hover/tap definition via
     title=; the dotted underline + help cursor advertise it. */
  .gloss {
    text-decoration: underline dotted;
    text-decoration-color: var(--muted);
    text-underline-offset: 3px;
    cursor: help;
  }
  /* Sortable headers keep their click affordance; the dotted
     underline alone advertises the definition. */
  th[data-sort].gloss { cursor: pointer; }

  /* Insights: share-of-answered pie (PR port) + card IR drill link. */
  .ins-share-canvas-wrap { height: 220px; position: relative; }
  .ins-card-ir-link {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px 8px;
    cursor: pointer;
  }
  .ins-card-ir-link:hover { border-color: var(--accent); background: var(--accent-soft); }

  /* Tab asterisk: reports pending consolidation review. */
  .tab-review-star { color: var(--warn); cursor: help; }

  /* Insights: Queue health controls row (sub-queue toggle + view seg). */
  .ins-qh-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 2px 0 8px;
  }

  /* Insights: Queue health section (QCD consolidation). */
  .ins-qh-chart-wrap { margin: 10px 0 12px; }
  .ins-qh-canvas-wrap { height: 190px; position: relative; }
  .ins-qh-footnote {
    font-size: 11px;
    color: var(--muted);
    margin: 6px 0 14px;
  }
  .ins-qh-viol summary { cursor: pointer; display: inline; }
  .ins-qh-viol-dates {
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    max-width: 260px;
    white-space: normal;
  }

  /* My Department: Missed Calls drill-down section + modal range row. */
  .dept-missed-chart-wrap { max-width: 420px; margin: 6px auto 0; }
  .dept-missed-open { margin-left: auto; }
  .missed-range-row { margin-bottom: 10px; }

  /* QCD sub-queue rollup toggle. */
  .qcd-sub-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    padding-top: 7px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Orphan Fix: inline "new hire" add-to-roster form row. */
  .of-action-cell { white-space: nowrap; }
  .of-add-row td { background: var(--paper-2); }
  .of-add-form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 6px 2px;
    font-size: 12.5px;
  }
  .of-add-exts { width: 200px; }
  .of-add-hint {
    flex-basis: 100%;
    font-size: 11px;
    color: var(--muted);
  }

  /* Launcher loading pane: replaces the form while a question-chip run
     generates, so the user never sees a form flash. */
  .launcher-loading { padding: 8px 0 16px; }
  .launcher-loading-q {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .launcher-loading-cap {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
