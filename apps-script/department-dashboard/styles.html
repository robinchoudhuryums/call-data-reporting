<style>
  /* Reset + baseline */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.55 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    background: #f9fafb;
    color: #1f2937;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 600; }
  a { color: #1d4ed8; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, select, input {
    font: inherit;
    color: inherit;
  }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }

  /* Header */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 20px;
  }
  .dash-header h1 { font-size: 20px; }
  .dash-header .sub { color: #6b7280; font-size: 13px; margin-top: 4px; }
  .header-meta {
    font-size: 13px;
    color: #4b5563;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-meta .email { font-family: ui-monospace, Menlo, Consolas, monospace; }

  /* Help button (opens FAQ modal) */
  .help-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #4b5563;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .help-btn:hover {
    background: #1f2937;
    color: #fff;
    border-color: #1f2937;
  }
  .help-btn:focus-visible {
    outline: 2px solid #93c5fd;
    outline-offset: 2px;
  }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .tag-admin   { background: #dcfce7; color: #166534; }
  .tag-manager { background: #dbeafe; color: #1e40af; }
  .tag-none    { background: #fee2e2; color: #991b1b; }

  /* Mock banner */
  .mock-banner {
    background: #fef3c7;
    border: 1px solid #fde68a;
    color: #92400e;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .control input[type="date"],
  .control select {
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    min-width: 140px;
  }
  .control input[type="date"]:focus,
  .control select:focus {
    outline: 2px solid #93c5fd;
    border-color: #3b82f6;
  }
  .btn {
    padding: 7px 14px;
    background: #1f2937;
    color: #fff;
    border: 0;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { background: #111827; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-secondary {
    background: #fff;
    color: #1f2937;
    border: 1px solid #d1d5db;
  }
  .btn-secondary:hover { background: #f3f4f6; color: #111827; }
  .control-reports { margin-left: auto; }

  /* Status */
  .status {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .status-loading { background: #eff6ff; color: #1e40af; }
  .status-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .status-empty   { background: #f3f4f6; color: #4b5563; }

  /* Table */
  .agents {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
  }
  .agents th, .agents td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid #f1f5f9;
  }
  .agents th:first-child, .agents td:first-child { text-align: left; }
  .agents thead th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .agents thead th:hover { background: #f3f4f6; }
  .agents thead th .arrow {
    display: inline-block;
    width: 10px;
    margin-left: 4px;
    color: #9ca3af;
    font-size: 10px;
  }
  .agents tbody tr:hover { background: #f9fafb; }
  .agents tbody td.agent-name { font-weight: 500; color: #111827; }
  .agents .num { font-variant-numeric: tabular-nums; }
  .agents .missed-high { color: #b91c1c; font-weight: 600; }

  .agents tfoot td {
    background: #f9fafb;
    font-weight: 600;
    border-top: 2px solid #e5e7eb;
    border-bottom: 0;
  }

  /* Footer info line (rows scanned, cache state, compute time) */
  .info-line {
    margin-top: 12px;
    font-size: 12px;
    color: #6b7280;
    text-align: right;
  }
  .info-line .pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    background: #f3f4f6;
    margin-left: 6px;
  }
  .info-line .pill-cache  { background: #dcfce7; color: #166534; }
  .info-line .pill-fresh  { background: #dbeafe; color: #1e40af; }

  /* Segmented control (scope toggle) */
  .segmented {
    display: inline-flex;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    overflow: hidden;
    background: #fff;
  }
  .seg-btn {
    padding: 7px 12px;
    background: #fff;
    color: #374151;
    border: 0;
    border-right: 1px solid #d1d5db;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    min-width: 70px;
  }
  .seg-btn:last-child { border-right: 0; }
  .seg-btn:hover { background: #f9fafb; }
  .seg-btn.active {
    background: #1f2937;
    color: #fff;
  }
  .seg-btn.active:hover { background: #111827; }

  /* Diagnostics panel */
  .diagnostics {
    margin-top: 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
  }
  .diagnostics summary {
    cursor: pointer;
    font-weight: 600;
    color: #374151;
    user-select: none;
    padding: 2px 0;
  }
  .diagnostics summary:hover { color: #111827; }
  .diag-count {
    color: #6b7280;
    font-weight: 400;
    margin-left: 4px;
  }
  .diag-section {
    margin-top: 12px;
  }
  .diag-section h3 {
    font-size: 12px;
    color: #6b7280;
    margin: 0 0 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .diag-section p { margin: 0; color: #4b5563; }
  .diag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .diag-chip {
    display: inline-block;
    padding: 2px 8px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    font-size: 12px;
    color: #1f2937;
  }
  .agents .via-queue td:first-child::after {
    content: " (queue-only)";
    font-size: 11px;
    color: #d97706;
    font-weight: 400;
    margin-left: 4px;
  }

  /* Access denied */
  .denied-card {
    max-width: 560px;
    margin: 60px auto;
    padding: 28px 32px;
    border-left: 4px solid #ef4444;
  }
  .denied-card h1 { font-size: 18px; margin-bottom: 10px; }
  .denied-card p { color: #4b5563; margin: 8px 0; }
  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    margin: 16px 0;
    font-size: 13px;
  }
  .kv dt { color: #6b7280; font-weight: 500; }
  .kv dd { margin: 0; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .small { font-size: 12px; color: #6b7280; }

  /* Modal (used by Help & FAQ; will be reused by upcoming report modals) */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
  }
  .modal-panel {
    position: relative;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px 36px 24px;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 0;
    color: #6b7280;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: #f3f4f6;
    color: #111827;
  }
  .modal-panel h2 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 16px;
    color: #111827;
    padding-right: 40px;
  }
  .modal-content h3 {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    margin: 20px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-content h3:first-of-type { margin-top: 0; }
  .modal-content p {
    margin: 8px 0;
    color: #374151;
    line-height: 1.55;
  }
  .modal-content ul {
    margin: 8px 0 12px 0;
    padding-left: 20px;
  }
  .modal-content ul li {
    margin-bottom: 8px;
    color: #374151;
    line-height: 1.55;
  }
  .modal-content code {
    background: #f3f4f6;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .modal-content strong { color: #111827; }
  .modal-content a { color: #1d4ed8; text-decoration: none; }
  .modal-content a:hover { text-decoration: underline; }
  .modal-content em { color: #6b7280; }

  /* Wide modal variant (for reports with charts + tables) */
  .modal.modal-wide { padding: 16px; }
  .modal-panel.modal-panel-wide {
    max-width: 1200px;
    width: 100%;
    max-height: 92vh;
    padding: 24px 28px 20px;
  }

  /* Report summary line at top of report modals */
  .report-summary {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0 0 16px;
    padding: 12px 16px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
  }
  .report-summary .label { color: #6b7280; }
  .report-summary .val { color: #111827; font-weight: 600; }
  .report-summary .sep { color: #d1d5db; }

  /* Chart container — sized to give the radar a roughly square area
     within a centered ~480px box. maintainAspectRatio=true on the
     Chart.js side keeps the radar circular regardless of width. */
  .chart-section {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px 16px 10px;
    margin: 0 auto 16px;
    max-width: 480px;
  }
  .chart-section canvas {
    display: block;
    max-width: 100%;
  }

  /* Per-agent card grid for the Missed Calls report */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .agent-card .agent-name {
    font-weight: 600;
    color: #111827;
    margin-bottom: 4px;
  }
  .agent-card .agent-total {
    color: #6b7280;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .agent-card .missed-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 220px;
    overflow-y: auto;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .agent-card .missed-list li {
    padding: 2px 0;
    color: #374151;
    border-bottom: 1px solid #f3f4f6;
  }
  .agent-card .missed-list li:last-child { border-bottom: 0; }
  .agent-card .missed-list li.abandoned {
    color: #b91c1c;
    font-weight: 500;
  }
  .agent-card .missed-list .date {
    color: #6b7280;
    margin-right: 6px;
  }
  .agent-card.no-data {
    background: #f9fafb;
    color: #6b7280;
    text-align: center;
    padding: 20px;
  }
</style>
