<style>
  /* ==============================================================
     Design tokens — slate palette, warm-paper-inspired.
     Mirrors the Call Analyzer design bundle so the two tools read
     as siblings. Hex fallbacks declared first; modern browsers
     upgrade to OKLCH via @supports below. If html2canvas exports
     come back washed out, delete the @supports blocks and the hex
     fallbacks continue to work unchanged.

     Surfaces: --paper, --paper-2, --paper-card
     Text:     --ink (primary), --muted (secondary)
     Lines:    --line (hairline borders, dividers)
     Accent:   --accent, --accent-soft  (slate blue)
     Good:     --good,   --good-soft    (sage — admin / success)
     Warn:     --warn,   --warn-soft    (warm orange — negative valence)

     Fonts:    --display (Inter Tight), --ui (Inter), --mono (IBM Plex Mono)
     ============================================================== */
  :root {
    --paper:       #f6f7f9;
    --paper-2:     #eceef2;
    --paper-card:  #ffffff;
    --ink:         #101418;
    --muted:       #606872;
    --line:        #dadde3;

    --accent:      #4e7bc4;
    --accent-soft: #e3edf8;
    --good:        #3d9476;
    --good-soft:   #e0efe6;
    --warn:        #c66b4b;
    --warn-soft:   #f6e2d4;

    --display: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --ui:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono:    'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @supports (color: oklch(50% 0.1 240)) {
    :root {
      --accent:      oklch(55% 0.12 240);
      --accent-soft: oklch(93% 0.04 240);
      --good:        oklch(58% 0.10 160);
      --good-soft:   oklch(93% 0.04 160);
      --warn:        oklch(60% 0.16 30);
      --warn-soft:   oklch(93% 0.04 30);
    }
  }
  /* Dark mode overlay — toggled via body[data-mode="dark"] from the
     header button. Only the token values shift; every selector below
     keeps using the same var() refs. */
  body[data-mode="dark"] {
    --paper:       #0c0f14;
    --paper-2:     #151a22;
    --paper-card:  #13171e;
    --ink:         #ecf0f6;
    --muted:       #7d8694;
    --line:        #242a34;
    --accent-soft: #1d2945;
    --good-soft:   #1a2f24;
    --warn-soft:   #3a1e15;
  }
  @supports (color: oklch(50% 0.1 240)) {
    body[data-mode="dark"] {
      --accent-soft: oklch(28% 0.05 240);
      --good-soft:   oklch(26% 0.04 160);
      --warn-soft:   oklch(26% 0.05 30);
    }
  }

  /* Reset + baseline */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--ui);
    font-size: 14px;
    line-height: 1.55;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 {
    margin: 0;
    font-weight: 500;
    font-family: var(--display);
    letter-spacing: -0.2px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, select, input {
    font: inherit;
    color: inherit;
  }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }
  .card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  /* Header — document-style: small mono kicker over a display-font
     dept name. Hairline divider below. */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .dash-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .dash-header h1 {
    font-family: var(--display);
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.6px;
    line-height: 1.1;
    color: var(--ink);
  }
  /* Legacy .sub selector kept around in case any include reuses it. */
  .dash-header .sub {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .header-meta {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-meta .email { font-family: var(--mono); font-size: 12px; }

  /* Help button (opens FAQ modal) */
  .help-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper-card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .help-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .help-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Tags — warm-paper soft-bg pills with mono uppercase labels. */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .tag-admin   { background: var(--good-soft); color: var(--good); }
  .tag-manager { background: var(--accent-soft); color: var(--accent); }
  .tag-none    { background: var(--warn-soft); color: var(--warn); }

  /* Mock banner */
  .mock-banner {
    background: var(--warn-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 2px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* Controls — mono-uppercase kicker labels, sharp-cornered inputs. */
  .controls {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 18px;
  }
  .control { display: flex; flex-direction: column; gap: 6px; }
  .control label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .control input[type="date"],
  .control select {
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    min-width: 140px;
    font-family: var(--ui);
  }
  .control input[type="date"]:focus,
  .control select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 0;
    border-color: var(--accent);
  }
  .btn {
    padding: 7px 14px;
    background: var(--ink);
    color: var(--paper);
    border: 0;
    border-radius: 2px;
    font-family: var(--ui);
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-secondary {
    background: var(--paper-card);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { background: var(--paper-2); color: var(--ink); }
  .control-reports { margin-left: auto; }

  /* Status — flat soft-bg banners with a 3px valence stripe on the left
     instead of the prior pill chrome. Matches the Call Analyzer pattern. */
  .status {
    padding: 10px 14px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-size: 13px;
    border-left: 3px solid var(--line);
  }
  .status-loading { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); }
  .status-error   { background: var(--warn-soft);   color: var(--warn);   border-left-color: var(--warn); }
  .status-empty   { background: var(--paper-2);     color: var(--muted);  border-left-color: var(--muted); }

  /* Agents table — document-row aesthetic: hairline rows, no rounded
     card chrome, mono-uppercase column headers, mono numerics in the
     stat columns. Hover lifts the row with a subtle paper-2 tint.
     Top + bottom hairlines frame the table; .container provides the
     surrounding paper bg. */
  .agents {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper-card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .agents th, .agents td {
    padding: 11px 12px;
    text-align: right;
    border-bottom: 1px solid var(--line);
  }
  .agents tbody tr:last-child td { border-bottom: 0; }
  .agents th:first-child, .agents td:first-child {
    text-align: left;
    padding-left: 14px;
  }
  .agents th:last-child, .agents td:last-child { padding-right: 14px; }
  .agents thead th {
    background: var(--paper-2);
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--line);
  }
  .agents thead th:hover { color: var(--ink); }
  .agents thead th .arrow {
    display: inline-block;
    width: 10px;
    margin-left: 4px;
    color: var(--accent);
    font-size: 10px;
  }
  .agents tbody tr:hover { background: var(--paper-2); }
  .agents tbody td.agent-name {
    font-weight: 500;
    color: var(--ink);
    font-family: var(--ui);
  }
  .agents .num {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 12.5px;
  }
  .agents .missed-high { color: var(--warn); font-weight: 500; }

  .agents tfoot td {
    background: var(--paper-2);
    font-family: var(--mono);
    font-weight: 500;
    color: var(--ink);
    border-top: 1px solid var(--line);
    border-bottom: 0;
  }
  .agents tfoot td:first-child {
    font-family: var(--ui);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 11px;
    color: var(--muted);
  }

  /* Footer info line — mono kicker · status pills. Sits below the table
     and surfaces "rows scanned · cache state · compute time" telemetry. */
  .info-line {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }
  .info-line .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--paper-2);
    color: var(--muted);
    margin-left: 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .info-line .pill-cache  { background: var(--good-soft); color: var(--good); }
  .info-line .pill-fresh  { background: var(--accent-soft); color: var(--accent); }

  /* Segmented control (scope toggle) — sharp corners, mono-uppercase labels. */
  .segmented {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
    background: var(--paper-card);
  }
  .seg-btn {
    padding: 7px 14px;
    background: var(--paper-card);
    color: var(--muted);
    border: 0;
    border-right: 1px solid var(--line);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-width: 70px;
  }
  .seg-btn:last-child { border-right: 0; }
  .seg-btn:hover { background: var(--paper-2); color: var(--ink); }
  .seg-btn.active {
    background: var(--ink);
    color: var(--paper);
  }
  .seg-btn.active:hover { opacity: 0.88; }

  /* Diagnostics panel — hairline-bordered, sharp corners. The summary
     line is the click target; expanded content uses mono kicker
     subheaders for each section. */
  .diagnostics {
    margin-top: 24px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px 16px;
    font-size: 13px;
  }
  .diagnostics summary {
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    user-select: none;
    padding: 2px 0;
  }
  .diagnostics summary:hover { color: var(--ink); }
  .diag-count {
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }
  .diag-section {
    margin-top: 14px;
  }
  .diag-section h3 {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin: 0 0 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .diag-section p { margin: 0; color: var(--muted); }
  .diag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .diag-chip {
    display: inline-block;
    padding: 2px 8px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--ink);
  }
  .agents .via-queue td:first-child::after {
    content: " (queue-only)";
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--warn);
    font-weight: 500;
    margin-left: 6px;
  }

  /* Access denied — warn-stripe document panel. */
  .denied-card {
    max-width: 560px;
    margin: 60px auto;
    padding: 32px 36px;
    border-left: 3px solid var(--warn);
  }
  .denied-card h1 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin-bottom: 12px;
  }
  .denied-card p { color: var(--muted); margin: 8px 0; line-height: 1.6; }
  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 14px;
    margin: 18px 0;
    font-size: 13px;
  }
  .kv dt {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    align-self: center;
  }
  .kv dd { margin: 0; font-family: var(--mono); }
  .small { font-size: 12px; color: var(--muted); }

  /* Modal — paper panel with hairline border + soft drop shadow. Same
     chrome powers Help & FAQ and all four report modals. The shadow is
     intentionally subtle; the hairline border is the primary boundary. */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
  }
  .modal-panel {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px 40px 28px;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: var(--paper-2);
    color: var(--ink);
  }
  /* Modal header: optional kicker over the display-font title.
     Together they reproduce the kicker+title pattern used on the
     dashboard header. */
  .modal-kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
    padding-right: 40px;
  }
  .modal-panel h2 {
    font-family: var(--display);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.4px;
    line-height: 1.15;
    margin: 0 0 20px;
    color: var(--ink);
    padding-right: 40px;
  }
  /* Help-modal subsection headers — mono kicker, slightly larger
     letter-spacing than the dashboard kickers for vertical rhythm
     inside the modal. */
  .modal-content h3 {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    margin: 24px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .modal-content h3:first-of-type { margin-top: 0; }
  .modal-content p {
    margin: 8px 0;
    color: var(--ink);
    line-height: 1.6;
  }
  .modal-content ul {
    margin: 8px 0 14px 0;
    padding-left: 20px;
  }
  .modal-content ul li {
    margin-bottom: 8px;
    color: var(--ink);
    line-height: 1.6;
  }
  .modal-content code {
    background: var(--paper-2);
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 12px;
    font-family: var(--mono);
  }
  .modal-content strong { color: var(--ink); }
  .modal-content a { color: var(--accent); text-decoration: none; }
  .modal-content a:hover { text-decoration: underline; }
  .modal-content em { color: var(--muted); }

  /* Wide modal variant (report modals with charts + tables). */
  .modal.modal-wide { padding: 16px; }
  .modal-panel.modal-panel-wide {
    max-width: 1200px;
    width: 100%;
    max-height: 92vh;
    padding: 28px 32px 24px;
  }

  /* Report summary strip at the top of report modals — label / value
     pairs separated by hairline dividers. Mono labels for the kicker
     feel; bold values in the UI font. */
  .report-summary {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    margin: 0 0 18px;
    padding: 12px 16px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 13px;
  }
  .report-summary .label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .report-summary .val {
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .report-summary .sep { color: var(--line); }

  /* Chart row: grid that holds the radar chart on the left and (when
     visible) the bucket-detail drill-in on the right. With .no-detail
     the row collapses to a single centered column. */
  .chart-row {
    display: grid;
    gap: 16px;
    grid-template-columns: 480px minmax(0, 1fr);
    margin-bottom: 16px;
    align-items: start;
  }
  .chart-row.no-detail {
    grid-template-columns: 480px;
    justify-content: center;
  }
  .chart-section {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px 16px 10px;
    margin: 0;
    min-width: 0;
  }
  .chart-section canvas {
    display: block;
    max-width: 100%;
  }
  .chart-loading {
    margin: 0;
    padding: 80px 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* Drill-in panel that appears next to the chart when a bucket is
     clicked. Lives inside the .chart-row grid so it sits to the right
     of the chart; collapses entirely when display:none. */
  .bucket-detail {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 16px 14px;
    margin: 0;
    min-width: 0;
  }
  .bucket-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }
  .bucket-detail-header strong {
    font-size: 14px;
    color: var(--ink);
  }
  .link-btn {
    background: none;
    border: 0;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
  }
  .link-btn:hover { color: var(--ink); text-decoration: underline; }
  .bucket-detail-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 13px;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    max-height: 280px;
    overflow-y: auto;
  }
  .bucket-detail-list li {
    padding: 4px 0;
    border-bottom: 1px solid var(--paper-2);
    display: grid;
    grid-template-columns: 80px 1fr 110px;
    gap: 12px;
    align-items: baseline;
  }
  .bucket-detail-list li:last-child { border-bottom: 0; }
  .bucket-detail-list li.abandoned {
    color: var(--warn);
    font-weight: 500;
  }
  .bucket-detail-list .ring-date  { color: var(--muted); }
  .bucket-detail-list .ring-agent { color: var(--ink); font-family: var(--ui); }
  .bucket-detail-list .ring-time  { text-align: right; }
  /* Widen the time column when parent-id chips are present so the
     #1776... ID doesn't squeeze the timestamp out. */
  .bucket-detail-list li {
    grid-template-columns: 80px 1fr auto;
  }

  /* Parent-call-ID chip + copy button. Renders inline next to the
     siren on abandoned timestamps. Compact in normal flow, with the
     ID in monospace so it's recognizable at a glance and the copy
     button click target is large enough on mobile. */
  .parent-id {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
    padding: 1px 4px 1px 6px;
    border: 1px solid var(--warn-soft);
    border-radius: 999px;
    background: var(--warn-soft);
    font-size: 11px;
    line-height: 1.4;
    color: var(--warn);
    font-weight: 500;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .parent-id .pid-num {
    font-family: var(--mono);
    font-size: 10.5px;
  }
  .parent-id .pid-copy {
    border: 0;
    background: transparent;
    color: inherit;
    padding: 0 2px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    border-radius: 3px;
  }
  .parent-id .pid-copy:hover { background: var(--paper-2); }
  .parent-id .pid-copy.copied { color: var(--good); }

  /* Cross-queue overflow tag on queue-only entries:
     "[also rang Backup CSR]". Muted so it reads as metadata. */
  .also-in {
    margin-left: 6px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
    white-space: nowrap;
  }
  .bucket-detail-empty {
    color: var(--muted);
    font-size: 13px;
    margin: 0;
  }

  /* Queue-only abandoned section (no agent rang) — warn-stripe panel
     with a soft-bg fill. The 3px left stripe carries the urgency so the
     fill can stay quiet enough that the inner per-queue lists stay
     readable. */
  .queue-only-section {
    background: var(--warn-soft);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    border-radius: 2px;
    padding: 12px 16px 14px;
    margin-bottom: 16px;
  }
  .queue-only-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  .queue-only-header strong {
    color: var(--warn);
    font-family: var(--display);
    font-size: 14px;
    font-weight: 500;
  }
  .queue-only-header .muted {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .queue-only-card {
    margin-top: 10px;
  }
  .queue-only-card:first-child { margin-top: 0; }
  .queue-only-card .qname {
    color: var(--warn);
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .queue-only-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .queue-only-list li {
    color: var(--warn);
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
  }
  .queue-only-list li:last-child { border-bottom: 0; }
  .queue-only-list .ring-date { color: var(--muted); }
  .queue-only-list .ring-time { text-align: right; }

  /* Per-agent card grid for the Missed Calls report — hairline panels
     with mono name kicker + numeric timestamps in mono. */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .agent-card .agent-name {
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .agent-card .agent-total {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .agent-card .missed-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 220px;
    overflow-y: auto;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .agent-card .missed-list li {
    padding: 3px 0;
    color: var(--ink);
    border-bottom: 1px solid var(--paper-2);
  }
  .agent-card .missed-list li:last-child { border-bottom: 0; }
  .agent-card .missed-list li.abandoned {
    color: var(--warn);
    font-weight: 500;
  }
  .agent-card .missed-list .date {
    color: var(--muted);
    margin-right: 6px;
  }
  .agent-card.no-data {
    background: var(--paper-2);
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }

  /* -------- Individual Report modal -------------------------------- */
  /* Form: date picker + agent multi-select. Section titles use the
     mono-kicker convention; inputs match the dashboard's sharp-corner
     control language. */
  .ir-form { padding: 6px 4px; }
  .ir-section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 18px 0 12px;
  }
  .ir-section-title:first-child { margin-top: 0; }
  .ir-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 4px;
  }
  .ir-col label {
    display: block;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .ir-col select,
  .ir-col input[type="date"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    box-sizing: border-box;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
  }
  .ir-hint { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.55; }
  .ir-loader { padding: 0; }
  .ir-skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
    padding: 10px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .ir-skeleton-row {
    height: 24px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--paper-2) 0%, var(--line) 50%, var(--paper-2) 100%);
    background-size: 200% 100%;
    animation: irShimmer 1.2s linear infinite;
  }
  .ir-skeleton-label {
    text-align: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  @keyframes irShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* No-data empty state shown when every selected agent had zero
     activity in the chosen range. */
  .ir-empty-card {
    background: var(--paper-card);
    border: 1px dashed var(--line);
    border-radius: 2px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 14px;
  }
  .ir-empty-icon  { font-size: 28px; opacity: 0.45; margin-bottom: 6px; }
  .ir-empty-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .ir-empty-sub   { font-size: 12px; color: var(--muted); }
  .ir-agent-list {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    background: var(--paper-2);
    padding: 5px 8px;
    border-radius: 2px;
    cursor: pointer;
    user-select: none;
  }
  .ir-agent-item input { margin-right: 6px; transform: scale(1.05); }
  .ir-agent-empty { padding: 12px; font-size: 13px; color: var(--muted); text-align: center; }

  /* Active / inactive groupings inside the agent picker. Active
     items render normally; inactive (no data in range) get muted
     styling so they're still pickable but visually de-prioritized. */
  .ir-agent-group-label {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 8px 2px 4px;
  }
  .ir-agent-group-label-muted { color: var(--muted); margin-top: 12px; }
  .ir-agent-group-count { color: var(--muted); font-weight: 500; }
  .ir-agent-group {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .ir-agent-group-muted .ir-agent-item {
    background: var(--paper-2);
    color: var(--muted);
    font-style: italic;
  }
  .ir-agent-group-muted .ir-agent-item input { accent-color: var(--muted); }

  /* Collapsible inactive group. Hides the default disclosure marker
     and renders our own caret next to the label that rotates when
     the details element is open. */
  .ir-agent-details { grid-column: 1 / -1; }
  .ir-agent-details > summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .ir-agent-details > summary::-webkit-details-marker { display: none; }
  .ir-agent-details > summary::before {
    content: "\25B8";   /* right-pointing triangle */
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: var(--muted);
    margin-right: 2px;
    transition: transform 0.15s ease;
  }
  .ir-agent-details[open] > summary::before {
    transform: rotate(90deg);
  }
  .ir-agent-details > .ir-agent-group { margin-top: 6px; }

  /* Search row shared by main form picker and edit popover. */
  .ir-search-row { margin-bottom: 8px; }
  .ir-search-row input[type="search"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: var(--ui);
    font-size: 13px;
    background: var(--paper-card);
    box-sizing: border-box;
  }
  .ir-search-row input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .ir-agent-actions {
    text-align: right;
    margin: 8px 2px 14px;
    font-size: 12px;
  }
  .ir-agent-actions a { color: var(--accent); text-decoration: none; }
  .ir-agent-actions a:hover { text-decoration: underline; }
  .ir-agent-actions .sep { color: var(--line); margin: 0 6px; }

  /* Results area — hairline divider with the report title in display
     font + mono date strip. Mirrors the dashboard header pattern at a
     smaller scale. */
  .ir-results { padding-top: 4px; }
  .ir-results-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ir-results-header-left { flex: 1; min-width: 0; }
  .ir-results-title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; }
  .ir-results-title {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .ir-results-date  {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .ir-action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .ir-action-buttons .btn { width: auto; padding: 6px 12px; font-size: 12px; }

  /* Export dropdown: single button collapses Copy / Email / Print
     menu items. Caret rotates slightly when the menu is open. */
  .ir-export-wrap { position: relative; display: inline-block; }
  .ir-export-caret {
    display: inline-block;
    margin-left: 4px;
    font-size: 9px;
    transition: transform 0.15s;
  }
  #ir-export-btn.open .ir-export-caret { transform: rotate(180deg); }
  .ir-export-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
    min-width: 160px;
    padding: 4px;
    z-index: 100;
  }
  .ir-export-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
  }
  .ir-export-menu button:hover { background: var(--paper-2); }

  /* "Showing: Sarah, Maria · change" sticky in the results header.
     Click the change link to open the inline edit popover. */
  .ir-editing-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .ir-editing-label { font-weight: 600; color: var(--muted); }
  .ir-editing-agents {
    color: var(--ink);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60vw;
  }
  .ir-editing-edit {
    background: transparent;
    border: 0;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0 2px;
    text-decoration: underline;
  }
  .ir-editing-edit:hover { color: var(--accent); }

  /* Edit-selection popover: floats below the results header,
     contains a compact agent picker that lets the user re-run
     the report with different agents without going back to the
     form. */
  .ir-edit-popover {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    padding: 14px 16px;
    margin: 0 0 14px;
  }
  .ir-edit-popover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .ir-edit-popover-close {
    background: transparent;
    border: 0;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
  }
  .ir-edit-popover-close:hover { color: var(--ink); }
  .ir-agent-list-compact { max-height: 220px; }
  .ir-edit-popover-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
  }
  .ir-edit-popover-actions a { color: var(--accent); text-decoration: none; }
  .ir-edit-popover-actions a:hover { text-decoration: underline; }
  .ir-edit-popover-actions .sep { color: var(--line); }
  .ir-edit-popover-actions .btn {
    margin-left: auto;
    width: auto;
    padding: 6px 14px;
    font-size: 12px;
  }

  /* Sort dropdown above the per-agent summary cards. Only shown
     in peer-comparison mode (2+ agents); hidden for single-agent
     reports where sort is meaningless. */
  .ir-cards-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .ir-sort-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--paper-card);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--muted);
  }
  .ir-sort-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }
  .ir-sort-control select {
    background: transparent;
    border: 0;
    padding: 2px 4px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
  }
  .ir-sort-control select:focus { outline: none; }

  /* Per-agent summary card — hairline panel with display-font agent
     name. KPI grid below uses paper-2 inner tiles for separation. */
  .ir-summary-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .ir-summary-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ir-summary-title .ir-vs {
    font-family: var(--mono);
    font-weight: 400;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .ir-copy-tsv {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent-soft);
    border-radius: 2px;
    padding: 4px 9px;
    cursor: pointer;
  }
  .ir-copy-tsv:hover { background: var(--accent-soft); }

  /* KPI tile grid: a single row of metric tiles per agent. Big
     number + sparkline up top, team-avg + delta badge below. */
  .ir-kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .ir-kpi-tile {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  .ir-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ir-kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .ir-kpi-spark { height: 22px; line-height: 0; }
  .ir-spark-svg { display: block; }
  .ir-kpi-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .ir-kpi-value {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--ink);
    line-height: 1.05;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Subtle "X.X% of dept" tag inline with the big value. Mono so it
     reads as metadata; the display-font absolute number stays primary. */
  .ir-kpi-share {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Insights callout — rendered above the KPI grid per agent.
     3px accent stripe + soft-bg fill, mono kicker, lists up to
     3 rules-based observations vs team avg. */
  .ir-insights {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .ir-insights-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .ir-insights-list {
    margin: 0;
    padding-left: 0;
    list-style: none;
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.5;
  }
  .ir-insight-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 3px 0;
  }
  .ir-insight-text { flex: 1; }
  /* Colored circular markers double-encode direction: blue / up
     arrow = positive, orange / down arrow = negative, grey / bullet
     = neutral. Color + shape distinction so CVD users get the same
     signal as everyone else. */
  .ir-insight-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ir-insight-mark-positive { background: var(--accent-soft); color: var(--accent); }
  .ir-insight-mark-negative { background: var(--warn-soft); color: var(--warn); }
  .ir-insight-mark-neutral  { background: var(--paper-2); color: var(--muted); }
  .ir-kpi-row-bot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ir-kpi-team {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 900px) {
    .ir-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .ir-badge {
    padding: 3px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: inline-block;
    min-width: 60px;
    text-align: center;
  }
  /* Diverging blue (good) / orange (bad) pair instead of green/red:
     readable for deuteranopia + protanopia users, who can't reliably
     distinguish red and green badges. */
  .ir-badge-pos { background: var(--accent-soft); color: var(--accent); }
  .ir-badge-neg { background: var(--warn-soft); color: var(--warn); }
  .ir-badge-neu { background: var(--paper-2); color: var(--ink); }

  /* Charts: stacked grid. Volume goes full-width, efficiency + duration
     side-by-side below. */
  .ir-toggle-box { text-align: right; margin: 4px 4px 10px; }
  .ir-toggle-label {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: var(--paper-card);
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-weight: 500;
  }
  .ir-toggle-label:hover { background: var(--paper-2); }
  .ir-toggle-label input { margin-right: 6px; }

  /* Tabbed chart container: only one of Volume/Efficiency/Duration
     is visible at a time so each gets the full container width. */
  .ir-chart-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .ir-tab {
    background: transparent;
    border: 0;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .ir-tab:hover { color: var(--ink); }
  .ir-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Shared chip legend rendered above the chart panels in
     comparison mode. Each chip toggles its agent's series across
     all three charts; hover dims the others. */
  .ir-shared-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 4px;
    margin-bottom: 6px;
  }
  .ir-legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .ir-legend-chip:hover { background: var(--paper-2); }
  .ir-legend-chip.inactive {
    opacity: 0.42;
    text-decoration: line-through;
  }
  .ir-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--chip-color, var(--accent));
    flex-shrink: 0;
  }
  .ir-legend-name { font-weight: 500; }

  .ir-chart-area { display: block; }
  .ir-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 420px;
    display: flex;
    flex-direction: column;
  }
  .ir-chart-header {
    text-align: center;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .ir-chart-canvas-wrap { flex: 1; position: relative; }

  /* Reset .btn defaults that look out of place inside the modal. */
  #individual-modal .btn { width: auto; }

  /* -------- Performance Report ----------------------------------- */
  /* Inline prior-period hint on the form -- shows the user what
     "vs prior" will compare against before they click Generate. */
  .pr-prior-hint {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin: -4px 2px 12px;
  }
  /* Side-by-side current vs prior date display in the results
     header. Replaces the inline "(date)" + a quiet "Comparing
     against..." line with a single structured pair. */
  .pr-date-pair {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 4px;
  }
  .pr-date-block {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 8px 12px;
    line-height: 1.3;
    min-width: 0;
  }
  .pr-date-current { border-left: 3px solid var(--accent); }
  .pr-date-prior   { border-left: 3px solid var(--muted); }
  .pr-date-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .pr-date-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .pr-date-divider {
    align-self: center;
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
  }

  /* Subset hint banner: appears when the user picked fewer than
     the full roster. Accent-stripe panel reads as "selection
     scope is limited". */
  .pr-subset-hint {
    background: var(--accent-soft);
    color: var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 9px 14px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  /* KPI tile row at the top of the report: 6 tiles, big number +
     delta vs prior period. Distinct from the Individual Report's
     KPI tiles -- no sparkline, no team-avg context. */
  .pr-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .pr-kpi-tile {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  /* Label + inline sparkline on the top row. Mirrors the IR
     summary-card tile layout for visual consistency. */
  .pr-kpi-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .pr-kpi-spark { height: 22px; line-height: 0; }
  .pr-kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .pr-kpi-value {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--ink);
    line-height: 1.05;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pr-kpi-delta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .pr-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .pr-delta-pos { background: var(--accent-soft); color: var(--accent); }
  .pr-delta-neg { background: var(--warn-soft); color: var(--warn); }
  .pr-delta-neu { background: var(--paper-2); color: var(--muted); }
  .pr-delta-cap {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  @media (max-width: 1100px) {
    .pr-kpi-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .pr-kpi-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* Per-agent table — document-row aesthetic matching the main
     agent table, scoped to the Performance Report. */
  .pr-agent-table-wrap { overflow-x: auto; margin-bottom: 18px; }
  .pr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: var(--paper-card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .pr-agent-table th, .pr-agent-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .pr-agent-table th {
    background: var(--paper-2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .pr-agent-table .num {
    text-align: right;
    font-family: var(--mono);
  }
  .pr-agent-table tbody tr:last-child td { border-bottom: 0; }
  .pr-agent-table tbody tr:hover { background: var(--paper-2); }

  /* Sortable headers: cursor + hover affordance + active-sort
     highlight when this column is the current sort key. */
  .pr-th-sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .pr-th-sortable:hover { background: var(--paper-2) !important; color: var(--ink) !important; }

  /* Sub-tabs inside the 12-Month Trend chart panel: switches the
     metric shown on the line chart (Answered / % Answered / ATT). */
  .pr-trend-subtabs {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .pr-trend-subtab {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pr-trend-subtab:hover { background: var(--paper-2); }
  .pr-trend-subtab.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }

  /* -------- Compare Ranges Report -------------------------------- */
  /* Period blocks in the form — sharp-cornered panels with a 3px left
     stripe encoding baseline (muted) vs comparison (accent). */
  .cr-period-block {
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 12px 14px 4px;
    margin-bottom: 12px;
    background: var(--paper-2);
  }
  .cr-period-baseline { border-left-color: var(--muted); }
  .cr-period-compare  { border-left-color: var(--accent); }
  .cr-period-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .cr-period-baseline .cr-period-label { color: var(--muted); }
  .cr-period-compare  .cr-period-label { color: var(--accent); }

  /* Centered Swap button — sharp pill with mono label. */
  .cr-swap-row {
    display: flex;
    justify-content: center;
    margin: -2px 0 10px;
  }
  .cr-swap-btn {
    background: var(--paper-card);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 2px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cr-swap-btn:hover { background: var(--paper-2); color: var(--ink); }

  /* Period length hint below the date blocks — mono so it reads as
     metadata; check/warn variants tinted via --good / --warn. */
  .cr-length-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin: -4px 2px 14px;
    letter-spacing: 0.04em;
  }
  .cr-length-spec strong { color: var(--ink); font-weight: 500; }
  .cr-length-ok { color: var(--good); font-weight: 500; }
  .cr-length-warn { color: var(--warn); font-weight: 500; }

  /* Length-mismatch banner — warn-stripe panel with soft-bg fill,
     same shape as the queue-only section so the visual grammar of
     "this needs attention" is consistent across the app. */
  .cr-length-warning {
    background: var(--warn-soft);
    color: var(--warn);
    border-left: 3px solid var(--warn);
    border-radius: 2px;
    padding: 10px 14px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }
  .cr-length-warning strong { color: var(--warn); font-weight: 500; }

  /* Per-day caption inside KPI tiles (volume + time metrics
     when length-mismatch). Small mono line under the delta. */
  .pr-kpi-perday {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px dashed var(--line);
    margin-top: 6px;
    padding-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .pr-kpi-perday strong { color: var(--ink); font-weight: 500; }

  /* Comparison chart wrapper: matches the ir-chart-wrap shape but
     fixed taller height for the bar chart. */
  .cr-chart-wrap {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--paper-card);
    padding: 14px;
    height: 380px;
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .cr-chart-summary {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .cr-chart-summary strong { color: var(--ink); font-weight: 500; }

  /* Per-agent cards stack vertically; on wide screens flow into a
     two-column grid for density. */
  .cr-agent-cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 1200px) {
    .cr-agent-cards { grid-template-columns: 1fr 1fr; }
  }
  .cr-agent-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 14px 16px;
  }
  /* Left-stripe color encodes the agent's aggregate direction
     across the 4 valenced metrics so scanning the grid surfaces
     the movers without reading every cell. */
  .cr-card-improved  { border-left-color: var(--accent); }
  .cr-card-regressed { border-left-color: var(--warn); }
  .cr-card-mixed     { border-left-color: var(--muted); }

  .cr-agent-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 10px;
  }
  /* "vs Team" badge in card header. Three states: above team,
     in line, below team. Same color tokens as the existing
     valence palette for consistency. */
  .cr-vs-team {
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-left: auto;
  }
  .cr-vs-team-pos  { background: var(--accent-soft); color: var(--accent); }
  .cr-vs-team-neg  { background: var(--warn-soft); color: var(--warn); }
  .cr-vs-team-flat { background: var(--paper-2); color: var(--muted); }

  /* Per-cell "X/day" annotation inside the cards' P1/P2 cells
     when periods differ. Mono so it reads as metadata. */
  .cr-cell-perday {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Collapsible "quiet agents" section below the main card grid.
     Agents whose metrics didn't move beyond the noise floor are
     stashed here so the main grid focuses on the notable movers. */
  .cr-quiet-details {
    margin-top: 14px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .cr-quiet-summary {
    cursor: pointer;
    user-select: none;
    list-style: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .cr-quiet-summary::-webkit-details-marker { display: none; }
  .cr-quiet-summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: 4px;
    font-size: 10px;
    transition: transform 0.15s ease;
  }
  .cr-quiet-details[open] > .cr-quiet-summary::before {
    transform: rotate(90deg);
  }
  .cr-quiet-details .cr-agent-card { opacity: 0.85; }
  .cr-agent-name {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .cr-agent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .cr-agent-table th {
    text-align: left;
    padding: 7px 8px;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .cr-agent-table td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--paper-2);
    color: var(--ink);
    font-family: var(--mono);
  }
  .cr-agent-table .num { text-align: right; }
  .cr-agent-table tbody tr:last-child td { border-bottom: 0; }
  .cr-metric {
    font-family: var(--ui);
    font-weight: 500;
    color: var(--muted);
  }

  /* -------- Alerts modal (admin-only) ---------------------------- */
  /* All color values use the design-system tokens (introduced by
     the visual-redesign branch) so the modal participates in the
     light/dark mode toggle. */
  .al-section { margin-bottom: 22px; }
  .al-section-title {
    font-weight: 600;
    color: var(--accent);
    border-bottom: 2px solid var(--line);
    padding-bottom: 4px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .al-hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
  .al-hint a { color: var(--accent); text-decoration: none; }
  .al-hint a:hover { text-decoration: underline; }

  /* Config table + log table + results table share base
     treatment so the alerts modal reads as a single panel. */
  .al-config-table, .al-log-table, .al-results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .al-config-table th, .al-log-table th, .al-results-table th {
    background: var(--paper-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
  }
  .al-config-table td, .al-log-table td, .al-results-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
  }
  .al-config-table .num,
  .al-log-table .num,
  .al-results-table .num { text-align: right; }
  .al-config-table tbody tr:last-child td,
  .al-log-table tbody tr:last-child td,
  .al-results-table tbody tr:last-child td { border-bottom: 0; }
  .al-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 16px;
  }
  .al-empty-inline { color: var(--muted); opacity: 0.7; }
  .al-active {
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .al-active-yes { background: var(--accent-soft); color: var(--accent); }
  .al-active-no  { background: var(--paper-2);     color: var(--muted); }

  /* Run section: date + Preview + Send sit on one row; results
     summary + table render below when populated. */
  .al-run-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .al-run-row label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .al-run-row input[type="date"] {
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--paper-card);
    color: var(--ink);
  }
  .al-run-row .btn { width: auto; padding: 6px 14px; font-size: 13px; }
  .al-results-summary {
    font-size: 12px;
    color: var(--muted);
    margin: 10px 0 6px;
    font-style: italic;
  }
  .al-recipients-cell {
    max-width: 320px;
    word-break: break-word;
    font-size: 12px;
  }
  /* Subtle row tinting by status so the "will alert" rows pop.
     Soft-tint tokens carry through into dark mode automatically. */
  .al-row-would-send,
  .al-row-sent { background: var(--warn-soft); }
  .al-row-above-threshold { background: var(--good-soft); }
  .al-row-error,
  .al-row-no-recipients { background: var(--warn-soft); }

  .al-trigger-actions { display: flex; gap: 8px; }
  .al-trigger-actions .btn { width: auto; padding: 6px 14px; font-size: 12px; }

  /* -------- Print stylesheet ------------------------------------- */
  /* Only activates when the user clicks Print on the Individual
     Report; the body gets `.ir-printing` set just before
     window.print() and unset right after. Everything outside the
     report panel is hidden so the page contains just the report. */
  @media print {
    body.ir-printing > .container { display: none !important; }
    body.ir-printing .modal-backdrop { display: none !important; }
    body.ir-printing #individual-modal {
      position: static !important;
      background: transparent !important;
    }
    body.ir-printing #individual-modal .modal-panel {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: none !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    body.ir-printing #individual-form,
    body.ir-printing .modal-close,
