      return dt.getUTCFullYear() + '-' + String(dt.getUTCMonth() + 1).padStart(2, '0')
        + '-' + String(dt.getUTCDate()).padStart(2, '0');
    };
    return { from: iso(start), to: latestIso };
  }
  let ovTablePeriodWired = false;
  function ovWireTablePeriodBar_() {
    const bar = $('ov-user-table-period');
    if (!bar) return;
    bar.querySelectorAll('.ov-period-btn').forEach(function (b) {
      const on = b.getAttribute('data-period') === ovTablePeriod;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    if (ovTablePeriodWired) return;
    ovTablePeriodWired = true;
    bar.addEventListener('click', function (e) {
      const b = e.target.closest('.ov-period-btn');
      if (!b) return;
      const p = b.getAttribute('data-period');
      if (!OV_CARD_PERIODS_[p] || p === ovTablePeriod) return;
      ovTablePeriod = p;
      try { localStorage.setItem(OV_TABLE_PERIOD_KEY_, p); } catch (e2) { /* best-effort */ }
      if (ovLastData) ovRenderUserTable_(ovLastData);
    });
  }

  // Period bar above the dept grid (static markup). Syncs the active button on
  // every render; wires the click once. Switching re-renders only the cards
  // (hero + grid) from ovLastData -- no re-fetch; the chart/sparklines
  // (period-independent) are left alone.
  let ovPeriodBarWired = false;
  function ovWirePeriodBar_() {
    const bar = $('ov-period-bar');
    if (!bar) return;
    bar.querySelectorAll('.ov-period-btn').forEach(function (b) {
      const on = b.getAttribute('data-period') === ovCardPeriod;
      b.classList.toggle('active', on);
      b.setAttribute('aria-checked', on ? 'true' : 'false');
    });
    if (ovPeriodBarWired) return;
    ovPeriodBarWired = true;
    bar.addEventListener('click', function (e) {
      const b = e.target.closest('.ov-period-btn');
      if (!b) return;
      const p = b.getAttribute('data-period');
      if (!OV_CARD_PERIODS_[p] || p === ovCardPeriod) return;
      ovCardPeriod = p;
      try { localStorage.setItem(OV_CARD_PERIOD_KEY_, p); } catch (e2) { /* best-effort */ }
      if (ovLastData) { ovRenderUserHero_(ovLastData); ovRenderTiles_(ovLastData); }
    });
  }

  function ovBuildHeroTile_(dept, color) {
    const st = ovPeriodStats_(dept);
    const trend = (dept.trend || []).map(function (v) { return v == null ? 0 : v; });
    const spark = irSparkline_(trend, color);
    const subTag = dept.parent
      ? '<span class="ov-dept-parent-tag">sub-queue &middot; ' + escapeHtml(dept.parent) + '</span>'
      : '';
    return '<div class="ov-dept-tile ov-dept-tile-hero" data-dept="' + escapeHtml(dept.name) + '" style="border-top-color:' + color + ';">'
         +   '<div class="ov-dept-tile-head">'
         +     '<div>'
         +       '<div class="ov-hero-kicker">Your department</div>'
         +       '<span class="ov-dept-name ov-hero-name">' + escapeHtml(dept.name) + '</span>'
         +       (subTag ? ' ' + subTag : '')
         +     '</div>'
         +     '<div class="ov-hero-meta">'
         +       ovBuildAlertPill_(dept)
         +       '<span class="ov-dept-active" title="' + escapeHtml(ovActiveTooltip_(dept)) + '">'
         +         dept.activeAgents + ' of ' + (dept.recentlyActiveCount != null ? dept.recentlyActiveCount : dept.rosterSize) + ' agents active'
         +       '</span>'
         +     '</div>'
         +   '</div>'
         +   '<div class="ov-hero-body">'
         +     '<div class="ov-hero-pct-block">'
         +       '<div class="ov-hero-pct" data-flash-key="ov:' + escapeHtml(dept.name) + '">' + escapeHtml(st.pctFormatted) + '</div>'
         +       '<div class="ov-dept-pct-cap">' + escapeHtml(ovPeriodCap_()) + '</div>'
         +       ovBuildWowChip_(dept)
         +     '</div>'
         +     '<div class="ov-hero-stats">'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Rung</span><span>' + fmtNumber(st.rung) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Answered</span><span>' + fmtNumber(st.answered) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Missed</span><span>' + fmtNumber(st.missed) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">ATT</span><span>' + escapeHtml(st.attFormatted) + '</span></div>'
         +     '</div>'
         +     '<div class="ov-hero-spark" title="30-day % answered trend">' + spark + '</div>'
         +   '</div>'
         + '</div>';
  }

  function ovBuildWowChip_(dept) {
    if (!dept.wow) return '';
    const d = Number(dept.wow.deltaPct) || 0;
    const arrow = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
    let cls = 'ov-wow-flat';
    if (d > 0.5)  cls = 'ov-wow-up';
    if (d < -0.5) cls = 'ov-wow-down';
    const tip = 'Last 7 days ' + dept.wow.curPct.toFixed(1) + '% vs prior 7 days '
              + dept.wow.prevPct.toFixed(1) + '%';
    return '<span class="ov-wow-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         + arrow + ' ' + Math.abs(d).toFixed(1) + '% WoW</span>'
         + ovBuildQcdCaption_(dept);
  }

  // QCD info that isn't already covered by DQE on the dept tile.
  // Two chips:
  //   - "Abandoned: N (P%)" — always rendered when QCD data exists,
  //     warn-tinted when % >= 5% (pipeline's violation threshold).
  //   - "X viol MTD" — month-to-date violations across this dept's
  //     mapped queues; only rendered when X > 0.
  // Tooltip on the abandoned chip carries the latest-date context.
  // Chip budget: how many per-queue rows a multi-queue tile shows
  // before collapsing the rest into a "+N more" summary, so a tile
  // stays scannable instead of stacking a row+chips per queue.
  var OV_QCD_QUEUE_BUDGET = 3;
  function ovBuildQcdCaption_(dept) {
    if (!dept || !dept.qcd) return '';
    var q = dept.qcd;
    var queues = q.perQueue || [];
    var multiQueue = queues.length > 1;
    var html = '';

    if (multiQueue) {
      // Worst-first so the few chips that DO show are the ones that
      // matter (most violations, then highest abandoned %).
      var sorted = queues.slice().sort(function (a, b) {
        return (Number(b.violations)   || 0) - (Number(a.violations)   || 0)
            || (Number(b.abandonedPct) || 0) - (Number(a.abandonedPct) || 0)
            || (Number(b.abandoned)    || 0) - (Number(a.abandoned)    || 0);
      });
      var shown  = sorted.slice(0, OV_QCD_QUEUE_BUDGET);
      var hidden = sorted.slice(OV_QCD_QUEUE_BUDGET);
      html += '<div class="ov-qcd-queue-list">';
      shown.forEach(function (pq) {
        var qPct = Number(pq.abandonedPct) || 0;
        var qAbnd = Number(pq.abandoned) || 0;
        var qViol = Number(pq.violations) || 0;
        // One combined abandoned chip ("P% · N aban") instead of two
        // separate chips, to cut the per-row chip count.
        var abndText = escapeHtml(pq.abandonedPctStr || '0.00%')
          + (qAbnd > 0 ? ' · ' + fmtNumber(qAbnd) + ' aban' : '');
        var chips = '<span class="ov-qcd-flag'
              + (qPct >= 5 ? ' ov-qcd-violation' : ' ov-qcd-elevated') + '">'
              + abndText + '</span>';
        if (qViol > 0) {
          chips += '<span class="ov-qcd-flag ov-qcd-violation">' + qViol + ' viol</span>';
        }
        html += '<div class="ov-qcd-queue-row"><span class="ov-qcd-queue-name">'
             + escapeHtml(pq.queue) + '</span>' + chips + '</div>';
      });
      if (hidden.length) {
        var moreTitle = hidden.map(function (pq) {
          return pq.queue + ': ' + (pq.abandonedPctStr || '0.00%')
            + ((Number(pq.violations) || 0) > 0 ? ' (' + pq.violations + ' viol)' : '');
        }).join(' • ');
        html += '<div class="ov-qcd-queue-more" title="' + escapeHtml(moreTitle) + '">'
             + '+' + hidden.length + ' more queue' + (hidden.length === 1 ? '' : 's')
             + '</div>';
      }
      html += '</div>';
    } else {
      var pct = Number(q.abandonedPct) || 0;
      var abandoned = Number(q.abandoned) || 0;
      var abndCls = pct >= 5 ? 'ov-qcd-flag ov-qcd-violation' : 'ov-qcd-flag ov-qcd-elevated';
      html += '<span class="' + abndCls + '">'
           + escapeHtml(q.abandonedPctStr || '0.00%') + '</span>';
      if (abandoned > 0) {
        html += '<span class="' + abndCls + '">'
             + fmtNumber(abandoned) + ' aban</span>';
      }
    }

    var mtdViol = Number(q.violationsMtd) || 0;
    if (mtdViol > 0) {
      html += '<span class="ov-qcd-flag ov-qcd-violation" title="'
            + mtdViol + ' QCD violation' + (mtdViol === 1 ? '' : 's')
            + ' month-to-date">' + mtdViol + ' viol MTD</span>';
    }
    return html;
  }

  // RETIRED (#4): the "what changed" per-agent driver callout (e.g.
  // "Sarah +12 answered") was removed from the Overview cards -- naming a
  // specific agent on the dept tile read as clutter, not at-a-glance. The
  // server still computes dept.wow.driver (used by the manager digest's
  // own narrative, INV-48); it's just no longer rendered on the cards.
  // Kept as a no-op so any stray caller renders nothing.
  function ovBuildWowDriver_(dept) { return ''; }

  // Tooltip text for the active-agents caption. Spells out the
  // three counts (today's active / recently active / full roster)
  // so the user understands why the denominator isn't the full
  // roster size -- ex-employees on the roster sheet (kept for
  // historical-data preservation) get filtered out of the
  // "recently active" count.
  function ovActiveTooltip_(rec) {
    if (!rec) return '';
    const recent  = rec.recentlyActiveCount;
    const roster  = rec.rosterSize;
    const parts = [];
    parts.push(rec.activeAgents + ' agent(s) had activity on the latest date');
    if (recent != null) {
      parts.push(recent + ' agent(s) had activity in the past 30 days (the denominator)');
    }
    if (roster != null) {
      parts.push(roster + ' agent(s) on the full roster sheet');
    }
    return parts.join('. ') + '.';
  }

  function ovBuildAlertPill_(dept) {
    if (!dept.alertedOnLatest) return '';
    return '<span class="ov-alert-pill" title="A low-answer-rate alert was sent for this department on the latest data date.">'
         + '<span aria-hidden="true">🚨</span> Alerted today</span>';
  }

  // Shared grid tile builder. Used by both the main grid and the
  // hero block (for parent-viewers' nested child sub-queues).
  // Set `isChild=true` for sub-queues -- they pick up the
  // accent-tinted background + tree-line connector via CSS.
  function ovBuildGridTile_(dept, color, isChild, routable, isViewer) {
    const st = ovPeriodStats_(dept);
    const spark = irSparkline_(
      (dept.trend || []).map(function (v) { return v == null ? 0 : v; }),
      color);
    const parentTag = isChild
      ? '<span class="ov-dept-parent-tag">sub-queue &middot; ' + escapeHtml(dept.parent) + '</span>'
      : '';
    // The viewer's own dept (manager) / selected dept (admin) is folded into
    // the grid as the FIRST card with a distinctive border + "your dept"
    // badge (replaces the old full-width hero above the chart).
    // R7 (O-3): in View-as-Manager the badge reads 'My Dept' like the real
    // manager experience being previewed -- isAllDeptViewer_() alone stays
    // true there (the client USER is still the admin), which kept the badge
    // on 'selected' mid-preview.
    const viewerBadge = isViewer
      ? '<span class="ov-dept-viewer-badge">' + ((isAllDeptViewer_() && !viewAsDept_) ? 'selected' : 'My Dept') + '</span>'
      : '';
    const cls = 'ov-dept-tile'
              + (isChild ? ' ov-dept-tile-child' : '')
              + (isViewer ? ' ov-dept-tile-viewer' : '')
              + (routable ? ' ov-dept-tile-clickable' : '');
    return '<div class="' + cls + '" data-dept="' + escapeHtml(dept.name) + '">'
         +   '<div class="ov-dept-tile-head">'
         +     '<span class="ov-dept-name">' + escapeHtml(dept.name) + viewerBadge + '</span>'
         +     '<span class="ov-dept-active" title="' + escapeHtml(ovActiveTooltip_(dept)) + '">'
         +       dept.activeAgents + ' of ' + (dept.recentlyActiveCount != null ? dept.recentlyActiveCount : dept.rosterSize) + ' agents'
         +     '</span>'
         +   '</div>'
         +   parentTag
         +   ovBuildAlertPill_(dept)
         +   '<div class="ov-dept-tile-pct">'
         +     '<span data-flash-key="ov:' + escapeHtml(dept.name) + '">' + escapeHtml(st.pctFormatted) + '</span>'
         +     ' <span class="ov-dept-pct-cap">' + escapeHtml(ovPeriodCap_()) + '</span>'
         +     ovBuildWowChip_(dept)
         +   '</div>'
         +   '<div class="ov-dept-tile-row">'
         +     '<span><span class="ov-dept-stat-label">Rung</span> ' + fmtNumber(st.rung) + '</span>'
         +     '<span><span class="ov-dept-stat-label">Ans</span> ' + fmtNumber(st.answered) + '</span>'
         +     '<span><span class="ov-dept-stat-label">Miss</span> ' + fmtNumber(st.missed) + '</span>'
         +   '</div>'
         +   '<div class="ov-dept-tile-row">'
         +     '<span><span class="ov-dept-stat-label">ATT</span> ' + escapeHtml(st.attFormatted) + '</span>'
         +   '</div>'
         +   '<div class="ov-dept-tile-spark" title="30-day % answered trend">' + spark + '</div>'
         + '</div>';
  }

  // WoW direction arrow for a sub-queue strip: answer-rate up = good (sage),
  // down = warn. Flat/absent -> nothing.
  function ovSubqArrow_(wow) {
    if (!wow || typeof wow.deltaPct !== 'number') return '';
    const d = wow.deltaPct;
    if (Math.abs(d) < 0.1) return '';
    const up = d > 0;
    const sign = up ? '+' : '';
    return '<span class="ov-subq-arrow ' + (up ? 'is-up' : 'is-down') + '" '
         +   'title="Answer rate ' + sign + d.toFixed(1) + ' pts vs prior week">'
         +   (up ? '▲' : '▼') + '</span>';
  }

  // Sub-queue mini-card STRIP for the grid: a compact card (white, hover
  // border) showing Ans % (+ WoW arrow), Abandoned %, and violations, that
  // EXPANDS IN PLACE into a near-full card (rung/ans/miss, ATT, sparkline)
  // -- one element, so the strip morphs into the card rather than a second
  // card appearing beside it. In the parent's group cell, NOT inside the
  // parent card (no false roll-up). Hover spotlights the child's chart line.
  function ovBuildSubqCard_(dept, color) {
    const st = ovPeriodStats_(dept);
    const qcd = dept.qcd || null;
    const alert = dept.alertedOnLatest
      ? '<span class="ov-subq-strip-alert" aria-hidden="true" title="Low-answer-rate alert on the latest date">🚨</span>'
      : '';
    const abd = (qcd && typeof qcd.abandonedPct === 'number')
      ? '<span class="ov-subq-metric"><span class="ov-subq-metric-lbl">Abd</span> '
        + '<span class="' + (qcd.abandonedPct >= 5 ? 'bm-over' : '') + '">' + qcd.abandonedPct.toFixed(1) + '%</span></span>'
      : '';
    const viol = (qcd && qcd.violations > 0)
      ? '<span class="ov-subq-metric ov-subq-metric-viol"><span class="ov-subq-metric-lbl">Viol</span> ' + qcd.violations + '</span>'
      : '';
    const spark = irSparkline_((dept.trend || []).map(function (v) { return v == null ? 0 : v; }), color);
    const routable = isAllDeptViewer_();
    const routeBtn = routable
      ? '<button type="button" class="ov-subq-route" data-dept="' + escapeHtml(dept.name) + '">Open ' + escapeHtml(dept.name) + ' &rarr;</button>'
      : '';
    return '<div class="ov-subq-card" data-dept="' + escapeHtml(dept.name) + '" data-subq="' + escapeHtml(dept.name) + '">'
         +   '<button type="button" class="ov-subq-strip" aria-expanded="false" '
         +     'title="' + escapeHtml(dept.name) + ' — sub-queue of ' + escapeHtml(dept.parent) + '. Click to expand.">'
         +     '<span class="ov-subq-strip-dot" style="background:' + color + '"></span>'
         +     '<span class="ov-subq-strip-name">' + escapeHtml(dept.name) + '</span>'
         +     '<span class="ov-subq-strip-metrics">'
         +       '<span class="ov-subq-metric"><span class="ov-subq-metric-lbl">Ans</span> '
         +         escapeHtml(st.pctFormatted) + ovSubqArrow_(dept.wow) + '</span>'
         +       abd + viol + alert
         +     '</span>'
         +     '<span class="ov-subq-strip-chev" aria-hidden="true">›</span>'
         +   '</button>'
         +   '<div class="ov-subq-detail">'
         +     '<div class="ov-subq-detail-inner">'
         +       '<div class="ov-dept-tile-row">'
         +         '<span><span class="ov-dept-stat-label">Rung</span> ' + fmtNumber(st.rung) + '</span>'
         +         '<span><span class="ov-dept-stat-label">Ans</span> ' + fmtNumber(st.answered) + '</span>'
         +         '<span><span class="ov-dept-stat-label">Miss</span> ' + fmtNumber(st.missed) + '</span>'
         +       '</div>'
         +       '<div class="ov-dept-tile-row">'
         +         '<span><span class="ov-dept-stat-label">ATT</span> ' + escapeHtml(st.attFormatted) + '</span>'
         +       '</div>'
         +       '<div class="ov-dept-tile-spark" title="30-day % answered trend">' + spark + '</div>'
         +       routeBtn
         +     '</div>'
         +   '</div>'
         + '</div>';
  }

  // Smoothly expand/collapse a sub-queue card's detail by animating its
  // height between 0 and the inner content height, then settling on `auto`
  // (so it reflows if the viewport changes). The strip stays put -- the card
  // grows beneath it -- so it reads as one card morphing, not two cards.
  function ovToggleSubqCard_(card, strip, detail) {
    const inner = detail.querySelector('.ov-subq-detail-inner');
    const opening = !card.classList.contains('is-open');
    strip.setAttribute('aria-expanded', opening ? 'true' : 'false');
    card.classList.toggle('is-open', opening);
    if (typeof requestAnimationFrame !== 'function' || !inner) {
      detail.style.height = opening ? 'auto' : '0';   // no-animation fallback
      return;
    }
    if (opening) {
      detail.style.height = inner.offsetHeight + 'px';
      const done = function () {
        detail.style.height = 'auto';   // let it reflow after the transition
        detail.removeEventListener('transitionend', done);
      };
      detail.addEventListener('transitionend', done);
    } else {
      detail.style.height = inner.offsetHeight + 'px';   // fix the current height
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { detail.style.height = '0px'; });
      });
    }
  }

  function ovRenderTiles_(data) {
    ovWirePeriodBar_();
    const colors = IR_CHART_COLORS;
    const viewerDept = ovViewerDept_(data);
    const depts = data.depts || [];
    const viewerObj = viewerDept ? depts.find(function (d) { return d.name === viewerDept; }) : null;
    // The viewer's dept is no longer hoisted into a full-width hero above the
    // chart -- it's rendered IN the grid (first, highlighted). The top-level
    // group the viewer belongs to (itself if top-level, else its parent's
    // group) is moved to the front; the viewer's own tile gets a marker.
    const viewerTopName = viewerObj ? (viewerObj.parent || viewerObj.name) : null;

    const groups = [];
    const slotByName = {};
    let slot = 0;
    depts.forEach(function (d) {
      if (!d.parent) {
        slotByName[d.name] = slot++;
        groups.push({ parent: d, children: [] });
      } else {
        const last = groups[groups.length - 1];
        if (last && last.parent.name === d.parent) last.children.push(d);
        else {
          // Parent not the previous group (filtered/missing) -- the child
          // becomes a standalone top-level tile so it still surfaces.
          slotByName[d.name] = slot++;
          groups.push({ parent: d, children: [] });
        }
      }
    });

    // Move the viewer's group to the front (stable for the rest).
    if (viewerTopName) {
      const vi = groups.findIndex(function (g) { return g.parent.name === viewerTopName; });
      if (vi > 0) groups.unshift(groups.splice(vi, 1)[0]);
    }

    const tileRoutable = isAllDeptViewer_();
    const html = groups.map(function (g) {
      const color = colors[(slotByName[g.parent.name] || 0) % colors.length];
      const parentIsViewer = (g.parent.name === viewerDept);
      const parentTile = ovBuildGridTile_(g.parent, color, false, tileRoutable, parentIsViewer);
      if (!g.children.length) {
        return '<div class="ov-dept-group' + (parentIsViewer ? ' ov-dept-group-viewer' : '') + '">' + parentTile + '</div>';
      }
      // Sub-queues render as mini-card STRIPS beneath the parent tile, each
      // expanding IN PLACE into a near-full card. In the group cell, NOT
      // inside the parent card, so the child's independent metrics never read
      // as a roll-up of the parent.
      const cards = g.children.map(function (c) { return ovBuildSubqCard_(c, color); }).join('');
      return '<div class="ov-dept-group' + (parentIsViewer ? ' ov-dept-group-viewer' : '') + '">' + parentTile
           +   '<div class="ov-subq-cards" role="group" aria-label="Sub-queues of ' + escapeHtml(g.parent.name) + '">' + cards + '</div>'
           + '</div>';
    }).join('');
    $('ov-dept-grid').innerHTML = html;

    // Sub-queue mini-card strip: the strip button expands/collapses the
    // card's detail IN PLACE with a smooth height transition (the strip
    // morphs into a near-full card -- no second card appears). Admins can
    // route to the dept via the detail's "Open" button. Hover spotlights the
    // child's chart line.
    $('ov-dept-grid').querySelectorAll('.ov-subq-card').forEach(function (card) {
      const strip  = card.querySelector('.ov-subq-strip');
      const detail = card.querySelector('.ov-subq-detail');
      if (strip && detail) {
        strip.addEventListener('click', function () {
          ovToggleSubqCard_(card, strip, detail);
        });
      }
      const routeBtn = card.querySelector('.ov-subq-route');
      if (routeBtn) {
        routeBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          const target = routeBtn.getAttribute('data-dept');
          if (target) ovRouteToDept_(target);
        });
      }
      const target = card.getAttribute('data-dept');
      if (target) {
        card.addEventListener('mouseenter', function () { ovSpotlightDept_(target); });
        card.addEventListener('mouseleave', function () { ovSpotlightDept_(null); });
      }
    });

    // #1: clicking a dept tile SOLOS its line in the trend chart (like a legend
    // click) instead of navigating to My Department -- and Shift/Cmd/Ctrl-click
    // ADDS it to a multi-dept comparison. Navigation still lives on the chart
    // POINT click (ovHandlePointClick_) + the dept-selector dropdown, so the
    // "jarring page load on a card click" is gone for every role. Hover still
    // spotlights (no-op once a pin is active).
    $('ov-dept-grid').querySelectorAll('.ov-dept-tile').forEach(function (tile) {
      const target = tile.getAttribute('data-dept');
      if (!target) return;
      tile.classList.add('ov-dept-tile-solo');
      tile.addEventListener('click', function (e) {
        const additive = !!(e && (e.shiftKey || e.metaKey || e.ctrlKey));
        chartSpotlightTogglePin_(ovChartInstance, target, additive);
      });
      tile.addEventListener('mouseenter', function () { ovSpotlightDept_(target); });
      tile.addEventListener('mouseleave', function () { ovSpotlightDept_(null); });
    });
  }

  // Admin-only: switch the main dashboard to a different dept and
  // navigate to the My Department page so the new dept's full
  // detail is visible.
  function ovRouteToDept_(deptName, isoDate) {
    const sel = $('dept-selector');
    if (sel && sel.value !== deptName) {
      sel.value = deptName;
      // Trigger the same 'change' handler the manual dropdown uses
      // -- wipes stale roster caches and re-fetches the summary.
      sel.dispatchEvent(new Event('change'));
    }
    // Point-click deep-link: snap the From/To range to the clicked day
    // and re-fetch (this wins over any change-driven latest-date load).
    if (isoDate && $('from-date') && $('to-date')) {
      $('from-date').value = isoDate;
      $('to-date').value = isoDate;
      refresh();
    }
    // setPage runs LAST: its stale-dept guard loads the table when neither of
    // the above kicked off a load (selector already on this dept + no isoDate,
    // e.g. clicking the pinned dept card in view-as-manager mode).
    setPage('dept');
  }

  // Renders the user's own dept's agent table at the latest date
  // inside the Overview modal, below the trend chart. For admins,
  // shows whichever dept they currently have selected in the
  // header dropdown. Independent of the main dashboard's date
  // range: always uses latestDate. Fetches via getDepartmentSummary,
  // which is cached server-side per (dept, scope, from, to).
  // F-40: monotonic token so a slower earlier fetch (the SWR cached-paint +
  // live-paint pair both call this, and admins can flip depts quickly)
  // can't paint stale rows under a newer call's title/date -- the same
  // guard class as summaryReqSeq / reportReqSeq_ elsewhere.
  var ovUserTableSeq = 0;
  // #8: the Overview mini-table is now header-sortable with its OWN sort state
  // (default worst-answer-rate first, like My Department), reusing the shared
  // sortRows/COLUMNS/fmtCell. Stored rows/totals let a header click re-sort
  // without re-fetching. The Total row renders from `ovUserTotals_`, so it's
  // never part of the sorted body.
  var ovUserRows_ = [], ovUserTotals_ = null;
  var ovUserSort_ = { key: 'answerRate', dir: 'asc' };
  // C-3: the Overview mini-table's own response meta (priorFrom/priorTo for
  // the WoW-chip tooltips) + the synchronous render-pass override consumed
  // by wowChipHtml_ (see there).
  var ovUserMeta_ = null;
  var wowChipMetaOverride_ = null;
  var ovUserSortWired_ = false;
  function ovRenderUserTable_(data) {
    const wrap = $('ov-user-table-wrap');
    const tbody = $('ov-user-tbody');
    const tfoot = $('ov-user-tfoot');
    const status = $('ov-user-table-status');
    if (!wrap || !tbody || !tfoot) return;
    const myToken = ++ovUserTableSeq;

    const viewerDept = ovViewerDept_(data);
    if (!viewerDept || !data.latestDate) {
      wrap.style.display = 'none';
      return;
    }
    wrap.style.display = '';

    // R7 (O-3): 'My dept' for managers (owner wording) AND for the view-as
    // preview (which presents the manager experience); 'Selected dept' only
    // for a genuine all-dept viewer driving the selector.
    const title = ((isAllDeptViewer_() && !viewAsDept_) ? 'Selected dept: ' : 'My dept: ') + viewerDept;
    $('ov-user-table-title').textContent = title;
    // O4: the table follows its own period slider (re-fetches the range).
    ovWireTablePeriodBar_();
    const range = ovTableRange_(data.latestDate);
    $('ov-user-table-date').textContent = (range.from === range.to)
      ? ovFormatDateLabel_(range.to)
      : (ovFormatDateLabel_(range.from) + ' – ' + ovFormatDateLabel_(range.to));

    status.style.display = '';
    status.className = 'status status-loading';
    status.textContent = 'Loading agent detail…';
    tbody.innerHTML = '';
    tfoot.innerHTML = '';

    google.script.run
      .withSuccessHandler(function (resp) {
        if (myToken !== ovUserTableSeq) return;   // F-40: superseded by a newer call
        status.style.display = 'none';
        if (!resp || !resp.rows || !resp.rows.length) {
          ovUserRows_ = []; ovUserTotals_ = null; ovUserMeta_ = null;
          tbody.innerHTML = '<tr><td colspan="' + COLUMNS.length + '" class="ov-user-empty">No agent rows for this dept in '
                          + escapeHtml(range.from === range.to ? range.to : (range.from + ' – ' + range.to)) + '.</td></tr>';
          tfoot.innerHTML = '';
          return;
        }
        // #8: store the rows/totals and render via the shared, sortable path
        // (default worst-answer-rate first). A header click re-sorts in place.
        ovUserRows_ = resp.rows;
        ovUserTotals_ = resp.totals || null;
        ovUserMeta_ = resp.meta || null;   // C-3: this table's own prior window
        ovWireUserSort_();
        ovRenderUserRows_();
      })
      .withFailureHandler(function (err) {
        if (myToken !== ovUserTableSeq) return;   // F-40
        status.className = 'status status-error';
        status.textContent = 'Error loading detail: '
          + (err && err.message ? err.message : String(err));
      })
      .getDepartmentSummary({
        department: viewerDept,
        from:       range.from,
        to:         range.to,
        scope:      'roster',
      });
  }

  // #8: renders the Overview mini-table body + totals from the stored rows using
  // the current ovUserSort_, and paints the header arrows. Reuses the shared
  // sortRows/COLUMNS/fmtCell/cellClass_ so it stays byte-for-byte consistent with
  // the My Department table's cells.
  function ovRenderUserRows_() {
    var tbody = $('ov-user-tbody'), tfoot = $('ov-user-tfoot');
    if (!tbody || !tfoot) return;
    document.querySelectorAll('.ov-user-table thead th[data-sort]').forEach(function (th) {
      var key = th.getAttribute('data-sort');
      var arrow = th.querySelector('.arrow');
      if (!arrow) return;
      if (key === ovUserSort_.key) {
        arrow.textContent = ovUserSort_.dir === 'asc' ? '▲' : '▼';
        arrow.style.color = THEME.ink || '#374151';
      } else {
        arrow.textContent = '▽';
        arrow.style.color = THEME.muted || '#9ca3af';
      }
    });
    var sorted = sortRows(ovUserRows_, ovUserSort_.key, ovUserSort_.dir);
    // C-3: point the WoW-chip tooltips at THIS table's prior window for the
    // duration of the (synchronous) render, then clear.
    wowChipMetaOverride_ = ovUserMeta_;
    tbody.innerHTML = sorted.map(function (row) {
      var rowClass = (row.matchedViaQueue && !row.matchedViaRoster) ? 'via-queue' : '';
      return '<tr' + (rowClass ? ' class="' + rowClass + '"' : '') + '>'
           + COLUMNS.map(function (col, i) {
               return '<td class="' + cellClass_(col, i) + '">' + fmtCell(col, row) + '</td>';
             }).join('')
           + '</tr>';
    }).join('');
    wowChipMetaOverride_ = null;
    if (ovUserTotals_) {
      var queueCount = ovUserTotals_.queueOnlyAgentCount || 0;
      var totalLabel = queueCount > 0
        ? 'Totals (roster only · ' + queueCount + ' floater' + (queueCount === 1 ? '' : 's') + ' excluded)'
        : 'Totals';
      tfoot.innerHTML = '<tr>' + COLUMNS.map(function (col, i) {
        var cls = cellClass_(col, i);
        if (i === 0) return '<td class="' + cls + '">' + totalLabel + '</td>';
        if (col.type === 'chip' && col.key === 'source') return '<td class="' + cls + '"></td>';
        return '<td class="' + cls + '">' + fmtCell(col, ovUserTotals_) + '</td>';
      }).join('') + '</tr>';
    } else {
      tfoot.innerHTML = '';
    }
  }

  // Wire the Overview mini-table header clicks once (the thead is static).
  function ovWireUserSort_() {
    if (ovUserSortWired_) return;
    var table = document.querySelector('.ov-user-table');
    if (!table) return;
    ovUserSortWired_ = true;
    table.querySelectorAll('thead th[data-sort]').forEach(function (th) {
      th.style.cursor = 'pointer';
      th.addEventListener('click', function () { ovOnUserSort_(th.getAttribute('data-sort')); });
    });
  }

  // Header-click sort for the Overview mini-table (mirrors My Dept's onSort:
  // toggle direction on the same key, else numbers default desc / text asc).
  function ovOnUserSort_(key) {
    if (ovUserSort_.key === key) {
      ovUserSort_.dir = ovUserSort_.dir === 'asc' ? 'desc' : 'asc';
    } else {
      ovUserSort_.key = key;
      var col = COLUMNS.find(function (c) { return c.key === key; });
      ovUserSort_.dir = (col && col.type === 'text') ? 'asc' : 'desc';
    }
    ovRenderUserRows_();
  }

  // Overview trend-chart metric views. `field` = the per-dept data array on the
  // payload; `unit` = 'pct' | 'count' (axis + tooltip format); `baseline` = a
  // dashed reference line value (null = none). % Answered is DQE (ring
  // answer-rate); the two Abandoned metrics are QCD (queue-level) -- so
  // Abandoned % is NOT 100 - % Answered (different populations), hence the
  // "(queue)" header qualifier.
  const OV_CHART_METRICS_ = {
    pct: {
      field: 'trend', unit: 'pct', axisTitle: '% Answered',
      baseline: 92, baselineLabel: '92% target',
      header: 'Answer rate trend per department (rings)',
      fmt: function (v) { return v.toFixed(1) + '%'; },
    },
    abandonedCalls: {
      field: 'trendAbandoned', unit: 'count', axisTitle: 'Abandoned calls',
      baseline: null, baselineLabel: '',
      header: 'Abandoned calls per department (queue)',
      fmt: function (v) { return Math.round(v).toLocaleString(); },
    },
    abandonedPct: {
      field: 'trendAbandonedPct', unit: 'pct', axisTitle: 'Abandoned %',
      baseline: 5, baselineLabel: '5% threshold',
      header: 'Abandoned % per department (queue)',
      fmt: function (v) { return v.toFixed(1) + '%'; },
    },
  };
  const OV_CHART_METRIC_KEY_ = 'cdr.ov.chartmetric';
  let ovChartMetric = (function () {
    try { var v = localStorage.getItem(OV_CHART_METRIC_KEY_); return OV_CHART_METRICS_[v] ? v : 'pct'; }
    catch (e) { return 'pct'; }
  })();

  // Chart RANGE control (30 / 60 / 90 days / YTD). 30-60-90 slice the 90-day
  // chart series the Overview payload already ships (client-only, instant --
  // separate from the 30-day sparkline/active-count so those never move,
  // INV-40). YTD is fetched on demand via getOverviewChartTrend (the full
  // series would blow the shared Overview cache's ~100KB cap) and cached in
  // this session. The active metric (% Answered / Abandoned calls /
  // Abandoned %) follows whichever range is selected.
  const OV_CHART_RANGE_KEY_ = 'cdr.ov.chartrange';
  const OV_CHART_RANGES_ = { '30': 30, '60': 60, '90': 90, ytd: null };
  let ovChartRange = (function () {
    try { var v = localStorage.getItem(OV_CHART_RANGE_KEY_); return OV_CHART_RANGES_.hasOwnProperty(v) ? v : '30'; }
    catch (e) { return '30'; }
  })();
  let ovYtdData = null;        // session cache of the getOverviewChartTrend payload
  let ovYtdLoading = false;

  // 'YYYY-MM-DD' minus N calendar days, UTC-stable (parse + reformat via UTC
  // so the arithmetic can't drift across a DST boundary).
  function ovIsoMinusDays_(iso, days) {
    const p = String(iso).split('-');
    if (p.length !== 3) return iso;
    const dt = new Date(Date.UTC(+p[0], +p[1] - 1, +p[2]));
    dt.setUTCDate(dt.getUTCDate() - days);
    const pad = function (n) { return n < 10 ? '0' + n : String(n); };
    return dt.getUTCFullYear() + '-' + pad(dt.getUTCMonth() + 1) + '-' + pad(dt.getUTCDate());
  }

  // Normalize the chart's data source to a single shape regardless of which
  // range is active: { trendLabels, trendIsoLabels, depts:[{name,parent,
  // trend,trendAbandoned,trendAbandonedPct}], latestDate }. The 30/60/90
  // ranges slice the payload's 90-day trendChart* fields down to the trailing
  // N-day window; YTD returns the on-demand payload verbatim (already
  // normalized to trend/trendAbandoned/trendAbandonedPct). Falls back to the
  // 90-day payload when a YTD fetch hasn't landed yet.
  function ovCurrentChartView_(data) {
    if (ovChartRange === 'ytd') {
      if (ovYtdData && ovYtdData.available) {
        return {
          trendLabels: ovYtdData.trendLabels || [],
          trendIsoLabels: ovYtdData.trendIsoLabels || [],
          depts: ovYtdData.depts || [],
          latestDate: ovYtdData.latestDate || (data && data.latestDate),
        };
      }
      // YTD not loaded yet -> show the full 90-day window meanwhile.
    }
    const iso = data.chartTrendIsoLabels || [];
    const lab = data.chartTrendLabels || [];
    const rangeDays = OV_CHART_RANGES_[ovChartRange];
    let startIdx = 0;
    if (rangeDays && iso.length) {
      const latest = data.latestDate || iso[iso.length - 1];
      const cut = ovIsoMinusDays_(latest, rangeDays - 1);
      startIdx = iso.findIndex(function (x) { return x >= cut; });
      if (startIdx < 0) startIdx = 0;
    }
    const depts = (data.depts || []).map(function (d) {
      return {
        name: d.name, parent: d.parent,
        trend: (d.trendChart || []).slice(startIdx),
        trendAbandoned: (d.trendChartAbandoned || []).slice(startIdx),
        trendAbandonedPct: (d.trendChartAbandonedPct || []).slice(startIdx),
      };
    });
    return {
      trendLabels: lab.slice(startIdx),
      trendIsoLabels: iso.slice(startIdx),
      depts: depts,
      latestDate: data.latestDate,
    };
  }

  // Builds the y-axis config for a metric + zoom state. The Fit/Full behavior
  // (fixing the previously-inert Zoom button): Full gives % Answered the fixed
  // 0-100 context and the Abandoned metrics a 0-to-data-top scale (0-100 would
  // bury a ~0-8% abandon line at the very bottom); Fit tightens to the actual
  // data range on every metric. The reference baseline is EXCLUDED from the
  // range math so it can't pin the axis. Now applied inside the render, so the
  // zoom persists across re-renders (5-min refresh / sub-queue / metric switch)
  // instead of resetting to Full.
  function ovYAxis_(mcfg, zoom, datasets, skipLabels) {
    let lo = Infinity, hi = -Infinity;
    datasets.forEach(function (ds) {
      if (skipLabels.indexOf(ds.label) !== -1) return;
      if (ds.hidden) return;   // O1: an Alt-hidden dept line is excluded from Fit scaling
      (ds.data || []).forEach(function (v) {
        if (v == null || isNaN(v)) return;
        if (v < lo) lo = v;
        if (v > hi) hi = v;
      });
    });
    const hasData = isFinite(lo) && isFinite(hi);
    const axis = {
      ticks: { callback: mcfg.unit === 'pct'
        ? function (v) { return v + '%'; }
        : function (v) { return Number(v).toLocaleString(); } },
      title: { display: true, text: mcfg.axisTitle, font: { size: 11 } },
    };
    if (zoom === 'fit' && hasData) {
      const pad = Math.max(1, (hi - lo) * 0.08);
      axis.beginAtZero = false;
      axis.min = Math.max(0, Math.floor(lo - pad));
      axis.max = (mcfg.unit === 'pct') ? Math.min(100, Math.ceil(hi + pad)) : Math.ceil(hi + pad);
    } else {
      axis.beginAtZero = true;
      axis.min = 0;
      if (mcfg.field === 'trend') axis.max = 100;
      else axis.max = hasData ? Math.ceil(hi * 1.15) + (mcfg.unit === 'pct' ? 1 : 0) : undefined;
    }
    return axis;
  }

  function ovRenderChart_(data) {
    if (ovChartInstance) {
      try { ovChartInstance.destroy(); } catch (e) {}
      ovChartInstance = null;
    }
    destroyOrphanedChartOnCanvas_('ov-trend-chart');
    refreshChartTheme();

    // Resolve the active range (30/60/90 client-slice, or the on-demand YTD
    // payload) to a single normalized shape before building datasets.
    const view = ovCurrentChartView_(data);
    const labels = view.trendLabels || [];
    const colors = IR_CHART_COLORS;
    // Color assignment: walk top-level depts in payload order and
    // give each one a slot from IR_CHART_COLORS. Child depts inherit
    // their parent's hue so the parent-vs-child relationship is
    // legible at a glance. Built once up front instead of per-dept
    // so children referencing parents that appear later in `depts`
    // still resolve correctly (defensive -- depts are typically
    // ordered parent-then-children today, but don't lean on it).
    const colorByDept = {};
    let nextColorSlot = 0;
    (view.depts || []).forEach(function (dept) {
      if (dept.parent) return;
      colorByDept[dept.name] = colors[nextColorSlot % colors.length];
      nextColorSlot++;
    });
    (view.depts || []).forEach(function (dept) {
      if (!dept.parent) return;
      colorByDept[dept.name] = colorByDept[dept.parent]
        || colors[nextColorSlot++ % colors.length];
    });

    // Metric view (% Answered / Abandoned calls / Abandoned %). The per-dept
    // data array + axis/baseline/format all switch on this. % Answered is DQE
    // (ring answer-rate, dept.trend); the two Abandoned metrics are QCD
    // (dept.trendAbandoned / dept.trendAbandonedPct) -- so they are NOT
    // 100 - answered% (different populations).
    const metric = OV_CHART_METRICS_[ovChartMetric] ? ovChartMetric : 'pct';
    const mcfg = OV_CHART_METRICS_[metric];

    // P2.4: default to top-level depts only; children join when toggled on.
    // colorByDept was computed over ALL depts above, so hues stay stable
    // whether or not children are shown.
    const chartDepts = (view.depts || []).filter(function (d) {
      return ovShowSubQueues_ || !d.parent;
    });
    const datasets = chartDepts.map(function (dept) {
      const color = colorByDept[dept.name];
      const isChild = !!dept.parent;
      return {
        label: dept.name + (isChild ? ' (sub-queue)' : ''),
        data: (dept[mcfg.field] || []),
        borderColor: color,
        // Stash the resting style so the legend hover-dim can restore it
        // (see chartSpotlight* helpers). _deptName lets the tile-hover and
        // point-click handlers map a dept back to its dataset index.
        _origBorder: color,
        _origWidth: isChild ? 1.4 : 2.2,
        _deptName: dept.name,
        // No fill on the overlaid multi-dept chart -- 10+ stacked
        // gradients muddle the view. The soft-area treatment (25%
        // gradient via irGradientFill_) is intentionally reserved
        // for single-series charts like the Individual / Performance
        // monthly trends. Per-dept parent/child differentiation
        // happens via line weight + dash pattern instead.
        backgroundColor: 'rgba(0,0,0,0)',
        fill: false,
        tension: 0.4,
        borderWidth: isChild ? 1.4 : 2.2,
        borderDash: isChild ? [4, 3] : [],
        pointRadius: 0,
        pointHoverRadius: 4,
        pointBackgroundColor: color,
        pointBorderColor: THEME.paperCard,
        pointBorderWidth: 1.5,
        spanGaps: false,    // honor nulls -> gaps for no-data days
      };
    });

    // Metric-specific dashed reference baseline drawn behind the dept series
    // (92% answer-rate goal for % Answered; 5% abandon threshold for
    // Abandoned %; none for the raw Abandoned-calls count). Excluded from the
    // Fit auto-scale computation below so it can't pin the y-range.
    if (mcfg.baseline != null) {
      datasets.push({
        label: mcfg.baselineLabel,
        data: labels.map(function () { return mcfg.baseline; }),
        borderColor: (THEME && THEME.muted) || '#606872',
        backgroundColor: 'rgba(0,0,0,0)',
        borderWidth: 1,
        borderDash: [6, 4],
        pointRadius: 0,
        pointHoverRadius: 0,
        fill: false,
        tension: 0,
        // Render behind everything else so dept lines stay on top.
        order: 99,
      });
    }
    // The reference-baseline labels the spotlight + tooltip must skip.
    const OV_BASELINE_LABELS_ = ['92% target', '5% threshold'];

    const ovPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    ovChartInstance = safeChart_($('ov-trend-chart').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: ovPlugins,
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: Object.assign({
            position: 'bottom',
            labels: { boxWidth: 12, font: { size: 11 } },
          }, chartSpotlightLegend_()),
          tooltip: {
            // O2: park the card at the top of the plot so it doesn't sit over
            // the lines. Degrades to the default position if the positioner
            // isn't available in this Chart build.
            position: (typeof Chart !== 'undefined' && Chart.Tooltip && Chart.Tooltip.positioners
                       && Chart.Tooltip.positioners.topBand) ? 'topBand' : undefined,
            filter: function (ctx) {
              // Hide the reference baseline from the per-line tooltip list.
              return OV_BASELINE_LABELS_.indexOf(ctx.dataset.label) === -1;
            },
            callbacks: {
              label: function (ctx) {
                const v = ctx.parsed && ctx.parsed.y;
                if (v == null) return ctx.dataset.label + ': no data';
                return ctx.dataset.label + ': ' + mcfg.fmt(v);
              },
            },
          },
          datalabels: { display: false },
        },
        scales: {
          y: ovYAxis_(mcfg, ovAxisZoom, datasets, OV_BASELINE_LABELS_),
          x: { ticks: { autoSkip: true, maxTicksLimit: 10 } },
        },
        interaction: { mode: 'index', intersect: false },
        // Point click -> deep-link into that dept + date's My Department
        // view (admins, or a manager clicking their own dept's line).
        onClick: function (evt, elements, chart) {
          ovHandlePointClick_(evt, chart, data);
        },
      },
    });

    // Generic legend spotlight (hover-dim + click-to-pin/isolate). Skip
    // the 92% baseline. Stash resting styles + the ISO date axis + the
    // viewer's dept so the tile-hover and point-click handlers can use them.
    // ovChartInstance is null when Chart.js failed to load (safeChart_
    // fallback) -- guard the post-render wiring so the rest of the Overview
    // still paints with the inline "chart unavailable" note. ovWireAxisZoom_
    // self-guards (it early-returns on a null instance).
    if (ovChartInstance) {
      chartSpotlightStash_(ovChartInstance, { skipLabel: mcfg.baselineLabel || '__ov_no_baseline__' });
      ovChartInstance._trendIso = view.trendIsoLabels || [];
      ovChartInstance._viewerDept = ovViewerDept_(data);
      // O1: stash the metric config + baseline labels so chartSpotlightAfterHide_
      // can recompute the Fit y-axis (excluding Alt-hidden lines) in place.
      ovChartInstance._mcfg = mcfg;
      ovChartInstance._skipLabels = OV_BASELINE_LABELS_;
    }
    // Chart header reflects the active metric (the click-a-card hint is a
    // sibling span, left intact).
    const hdr = $('ov-chart-header-label');
    if (hdr) hdr.textContent = mcfg.header;
    ovWireAxisZoom_();
    ovWireSubqToggle_();
    ovWireMetricTabs_();
    ovWireChartRange_();
  }

  // Chart RANGE control (30 / 60 / 90 / YTD) in the ov-chart-tabs row. The
  // 30/60/90 buttons re-slice the already-shipped 90-day series instantly;
  // YTD lazily fetches getOverviewChartTrend once per session (size-guarded,
  // server-cached), painting a "loading" state on the button meanwhile.
  // Wired once; syncs active state + the YTD-loading affordance every render.
  let ovChartRangeWired = false;
  function ovWireChartRange_() {
    const grp = $('ov-chart-range');
    if (!grp) return;
    grp.querySelectorAll('.ov-range-btn').forEach(function (b) {
      const r = b.getAttribute('data-range');
      const on = r === ovChartRange;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
      if (r === 'ytd') {
        b.textContent = (ovChartRange === 'ytd' && ovYtdLoading) ? 'YTD…' : 'YTD';
        b.disabled = ovYtdLoading;
      }
    });
    if (ovChartRangeWired) return;
    ovChartRangeWired = true;
    grp.addEventListener('click', function (e) {
      const b = e.target.closest('.ov-range-btn');
      if (!b) return;
      const r = b.getAttribute('data-range');
      if (!OV_CHART_RANGES_.hasOwnProperty(r) || r === ovChartRange) return;
      ovChartRange = r;
      try { localStorage.setItem(OV_CHART_RANGE_KEY_, r); } catch (e2) { /* best-effort */ }
      if (r === 'ytd' && !(ovYtdData && ovYtdData.available)) {
        ovLoadYtdChart_();
        return;                       // ovLoadYtdChart_ re-renders when it lands
      }
      if (ovLastData) ovRenderChart_(ovLastData);
    });
  }

  // Fetch the YTD chart series on demand (kept out of the shared Overview
  // blob, which is size-capped). Cached for the session; a failure reverts to
  // the 90-day view with a toast so the control never dead-ends.
  function ovLoadYtdChart_() {
    if (ovYtdLoading) return;
    if (ovYtdData && ovYtdData.available) { if (ovLastData) ovRenderChart_(ovLastData); return; }
    ovYtdLoading = true;
    ovWireChartRange_();              // paint the YTD… loading label
    const revertTo90_ = function (msg) {
      ovYtdLoading = false;
      ovChartRange = '90';
      try { localStorage.setItem(OV_CHART_RANGE_KEY_, '90'); } catch (e) { /* best-effort */ }
      showToast(msg, 'error');
      if (ovLastData) ovRenderChart_(ovLastData);
    };
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.available) {
          ovYtdLoading = false;
          ovYtdData = res;
          if (ovLastData) ovRenderChart_(ovLastData);
        } else {
          revertTo90_('Year-to-date trend is unavailable right now.');
        }
      })
      .withFailureHandler(function () {
        revertTo90_('Could not load the year-to-date trend.');
      })
      .getOverviewChartTrend({ viewAsDept: viewAsDept_ || '' });
  }

  // ---- Generic Chart.js legend spotlight (shared) ----------------------
  // Hover a legend item -> dim every other series (transient preview).
  // Click a legend item -> PIN that series (persistent dim of others);
  // click it again (or another) to release/switch. Used by the multi-dept
  // Overview chart and the multi-queue QCD chart. Datasets must have been
  // stashed via chartSpotlightStash_ first. A `skipLabel` dataset (e.g. a
  // reference baseline / dept-total line) is never dimmed.
  const CHART_DIM_COLOR = 'rgba(140,140,140,0.18)';

  // Stable key for a dataset in the spotlight model: the Overview dept name
  // when present (survives re-render), else the series label (e.g. QCD queues).
  function chartSpotKey_(ds) { return (ds && (ds._deptName || ds.label)) || null; }

  function chartSpotlightStash_(chart, opts) {
    if (!chart || !chart.data) return;
    chart._spotlightSkip = (opts && opts.skipLabel) || null;
    chart._spotlightPins = {};   // SET of pinned keys (multi-select, #1)
    chart.data.datasets.forEach(function (ds) {
      if (ds._origBorder == null) ds._origBorder = ds.borderColor;
      if (ds._origWidth == null) ds._origWidth = ds.borderWidth;
    });
  }

  // Transient single-series highlight (dept-tile hover). Does NOT touch pins.
  function chartSpotlightApply_(chart, activeIndex) {
    if (!chart || !chart.data) return;
    chart.data.datasets.forEach(function (ds, i) {
      if (chart._spotlightSkip && ds.label === chart._spotlightSkip) return;
      if (i === activeIndex) {
        ds.borderColor = ds._origBorder;
        ds.borderWidth = (ds._origWidth || 2) + 0.8;
      } else {
        ds.borderColor = CHART_DIM_COLOR;
        ds.borderWidth = ds._origWidth || 1.4;
      }
    });
    chart.update('none');
  }

  function chartSpotlightClear_(chart) {
    if (!chart || !chart.data) return;
    chart.data.datasets.forEach(function (ds) {
      if (chart._spotlightSkip && ds.label === chart._spotlightSkip) return;
      if (ds._origBorder != null) ds.borderColor = ds._origBorder;
      if (ds._origWidth != null) ds.borderWidth = ds._origWidth;
    });
    chart.update('none');
  }

  function chartSpotlightHasPins_(chart) {
    return !!(chart && chart._spotlightPins && Object.keys(chart._spotlightPins).length);
  }

  // Highlight every PINNED series, dim the rest. Empty set -> clear.
  function chartSpotlightApplyPins_(chart) {
    if (!chart || !chart.data) return;
    if (!chartSpotlightHasPins_(chart)) { chartSpotlightClear_(chart); return; }
    const pins = chart._spotlightPins;
    chart.data.datasets.forEach(function (ds) {
      if (chart._spotlightSkip && ds.label === chart._spotlightSkip) return;
      const k = chartSpotKey_(ds);
      if (k && pins[k]) {
        ds.borderColor = ds._origBorder;
        ds.borderWidth = (ds._origWidth || 2) + 0.8;
      } else {
        ds.borderColor = CHART_DIM_COLOR;
        ds.borderWidth = ds._origWidth || 1.4;
      }
    });
    chart.update('none');
  }

  // Toggle a series' pin. `additive` (Shift/Cmd/Ctrl) adds/removes from the set
  // for multi-series comparison; a plain click SOLOS (or releases if it was
  // already the sole pin).
  function chartSpotlightTogglePin_(chart, key, additive) {
    if (!chart || !key) return;
    if (!chart._spotlightPins) chart._spotlightPins = {};
    const pins = chart._spotlightPins;
    if (additive) {
      if (pins[key]) delete pins[key]; else pins[key] = true;
    } else {
      const keys = Object.keys(pins);
      if (keys.length === 1 && pins[key]) { delete pins[key]; }
      else { chart._spotlightPins = {}; chart._spotlightPins[key] = true; }
    }
    chartSpotlightApplyPins_(chart);
    // Tile markers are Overview-only (the QCD multi-queue chart reuses these
    // helpers but has no dept grid).
    if (chart === ovChartInstance && typeof ovSyncTilePins_ === 'function') ovSyncTilePins_(chart);
  }

  // Returns legend onHover/onLeave/onClick callbacks implementing the
  // spotlight model. Spread into a chart's plugins.legend config.
  function chartSpotlightLegend_() {
    return {
      onHover: function (e, item, legend) {
        const chart = legend.chart;
        if (chartSpotlightHasPins_(chart)) return;   // pins win over hover
        if (item && item.datasetIndex != null) chartSpotlightApply_(chart, item.datasetIndex);
      },
      onLeave: function (e, item, legend) {
        const chart = legend.chart;
        if (chartSpotlightHasPins_(chart)) return;
        chartSpotlightClear_(chart);
      },
      onClick: function (e, item, legend) {
        const chart = legend.chart;
        if (!item || item.datasetIndex == null) return;
        const ds = chart.data.datasets[item.datasetIndex];
        const key = chartSpotKey_(ds);
        if (!key) return;
        const ne = e && e.native;
        // O1: Alt/Option-click HIDES a series (and rescales the y-axis) rather
        // than pinning it -- lets the user drop an outlier dept so the rest
        // scale properly. Plain click = solo-pin; Shift/Cmd/Ctrl = add to pins.
        if (ne && ne.altKey) {
          ds.hidden = !ds.hidden;
          chartSpotlightAfterHide_(chart);
          return;
        }
        const additive = !!(ne && (ne.shiftKey || ne.metaKey || ne.ctrlKey));
        chartSpotlightTogglePin_(chart, key, additive);
      },
    };
  }

  // O1: after Alt-hiding/showing a series, rescale + repaint. The Overview
  // chart uses a custom metric-aware y-axis (ovYAxis_, which now skips hidden
  // datasets), so recompute its min/max from the stashed mcfg; the QCD chart
  // uses Chart.js default scales, which already exclude hidden datasets, so a
  // plain update() suffices there.
  function chartSpotlightAfterHide_(chart) {
    if (chart === ovChartInstance && chart._mcfg && chart.options && chart.options.scales) {
      const y = ovYAxis_(chart._mcfg, ovAxisZoom, chart.data.datasets, chart._skipLabels || []);
      chart.options.scales.y.min = y.min;
      chart.options.scales.y.max = y.max;
      chart.options.scales.y.beginAtZero = y.beginAtZero;
    }
    chart.update();
  }

  // Spotlight a dept's line by name (dept-tile hover). No-op when a pin is
  // active so a hover doesn't fight the pinned selection.
  function ovSpotlightDept_(deptName) {
    const chart = ovChartInstance;
    if (!chart || !chart.data) return;
    if (chartSpotlightHasPins_(chart)) return;   // pins win over hover
    if (deptName == null) { chartSpotlightClear_(chart); return; }
    let idx = -1;
    chart.data.datasets.forEach(function (ds, i) { if (ds._deptName === deptName) idx = i; });
    if (idx >= 0) chartSpotlightApply_(chart, idx);
  }

  // Reflect the chart's pin set on the dept tiles (a soloed/compared marker),
  // so the grid shows which depts are currently isolated in the chart.
  function ovSyncTilePins_(chart) {
    const pins = (chart && chart._spotlightPins) || {};
    const grid = $('ov-dept-grid');
    if (!grid) return;
    grid.querySelectorAll('[data-dept]').forEach(function (tile) {
      const d = tile.getAttribute('data-dept');
      tile.classList.toggle('ov-tile-soloed', !!(d && pins[d]));
    });
  }

  // Point click -> deep-link to that dept + date. Only routes for admins
  // or a manager clicking their OWN dept's line (others can't view it).
  function ovHandlePointClick_(evt, chart, data) {
    if (!chart || typeof chart.getElementsAtEventForMode !== 'function') return;
    const hits = chart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
    if (!hits || !hits.length) return;
    const ds = chart.data.datasets[hits[0].datasetIndex];
    if (!ds || !ds._deptName) return;                 // baseline / non-dept line
    const deptName = ds._deptName;
    const viewerDept = chart._viewerDept || ovViewerDept_(data);
    if (!isAllDeptViewer_() && deptName !== viewerDept) return;
    const iso = (chart._trendIso || [])[hits[0].index] || null;
    ovRouteToDept_(deptName, iso);
  }

  // Axis zoom toggle: Full (0-100%) <-> Fit (auto-scale to the data range,
  // so depts clustered near the top spread out). Wired once; the button
  // lives in the ov-chart-tabs row (dashboard.html).
  let ovAxisZoom = 'full';
  let ovAxisZoomWired = false;
  function ovWireAxisZoom_() {
    // Keep the button label in sync on every render (the metric switch /
    // 5-min refresh re-runs the render, and the axis is now computed from
    // ovAxisZoom INSIDE the render via ovYAxis_, so the state persists).
    const btn = $('ov-axis-zoom-btn');
    if (btn) {
      btn.textContent = ovAxisZoom === 'fit' ? 'Zoom: Fit' : 'Zoom: Full';
      btn.setAttribute('aria-pressed', ovAxisZoom === 'fit' ? 'true' : 'false');
    }
    if (ovAxisZoomWired) return;
    if (!btn) return;
    ovAxisZoomWired = true;
    btn.addEventListener('click', function () {
      ovAxisZoom = (ovAxisZoom === 'full') ? 'fit' : 'full';
      // Re-render so the metric-aware axis (ovYAxis_) is recomputed and the
      // new zoom survives the next refresh. Previously this mutated the live
      // chart's scale directly, which the next re-render silently reset.
      if (ovLastData) ovRenderChart_(ovLastData);
    });
  }

  // Metric tabs (% Answered / Abandoned calls / Abandoned %) in the
  // ov-chart-tabs row. Wired once; re-renders from ovLastData on switch and
  // persists the choice. The grid tiles are untouched (they stay latest-day).
  let ovMetricTabsWired = false;
  function ovWireMetricTabs_() {
    const tabs = document.querySelectorAll('#ov-chart-tabs .ir-tab[data-metric]');
    // Sync active state every render.
    tabs.forEach(function (t) {
      const on = t.getAttribute('data-metric') === ovChartMetric;
      t.classList.toggle('active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    if (ovMetricTabsWired) return;
    ovMetricTabsWired = true;
    tabs.forEach(function (t) {
      t.addEventListener('click', function () {
        const m = t.getAttribute('data-metric');
        if (!OV_CHART_METRICS_[m] || m === ovChartMetric) return;
        ovChartMetric = m;
        try { localStorage.setItem(OV_CHART_METRIC_KEY_, m); } catch (e) { /* best-effort */ }
        if (ovLastData) ovRenderChart_(ovLastData);
      });
    });
  }

  // P2.4: "+ sub-queues" toggle in the ov-chart-tabs row. Off by default so
  // the chart shows only top-level depts; on adds the dashed child lines.
  // Re-renders from ovLastData (grid tiles are untouched). Wired once.
  let ovSubqWired = false;
  function ovWireSubqToggle_() {
    if (ovSubqWired) return;
    const box = $('ov-subq-toggle');
    if (!box) return;
    ovSubqWired = true;
    box.checked = ovShowSubQueues_;
    box.addEventListener('change', function () {
      ovShowSubQueues_ = !!box.checked;
      if (ovLastData) ovRenderChart_(ovLastData);
    });
  }

  // -- Router + URL hash routing (Phase C) -------------------------------
  // Lightweight in-page router that lets the user deep-link into a
  // specific report modal -- the primary use-case is the "Open in
  // new tab" affordance, which lets users OS-tile two browser
  // windows for side-by-side comparison.
  //
  // Design:
  //   * The header nav already has the modal-trigger buttons we want
  //     (Missed / Individual / Performance / Compare / QCD / Alerts /
  //     Outlier Fix). Each tab carries a data-route="..." attribute.
  //   * This router adds a click listener on every [data-route]
  //     element that tracks the active route + paints the active-tab
  //     visual indicator. It does NOT open the modal itself --
  //     each per-modal initXxxReport already has its own click
  //     handler that does the open. Two listeners fire on the same
  //     button click; they don't conflict.
  //   * On modal close (close button or backdrop), the router
  //     reverts the active state to the underlying page tab
  //     (Overview or My Department) so the highlight follows what's
  //     actually visible. Escape-key closes are not intercepted in
  //     this phase; the tab stays highlighted until the next click
  //     -- a minor visual cosmetic miss that's reversible by any
  //     subsequent tab interaction.
  //   * On page load, google.script.url.getLocation reads the parent
  //     URL's hash; if it matches a known route, the corresponding
  //     tab is programmatically clicked so the deep-link lands on
  //     the right view. Defensive against unknown / malformed hashes:
  //     the tab lookup quietly no-ops if no match.
  //
  // The router does not push hash updates to the parent URL on
  // modal open -- that would require google.script.history which
  // has had spotty browser behavior. The currentRoute is tracked
  // purely in-JS and consumed by the "Open in new tab" buttons,
  // which build a fresh URL from window.__DASHBOARD_URL__ + the
  // current route. The new tab loads the dashboard fresh and the
  // init-time hash read opens the deep-linked modal.

  const ROUTES_ = {
    '/overview':           { kind: 'page',  page: 'overview' },
    '/dept':               { kind: 'page',  page: 'dept' },
    // Missed-modal retirement: the My Department inline section is the
    // report now -- legacy #/report/missed deep-links land on the dept
    // page and scroll to it once it renders.
    '/report/missed':      { kind: 'page',  page: 'dept', scrollTo: 'dept-missed-section' },
    '/report/individual':  { kind: 'modal', modalId: 'individual-modal',  buttonId: 'individual-report-btn' },
    // Insights is a full PAGE (modal->page conversion, docs/
    // insights-page-plan.md). The three retired-report repoints ride the
    // same def: legacy #/report/performance (PR's team rollup + Absolute
    // chart), #/report/compare (custom priors + vs-Prior chart), and
    // #/report/qcd (Queue health) deep-links all land on the Insights page.
    // Their ?query form-state is quietly dropped (no SHARE_STATE_ provider);
    // '/report/insights' itself keeps full state via its provider.
    '/report/performance': { kind: 'page', page: 'insights' },
    '/report/compare':     { kind: 'page', page: 'insights' },
    '/report/qcd':         { kind: 'page', page: 'insights' },
    '/report/insights':    { kind: 'page', page: 'insights' },
    '/report/inbound':     { kind: 'modal', modalId: 'inbound-modal',     buttonId: 'inbound-report-btn' },
    '/report/direct':      { kind: 'modal', modalId: 'direct-call-modal', buttonId: 'direct-call-report-btn' },
    '/admin/alerts':       { kind: 'modal', modalId: 'alerts-modal',      buttonId: 'alerts-btn' },
    '/admin/orphan-fix':   { kind: 'modal', modalId: 'orphan-fix-modal',  buttonId: 'orphan-fix-btn' },
    '/admin/dept-config':  { kind: 'modal', modalId: 'dept-config-modal', buttonId: 'dept-config-btn' },
    '/admin/access-control': { kind: 'modal', modalId: 'access-control-modal', buttonId: 'access-control-btn' },
    '/admin/caller-lookup': { kind: 'modal', modalId: 'caller-lookup-modal', buttonId: 'caller-lookup-btn' },
    '/admin/health':        { kind: 'modal', modalId: 'health-modal',        buttonId: 'system-health-btn' },
    '/escalations':        { kind: 'page',  page: 'escalations' },
  };

  // The route currently considered "active". Starts as '/overview'
  // matching the default landing page. Reset to the underlying page
  // ('/overview' or '/dept') whenever a modal closes.
  var currentRoute = '/overview';

  function updateTabActiveState_(route) {
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      const isActive = btn.getAttribute('data-route') === route;
      btn.classList.toggle('header-nav-current', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    // If the active route lives inside a collapsed header dropdown (the
    // Reports group), its menu-item highlight is hidden, so also light
    // up the dropdown's trigger. Generic over any .header-menu so it
    // keeps working if more groups are collapsed later.
    document.querySelectorAll('.header-menu').forEach(function (menu) {
      const trigger = menu.querySelector('.header-menu-btn[aria-controls]');
      if (!trigger) return;
      const hasActive = !!menu.querySelector(
        '.header-menu-list [data-route="' + escCssId_(route) + '"]');   // C-4
      trigger.classList.toggle('header-nav-current', hasActive);
    });
  }

  function setRoute_(route) {
    if (!ROUTES_[route]) return;
    currentRoute = route;
    updateTabActiveState_(route);
  }

  function basePageRoute_() {
    // F-41: include the Escalations page -- closing a report modal opened
    // over it previously reverted the active-tab highlight to Overview
    // while the Escalations page stayed visible. Insights joined when it
    // became a page (an IR drill opens the IR modal OVER the Insights page;
    // closing it must restore the Insights tab highlight).
    var page = document.body.getAttribute('data-page');
    if (page === 'dept') return '/dept';
    if (page === 'escalations') return '/escalations';
    if (page === 'insights') return '/report/insights';
    return '/overview';
  }

  function initRouter() {
    // Wire up click on every [data-route] element. The per-modal
    // initXxxReport already adds its own click handler that opens
    // the modal; this just tracks the route + active state.
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const route = btn.getAttribute('data-route');
        if (!route || !ROUTES_[route]) return;
        setRoute_(route);
      });
    });

    // Wire up modal close paths to revert the active state. We hook
    // the close button + the backdrop click; Escape-key closes are
    // not intercepted in this phase (see header comment above).
    Object.keys(ROUTES_).forEach(function (route) {
      const def = ROUTES_[route];
      if (def.kind !== 'modal') return;
      const modal = document.getElementById(def.modalId);
      if (!modal) return;
      const onClose = function () {
        // Async so the modal's own close handler runs first and
        // body[data-page] is already correct.
        setTimeout(function () { setRoute_(basePageRoute_()); }, 0);
      };
      modal.querySelectorAll('.modal-close, [data-close]').forEach(function (el) {
        el.addEventListener('click', onClose);
      });
    });

    // Initial route from parent URL hash. google.script.url.getLocation
    // returns the parent URL's hash (without the leading '#') so deep
    // links like ".../exec#/report/individual" hit ROUTES_ exactly.
    // A '?' query suffix carries optional FORM STATE (dates, compare
    // mode, agents) serialized by the Open-in-new-tab buttons -- split
    // it off before the route lookup and apply it after the modal opens.
    if (typeof google !== 'undefined' && google.script && google.script.url) {
      google.script.url.getLocation(function (loc) {
        const hash = (loc && loc.hash) || '';
        if (!hash) return;
        // Allow either '#/report/individual' (leading slash) or
        // '#report/individual' (no leading slash) for resilience to
        // hand-typed URLs.
        const normalized = hash.charAt(0) === '/' ? hash : '/' + hash;
        const qIdx = normalized.indexOf('?');
        const route = qIdx === -1 ? normalized : normalized.slice(0, qIdx);
        const params = qIdx === -1 ? null : decodeShareParams_(normalized.slice(qIdx + 1));
        // C-4: escape the hand-typed hash -- a crafted quote/backslash used
        // to throw a selector SyntaxError inside this callback, silently
        // killing all deep-link handling for the load.
        const trigger = document.querySelector('[data-route="' + escCssId_(route) + '"]');
        if (!trigger) {
          // Routes with no [data-route] element of their own:
          //  - page routes (the retired Missed modal's '#/report/missed',
          //    repointed at the My Department missed section, and the three
          //    retired-report repoints onto the Insights PAGE) dispatch
          //    directly -- swap the page, load it, arm the one-shot scroll;
          //  - kind:'modal' repoints resolve via the target's buttonId
          //    (kept generic for any future modal repoint).
          //  ?query form-state is applied via the route's SHARE_STATE_
          //  provider AFTER the page swap (same ordering contract as the
          //  trigger path below: setPage has run the page's synchronous
          //  defaults + prefs restore, so the shared state wins). Routes
          //  with no provider -- the retired repoints -- quietly drop it.
          //  This is load-bearing for the Digest.gs email deep links
          //  ('#/report/insights?from=...&agents=...') whenever the
          //  Insights tab isn't in the DOM for the viewer.
          const def = ROUTES_[route];
          if (def && def.kind === 'page') {
            if (def.scrollTo === 'dept-missed-section') deptMissedScrollPending_ = true;
            setPage(def.page);
            if (def.page === 'dept' && typeof refresh === 'function') refresh();
            if (params) {
              const provider = SHARE_STATE_[route];
              if (provider) {
                try { provider.apply(params); } catch (e) { /* best-effort */ }
              }
            }
          } else if (def && def.kind === 'modal' && def.buttonId) {
            const btn = document.getElementById(def.buttonId);
            if (btn && !(btn.hasAttribute('data-admin-only') && USER.role !== 'admin')) btn.click();
          }
          return;
        }
        // A deep link to an admin-only view (data-admin-only tabs:
        // alerts / orphan-fix / dept-config) by a non-admin would open
        // the modal only to surface a server "admin-only" error. Skip it
        // and stay on the base page instead.
        if (trigger.hasAttribute('data-admin-only') && USER.role !== 'admin') return;
        trigger.click();
        // Apply AFTER the click: the modal's openModal has now run its
        // defaults + prefs restore synchronously, so the shared state
        // wins; the agent selection lands via the report's pending-
        // selection hook once the roster fetch renders.
        if (params) {
          const provider = SHARE_STATE_[route];
          if (provider) {
            try { provider.apply(params); } catch (e) { /* best-effort */ }
          }
        }
      });
    }
  }

  // -- Share-state (state-in-URL) for the report forms ------------------
  // Serializes a report form's state into the deep-link hash so an
  // "Open in new tab" target (or a pasted link) restores the exact
  // form -- dates, compare mode, custom prior window, and agent
  // selection -- with one click left (Generate). Generation is NOT
  // auto-triggered: the roster/agent picker loads async and the
  // primed form keeps the flow race-free and predictable.

  function encodeShareParams_(obj) {
    const parts = [];
    Object.keys(obj).forEach(function (k) {
      const v = obj[k];
      if (v == null || v === '') return;
      parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
    });
    return parts.join('&');
  }

  function decodeShareParams_(str) {
    const out = {};
    String(str || '').split('&').forEach(function (pair) {
      if (!pair) return;
      const i = pair.indexOf('=');
      if (i === -1) return;
      try {
        out[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
      } catch (e) { /* skip malformed token */ }
    });
    return out;
  }

  /** Sets an input/select value and fires its change handlers. */
  function shareSetField_(id, value) {
    const el = $(id);
    if (!el || value == null || value === '') return;
    el.value = value;
    el.dispatchEvent(new Event('change'));
  }

  /**
   * Per-route share-state providers. `collect()` reads the CURRENT form
   * (returns null when there's nothing meaningful to share); `apply()`
   * writes params back into the form + the report's pending-agent hook.
   * Agent lists are '|'-joined inside one encoded param. Only the four
   * agent-comparison reports participate -- they're where "look at this
   * exact view" matters; the simpler forms (QCD / Missed / Inbound) are
   * candidates for a follow-on.
   */
  function shareDatesProvider_(ids, getPending) {
    return {
      collect: function () {
        const out = {};
        Object.keys(ids.fields).forEach(function (k) {
          const el = $(ids.fields[k]);
          if (el && el.value) out[k] = el.value;
        });
        const list = $(ids.agentList);
        if (list) {
          const agents = irGetCheckedAgents_(list);
          if (agents.length) out.agents = agents.join('|');
        }
        return (out.from || out.p1from) ? out : null;
      },
      apply: function (params) {
        Object.keys(ids.fields).forEach(function (k) {
          shareSetField_(ids.fields[k], params[k]);
        });
        if (params.agents && getPending) {
          getPending(String(params.agents).split('|').filter(function (a) { return !!a; }));
        }
      },
    };
  }

  const SHARE_STATE_ = {
    '/report/individual': shareDatesProvider_(
      { fields: { from: 'ir-from', to: 'ir-to', mode: 'ir-compare-mode', pfrom: 'ir-prior-from', pto: 'ir-prior-to' },
        agentList: 'ir-agent-list' },
      function (list) { irPendingAgentSelection_ = list; }),
    // '/report/performance' retired (PR->Insights); legacy links repoint to
    // the Insights modal via ROUTES_, and any ?query state is quietly dropped
    // (SHARE_STATE_ has no provider for the retired route).
    '/report/insights': shareDatesProvider_(
      { fields: { from: 'ins-from', to: 'ins-to', mode: 'ins-compare-mode', pfrom: 'ins-prior-from', pto: 'ins-prior-to' },
        agentList: 'ins-agent-list' },
      function (list) { insPendingAgentSelection_ = list; }),
  };

  // Phase 2 #8: the Insights provider also carries the Simple/Detailed mode
  // (`view` param) so a shared link / saved view restores the disclosure
  // level. Wrapper over the generic provider -- collect/apply run on user
  // action, long after insDensity is initialized.
  (function () {
    const base = SHARE_STATE_['/report/insights'];
    SHARE_STATE_['/report/insights'] = {
      collect: function () {
        const s = base.collect() || {};
        if (insDensity === 'simple' || insDensity === 'detailed') s.view = insDensity;
        return (s.from || s.view) ? s : null;
      },
      apply: function (params) {
        base.apply(params || {});
        if (params && (params.view === 'simple' || params.view === 'detailed')) {
          insDensity = params.view;
          insSyncDensity_();
        }
      },
    };
  })();

  // Open-in-new-tab buttons on each report modal. Builds the target
  // URL from window.__DASHBOARD_URL__ (DASHBOARD_URL Script Property)
  // + the modal's data-open-tab-route. Hidden via .is-disabled when
  // the property is unset -- the alert/email path already requires
  // it so most installs have it set; CLAUDE.md README setup section
  // documents how.
  function initOpenInNewTabButtons_() {
    const dashboardUrl = (window.__DASHBOARD_URL__ || '').trim();
    document.querySelectorAll('.modal-open-tab-btn').forEach(function (btn) {
      if (!dashboardUrl) {
        btn.classList.add('is-disabled');
        return;
      }
      btn.addEventListener('click', function () {
        const route = btn.getAttribute('data-open-tab-route') || currentRoute;
        // Strip any existing fragment from the configured URL before
        // appending ours, so an admin-pasted URL ending in "#anything"
        // doesn't produce a double-hash target.
        const baseUrl = dashboardUrl.split('#')[0];
        // Carry the modal's CURRENT form state (dates / compare mode /
        // agents) so the new tab restores the exact view primed for one
        // Generate click. Best-effort: any provider failure falls back
        // to the bare route.
        let suffix = '';
        try {
          const provider = SHARE_STATE_[route];
          const state = provider ? provider.collect() : null;
          const encoded = state ? encodeShareParams_(state) : '';
          if (encoded) suffix = '?' + encoded;
        } catch (e) { /* bare route */ }
        window.open(baseUrl + '#' + route + suffix, '_blank', 'noopener');
      });
    });
  }

  // -- Overview question launcher (anti-intimidation layer) --------------
  // Four plain-English questions on the Overview page, each mapped to an
  // existing report primed with a sensible window. Where the report needs
  // no agent selection (Missed / QCD) or can default to the whole active
  // roster (Insights) the launcher runs it immediately; the Individual
  // Report stops at the primed form because "which agent?" is the user's
  // question to answer. No new server endpoints -- this is routing sugar
  // over the modals' existing open + form machinery.

  let latestDqeIso_ = null;          // set by the getLatestDataDates init fetch
  let latestQcdIso_ = null;          // ditto -- drives the all-dept QCD report's default date
  let insLauncherAutoRun_ = false;   // consumed by insRenderAgentList
  let insScrollPending_ = null;      // quick-start chip target section id (one-shot, consumed on render)

  function launcherIsoDaysAgo_(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')
      + '-' + String(d.getDate()).padStart(2, '0');
  }

  // The chip row markup, one source of truth. The Overview's #ov-launcher
  // block in dashboard.html carries a STATIC copy of the same row (so it
  // paints before JS init) -- keep the two in sync when editing chips.
  function launcherRowHtml_() {
    return '<div class="ov-launcher-kicker">What do you want to know?</div>'
      + '<div class="ov-launcher-row">'
      +   '<button type="button" class="ov-launcher-q" data-launch="team-lately">How is my team doing lately?</button>'
      +   '<button type="button" class="ov-launcher-q" data-launch="missed-yesterday">When did we miss calls?</button>'
      +   '<button type="button" class="ov-launcher-q" data-launch="agent-trend">Is one of my agents struggling or improving?</button>'
