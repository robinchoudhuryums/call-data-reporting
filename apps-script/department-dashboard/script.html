    if ($('pr-prior-label')) {
      $('pr-prior-label').textContent = (data.meta && data.meta.priorIsCustom)
        ? 'vs Custom Prior'
        : 'vs Prior';
    }
    showPrResults();
    prSetResultsStatus('');
    prResetTabs_();
    prRenderSubsetHint_(data.meta);
    prRenderTeamInsights_(data.teamInsights);
    prRenderKpis_(data.teamStats, data.trendData);
    prRenderAgentTable_(data.agentData);
    prRenderCharts_(data);
  }

  /**
   * Subtle banner when the user picked only a subset of the dept
   * roster. Prevents the "why are my totals low?" confusion --
   * makes it explicit that the report reflects selection, not the
   * full dept.
   */
  function prRenderSubsetHint_(meta) {
    const el = $('pr-subset-hint');
    if (!el || !meta) return;
    const selected = (meta.agents || []).length;
    const rosterSize = meta.rosterSize || 0;
    if (rosterSize === 0 || selected >= rosterSize) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.textContent = 'Showing ' + selected + ' of ' + rosterSize
                   + ' dept agents. Totals reflect this selection only.';
    el.style.display = '';
  }

  /**
   * Team insights callout: server-side rules render up to 3 short
   * observations about the team's current vs prior period. Reuses
   * the Individual Report's irInsightsBlock_ HTML helper since the
   * insight shape is identical (`{ type, text }`).
   */
  function prRenderTeamInsights_(insights) {
    const host = $('pr-team-insights');
    if (!host) return;
    if (!insights || !insights.length) {
      host.innerHTML = '';
      return;
    }
    host.innerHTML = irInsightsBlock_(insights)
      // Subtle override: the IR callout label says "Insights" --
      // for PR we want "Team insights" to disambiguate from the
      // per-agent insights users see on the Individual Report.
      .replace('<div class="ir-insights-label">Insights</div>',
               '<div class="ir-insights-label">Team insights</div>');
  }

  function prResetTabs_() {
    const container = $('pr-chart-tabs');
    if (!container) return;
    container.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-tab') === 'share';
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#pr-charts-container [data-panel]').forEach(function (p) {
      p.style.display = p.getAttribute('data-panel') === 'share' ? '' : 'none';
    });
  }

  /**
   * Renders the 6 KPI tiles: Rung, Missed, Answered, % Answered,
   * TTT, ATT -- each with current value, delta vs prior, and an
   * inline 12-month sparkline from the trend series. Delta color
   * semantics:
   *   - Rung / Answered / % Answered: above = positive (blue)
   *   - Missed: above = negative (orange)
   *   - TTT / ATT: neutral (longer can be thorough or slow)
   */
  function prRenderKpis_(teamStats, trendData) {
    const t = teamStats || {};
    const series = (trendData && trendData.series) || [];
    const sparks = {
      rung:     series.map(function (s) { return s.rung; }),
      missed:   series.map(function (s) { return s.missed; }),
      answered: series.map(function (s) { return s.answered; }),
      pct:      series.map(function (s) { return s.pct; }),
      ttt:      series.map(function (s) { return s.ttt; }),
      att:      series.map(function (s) { return s.att; }),
    };
    const tiles = [
      prKpiTile_('Total Rung',  t.rung,     'pos', sparks.rung,     IR_VOLUME_COLORS.rung),
      prKpiTile_('Total Missed',t.missed,   'neg', sparks.missed,   IR_VOLUME_COLORS.missed),
      prKpiTile_('Answered',    t.answered, 'pos', sparks.answered, IR_VOLUME_COLORS.answered),
      prKpiTile_('% Answered',  t.pct,      'pos', sparks.pct,      (THEME.accent || '#4E79A7')),
      prKpiTile_('Total TTT',   t.ttt,      'neu', sparks.ttt,      (THEME.muted  || '#9C755F')),
      prKpiTile_('Avg ATT',     t.att,      'neu', sparks.att,      (THEME.muted  || '#9C755F')),
    ].join('');
    $('pr-kpi-row').innerHTML = tiles;
  }

  function prKpiTile_(label, stat, valenceDirection, sparklineData, sparklineColor) {
    const s = stat || { formatted: '-', deltaPct: 0, type: 'volume' };
    const isPctType = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    let badge;
    if (Math.abs(dp) < 0.05) {
      badge = '<span class="pr-delta pr-delta-neu">no change</span>';
    } else {
      let cls = 'pr-delta-neu';
      if (valenceDirection === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
      else if (valenceDirection === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = isPctType ? ' pts' : '%';
      badge = '<span class="pr-delta ' + cls + '">'
            +   '<span class="pr-delta-arrow">' + arrow + '</span> ' + Math.abs(dp).toFixed(1) + suffix
            + '</span>';
    }
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    return '<div class="pr-kpi-tile">'
         +   '<div class="pr-kpi-row-top">'
         +     '<div class="pr-kpi-label">' + label + '</div>'
         +     '<div class="pr-kpi-spark">' + spark + '</div>'
         +   '</div>'
         +   '<div class="pr-kpi-value">' + escapeHtml(String(s.formatted)) + '</div>'
         +   '<div class="pr-kpi-delta">' + badge + ' <span class="pr-delta-cap">vs prior</span></div>'
         + '</div>';
  }

  /**
   * Per-agent table with sortable column headers + a per-agent
   * share-of-team-answered column. Click a header to toggle sort
   * direction; arrows in the header indicate current sort key.
   */
  function prRenderAgentTable_(agentData) {
    const teamAnswered = (agentData || []).reduce(function (a, b) {
      return a + (b.raw.answered || 0);
    }, 0);
    const cols = [
      { key: 'name',     label: 'Agent',      isNum: false },
      { key: 'rung',     label: 'Rung',       isNum: true },
      { key: 'missed',   label: 'Missed',     isNum: true },
      { key: 'answered', label: 'Answered',   isNum: true },
      { key: 'share',    label: 'Share',      isNum: true,
        title: 'This agent\'s share of total Answered calls across the selected team.' },
      { key: 'pct',      label: '% Answered', isNum: true },
      { key: 'ttt',      label: 'TTT',        isNum: true },
      { key: 'att',      label: 'ATT',        isNum: true },
    ];
    const sorted = prSortAgentData_(agentData || []);

    const head = cols.map(function (c) {
      const arrow = (prSortKey === c.key)
        ? (prSortDir === 'asc' ? ' &#9650;' : ' &#9660;')
        : '';
      const titleAttr = c.title ? ' title="' + escapeHtml(c.title) + '"' : '';
      return '<th class="pr-th-sortable' + (c.isNum ? ' num' : '') + '"'
           + ' data-sort-key="' + c.key + '"' + titleAttr + '>'
           +   escapeHtml(c.label) + arrow
           + '</th>';
    }).join('');

    const rows = sorted.map(function (a) {
      const share = teamAnswered > 0
        ? ((a.raw.answered / teamAnswered) * 100).toFixed(1) + '%'
        : '-';
      return '<tr>'
           +   '<td>' + escapeHtml(a.name) + '</td>'
           +   '<td class="num">' + a.stats.rung + '</td>'
           +   '<td class="num">' + a.stats.missed + '</td>'
           +   '<td class="num">' + a.stats.answered + '</td>'
           +   '<td class="num">' + share + '</td>'
           +   '<td class="num">' + a.stats.pct + '</td>'
           +   '<td class="num">' + a.stats.ttt + '</td>'
           +   '<td class="num">' + a.stats.att + '</td>'
           + '</tr>';
    }).join('');

    $('pr-agent-table-wrap').innerHTML =
      '<table class="pr-agent-table">'
      +   '<thead><tr>' + head + '</tr></thead>'
      +   '<tbody>' + rows + '</tbody>'
      + '</table>';

    // Click handlers on the sortable column headers. Re-renders
    // the table in place so the sort indicator updates too.
    $('pr-agent-table-wrap').querySelectorAll('.pr-th-sortable').forEach(function (th) {
      th.addEventListener('click', function () {
        const key = th.getAttribute('data-sort-key');
        if (prSortKey === key) {
          prSortDir = (prSortDir === 'asc') ? 'desc' : 'asc';
        } else {
          prSortKey = key;
          // Sensible default direction by column: numeric desc, name asc.
          prSortDir = (key === 'name') ? 'asc' : 'desc';
        }
        prSavePrefs_();
        prRenderAgentTable_(agentData);
      });
    });
  }

  /**
   * Returns a sorted copy of agentData per prSortKey + prSortDir.
   * Numeric columns sort on raw values; name sorts case-insensitively.
   * Share is derived from raw.answered (it's a ratio against the
   * team total, so sort order matches raw.answered).
   */
  function prSortAgentData_(agentData) {
    const sorted = agentData.slice();
    const key = prSortKey;
    const dir = prSortDir;
    sorted.sort(function (a, b) {
      let av, bv;
      if (key === 'name') {
        av = (a.name || '').toLowerCase();
        bv = (b.name || '').toLowerCase();
      } else if (key === 'share') {
        // Share is a function of raw.answered against the team
        // total, so ordering by raw.answered is equivalent.
        av = a.raw.answered || 0;
        bv = b.raw.answered || 0;
      } else {
        av = a.raw[key] || 0;
        bv = b.raw[key] || 0;
      }
      if (av === bv) return 0;
      return dir === 'asc' ? (av < bv ? -1 : 1) : (av < bv ? 1 : -1);
    });
    return sorted;
  }

  function prRenderCharts_(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    prChartInstances.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    prChartInstances = [];
    // Sweep up any orphans left by a partial-crash on the previous render.
    ['pr-share-chart', 'pr-volume-chart', 'pr-trend-chart'].forEach(destroyOrphanedChartOnCanvas_);

    // Reveal every chart panel temporarily so each canvas has
    // non-zero dimensions at Chart.js instantiation time. Without
    // this, the inactive-tab charts (Volume & Efficiency,
    // 12-Month Trend) come up 0x0 and don't recover when their
    // tab is clicked.
    const prPanels = Array.prototype.slice.call(
      document.querySelectorAll('#pr-charts-container [data-panel]'));
    const prSavedDisplays = prPanels.map(function (p) { return p.style.display; });
    prPanels.forEach(function (p) { p.style.display = ''; });

    const showLabels = $('pr-show-datalabels') ? $('pr-show-datalabels').checked : true;
    // Per-chart registration (rather than Chart.register'ing
    // globally) so the Missed Calls bar chart isn't affected by
    // the data labels plugin.
    const prPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    // Pie: share of answered. Labels show "N (X%)" inside each
    // slice when the toggle is on; hidden when off.
    const pieData = (data.chartData && data.chartData.sharePie) || [];
    const pieColors = pieData.map(function (_, i) {
      return IR_CHART_COLORS[i % IR_CHART_COLORS.length];
    });
    const pie = new Chart($('pr-share-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: pieData.map(function (d) { return d.label; }),
        datasets: [{
          data:            pieData.map(function (d) { return d.value; }),
          backgroundColor: pieColors,
          borderColor: THEME.paperCard,
          borderWidth: 2,
        }],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                const pct = total > 0 ? (ctx.parsed / total) * 100 : 0;
                return ctx.label + ': ' + ctx.parsed + ' (' + pct.toFixed(1) + '%)';
              },
            },
          },
          datalabels: {
            display: function (ctx) {
              if (!showLabels) return false;
              // Don't render labels on tiny slices -- they overlap
              // and look messy. Threshold: < 4% of total.
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              return total > 0 && (ctx.dataset.data[ctx.dataIndex] / total) >= 0.04;
            },
            color: THEME.paper,
            font: { family: "'IBM Plex Mono', monospace", size: 11, weight: '500' },
            textAlign: 'center',
            formatter: function (value, ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              const pct = total > 0 ? (value / total * 100).toFixed(1) : '0';
              return value + '\n(' + pct + '%)';
            },
          },
        },
      },
    });
    prChartInstances.push(pie);

    // Stacked bar (Answered/Missed) + line overlay (% Answered) on
    // a second y-axis. The bars show volume per agent; the line
    // shows efficiency in one shared view. Mixed chart so the line
    // datasets carry `type: 'line'` explicitly.
    const volData = (data.chartData && data.chartData.volumeBar) || [];
    const bar = new Chart($('pr-volume-chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: volData.map(function (d) { return d.label; }),
        datasets: [
          { label: 'Answered', type: 'bar',
            data: volData.map(function (d) { return d.answered; }),
            backgroundColor: IR_VOLUME_COLORS.answered, stack: 'vol', yAxisID: 'y',
            order: 2 },
          { label: 'Missed', type: 'bar',
            data: volData.map(function (d) { return d.missed; }),
            backgroundColor: IR_VOLUME_COLORS.missed,   stack: 'vol', yAxisID: 'y',
            order: 2 },
          { label: '% Answered', type: 'line',
            data: volData.map(function (d) { return Number((d.pct || 0).toFixed(1)); }),
            // showLine: false renders the dataset as discrete
            // points only. Connecting agents with a line was
            // visually misleading -- agents are independent
            // categories, not a time series. Points + larger
            // radius reads as "per-agent dot" rather than trend.
            showLine: false,
            borderColor: THEME.accent, backgroundColor: THEME.accent,
            fill: false, yAxisID: 'y1',
            pointRadius: 6, pointHoverRadius: 8,
            pointBackgroundColor: THEME.accent,
            pointBorderColor: THEME.paperCard, pointBorderWidth: 2,
            order: 1 },
        ],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'bottom' },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const ds = ctx.dataset.label;
                if (ds === '% Answered') return ds + ': ' + ctx.parsed.y + '%';
                return ds + ': ' + ctx.parsed.y;
              },
            },
          },
          datalabels: {
            // Boolean form matches IR's working pattern. Conditional
            // hiding (zero-value bars, etc.) is handled by formatter
            // returning '' below -- a function-form `display` callback
            // appears to suppress labels on mixed bar+line charts in
            // chartjs-plugin-datalabels@2.2.0.
            display: showLabels,
            // Use each dataset's own color for text + border so each
            // label visually identifies which series it belongs to
            // (Answered = good, Missed = warn, % Answered = accent).
            // Matches the colored-pill aesthetic of the line label.
            color: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.ink;
            },
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.line;
            },
            borderWidth: 1,
            borderRadius: 2,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            // Stacked bars: center the label inside each segment so
            // it sits on top of the bar's colored fill rather than
            // floating above it (which overlapped the next bar's
            // line dot at the top of the stack). Line dots stay
            // above-the-point.
            anchor: function (ctx) { return ctx.dataset.type === 'line' ? 'center' : 'center'; },
            align: function (ctx) { return ctx.dataset.type === 'line' ? 'top' : 'center'; },
            clamp: true,
            clip: false,
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value, ctx) {
              if (value == null) return '';
              if (ctx.dataset.type === 'line') return value + '%';
              return value > 0 ? value : '';
            },
          },
        },
        scales: {
          x: { stacked: true, ticks: { autoSkip: false, maxRotation: 30, minRotation: 0 } },
          y: { stacked: true, beginAtZero: true, position: 'left',
               title: { display: true, text: 'Calls', font: { size: 11 } } },
          y1: { beginAtZero: true, max: 100, position: 'right',
                title: { display: true, text: '% Answered', font: { size: 11 } },
                grid: { drawOnChartArea: false },
                ticks: { callback: function (v) { return v + '%'; } } },
        },
      },
    });
    prChartInstances.push(bar);

    // Trend chart -- factored out so the metric sub-tabs can
    // re-render it without rebuilding the pie + bar.
    prRenderTrendChart_(data);

    // Restore panel visibility (only the active tab visible).
    // Chart layout state is preserved across the re-hide so the
    // now-hidden charts paint correctly when their tab clicks.
    prPanels.forEach(function (p, i) { p.style.display = prSavedDisplays[i]; });
  }

  /**
   * Renders (or re-renders) only the 12-month trend chart, using
   * prActiveTrendMetric to pick which series to plot. Destroys
   * any previously-tracked trend chart instance and replaces the
   * tail of prChartInstances so re-renders don't accumulate.
   */
  function prRenderTrendChart_(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    // Defensive orphan cleanup (in case a previous render crashed).
    destroyOrphanedChartOnCanvas_('pr-trend-chart');
    // Destroy any existing trend chart instance.
    const remaining = [];
    prChartInstances.forEach(function (c) {
      if (c.canvas && c.canvas.id === 'pr-trend-chart') c.destroy();
      else remaining.push(c);
    });
    prChartInstances = remaining;

    const showLabels = $('pr-show-datalabels') ? $('pr-show-datalabels').checked : true;
    const prPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];
    const labels = (data.trendData && data.trendData.labels) || [];
    const series = (data.trendData && data.trendData.series) || [];

    // Per-metric chart config: color, data, label formatter, and
    // y-axis treatment (% gets a 0-100 ceiling with a "%" suffix;
    // ATT formats as minutes; volume is raw counts). Colors route
    // through the design tokens so the per-metric tint matches the
    // app's chrome: accent (slate-blue) for %, muted for ATT,
    // good (sage) for answered volume.
    let dataPoints, color, label, isPercent, isMinutes;
    if (prActiveTrendMetric === 'pct') {
      dataPoints = series.map(function (s) { return Number((s.pct || 0).toFixed(1)); });
      color = THEME.accent || '#4E79A7';
      label = '% Answered';
      isPercent = true;
    } else if (prActiveTrendMetric === 'att') {
      dataPoints = series.map(function (s) { return Number(((s.att || 0) / 60).toFixed(2)); });
      color = THEME.muted || '#9C755F';
      label = 'Avg Talk Time';
      isMinutes = true;
    } else {
      dataPoints = series.map(function (s) { return s.answered; });
      color = IR_VOLUME_COLORS.answered;
      label = 'Answered';
    }

    const fmtMin = function (val) {
      const n = parseFloat(val); if (isNaN(n)) return '';
      const m = Math.floor(n);
      const s = Math.round((n - m) * 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    };

    const trend = new Chart($('pr-trend-chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: label,
          data: dataPoints,
          borderColor: color,
          backgroundColor: function (ctx) {
            return irGradientFill_(ctx.chart, color);
          },
          tension: 0.4, fill: true,
          pointBackgroundColor: color,
          pointBorderColor: THEME.paperCard, pointBorderWidth: 1.5,
          pointRadius: 3, pointHoverRadius: 5,
        }],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                if (isPercent) return label + ': ' + ctx.parsed.y + '%';
                if (isMinutes) return label + ': ' + fmtMin(ctx.parsed.y);
                return label + ': ' + ctx.parsed.y;
              },
            },
          },
          datalabels: {
            // Boolean form. Zero/null values suppressed via formatter.
            display: showLabels,
            align: 'top', anchor: 'center',
            backgroundColor: THEME.paperCard,
            borderColor: color, borderWidth: 1, borderRadius: 2,
            color: color,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value) {
              if (value == null) return '';
              if (isPercent) return value + '%';
              if (isMinutes) return fmtMin(value);
              return value > 0 ? value : '';
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: isPercent ? 100 : undefined,
            ticks: {
              callback: function (val) {
                if (isPercent) return val + '%';
                if (isMinutes) return fmtMin(val);
                return val;
              },
            },
          },
        },
      },
    });
    prChartInstances.push(trend);
  }

  function prSetExportMenuOpen_(open) {
    const btn  = $('pr-export-btn');
    const menu = $('pr-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';

  function prBtnFeedback_(label, holdMs) {
    const btn = $('pr-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) setTimeout(function () { btn.innerHTML = btn.dataset.label; btn.disabled = false; }, holdMs);
    return function restore() { btn.innerHTML = btn.dataset.label; btn.disabled = false; };
  }

  /**
   * Shared html2canvas capture for Performance Report. Same trick
   * as the Individual Report: reveal all chart panels + resize
   * before snapshotting so each canvas has rendered pixels.
   */
  function prBuildCanvas_(onDone) {
    const root = $('performance-results');
    if (!root) return;
    const panels = root.querySelectorAll('#pr-charts-container [data-panel]');
    const savedDisplays = [];
    panels.forEach(function (p) {
      savedDisplays.push(p.style.display);
      p.style.display = '';
    });
    prChartInstances.forEach(function (c) { c.resize(); });

    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });
      panels.forEach(function (p, i) { p.style.display = savedDisplays[i]; });
      prChartInstances.forEach(function (c) { c.resize(); });

      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.querySelector('#performance-results .ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const tabs = clonedDoc.getElementById('pr-chart-tabs');
          if (tabs) tabs.style.display = 'none';
          const subTabs = clonedDoc.getElementById('pr-trend-subtabs');
          if (subTabs) subTabs.style.display = 'none';
          const toggle = clonedDoc.getElementById('pr-datalabels-box');
          if (toggle) toggle.style.display = 'none';
          const status = clonedDoc.getElementById('pr-results-status');
          if (status) status.style.display = 'none';
          clonedDoc.querySelectorAll('#pr-charts-container [data-panel]').forEach(function (p) {
            p.style.display = '';
            p.style.marginBottom = '14px';
          });
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); });
    }); });
  }

  function prCopyImage_() {
    const restore = prBtnFeedback_('Capturing…', 0);
    prBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              restore();
              prBtnFeedback_('Copied!', 1200);
            }, function (err) {
              prSetResultsStatus('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              restore();
            });
        } else {
          prSetResultsStatus('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  function prEmailImage_() {
    const restore = prBtnFeedback_('Capturing…', 0);
    prBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      prBtnFeedback_('Sending…', 0);
      google.script.run
        .withSuccessHandler(function (res) {
          restore();
          prBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
        })
        .withFailureHandler(function (err) {
          prSetResultsStatus('error', 'Email failed: ' + (err && err.message ? err.message : err));
          restore();
        })
        .sendPerformanceReportEmail({
          imageBase64: dataUrl,
          dateLabel: prLastData && prLastData.dateLabel ? prLastData.dateLabel : '',
        });
    });
  }

  // -- Compare Ranges modal (admin-only) --------------------------------
  // Side-by-side comparison of two arbitrary date ranges for the
  // same set of agents. P1 is the baseline; P2 is the comparison.
  // Renders team KPI tiles with P1/P2/delta, a grouped bar chart
  // (Answered / Rung / % Answered per agent, switchable via the
  // tab strip), and a per-agent card showing all six metrics in a
  // P1 vs P2 vs delta table.

  let crLastRoster = { dept: null, agents: [], activeAgents: null, rangeKey: '' };
  let crLastData = null;
  let crActiveFetchTimer = null;
  let crChartInstance = null;
  let crActiveChartMetric = 'answered';
  let crCardSort = 'selection';     // selection | name | improvers | regressors
  let crPendingAgentSelection_ = null;
  const CR_PREFS_KEY = 'cdr.cr.prefs.v1';

  function initCompareRanges() {
    const btn = $('compare-ranges-btn');
    const modal = $('compare-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', onKeyDown);
      if (closeBtn) closeBtn.focus();
      showCrForm();
      ensureCrDefaultDates_();
      ensureCrRoster();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Preset dropdown handler.
    const preset = $('cr-preset');
    if (preset) preset.addEventListener('change', applyCrPreset);

    // Each of the four date inputs triggers a debounced re-fetch
    // of the active-agent subset (union of both ranges) and an
    // immediate refresh of the period-length hint.
    ['cr-p1-from','cr-p1-to','cr-p2-from','cr-p2-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', function () {
        resetCrPreset_();
        crUpdatePeriodLengths_();
        scheduleCrActiveAgentRefetch_();
        crSavePrefs_();
      });
    });

    // Swap button: flips P1 and P2 dates in place.
    const swapBtn = $('cr-swap-periods');
    if (swapBtn) swapBtn.addEventListener('click', crSwapPeriods_);

    const selAll  = $('cr-select-all');
    const selNone = $('cr-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); crToggleAgents_(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); crToggleAgents_(false); });

    const search = $('cr-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('cr-agent-list'), search.value);
    });

    const genBtn = $('cr-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runCrReport);
    const backBtn = $('cr-back-btn');
    if (backBtn) backBtn.addEventListener('click', showCrForm);

    const labelToggle = $('cr-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      crSavePrefs_();
      if (crLastData) crRenderChart_(crLastData);
    });

    // Chart metric tabs: switch which metric the grouped bar shows.
    const tabContainer = $('cr-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      crActiveChartMetric = tab.getAttribute('data-metric') || 'answered';
      tabContainer.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b === tab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      crSavePrefs_();
      if (crLastData) {
        crRenderChart_(crLastData);
        crRenderChartSummary_(crLastData);
      }
    });

    // Card sort dropdown.
    const cardSortSel = $('cr-card-sort');
    if (cardSortSel) cardSortSel.addEventListener('change', function () {
      crCardSort = cardSortSel.value;
      crSavePrefs_();
      if (crLastData) crRenderAgentCards_(crLastData.agentData, crLastData.meta, crLastData.teamStats);
    });

    // Edit-selection popover wiring (results header).
    const editBtn = $('cr-edit-selection-btn');
    if (editBtn) editBtn.addEventListener('click', crOpenEditPopover_);
    const editClose = $('cr-edit-popover-close');
    if (editClose) editClose.addEventListener('click', crCloseEditPopover_);
    const editApply = $('cr-edit-apply-btn');
    if (editApply) editApply.addEventListener('click', crApplyEditPopover_);
    const editSelAll  = $('cr-edit-select-all');
    const editSelNone = $('cr-edit-select-none');
    if (editSelAll)  editSelAll.addEventListener('click',  function (e) { e.preventDefault(); crTogglePopoverAgents_(true);  });
    if (editSelNone) editSelNone.addEventListener('click', function (e) { e.preventDefault(); crTogglePopoverAgents_(false); });
    const editSearch = $('cr-edit-search');
    if (editSearch) editSearch.addEventListener('input', function () {
      irFilterAgentList_($('cr-edit-list'), editSearch.value);
    });
    document.addEventListener('click', function (e) {
      const pop = $('cr-edit-popover');
      if (!pop || pop.style.display === 'none') return;
      if (pop.contains(e.target)) return;
      if (e.target === editBtn) return;
      crCloseEditPopover_();
    });

    // Export dropdown.
    const exportBtn  = $('cr-export-btn');
    const exportMenu = $('cr-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        crSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        crSetExportMenuOpen_(false);
        if (action === 'copy')  crCopyImage_();
        else if (action === 'email') crEmailImage_();
        else if (action === 'print') crPrint_();
        else if (action === 'csv')   crDownloadCsv_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        crSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          crSetExportMenuOpen_(false);
        }
      });
    }

    crRestorePrefs_();
    crUpdatePeriodLengths_();
  }

  function ensureCrDefaultDates_() {
    // Only fill if blank -- preserves the user's edits and saved
    // prefs. The init endpoint also returns defaults, but we set
    // locally first so the form renders without waiting on the
    // server.
    const today = new Date();
    const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    const firstOfLastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const endOfLastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
    const iso = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('cr-p1-from') && !$('cr-p1-from').value) $('cr-p1-from').value = iso(firstOfLastMonth);
    if ($('cr-p1-to')   && !$('cr-p1-to').value)   $('cr-p1-to').value   = iso(endOfLastMonth);
    if ($('cr-p2-from') && !$('cr-p2-from').value) $('cr-p2-from').value = iso(firstOfMonth);
    if ($('cr-p2-to')   && !$('cr-p2-to').value)   $('cr-p2-to').value   = iso(today);
  }

  function applyCrPreset() {
    const v = $('cr-preset').value;
    if (v === 'custom') { crSavePrefs_(); return; }
    const today = new Date();
    const iso = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    let p1From, p1To, p2From, p2To;

    if (v === 'lastVsThisMonth') {
      p1From = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      p1To   = new Date(today.getFullYear(), today.getMonth(), 0);
      p2From = new Date(today.getFullYear(), today.getMonth(), 1);
      p2To   = new Date(today);
    } else if (v === 'yoyMonth') {
      p1From = new Date(today.getFullYear() - 1, today.getMonth(), 1);
      p1To   = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
      p2From = new Date(today.getFullYear(),     today.getMonth(), 1);
      p2To   = new Date(today);
    } else if (v === 'last30VsPrev30') {
      p2To   = new Date(today);
      p2From = new Date(today); p2From.setDate(today.getDate() - 29);
      p1To   = new Date(p2From); p1To.setDate(p1To.getDate() - 1);
      p1From = new Date(p1To);  p1From.setDate(p1To.getDate() - 29);
    } else if (v === 'last3MoVsPrev3Mo') {
      p2To   = new Date(today);
      p2From = new Date(today); p2From.setMonth(today.getMonth() - 3);
      p1To   = new Date(p2From); p1To.setDate(p1To.getDate() - 1);
      p1From = new Date(p1To);  p1From.setMonth(p1To.getMonth() - 3);
    } else if (v === 'lastYearVsThisYear') {
      p1From = new Date(today.getFullYear() - 1, 0, 1);
      p1To   = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
      p2From = new Date(today.getFullYear(),     0, 1);
      p2To   = new Date(today);
    } else {
      return;
    }

    $('cr-p1-from').value = iso(p1From);
    $('cr-p1-to').value   = iso(p1To);
    $('cr-p2-from').value = iso(p2From);
    $('cr-p2-to').value   = iso(p2To);
    crUpdatePeriodLengths_();
    crSavePrefs_();
    scheduleCrActiveAgentRefetch_();
  }
  function resetCrPreset_() {
    const p = $('cr-preset');
    if (p) p.value = 'custom';
  }

  /**
   * Displays the period-length hint under the date inputs.
   * Equal-length periods get a "Equal length" check; unequal
   * periods get a warning indicating the ratio so users notice
   * that volume comparisons aren't apples-to-apples.
   */
  function crUpdatePeriodLengths_() {
    const el = $('cr-length-hint');
    if (!el) return;
    const p1F = $('cr-p1-from') && $('cr-p1-from').value;
    const p1T = $('cr-p1-to')   && $('cr-p1-to').value;
    const p2F = $('cr-p2-from') && $('cr-p2-from').value;
    const p2T = $('cr-p2-to')   && $('cr-p2-to').value;
    if (!p1F || !p1T || !p2F || !p2T) { el.innerHTML = ''; return; }
    if (p1F > p1T || p2F > p2T)       { el.innerHTML = ''; return; }
    const ms = 86400000;
    const p1Days = Math.round((new Date(p1T+'T12:00:00') - new Date(p1F+'T12:00:00')) / ms) + 1;
    const p2Days = Math.round((new Date(p2T+'T12:00:00') - new Date(p2F+'T12:00:00')) / ms) + 1;
    const mismatch = (Math.min(p1Days, p2Days) > 0)
                  && (Math.max(p1Days, p2Days) / Math.min(p1Days, p2Days) >= 1.2);
    let extra = '';
    if (p1Days === p2Days) {
      // Exactly equal -- only state in which we claim parity.
      extra = '<span class="cr-length-ok">&#10003; Equal length</span>';
    } else if (mismatch) {
      // Big difference (>= 1.2x) -- volume totals not comparable.
      const ratio = (Math.max(p1Days, p2Days) / Math.min(p1Days, p2Days)).toFixed(1);
      extra = '<span class="cr-length-warn">'
            + '&#9888; Period 2 is ' + ratio + '&times; '
            + (p2Days > p1Days ? 'longer than P1' : 'shorter than P1')
            + ' &mdash; volume totals aren\'t directly comparable.'
            + '</span>';
    } else {
      // Small difference -- note it but don't sound the alarm.
      const diff = Math.abs(p2Days - p1Days);
      const direction = p2Days > p1Days ? 'longer' : 'shorter';
      extra = '<span class="cr-length-diff">'
            + 'Period 2 is <strong>' + diff + '</strong> day'
            + (diff === 1 ? '' : 's') + ' ' + direction + ' than P1'
            + '</span>';
    }
    el.innerHTML = '<span class="cr-length-spec">Period 1: <strong>' + p1Days + '</strong> day'
                 + (p1Days === 1 ? '' : 's') + '</span>'
                 + ' &middot; '
                 + '<span class="cr-length-spec">Period 2: <strong>' + p2Days + '</strong> day'
                 + (p2Days === 1 ? '' : 's') + '</span>'
                 + ' &middot; '
                 + extra;
  }

  /**
   * Swaps Period 1 and Period 2 date inputs in place. Triggers
   * the same downstream updates as a normal date change.
   */
  function crSwapPeriods_() {
    const p1F = $('cr-p1-from'); const p1T = $('cr-p1-to');
    const p2F = $('cr-p2-from'); const p2T = $('cr-p2-to');
    if (!p1F || !p1T || !p2F || !p2T) return;
    const tmpF = p1F.value, tmpT = p1T.value;
    p1F.value = p2F.value;  p1T.value = p2T.value;
    p2F.value = tmpF;       p2T.value = tmpT;
    resetCrPreset_();
    crUpdatePeriodLengths_();
    scheduleCrActiveAgentRefetch_();
    crSavePrefs_();
  }

  // ── Edit-selection popover (mirrors IR's pattern) ────────────────

        department: dept, agents: newAgents,
        p1From: p1From, p1To: p1To, p2From: p2From, p2To: p2To,
      });
