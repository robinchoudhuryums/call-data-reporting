    const labels = (data.trendData && data.trendData.labels) || [];
    const series = (data.trendData && data.trendData.series) || [];

    // Per-metric chart config: color, data, label formatter, and
    // y-axis treatment (% gets a 0-100 ceiling with a "%" suffix;
    // ATT formats as minutes; volume is raw counts). Colors route
    // through the design tokens so the per-metric tint matches the
    // app's chrome: accent (slate-blue) for %, muted for ATT,
    // good (sage) for answered volume.
    let dataPoints, color, label, isPercent, isMinutes;
    if (prActiveTrendMetric === 'pct') {
      dataPoints = series.map(function (s) { return Number((s.pct || 0).toFixed(1)); });
      color = THEME.accent || '#4E79A7';
      label = '% Answered';
      isPercent = true;
    } else if (prActiveTrendMetric === 'att') {
      dataPoints = series.map(function (s) { return Number(((s.att || 0) / 60).toFixed(2)); });
      color = THEME.muted || '#9C755F';
      label = 'Avg Talk Time';
      isMinutes = true;
    } else {
      dataPoints = series.map(function (s) { return s.answered; });
      color = IR_VOLUME_COLORS.answered;
      label = 'Answered';
    }

    const fmtMin = function (val) {
      const n = parseFloat(val); if (isNaN(n)) return '';
      const m = Math.floor(n);
      const s = Math.round((n - m) * 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    };

    const trend = new Chart($('pr-trend-chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: label,
          data: dataPoints,
          borderColor: color,
          backgroundColor: function (ctx) {
            return irGradientFill_(ctx.chart, color);
          },
          tension: 0.4, fill: true,
          pointBackgroundColor: color,
          pointBorderColor: THEME.paperCard, pointBorderWidth: 1.5,
          pointRadius: 3, pointHoverRadius: 5,
        }],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                if (isPercent) return label + ': ' + ctx.parsed.y + '%';
                if (isMinutes) return label + ': ' + fmtMin(ctx.parsed.y);
                return label + ': ' + ctx.parsed.y;
              },
            },
          },
          datalabels: {
            // Boolean form. Zero/null values suppressed via formatter.
            display: showLabels,
            align: 'top', anchor: 'center',
            backgroundColor: THEME.paperCard,
            borderColor: color, borderWidth: 1, borderRadius: 2,
            color: color,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value) {
              if (value == null) return '';
              if (isPercent) return value + '%';
              if (isMinutes) return fmtMin(value);
              return value > 0 ? value : '';
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: isPercent ? 100 : undefined,
            ticks: {
              callback: function (val) {
                if (isPercent) return val + '%';
                if (isMinutes) return fmtMin(val);
                return val;
              },
            },
          },
        },
      },
    });
    prChartInstances.push(trend);
  }

  function prSetExportMenuOpen_(open) {
    const btn  = $('pr-export-btn');
    const menu = $('pr-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function prPrint_() {
    var panels = document.querySelectorAll('#pr-charts-container [data-panel]');
    var saved = [];
    panels.forEach(function (p) { saved.push(p.style.display); p.style.display = ''; });
    prChartInstances.forEach(function (c) { c.resize(); });
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      panels.forEach(function (p, i) { p.style.display = saved[i]; });
      document.body.classList.add('pr-printing');
      window.print();
      document.body.classList.remove('pr-printing');
    }); });
  }

  function prBtnFeedback_(label, holdMs) {
    const btn = $('pr-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) setTimeout(function () { btn.innerHTML = btn.dataset.label; btn.disabled = false; }, holdMs);
    return function restore() { btn.innerHTML = btn.dataset.label; btn.disabled = false; };
  }

  /**
   * Shared html2canvas capture for Performance Report. Same trick
   * as the Individual Report: reveal all chart panels + resize
   * before snapshotting so each canvas has rendered pixels.
   */
  function prBuildCanvas_(onDone) {
    const root = $('performance-results');
    if (!root) return;
    const panels = root.querySelectorAll('#pr-charts-container [data-panel]');
    const savedDisplays = [];
    panels.forEach(function (p) {
      savedDisplays.push(p.style.display);
      p.style.display = '';
    });
    prChartInstances.forEach(function (c) { c.resize(); });

    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });
      panels.forEach(function (p, i) { p.style.display = savedDisplays[i]; });
      prChartInstances.forEach(function (c) { c.resize(); });

      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.querySelector('#performance-results .ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const tabs = clonedDoc.getElementById('pr-chart-tabs');
          if (tabs) tabs.style.display = 'none';
          const subTabs = clonedDoc.getElementById('pr-trend-subtabs');
          if (subTabs) subTabs.style.display = 'none';
          const toggle = clonedDoc.getElementById('pr-datalabels-box');
          if (toggle) toggle.style.display = 'none';
          const status = clonedDoc.getElementById('pr-results-status');
          if (status) status.style.display = 'none';
          clonedDoc.querySelectorAll('#pr-charts-container [data-panel]').forEach(function (p) {
            p.style.display = '';
            p.style.marginBottom = '14px';
          });
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  function prCopyImage_() {
    const restore = prBtnFeedback_('Capturing…', 0);
    prBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              restore();
              prBtnFeedback_('Copied!', 1200);
            }, function (err) {
              prSetResultsStatus('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              restore();
            });
        } else {
          prSetResultsStatus('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  function prEmailImage_() {
    const restore = prBtnFeedback_('Capturing…', 0);
    prBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      prBtnFeedback_('Sending…', 0);
      google.script.run
        .withSuccessHandler(function (res) {
          restore();
          prBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
          showToast('Report emailed to ' + (res && res.to ? res.to : 'you'), 'success');
        })
        .withFailureHandler(function (err) {
          prSetResultsStatus('error', 'Email failed: ' + (err && err.message ? err.message : err));
          showToast('Email failed', 'error');
          restore();
        })
        .sendPerformanceReportEmail({
          imageBase64: dataUrl,
          dateLabel: prLastData && prLastData.dateLabel ? prLastData.dateLabel : '',
        });
    });
  }

  // -- Compare Ranges modal (admin-only) --------------------------------
  // Side-by-side comparison of two arbitrary date ranges for the
  // same set of agents. P1 is the baseline; P2 is the comparison.
  // Renders team KPI tiles with P1/P2/delta, a grouped bar chart
  // (Answered / Rung / % Answered per agent, switchable via the
  // tab strip), and a per-agent card showing all six metrics in a
  // P1 vs P2 vs delta table.

  let crLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
  let crLastData = null;
  let crActiveFetchTimer = null;
  let crChartInstance = null;
  let crActiveChartMetric = 'answered';
  let crCardSort = 'selection';     // selection | name | improvers | regressors
  let crPendingAgentSelection_ = null;
  let crListChangeHandler_ = null;
  const CR_PREFS_KEY = 'cdr.cr.prefs.v1';

  function initCompareRanges() {
    const btn = $('compare-ranges-btn');
    const modal = $('compare-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      showCrForm();
      ensureCrDefaultDates_();
      ensureCrRoster();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Preset dropdown handler.
    const preset = $('cr-preset');
    if (preset) preset.addEventListener('change', applyCrPreset);

    // Each of the four date inputs triggers a debounced re-fetch
    // of the active-agent subset (union of both ranges) and an
    // immediate refresh of the period-length hint.
    ['cr-p1-from','cr-p1-to','cr-p2-from','cr-p2-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', function () {
        resetCrPreset_();
        crUpdatePeriodLengths_();
        scheduleCrActiveAgentRefetch_();
        crSavePrefs_();
      });
    });

    // Swap button: flips P1 and P2 dates in place.
    const swapBtn = $('cr-swap-periods');
    if (swapBtn) swapBtn.addEventListener('click', crSwapPeriods_);

    const selAll  = $('cr-select-all');
    const selNone = $('cr-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); crToggleAgents_(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); crToggleAgents_(false); });

    const search = $('cr-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('cr-agent-list'), search.value);
    });

    const genBtn = $('cr-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runCrReport);
    const backBtn = $('cr-back-btn');
    if (backBtn) backBtn.addEventListener('click', showCrForm);

    const labelToggle = $('cr-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      crSavePrefs_();
      if (crLastData) crRenderChart_(crLastData);
    });

    // Chart metric tabs: switch which metric the grouped bar shows.
    const tabContainer = $('cr-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      crActiveChartMetric = tab.getAttribute('data-metric') || 'answered';
      tabContainer.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b === tab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      crSavePrefs_();
      if (crLastData) {
        crRenderChart_(crLastData);
        crRenderChartSummary_(crLastData);
      }
    });

    // Card sort dropdown.
    const cardSortSel = $('cr-card-sort');
    if (cardSortSel) cardSortSel.addEventListener('change', function () {
      crCardSort = cardSortSel.value;
      crSavePrefs_();
      if (crLastData) crRenderAgentCards_(crLastData.agentData, crLastData.meta, crLastData.teamStats);
    });

    // Edit-selection popover wiring (results header).
    const editBtn = $('cr-edit-selection-btn');
    if (editBtn) editBtn.addEventListener('click', crOpenEditPopover_);
    const editClose = $('cr-edit-popover-close');
    if (editClose) editClose.addEventListener('click', crCloseEditPopover_);
    const editApply = $('cr-edit-apply-btn');
    if (editApply) editApply.addEventListener('click', crApplyEditPopover_);
    const editSelAll  = $('cr-edit-select-all');
    const editSelNone = $('cr-edit-select-none');
    if (editSelAll)  editSelAll.addEventListener('click',  function (e) { e.preventDefault(); crTogglePopoverAgents_(true);  });
    if (editSelNone) editSelNone.addEventListener('click', function (e) { e.preventDefault(); crTogglePopoverAgents_(false); });
    const editSearch = $('cr-edit-search');
    if (editSearch) editSearch.addEventListener('input', function () {
      irFilterAgentList_($('cr-edit-list'), editSearch.value);
    });
    document.addEventListener('click', function (e) {
      const pop = $('cr-edit-popover');
      if (!pop || pop.style.display === 'none') return;
      if (pop.contains(e.target)) return;
      if (e.target === editBtn) return;
      crCloseEditPopover_();
    });

    // Export dropdown.
    const exportBtn  = $('cr-export-btn');
    const exportMenu = $('cr-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        crSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        crSetExportMenuOpen_(false);
        if (action === 'copy')  crCopyImage_();
        else if (action === 'email') crEmailImage_();
        else if (action === 'print') crPrint_();
        else if (action === 'csv')   crDownloadCsv_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        crSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          crSetExportMenuOpen_(false);
        }
      });
    }

    crRestorePrefs_();
    crUpdatePeriodLengths_();
  }

  function ensureCrDefaultDates_() {
    // Only fill if blank -- preserves the user's edits and saved
    // prefs. The init endpoint also returns defaults, but we set
    // locally first so the form renders without waiting on the
    // server.
    const today = new Date();
    const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    const firstOfLastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const endOfLastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
    const iso = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('cr-p1-from') && !$('cr-p1-from').value) $('cr-p1-from').value = iso(firstOfLastMonth);
    if ($('cr-p1-to')   && !$('cr-p1-to').value)   $('cr-p1-to').value   = iso(endOfLastMonth);
    if ($('cr-p2-from') && !$('cr-p2-from').value) $('cr-p2-from').value = iso(firstOfMonth);
    if ($('cr-p2-to')   && !$('cr-p2-to').value)   $('cr-p2-to').value   = iso(today);
  }

  function applyCrPreset() {
    const v = $('cr-preset').value;
    if (v === 'custom') { crSavePrefs_(); return; }
    const today = new Date();
    const iso = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    let p1From, p1To, p2From, p2To;

    if (v === 'lastVsThisMonth') {
      p1From = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      p1To   = new Date(today.getFullYear(), today.getMonth(), 0);
      p2From = new Date(today.getFullYear(), today.getMonth(), 1);
      p2To   = new Date(today);
    } else if (v === 'yoyMonth') {
      p1From = new Date(today.getFullYear() - 1, today.getMonth(), 1);
      p1To   = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
      p2From = new Date(today.getFullYear(),     today.getMonth(), 1);
      p2To   = new Date(today);
    } else if (v === 'last30VsPrev30') {
      p2To   = new Date(today);
      p2From = new Date(today); p2From.setDate(today.getDate() - 29);
      p1To   = new Date(p2From); p1To.setDate(p1To.getDate() - 1);
      p1From = new Date(p1To);  p1From.setDate(p1To.getDate() - 29);
    } else if (v === 'last3MoVsPrev3Mo') {
      p2To   = new Date(today);
      p2From = new Date(today); p2From.setMonth(today.getMonth() - 3);
      p1To   = new Date(p2From); p1To.setDate(p1To.getDate() - 1);
      p1From = new Date(p1To);  p1From.setMonth(p1To.getMonth() - 3);
    } else if (v === 'lastYearVsThisYear') {
      p1From = new Date(today.getFullYear() - 1, 0, 1);
      p1To   = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
      p2From = new Date(today.getFullYear(),     0, 1);
      p2To   = new Date(today);
    } else {
      return;
    }

    $('cr-p1-from').value = iso(p1From);
    $('cr-p1-to').value   = iso(p1To);
    $('cr-p2-from').value = iso(p2From);
    $('cr-p2-to').value   = iso(p2To);
    crUpdatePeriodLengths_();
    crSavePrefs_();
    scheduleCrActiveAgentRefetch_();
  }
  function resetCrPreset_() {
    const p = $('cr-preset');
    if (p) p.value = 'custom';
  }

  /**
   * Displays the period-length hint under the date inputs.
   * Equal-length periods get a "Equal length" check; unequal
   * periods get a warning indicating the ratio so users notice
   * that volume comparisons aren't apples-to-apples.
   */
  function crUpdatePeriodLengths_() {
    const el = $('cr-length-hint');
    if (!el) return;
    const p1F = $('cr-p1-from') && $('cr-p1-from').value;
    const p1T = $('cr-p1-to')   && $('cr-p1-to').value;
    const p2F = $('cr-p2-from') && $('cr-p2-from').value;
    const p2T = $('cr-p2-to')   && $('cr-p2-to').value;
    if (!p1F || !p1T || !p2F || !p2T) { el.innerHTML = ''; return; }
    if (p1F > p1T || p2F > p2T)       { el.innerHTML = ''; return; }
    const ms = 86400000;
    const p1Days = Math.round((new Date(p1T+'T12:00:00') - new Date(p1F+'T12:00:00')) / ms) + 1;
    const p2Days = Math.round((new Date(p2T+'T12:00:00') - new Date(p2F+'T12:00:00')) / ms) + 1;
    const mismatch = (Math.min(p1Days, p2Days) > 0)
                  && (Math.max(p1Days, p2Days) / Math.min(p1Days, p2Days) >= 1.2);
    let extra = '';
    if (p1Days === p2Days) {
      // Exactly equal -- only state in which we claim parity.
      extra = '<span class="cr-length-ok">&#10003; Equal length</span>';
    } else if (mismatch) {
      // Big difference (>= 1.2x) -- volume totals not comparable.
      const ratio = (Math.max(p1Days, p2Days) / Math.min(p1Days, p2Days)).toFixed(1);
      extra = '<span class="cr-length-warn">'
            + '&#9888; Period 2 is ' + ratio + '&times; '
            + (p2Days > p1Days ? 'longer than P1' : 'shorter than P1')
            + ' &mdash; volume totals aren\'t directly comparable.'
            + '</span>';
    } else {
      // Small difference -- note it but don't sound the alarm.
      const diff = Math.abs(p2Days - p1Days);
      const direction = p2Days > p1Days ? 'longer' : 'shorter';
      extra = '<span class="cr-length-diff">'
            + 'Period 2 is <strong>' + diff + '</strong> day'
            + (diff === 1 ? '' : 's') + ' ' + direction + ' than P1'
            + '</span>';
    }
    el.innerHTML = '<span class="cr-length-spec">Period 1: <strong>' + p1Days + '</strong> day'
                 + (p1Days === 1 ? '' : 's') + '</span>'
                 + ' &middot; '
                 + '<span class="cr-length-spec">Period 2: <strong>' + p2Days + '</strong> day'
                 + (p2Days === 1 ? '' : 's') + '</span>'
                 + ' &middot; '
                 + extra;
  }

  /**
   * Swaps Period 1 and Period 2 date inputs in place. Triggers
   * the same downstream updates as a normal date change.
   */
  function crSwapPeriods_() {
    const p1F = $('cr-p1-from'); const p1T = $('cr-p1-to');
    const p2F = $('cr-p2-from'); const p2T = $('cr-p2-to');
    if (!p1F || !p1T || !p2F || !p2T) return;
    const tmpF = p1F.value, tmpT = p1T.value;
    p1F.value = p2F.value;  p1T.value = p2T.value;
    p2F.value = tmpF;       p2T.value = tmpT;
    resetCrPreset_();
    crUpdatePeriodLengths_();
    scheduleCrActiveAgentRefetch_();
    crSavePrefs_();
  }

  // ── CSV download (no Apps Script call -- pure client) ──────────
  /**
   * Builds a CSV string of the per-agent comparison and triggers
   * a browser download. Includes the team summary row, per-agent
   * P1 / P2 / Delta / direction. Volume metrics with length
   * mismatch include a per-day column.
   */
  function crDownloadCsv_() {
    if (!crLastData) return;
    const meta = crLastData.meta || {};
    const includePerDay = !!meta.lengthMismatch;
    const csv = crBuildCsv_(crLastData, includePerDay);
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'compare-ranges_' + (meta.department || 'report')
               + '_' + (meta.p1From || '') + '_vs_' + (meta.p2From || '')
               + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  function crBuildCsv_(data, includePerDay) {
    const meta = data.meta || {};
    const t    = data.teamStats || {};
    const p1Days = meta.p1Days || 0;
    const p2Days = meta.p2Days || 0;
    const lines = [];
    const esc = function (v) {
      const s = csvSafeCell_(v);
      // Escape per RFC 4180: wrap in quotes if contains comma/quote/newline.
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };

    lines.push(esc('Compare Ranges Report'));
    lines.push(esc('Department') + ',' + esc(meta.department || ''));
    lines.push(esc('Period 1') + ',' + esc(data.p1Label || '') + ',' + esc(p1Days + ' days'));
    lines.push(esc('Period 2') + ',' + esc(data.p2Label || '') + ',' + esc(p2Days + ' days'));
    lines.push('');

    const headers = ['Agent', 'Metric', 'Period 1', 'Period 2', 'Delta %'];
    if (includePerDay) headers.push('P1/day', 'P2/day');
    lines.push(headers.map(esc).join(','));

    // Team summary row across the same metrics first so the CSV
    // opens with the dept-wide view.
    const teamRows = [
      crCsvRow_('TEAM TOTAL', 'Rung',       t.rung,     p1Days, p2Days, includePerDay, 'volume'),
      crCsvRow_('TEAM TOTAL', 'Missed',     t.missed,   p1Days, p2Days, includePerDay, 'volume'),
      crCsvRow_('TEAM TOTAL', 'Answered',   t.answered, p1Days, p2Days, includePerDay, 'volume'),
      crCsvRow_('TEAM TOTAL', '% Answered', t.pct,      p1Days, p2Days, false,         'rate'),
      crCsvRow_('TEAM TOTAL', 'TTT',        t.ttt,      p1Days, p2Days, includePerDay, 'time'),
      crCsvRow_('TEAM TOTAL', 'Avg ATT',    t.att,      p1Days, p2Days, false,         'rate'),
    ];
    teamRows.forEach(function (r) { lines.push(r); });
    lines.push('');

    (data.agentData || []).forEach(function (a) {
      const mkPairStat = function (raw, formatted) {
        // Synthesize a stat-shaped object for crCsvRow_'s helper.
        return { val: raw.p2, prev: raw.p1, formatted: formatted.p2,
                 prevFormatted: formatted.p1, type: 'volume' };
      };
      const mkRateStat = function (raw, formatted, isPctType) {
        return { val: raw.p2, prev: raw.p1, formatted: formatted.p2,
                 prevFormatted: formatted.p1, type: isPctType ? 'pctPoints' : 'volume' };
      };
      const rung     = { p1: a.p1.raw.rung,     p2: a.p2.raw.rung };
      const missed   = { p1: a.p1.raw.missed,   p2: a.p2.raw.missed };
      const answered = { p1: a.p1.raw.answered, p2: a.p2.raw.answered };
      const ttt      = { p1: a.p1.raw.ttt,      p2: a.p2.raw.ttt };
      const att      = { p1: a.p1.raw.att,      p2: a.p2.raw.att };
      const pct      = { p1: a.p1.raw.pct,      p2: a.p2.raw.pct };

      lines.push(crCsvRow_(a.name, 'Rung',
        Object.assign({}, a.deltas.rung,     { val: rung.p2,     prev: rung.p1,
          formatted: a.p2.formatted.rung,     prevFormatted: a.p1.formatted.rung }),
        p1Days, p2Days, includePerDay, 'volume'));
      lines.push(crCsvRow_(a.name, 'Missed',
        Object.assign({}, a.deltas.missed,   { val: missed.p2,   prev: missed.p1,
          formatted: a.p2.formatted.missed,   prevFormatted: a.p1.formatted.missed }),
        p1Days, p2Days, includePerDay, 'volume'));
      lines.push(crCsvRow_(a.name, 'Answered',
        Object.assign({}, a.deltas.answered, { val: answered.p2, prev: answered.p1,
          formatted: a.p2.formatted.answered, prevFormatted: a.p1.formatted.answered }),
        p1Days, p2Days, includePerDay, 'volume'));
      lines.push(crCsvRow_(a.name, '% Answered',
        Object.assign({}, a.deltas.pct,      { val: pct.p2,      prev: pct.p1,
          formatted: a.p2.formatted.pct,      prevFormatted: a.p1.formatted.pct }),
        p1Days, p2Days, false, 'rate'));
      lines.push(crCsvRow_(a.name, 'TTT',
        Object.assign({}, a.deltas.ttt,      { val: ttt.p2,      prev: ttt.p1,
          formatted: a.p2.formatted.ttt,      prevFormatted: a.p1.formatted.ttt }),
        p1Days, p2Days, includePerDay, 'time'));
      lines.push(crCsvRow_(a.name, 'Avg ATT',
        Object.assign({}, a.deltas.att,      { val: att.p2,      prev: att.p1,
          formatted: a.p2.formatted.att,      prevFormatted: a.p1.formatted.att }),
        p1Days, p2Days, false, 'rate'));
    });

    return lines.join('\n') + '\n';
  }

  function crCsvRow_(agentLabel, metric, stat, p1Days, p2Days, includePerDay, kind) {
    const esc = function (v) {
      const s = csvSafeCell_(v);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const isPctType = stat && stat.type === 'pctPoints';
    const dp = Number((stat && stat.deltaPct) || 0);
    const deltaStr = isPctType
      ? dp.toFixed(1) + ' pts'
      : dp.toFixed(1) + '%';
    const cells = [
      agentLabel, metric,
      (stat && stat.prevFormatted) || '',
      (stat && stat.formatted)     || '',
      deltaStr,
    ];
    if (includePerDay && stat && stat.val != null && stat.prev != null
        && (kind === 'volume' || kind === 'time')
        && p1Days > 0 && p2Days > 0) {
      const fmt = (kind === 'time')
        ? function (v) { return crFormatSecondsShort_(v); }
        : function (v) { return v.toFixed(1); };
      cells.push(fmt(stat.prev / p1Days));
      cells.push(fmt(stat.val  / p2Days));
    } else if (includePerDay) {
      cells.push(''); cells.push('');
    }
    return cells.map(esc).join(',');
  }

  // ── Roster fetch (mirrors PR) ─────────────────────────────────────
  function ensureCrRoster() {
    const dept = getRequestedDept();
    if (!dept) {
      $('cr-agent-loader').textContent = 'No department selected.';
      $('cr-agent-list').style.display = 'none';
      return;
    }
    const p1From = $('cr-p1-from').value;
    const p1To   = $('cr-p1-to').value;
    const p2From = $('cr-p2-from').value;
    const p2To   = $('cr-p2-to').value;
    const rangeKey = p1From + '|' + p1To + '|' + p2From + '|' + p2To;

    if (crLastRoster.dept === dept && crLastRoster.agents.length
        && crLastRoster.rangeKey === rangeKey) {
      renderCrAgentList(crLastRoster.agents, crLastRoster.activeAgents, crLastRoster.activeFloaters);
      return;
    }
    $('cr-agent-loader').style.display = '';
    $('cr-agent-list').style.display = 'none';
    $('cr-generate-btn').disabled = true;

    google.script.run
      .withSuccessHandler(function (data) {
        crLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        renderCrAgentList(crLastRoster.agents, crLastRoster.activeAgents, crLastRoster.activeFloaters);
      })
      .withFailureHandler(function (err) {
        $('cr-agent-loader').textContent = 'Error loading roster: '
          + (err && err.message ? err.message : String(err));
      })
      .getCompareRangesInit({
        department: dept,
        p1From: p1From, p1To: p1To, p2From: p2From, p2To: p2To,
      });
  }

  function scheduleCrActiveAgentRefetch_() {
    if (crActiveFetchTimer) clearTimeout(crActiveFetchTimer);
    crActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept();
      if (!dept) return;
      const p1From = $('cr-p1-from').value;
      const p1To   = $('cr-p1-to').value;
      const p2From = $('cr-p2-from').value;
      const p2To   = $('cr-p2-to').value;
      if (!p1From || !p1To || !p2From || !p2To) return;
      if (p1From > p1To || p2From > p2To) return;
      const rangeKey = p1From + '|' + p1To + '|' + p2From + '|' + p2To;
      if (crLastRoster.dept === dept && crLastRoster.rangeKey === rangeKey) return;

      google.script.run
        .withSuccessHandler(function (data) {
          crLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          crLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          crLastRoster.rangeKey = rangeKey;
          const checked = irGetCheckedAgents_($('cr-agent-list'));
          renderCrAgentList(crLastRoster.agents, crLastRoster.activeAgents, crLastRoster.activeFloaters);
          irApplyCheckedAgents_($('cr-agent-list'), checked);
          crUpdateGenerateEnabled_();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getCompareRangesInit({
          department: dept,
          p1From: p1From, p1To: p1To, p2From: p2From, p2To: p2To,
        });
    }, 350);
  }

  function renderCrAgentList(agents, activeAgents, activeFloaters) {
    const list = $('cr-agent-list');
    $('cr-agent-loader').style.display = 'none';
    if (!agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = '';
      $('cr-generate-btn').disabled = true;
      return;
    }
    list.innerHTML = irBuildAgentListHtml_(agents, activeAgents, activeFloaters);
    list.style.display = '';
    if (crListChangeHandler_) list.removeEventListener('change', crListChangeHandler_);
    crListChangeHandler_ = function () {
      crUpdateGenerateEnabled_();
      crSavePrefs_();
    };
    list.addEventListener('change', crListChangeHandler_);
    if (crPendingAgentSelection_) {
      irApplyCheckedAgents_(list, crPendingAgentSelection_);
      crPendingAgentSelection_ = null;
    }
    crUpdateGenerateEnabled_();
  }

  function crUpdateGenerateEnabled_() {
    const boxes = $('cr-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('cr-generate-btn').disabled = boxes.length === 0;
  }

  function crToggleAgents_(checked) {
    selectAllActiveAgents_($('cr-agent-list'), checked);
    crUpdateGenerateEnabled_();
    crSavePrefs_();
  }

  function runCrReport() {
    crSetFormError('');
    const dept = getRequestedDept();
    const p1From = $('cr-p1-from').value;
    const p1To   = $('cr-p1-to').value;
    const p2From = $('cr-p2-from').value;
    const p2To   = $('cr-p2-to').value;
    if (!p1From || !p1To) { crSetFormError('Pick Period 1 start and end dates.'); return; }
    if (!p2From || !p2To) { crSetFormError('Pick Period 2 start and end dates.'); return; }
    if (p1From > p1To)    { crSetFormError('Period 1 start must be on or before end.'); return; }
    if (p2From > p2To)    { crSetFormError('Period 2 start must be on or before end.'); return; }
    const agents = irGetCheckedAgents_($('cr-agent-list'));
    if (!agents.length) { crSetFormError('Select at least one agent.'); return; }

    const btn = $('cr-generate-btn');
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = 'Loading…';
    crSavePrefs_();

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        crRenderReport_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        crSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getCompareRanges({
        department: dept, agents: agents,
        p1From: p1From, p1To: p1To, p2From: p2From, p2To: p2To,
      });
  }

  function crRenderReport_(data) {
    crLastData = data;
    if ($('cr-p1-label')) $('cr-p1-label').textContent = data.p1Label || '';
    if ($('cr-p2-label')) $('cr-p2-label').textContent = data.p2Label || '';
    crRenderEditingLine_(data.meta && data.meta.agents);
    showCrResults();
    crCloseEditPopover_();
    crSetResultsStatus('');
    crRenderLengthWarning_(data.meta);
    crRenderTeamInsights_(data.teamInsights);
    crRenderTeamTiles_(data.teamStats, data.meta);
    crRenderAgentCards_(data.agentData, data.meta, data.teamStats);
    crRenderChartSummary_(data);
    // Defer chart creation one frame so the just-revealed
    // compare-results container is fully laid out before
    // Chart.js measures the canvas. Without this the canvas can
    // come up 0x0 on first render after the modal opens.
    requestAnimationFrame(function () { crRenderChart_(data); });
  }

  /**
   * Compact "Showing: Sarah, Maria · change" line under the date
   * pair. Truncates beyond 3 agents with the full list as a hover
   * tooltip. Mirrors the IR pattern.
   */
  function crRenderEditingLine_(agents) {
    const el = $('cr-editing-agents');
    if (!el) return;
    const list = Array.isArray(agents) ? agents : [];
    let visible, tooltip;
    if (list.length <= 3) {
      visible = list.join(', '); tooltip = visible;
    } else {
      visible = list.slice(0, 2).join(', ') + ', +' + (list.length - 2) + ' more';
      tooltip = list.join(', ');
    }
    el.textContent = visible || '(none)';
    el.title = tooltip;
  }

  /**
   * Banner above the report body when the two periods differ in
   * length by >= 20%. Volume-metric totals aren't directly
   * comparable in that case; the per-day annotations on KPI
   * tiles + cards are the actionable signal.
   */
  function crRenderLengthWarning_(meta) {
    const el = $('cr-length-warning');
    if (!el) return;
    if (!meta || !meta.lengthMismatch) { el.style.display = 'none'; el.innerHTML = ''; return; }
    const p1d = meta.p1Days || 0;
    const p2d = meta.p2Days || 0;
    el.innerHTML = '<strong>Different period lengths:</strong> '
                 + 'Period 1 is ' + p1d + ' days, Period 2 is ' + p2d + ' days. '
                 + 'Volume totals (Rung / Missed / Answered) aren\'t directly comparable; '
                 + 'compare the per-day averages shown on the KPI tiles + agent cards instead.';
    el.style.display = '';
  }

  /**
   * One-line summary above the chart showing the team-level
   * totals for the active metric. Lets the user read the
   * aggregate without eye-jumping back to the KPI tiles.
   */
  function crRenderChartSummary_(data) {
    const el = $('cr-chart-summary');
    if (!el) return;
    if (!data || !data.teamStats) { el.textContent = ''; return; }
    const t = data.teamStats;
    const metric = crActiveChartMetric;
    let stat, label;
    if (metric === 'pct')        { stat = t.pct;      label = 'Team % Answered'; }
    else if (metric === 'rung')  { stat = t.rung;     label = 'Team Rung'; }
    else                         { stat = t.answered; label = 'Team Answered'; }
    if (!stat) { el.textContent = ''; return; }
    const dp = Number(stat.deltaPct || 0);
    let badge = '';
    if (Math.abs(dp) >= 0.05) {
      const cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = stat.type === 'pctPoints' ? ' pts' : '%';
      badge = '<span class="pr-delta ' + cls + '">'
            + '<span class="pr-delta-arrow">' + arrow + '</span> ' + Math.abs(dp).toFixed(1) + suffix + '</span>';
    }
    el.innerHTML = label + ': '
                 + '<strong>' + escapeHtml(stat.prevFormatted) + '</strong> (P1) '
                 + '→ '
                 + '<strong>' + escapeHtml(stat.formatted) + '</strong> (P2) '
                 + badge;
  }

  function crRenderTeamInsights_(insights) {
    const host = $('cr-team-insights');
    if (!host) return;
    if (!insights || !insights.length) { host.innerHTML = ''; return; }
    host.innerHTML = irInsightsBlock_(insights)
      .replace('<div class="ir-insights-label">Insights</div>',
               '<div class="ir-insights-label">Team insights (P1 → P2)</div>');
  }

  /**
   * Six KPI tiles showing P2's value (the comparison period) with
   * a delta vs P1 and the P1 value shown below as context. Same
   * tile structure as the Performance Report's KPI row so the
   * shared .pr-kpi-tile / .pr-delta CSS applies.
   */
  function crRenderTeamTiles_(teamStats, meta) {
    const t = teamStats || {};
    const m = meta || {};
    // Volume tiles get per-day captions when periods differ in
    // length so users can compare apples-to-apples. % Answered
    // and ATT are already averages and don't need normalizing.
    const tiles = [
      crTeamTile_('Total Rung',  t.rung,     'pos', m, 'volume'),
      crTeamTile_('Total Missed',t.missed,   'neg', m, 'volume'),
      crTeamTile_('Answered',    t.answered, 'pos', m, 'volume'),
      crTeamTile_('% Answered',  t.pct,      'pos', m, 'rate'),
      crTeamTile_('Total TTT',   t.ttt,      'neu', m, 'time'),
      crTeamTile_('Avg ATT',     t.att,      'neu', m, 'rate'),
    ].join('');
    $('cr-team-tiles').innerHTML = tiles;
  }

  function crTeamTile_(label, stat, valenceDirection, meta, kind) {
    const s = stat || { formatted: '-', prevFormatted: '-', deltaPct: 0, type: 'volume' };
    const isPctType = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    let badge;
    if (Math.abs(dp) < 0.05) {
      badge = '<span class="pr-delta pr-delta-neu">no change</span>';
    } else {
      let cls = 'pr-delta-neu';
      if (valenceDirection === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
      else if (valenceDirection === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = isPctType ? ' pts' : '%';
      badge = '<span class="pr-delta ' + cls + '">'
            +   '<span class="pr-delta-arrow">' + arrow + '</span> ' + Math.abs(dp).toFixed(1) + suffix
            + '</span>';
    }
    // Per-day caption: only for raw volume/time metrics, only
    // when meta says the two periods differ in length enough to
    // matter.
    let perDayCaption = '';
    if (meta && meta.lengthMismatch && (kind === 'volume' || kind === 'time')
        && s.val != null && s.prev != null
        && meta.p1Days > 0 && meta.p2Days > 0) {
      const p2PerDay = s.val  / meta.p2Days;
      const p1PerDay = s.prev / meta.p1Days;
      const formatPerDay = (kind === 'time')
        ? function (v) { return crFormatSecondsShort_(v); }
        : function (v) { return v.toFixed(1); };
      perDayCaption =
        '<div class="pr-kpi-perday">'
        +   'Per day: <strong>' + formatPerDay(p2PerDay) + '</strong>'
        +   ' <span class="pr-delta-cap">vs ' + formatPerDay(p1PerDay) + ' (P1)</span>'
        + '</div>';
    }
    return '<div class="pr-kpi-tile">'
         +   '<div class="pr-kpi-row-top">'
         +     '<div class="pr-kpi-label">' + label + '</div>'
         +   '</div>'
         +   '<div class="pr-kpi-value">' + escapeHtml(String(s.formatted)) + '</div>'
         +   '<div class="pr-kpi-delta">'
         +     badge + ' <span class="pr-delta-cap">vs ' + escapeHtml(String(s.prevFormatted)) + ' (P1)</span>'
         +   '</div>'
         +   perDayCaption
         + '</div>';
  }

  function crFormatSecondsShort_(totalSeconds) {
    if (!totalSeconds || totalSeconds <= 0) return '0:00';
    totalSeconds = Math.round(totalSeconds);
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    const pad = function (n) { return n < 10 ? '0' + n : String(n); };
    if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
    return m + ':' + pad(s);
  }

  /**
   * Per-agent comparison cards. Each card carries:
   *   - Color-coded left border based on aggregate direction
   *     (improved / regressed / mixed -- see crClassifyAgent_).
   *   - 6-row table: Rung / Missed / Answered / % Answered / TTT
   *     / ATT with P1 / P2 / delta columns. P1+P2 cells gain a
   *     per-day caption when meta.lengthMismatch.
   *   - "vs Team" badge in the header when the agent's overall
   *     improvement score is above or below the team's score.
   *
   * Quiet agents (no metric changed by more than a small noise
   * threshold) collapse into a <details> section below the main
   * grid so the eye-catching cards are the notable movers.
   */
  function crRenderAgentCards_(agentData, meta, teamStats) {
    const data = agentData || [];
    // Team's improvement score is the reference for the per-card
    // "vs Team" badge.
    const teamScore = crTeamImprovementScore_(teamStats);
    const enriched = data.map(function (a) {
      return {
        agent: a,
        score: crImprovementScore_(a),
        direction: crClassifyAgent_(a),
        quiet: crIsQuietAgent_(a),
      };
    });

    // Split out quiet agents into the collapsible section.
    const main  = enriched.filter(function (x) { return !x.quiet; });
    const quiet = enriched.filter(function (x) { return  x.quiet; });

    // Sort the main set; quiet stays in selection order.
    const sortedMain = crSortEnriched_(main);

    const renderCard = function (x) { return crBuildCard_(x, teamScore, meta); };
    $('cr-agent-cards').innerHTML = sortedMain.map(renderCard).join('');

    const det = $('cr-quiet-details');
    if (det) {
      if (quiet.length > 0) {
        det.style.display = '';
        det.querySelector('.cr-quiet-summary').textContent =
          'Show ' + quiet.length + ' quiet agent' + (quiet.length === 1 ? '' : 's')
          + ' (no notable changes)';
        $('cr-quiet-cards').innerHTML = quiet.map(renderCard).join('');
      } else {
        det.style.display = 'none';
        $('cr-quiet-cards').innerHTML = '';
      }
    }

    // Per-card "Copy data" -> TSV. Single delegated listener
    // covers both the main grid and the quiet-details grid.
    const wireCopy = function (host) {
      if (!host) return;
      host.querySelectorAll('.ir-copy-tsv').forEach(function (b) {
        b.addEventListener('click', function () {
          const card = b.closest('.cr-agent-card');
          const table = card && card.querySelector('table');
          if (!table) return;
          const lines = [];
          Array.prototype.forEach.call(table.rows, function (row) {
            lines.push(Array.prototype.map.call(row.cells, function (c) {
              return (c.innerText || '').replace(/\s+/g, ' ').trim();
            }).join('\t'));
          });
          const tsv = lines.join('\n') + '\n';
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(tsv).then(function () { irFlashButton(b, 'Copied'); });
          }
        });
      });
    };
    wireCopy($('cr-agent-cards'));
    wireCopy($('cr-quiet-cards'));
  }

  function crBuildCard_(x, teamScore, meta) {
    const a = x.agent;
    const safe = escapeHtml(a.name);
    const dirClass = x.direction === 'improved' ? 'cr-card-improved'
                   : x.direction === 'regressed' ? 'cr-card-regressed'
                   : 'cr-card-mixed';
    const vsTeam = crVsTeamBadge_(x.score, teamScore);
    // Surface the classifier inputs on the DOM so it's debuggable
    // in DevTools without re-instrumenting the JS.
    const debugAttrs =
      ' data-direction="' + x.direction + '"'
      + ' data-score="' + (x.score == null ? '' : x.score.toFixed(1)) + '"';
    const rows = [
      crCardRow_('Total Rung',  a.p1.formatted.rung,     a.p2.formatted.rung,     a.deltas.rung,
                  'pos', a.p1.raw.rung,     a.p2.raw.rung,     meta, 'volume'),
      crCardRow_('Missed',      a.p1.formatted.missed,   a.p2.formatted.missed,   a.deltas.missed,
                  'neg', a.p1.raw.missed,   a.p2.raw.missed,   meta, 'volume'),
      crCardRow_('Answered',    a.p1.formatted.answered, a.p2.formatted.answered, a.deltas.answered,
                  'pos', a.p1.raw.answered, a.p2.raw.answered, meta, 'volume'),
      crCardRow_('% Answered',  a.p1.formatted.pct,      a.p2.formatted.pct,      a.deltas.pct,
                  'pos', null, null, meta, 'rate'),
      crCardRow_('TTT',         a.p1.formatted.ttt,      a.p2.formatted.ttt,      a.deltas.ttt,
                  'neu', a.p1.raw.ttt,      a.p2.raw.ttt,      meta, 'time'),
      crCardRow_('Avg ATT',     a.p1.formatted.att,      a.p2.formatted.att,      a.deltas.att,
                  'neu', null, null, meta, 'rate'),
    ].join('');
    // INV-53 floater chip: floaters appear in CR but are excluded
    // from teamP1 / teamP2 dept totals. The QUEUE chip next to the
    // agent name surfaces this so the manager understands why their
    // numbers don't move the dept aggregate.
    const isFloater = a.matchedViaQueue && !a.matchedViaRoster;
    const floaterPill = isFloater ? ' ' + sourceChipHtml_(a) : '';
    return '<div class="cr-agent-card ' + dirClass + '"' + debugAttrs + '>'
         +   '<div class="cr-agent-card-header">'
         +     '<span class="cr-agent-name">' + safe + '</span>'
         +     floaterPill
         +     vsTeam
         +     '<button type="button" class="ir-copy-tsv" data-agent="' + safe + '">Copy data</button>'
         +   '</div>'
         +   '<table class="cr-agent-table">'
         +     '<thead><tr>'
         +       '<th>Metric</th><th class="num">Period 1</th><th class="num">Period 2</th><th class="num">&Delta;</th>'
         +     '</tr></thead>'
         +     '<tbody>' + rows + '</tbody>'
         +   '</table>'
         + '</div>';
  }

  function crCardRow_(metric, p1Val, p2Val, deltaObj, valence,
                      p1Raw, p2Raw, meta, kind) {
    const dp = Number((deltaObj && deltaObj.deltaPct) || 0);
    const isPctType = deltaObj && deltaObj.type === 'pctPoints';
    let badge;
    if (Math.abs(dp) < 0.05) {
      badge = '<span class="pr-delta pr-delta-neu">no change</span>';
    } else {
      let cls = 'pr-delta-neu';
      if (valence === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
      else if (valence === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = isPctType ? ' pts' : '%';
      badge = '<span class="pr-delta ' + cls + '">'
            +   '<span class="pr-delta-arrow">' + arrow + '</span> ' + Math.abs(dp).toFixed(1) + suffix
            + '</span>';
    }

    // Compose the per-cell display: just the formatted value
    // unless lengthMismatch + kind is normalizable, in which
    // case append a small "(X/day)" subline.
    const cellHtml = function (formattedVal, rawVal, days) {
      const escaped = escapeHtml(String(formattedVal));
      if (!meta || !meta.lengthMismatch || rawVal == null || !days
          || (kind !== 'volume' && kind !== 'time')) {
        return escaped;
      }
      const perDay = rawVal / days;
      const fmt = (kind === 'time')
        ? crFormatSecondsShort_(perDay)
        : perDay.toFixed(1);
      return escaped + '<span class="cr-cell-perday">' + fmt + '/day</span>';
    };

    return '<tr>'
         +   '<td class="cr-metric">' + metric + '</td>'
         +   '<td class="num">' + cellHtml(p1Val, p1Raw, meta && meta.p1Days) + '</td>'
         +   '<td class="num">' + cellHtml(p2Val, p2Raw, meta && meta.p2Days) + '</td>'
         +   '<td class="num">' + badge + '</td>'
         + '</tr>';
  }

  // ── Agent classification helpers ────────────────────────────────
  /**
   * Numeric improvement score per agent: sum of signed deltas
   * with each metric's good direction counted positive. Used for
   * sorting (biggest improvers / regressors) and the per-card vs
   * team badge.
   *
   * Weighting:
   *   + rung delta %
   *   - missed delta %
   *   + answered delta %
   *   + 5 * pct delta pts   (pp differences are tighter scale)
   *   0 for TTT / ATT       (direction-ambiguous)
   */
  function crImprovementScore_(a) {
    const d = (a && a.deltas) || {};
    const v = function (k) { return Number((d[k] && d[k].deltaPct) || 0); };
    return v('rung') - v('missed') + v('answered') + 5 * v('pct');
  }

  function crTeamImprovementScore_(teamStats) {
    if (!teamStats) return 0;
    const v = function (s) { return Number((s && s.deltaPct) || 0); };
    return v(teamStats.rung) - v(teamStats.missed) + v(teamStats.answered) + 5 * v(teamStats.pct);
  }

  /**
   * Classify an agent's overall direction (left-border color).
   * Adds up signed-by-valence votes across the 4 valenced
   * metrics. Threshold of >=2 / <=-2 prevents 1-metric noise
   * from tipping the classification.
   */
  function crClassifyAgent_(a) {
    const d = (a && a.deltas) || {};
    const sign = function (v) { return v > 0.05 ? 1 : v < -0.05 ? -1 : 0; };
    let score = 0;
    score += sign(Number((d.rung     && d.rung.deltaPct)     || 0));      // up = good
    score -= sign(Number((d.missed   && d.missed.deltaPct)   || 0));      // up = bad
    score += sign(Number((d.answered && d.answered.deltaPct) || 0));      // up = good
    score += sign(Number((d.pct      && d.pct.deltaPct)      || 0));      // up = good
    if (score >=  2) return 'improved';
    if (score <= -2) return 'regressed';
    return 'mixed';
  }

  /**
   * Quiet agent test: every meaningful metric moved by less than
   * a small noise threshold. Cuts visual noise so users can
   * focus on agents that actually shifted.
   */
  function crIsQuietAgent_(a) {
    const d = (a && a.deltas) || {};
    const absV = function (k) { return Math.abs(Number((d[k] && d[k].deltaPct) || 0)); };
    return absV('rung')     < 10
        && absV('missed')   < 10
        && absV('answered') < 10
        && absV('pct')      < 3;   // pp difference
  }

  /**
   * Per-card "vs Team" header badge: compares this agent's
   * improvement score to the team's. Renders nothing when the
   * gap is in the noise band so we don't litter every card with
   * "in line with team" labels.
   */
  function crVsTeamBadge_(agentScore, teamScore) {
    const diff = agentScore - teamScore;
    if (Math.abs(diff) < 5) return '<span class="cr-vs-team cr-vs-team-flat">in line with team</span>';
    if (diff > 0)  return '<span class="cr-vs-team cr-vs-team-pos">▲ above team</span>';
    return '<span class="cr-vs-team cr-vs-team-neg">▼ below team</span>';
  }

  function crSortEnriched_(enriched) {
    if (!Array.isArray(enriched) || enriched.length < 2) return enriched;
    if (crCardSort === 'selection') return enriched;
    const out = enriched.slice();
    if (crCardSort === 'name') {
      out.sort(function (a, b) {
        const an = (a.agent.name || '').toLowerCase();
        const bn = (b.agent.name || '').toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      });
    } else if (crCardSort === 'improvers') {
      out.sort(function (a, b) { return b.score - a.score; });
    } else if (crCardSort === 'regressors') {
      out.sort(function (a, b) { return a.score - b.score; });
    }
    return out;
  }

  /**
   * Grouped bar chart: P1 vs P2 per agent, on the metric chosen
   * via the tab strip (Answered / Rung / % Answered). Re-rendered
   * by destroying the existing chart instance so toggle changes
   * are clean.
   */
  function crRenderChart_(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    if (crChartInstance) {
      try { crChartInstance.destroy(); } catch (e) {}
      crChartInstance = null;
    }
    // Sweep up any orphan left by a partial-crash on the previous render.
    destroyOrphanedChartOnCanvas_('cr-chart');
    const showLabels = $('cr-show-datalabels') ? $('cr-show-datalabels').checked : true;
    const crPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    const metric = crActiveChartMetric;
    const series = (data.chartData && data.chartData[metric]) || { labels: [], p1: [], p2: [] };
    const isPercent = (metric === 'pct');

    const header = $('cr-chart-header');
    if (header) {
      const label = metric === 'answered' ? 'Answered Calls'
                  : metric === 'rung'     ? 'Total Rung'
                  : '% Answered';
      header.textContent = label + ': Period 1 vs Period 2';
    }

    const formatVal = function (v) {
      if (isPercent) return (Number(v) || 0).toFixed(1) + '%';
      return v;
    };

    const p1Data = series.p1.map(function (v) {
      return isPercent ? Number((v || 0).toFixed(1)) : v;
    });
    const p2Data = series.p2.map(function (v) {
      return isPercent ? Number((v || 0).toFixed(1)) : v;
    });

    crChartInstance = new Chart($('cr-chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: series.labels,
        datasets: [
          { label: 'Period 1 (Baseline)', data: p1Data,
            backgroundColor: THEME.muted, borderColor: THEME.ink, borderWidth: 1 },
          { label: 'Period 2 (Comparison)', data: p2Data,
            backgroundColor: THEME.accent, borderColor: THEME.accent, borderWidth: 1 },
        ],
      },
      plugins: crPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'bottom' },
          tooltip: {
            callbacks: {
              label: function (ctx) { return ctx.dataset.label + ': ' + formatVal(ctx.parsed.y); },
            },
          },
          datalabels: {
            // Boolean form. Conditional zero-hiding lives in formatter.
            display: showLabels,
            // Per-period colored pill: P1 muted, P2 accent. Matches
            // the bars' fill so the label visually pairs with its
            // bar and reads as a styled badge rather than raw text.
            color: function (ctx) {
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.ink;
            },
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) {
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.line;
            },
            borderWidth: 1,
            borderRadius: 2,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            // Inside the bar (size permitting) -- pill background
            // keeps the label readable on top of any bar color.
            anchor: 'center',
            align: 'center',
            clamp: true,
            clip: false,
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value) {
              if (value == null) return '';
              return isPercent ? value + '%' : (value > 0 ? value : '');
            },
          },
        },
        scales: {
          x: { ticks: { autoSkip: false, maxRotation: 30, minRotation: 0 } },
          y: {
            beginAtZero: true,
            suggestedMax: isPercent ? 100 : undefined,
            ticks: { callback: function (v) { return isPercent ? v + '%' : v; } },
          },
        },
      },
    });
  }

  // ── Export menu plumbing (mirrors PR) ─────────────────────────────
  function crSetExportMenuOpen_(open) {
    const btn  = $('cr-export-btn');
    const menu = $('cr-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function crPrint_() {
    document.body.classList.add('cr-printing');
    window.print();
    document.body.classList.remove('cr-printing');
  }

  function crBtnFeedback_(label, holdMs) {
    const btn = $('cr-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) setTimeout(function () { btn.innerHTML = btn.dataset.label; btn.disabled = false; }, holdMs);
    return function restore() { btn.innerHTML = btn.dataset.label; btn.disabled = false; };
  }

  function crBuildCanvas_(onDone) {
    const root = $('compare-results');
    if (!root) return;
    // Pre-render the chart canvas (no inactive tabs to worry about
    // since CR uses a single chart instance, but resize for safety
    // and consistency with the other reports' export pattern).
    if (crChartInstance) crChartInstance.resize();
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });
      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.querySelector('#compare-results .ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const tabs = clonedDoc.getElementById('cr-chart-tabs');
          if (tabs) tabs.style.display = 'none';
          const cardsToolbar = clonedDoc.getElementById('cr-cards-toolbar');
          if (cardsToolbar) cardsToolbar.style.display = 'none';
          const toggle = clonedDoc.getElementById('cr-datalabels-box');
          if (toggle) toggle.style.display = 'none';
          const editPop = clonedDoc.getElementById('cr-edit-popover');
          if (editPop) editPop.style.display = 'none';
          const editLine = clonedDoc.querySelector('#compare-results .ir-editing-edit');
          if (editLine) editLine.style.display = 'none';
          const status = clonedDoc.getElementById('cr-results-status');
          if (status) status.style.display = 'none';
          // Reveal quiet-agents section in the cloned doc so the
          // captured image includes every selected agent.
          const quietDet = clonedDoc.getElementById('cr-quiet-details');
          if (quietDet) {
            quietDet.open = true;
            const quietSum = quietDet.querySelector('.cr-quiet-summary');
            if (quietSum) quietSum.style.display = 'none';
          }
          clonedDoc.querySelectorAll('.ir-copy-tsv').forEach(function (b) { b.style.display = 'none'; });
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  function crCopyImage_() {
    const restore = crBtnFeedback_('Capturing…', 0);
    crBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () { restore(); crBtnFeedback_('Copied!', 1200); },
                  function (err) {
                    crSetResultsStatus('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
                    restore();
                  });
        } else {
          crSetResultsStatus('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  function crEmailImage_() {
    const restore = crBtnFeedback_('Capturing…', 0);
    crBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      crBtnFeedback_('Sending…', 0);
      google.script.run
        .withSuccessHandler(function (res) {
          restore();
          crBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
          showToast('Report emailed to ' + (res && res.to ? res.to : 'you'), 'success');
        })
        .withFailureHandler(function (err) {
          crSetResultsStatus('error', 'Email failed: ' + (err && err.message ? err.message : err));
          showToast('Email failed', 'error');
          restore();
        })
        .sendCompareRangesEmail({
          imageBase64: dataUrl,
          p1Label: crLastData && crLastData.p1Label ? crLastData.p1Label : '',
          p2Label: crLastData && crLastData.p2Label ? crLastData.p2Label : '',
        });
    });
  }

  // ── Prefs persistence (mirrors IR/PR) ─────────────────────────────
  function crSavePrefs_() {
    try {
      const prefs = {
        preset: $('cr-preset') ? $('cr-preset').value : 'custom',
        p1From: $('cr-p1-from') ? $('cr-p1-from').value : '',
        p1To:   $('cr-p1-to')   ? $('cr-p1-to').value   : '',
        p2From: $('cr-p2-from') ? $('cr-p2-from').value : '',
        p2To:   $('cr-p2-to')   ? $('cr-p2-to').value   : '',
        agents: irGetCheckedAgents_($('cr-agent-list')),
        showLabels: $('cr-show-datalabels') ? $('cr-show-datalabels').checked : false,
        chartMetric: crActiveChartMetric,
        cardSort: crCardSort,
      };
      localStorage.setItem(CR_PREFS_KEY, JSON.stringify(prefs));
    } catch (e) { /* ignore */ }
  }

  function crRestorePrefs_() {
    let prefs;
    try {
      const raw = localStorage.getItem(CR_PREFS_KEY);
      if (!raw) return;
      prefs = JSON.parse(raw);
    } catch (e) { return; }
    if (!prefs || typeof prefs !== 'object') return;
    if (prefs.preset && $('cr-preset')) $('cr-preset').value = prefs.preset;
    if (prefs.p1From && $('cr-p1-from')) $('cr-p1-from').value = prefs.p1From;
    if (prefs.p1To   && $('cr-p1-to'))   $('cr-p1-to').value   = prefs.p1To;
    if (prefs.p2From && $('cr-p2-from')) $('cr-p2-from').value = prefs.p2From;
    if (prefs.p2To   && $('cr-p2-to'))   $('cr-p2-to').value   = prefs.p2To;
    if (typeof prefs.showLabels === 'boolean' && $('cr-show-datalabels')) {
      $('cr-show-datalabels').checked = prefs.showLabels;
    }
    if (prefs.chartMetric) crActiveChartMetric = prefs.chartMetric;
    if (prefs.cardSort)    crCardSort = prefs.cardSort;
    // Sync chart-tab DOM to restored metric.
    const tabs = $('cr-chart-tabs');
    if (tabs) tabs.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-metric') === crActiveChartMetric;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    if ($('cr-card-sort')) $('cr-card-sort').value = crCardSort;
    if (Array.isArray(prefs.agents) && prefs.agents.length) {
      crPendingAgentSelection_ = prefs.agents;
    }
  }

  // -- Alerts modal (admin-only) ---------------------------------------
  // Admin UI for the Low Answer Rate Alerts engine. Loads the
  // current Alert Config + recent log via getAlertsInit(), lets
  // admins preview/send the per-dept threshold check for a given
  // date, and install or uninstall the daily 8AM trigger.

  let alLastPreview = null;     // last preview result, used to gate Send

  function initAlerts() {
    const btn = $('alerts-btn');
    const modal = $('alerts-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      alLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const previewBtn = $('al-preview-btn');
    if (previewBtn) previewBtn.addEventListener('click', alRunPreview_);

    const sendBtn = $('al-send-btn');
    if (sendBtn) sendBtn.addEventListener('click', alRunSend_);

    const installBtn = $('al-install-trigger-btn');
    if (installBtn) installBtn.addEventListener('click', alInstallTrigger_);
    const uninstallBtn = $('al-uninstall-trigger-btn');
    if (uninstallBtn) uninstallBtn.addEventListener('click', alUninstallTrigger_);

    // Digest install / uninstall.
    const installDigestBtn = $('al-install-digest-btn');
    if (installDigestBtn) installDigestBtn.addEventListener('click', alInstallDigestTriggers_);
    const uninstallDigestBtn = $('al-uninstall-digest-btn');
    if (uninstallDigestBtn) uninstallDigestBtn.addEventListener('click', alUninstallDigestTriggers_);

    const dateEl = $('al-date');
    if (dateEl) dateEl.addEventListener('change', function () {
      // Date change invalidates the previous preview -- Send must
      // re-confirm against the new date.
      alLastPreview = null;
      $('al-send-btn').disabled = true;
      alClearResults_();
    });
  }

  function alLoadInit_() {
    $('al-loading').style.display = '';
    $('al-body').style.display = 'none';
    google.script.run
      .withSuccessHandler(function (data) {
        $('al-loading').style.display = 'none';
        $('al-body').style.display = '';
        alRenderInit_(data);
        // Digest subscribers + trigger status is loaded separately
        // so a missing Digest.gs (e.g. mid-deploy) doesn't break the
        // whole Alerts modal.
        google.script.run
          .withSuccessHandler(function (digestData) {
            alRenderDigestInit_(digestData || { config: [], trigger: {} });
          })
          .withFailureHandler(function (err) {
            // Fall back to an empty state with the error in the
            // trigger-status caption so the admin notices.
            alRenderDigestInit_({ config: [], trigger: {},
              loadError: (err && err.message) ? err.message : String(err) });
          })
          .getDigestsInit();
      })
      .withFailureHandler(function (err) {
        $('al-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getAlertsInit();
  }

  function alRenderDigestInit_(data) {
    if (!data) return;
    const tbody = $('al-digest-tbody');
    if (tbody) {
      const config = data.config || [];
      if (!config.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="al-empty">'
          + 'No digest subscribers yet. Add one row per recipient to the '
          + 'Digest Config sheet (Email | Department | Cadence | Active | Notes).'
          + '</td></tr>';
      } else {
        tbody.innerHTML = config.map(function (c, idx) {
          const activeCls = c.active ? 'al-active-yes' : 'al-active-no';
          const activeLbl = c.active ? 'Yes' : 'No';
          return '<tr>'
               +   '<td>' + escapeHtml(c.email)      + '</td>'
               +   '<td>' + escapeHtml(c.department) + '</td>'
               +   '<td>' + escapeHtml(c.cadence)    + '</td>'
               +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
               +   '<td>' + escapeHtml(c.notes || '') + '</td>'
               +   '<td><button type="button" class="link-btn al-digest-preview-btn" '
               +     'data-idx="' + idx + '">Send preview</button></td>'
               + '</tr>';
        }).join('');

        // Wire the per-row Send Preview buttons. `data-idx` indexes
        // into the same `config` array we just rendered from, so we
        // pull the email/department/cadence directly without
        // parsing the DOM.
        tbody.querySelectorAll('.al-digest-preview-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const idx = Number(btn.getAttribute('data-idx'));
            const row = config[idx];
            if (!row) return;
            alSendDigestPreview_(btn, row);
          });
        });
      }
    }

    // Trigger status caption + install/uninstall buttons.
    const trig = data.trigger || { daily: false, weekly: false };
    const installed = !!(trig.daily && trig.weekly);
    const partial   = !installed && (trig.daily || trig.weekly);
    const statusEl  = $('al-digest-trigger-status');
    if (statusEl) {
      if (data.loadError) {
        statusEl.textContent = 'Could not load digest config: ' + data.loadError;
      } else if (installed) {
        statusEl.textContent = 'Daily + weekly digest triggers are installed.';
      } else if (partial) {
        statusEl.textContent = 'Partial install (daily=' + trig.daily + ', weekly=' + trig.weekly
                            + '). Click "Install" to re-install both.';
      } else {
        statusEl.textContent = 'No digest triggers installed. Subscribers won\'t receive scheduled digests until you click Install.';
      }
    }
    const installBtn   = $('al-install-digest-btn');
    const uninstallBtn = $('al-uninstall-digest-btn');
    if (installBtn)   installBtn.style.display   = installed ? 'none' : '';
    if (uninstallBtn) uninstallBtn.style.display = installed ? ''     : 'none';

    if (data.spreadsheetUrl) {
      const link = $('al-open-digest-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
  }

  function alSendDigestPreview_(btn, row) {
    if (!btn || !row) return;
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Sending…';
    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = 'Sent to ' + (res && res.to ? res.to : 'you');
        setTimeout(function () { btn.textContent = prev; }, 2500);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Preview failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .sendPreviewDigest({
        email:      row.email,
        department: row.department,
        cadence:    row.cadence,
      });
  }

  function alInstallDigestTriggers_() {
    const btn = $('al-install-digest-btn');
    if (!btn) return;
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Installing…';
    google.script.run
      .withSuccessHandler(function (status) {
        btn.disabled = false; btn.textContent = prev;
        alRenderDigestInit_({ config: [], trigger: status || { daily: true, weekly: true } });
        // Re-fetch the config too so the subscriber table re-renders.
        google.script.run
          .withSuccessHandler(function (data) { alRenderDigestInit_(data || { config: [], trigger: status }); })
          .withFailureHandler(function () { /* keep current */ })
          .getDigestsInit();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Install failed: ' + (err && err.message ? err.message : String(err)));
      })
      .installDigestTriggers();
  }

  function alUninstallDigestTriggers_() {
    const ok = window.confirm('Stop both digest triggers? Subscribers will stop receiving scheduled digests until you re-install.');
    if (!ok) return;
    const btn = $('al-uninstall-digest-btn');
    if (!btn) return;
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Uninstalling…';
    google.script.run
      .withSuccessHandler(function (status) {
        btn.disabled = false; btn.textContent = prev;
        google.script.run
          .withSuccessHandler(function (data) { alRenderDigestInit_(data || { config: [], trigger: status }); })
          .withFailureHandler(function () { /* keep current */ })
          .getDigestsInit();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Uninstall failed: ' + (err && err.message ? err.message : String(err)));
      })
      .uninstallDigestTriggers();
  }

  function alRenderInit_(data) {
    if (!data) return;
    if ($('al-date') && !$('al-date').value) {
      $('al-date').value = data.defaultDate || '';
    }
    if ($('al-open-sheet') && data.spreadsheetUrl) {
      $('al-open-sheet').href = data.spreadsheetUrl;
    }
    alRenderConfigTable_(data.config || [], data.drift || {});
    alRenderTriggerStatus_(data.trigger || { installed: false });
    alRenderLog_(data.log || []);
    alRenderPipelineHealth_(data.pipelineHealth || []);
    alClearResults_();
    alLastPreview = null;
    $('al-send-btn').disabled = true;
  }

  function alRenderPipelineHealth_(events) {
    const tbody = $('al-pipeline-tbody');
    if (!tbody) return;
    if (!events.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No pipeline events logged yet. The Pipeline Health sheet '
        + 'starts capturing entries once the autoImport / buildDQE '
        + 'steps next run (success or failure).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = events.map(function (e) {
      const statusCls = e.status === 'success' ? 'al-active-yes'
                      : e.status === 'failure' ? 'al-active-no'
                      : '';
      const rowsCell = (e.rows == null || e.rows === '') ? '-'
                                                         : escapeHtml(String(e.rows));
      const durCell  = (e.durationMs == null || e.durationMs === '') ? '-'
                       : (Math.round(Number(e.durationMs) / 100) / 10).toFixed(1) + 's';
      return '<tr>'
           +   '<td>' + escapeHtml(e.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(e.step || '')      + '</td>'
           +   '<td><span class="al-active ' + statusCls + '">' + escapeHtml(e.status || '') + '</span></td>'
           +   '<td class="num">' + rowsCell + '</td>'
           +   '<td class="num">' + durCell  + '</td>'
           +   '<td>' + escapeHtml(e.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  function alRenderConfigTable_(config, drift) {
    const tbody = $('al-config-tbody');
    if (!tbody) return;
    if (!config.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">'
        + 'No rows in the Alert Config sheet yet. Add one row per dept that '
        + 'should receive alerts.'
        + '</td></tr>';
      return;
    }
    const driftMap = drift || {};
    tbody.innerHTML = config.map(function (c) {
      const activeCls = c.active ? 'al-active-yes' : 'al-active-no';
      const activeLbl = c.active ? 'Yes' : 'No';
      // E8 Skip Dates: prefer the parsed array (server-normalized,
      // bad tokens dropped) for the display so a malformed cell
      // doesn't show garbage. Fallback to the raw string when the
      // parsed array is empty so admins can see what they typed
      // before fixing it. Empty cell shows an em-dash.
      const skipDates = Array.isArray(c.skipDates) ? c.skipDates : [];
      let skipCell = '';
      if (skipDates.length) {
        skipCell = skipDates.map(function (r) {
          return r.from === r.to ? r.from : (r.from + ' – ' + r.to);
        }).join(', ');
      } else if (c.skipDatesRaw) {
        skipCell = '⚠︎ ' + c.skipDatesRaw;
      } else {
        skipCell = '—';
      }
      return '<tr>'
           +   '<td>' + escapeHtml(c.department) + '</td>'
           +   '<td class="num">' + Number(c.threshold).toFixed(0) + '%</td>'
           +   '<td>' + alDriftCellHtml_(c, driftMap[c.department]) + '</td>'
           +   '<td>' + escapeHtml((c.extraRecipients || []).join(', ') || '(none)') + '</td>'
           +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
           +   '<td class="al-skip-dates">' + escapeHtml(skipCell) + '</td>'
           +   '<td>' + escapeHtml(c.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  // E10 threshold-drift chip. Renders per-dept summary of the most
  // recent ~30 daily-trigger entries from the Alert Log: fire-rate
  // and mean answer rate. Severity comes from the server
  // (chronic / lenient / ok / cold); we just map it to the chip
  // palette + tooltip. Falls back to a dash when no drift data is
  // available (e.g. Alert Log unreadable, dept not yet on the
  // sheet, or scaffold tests).
  function alDriftCellHtml_(cfg, drift) {
    if (!drift || !drift.total) {
