      { sel: '#ov-trend-chart',   title: 'The department trend',    body: 'Each department’s answer rate over time. Click a card below to spotlight its line (Shift-click to compare a few); click a point on a line to open that department & day in My Department. The tabs switch to abandoned calls / %, and the range buttons zoom to 30 / 60 / 90 days.' },
      { sel: '#ov-period-bar',    title: 'Change the card window',  body: 'Flip the department cards between Yesterday, Last 30 days, and Year-to-date. The trend chart keeps its own range control just beside it.' },
      { sel: '#my-dept-btn',      title: 'My Department',           body: 'Your team’s per-agent table — sortable by any column, worst answer rate first by default. A summary strip up top (% Answered, Queue calls, Answered, Abandoned % for the range) and the full Missed Calls report with per-agent timelines below the table.' },
      { sel: '#escalations-btn',  title: 'Escalations',             body: 'View and resolve escalation calls for your department — start one, mark it resolved with a note on how it was handled, and see the full activity trail.' },
      { sel: '#insights-report-btn', title: 'Insights',             body: 'The flagship report, now a full page: a department rollup, per-agent cards vs the prior period, and queue health. Use the period slider (Last 7 / 30 / MTD / YTD) to reframe it; when its window differs from My Department, a one-click chip offers to line them up. Your generated report stays put when you switch tabs.' },
      { sel: '#reports-menu-btn', title: 'Deeper reports',          body: 'Individual (the per-agent deep dive) lives here, alongside the admin-vetted Inbound and Direct reports. Missed-call detail is on the My Department page.' },
      { sel: '#help-fab',         title: 'Help is always here',     body: 'Stuck? This button opens Help from anywhere — and you can replay this tour from Help → Guided tour any time.' },
    ];
  }
  // Keep only steps whose target exists AND is visible (skips admin-only or
  // not-yet-rendered elements gracefully).
  function tourVisibleSteps_() {
    return tourAllSteps_().filter(function (s) {
      var el = document.querySelector(s.sel);
      return el && el.offsetParent !== null;
    });
  }
  function startTour_() {
    tourSteps_ = tourVisibleSteps_();
    if (!tourSteps_.length) return;
    tourIdx_ = 0;
    tourEnsureEls_();
    tourShow_();
  }
  function tourEnsureEls_() {
    if ($('tour-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'tour-overlay'; ov.className = 'tour-overlay'; ov.style.display = 'none';
    ov.innerHTML = '<div class="tour-highlight" id="tour-highlight"></div>'
      + '<div class="tour-tip" id="tour-tip" role="dialog" aria-modal="true" aria-label="Guided tour">'
      +   '<div class="tour-tip-title" id="tour-tip-title"></div>'
      +   '<div class="tour-tip-body" id="tour-tip-body"></div>'
      +   '<div class="tour-tip-foot">'
      +     '<span class="tour-step-count" id="tour-step-count"></span>'
      +     '<span class="tour-tip-actions">'
      +       '<button type="button" class="btn btn-ghost" id="tour-skip">Skip</button>'
      +       '<button type="button" class="btn btn-ghost" id="tour-back">Back</button>'
      +       '<button type="button" class="btn" id="tour-next">Next</button>'
      +     '</span>'
      +   '</div>'
      + '</div>';
    document.body.appendChild(ov);
    $('tour-skip').addEventListener('click', tourFinish_);
    $('tour-back').addEventListener('click', function () { if (tourIdx_ > 0) { tourIdx_--; tourShow_(); } });
    $('tour-next').addEventListener('click', function () {
      if (tourIdx_ < tourSteps_.length - 1) { tourIdx_++; tourShow_(); } else { tourFinish_(); }
    });
    document.addEventListener('keydown', tourKey_);
    window.addEventListener('resize', tourReposition_);
  }
  function tourKey_(e) {
    var ov = $('tour-overlay');
    if (!ov || ov.style.display === 'none') return;
    if (e.key === 'Escape') tourFinish_();
    else if (e.key === 'ArrowRight' || e.key === 'Enter') $('tour-next').click();
    else if (e.key === 'ArrowLeft') $('tour-back').click();
  }
  function tourShow_() {
    var step = tourSteps_[tourIdx_];
    if (!step) { tourFinish_(); return; }
    $('tour-overlay').style.display = '';
    $('tour-tip-title').textContent = step.title;
    $('tour-tip-body').textContent = step.body;
    $('tour-step-count').textContent = (tourIdx_ + 1) + ' / ' + tourSteps_.length;
    $('tour-back').style.visibility = tourIdx_ === 0 ? 'hidden' : '';
    $('tour-next').textContent = (tourIdx_ === tourSteps_.length - 1) ? 'Done' : 'Next';
    tourReposition_();
  }
  function tourReposition_() {
    var ov = $('tour-overlay');
    if (!ov || ov.style.display === 'none') return;
    var step = tourSteps_[tourIdx_];
    var el = step && document.querySelector(step.sel);
    if (!el) { tourFinish_(); return; }
    var r = el.getBoundingClientRect();
    var hl = $('tour-highlight'), tip = $('tour-tip'), pad = 6;
    hl.style.top = (r.top - pad) + 'px';
    hl.style.left = (r.left - pad) + 'px';
    hl.style.width = (r.width + pad * 2) + 'px';
    hl.style.height = (r.height + pad * 2) + 'px';
    var tipW = 300, tipH = 150;
    var tipTop = r.bottom + 12;
    if (tipTop > window.innerHeight - tipH) tipTop = Math.max(12, r.top - 12 - tipH);
    var tipLeft = Math.min(Math.max(12, r.left), window.innerWidth - tipW - 12);
    tip.style.top = tipTop + 'px';
    tip.style.left = tipLeft + 'px';
  }
  function tourFinish_() {
    var ov = $('tour-overlay');
    if (ov) ov.style.display = 'none';
    try { localStorage.setItem(TOUR_KEY_, '1'); } catch (e) {}
  }
  function initTour_() {
    var replay = $('tour-replay-btn');
    if (replay) replay.addEventListener('click', function () {
      // C-2: the replay button lives in the SETTINGS modal (dashboard.html)
      // -- close THAT modal so the tour isn't hidden behind it. (The old
      // handler still closed HELP from before the button moved: it released
      // Settings' focus trap via Help's closeModal and left Settings open
      // under -- and after -- the tour.) F-42 still applies: go through the
      // modal's OWN close button so the focus trap + Escape keydown listener
      // are released.
      var settings = $('settings-modal');
      var closeBtn = settings && settings.querySelector('.modal-close');
      if (closeBtn) { closeBtn.click(); }
      else if (settings) {
        settings.style.display = 'none'; settings.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }
      setTimeout(startTour_, 200);
    });
    var seen = true;
    try { seen = !!localStorage.getItem(TOUR_KEY_); } catch (e) { seen = true; }
    if (!seen) setTimeout(function () {
      // Autostart only on the Overview landing (the steps assume it).
      if (document.body.getAttribute('data-page') === 'overview') startTour_();
    }, 1200);
  }

  function clSetDefaultDates_() {
    if ($('cl-from') && $('cl-from').value) return;   // keep last-used range
    if ($('cl-from')) $('cl-from').value = launcherIsoDaysAgo_(30);
    if ($('cl-to'))   $('cl-to').value   = launcherIsoDaysAgo_(0);
  }

  function clSetError_(msg) {
    const el = $('cl-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function clShowOnly_(id) {
    ['cl-unconfigured', 'cl-unavailable', 'cl-empty', 'cl-results', 'cl-loading'].forEach(function (x) {
      const el = $(x);
      if (el) el.style.display = (x === id) ? '' : 'none';
    });
  }

  function runCallerLookup_() {
    clSetError_('');
    const phone = ($('cl-phone') && $('cl-phone').value) || '';
    const digits = phone.replace(/\D/g, '');
    if (digits.length < 10) { clSetError_('Enter a phone number with at least 10 digits.'); return; }
    const from = $('cl-from').value, to = $('cl-to').value;
    if (!from || !to) { clSetError_('Pick a start and end date.'); return; }
    if (from > to)    { clSetError_('Start date must be on or before end date.'); return; }

    const btn = $('cl-lookup-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Looking up…';
    // C1: signal-rings loader in the results area while the query is in flight.
    const loadEl = $('cl-loading');
    if (loadEl) loadEl.innerHTML = dsRingsHtml_('Looking up inbound calls…');
    clShowOnly_('cl-loading');

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false; btn.textContent = prev;
        clRenderResults_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        clShowOnly_('');
        clSetError_('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getCallerLookup({ phone: phone, from: from, to: to });
  }

  function clRenderResults_(data) {
    const meta = (data && data.meta) || {};
    if (meta.configured === false) { clShowOnly_('cl-unconfigured'); return; }
    if (meta.available === false)  { clShowOnly_('cl-unavailable');  return; }
    const calls = (data && data.calls) || [];
    if (!calls.length) {
      const hint = $('cl-empty-hint');
      if (hint) hint.textContent = 'No inbound calls from this number between '
        + (meta.from || '?') + ' and ' + (meta.to || '?')
        + '. Capture starts the day the inbound mirror first ran — older calls were never recorded.';
      clShowOnly_('cl-empty');
      return;
    }
    const title = $('cl-results-title');
    if (title) title.textContent = calls.length + ' call' + (calls.length === 1 ? '' : 's')
      + (calls[0].insurer ? ' · ' + calls[0].insurer : '')
      + (meta.truncated ? ' (truncated)' : '');
    const dateEl = $('cl-results-date');
    if (dateEl) dateEl.textContent = (meta.from || '') + ' → ' + (meta.to || '');
    $('cl-call-list').innerHTML = calls.map(clCallCardHtml_).join('');
    clShowOnly_('cl-results');
  }

  function clOutcomeChip_(c) {
    let cls = 'cl-chip-muted', label = c.disposition || 'unknown';
    if (c.disposition === 'answered')  { cls = 'cl-chip-good'; label = 'Answered'; }
    if (c.disposition === 'missed')    { label = 'Missed'; }
    if (c.disposition === 'abandoned') {
      cls = 'cl-chip-warn';
      label = c.abandonStage === 'ivr' ? 'Abandoned in IVR' : 'Abandoned in queue';
    }
    let html = '<span class="cl-chip ' + cls + '">' + escapeHtml(label) + '</span>';
    if (c.abandonedOnHold) {
      html += ' <span class="cl-chip cl-chip-warn">Hung up on hold</span>';
    }
    return html;
  }

  function clCallCardHtml_(c) {
    const when = escapeHtml((c.callDate || '?') + (c.callStart ? ' · ' + clCstTime_(c.callStart) : ''));
    const facts = [];
    if (c.waitSeconds != null) facts.push('Waited ' + fmtDuration(c.waitSeconds));
    if (c.holdSeconds > 0)     facts.push('Held ' + fmtDuration(c.holdSeconds));
    if (c.finalDept)           facts.push('Answered by ' + escapeHtml(c.finalDept));
    if (c.dialIn)              facts.push('Dialed ' + escapeHtml(c.dialIn));
    let body;
    if (c.journey && c.journey.length) {
      body = clChainHtml_(c.journey)
           + '<div class="cl-journey">' + c.journey.map(clJourneyRowHtml_).join('')
           + clJourneyEndRowHtml_(c.journey) + '</div>';
    } else {
      // Pre-journey-extension row: queue-level summary only.
      const path = c.entryQueue
        ? escapeHtml(c.entryQueue) + (c.finalQueue && c.finalQueue !== c.entryQueue
            ? ' → ' + escapeHtml(c.finalQueue) + ' (' + c.numTransfers + ' transfer' + (c.numTransfers === 1 ? '' : 's') + ')'
            : '')
        : 'Never reached a queue (IVR only)';
      body = '<div class="cl-journey-summary">' + path
           + ' <span class="cl-journey-note">— leg-by-leg detail not captured for this call (recorded before the journey extension)</span></div>';
    }
    return '<div class="cl-call-card">'
         +   '<div class="cl-call-head">'
         +     '<span class="cl-call-when">' + when + '</span>'
         +     clOutcomeChip_(c)
         +   '</div>'
         +   (facts.length ? '<div class="cl-call-facts">' + facts.join(' · ') + '</div>' : '')
         +   body
         + '</div>';
  }

  /**
   * Compact visual path above the detailed timeline: queue + agent legs
   * as arrow-chained tokens (IVR legs collapse into one leading token).
   * "IVR → Sales → Anna ✗ → Ben ✓ 4:12" reads the whole call at a glance;
   * the timeline below keeps the exact timestamps / hold detail.
   */
  // INV-18: inbound journey timestamps (`ev.t`, `callStart`) are STORED in
  // raw PST wall-clock (icIsoTime_ in cdr-import preserves the CDR's own
  // clock); every other dashboard surface speaks CST, so DISPLAY shifts
  // +2h -- the same fixed shift the heatmap SQL applies
  // (INBOUND_HEATMAP_CST_SHIFT_HOURS). Owner note: the Call Path overlay
  // previously showed the raw PST values next to CST timestamps on the
  // Missed report.
  var CL_PST_TO_CST_SEC_ = 2 * 3600;
  function clHmsToSec_(hms) {
    const m = /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec(String(hms || '').trim());
    if (!m) return null;
    return (+m[1]) * 3600 + (+m[2]) * 60 + (+(m[3] || 0));
  }
  function clSecToHms_(sec) {
    sec = ((sec % 86400) + 86400) % 86400;
    const p = function (n) { return String(n).padStart(2, '0'); };
    return p(Math.floor(sec / 3600)) + ':' + p(Math.floor((sec % 3600) / 60)) + ':' + p(sec % 60);
  }
  function clCstTime_(hms) {
    const s = clHmsToSec_(hms);
    return s == null ? String(hms || '') : clSecToHms_(s + CL_PST_TO_CST_SEC_);
  }

  // Owner note: every journey row's timestamp is that leg's START, so a
  // long abandoned queue wait read as if the caller disconnected minutes
  // earlier than they did (the last row's time + its duration is the real
  // hang-up moment). Append an explicit terminal line computed from the
  // latest leg end (start + duration), CST-shifted like the rows.
  function clJourneyEndRowHtml_(journey) {
    let endSec = -1, abandoned = false;
    (journey || []).forEach(function (ev) {
      const s = clHmsToSec_(ev.t);
      if (s == null) return;
      const dur = Number(ev.secs != null ? ev.secs : ev.talk) || 0;
      if (s + dur > endSec) endSec = s + dur;
      if (ev.abandoned) abandoned = true;
    });
    if (endSec < 0) return '';
    return '<div class="cl-ev cl-ev-end">'
         +   '<span class="cl-ev-time">' + escapeHtml(clSecToHms_(endSec + CL_PST_TO_CST_SEC_)) + '</span>'
         +   '<span class="cl-ev-icon" aria-hidden="true">&#9632;</span>'
         +   '<span class="cl-ev-name">Call ended</span>'
         +   (abandoned ? '<span class="cl-ev-bits">caller disconnected here</span>' : '')
         + '</div>';
  }

  function clChainHtml_(journey) {
    const toks = [];
    let leadingIvr = false;
    journey.forEach(function (ev) {
      if (ev.kind === 'queue') {
        toks.push({ txt: String(ev.name || '').replace(/^A_Q_/i, ''), cls: 'cl-tok-queue' });
      } else if (ev.kind === 'answer') {
        toks.push({ txt: (ev.name || '?') + ' ✓' + (ev.talk ? ' ' + fmtDuration(ev.talk) : ''), cls: 'cl-tok-answer' });
      } else if (ev.missed) {
        toks.push({ txt: (ev.name || '?') + ' ✗', cls: 'cl-tok-missed' });
      } else if (!toks.length) {
        leadingIvr = true;   // pre-queue IVR/menu legs collapse to one token
      }
    });
    if (!toks.length) return '';
    const parts = (leadingIvr ? [{ txt: 'IVR', cls: 'cl-tok-ivr' }] : []).concat(toks);
    return '<div class="cl-chain">'
      + parts.map(function (p) {
          return '<span class="cl-tok ' + p.cls + '">' + escapeHtml(p.txt) + '</span>';
        }).join('<span class="cl-arrow" aria-hidden="true">→</span>')
      + '</div>';
  }

  function clJourneyRowHtml_(ev) {
    const kindIcon = ev.kind === 'queue' ? '⧖' : (ev.kind === 'answer' ? '✓' : '·');
    const kindCls  = ev.kind === 'answer' ? ' cl-ev-answer' : (ev.kind === 'queue' ? ' cl-ev-queue' : '');
    const bits = [];
    if (ev.talk)  bits.push('talked ' + fmtDuration(ev.talk));
    else if (ev.secs != null) bits.push(fmtDuration(ev.secs));
    if (ev.hold)  bits.push('held ' + fmtDuration(ev.hold));
    if (ev.abandoned) bits.push('caller hung up');
    else if (ev.missed && ev.kind !== 'queue') bits.push('no answer');
    return '<div class="cl-ev' + kindCls + '">'
         +   '<span class="cl-ev-time">' + escapeHtml(ev.t ? clCstTime_(ev.t) : '') + '</span>'
         +   '<span class="cl-ev-icon" aria-hidden="true">' + kindIcon + '</span>'
         +   '<span class="cl-ev-name">' + escapeHtml(ev.name || '(unknown)') + '</span>'
         +   (bits.length ? '<span class="cl-ev-bits">' + escapeHtml(bits.join(' · ')) + '</span>' : '')
         + '</div>';
  }

  // Days-to-violation forecast (E9, Phase E). Linear regression on
  // the last 7 entries of dailySeries.abandonedPct; if slope > 0 and
  // the regression projects a crossing of the 5% violation threshold
  // within QCD_FORECAST_HORIZON_DAYS (=7), surface a warn-tinted
  // banner above the KPI tiles. Hidden in healthy states (negative
  // slope, projected crossing too far out, or already above 5%).
  //
  // Math (avoids any library dep):
  //   slope = (n*Σxy - Σx*Σy) / (n*Σx² - (Σx)²)
  //   daysToCross = (5 - currentY) / slope
  // where currentY is the last observed abandonedPct and x is days
  // since the first point in the window.
  const QCD_FORECAST_HORIZON_DAYS = 7;
  const QCD_FORECAST_WINDOW_DAYS  = 7;
  /**
   * SHARED days-to-violation forecast (INV-51 / E9 semantics): 7-day
   * linear regression on a daily abandoned-% series, projecting when
   * the 5% threshold will cross. Returns inner HTML, or '' in the
   * three healthy states (already over / flat-or-improving / crossing
   * beyond the horizon). Consumed by the QCD Report AND the Insights
   * Queue health section, so the two can't disagree.
   */
  function abandonForecastHtml_(pcts) {
    const series = pcts || [];
    if (series.length < QCD_FORECAST_WINDOW_DAYS) return '';
    const ys = series.slice(-QCD_FORECAST_WINDOW_DAYS).map(function (v) { return Number(v) || 0; });
    const currentY = ys[ys.length - 1];
    // Already above threshold? No forecast -- the operator is past
    // the projection horizon; existing chrome already flags it.
    if (currentY >= 5) return '';
    const n = ys.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) {
      sumX  += i;
      sumY  += ys[i];
      sumXY += i * ys[i];
      sumXX += i * i;
    }
    const denom = n * sumXX - sumX * sumX;
    if (denom === 0) return '';
    const slope = (n * sumXY - sumX * sumY) / denom;
    // Healthy: trend is flat or improving. Skip the banner.
    if (slope <= 0.01) return '';
    const daysToCross = (5 - currentY) / slope;
    if (daysToCross <= 0 || daysToCross > QCD_FORECAST_HORIZON_DAYS) return '';
    const wholeDays = Math.max(1, Math.round(daysToCross));
    const slopeDay  = slope.toFixed(2);
    return '<span class="qcd-forecast-kicker">Forecast</span>'
      + 'Abandoned % is trending up '
      + '<strong>+' + escapeHtml(slopeDay) + '%/day</strong>'
      + ' over the last ' + QCD_FORECAST_WINDOW_DAYS + ' days. '
      + 'At this rate, it crosses the 5% violation threshold in '
      + '<strong>~' + wholeDays + ' day' + (wholeDays === 1 ? '' : 's') + '</strong>.';
  }

  // Pure: the per-day QCD rows (Date / Total / Answered / Abandoned / Aban% /
  // Viol) shared by the QCD modal's daily table AND the Insights Queue health
  // daily table (consolidation Phase 1, gap 3).
  // Secondary QCD metrics strip (#1): Answered / Longest wait / Avg answer.
  // Shown in the Insights Queue health per-queue EXPAND detail + the dept-total
  // secondary line (QCD-parity for the three secondary metrics without adding
  // headline tiles/columns).
  function insQhStatStrip_(answered, longestWait, avgAnswer) {
    return '<div class="ins-qh-qstats">'
      +   '<span><span class="ins-qh-qstat-k">Answered</span> ' + fmtNumber(Number(answered) || 0) + '</span>'
      +   '<span><span class="ins-qh-qstat-k">Longest wait</span> ' + escapeHtml(String(longestWait || '0:00:00')) + '</span>'
      +   '<span><span class="ins-qh-qstat-k">Avg answer</span> ' + escapeHtml(String(avgAnswer || '0:00:00')) + '</span>'
      + '</div>';
  }

  // YYYY-MM-DD -> MM-DD-YY for the compact "Violation dates:" lists. Returns
  // safe text (digits + dashes) on a match; escapes anything unexpected.
  function fmtViolDate_(iso) {
    var s = String(iso == null ? '' : iso);
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
    return m ? (m[2] + '-' + m[3] + '-' + m[1].slice(2)) : escapeHtml(s);
  }

  // Answered-vs-abandoned split bar for the Insights Daily breakdown, mirroring
  // the My Department agent table's answeredBarHtml_ (green answered + red
  // abandoned over total calls; the rate cell shows abandoned % with the 5%
  // benchmark tint). Reuses the .ans-bar / .ans-seg component.
  function qcdDailyBarCell_(r) {
    var total = Number(r.totalCalls)    || 0;
    var a     = Number(r.totalAnswered) || 0;
    var ab    = Number(r.abandoned)     || 0;
    var pctA  = total ? (a  / total * 100) : 0;
    var pctAb = total ? (ab / total * 100) : 0;
    var rest  = Math.max(0, 100 - pctA - pctAb);
    var abStr = r.abandonedPctStr || ((Number(r.abandonedPct) || 0).toFixed(2) + '%');
    // #3d: over the 5% threshold reads BOLD (+ the warn tint from benchValueCls_)
    // so it pops on the split bar and the granular source lines.
    var over = (Number(r.abandonedPct) || 0) >= 5;
    var rateCls = benchValueCls_('abandoned %', abStr, true) + (over ? ' qcd-rate-over' : '');
    var title = fmtNumber(a) + ' answered · ' + fmtNumber(ab) + ' abandoned · '
              + fmtNumber(total) + ' calls · ' + abStr + ' abandoned';
    var segs = total
      ? '<span class="ans-seg ans" style="width:' + pctA + '%"></span>'
        + '<span class="ans-seg miss" style="width:' + pctAb + '%"></span>'
        + (rest > 0.1 ? '<span class="ans-seg none" style="width:' + rest + '%"></span>' : '')
      : '<span class="ans-seg none" style="width:100%"></span>';
    return '<div class="ans-bar" title="' + escapeHtml(title) + '">'
         +   '<div class="ans-track">' + segs + '</div>'
         +   '<div class="ans-nums">'
         +     '<span class="ans-n">'   + fmtNumber(a)  + '</span>'
         +     '<span class="ans-slash">/</span>'
         +     '<span class="miss-n">'  + fmtNumber(ab) + '</span>'
         +     '<span class="ans-rate' + rateCls + '">' + (total ? abStr : '–') + '</span>'
         +   '</div>'
         + '</div>';
  }

  // Shared daily QCD rows. Default = the QCD modal's 6-column numeric table.
  // opts.bar (Insights Daily breakdown) folds Answered / Abandoned / Abandoned %
  // into one split-bar cell -- 4 columns: Date | Total | Answered vs Abandoned |
  // Violations (keep the #ins-qh-daily thead in sync).
  function qcdDailyRowsHtml_(rows, opts) {
    var bar = !!(opts && opts.bar);
    return (rows || []).map(function (r) {
      var pct = Number(r.abandonedPct) || 0;
      var pctCls = pct >= 5 ? 'num qcd-warn-light' : 'num';
      var viol = Number(r.violations) || 0;
      var violCls = viol > 0 ? 'num qcd-warn-light' : 'num';
      // data-date keys the violation-date -> daily-row jump (insJumpToDailyRow_).
      if (bar) {
        return '<tr data-date="' + escapeHtml(r.date) + '">'
             +   '<td>' + escapeHtml(r.date) + '</td>'
             +   '<td class="num">' + fmtNumber(r.totalCalls) + '</td>'
             +   '<td class="qcd-daily-bar-cell">' + qcdDailyBarCell_(r) + '</td>'
             +   '<td class="' + violCls + '">' + fmtNumber(r.violations) + '</td>'
             + '</tr>';
      }
      return '<tr data-date="' + escapeHtml(r.date) + '">'
           +   '<td>' + escapeHtml(r.date) + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalCalls)    + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalAnswered) + '</td>'
           +   '<td class="num">' + fmtNumber(r.abandoned)     + '</td>'
           +   '<td class="' + pctCls + '">' + escapeHtml(r.abandonedPctStr) + '</td>'
           +   '<td class="' + violCls + '">' + fmtNumber(r.violations)    + '</td>'
           + '</tr>';
    }).join('');
  }

  // Pure: the per-call-source breakdown subtable (Overall + CSR / Ad-campaign /
  // New Call Menu / Non-CSR ...) shared by the QCD modal's expandable queue
  // rows AND the Insights Queue health expandable rows (consolidation Phase 1,
  // gap 2). '' when there are no sources.
  function qcdSourceSubtableHtml_(sources) {
    sources = sources || [];
    if (!sources.length) return '';
    return '<table class="qcd-source-subtable"><thead><tr>'
         +    '<th>Call source</th><th class="num">Total</th><th class="num">Answered</th>'
         +    '<th class="num">Abandoned</th><th class="num">Aban %</th>'
         +    '<th class="num">Longest</th><th class="num">Avg ans</th><th class="num">Viol</th>'
         +  '</tr></thead><tbody>'
         +  sources.map(function (s) {
              var sPct = Number(s.abandonedPct) || 0;
              var sViol = Number(s.violations) || 0;
              return '<tr class="' + (s.isOverall ? 'qcd-source-overall' : '') + '">'
                +  '<td>' + escapeHtml(s.source) + '</td>'
                +  '<td class="num">' + fmtNumber(s.totalCalls)    + '</td>'
                +  '<td class="num">' + fmtNumber(s.totalAnswered) + '</td>'
                +  '<td class="num">' + fmtNumber(s.abandoned)     + '</td>'
                +  '<td class="num' + (sPct >= 5 ? ' qcd-warn-light qcd-rate-over' : '') + '">' + escapeHtml(s.abandonedPctStr) + '</td>'
                +  '<td class="num">' + escapeHtml(s.longestWait)  + '</td>'
                +  '<td class="num">' + escapeHtml(s.avgAnswer)    + '</td>'
                +  '<td class="num' + (sViol > 0 ? ' qcd-warn-light' : '') + '">' + fmtNumber(s.violations) + '</td>'
                +  '</tr>';
            }).join('')
         +  '</tbody></table>';
  }

  // ===================================================================
  // All-departments daily call queue report (4b). Admin-only; launched
  // from the Overview "Daily Call Queue Report" button. Flat company-wide
  // queue table reproducing the legacy emailed PDF, with CSV + print.
  // ===================================================================
  var qcdAllDeptLast = null;
  var qcdAllDeptReqSeq_ = 0;   // stale-response token for runQcdAllDept_

  function initQcdAllDept_() {
    const btn   = $('ov-qcd-alldept-btn');
    const modal = $('qcd-alldept-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel-wide') || modal.querySelector('.modal-panel'));
      document.addEventListener('keydown', onKeyDown);
      // Pre-load (#1a): default to yesterday and generate immediately, so the
      // report opens ready-to-read instead of a blank form.
      qcdAllDeptDefaultDates_();
      runQcdAllDept_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel-wide') || modal.querySelector('.modal-panel'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // In-modal date changer (#1b): a preset change re-generates immediately; a
    // manual date edit flips the preset to Custom and the user clicks Update.
    const preset = $('qcd-alldept-preset');
    if (preset) preset.addEventListener('change', function () { qcdAllDeptApplyPreset_(); runQcdAllDept_(); });
    ['qcd-alldept-from', 'qcd-alldept-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', function () {
        const p = $('qcd-alldept-preset');
        if (p) p.value = 'custom';
      });
    });
    const refresh = $('qcd-alldept-refresh-btn');
    if (refresh) refresh.addEventListener('click', function () { runQcdAllDept_(); });
    const csv = $('qcd-alldept-csv-btn');
    if (csv) csv.addEventListener('click', function () { qcdAllDeptCsv_(qcdAllDeptLast); });
    const prn = $('qcd-alldept-print-btn');
    if (prn) prn.addEventListener('click', function () { qcdAllDeptPrint_(qcdAllDeptLast); });

    // Delegated expand/collapse for the per-queue call-source detail (#1c).
    // Wired once; survives re-renders (the tbody content is replaced, this
    // listener on the container is not).
    const bodyEl = $('qcd-alldept-body');
    if (bodyEl && !bodyEl._qcdAllExpandWired) {
      bodyEl._qcdAllExpandWired = true;
      bodyEl.addEventListener('click', function (e) {
        const row = e.target.closest && e.target.closest('tr.qcd-expandable');
        if (!row) return;
        const detail = row.nextElementSibling;
        if (!detail || !detail.classList.contains('qcd-detail-row')) return;
        const isOpen = detail.style.display !== 'none';
        detail.style.display = isOpen ? 'none' : '';
        const icon = row.querySelector('.qcd-expand-icon');
        if (icon) icon.innerHTML = isOpen ? '&#9654;' : '&#9660;';   // ▶ / ▼ (matches the QCD modal)
      });
    }
  }

  function qcdAllDeptIsoOf_(d) {
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  // Most recent WORKDAY on or before yesterday: walks back over Sat/Sun and
  // company holidays (server-injected __COMPANY_HOLIDAYS__, the INV-35
  // ranges). Client mirror of Util.gs::prevBusinessDayIso_'s semantics.
  function prevWorkdayIso_() {
    const holidays = (typeof window !== 'undefined' && window.__COMPANY_HOLIDAYS__) || [];
    const isHoliday = function (iso) {
      for (let i = 0; i < holidays.length; i++) {
        if (iso >= holidays[i].from && iso <= holidays[i].to) return true;
      }
      return false;
    };
    const now = new Date();
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
    for (let guard = 0; guard < 30; guard++) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6 && !isHoliday(qcdAllDeptIsoOf_(d))) break;
      d.setDate(d.getDate() - 1);
    }
    return qcdAllDeptIsoOf_(d);
  }

  function qcdAllDeptDefaultDates_() {
    // Default to the most recent day that actually has queue data (the
    // latest QCD date from the init fetch), falling back to the previous
    // WORKDAY -- literal calendar yesterday is a weekend/holiday after a
    // Monday-morning open, which rendered an empty report.
    const now = new Date();
    const literalYesterday = qcdAllDeptIsoOf_(
      new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1));
    const iso = latestQcdIso_ || prevWorkdayIso_();
    $('qcd-alldept-from').value = iso;
    $('qcd-alldept-to').value   = iso;
    // Keep the preset honest: only claim "Yesterday" when the chosen date
    // IS literal yesterday; otherwise show Custom so the label can't lie.
    const p = $('qcd-alldept-preset');
    if (p) p.value = (iso === literalYesterday) ? 'yesterday'
      : (iso === qcdAllDeptIsoOf_(now) ? 'today' : 'custom');
  }

  function qcdAllDeptApplyPreset_() {
    const v = $('qcd-alldept-preset').value;
    if (v === 'custom') return;
    const now = new Date();
    let s, e;
    if (v === 'today') {
      s = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      e = new Date(s);
    } else if (v === 'yesterday') {
      s = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      e = new Date(s);
    } else if (v === 'thisMonth') {
      s = new Date(now.getFullYear(), now.getMonth(), 1);
      e = now;
    } else if (v === 'lastMonth') {
      s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      e = new Date(now.getFullYear(), now.getMonth(), 0);
    } else if (v === 'last30') {
      // "Last 30 days" = 30 days ending yesterday (see applyIrPreset) --
      // also matches this report's yesterday-anchored default date.
      e = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      s = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 30);
    } else {
      return;
    }
    $('qcd-alldept-from').value = qcdAllDeptIsoOf_(s);
    $('qcd-alldept-to').value   = qcdAllDeptIsoOf_(e);
  }

  function runQcdAllDept_() {
    const from = $('qcd-alldept-from').value;
    const to   = $('qcd-alldept-to').value;
    const err  = $('qcd-alldept-form-error');
    err.style.display = 'none';
    if (!from || !to) {
      err.textContent = 'Pick a start and end date.';
      err.style.display = '';
      return;
    }
    if (from > to) {
      err.textContent = 'Start date must be on or before end date.';
      err.style.display = '';
      return;
    }
    const gen = $('qcd-alldept-refresh-btn');
    const orig = gen ? gen.innerHTML : '';
    if (gen) { gen.disabled = true; gen.innerHTML = DS_EQ_HTML_ + 'Updating…'; }
    // Stale-response token: the preset selector re-runs immediately on every
    // change, so rapid switches overlap requests -- only the newest response
    // may write qcdAllDeptLast (which feeds CSV/Print) or repaint the table.
    var __tok = ++qcdAllDeptReqSeq_;
    google.script.run
      .withSuccessHandler(function (data) {
        if (__tok !== qcdAllDeptReqSeq_) return;   // superseded by a newer run
        if (gen) { gen.disabled = false; gen.innerHTML = orig; }
        qcdAllDeptLast = data;
        qcdAllDeptRender_(data);
      })
      .withFailureHandler(function (e) {
        if (__tok !== qcdAllDeptReqSeq_) return;   // a newer run owns the table
        if (gen) { gen.disabled = false; gen.innerHTML = orig; }
        err.textContent = (e && e.message) ? e.message : String(e);
        err.style.display = '';
      })
      .getQcdAllDepartments({ from: from, to: to });
  }

  // Renders the flat company-wide table: a section per department (its
  // subtotal as a heading row), one row per queue, and a grand-total
  // footer. Abandoned % >= 5% and any violation count are warn-tinted
  // (same thresholds as the per-dept QCD report).
  // Seconds -> H:MM:SS (client-side; server uses formatSecondsHms_).
  function qcdSecToHms_(sec) {
    sec = Math.max(0, Math.round(Number(sec) || 0));
    var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // #3: combined section total across a set of queue rows (parent own +
  // nested children). Sums volume/answered/abandoned/violations; longest =
  // MAX; avg answer = volume-weighted -- using the raw *Sec fields the server
  // now sends. Returns the same shape qcdDailyBarCell_ + the row cells read.
  function qcdAllDeptSectionTotal_(queues) {
    var tot = 0, ans = 0, abnd = 0, viol = 0, longestSec = 0, avgWSum = 0, avgWN = 0;
    (queues || []).forEach(function (q) {
      tot  += Number(q.totalCalls)    || 0;
      ans  += Number(q.totalAnswered) || 0;
      abnd += Number(q.abandoned)     || 0;
      viol += Number(q.violations)    || 0;
      var ls = Number(q.longestWaitSec) || 0;
      if (ls > longestSec) longestSec = ls;
      var as = Number(q.avgAnswerSec) || 0, a = Number(q.totalAnswered) || 0;
      if (as > 0 && a > 0) { avgWSum += as * a; avgWN += a; }
    });
    var pct = tot > 0 ? (abnd / tot) * 100 : 0;
    return {
      totalCalls: tot, totalAnswered: ans, abandoned: abnd,
      abandonedPct: pct, abandonedPctStr: pct.toFixed(2) + '%',
      longestWait: qcdSecToHms_(longestSec),
      avgAnswer: qcdSecToHms_(avgWN > 0 ? Math.round(avgWSum / avgWN) : 0),
      violations: viol,
    };
  }

  // Verdict layer (design update): a KPI band + alert callout rendered ABOVE the
  // table, derived from data.grandTotals (F-36-deduped, correct total-abandoned/
  // total-offered basis -- NOT a client re-sum of the sections, which would
  // double-count a queue mapped to two depts). "Queues in violation" = count of
  // UNIQUE queues with abandoned % >= 5% (owner ruling; distinct from the
  // Violations column). No new server call; the table/CSV/print are unchanged.
  // The 5%-overage callout uses .is-warn (not .is-bad) per the CSS-token
  // convention: --bad is hard errors, --warn is warnings (a threshold overage).
  function qcdAllDeptVerdictHtml_(data) {
    const g = (data && data.grandTotals) || {};
    const depts = (data && data.depts) || [];
    const total = Number(g.totalCalls) || 0;
    const ans = Number(g.totalAnswered) || 0;
    const companyPct = Number(g.abandonedPct) || 0;
    const companyPctStr = g.abandonedPctStr || (companyPct.toFixed(2) + '%');
    const answeredPct = total > 0 ? (ans / total * 100) : 0;
    const seen = {}, offenders = [];
    depts.forEach(function (d) {
      (d.queues || []).forEach(function (q) {
        if (seen[q.queue]) return; seen[q.queue] = true;
        if (Number(q.abandonedPct) >= 5) {
          offenders.push({ queue: q.queue, pct: Number(q.abandonedPct) || 0,
            pctStr: q.abandonedPctStr || (Number(q.abandonedPct) || 0).toFixed(1) + '%',
            viol: Number(q.violations) || 0 });
        }
      });
    });
    offenders.sort(function (a, b) { return (b.viol - a.viol) || (b.pct - a.pct); });
    const tile = function (label, value, tone) {
      return '<div class="qcd-verdict-tile qcd-verdict--' + tone + '">'
        + '<div class="qcd-verdict-label">' + label + '</div>'
        + '<div class="qcd-verdict-value">' + escapeHtml(String(value)) + '</div></div>';
    };
    const band = '<div class="qcd-verdict-band">'
      + tile('Company aban %', companyPctStr, companyPct >= 5 ? 'warn' : 'neu')
      + tile('Total calls', fmtNumber(total), 'neu')
      + tile('Queues in violation', fmtNumber(offenders.length), offenders.length > 0 ? 'warn' : 'neu')
      + tile('Answered %', answeredPct.toFixed(1) + '%', 'good')
      + '</div>';
    let callout;
    if (offenders.length) {
      const parts = offenders.map(function (o) {
        return '<strong>' + escapeHtml(o.queue) + '</strong> ' + escapeHtml(o.pctStr)
          + (o.viol > 0 ? ' (' + fmtNumber(o.viol) + ' viol)' : '');
      }).join(', ');
      callout = '<div class="ds-banner is-warn qcd-verdict-callout">'
        + '<span class="ds-banner__badge">Watch</span>'
        + '<div>' + offenders.length + ' queue' + (offenders.length === 1 ? '' : 's')
        + ' over the 5% line — ' + parts + '.</div></div>';
    } else {
      callout = '<div class="ds-banner is-good qcd-verdict-callout">'
        + '<span class="ds-banner__badge">On track</span>'
        + '<div>All queues under the 5% line.</div></div>';
    }
    return band + callout;
  }

  function qcdAllDeptRender_(data) {
    $('qcd-alldept-results-date').textContent = data.dateLabel || '';
    const empty = $('qcd-alldept-empty');
    const body  = $('qcd-alldept-body');
    const verdict = $('qcd-alldept-verdict');
    const depts = (data && data.depts) || [];
    if (!depts.length) {
      body.innerHTML = '';
      if (verdict) verdict.innerHTML = '';
      empty.innerHTML = emptyStateHtml_('&#128202;', 'No queue activity in range',
        'No department had Total Calls in the selected window. Try a wider range.');
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    if (verdict) verdict.innerHTML = qcdAllDeptVerdictHtml_(data);

    const cell = function (pct, viol) {
      return { violCls: (Number(viol) > 3 ? ' qcd-warn-strong' : (Number(viol) > 0 ? ' qcd-warn-light' : '')) };
    };
    // #3: nest sub-queue depts under their parent's banner. A dept is a child
    // when its `parent` names another dept present here; otherwise it's a
    // top-level section (an orphaned child falls back to its own banner).
    const byName = {};
    depts.forEach(function (d) { byName[d.dept] = d; });
    const childrenOf = {};
    const topLevel = [];
    depts.forEach(function (d) {
      if (d.parent && byName[d.parent]) {
        (childrenOf[d.parent] = childrenOf[d.parent] || []).push(d);
      } else {
        topLevel.push(d);
      }
    });
    // Convenience: float the VIEWER's own dept's section to the top. If their
    // dept is a sub-queue (nested child), float its parent section instead so
    // their dept still appears in the first section. No-op for admins with no
    // dept / a dept absent from this window. (Array.sort is stable in V8.)
    const myDept = (typeof USER !== 'undefined' && USER && USER.department) ? USER.department : '';
    let mySection = '';
    if (myDept && byName[myDept]) {
      const md = byName[myDept];
      mySection = (md.parent && byName[md.parent]) ? md.parent : myDept;
      topLevel.sort(function (a, b) {
        return (a.dept === mySection ? 0 : 1) - (b.dept === mySection ? 0 : 1);
      });
    }

    // #1d: Answered / Abandoned / Abandoned % fold into ONE split-bar column
    // (shared qcdDailyBarCell_). 6 columns.
    const NCOLS = 6;
    let html = '<table class="qcd-alldept-table agents"><thead><tr>'
      + '<th>Queue</th><th class="num">Total</th><th>Answered vs Abandoned</th>'
      + '<th class="num">Longest</th><th class="num">Avg ans</th><th class="num">Viol</th>'
      + '</tr></thead>';
    const queueRow = function (q, sub) {
      const c = cell(q.abandonedPct, q.violations);
      const subTag = sub ? ' <span class="qcd-alldept-subq">&middot; ' + escapeHtml(sub) + '</span>' : '';
      // #1c: expand into the per-call-source breakdown (+ violation dates).
      const sources = q.bySource || [];
      const hasViolDates = (Number(q.violations) || 0) > 0 && (q.violationDates || []).length;
      const hasDetail = sources.length > 0 || hasViolDates;
      const chevron = hasDetail ? ' <span class="qcd-expand-icon">&#9654;</span>' : '';
      let out = '<tr class="' + (hasDetail ? 'qcd-expandable' : '') + '">'
        + '<td>' + escapeHtml(q.queue) + subTag + chevron + '</td>'
        + '<td class="num">' + fmtNumber(q.totalCalls) + '</td>'
        + '<td class="qcd-daily-bar-cell">' + qcdDailyBarCell_(q) + '</td>'
        + '<td class="num">' + escapeHtml(q.longestWait) + '</td>'
        + '<td class="num">' + escapeHtml(q.avgAnswer) + '</td>'
        + '<td class="num' + c.violCls + '">' + fmtNumber(q.violations) + '</td>'
        + '</tr>';
      if (hasDetail) {
        let detail = qcdSourceSubtableHtml_(sources);
        if (hasViolDates) {
          detail += '<div class="qcd-detail-viol"><strong>Violation dates:</strong> '
            + q.violationDates.map(fmtViolDate_).join(', ') + '</div>';
        }
        out += '<tr class="qcd-detail-row" style="display:none;"><td colspan="' + NCOLS + '">'
          + '<div class="qcd-detail-wrap">' + detail + '</div></td></tr>';
      }
      return out;
    };
    topLevel.forEach(function (d) {
      // Section queues: parent's own (untagged) + each child's (tagged).
      const secItems = (d.queues || []).map(function (q) { return { q: q, sub: null }; });
      (childrenOf[d.dept] || []).forEach(function (child) {
        (child.queues || []).forEach(function (q) { secItems.push({ q: q, sub: child.dept }); });
      });
      html += '<tbody class="qcd-alldept-dept" data-dept="' + escapeHtml(d.dept) + '">'
        + '<tr class="qcd-alldept-deptrow"><td colspan="' + NCOLS + '">' + escapeHtml(d.dept) + '</td></tr>';
      secItems.forEach(function (item) { html += queueRow(item.q, item.sub); });
      // #3: the "(dept) total" row is redundant for a single-queue section
      // (the lone queue line IS the total), so show it only when >1 queue.
      if (secItems.length > 1) {
        const st = qcdAllDeptSectionTotal_(secItems.map(function (i) { return i.q; }));
        const tc = cell(st.abandonedPct, st.violations);
        html += '<tr class="qcd-alldept-subtotal">'
          + '<td>' + escapeHtml(d.dept) + ' total</td>'
          + '<td class="num">' + fmtNumber(st.totalCalls) + '</td>'
          + '<td class="qcd-daily-bar-cell">' + qcdDailyBarCell_(st) + '</td>'
          + '<td class="num">' + escapeHtml(st.longestWait) + '</td>'
          + '<td class="num">' + escapeHtml(st.avgAnswer) + '</td>'
          + '<td class="num' + tc.violCls + '">' + fmtNumber(st.violations) + '</td>'
          + '</tr>';
      }
      html += '</tbody>';
    });
    const g = data.grandTotals || {};
    const gc = cell(g.abandonedPct, g.violations);
    html += '<tfoot><tr class="qcd-alldept-grand">'
      + '<td>Company total</td>'
      + '<td class="num">' + fmtNumber(g.totalCalls) + '</td>'
      + '<td class="qcd-daily-bar-cell">' + qcdDailyBarCell_(g) + '</td>'
      + '<td class="num">' + escapeHtml(g.longestWait) + '</td>'
      + '<td class="num">' + escapeHtml(g.avgAnswer) + '</td>'
      + '<td class="num' + gc.violCls + '">' + fmtNumber(g.violations) + '</td>'
      + '</tr></tfoot></table>';
    body.innerHTML = html;
    // Auto-expand the viewer's own dept section (its per-queue source detail)
    // so their numbers are front-and-center on open. Mirrors the click-expand:
    // reveal each queue's detail row + flip its chevron. Bounded to the one
    // section; a no-op when the viewer has no dept in this window.
    if (mySection) {
      const sectionTbody = body.querySelector('.qcd-alldept-dept[data-dept="' + escCssId_(mySection) + '"]');
      if (sectionTbody) {
        sectionTbody.querySelectorAll('tr.qcd-detail-row').forEach(function (dr) { dr.style.display = ''; });
        sectionTbody.querySelectorAll('tr.qcd-expandable .qcd-expand-icon').forEach(function (ic) { ic.innerHTML = '&#9660;'; });
      }
    }
  }

  function qcdAllDeptCsv_(data) {
    if (!data || !(data.depts || []).length) return;
    const esc = function (v) {
      const s = csvSafeCell_(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const row = function (cells) { return cells.map(esc).join(','); };
    const lines = [];
    // C-5: route the title cells through the shared escaper too -- the
    // server-built dateLabel contains a comma ("Jul 10, 2026"), which split
    // this line into three columns.
    lines.push(row(['Daily Call Queue Report', data.dateLabel || '']));
    lines.push('');
    lines.push(row(['Department', 'Queue', 'Sub-dept', 'Total Calls', 'Answered', 'Abandoned',
                    'Abandoned %', 'Longest Wait', 'Avg Answer', 'Violations']));
    // Same grouping as the table: children nested under their parent, section
    // total only when the section has >1 queue (#3).
    const depts = data.depts || [];
    const byName = {};
    depts.forEach(function (d) { byName[d.dept] = d; });
    const childrenOf = {};
    const topLevel = [];
    depts.forEach(function (d) {
      if (d.parent && byName[d.parent]) { (childrenOf[d.parent] = childrenOf[d.parent] || []).push(d); }
      else { topLevel.push(d); }
    });
    topLevel.forEach(function (d) {
      const secItems = (d.queues || []).map(function (q) { return { q: q, sub: '' }; });
      (childrenOf[d.dept] || []).forEach(function (child) {
        (child.queues || []).forEach(function (q) { secItems.push({ q: q, sub: child.dept }); });
      });
      secItems.forEach(function (it) {
        const q = it.q;
        lines.push(row([d.dept, q.queue, it.sub, q.totalCalls, q.totalAnswered, q.abandoned,
                        q.abandonedPctStr, q.longestWait, q.avgAnswer, q.violations]));
      });
      if (secItems.length > 1) {
        const t = qcdAllDeptSectionTotal_(secItems.map(function (i) { return i.q; }));
        lines.push(row([d.dept, d.dept + ' total', '', t.totalCalls, t.totalAnswered, t.abandoned,
                        t.abandonedPctStr, t.longestWait, t.avgAnswer, t.violations]));
      }
    });
    const g = data.grandTotals || {};
    lines.push(row(['', 'Company total', '', g.totalCalls, g.totalAnswered, g.abandoned,
                    g.abandonedPctStr, g.longestWait, g.avgAnswer, g.violations]));
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'daily_call_queue_report_' + (data.meta && data.meta.from || '')
               + '_' + (data.meta && data.meta.to || '') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  // Print the rendered table directly (no html2canvas needed -- this is a
  // plain table). Opens a window with a minimal print stylesheet.
  function qcdAllDeptPrint_(data) {
    if (!data) return;
    const tableEl = $('qcd-alldept-body');
    const w = window.open('about:blank');
    if (!w) return;
    const css = 'body{font-family:Arial,Helvetica,sans-serif;color:#222;padding:18px;}'
      + 'h1{font-size:16px;margin:0 0 2px;}.sub{color:#666;font-size:12px;margin:0 0 14px;}'
      + 'table{width:100%;border-collapse:collapse;}'
      + 'th,td{padding:3px 8px;border-bottom:1px solid #ddd;text-align:left;font-size:11.5px;}'
      + 'td.num,th.num{text-align:right;}'
      + '.qcd-alldept-deptrow td{font-weight:700;background:#f2f2f2;padding-top:8px;}'
      + '.qcd-alldept-subtotal td{font-weight:600;border-top:1px solid #999;}'
      + '.qcd-alldept-grand td{font-weight:700;border-top:2px solid #333;}'
      + '.qcd-warn-light{background:#fff3e0;}.qcd-warn-strong{background:#ffd9b3;}';
    w.document.write('<title>Daily Call Queue Report</title><style>' + css + '</style>'
      + '<h1>Daily Call Queue Report</h1><p class="sub">' + escapeHtml(data.dateLabel || '') + '</p>'
      + (tableEl ? tableEl.innerHTML : ''));
    w.document.close();
    w.focus();
    setTimeout(function () { try { w.print(); } catch (e) {} }, 250);
  }

  // Wait for DOM, then go.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
