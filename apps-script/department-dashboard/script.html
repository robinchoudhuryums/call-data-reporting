      +   '<button type="button" class="ov-launcher-q" data-launch="abandons">Are callers giving up before we answer?</button>'
      + '</div>';
  }

  // Wires the quick-start chips on ALL host pages (owner note): the
  // Overview's static block, plus injected copies at the top of the
  // Insights page and the My Department page -- same chips, same behavior
  // everywhere. Each chip lands on (and briefly SPOTLIGHTS) the exact
  // report section that answers its question.
  function initOverviewLauncher_() {
    const onLaunch = function (e) {
      const btn = e.target.closest('[data-launch]');
      if (!btn) return;
      const kind = btn.getAttribute('data-launch');
      try {
        if (kind === 'team-lately') {
          launcherOpenInsights_('How is my team doing lately?', 'ins-kpi-row');
        } else if (kind === 'missed-yesterday') {
          launcherOpenMissed_();
        } else if (kind === 'agent-trend') {
          // Repointed from the Individual Report's primed setup form (owner
          // note): the Insights per-agent cards auto-run and answer the
          // question directly; each card still drills into IR.
          launcherOpenInsights_('Is one of my agents struggling or improving?', 'ins-agent-cards');
        } else if (kind === 'abandons') {
          // #5: repointed from QCD (retired) to Insights -- its Queue health
          // section carries the abandon %/heatmap that answers the question.
          launcherOpenInsights_('Are callers giving up before we answer?', 'ins-queue-health');
        }
      } catch (err) { /* best-effort: the report is still openable by hand */ }
    };
    ['ov-launcher', 'ins-launcher', 'dept-launcher'].forEach(function (id) {
      const wrap = $(id);
      if (!wrap) return;
      if (id !== 'ov-launcher') wrap.innerHTML = launcherRowHtml_();
      wrap.addEventListener('click', onLaunch);
    });
  }

  // Launcher-initiated runs skip the form: a loading pane (with the
  // question being answered) replaces it until the report renders. The
  // pane is created on demand before the form element; each modal's
  // showForm/showResults helpers hide it, so any failure path that falls
  // back to the form dismisses it automatically.
  function launcherShowLoading_(loadingId, formId, resultsId, question) {
    const form = $(formId), results = $(resultsId);
    if (!form) return;
    form.style.display = 'none';
    if (results) results.style.display = 'none';
    let el = $(loadingId);
    if (!el) {
      el = document.createElement('div');
      el.id = loadingId;
      el.className = 'launcher-loading';
      form.parentNode.insertBefore(el, form);
    }
    el.innerHTML = '<div class="launcher-loading-q">' + escapeHtml(question) + '</div>'
      + '<div class="skeleton-row"><div class="skeleton-line" style="width:60%;"></div></div>'
      + '<div class="skeleton-row"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>'
      + '<div class="skeleton-row"><div class="skeleton-line" style="height:120px;flex:1;"></div></div>'
      + '<div class="launcher-loading-cap">Generating the report…</div>';
    el.style.display = '';
  }
  function launcherHideLoading_(loadingId) {
    const el = $(loadingId);
    if (el) el.style.display = 'none';
  }

  // "How is my team doing lately?" -> Insights, last 30 days, all active
  // agents, auto-generated. setPage('insights') runs the page's normal
  // entry (first-entry defaults + prefs + roster fetch via insEnsurePage_);
  // we then override the dates and re-ensure the roster for the new range --
  // insRenderAgentList consumes insLauncherAutoRun_ once the picker is
  // rendered, so the select-all + generate happen at a race-free
  // synchronization point. The form never flashes: a loading pane covers
  // the roster fetch + generate; failures fall back to the primed form
  // (insShowForm).
  function launcherOpenInsights_(question, scrollTarget) {
    if (!$('insights-page')) return;
    // Land on (and spotlight) the exact section that answers the chip's
    // question; consumed at the end of insRenderReport_ (one-shot).
    insScrollPending_ = scrollTarget || null;
    setPage('insights');
    if ($('ins-from')) $('ins-from').value = launcherIsoDaysAgo_(30);
    if ($('ins-to'))   $('ins-to').value   = launcherIsoDaysAgo_(1);
    const p = $('ins-preset');
    if (p) p.value = 'custom';
    insLauncherAutoRun_ = true;
    launcherShowLoading_('ins-launcher-loading', 'insights-form', 'insights-results',
      question || 'How is my team doing lately?');
    insEnsureRoster();
  }

  // "When did we miss calls?" -> the My Department missed section
  // on the most recent date with data (the modal was retired -- the inline
  // section is the report). Sets the page dates, opens the dept page, and
  // scrolls to the section once its fetch renders it.
  function launcherOpenMissed_() {
    const iso = latestDqeIso_ || launcherIsoDaysAgo_(1);
    if ($('from-date')) $('from-date').value = iso;
    if ($('to-date'))   $('to-date').value   = iso;
    clearActivePreset_();
    deptMissedScrollPending_ = true;   // consumed when the section renders
    setPage('dept');
    refresh();
  }

  // Lighter Insights <-> My Department hand-off (the two pages stay separate;
  // the relationship is made explicit). The department is the shared global
  // selector, so only the DATE window needs carrying.

  // My Department -> Insights: carry an explicit window into the Insights page
  // and (re-)generate it -- a parametrized launcherOpenInsights_. Re-entry
  // normally keeps the rendered report, so we arm the auto-run flag + re-ensure
  // the roster (the launcher-chip path) to force a run for the carried window.
  function handoffToInsights_(fromIso, toIso, scrollTarget) {
    if (!$('insights-page')) return;
    insScrollPending_ = scrollTarget || null;
    setPage('insights');
    if (fromIso && $('ins-from')) $('ins-from').value = fromIso;
    if (toIso   && $('ins-to'))   $('ins-to').value   = toIso;
    const p = $('ins-preset'); if (p) p.value = 'custom';
    insLauncherAutoRun_ = true;
    launcherShowLoading_('ins-launcher-loading', 'insights-form', 'insights-results',
      'Insights for this department & range');
    insEnsureRoster();
  }

  // Insights -> My Department: carry the window into the dept page and load it.
  // opts.missed arms the one-shot scroll to the Missed Calls section (the Queue
  // health "See missed calls" drilldown). Mirrors launcherOpenMissed_.
  function handoffToMyDept_(fromIso, toIso, opts) {
    opts = opts || {};
    if (fromIso && $('from-date')) $('from-date').value = fromIso;
    if (toIso   && $('to-date'))   $('to-date').value   = toIso;
    if (typeof clearActivePreset_ === 'function') clearActivePreset_();
    if (opts.missed) deptMissedScrollPending_ = true;
    setPage('dept');
    refresh();
  }

  // -- Batch E: explicit date-sync between My Department and Insights ---------
  // The two pages keep INDEPENDENT date windows by design (owner: no silent
  // auto-change when you switch tabs). The hand-off buttons above carry a
  // window when you explicitly cross over; this covers the OTHER path -- a
  // plain nav-tab switch -- by noticing when the page you land on shows a
  // different window than the one you left, and offering a one-click align.
  // It NEVER changes the dates on its own; the chip is a dismissible offer.
  var pageActiveWindow_ = { dept: null, insights: null };   // last-rendered window per page
  var dateSyncDismissed_ = {};   // `<page>|<from>|<to>` -> true (don't re-nag the same offer)

  function recordPageWindow_(page, from, to) {
    if (!from || !to) return;
    pageActiveWindow_[page] = { from: from, to: to };
  }

  function dsyncFmtRange_(from, to) {
    function one(iso) {
      var p = String(iso).split('-');
      if (p.length !== 3) return String(iso);
      var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }
    return from === to ? one(from) : one(from) + ' – ' + one(to);
  }

  // Render (or hide) the sync chip on the page just entered. Compares the
  // target page's CURRENT date inputs to the OTHER page's last-rendered window.
  function maybeShowDateSyncChip_(page) {
    if (page !== 'dept' && page !== 'insights') return;
    var otherKey = page === 'dept' ? 'insights' : 'dept';
    var hostId   = page === 'dept' ? 'dept-date-sync' : 'ins-date-sync';
    var host = $(hostId);
    if (!host) return;
    var otherWin = pageActiveWindow_[otherKey];
    var fromEl = page === 'dept' ? $('from-date') : $('ins-from');
    var toEl   = page === 'dept' ? $('to-date')   : $('ins-to');
    var curFrom = fromEl ? fromEl.value : '';
    var curTo   = toEl ? toEl.value : '';
    // Nothing to offer: the other page hasn't been viewed, this page has no
    // window yet, or the two already match.
    if (!otherWin || !curFrom || !curTo
        || (otherWin.from === curFrom && otherWin.to === curTo)) {
      host.style.display = 'none'; host.innerHTML = ''; return;
    }
    var dismissKey = page + '|' + otherWin.from + '|' + otherWin.to;
    if (dateSyncDismissed_[dismissKey]) { host.style.display = 'none'; host.innerHTML = ''; return; }
    var otherLabel = otherKey === 'dept' ? 'My Department' : 'Insights';
    var range = dsyncFmtRange_(otherWin.from, otherWin.to);
    host.innerHTML =
        '<span class="dsync-txt">' + otherLabel + ' is showing <strong>' + escapeHtml(range) + '</strong></span>'
      + '<button type="button" class="dsync-apply" data-dsync-apply="1">Use these dates</button>'
      + '<button type="button" class="dsync-x" data-dsync-x="1" aria-label="Dismiss">×</button>';
    host.style.display = '';
    var applyBtn = host.querySelector('[data-dsync-apply]');
    applyBtn.onclick = function () {
      applyDateSync_(page, otherWin.from, otherWin.to);
    };
    // #5 Option A: the dept chip's Apply re-runs My Department for the offered
    // window (applyDateSync_ -> refresh), so warm that summary on hover -- it'll
    // SWR-paint the moment they click. Fire directly (not debounced): the button
    // is small, prefetchDeptSummary_ is one-per-sig idempotent, and the Insights
    // chip is skipped (its Apply re-runs Insights, whose sig isn't prefetchable).
    if (page === 'dept') {
      applyBtn.addEventListener('mouseover', function () {
        prefetchDeptSummary_(otherWin.from, otherWin.to);
      });
    }
    host.querySelector('[data-dsync-x]').onclick = function () {
      dateSyncDismissed_[dismissKey] = true;
      host.style.display = 'none'; host.innerHTML = '';
    };
  }

  function applyDateSync_(page, from, to) {
    var host = $(page === 'dept' ? 'dept-date-sync' : 'ins-date-sync');
    if (host) { host.style.display = 'none'; host.innerHTML = ''; }
    if (page === 'dept') {
      if ($('from-date')) $('from-date').value = from;
      if ($('to-date'))   $('to-date').value   = to;
      if (typeof clearActivePreset_ === 'function') clearActivePreset_();
      refresh();
    } else {
      if ($('ins-from')) $('ins-from').value = from;
      if ($('ins-to'))   $('ins-to').value   = to;
      if (typeof runInsReport === 'function') runInsReport();
    }
  }

  // "Is one of my agents struggling or improving?" -> Individual Report
  // primed with a 30-day window; agent choice is deliberately left to
  // the user (that IS the question), so no auto-run.
  // (launcherOpenIndividual_ was retired -- the "struggling or improving?"
  // chip previously stopped at the Individual Report's primed setup form;
  // it now routes to the Insights per-agent cards, which auto-run and
  // answer the question directly. IR stays reachable via the Reports menu
  // and the card/chart drill-throughs.)

  // One-shot section spotlight for the quick-start chips: scrolls the
  // target into view and pulses an accent ring so the eye lands on the
  // exact part of the report that answers the question. Reduced-motion
  // users get a static ring (no pulse) for the same duration.
  function qsSpotlight_(id) {
    const el = document.getElementById(id);
    if (!el) return;
    try { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) { /* best-effort */ }
    el.classList.remove('qs-spotlight');
    void el.offsetWidth;   // restart the CSS animation on repeat clicks
    el.classList.add('qs-spotlight');
    setTimeout(function () { el.classList.remove('qs-spotlight'); }, 2600);
    qsDimOutside_(el);     // briefly dim everything OUTSIDE the target
  }

  // Companion to the accent-ring pulse: a transient overlay that dims the rest
  // of the page so the eye is pulled to the spotlighted section (the guided
  // tour's box-shadow-spotlight technique, as a one-shot). A transparent box is
  // positioned over the target in DOCUMENT coordinates (scroll-invariant, so it
  // stays aligned through the smooth-scroll) and dims everything else via a huge
  // box-shadow; it's click-through and self-removes. Sits below all modals
  // (z-index in styles.html), so it never fires over one in practice (the
  // launcher chips land on pages, not modals).
  function qsDimOutside_(el) {
    var prev = document.getElementById('qs-dim-overlay');
    if (prev && prev.parentNode) prev.parentNode.removeChild(prev);   // no stacking on rapid re-clicks
    var ov = document.createElement('div');
    ov.id = 'qs-dim-overlay';
    ov.className = 'qs-dim';
    document.body.appendChild(ov);
    var pad = 8;
    var position = function () {
      var r = el.getBoundingClientRect();
      // Document coords: rect (viewport-relative) + scroll offset is constant as
      // the viewport scrolls, so the hole tracks the element without per-frame
      // work -- the RAF loop below only corrects late layout shifts on render.
      ov.style.top = (r.top + (window.pageYOffset || 0) - pad) + 'px';
      ov.style.left = (r.left + (window.pageXOffset || 0) - pad) + 'px';
      ov.style.width = (r.width + pad * 2) + 'px';
      ov.style.height = (r.height + pad * 2) + 'px';
    };
    position();
    var start = Date.now();
    var track = function () { position(); if (Date.now() - start < 700) requestAnimationFrame(track); };
    requestAnimationFrame(track);
    requestAnimationFrame(function () { ov.classList.add('is-on'); });   // fade the dim in
    setTimeout(function () {
      ov.classList.remove('is-on');                                     // fade it back out
      setTimeout(function () { if (ov.parentNode) ov.parentNode.removeChild(ov); }, 400);
    }, 2000);
  }

  // KPI tile labels are variants of the same metrics -- alias them to
  // one definition each so the glossary never drifts per surface.
  (function () {
    const g = METRIC_GLOSSARY_;
    g['total rung']   = g['rung'];
    g['total missed'] = g['missed'];
    g['% answered (rings)'] = 'Answered as a share of rings to agents (answered ÷ rung). '
      + 'One call can ring several agents and each ring counts once, so this is ring-level '

    g['total ttt']    = g['ttt'];
    g['avg att']      = g['att'];
    g['avg talk']     = g['att'];
  })();

  // Rich tooltip variants for high-value terms: a titled definition + an
  // optional benchmark chip surfacing the 92% / 5% company standards. Keys
  // match glossaryKeyFor_ output. Rendered via innerHTML (developer-authored
  // constants only -- never user data); terms without a rich entry fall back
  // to the plain-text METRIC_GLOSSARY_ definition. The plain title is still
  // set on the element for screen readers + the no-JS fallback.
  const METRIC_GLOSSARY_RICH_ = (function () {
    function tip(title, body, bench) {
      return '<span class="ds-tip-title">' + title + '</span>'
           + '<span>' + body + '</span>'
           + (bench ? '<span class="ds-tip-bench ' + bench.cls + '">' + bench.text + '</span>' : '');
    }
    const target92 = { cls: 'is-good', text: 'Company target ≥ 92%' };
    const thresh5  = { cls: 'is-warn', text: '5% or more in a day = violation' };
    const attNote  = { cls: '', text: 'Longer isn’t automatically worse — read with % answered' };
    const m = {};
    ['% answered', 'answer rate', 'answer rate %'].forEach(function (k) {
      m[k] = tip('% Answered', 'Answered calls as a share of calls offered.', target92);
    });
    m['% answered (rings)'] = tip('% Answered (rings)',
      'Answered as a share of rings to agents (answered ÷ rung). One call can ring '
      + 'several agents and each ring counts once — ring-level, not unique calls.', target92);
    ['abandoned %', 'aband. %', 'abandon rate %'].forEach(function (k) {
      m[k] = tip('Abandoned %', 'Share of queue calls where the caller hung up before being answered.', thresh5);

      'Days a queue’s abandoned % went over the threshold. Month-to-date in the totals row.', thresh5);
    ['att', 'avg att', 'avg talk', 'att (per call)', 'avg talk (per call)'].forEach(function (k) {
      m[k] = tip('Average Talk Time',
        'Per answered call (total talk ÷ calls answered). Days with no answered calls don’t drag it down.', attNote);

      'The simple mean of each day’s stored ATT (the My Department lens). The reports use the per-call '
      + 'weighted version, so the two can differ for the same range.', null);
    m['ttt'] = tip('Total Talk Time',
      'The sum of this agent’s own conversation time on answered calls inside the work window.', null);
