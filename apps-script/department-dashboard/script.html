   * agent list while keeping the existing dept and date range.
   * Also propagates the new selection back into the main form
   * picker so going Back shows the same checkboxes.
   */
  function irApplyEditPopover_() {
    const newAgents = irGetCheckedAgents_($('ir-edit-list'));
    if (!newAgents.length) return;
    irApplyCheckedAgents_($('ir-agent-list'), newAgents);
    irCloseEditPopover_();

    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    // Re-resolve the prior range so re-running from the edit
    // popover keeps the same Compare-with mode as the original
    // Generate. Silent on validation issues -- the original
    // form's Generate path is the place where errors surface.
    const prior = irResolvePriorRange_(from, to);

    const btn = $('ir-edit-apply-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    irSetResultsStatus('loading', 'Refreshing report…');

    const req = { department: dept, from: from, to: to, agents: newAgents };
    if (prior && !prior.error) { req.priorFrom = prior.from; req.priorTo = prior.to; }

    google.script.run
      .withSuccessHandler(function (data) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irSetResultsStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport(req);
  }

  function irActivateChartTab_() {
    const container = $('ir-chart-tabs');
    if (!container) return;
    container.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-tab') === irActiveChartTab;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
      p.style.display = p.getAttribute('data-panel') === irActiveChartTab ? '' : 'none';
    });
  }

  function irRenderSummary(summaryData, teamAvg) {
    const container = $('ir-summary-container');
    if (!container) return;
    const toolbar = $('ir-cards-toolbar');
    // Sort toolbar only makes sense with 2+ cards.
    if (toolbar) toolbar.style.display = (summaryData && summaryData.length > 1) ? '' : 'none';

    // Friendly empty state when no selected agent had any call
    // activity in range. Hides the trend chart trio too since it
    // would just be 12 months of zeros.
    const anyActivity = (summaryData || []).some(function (a) {
      return a.raw.rung > 0 || a.raw.answered > 0 || a.raw.missed > 0;
    });
    if (!anyActivity) {
      container.innerHTML =
        '<div class="ir-empty-card">'
        +   '<div class="ir-empty-icon">&#x1F4ED;</div>'
        +   '<div class="ir-empty-title">No call data for this selection</div>'
        +   '<div class="ir-empty-sub">No rung, answered, or missed calls for the selected '
        +     'agent(s) in this date range. Try broadening the date range or picking '
        +     'different agents.</div>'
        + '</div>';
      const charts = $('ir-charts-container');
      if (charts) charts.style.display = 'none';
      const toggle = $('ir-datalabels-box');
      if (toggle) toggle.style.display = 'none';
      const tabs = $('ir-chart-tabs');
      if (tabs) tabs.style.display = 'none';
      const sharedLegend = $('ir-shared-legend');
      if (sharedLegend) sharedLegend.style.display = 'none';
      return;
    }
    const charts = $('ir-charts-container');
    if (charts) charts.style.display = '';
    const toggle = $('ir-datalabels-box');
    if (toggle) toggle.style.display = '';
    const tabs = $('ir-chart-tabs');
    if (tabs) tabs.style.display = '';

    // KPI-tile layout per agent. Replaces the dense comparison
    // table from Phase 1 with a row of metric tiles (big number,
    // vs-team-avg delta badge, sparkline). Each tile's sparkline
    // is drawn inline from irLastData.trendData -- no extra Chart
    // instances created. Tiles per agent:
    //   Total Rung | Answered | Missed | % Answered | Avg Talk Time
    const priorStatsAvailable = !!(irLastData && irLastData.meta
                                   && irLastData.meta.priorFrom);
    container.innerHTML = irSortSummaryData_(summaryData || []).map(function (agent) {
      const trendForAgent = (irLastData && irLastData.trendData && irLastData.trendData.datasets)
                          ? (irLastData.trendData.datasets[agent.name] || [])
                          : [];
      const safeName = escapeHtml(agent.name);
      const share = agent.share || {};
      const pStats = agent.priorStats;   // may be null when no comparison
      const pRaw   = agent.priorRaw;
      // Render the vs-prior row only when the server supplied
      // priorStats. Pass per-metric formatted strings so the row
      // shows the same precision/unit as the team row.
      const priorRow = function (key, valence) {
        if (!pStats || !pRaw) return '';
        return irPriorRow_(pStats, pRaw[key], agent.raw[key], valence, pStats[key]);
      };
      // Excluded-from-team-avg pill (E4, Phase E). Surfaces when the
      // agent appears in TEAM_AVG_EXCLUDES[dept] so the manager sees
      // why their numbers don't move the team average. INV-26.
      const excludedPill = agent.excludedFromTeamAvg
        ? ' <span class="ir-excluded-pill" title="Per TEAM_AVG_EXCLUDES, this agent\'s numbers are subtracted from BOTH numerator and denominator of the team average (INV-26).">EXCLUDED FROM TEAM AVG</span>'
        : '';
      // Floater QUEUE chip (INV-53 expansion). Only floaters get a
      // chip on the IR card -- roster agents are implicit (no chip
      // would clutter the card). Bare QUEUE for floaters on no
      // roster, QUEUE · <home depts> for multi-rostered floaters.
      // Reuses sourceChipHtml_ from My Dept's Source column path.
      const isFloater = agent.matchedViaQueue && !agent.matchedViaRoster;
      const floaterPill = isFloater ? sourceChipHtml_(agent) : '';
      return '<div class="ir-summary-card">'
           +   '<div class="ir-summary-title">'
           +     safeName
           +     (floaterPill ? ' ' + floaterPill : '')
           +     excludedPill
           +     ' <span class="ir-vs">vs Team Avg'
           +       (priorStatsAvailable ? ' &middot; vs Prior period' : '')
           +     '</span>'
           +     ' <button type="button" class="ir-copy-tsv" data-agent="' + safeName + '">Copy data</button>'
           +   '</div>'
           +   irInsightsBlock_(agent.insights || [])
           +   '<div class="ir-kpi-grid">'
           +     irKpiTile('Total Rung',  agent.stats.rung,     teamAvg.rung,
                            irDiffBadge(agent.raw.rung,     teamAvg.raw.rung,        'pos'),
                            trendForAgent.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung,
                            share.rung,
                            priorRow('rung', 'pos'))
           +     irKpiTile('Answered',    agent.stats.answered, teamAvg.answered,
                            irDiffBadge(agent.raw.answered, teamAvg.raw.answered,    'pos'),
                            trendForAgent.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered,
                            share.answered,
                            priorRow('answered', 'pos'))
           +     irKpiTile('Missed',      agent.stats.missed,   teamAvg.missed,
                            irDiffBadge(agent.raw.missed,   teamAvg.raw.missed,      'neg'),
                            trendForAgent.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed,
                            share.missed,
                            priorRow('missed', 'neg'))
           +     irKpiTile('% Answered',  agent.stats.pct,      teamAvg.pct,
                            irDiffBadge(agent.raw.pct,      teamAvg.raw.pctAnswered, 'pos'),
                            trendForAgent.map(function (x) { return x.pct; }),      (THEME.accent || '#4E79A7'),
                            null,
                            priorRow('pct', 'pos'))
           +     irKpiTile('Avg Talk',    agent.stats.att,      teamAvg.att,
                            irAttCompare(agent.raw.att, teamAvg.raw.att),
                            trendForAgent.map(function (x) { return x.att; }),      (THEME.muted || '#9C755F'),
                            null,
                            priorRow('att', 'neu'))
           +   '</div>'
           + '</div>';
    }).join('');

    // Wire copy-data-as-TSV buttons (re-attaches every render; OK
    // since `container.innerHTML` wipes the previous handlers too).
    container.querySelectorAll('.ir-copy-tsv').forEach(function (b) {
      b.addEventListener('click', function () {
        // Build TSV from the card's KPI tiles: header + value rows.
        const card = b.closest('.ir-summary-card');
        if (!card) return;
        const rows = [];
        rows.push(['Metric', 'Agent', 'Team Avg', '% of Dept'].join('\t'));
        card.querySelectorAll('.ir-kpi-tile').forEach(function (tile) {
          const label = (tile.querySelector('.ir-kpi-label') || {}).textContent || '';
          const value = (tile.querySelector('.ir-kpi-value') || {}).textContent || '';
          const team  = (tile.querySelector('.ir-kpi-team')  || {}).textContent || '';
          const shareEl = tile.querySelector('.ir-kpi-share');
          const share = shareEl
            ? shareEl.textContent.replace(/\s*of\s+dept\s*$/i, '').trim()
            : '';
          rows.push([
            label.trim(),
            value.trim(),
            team.replace(/^Team\s*/i, '').trim(),
            share,
          ].join('\t'));
        });
        const tsv = rows.join('\n') + '\n';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(tsv).then(function () { irFlashButton(b, 'Copied'); });
        }
      });
    });
  }

  /**
   * Returns summaryData reordered per irSortOrder. "selection"
   * preserves the order the server sent (which mirrors the order
   * the user checked agents in the picker). Other keys sort by
   * the corresponding numeric field on each agent's raw stats.
   */
  function irSortSummaryData_(summaryData) {
    if (!Array.isArray(summaryData) || summaryData.length < 2) return summaryData;
    if (irSortOrder === 'selection') return summaryData;
    const out = summaryData.slice();
    if (irSortOrder === 'name') {
      out.sort(function (a, b) {
        const an = (a.name || '').toLowerCase();
        const bn = (b.name || '').toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      });
    } else if (irSortOrder === 'answered-desc') {
      out.sort(function (a, b) { return (b.raw.answered || 0) - (a.raw.answered || 0); });
    } else if (irSortOrder === 'answered-asc') {
      out.sort(function (a, b) { return (a.raw.answered || 0) - (b.raw.answered || 0); });
    } else if (irSortOrder === 'pct-desc') {
      out.sort(function (a, b) { return (b.raw.pct || 0) - (a.raw.pct || 0); });
    }
    return out;
  }

  /**
   * Single KPI tile markup. `sparklineData` is a numeric array;
   * `sparklineColor` is a hex. `share` is an optional pre-formatted
   * "X.X%" string -- when present (volume tiles only), shown as a
   * small "X.X% of dept" tag inline with the value to communicate
   * this agent's portion of the dept's total volume.
   */
  function irKpiTile(label, value, teamVal, diffBadgeHtml, sparklineData, sparklineColor, share, priorHtml) {
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    const shareHtml = share
      ? '<span class="ir-kpi-share" title="Share of dept volume in range">'
        + escapeHtml(String(share)) + ' of dept</span>'
      : '';
    return '<div class="ir-kpi-tile">'
         +   '<div class="ir-kpi-row-top">'
         +     '<div class="ir-kpi-label">' + label + '</div>'
         +     '<div class="ir-kpi-spark">' + spark + '</div>'
         +   '</div>'
         +   '<div class="ir-kpi-value-row">'
         +     '<div class="ir-kpi-value">' + escapeHtml(String(value)) + '</div>'
         +     shareHtml
         +   '</div>'
         +   '<div class="ir-kpi-row-bot">'
         +     '<span class="ir-kpi-team">Team ' + escapeHtml(String(teamVal)) + '</span>'
         +     diffBadgeHtml
         +   '</div>'
         +   (priorHtml || '')
         + '</div>';
  }

  /**
   * Per-tile "vs prior" delta line, rendered below the team-vs row
   * when summaryData.priorStats is present. Same valence model as
   * irDiffBadge: 'pos' = higher is better, 'neg' = lower is better,
   * 'neu' = direction-ambiguous (TTT/ATT). Returns empty string if
   * priorRaw is null/undefined.
   */
  function irPriorRow_(priorStats, priorVal, currVal, type, displayPrior) {
    if (!priorStats) return '';
    const prev = Number(priorVal) || 0;
    const cur  = Number(currVal)  || 0;
    if (prev === 0 && cur === 0) {
      return '<div class="ir-kpi-row-prior">'
           +   '<span class="ir-kpi-team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
           +   '<span class="ir-badge ir-badge-neu">-</span>'
           + '</div>';
    }
    let cls = 'ir-badge-neu';
    let label;
    if (type === 'neu') {
      // Direction-ambiguous metric (ATT / TTT). Show signed pct but
      // don't colorize as good/bad.
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    } else {
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
      if (type === 'pos') {
        if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
      } else if (type === 'neg') {
        if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
      }
    }
    return '<div class="ir-kpi-row-prior">'
         +   '<span class="ir-kpi-team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
         +   '<span class="ir-badge ' + cls + '">' + label + '</span>'
         + '</div>';
  }

  /**
   * Renders the per-agent insights callout. Each insight is an
   * object { type, text } where type is "positive" | "negative" |
   * "neutral" -- shown as a colored circular marker before the
   * text so managers can scan the list at a glance:
   *
   *   blue  up arrow   : favorable comparison (positive)
   *   orange down arrow: unfavorable comparison (negative)
   *   grey  bullet     : direction-ambiguous (neutral, e.g. ATT)
   *
   * Returns empty string when there are no insights so empty
   * callout boxes never appear.
   */
  function irInsightsBlock_(insights) {
    if (!insights || !insights.length) return '';
    const items = insights.map(function (item) {
      // Accept legacy v3 string-form for cache transition safety.
      const type = (item && item.type) || 'neutral';
      const text = (item && item.text)
        ? item.text
        : (typeof item === 'string' ? item : '');
      const mark = type === 'positive' ? '↑'    // up arrow
                 : type === 'negative' ? '↓'    // down arrow
                 : '•';                          // bullet
      return '<li class="ir-insight-item">'
           +   '<span class="ir-insight-mark ir-insight-mark-' + type + '" aria-hidden="true">'
           +     mark
           +   '</span>'
           +   '<span class="ir-insight-text">' + escapeHtml(text) + '</span>'
           + '</li>';
    }).join('');
    return '<div class="ir-insights">'
         +   '<div class="ir-insights-label">Insights</div>'
         +   '<ul class="ir-insights-list">' + items + '</ul>'
         + '</div>';
  }

  /**
   * Inline SVG sparkline (no Chart.js dependency, no extra Chart
   * instances). Returns the SVG markup as a string ready for
   * innerHTML. Renders a 70x22 stroke with subtle area fill below;
   * collapses to a flat baseline if all values are 0.
   */
  function irSparkline_(values, color) {
    const W = 70, H = 22;
    const n = (values || []).length;
    if (n < 2) {
      return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '"></svg>';
    }
    let min = Infinity, max = -Infinity;
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    if (!isFinite(min) || !isFinite(max)) { min = 0; max = 0; }
    const range = max - min;
    const xStep = W / (n - 1);
    const pad = 2;
    const innerH = H - pad * 2;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      const y = range === 0
        ? H / 2
        : pad + innerH - ((v - min) / range) * innerH;
      pts.push((i * xStep).toFixed(1) + ',' + y.toFixed(1));
    }
    const linePath = 'M' + pts.join(' L');
    const areaPath = linePath
                   + ' L' + ((n - 1) * xStep).toFixed(1) + ',' + H
                   + ' L0,' + H + ' Z';
    return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
         +   '<path d="' + areaPath + '" fill="' + color + '" fill-opacity="0.15" stroke="none"/>'
         +   '<path d="' + linePath + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
         + '</svg>';
  }

  function irFlashButton(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    setTimeout(function () { btn.textContent = prev; }, 1000);
  }

  function irDiffBadge(agentVal, teamVal, type) {
    // type: 'pos' = higher is better (Rung, Answered, % Answered).
    //       'neg' = lower is better (Missed).
    if (!teamVal) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentVal - teamVal) / teamVal) * 100;
    const label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    let cls = 'ir-badge-neu';
    if (type === 'pos') {
      if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
    } else if (type === 'neg') {
      if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
    }
    return '<span class="ir-badge ' + cls + '">' + label + '</span>';
  }

  function irAttCompare(agentAtt, teamAtt) {
    // ATT is reported as "> Avg / < Avg (+x.x%)" since neither
    // direction is unambiguously "better" -- shorter ATT can mean
    // efficiency, longer can mean more thorough service. Neutral
    // styling.
    if (!teamAtt) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentAtt - teamAtt) / teamAtt) * 100;
    const sign = agentAtt > teamAtt ? '> Avg' : '< Avg';
    return '<span class="ir-badge ir-badge-neu">'
         + sign + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(1) + '%)'
         + '</span>';
  }

  /**
   * Defensive cleanup: destroys any Chart.js instance currently
   * attached to the given canvas id, regardless of whether it's
   * tracked in our own *ChartInstances arrays. Necessary because
   * a previous render that crashed mid-construction may have
   * left an orphaned chart bound to the canvas, which Chart.js
   * refuses to overwrite ("Canvas is already in use").
   */
  function destroyOrphanedChartOnCanvas_(canvasId) {
    if (typeof Chart === 'undefined' || !Chart.getChart) return;
    const cvs = document.getElementById(canvasId);
    if (!cvs) return;
    try {
      const existing = Chart.getChart(cvs);
      if (existing) existing.destroy();
    } catch (e) { /* ignore */ }
  }

  function irRenderCharts(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late (slow CSS / font load) reach Chart.defaults
    // before the first chart is instantiated.
    refreshChartTheme();
    // Destroy old charts to avoid Chart.js leaks / canvas reuse errors.
    irChartInstances.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    irChartInstances = [];
    // Sweep up any orphans left by a partial-crash on the previous render.
    ['ir-vol-chart', 'ir-eff-chart', 'ir-dur-chart'].forEach(destroyOrphanedChartOnCanvas_);

    // Reveal every chart panel temporarily so each canvas has
    // non-zero dimensions at Chart.js instantiation time. Without
    // this, charts created in display:none panels come up 0x0 and
    // never recover when their tab is clicked. Restore visibility
    // at the end (active tab visible, others hidden).
    const irPanels = Array.prototype.slice.call(
      document.querySelectorAll('#ir-charts-container [data-panel]'));
    const irSavedDisplays = irPanels.map(function (p) { return p.style.display; });
    irPanels.forEach(function (p) { p.style.display = ''; });

    const showLabels = $('ir-show-datalabels') && $('ir-show-datalabels').checked;
    const labels   = data.trendData.labels || [];
    const datasets = data.trendData.datasets || {};
    const agents   = Object.keys(datasets);
    if (!agents.length) return;

    // Build dataset descriptors with a `hexColor` field; the chart
    // factory wires up gradient fill callbacks per-dataset against
    // that color (so single-agent views feel less spartan). The
    // `_irAgent` tag lets the shared comparison-mode legend find a
    // given agent's dataset across all three charts.
    const makeDs = function (label, vals, hex, opts) {
      const o = opts || {};
      return {
        label: label,
        data: vals,
        borderColor: hex,
        backgroundColor: hex,
        hexColor: hex,
        _irAgent: o.agent || null,
        tension: 0.4,
        fill: o.fill !== false,
        pointBackgroundColor: hex,
        pointBorderColor: THEME.paperCard,
        pointBorderWidth: 1.5,
        pointRadius: 3,
        pointHoverRadius: 5,
      };
    };

    // Volume chart: in individual mode show Rung/Answered/Missed for
    // the single agent; in comparison mode show each agent's Answered.
    const volData = [];
    if (data.mode === 'individual') {
      const d = datasets[agents[0]];
      volData.push(makeDs('Total Rung', d.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung));
      volData.push(makeDs('Answered',   d.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered));
      volData.push(makeDs('Missed',     d.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed));
    } else {
      agents.forEach(function (ag, i) {
        const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
        volData.push(makeDs(ag + ' (Ans)',
                            datasets[ag].map(function (x) { return x.answered; }),
                            color, { agent: ag }));
      });
    }
    irCreateChart($('ir-vol-chart'), 'Call Volume', labels, volData,
                  { isPercent: false, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Efficiency chart: % Answered per agent + a 95% goal line.
    const effData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' %',
                    datasets[ag].map(function (x) { return Number(x.pct.toFixed(1)); }),
                    color, { agent: ag });
    });
    effData.push({
      label: 'Goal', data: new Array(labels.length).fill(95),
      borderColor: THEME.muted, borderDash: [4, 4], pointRadius: 0,
      fill: false, tension: 0, hexColor: THEME.muted, _irAgent: null,
    });
    irCreateChart($('ir-eff-chart'), '% Answered', labels, effData,
                  { isPercent: true, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Duration chart: ATT in minutes (legacy converts seconds -> minutes).
    const durData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' ATT',
                    datasets[ag].map(function (x) { return Number((x.att / 60).toFixed(2)); }),
                    color, { agent: ag });
    });
    irCreateChart($('ir-dur-chart'), 'Avg Talk Time', labels, durData,
                  { isPercent: false, isTimeMinutes: true, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    irRenderSharedLegend(data, agents);

    // Restore panel visibility so only the active tab shows. The
    // charts in the just-hidden panels keep their layout state
    // (computed during the brief reveal above) and re-paint
    // correctly when their tab is clicked.
    irPanels.forEach(function (p, i) { p.style.display = irSavedDisplays[i]; });
  }

  /**
   * Single legend rendered ABOVE the chart-tab container in
   * comparison mode (>1 agent). Clicking a chip toggles that
   * agent's series visibility across all three charts; hovering
   * highlights it across all three.
   *
   * In individual mode the shared legend is hidden -- the volume
   * chart's three series (Rung/Answered/Missed) are unambiguous
   * via their colored title legend within the chart itself, and
   * Eff/Dur each have a single series.
   */
  function irRenderSharedLegend(data, agents) {
    const el = $('ir-shared-legend');
    if (!el) return;
    if (data.mode !== 'comparison' || !agents.length) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    const chips = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      const safe = escapeHtml(ag);
      return '<button type="button" class="ir-legend-chip" data-agent="' + safe + '" '
           + 'style="--chip-color: ' + color + ';">'
           +   '<span class="ir-legend-swatch"></span>'
           +   '<span class="ir-legend-name">' + safe + '</span>'
           + '</button>';
    }).join('');
    el.innerHTML = chips;
    el.style.display = '';

    el.querySelectorAll('.ir-legend-chip').forEach(function (chip) {
      const agent = chip.getAttribute('data-agent');
      chip.addEventListener('click', function () {
        const willHide = !chip.classList.contains('inactive');
        chip.classList.toggle('inactive', willHide);
        irChartInstances.forEach(function (chart) {
          chart.data.datasets.forEach(function (ds, idx) {
            if (ds._irAgent === agent) {
              chart.getDatasetMeta(idx).hidden = willHide;
            }
          });
          chart.update();
        });
      });
      // Hover: dim the OTHER agents' series across all charts to
      // emphasize the hovered one. Restore on mouseleave.
      chip.addEventListener('mouseenter', function () { irHighlightAgent_(agent); });
      chip.addEventListener('mouseleave', function () { irHighlightAgent_(null); });
    });
  }

  function irHighlightAgent_(agent) {
    irChartInstances.forEach(function (chart) {
      chart.data.datasets.forEach(function (ds) {
        if (ds._irAgent && ds.hexColor) {
          // Faded if a specific agent is highlighted and this isn't them.
          const dim = (agent !== null && ds._irAgent !== agent);
          ds.borderColor = dim ? ds.hexColor + '33' : ds.hexColor;
          ds.borderWidth = dim ? 1 : (agent && ds._irAgent === agent ? 3 : 2);
        }
      });
      chart.update('none');
    });
  }

  function irCreateChart(canvas, title, labels, datasets, opts) {
    if (!canvas) return;
    const isPercent      = !!opts.isPercent;
    const isTimeMinutes  = !!opts.isTimeMinutes;
    const showLabels     = !!opts.showLabels;
    let globalMax = 0;
    datasets.forEach(function (ds) {
      if (!ds.data) return;
      ds.data.forEach(function (v) {
        const n = parseFloat(v) || 0;
        if (n > globalMax) globalMax = n;
      });
    });
    const suggestedMax = globalMax > 0 ? globalMax * 1.1 : 1;

    // Per-chart plugin registration (rather than Chart.register'ing
    // globally) so the existing Missed Calls bar chart isn't affected
    // by data labels. Falls back gracefully if the CDN didn't load.
    const irPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    // Replace each dataset's `backgroundColor` with a function that
    // returns a vertical gradient (line color -> transparent) once
    // the chart's chartArea exists. Skip if `fill: false` is set.
    datasets.forEach(function (ds) {
      if (ds.fill === false || !ds.hexColor) return;
      const hex = ds.hexColor;
      ds.backgroundColor = function (ctx) {
        return irGradientFill_(ctx.chart, hex);
      };
    });

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: irPlugins,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        devicePixelRatio: 1,
        plugins: {
          title:   { display: true, text: title },
          legend:  {
            display: !opts.sharedLegend,
            position: 'bottom',
            labels: { boxWidth: 10 },
          },
          datalabels: {
            display: showLabels,
            align: 'top', anchor: 'center',
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) { return ctx.dataset.borderColor; },
            borderWidth: 1, borderRadius: 2,
            color: function (ctx) { return ctx.dataset.borderColor; },
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value, ctx) {
              if (ctx.dataset.label === 'Goal') return '';
              if (!value || value == 0) return '';
              if (isTimeMinutes) return irFormatMinutes(value);
              if (isPercent)     return parseFloat(value).toFixed(1) + '%';
              return value;
            },
          },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                let l = ctx.dataset.label || '';
                if (l) l += ': ';
                if (isTimeMinutes) return l + irFormatMinutes(ctx.parsed.y);
                if (isPercent)     return l + ctx.parsed.y + '%';
                return l + ctx.parsed.y;
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: suggestedMax,
            grid: { borderDash: [5, 5] },
            ticks: {
              callback: function (val) {
                if (isPercent)     return val + '%';
                if (isTimeMinutes) return irFormatMinutes(val);
                return val;
              },
            },
          },
          x: { grid: { borderDash: [5, 5] } },
        },
      },
    });
    irChartInstances.push(chart);
  }

  function irFormatMinutes(val) {
    if (val == null) return '';
    const n = parseFloat(val);
    if (isNaN(n)) return '';
    const m = Math.floor(n);
    const s = Math.round((n - m) * 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  // Image-export helpers. Both Copy and Email pass through
  // html2canvas; the only difference is the destination of the
  // resulting data URL.

  function irBuildCanvas(onDone) {
    const root = $('individual-results');
    if (!root) return;

    // Temporarily reveal every chart panel and resize its Chart.js
    // instance so the canvas has rendered pixels before we read it.
    // Hidden panels (the inactive tabs) leave their canvases at 0x0
    // -- toDataURL on those returns a blank PNG, which was showing
    // up as empty chart slots in the exported image / email.
    const panels = root.querySelectorAll('#ir-charts-container [data-panel]');
    const savedDisplays = [];
    panels.forEach(function (p) {
      savedDisplays.push(p.style.display);
      p.style.display = '';
    });
    irChartInstances.forEach(function (c) { c.resize(); });

    // Two rAFs: one for Chart.js's internal re-layout to settle,
    // one for the browser to actually paint the resized canvas.
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });

      // Restore tab visibility before html2canvas snapshots the
      // live DOM. onclone re-reveals all panels in the cloned doc
      // and swaps each canvas for the captured PNG so the export
      // includes all three charts regardless of which tab is
      // currently visible on screen.
      panels.forEach(function (p, i) { p.style.display = savedDisplays[i]; });
      irChartInstances.forEach(function (c) { c.resize(); });

      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.getElementById('ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const toggle = clonedDoc.getElementById('ir-datalabels-box');
          if (toggle) toggle.style.display = 'none';
          const tabs = clonedDoc.getElementById('ir-chart-tabs');
          if (tabs) tabs.style.display = 'none';
          const cardsToolbar = clonedDoc.getElementById('ir-cards-toolbar');
          if (cardsToolbar) cardsToolbar.style.display = 'none';
          const editPop = clonedDoc.getElementById('ir-edit-popover');
          if (editPop) editPop.style.display = 'none';
          const editLine = clonedDoc.querySelector('.ir-editing-edit');
          if (editLine) editLine.style.display = 'none';
          clonedDoc.querySelectorAll('.ir-copy-tsv').forEach(function (b) { b.style.display = 'none'; });
          const status = clonedDoc.getElementById('ir-results-status');
          if (status) status.style.display = 'none';

          // In the tabbed UI only the active chart panel is visible,
          // but a captured image should include all three. Force all
          // panels visible in the clone and lay them out stacked.
          clonedDoc.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
            p.style.display = '';
            p.style.marginBottom = '14px';
          });

          // Replace each <canvas> in the clone with an <img> of the
          // pre-captured PNG. Avoids the "blank chart" problem where
          // Chart.js has nothing to draw on in the detached clone.
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  /**
   * Transient feedback on the Export button while a copy/email
   * is in flight. Saves the original label, swaps it, restores
   * after `holdMs` (or immediately if `holdMs` is 0).
   */
  function irExportBtnFeedback_(label, holdMs) {
    const btn = $('ir-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) {
      setTimeout(function () {
        btn.innerHTML = btn.dataset.label;
        btn.disabled = false;
      }, holdMs);
    }
    return function restore() {
      btn.innerHTML = btn.dataset.label;
      btn.disabled = false;
    };
  }

  function irCopyImage() {
    const restore = irExportBtnFeedback_('Capturing…', 0);
    irBuildCanvas(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              restore();
              irExportBtnFeedback_('Copied!', 1200);
            }, function (err) {
              irSetResultsStatus('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              restore();
            });
        } else {
          irSetResultsStatus('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  function irEmailImage() {
    const restore = irExportBtnFeedback_('Capturing…', 0);
    irBuildCanvas(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      irExportBtnFeedback_('Sending…', 0);
      google.script.run
        .withSuccessHandler(function (res) {
          restore();
          irExportBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
          showToast('Report emailed to ' + (res && res.to ? res.to : 'you'), 'success');
        })
        .withFailureHandler(function (err) {
          irSetResultsStatus('error', 'Email failed: ' + (err && err.message ? err.message : err));
          showToast('Email failed', 'error');
          restore();
        })
        .sendIndividualReportEmail({
          imageBase64: dataUrl,
          dateLabel: irLastData && irLastData.dateLabel ? irLastData.dateLabel : '',
        });
    });
  }

  // -- Performance Report modal ----------------------------------------
  // Dept-level summary that compares the selected range against an
  // immediately-preceding prior period of the same length, plus a
  // per-agent breakdown and three charts (Share of Answered pie,
  // Volume & Efficiency stacked bars, 12-month Answered trend line).
  // Picker UX mirrors Individual Report (search + active/inactive
  // grouping); export menu wires to the same html2canvas-based
  // image capture pattern.

  let prLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
  let prLastData = null;
  let prActiveFetchTimer = null;
  let prChartInstances = [];
  // Sort + sub-tab state, persisted via localStorage so opening
  // the modal a second time picks up where the user left off.
  let prSortKey = 'answered';
  let prSortDir = 'desc';
  let prActiveTrendMetric = 'answered';
  // localStorage keys collected so the prefs helpers stay close to
  // their consumers.
  const PR_PREFS_KEY = 'cdr.pr.prefs.v1';

  function initPerformanceReport() {
    const btn = $('performance-report-btn');
    const modal = $('performance-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      showPrForm();
      ensurePrRoster();
      prUpdatePriorHint_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Form wiring.
    const preset = $('pr-preset');
    if (preset) preset.addEventListener('change', applyPrPreset);

    const fromEl = $('pr-from');
    const toEl   = $('pr-to');
    if (fromEl) fromEl.addEventListener('change', function () {
      resetPrPreset(); prUpdatePriorHint_(); schedulePrActiveAgentRefetch_();
    });
    if (toEl) toEl.addEventListener('change', function () {
      resetPrPreset(); prUpdatePriorHint_(); schedulePrActiveAgentRefetch_();
    });

    // Compare-with dropdown: toggles the custom prior date inputs.
    const compareMode = $('pr-compare-mode');
    if (compareMode) compareMode.addEventListener('change', function () {
      prApplyCompareMode_();
      prUpdatePriorHint_();
    });
    const priorFromEl = $('pr-prior-from');
    const priorToEl   = $('pr-prior-to');
    if (priorFromEl) priorFromEl.addEventListener('change', prUpdatePriorHint_);
    if (priorToEl)   priorToEl.addEventListener('change',   prUpdatePriorHint_);

    const selAll  = $('pr-select-all');
    const selNone = $('pr-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); prToggleAgents_(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); prToggleAgents_(false); });

    const search = $('pr-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('pr-agent-list'), search.value);
    });

    const genBtn = $('pr-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runPrReport);

    const backBtn = $('pr-back-btn');
    if (backBtn) backBtn.addEventListener('click', showPrForm);

    // Data-labels toggle: re-renders all three charts in place.
    const labelToggle = $('pr-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      prSavePrefs_();
      if (prLastData) prRenderCharts_(prLastData);
    });

    // Trend sub-tabs: switch the metric shown on the 12-month
    // trend line chart (Answered / % Answered / Avg Talk Time).
    const trendTabs = $('pr-trend-subtabs');
    if (trendTabs) trendTabs.addEventListener('click', function (e) {
      const tab = e.target.closest('.pr-trend-subtab');
      if (!tab) return;
      prActiveTrendMetric = tab.getAttribute('data-metric') || 'answered';
      trendTabs.querySelectorAll('.pr-trend-subtab').forEach(function (b) {
        const active = b === tab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      prSavePrefs_();
      if (prLastData) prRenderTrendChart_(prLastData);
    });

    // Chart-tab wiring (shared CSS but separate elements).
    const tabContainer = $('pr-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      const which = tab.getAttribute('data-tab');
      tabContainer.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b.getAttribute('data-tab') === which;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.querySelectorAll('#pr-charts-container [data-panel]').forEach(function (p) {
        p.style.display = p.getAttribute('data-panel') === which ? '' : 'none';
      });
      prChartInstances.forEach(function (c) { c.resize(); });
    });

    // Export dropdown -- same pattern as Individual Report.
    const exportBtn  = $('pr-export-btn');
    const exportMenu = $('pr-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        prSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        prSetExportMenuOpen_(false);
        if (action === 'copy')  prCopyImage_();
        else if (action === 'email') prEmailImage_();
        else if (action === 'print') prPrint_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        prSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          prSetExportMenuOpen_(false);
        }
      });
    }

    setPrDefaultDates();
    // Restore last-used form state if any (preset, dates, prior
    // mode + custom prior, agents, show-labels, trend sub-tab).
    prRestorePrefs_();
  }

  function setPrDefaultDates() {
    const today = new Date();
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('pr-from')) $('pr-from').value = isoOf(first);
    if ($('pr-to'))   $('pr-to').value   = isoOf(today);
  }

  function showPrForm() {
    $('performance-form').style.display = '';
    $('performance-results').style.display = 'none';
    prSetFormError('');
  }
  function showPrResults() {
    $('performance-form').style.display = 'none';
    $('performance-results').style.display = '';
  }

  function prSetFormError(msg) {
    const el = $('pr-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg;
    el.style.display = '';
  }

  function prSetResultsStatus(kind, msg) {
    const el = $('pr-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function applyPrPreset() {
    const v = $('pr-preset').value;
    if (v === 'custom') return;
    const today = new Date();
    let s, e;
    e = new Date(today);
    if (v === 'thisMonth')        { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')   { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                     e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last30')      { s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months') { s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')    { s = new Date(today.getFullYear() - 1, 0, 1);
                                     e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    $('pr-from').value = isoOf(s);
    $('pr-to').value   = isoOf(e);
    prUpdatePriorHint_();
    schedulePrActiveAgentRefetch_();
  }
  function resetPrPreset() {
    const p = $('pr-preset');
    if (p) p.value = 'custom';
  }

  /**
   * Renders an inline hint on the form showing the prior period
   * that the report will compare against, so the user understands
   * what "vs prior" means before they generate. Handles both auto
   * (same-duration-immediately-preceding) and custom (user-picked)
   * prior ranges.
   */
  function prUpdatePriorHint_() {
    const el = $('pr-prior-hint');
    if (!el) return;
    const from = $('pr-from').value;
    const to   = $('pr-to').value;
    if (!from || !to || from > to) { el.textContent = ''; return; }
    const mode = $('pr-compare-mode') ? $('pr-compare-mode').value : 'auto';
    const fmt = function (d) {
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    };
    if (mode === 'custom') {
      const pf = $('pr-prior-from').value;
      const pt = $('pr-prior-to').value;
      if (!pf || !pt) {
        el.textContent = 'Pick prior start and end dates to define the comparison baseline.';
        return;
      }
      if (pf > pt) {
        el.textContent = 'Prior start must be on or before prior end.';
        return;
      }
      el.textContent = 'Will compare against your custom prior range ('
                     + fmt(new Date(pf + 'T12:00:00')) + ' – '
                     + fmt(new Date(pt + 'T12:00:00')) + ').';
      return;
    }
    const start = new Date(from + 'T12:00:00');
    const end   = new Date(to   + 'T12:00:00');
    const days  = Math.floor((end - start) / 86400000);
    const priorEnd   = new Date(start.getTime() - 86400000);
    const priorStart = new Date(priorEnd.getTime() - days * 86400000);
    el.textContent = 'Will compare against the immediately-preceding '
                   + (days + 1) + ' days ('
                   + fmt(priorStart) + ' – ' + fmt(priorEnd) + ').';
  }

  /**
   * Toggles the visibility of the custom prior date inputs based
   * on the compare-mode dropdown. When switching to custom for
   * the first time in a session, prefill the prior dates with the
   * auto-computed window so the user has a sensible starting
   * point.
   */
  function prApplyCompareMode_() {
    const mode = $('pr-compare-mode') ? $('pr-compare-mode').value : 'auto';
    const wrapFrom = $('pr-prior-from-wrap');
    const wrapTo   = $('pr-prior-to-wrap');
    const show = (mode === 'custom');
    if (wrapFrom) wrapFrom.style.display = show ? '' : 'none';
    if (wrapTo)   wrapTo.style.display   = show ? '' : 'none';

    if (show) {
      // Prefill with auto-computed prior if blank, so the user
      // starts from a meaningful baseline rather than empty fields.
      const pf = $('pr-prior-from');
      const pt = $('pr-prior-to');
      if (pf && pt && (!pf.value || !pt.value)) {
        const from = $('pr-from').value;
        const to   = $('pr-to').value;
        if (from && to && from <= to) {
          const start = new Date(from + 'T12:00:00');
          const end   = new Date(to   + 'T12:00:00');
          const days  = Math.floor((end - start) / 86400000);
          const priorEnd   = new Date(start.getTime() - 86400000);
          const priorStart = new Date(priorEnd.getTime() - days * 86400000);
          const isoOf = function (d) {
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return d.getFullYear() + '-' + m + '-' + day;
          };
          if (!pf.value) pf.value = isoOf(priorStart);
          if (!pt.value) pt.value = isoOf(priorEnd);
        }
      }
    }
    prSavePrefs_();
  }

  /**
   * Persists the user's form state to localStorage so the next
   * modal open picks up where they left off. Best-effort: silent
   * on storage failures (private mode, quota exceeded, etc.).
   */
  function prSavePrefs_() {
    try {
      const prefs = {
        preset:    $('pr-preset').value,
        from:      $('pr-from').value,
        to:        $('pr-to').value,
        mode:      $('pr-compare-mode') ? $('pr-compare-mode').value : 'auto',
        priorFrom: $('pr-prior-from') ? $('pr-prior-from').value : '',
        priorTo:   $('pr-prior-to')   ? $('pr-prior-to').value   : '',
        agents:    irGetCheckedAgents_($('pr-agent-list')),
        showLabels: $('pr-show-datalabels') ? $('pr-show-datalabels').checked : true,
        trendMetric: prActiveTrendMetric,
        sortKey:   prSortKey,
        sortDir:   prSortDir,
      };
      localStorage.setItem(PR_PREFS_KEY, JSON.stringify(prefs));
    } catch (e) { /* ignore */ }
  }

  function prRestorePrefs_() {
    let prefs;
    try {
      const raw = localStorage.getItem(PR_PREFS_KEY);
      if (!raw) return;
      prefs = JSON.parse(raw);
    } catch (e) { return; }
    if (!prefs || typeof prefs !== 'object') return;

    if (prefs.preset && $('pr-preset')) $('pr-preset').value = prefs.preset;
    if (prefs.from   && $('pr-from'))   $('pr-from').value   = prefs.from;
    if (prefs.to     && $('pr-to'))     $('pr-to').value     = prefs.to;
    if (prefs.mode   && $('pr-compare-mode')) $('pr-compare-mode').value = prefs.mode;
    if (prefs.priorFrom && $('pr-prior-from')) $('pr-prior-from').value = prefs.priorFrom;
    if (prefs.priorTo   && $('pr-prior-to'))   $('pr-prior-to').value   = prefs.priorTo;
    if (typeof prefs.showLabels === 'boolean' && $('pr-show-datalabels')) {
      $('pr-show-datalabels').checked = prefs.showLabels;
    }
    if (prefs.trendMetric) prActiveTrendMetric = prefs.trendMetric;
    if (prefs.sortKey) prSortKey = prefs.sortKey;
    if (prefs.sortDir) prSortDir = prefs.sortDir;

    prApplyCompareMode_();
    prUpdatePriorHint_();
    // Sync the trend sub-tab active state to the restored metric.
    const tabs = $('pr-trend-subtabs');
    if (tabs) tabs.querySelectorAll('.pr-trend-subtab').forEach(function (b) {
      const active = b.getAttribute('data-metric') === prActiveTrendMetric;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    // Stash agents so we can pre-check the boxes once the roster
    // list finishes rendering.
    if (Array.isArray(prefs.agents) && prefs.agents.length) {
      prPendingAgentSelection_ = prefs.agents;
    }
  }
  // Holds an agent list to apply once the picker renders. Cleared
  // after apply so it doesn't override later renders.
  let prPendingAgentSelection_ = null;
  let prListChangeHandler_ = null;

  // ── Roster fetch + render (mirrors Individual Report) ──────────────
  function ensurePrRoster() {
    const dept = getRequestedDept();
    if (!dept) {
      $('pr-agent-loader').textContent = 'No department selected.';
      $('pr-agent-list').style.display = 'none';
      return;
    }
    const from = $('pr-from').value;
    const to   = $('pr-to').value;
    const rangeKey = from + '|' + to;

    if (prLastRoster.dept === dept && prLastRoster.agents.length
        && prLastRoster.rangeKey === rangeKey) {
      renderPrAgentList(prLastRoster.agents, prLastRoster.activeAgents, prLastRoster.activeFloaters);
      return;
    }
    $('pr-agent-loader').style.display = '';
    $('pr-agent-list').style.display = 'none';
    $('pr-generate-btn').disabled = true;

    google.script.run
      .withSuccessHandler(function (data) {
        prLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        renderPrAgentList(prLastRoster.agents, prLastRoster.activeAgents, prLastRoster.activeFloaters);
      })
      .withFailureHandler(function (err) {
        $('pr-agent-loader').textContent = 'Error loading roster: '
          + (err && err.message ? err.message : String(err));
      })
      .getPerformanceReportInit({ department: dept, from: from, to: to });
  }

  function schedulePrActiveAgentRefetch_() {
    if (prActiveFetchTimer) clearTimeout(prActiveFetchTimer);
    prActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept();
      if (!dept) return;
      const from = $('pr-from').value;
      const to   = $('pr-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (prLastRoster.dept === dept && prLastRoster.rangeKey === rangeKey) return;

      google.script.run
        .withSuccessHandler(function (data) {
          prLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          prLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          prLastRoster.rangeKey = rangeKey;
          const checked = irGetCheckedAgents_($('pr-agent-list'));
          renderPrAgentList(prLastRoster.agents, prLastRoster.activeAgents, prLastRoster.activeFloaters);
          irApplyCheckedAgents_($('pr-agent-list'), checked);
          prUpdateGenerateEnabled_();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getPerformanceReportInit({ department: dept, from: from, to: to });
    }, 350);
  }

  function renderPrAgentList(agents, activeAgents, activeFloaters) {
    const list = $('pr-agent-list');
    $('pr-agent-loader').style.display = 'none';
    if (!agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = '';
      $('pr-generate-btn').disabled = true;
      return;
    }
    list.innerHTML = irBuildAgentListHtml_(agents, activeAgents, activeFloaters);
    list.style.display = '';
    if (prListChangeHandler_) list.removeEventListener('change', prListChangeHandler_);
    prListChangeHandler_ = function () {
      prUpdateGenerateEnabled_();
      prSavePrefs_();
    };
    list.addEventListener('change', prListChangeHandler_);
    // Apply any pending selection from restored prefs once.
    if (prPendingAgentSelection_) {
      irApplyCheckedAgents_(list, prPendingAgentSelection_);
      prPendingAgentSelection_ = null;
    }
    prUpdateGenerateEnabled_();
  }

  function prUpdateGenerateEnabled_() {
    const boxes = $('pr-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('pr-generate-btn').disabled = boxes.length === 0;
  }

  function prToggleAgents_(checked) {
    selectAllActiveAgents_($('pr-agent-list'), checked);
    prUpdateGenerateEnabled_();
    // selectAllActiveAgents_ flips cb.checked programmatically,
    // which does NOT fire 'change' on the list -- so the
    // change-listener-driven prSavePrefs_ never runs. Explicit
    // call here so the new selection actually persists.
    prSavePrefs_();
  }

  // ── Run + render ────────────────────────────────────────────────────
  function runPrReport() {
    prSetFormError('');
    const dept = getRequestedDept();
    const from = $('pr-from').value;
    const to   = $('pr-to').value;
    if (!from || !to) { prSetFormError('Pick a start and end date.'); return; }
    if (from > to)    { prSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('pr-agent-list'));
    if (!agents.length) { prSetFormError('Select at least one agent.'); return; }

    // Custom prior range -- send only if mode is custom and both
    // dates are valid. The server fills in the auto window when
    // these are absent.
    const mode = $('pr-compare-mode') ? $('pr-compare-mode').value : 'auto';
    const req = { department: dept, from: from, to: to, agents: agents };
    if (mode === 'custom') {
      const pf = $('pr-prior-from').value;
      const pt = $('pr-prior-to').value;
      if (!pf || !pt) { prSetFormError('Pick a custom prior start and end date.'); return; }
      if (pf > pt)    { prSetFormError('Custom prior start must be on or before prior end.'); return; }
      req.priorFrom = pf;
      req.priorTo   = pt;
    }
    prSavePrefs_();

    const btn = $('pr-generate-btn');
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = 'Loading…';

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        prRenderReport_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        prSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getPerformanceReport(req);
  }

  function prRenderReport_(data) {
    prLastData = data;
    // Side-by-side date pair instead of inline (date)+below line.
    if ($('pr-current-date')) $('pr-current-date').textContent = data.dateLabel || '';
    if ($('pr-prior-date'))   $('pr-prior-date').textContent   = data.priorDateLabel || '';
    if ($('pr-prior-label')) {
      $('pr-prior-label').textContent = (data.meta && data.meta.priorIsCustom)
        ? 'vs Custom Prior'
        : 'vs Prior';
    }
    showPrResults();
    prSetResultsStatus('');
    prResetTabs_();
    prRenderSubsetHint_(data.meta);
    prRenderTeamInsights_(data.teamInsights);
    prRenderKpis_(data.teamStats, data.trendData);
    prRenderAgentTable_(data.agentData);
    prRenderCharts_(data);
  }

  /**
   * Subtle banner when the user picked only a subset of the dept
   * roster. Prevents the "why are my totals low?" confusion --
   * makes it explicit that the report reflects selection, not the
   * full dept.
   */
  function prRenderSubsetHint_(meta) {
    const el = $('pr-subset-hint');
    if (!el || !meta) return;
    const selected = (meta.agents || []).length;
    const rosterSize = meta.rosterSize || 0;
    if (rosterSize === 0 || selected >= rosterSize) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.textContent = 'Showing ' + selected + ' of ' + rosterSize
                   + ' dept agents. Totals reflect this selection only.';
    el.style.display = '';
  }

  /**
   * Team insights callout: server-side rules render up to 3 short
   * observations about the team's current vs prior period. Reuses
   * the Individual Report's irInsightsBlock_ HTML helper since the
   * insight shape is identical (`{ type, text }`).
   */
  function prRenderTeamInsights_(insights) {
    const host = $('pr-team-insights');
    if (!host) return;
    if (!insights || !insights.length) {
      host.innerHTML = '';
      return;
    }
    host.innerHTML = irInsightsBlock_(insights)
      // Subtle override: the IR callout label says "Insights" --
      // for PR we want "Team insights" to disambiguate from the
      // per-agent insights users see on the Individual Report.
      .replace('<div class="ir-insights-label">Insights</div>',
               '<div class="ir-insights-label">Team insights</div>');
  }

  function prResetTabs_() {
    const container = $('pr-chart-tabs');
    if (!container) return;
    container.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-tab') === 'share';
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#pr-charts-container [data-panel]').forEach(function (p) {
      p.style.display = p.getAttribute('data-panel') === 'share' ? '' : 'none';
    });
  }

  /**
   * Renders the 6 KPI tiles: Rung, Missed, Answered, % Answered,
   * TTT, ATT -- each with current value, delta vs prior, and an
   * inline 12-month sparkline from the trend series. Delta color
   * semantics:
   *   - Rung / Answered / % Answered: above = positive (blue)
   *   - Missed: above = negative (orange)
   *   - TTT / ATT: neutral (longer can be thorough or slow)
   */
  function prRenderKpis_(teamStats, trendData) {
    const t = teamStats || {};
    const series = (trendData && trendData.series) || [];
    const sparks = {
      rung:     series.map(function (s) { return s.rung; }),
      missed:   series.map(function (s) { return s.missed; }),
      answered: series.map(function (s) { return s.answered; }),
      pct:      series.map(function (s) { return s.pct; }),
      ttt:      series.map(function (s) { return s.ttt; }),
      att:      series.map(function (s) { return s.att; }),
    };
    const tiles = [
      prKpiTile_('Total Rung',  t.rung,     'pos', sparks.rung,     IR_VOLUME_COLORS.rung),
      prKpiTile_('Total Missed',t.missed,   'neg', sparks.missed,   IR_VOLUME_COLORS.missed),
      prKpiTile_('Answered',    t.answered, 'pos', sparks.answered, IR_VOLUME_COLORS.answered),
      prKpiTile_('% Answered',  t.pct,      'pos', sparks.pct,      (THEME.accent || '#4E79A7')),
      prKpiTile_('Total TTT',   t.ttt,      'neu', sparks.ttt,      (THEME.muted  || '#9C755F')),
      prKpiTile_('Avg ATT',     t.att,      'neu', sparks.att,      (THEME.muted  || '#9C755F')),
    ].join('');
    $('pr-kpi-row').innerHTML = tiles;
  }

  function prKpiTile_(label, stat, valenceDirection, sparklineData, sparklineColor) {
    const s = stat || { formatted: '-', deltaPct: 0, type: 'volume' };
    const isPctType = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    let badge;
    if (Math.abs(dp) < 0.05) {
      badge = '<span class="pr-delta pr-delta-neu">no change</span>';
    } else {
      let cls = 'pr-delta-neu';
      if (valenceDirection === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
      else if (valenceDirection === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = isPctType ? ' pts' : '%';
      badge = '<span class="pr-delta ' + cls + '">'
            +   '<span class="pr-delta-arrow">' + arrow + '</span> ' + Math.abs(dp).toFixed(1) + suffix
            + '</span>';
    }
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    return '<div class="pr-kpi-tile">'
         +   '<div class="pr-kpi-row-top">'
         +     '<div class="pr-kpi-label">' + label + '</div>'
         +     '<div class="pr-kpi-spark">' + spark + '</div>'
         +   '</div>'
         +   '<div class="pr-kpi-value">' + escapeHtml(String(s.formatted)) + '</div>'
         +   '<div class="pr-kpi-delta">' + badge + ' <span class="pr-delta-cap">vs prior</span></div>'
         + '</div>';
  }

  /**
   * Per-agent table with sortable column headers + a per-agent
   * share-of-team-answered column. Click a header to toggle sort
   * direction; arrows in the header indicate current sort key.
   */
  function prRenderAgentTable_(agentData) {
    const teamAnswered = (agentData || []).reduce(function (a, b) {
      return a + (b.raw.answered || 0);
    }, 0);
    const cols = [
      { key: 'name',     label: 'Agent',      isNum: false },
      { key: 'rung',     label: 'Rung',       isNum: true },
      { key: 'missed',   label: 'Missed',     isNum: true },
      { key: 'answered', label: 'Answered',   isNum: true },
      { key: 'share',    label: 'Share',      isNum: true,
        title: 'This agent\'s share of total Answered calls across the selected team.' },
      { key: 'pct',      label: '% Answered', isNum: true },
      { key: 'ttt',      label: 'TTT',        isNum: true },
      { key: 'att',      label: 'ATT',        isNum: true },
    ];
    const sorted = prSortAgentData_(agentData || []);

    const head = cols.map(function (c) {
      const arrow = (prSortKey === c.key)
        ? (prSortDir === 'asc' ? ' &#9650;' : ' &#9660;')
        : '';
      const titleAttr = c.title ? ' title="' + escapeHtml(c.title) + '"' : '';
      return '<th class="pr-th-sortable' + (c.isNum ? ' num' : '') + '"'
           + ' data-sort-key="' + c.key + '"' + titleAttr + '>'
           +   escapeHtml(c.label) + arrow
           + '</th>';
    }).join('');

    const rows = sorted.map(function (a) {
      const share = teamAnswered > 0
        ? ((a.raw.answered / teamAnswered) * 100).toFixed(1) + '%'
        : '-';
      // INV-53 floater chip: floaters appear in the table but are
      // excluded from the team-avg numerator + denominator. Surface
      // the QUEUE chip next to the name so the row's exclusion is
      // visible to the manager reading the report.
      const isFloater = a.matchedViaQueue && !a.matchedViaRoster;
      const floaterPill = isFloater ? ' ' + sourceChipHtml_(a) : '';
      return '<tr>'
           +   '<td>' + escapeHtml(a.name) + floaterPill + '</td>'
           +   '<td class="num">' + a.stats.rung + '</td>'
           +   '<td class="num">' + a.stats.missed + '</td>'
           +   '<td class="num">' + a.stats.answered + '</td>'
           +   '<td class="num">' + share + '</td>'
           +   '<td class="num">' + a.stats.pct + '</td>'
           +   '<td class="num">' + a.stats.ttt + '</td>'
           +   '<td class="num">' + a.stats.att + '</td>'
           + '</tr>';
    }).join('');

    $('pr-agent-table-wrap').innerHTML =
      '<table class="pr-agent-table">'
      +   '<thead><tr>' + head + '</tr></thead>'
      +   '<tbody>' + rows + '</tbody>'
      + '</table>';

    // Click handlers on the sortable column headers. Re-renders
    // the table in place so the sort indicator updates too.
    $('pr-agent-table-wrap').querySelectorAll('.pr-th-sortable').forEach(function (th) {
      th.addEventListener('click', function () {
        const key = th.getAttribute('data-sort-key');
        if (prSortKey === key) {
          prSortDir = (prSortDir === 'asc') ? 'desc' : 'asc';
        } else {
          prSortKey = key;
          // Sensible default direction by column: numeric desc, name asc.
          prSortDir = (key === 'name') ? 'asc' : 'desc';
        }
        prSavePrefs_();
        prRenderAgentTable_(agentData);
      });
    });
  }

  /**
   * Returns a sorted copy of agentData per prSortKey + prSortDir.
   * Numeric columns sort on raw values; name sorts case-insensitively.
   * Share is derived from raw.answered (it's a ratio against the
   * team total, so sort order matches raw.answered).
   */
  function prSortAgentData_(agentData) {
    const sorted = agentData.slice();
    const key = prSortKey;
    const dir = prSortDir;
    sorted.sort(function (a, b) {
      let av, bv;
      if (key === 'name') {
        av = (a.name || '').toLowerCase();
        bv = (b.name || '').toLowerCase();
      } else if (key === 'share') {
        // Share is a function of raw.answered against the team
        // total, so ordering by raw.answered is equivalent.
        av = a.raw.answered || 0;
        bv = b.raw.answered || 0;
      } else {
        av = a.raw[key] || 0;
        bv = b.raw[key] || 0;
      }
      if (av === bv) return 0;
      return dir === 'asc' ? (av < bv ? -1 : 1) : (av < bv ? 1 : -1);
    });
    return sorted;
  }

  function prRenderCharts_(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    prChartInstances.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    prChartInstances = [];
    // Sweep up any orphans left by a partial-crash on the previous render.
    ['pr-share-chart', 'pr-volume-chart', 'pr-trend-chart'].forEach(destroyOrphanedChartOnCanvas_);

    // Reveal every chart panel temporarily so each canvas has
    // non-zero dimensions at Chart.js instantiation time. Without
    // this, the inactive-tab charts (Volume & Efficiency,
    // 12-Month Trend) come up 0x0 and don't recover when their
    // tab is clicked.
    const prPanels = Array.prototype.slice.call(
      document.querySelectorAll('#pr-charts-container [data-panel]'));
    const prSavedDisplays = prPanels.map(function (p) { return p.style.display; });
    prPanels.forEach(function (p) { p.style.display = ''; });

    const showLabels = $('pr-show-datalabels') ? $('pr-show-datalabels').checked : true;
    // Per-chart registration (rather than Chart.register'ing
    // globally) so the Missed Calls bar chart isn't affected by
    // the data labels plugin.
    const prPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    // Pie: share of answered. Labels show "N (X%)" inside each
    // slice when the toggle is on; hidden when off.
    const pieData = (data.chartData && data.chartData.sharePie) || [];
    const pieColors = pieData.map(function (_, i) {
      return IR_CHART_COLORS[i % IR_CHART_COLORS.length];
    });
    const pie = new Chart($('pr-share-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: pieData.map(function (d) { return d.label; }),
        datasets: [{
          data:            pieData.map(function (d) { return d.value; }),
          backgroundColor: pieColors,
          borderColor: THEME.paperCard,
          borderWidth: 2,
        }],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                const pct = total > 0 ? (ctx.parsed / total) * 100 : 0;
                return ctx.label + ': ' + ctx.parsed + ' (' + pct.toFixed(1) + '%)';
              },
            },
          },
          datalabels: {
            display: function (ctx) {
              if (!showLabels) return false;
              // Don't render labels on tiny slices -- they overlap
              // and look messy. Threshold: < 4% of total.
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              return total > 0 && (ctx.dataset.data[ctx.dataIndex] / total) >= 0.04;
            },
            color: THEME.paper,
            font: { family: "'IBM Plex Mono', monospace", size: 11, weight: '500' },
            textAlign: 'center',
            formatter: function (value, ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              const pct = total > 0 ? (value / total * 100).toFixed(1) : '0';
              return value + '\n(' + pct + '%)';
            },
          },
        },
      },
    });
    prChartInstances.push(pie);

    // Stacked bar (Answered/Missed) + line overlay (% Answered) on
    // a second y-axis. The bars show volume per agent; the line
    // shows efficiency in one shared view. Mixed chart so the line
    // datasets carry `type: 'line'` explicitly.
    const volData = (data.chartData && data.chartData.volumeBar) || [];
    const bar = new Chart($('pr-volume-chart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: volData.map(function (d) { return d.label; }),
        datasets: [
          { label: 'Answered', type: 'bar',
            data: volData.map(function (d) { return d.answered; }),
            backgroundColor: IR_VOLUME_COLORS.answered, stack: 'vol', yAxisID: 'y',
            order: 2 },
          { label: 'Missed', type: 'bar',
            data: volData.map(function (d) { return d.missed; }),
            backgroundColor: IR_VOLUME_COLORS.missed,   stack: 'vol', yAxisID: 'y',
            order: 2 },
          { label: '% Answered', type: 'line',
            data: volData.map(function (d) { return Number((d.pct || 0).toFixed(1)); }),
            // showLine: false renders the dataset as discrete
            // points only. Connecting agents with a line was
            // visually misleading -- agents are independent
            // categories, not a time series. Points + larger
            // radius reads as "per-agent dot" rather than trend.
            showLine: false,
            borderColor: THEME.accent, backgroundColor: THEME.accent,
            fill: false, yAxisID: 'y1',
            pointRadius: 6, pointHoverRadius: 8,
            pointBackgroundColor: THEME.accent,
            pointBorderColor: THEME.paperCard, pointBorderWidth: 2,
            order: 1 },
        ],
      },
      plugins: prPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'bottom' },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const ds = ctx.dataset.label;
                if (ds === '% Answered') return ds + ': ' + ctx.parsed.y + '%';
                return ds + ': ' + ctx.parsed.y;
              },
            },
          },
          datalabels: {
            // Boolean form matches IR's working pattern. Conditional
            // hiding (zero-value bars, etc.) is handled by formatter
            // returning '' below -- a function-form `display` callback
            // appears to suppress labels on mixed bar+line charts in
            // chartjs-plugin-datalabels@2.2.0.
            display: showLabels,
            // Use each dataset's own color for text + border so each
            // label visually identifies which series it belongs to
            // (Answered = good, Missed = warn, % Answered = accent).
            // Matches the colored-pill aesthetic of the line label.
            color: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.ink;
            },
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.line;
            },
            borderWidth: 1,
            borderRadius: 2,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            // Stacked bars: center the label inside each segment so
            // it sits on top of the bar's colored fill rather than
            // floating above it (which overlapped the next bar's
            // line dot at the top of the stack). Line dots stay
            // above-the-point.
            anchor: function (ctx) { return ctx.dataset.type === 'line' ? 'center' : 'center'; },
            align: function (ctx) { return ctx.dataset.type === 'line' ? 'top' : 'center'; },
            clamp: true,
            clip: false,
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value, ctx) {
              if (value == null) return '';
              if (ctx.dataset.type === 'line') return value + '%';
              return value > 0 ? value : '';
            },
          },
        },
        scales: {
          x: { stacked: true, ticks: { autoSkip: false, maxRotation: 30, minRotation: 0 } },
          y: { stacked: true, beginAtZero: true, position: 'left',
               title: { display: true, text: 'Calls', font: { size: 11 } } },
          y1: { beginAtZero: true, max: 100, position: 'right',
                title: { display: true, text: '% Answered', font: { size: 11 } },
                grid: { drawOnChartArea: false },
                ticks: { callback: function (v) { return v + '%'; } } },
        },
      },
    });
    prChartInstances.push(bar);

    // Trend chart -- factored out so the metric sub-tabs can
    // re-render it without rebuilding the pie + bar.
    prRenderTrendChart_(data);

    // Restore panel visibility (only the active tab visible).
    // Chart layout state is preserved across the re-hide so the
    // now-hidden charts paint correctly when their tab clicks.
    prPanels.forEach(function (p, i) { p.style.display = prSavedDisplays[i]; });
  }

  /**
   * Renders (or re-renders) only the 12-month trend chart, using
   * prActiveTrendMetric to pick which series to plot. Destroys
   * any previously-tracked trend chart instance and replaces the
   * tail of prChartInstances so re-renders don't accumulate.
   */
  function prRenderTrendChart_(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    // Defensive orphan cleanup (in case a previous render crashed).
    destroyOrphanedChartOnCanvas_('pr-trend-chart');
    // Destroy any existing trend chart instance.
    const remaining = [];
    prChartInstances.forEach(function (c) {
      if (c.canvas && c.canvas.id === 'pr-trend-chart') c.destroy();
      else remaining.push(c);
    });
    prChartInstances = remaining;

    const showLabels = $('pr-show-datalabels') ? $('pr-show-datalabels').checked : true;
    const prPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];
