    if (col.type === 'chip' && col.key === 'source') {
      return sourceChipHtml_(row);
    }
    const v = row[col.key];
    if (col.type === 'text') return escapeHtml(v == null ? '' : v);
    if (col.type === 'duration') {
      const dur = fmtDuration(v);
      return (Number(v) || 0) === 0 ? zeroCell_(dur) : dur;
    }
    // E5: append a small prior-period delta chip after the number on
    // the three chipped columns. No chip on totals row (no prior
    // window for a sum row). Zero values are muted (zeroCell_), but the
    // WoW chip stays full-color since a delta against zero is signal.
    const num = fmtNumber(v);
    const numHtml = (Number(v) || 0) === 0 ? zeroCell_(num) : num;
    return numHtml + wowChipHtml_(row, col);
  }

  // E5 prior-period delta chip. Maps each chipped column to its
  // prior-window field on `row` (priorRung / priorMissed /
  // priorAnswered), computes the delta, and returns a small inline
  // chip with the direction arrow + magnitude. Returns '' when:
  //   - the column isn't one we chip (only totalRung/Missed/Answered)
  //   - the row is the tfoot totals row (no priorHasData field)
  //   - the prior window had no included rows for this agent
  //     (priorHasData=false; client renders the plain number alone)
  //
  // Valence:
  //   totalRung     -> up = good (more inbound engagement)
  //   totalAnswered -> up = good (more handled)
  //   totalMissed   -> up = warn (worse)
  // Small deltas (|delta| < WOW_NOISE_THRESHOLD) get the muted
  // styling regardless of direction so the table isn't a sea of
  // colors on routine day-to-day fluctuation.
  const WOW_NOISE_THRESHOLD = 3;
  const WOW_PRIOR_KEYS = {
    totalRung:     { priorKey: 'priorRung',     valence: 'good' },
    totalAnswered: { priorKey: 'priorAnswered', valence: 'good' },
    totalMissed:   { priorKey: 'priorMissed',   valence: 'warn' },
  };
  function wowChipHtml_(row, col) {
    const spec = WOW_PRIOR_KEYS[col.key];
    if (!spec) return '';
    if (!row || row.priorHasData !== true) return '';
    const current = Number(row[col.key]) || 0;
    const prior   = Number(row[spec.priorKey]) || 0;
    const delta   = current - prior;
    const abs     = Math.abs(delta);
    let cls;
    let arrow;
    if (delta === 0) {
      cls = 'wow-chip-muted';
      arrow = '→';   // → flat
    } else if (abs < WOW_NOISE_THRESHOLD) {
      cls = 'wow-chip-muted';
      arrow = delta > 0 ? '▲' : '▼';  // ▲ ▼ muted
    } else {
      // Above threshold: color by valence direction. For "good"
      // metrics (rung/answered), up = good; for "warn" (missed),
      // up = bad. Down inverts.
      const isUp = delta > 0;
      if (spec.valence === 'good') {
        cls = isUp ? 'wow-chip-good' : 'wow-chip-warn';
      } else {
        cls = isUp ? 'wow-chip-warn' : 'wow-chip-good';
      }
      arrow = isUp ? '▲' : '▼';
    }
    const sign = delta > 0 ? '+' : (delta < 0 ? '−' : '');  // − minus
    const label = delta === 0 ? '0' : (sign + abs);
    // Tooltip carries the raw prior value + the explicit window so
    // a manager can sanity-check the delta without doing math. Uses
    // STATE.meta.priorFrom/priorTo (populated by the server).
    const pf = (state.meta && state.meta.priorFrom) || '';
    const pt = (state.meta && state.meta.priorTo)   || '';
    const tip = 'Prior period ' + pf + ' – ' + pt
              + ': ' + prior + '. Delta ' + (delta >= 0 ? '+' : '') + delta + '.';
    return ' <span class="wow-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         +   arrow + label
         + '</span>';
  }

  // Source chip for the Phase D Source column. Three variants:
  //   - matchedViaRoster && matchedViaQueue -> BOTH (good-soft)
  //   - matchedViaRoster only               -> ROSTER (accent-soft)
  //   - matchedViaQueue only                -> QUEUE [· dept1, dept2] (warn-soft)
  // sourceHomes is an array (server-populated) listing every dept
  // whose roster a queue-only floater appears on. Empty array =
  // bare "QUEUE" with no suffix (floater on no dept's roster --
  // they only touched the current dept's queue extensions). One
  // entry = "QUEUE · Sales". Multiple = "QUEUE · Sales, Power" so
  // multi-rostered floaters surface their full home list.
  function sourceChipHtml_(row) {
    if (row.matchedViaRoster && row.matchedViaQueue) {
      return '<span class="src-chip src-chip-both"><span class="src-dot"></span>BOTH</span>';
    }
    if (row.matchedViaRoster) {
      return '<span class="src-chip src-chip-roster"><span class="src-dot"></span>ROSTER</span>';
    }
    if (row.matchedViaQueue) {
      const homes = Array.isArray(row.sourceHomes) ? row.sourceHomes : [];
      const suffix = homes.length
        ? ' &middot; ' + homes.map(escapeHtml).join(', ')
        : '';
      return '<span class="src-chip src-chip-queue"><span class="src-dot"></span>QUEUE' + suffix + '</span>';
    }
    return '';
  }

  // CSV-safe plain text for a source row. Mirrors the chip's
  // variants without the chip markup; consumed by exportTableCsv_.
  function sourceChipCsv_(row) {
    if (row.matchedViaRoster && row.matchedViaQueue) return 'BOTH';
    if (row.matchedViaRoster) return 'ROSTER';
    if (row.matchedViaQueue) {
      const homes = Array.isArray(row.sourceHomes) ? row.sourceHomes : [];
      return homes.length ? 'QUEUE - ' + homes.join(', ') : 'QUEUE';
    }
    return '';
  }

  function render() {
    // Header sort arrows
    document.querySelectorAll('#agents-table thead th[data-sort]').forEach(function (th) {
      const key = th.getAttribute('data-sort');
      const arrow = th.querySelector('.arrow');
      if (!arrow) return;
      if (key === state.sortKey) {
        arrow.textContent = state.sortDir === 'asc' ? '▲' : '▼';
        arrow.style.color = THEME.ink || '#374151';
      } else {
        arrow.textContent = '▽';
        arrow.style.color = THEME.muted || '#9ca3af';
      }
    });

    const tbody = $('agents-tbody');
    const tfoot = $('agents-tfoot');

    if (!state.rows.length) {
      tbody.innerHTML = '';
      tfoot.innerHTML = '';
      return;
    }

    const sorted = sortRows(state.rows);
    tbody.innerHTML = sorted.map(function (row) {
      // Agents matched only via queue (not in the roster) get a small
      // "(queue-only)" tag next to the name in CSS.
      // Phase D: the .via-queue row class is no longer needed for
      // visual distinction (the Source chip handles that), but we
      // keep it so any consumer that styles whole-row queue-only
      // emphasis (e.g. user CSS, future hover handling) still works.
      const rowClass = (row.matchedViaQueue && !row.matchedViaRoster) ? 'via-queue' : '';
      // data-agent powers the row drill-through to the Individual Report.
      return '<tr data-agent="' + escapeHtml(row.agent) + '"'
           + (rowClass ? ' class="' + rowClass + '"' : '')
           + ' title="Open ' + escapeHtml(row.agent) + '’s Individual Report">'
           + COLUMNS.map(function (col, i) {
        const isAgent  = (i === 0);
        const isSource = (col.type === 'chip' && col.key === 'source');
        const cls = isAgent ? 'agent-name' : (isSource ? 'src-cell' : 'num');
        const extra = (col.highlight === 'missed' && Number(row.totalMissed) > 0) ? ' missed-high' : '';
        return '<td class="' + cls + extra + '">' + fmtCell(col, row) + '</td>';
      }).join('') + '</tr>';
    }).join('');

    if (state.totals) {
      // Roster-vs-floater count caption surfaced as the tfoot's
      // first cell when queue-only floaters are visible. Keeps the
      // "totals exclude floaters" semantics legible without a second
      // tfoot row. Falls back to the plain "Total" label when there
      // are no floaters in the current view.
      const queueCount = state.totals.queueOnlyAgentCount || 0;
      const totalLabel = queueCount > 0
        ? 'Total (roster only · ' + queueCount + ' floater' + (queueCount === 1 ? '' : 's') + ' excluded)'
        : 'Total';
      tfoot.innerHTML = '<tr>' + COLUMNS.map(function (col, i) {
        if (i === 0) return '<td>' + totalLabel + '</td>';
        // Source column has no aggregate value -- leave its tfoot
        // cell empty so it doesn't try to render a chip from totals.
        if (col.type === 'chip' && col.key === 'source') return '<td class="src-cell"></td>';
        // Some keys (like totalUnique, totalRung) live on totals; ATT
        // and abd-wait are weighted on the server.
        return '<td class="num">' + fmtCell(col, state.totals) + '</td>';
      }).join('') + '</tr>';
    } else {
      tfoot.innerHTML = '';
    }
  }

  // -- CSV export for the main agent table --------------------------------
  function exportTableCsv_() {
    var sorted = sortRows(state.rows);
    if (!sorted.length) return;
    var csvEscape = function (v) {
      var s = csvSafeCell_(v);
      return (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1)
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    var header = COLUMNS.map(function (c) { return csvEscape(c.label); }).join(',');
    var rows = sorted.map(function (row) {
      return COLUMNS.map(function (col) {
        if (col.type === 'chip' && col.key === 'source') return csvEscape(sourceChipCsv_(row));
        if (col.type === 'duration') return csvEscape(fmtDuration(row[col.key]));
        return csvEscape(row[col.key]);
      }).join(',');
    });
    if (state.totals) {
      rows.push(COLUMNS.map(function (col, i) {
        if (i === 0) return csvEscape('Total (roster only)');
        // Source column has no aggregate meaning in the totals row.
        if (col.type === 'chip' && col.key === 'source') return '';
        if (col.type === 'duration') return csvEscape(fmtDuration(state.totals[col.key]));
        return csvEscape(state.totals[col.key]);
      }).join(','));
    }
    var blob = new Blob([header + '\n' + rows.join('\n')], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (getRequestedDept() || 'department') + '_' + (($('from-date') && $('from-date').value) || 'data') + '_to_' + (($('to-date') && $('to-date').value) || 'data') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // -- Individual Report modal -------------------------------------------
  // Opens a form for date range + agent multi-select, then runs the
  // report server-side and renders per-agent summary cards + 3 Chart.js
  // line charts (volume / efficiency / duration). 1 agent = individual
  // mode; 2+ = peer comparison.
  //
  // The agent roster is fetched once on first open per dept; if the
  // user switches dept on the main page (admin only), we re-fetch.

  // Peer-comparison palette. The first slot pulls from --accent so the
  // primary agent matches the dashboard's slate-blue chrome; the rest
  // are kept from the Tableau-10-derived CVD-safe palette so 2-10
  // agents stay visually distinct in comparison mode.
  // Harmonized categorical ramp — constant L/C, hue walk. Slots 1-3 are
  // the brand accent / terracotta / sage so few-agent views match the
  // rest of the app. Light values for light themes; lightened set for
  // dark mode (mirrors the --accent/--warn/--good dark overrides).
  var IR_RAMP_LIGHT = ['#4e7bc4','#c66b4b','#3d9476','#7a5aa8','#b89244',
                       '#5391a3','#a8597d','#6f8f4c','#8a8f9c','#9c6f4a'];
  var IR_RAMP_DARK  = ['#7ba3df','#e08a63','#5cb494','#a98fd0','#d8b25f',
                       '#74b3c6','#cd83a4','#97b873','#aab0bd','#c4946a'];

  function irChartColors_() {
    var dark = document.body.dataset.mode === 'dark';
    return (dark ? IR_RAMP_DARK : IR_RAMP_LIGHT).slice();
  }
  var IR_CHART_COLORS = irChartColors_();

  function irVolumeColors_() {
    return {
      rung:     THEME.accent || '#4e7bc4',
      answered: THEME.good   || '#3d9476',
      missed:   THEME.warn   || '#c66b4b',
    };
  }
  var IR_VOLUME_COLORS = irVolumeColors_();

  // Translates a hex color to a Chart.js fill callback that paints a
  // top-to-bottom gradient from the line color (alpha .25) down to
  // transparent. Applied to every IR line chart so single-agent views
  // have visual weight without dominating the comparison ones.
  /**
   * Resolves a CSS color string to canvas-canonical RGB form
   * (`#rrggbb` for opaque colors, `rgba(r, g, b, a)` for
   * transparent). Used by refreshChartTheme() to normalize the
   * design-system tokens before they reach Chart.js / the
   * datalabels plugin, which have inconsistent OKLCH support in
   * their many sub-paths.
   */
  function colorToCanvasRgb_(color) {
    try {
      const cvs = document.createElement('canvas');
      cvs.width = cvs.height = 1;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = 'rgb(1,2,3)';
      const sentinel = ctx.fillStyle;
      ctx.fillStyle = color;
      if (ctx.fillStyle === sentinel) return color;
      return ctx.fillStyle;
    } catch (e) { return color; }
  }

  /**
   * Returns the given CSS color with the supplied alpha applied,
   * as an `rgba(...)` string. Paints the color onto a 1x1 canvas
   * and reads back the resulting RGB pixel -- canvas resolves any
   * supported color format (#rrggbb, rgb(), hsl(), oklch(),
   * oklab(), named) into an RGB triple. Cleaner than DOM-resolve
   * (some browsers return getComputedStyle().color as oklch() for
   * oklch() inputs, which the prior regex didn't parse; that
   * produced opaque fills where we wanted faded gradients).
   *
   * Falls back to returning the input color unchanged if canvas
   * doesn't recognize it (rare; CSS-supported but canvas-
   * unsupported formats).
   */
  function colorWithAlpha_(color, alpha) {
    if (!color) return 'rgba(0,0,0,0)';
    try {
      const cvs = document.createElement('canvas');
      cvs.width = cvs.height = 1;
      const ctx = cvs.getContext('2d');
      // Sentinel: set a known fillStyle first. If the next
      // assignment is rejected by canvas (unsupported format),
      // fillStyle keeps the sentinel value -- we detect that and
      // bail out instead of painting the wrong color.
      ctx.fillStyle = 'rgb(1, 2, 3)';
      const sentinel = ctx.fillStyle;
      ctx.fillStyle = color;
      if (ctx.fillStyle === sentinel) return color;
      ctx.fillRect(0, 0, 1, 1);
      const data = ctx.getImageData(0, 0, 1, 1).data;
      return 'rgba(' + data[0] + ', ' + data[1] + ', ' + data[2] + ', ' + alpha + ')';
    } catch (e) {
      return color;
    }
  }

  function irGradientFill_(chart, color) {
    const ctx = chart.ctx;
    const area = chart.chartArea;
    if (!area) return 'rgba(0,0,0,0)';
    const gradient = ctx.createLinearGradient(0, area.top, 0, area.bottom);
    gradient.addColorStop(0, colorWithAlpha_(color, 0.25));
    gradient.addColorStop(1, colorWithAlpha_(color, 0));
    return gradient;
  }

  let irChartInstances = [];
  let irPinnedAgent = null;   // peer-comparison legend: pinned/isolated agent (null = none)
  let irLastData = null;
  // Cached roster + active subset for the current modal session.
  // `activeAgents` is null until the first init call with from/to
  // succeeds; null means "we don't know yet, show all as one
  // group". `rangeKey` is the (from|to) the activeAgents were
  // computed for, so we can skip a re-fetch when neither input
  // has changed.
  let irLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
  let irActiveFetchTimer = null;
  // Persisted user preferences (mirrors the Performance Report's
  // prefs model). Restored on modal init, saved on every state
  // change so the next visit picks up where the user left off.
  let irSortOrder = 'selection';   // selection | name | answered-desc | answered-asc | pct-desc
  let irActiveChartTab = 'vol';    // vol | eff | dur
  let irPendingAgentSelection_ = null;
  let irPendingAutoRun_ = false;   // drill-through: auto-generate once the picker renders
  let irListChangeHandler_ = null;
  const IR_PREFS_KEY = 'cdr.ir.prefs.v1';

  /**
   * Drill-through entry: open the Individual Report for ONE agent over a
   * given date range and auto-generate. Reuses the existing one-shot
   * pending-selection hook (irPendingAgentSelection_) + a run flag honored
   * at the end of renderIrAgentList. Called from the My Department table's
   * row click. No comparison (plain Individual Report); the user can add a
   * vs-self comparison from the form afterward.
   */
  function irDrillToAgent_(agentName, from, to) {
    if (!agentName) return;
    if (from && $('ir-from')) $('ir-from').value = from;
    if (to   && $('ir-to'))   $('ir-to').value   = to;
    if ($('ir-preset')) $('ir-preset').value = 'custom';
    if ($('ir-compare-mode')) {
      $('ir-compare-mode').value = 'none';
      // Fire change so the prior-range inputs + hint sync to "no comparison".
      $('ir-compare-mode').dispatchEvent(new Event('change'));
    }
    irPendingAgentSelection_ = [agentName];
    irPendingAutoRun_ = true;
    // Force a roster re-fetch for this range so renderIrAgentList re-runs
    // (and applies the pending selection + auto-run) even if the cached
    // roster matched.
    irLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
    const btn = $('individual-report-btn');
    if (btn) btn.click();   // -> openModal -> ensureIrRoster -> renderIrAgentList
  }

  function initIndividualReport() {
    const btn = $('individual-report-btn');
    const modal = $('individual-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      showIrForm();
      ensureIrRoster();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Wire form controls.
    const preset = $('ir-preset');
    if (preset) preset.addEventListener('change', applyIrPreset);

    const fromEl = $('ir-from');
    const toEl   = $('ir-to');
    if (fromEl) fromEl.addEventListener('change', function () {
      resetIrPreset(); scheduleActiveAgentRefetch_(); irSavePrefs_();
    });
    if (toEl) toEl.addEventListener('change', function () {
      resetIrPreset(); scheduleActiveAgentRefetch_(); irSavePrefs_();
    });

    const selAll  = $('ir-select-all');
    const selNone = $('ir-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); toggleIrAgents(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); toggleIrAgents(false); });

    const search = $('ir-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('ir-agent-list'), search.value);
    });

    // Edit-selection popover wiring (results header).
    const editBtn = $('ir-edit-selection-btn');
    if (editBtn) editBtn.addEventListener('click', irOpenEditPopover_);
    const editClose = $('ir-edit-popover-close');
    if (editClose) editClose.addEventListener('click', irCloseEditPopover_);
    const editApply = $('ir-edit-apply-btn');
    if (editApply) editApply.addEventListener('click', irApplyEditPopover_);
    const editSelAll  = $('ir-edit-select-all');
    const editSelNone = $('ir-edit-select-none');
    if (editSelAll)  editSelAll.addEventListener('click',  function (e) { e.preventDefault(); irTogglePopoverAgents_(true);  });
    if (editSelNone) editSelNone.addEventListener('click', function (e) { e.preventDefault(); irTogglePopoverAgents_(false); });
    const editSearch = $('ir-edit-search');
    if (editSearch) editSearch.addEventListener('input', function () {
      irFilterAgentList_($('ir-edit-list'), editSearch.value);
    });
    // Close on click outside the popover.
    document.addEventListener('click', function (e) {
      const pop = $('ir-edit-popover');
      if (!pop || pop.style.display === 'none') return;
      if (pop.contains(e.target)) return;
      if (e.target === editBtn) return;
      irCloseEditPopover_();
    });

    const genBtn = $('ir-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runIrReport);

    const backBtn = $('ir-back-btn');
    if (backBtn) backBtn.addEventListener('click', showIrForm);

    const labelToggle = $('ir-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      irSavePrefs_();
      if (irLastData) irRenderCharts(irLastData);
    });

    // Export dropdown: consolidates Copy image / Email image /
    // Print under one button. Click toggles open; click on an
    // item runs the action and closes; outside click + Escape
    // dismiss.
    const exportBtn  = $('ir-export-btn');
    const exportMenu = $('ir-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        irSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        irSetExportMenuOpen_(false);
        if (action === 'copy')  irCopyImage();
        else if (action === 'email') irEmailImage();
        else if (action === 'print') irPrintReport_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        irSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          irSetExportMenuOpen_(false);
        }
      });
    }

    // Chart panel tabs. Only one of the three charts is visible at
    // a time so each gets the full container width. Default: Volume.
    const tabContainer = $('ir-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      const which = tab.getAttribute('data-tab');
      tabContainer.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b.getAttribute('data-tab') === which;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
        p.style.display = p.getAttribute('data-panel') === which ? '' : 'none';
      });
      // Force the now-visible chart to resize against its newly-
      // measurable container -- Chart.js can't compute layout while
      // a panel is display:none, so we ask it explicitly.
      irChartInstances.forEach(function (c) { c.resize(); });
      irActiveChartTab = which;
      irSavePrefs_();
    });

    // Card-sort dropdown: re-renders the summary cards in place.
    const sortSel = $('ir-card-sort');
    if (sortSel) sortSel.addEventListener('change', function () {
      irSortOrder = sortSel.value;
      irSavePrefs_();
      if (irLastData) irRenderSummary(irLastData.summaryData, irLastData.teamAvg);
    });

    // Defaults: this-month-to-date.
    setIrDefaultDates();
    // Restore last-used form state if any. Runs after default
    // dates so a saved preset/dates pair overrides the defaults.
    irRestorePrefs_();
    // Wire the Compare with dropdown + auto-update the hint.
    irInitCompareMode_();
  }

  /**
   * Persists the user's Individual Report state to localStorage so
   * the next modal open picks up where they left off. Best-effort.
   */
  function irSavePrefs_() {
    try {
      const prefs = {
        preset:      $('ir-preset')       ? $('ir-preset').value       : 'custom',
        from:        $('ir-from')         ? $('ir-from').value         : '',
        to:          $('ir-to')           ? $('ir-to').value           : '',
        compareMode: $('ir-compare-mode') ? $('ir-compare-mode').value : 'none',
        priorFrom:   $('ir-prior-from')   ? $('ir-prior-from').value   : '',
        priorTo:     $('ir-prior-to')     ? $('ir-prior-to').value     : '',
        agents:      irGetCheckedAgents_($('ir-agent-list')),
        showLabels:  $('ir-show-datalabels') ? $('ir-show-datalabels').checked : false,
        sortOrder:   irSortOrder,
        chartTab:    irActiveChartTab,
      };
      localStorage.setItem(IR_PREFS_KEY, JSON.stringify(prefs));
    } catch (e) { /* ignore */ }
  }

  function irRestorePrefs_() {
    let prefs;
    try {
      const raw = localStorage.getItem(IR_PREFS_KEY);
      if (!raw) return;
      prefs = JSON.parse(raw);
    } catch (e) { return; }
    if (!prefs || typeof prefs !== 'object') return;

    if (prefs.preset && $('ir-preset')) $('ir-preset').value = prefs.preset;
    if (prefs.from   && $('ir-from'))   $('ir-from').value   = prefs.from;
    if (prefs.to     && $('ir-to'))     $('ir-to').value     = prefs.to;
    if (prefs.compareMode && $('ir-compare-mode')) $('ir-compare-mode').value = prefs.compareMode;
    if (prefs.priorFrom   && $('ir-prior-from'))   $('ir-prior-from').value   = prefs.priorFrom;
    if (prefs.priorTo     && $('ir-prior-to'))     $('ir-prior-to').value     = prefs.priorTo;
    if (typeof prefs.showLabels === 'boolean' && $('ir-show-datalabels')) {
      $('ir-show-datalabels').checked = prefs.showLabels;
    }
    if (prefs.sortOrder) irSortOrder = prefs.sortOrder;
    if (prefs.chartTab)  irActiveChartTab = prefs.chartTab;
    if ($('ir-card-sort')) $('ir-card-sort').value = irSortOrder;

    // Stash agents so we can pre-check the boxes once the roster
    // list finishes rendering.
    if (Array.isArray(prefs.agents) && prefs.agents.length) {
      irPendingAgentSelection_ = prefs.agents;
    }
  }

  function irSetExportMenuOpen_(open) {
    const btn  = $('ir-export-btn');
    const menu = $('ir-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function irPrintReport_() {
    var panels = document.querySelectorAll('#ir-charts-container [data-panel]');
    var saved = [];
    panels.forEach(function (p) { saved.push(p.style.display); p.style.display = ''; });
    irChartInstances.forEach(function (c) { c.resize(); });
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      panels.forEach(function (p, i) { p.style.display = saved[i]; });
      document.body.classList.add('ir-printing');
      window.print();
      document.body.classList.remove('ir-printing');
    }); });
  }

  function setIrDefaultDates() {
    // Match the main dashboard's default behavior: current month to
    // today. Lets a manager glance at the report without futzing
    // with dates first.
    const today = new Date();
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('ir-from')) $('ir-from').value = isoOf(first);
    if ($('ir-to'))   $('ir-to').value   = isoOf(today);
  }

  function showIrForm() {
    $('individual-form').style.display = '';
    $('individual-results').style.display = 'none';
    irSetFormError('');
  }
  function showIrResults() {
    $('individual-form').style.display = 'none';
    $('individual-results').style.display = '';
  }

  function irSetFormError(msg) {
    const el = $('ir-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg;
    el.style.display = '';
  }

  function irSetResultsStatus(kind, msg) {
    const el = $('ir-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // Fetches the dept roster (agent picker source) the first time the
  // modal opens for a given dept; subsequent opens reuse the cached
  // list as long as the dashboard's dept hasn't changed. Also asks
  // for the active-in-range subset using the current modal dates so
  // the picker can show an Active / Inactive split.
  function ensureIrRoster() {
    const dept = getRequestedDept();
    if (!dept) {
      $('ir-agent-loader').textContent = 'No department selected.';
      $('ir-agent-list').style.display = 'none';
      return;
    }
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    const rangeKey = from + '|' + to;

    if (irLastRoster.dept === dept && irLastRoster.agents.length
        && irLastRoster.rangeKey === rangeKey) {
      renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
      return;
    }
    $('ir-agent-loader').style.display = '';
    $('ir-agent-list').style.display = 'none';
    $('ir-generate-btn').disabled = true;

    google.script.run
      .withSuccessHandler(function (data) {
        irLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
      })
      .withFailureHandler(function (err) {
        $('ir-agent-loader').textContent = 'Error loading roster: '
          + (err && err.message ? err.message : String(err));
      })
      .getIndividualReportInit({ department: dept, from: from, to: to });
  }

  /**
   * Re-fetches the active-in-range subset 350ms after the user
   * stops changing the date inputs. Doesn't block the form -- the
   * full roster is already rendered and selectable; the response
   * just splits it into Active / Inactive groups visually.
   */
  function scheduleActiveAgentRefetch_() {
    if (irActiveFetchTimer) clearTimeout(irActiveFetchTimer);
    irActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept();
      if (!dept) return;
      const from = $('ir-from').value;
      const to   = $('ir-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (irLastRoster.dept === dept && irLastRoster.rangeKey === rangeKey) return;

      google.script.run
        .withSuccessHandler(function (data) {
          irLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          irLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          irLastRoster.rangeKey = rangeKey;
          // Preserve current selection across the regroup.
          const checked = irGetCheckedAgents_($('ir-agent-list'));
          renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
          irApplyCheckedAgents_($('ir-agent-list'), checked);
          updateIrGenerateEnabled();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getIndividualReportInit({ department: dept, from: from, to: to });
    }, 350);
  }

  /**
   * Renders the agent picker into `list` with Active / Inactive
   * grouping when an activeAgents subset is provided; otherwise a
   * single flat list. Used by both the main form picker and the
   * results-header edit popover.
   */
  function renderIrAgentList(agents, activeAgents, activeFloaters) {
    const list = $('ir-agent-list');
    $('ir-agent-loader').style.display = 'none';
    if (!agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = '';
      $('ir-generate-btn').disabled = true;
      return;
    }
    list.innerHTML = irBuildAgentListHtml_(agents, activeAgents, activeFloaters);
    list.style.display = '';

    if (irListChangeHandler_) list.removeEventListener('change', irListChangeHandler_);
    irListChangeHandler_ = function () {
      updateIrGenerateEnabled();
      irSavePrefs_();
    };
    list.addEventListener('change', irListChangeHandler_);
    // Apply any pending selection from restored prefs OR a drill-through
    // once. (irDrillToAgent_ sets this to a single-agent array.)
    if (irPendingAgentSelection_) {
      irApplyCheckedAgents_(list, irPendingAgentSelection_);
      irPendingAgentSelection_ = null;
    }
    updateIrGenerateEnabled();
    // Drill-through: auto-generate once the picker (with the pre-selected
    // agent) has rendered. Cleared so it fires exactly once.
    if (irPendingAutoRun_) {
      irPendingAutoRun_ = false;
      runIrReport();
    }
  }

  function irBuildAgentListHtml_(agents, activeAgents, activeFloaters) {
    // No activity info or no inactive members -> flat list.
    if (!activeAgents) return irAgentItemsHtml_(agents);
    const activeSet = {};
    for (let i = 0; i < activeAgents.length; i++) activeSet[activeAgents[i]] = true;
    const active = [];
    const inactive = [];
    for (let i = 0; i < agents.length; i++) {
      (activeSet[agents[i]] ? active : inactive).push(agents[i]);
    }
    const floaters = Array.isArray(activeFloaters) ? activeFloaters : [];
    if (!inactive.length && !floaters.length) return irAgentItemsHtml_(active);

    let html = '';
    if (active.length) {
      html += '<div class="ir-agent-group-label">'
            + 'Active in range <span class="ir-agent-group-count">(' + active.length + ')</span>'
            + '</div>'
            + '<div class="ir-agent-group">' + irAgentItemsHtml_(active) + '</div>';
    }
    // Inactive group wrapped in <details>, collapsed by default --
    // managers rarely need to pick zero-activity agents and the
    // collapsed state cleans up the picker. Search auto-expands it
    // (see irFilterAgentList_) when a query matches an inactive
    // name.
    if (inactive.length) {
      html += '<details class="ir-agent-details">'
            +   '<summary class="ir-agent-group-label ir-agent-group-label-muted">'
            +     'No activity in range <span class="ir-agent-group-count">(' + inactive.length + ')</span>'
            +   '</summary>'
            +   '<div class="ir-agent-group ir-agent-group-muted">' + irAgentItemsHtml_(inactive) + '</div>'
            + '</details>';
    }
    // Floaters group (INV-53 expansion). Queue-only agents matched
    // into this dept via shared-queue extension overlap, not on the
    // dept's roster. Collapsed by default like the inactive group.
    // Items render with the QUEUE chip + sourceHomes suffix from
    // the picker so managers see immediately which floater belongs
    // to which other dept. Picking a floater sends their name in
    // agents[] like any other; the server flags them and excludes
    // their numbers from team-avg.
    if (floaters.length) {
      html += '<details class="ir-agent-details">'
            +   '<summary class="ir-agent-group-label ir-agent-group-label-muted">'
            +     'Floaters (queue-only) <span class="ir-agent-group-count">(' + floaters.length + ')</span>'
            +   '</summary>'
            +   '<div class="ir-agent-group ir-agent-group-muted">' + irAgentItemsHtml_(floaters) + '</div>'
            + '</details>';
    }
    return html;
  }

  // Accepts either a plain string[] of agent names, OR an array of
  // { name, sourceHomes } objects (the floaters shape). Object items
  // render with a small QUEUE chip + sourceHomes suffix so the picker
  // mirrors the My Department Source-column chip rendering.
  function irAgentItemsHtml_(agents) {
    return agents.map(function (a) {
      if (a && typeof a === 'object' && a.name) {
        const safe = escapeHtml(a.name);
        const homes = Array.isArray(a.sourceHomes) ? a.sourceHomes : [];
        const suffix = homes.length
          ? ' &middot; ' + homes.map(escapeHtml).join(', ')
          : '';
        return '<label class="ir-agent-item">'
             +   '<input type="checkbox" class="ir-agent-cb" value="' + safe + '"> '
             +   safe
             +   ' <span class="src-chip src-chip-queue ir-agent-floater-chip">'
             +     '<span class="src-dot"></span>QUEUE' + suffix
             +   '</span>'
             + '</label>';
      }
      const safe = escapeHtml(a);
      return '<label class="ir-agent-item">'
           +   '<input type="checkbox" class="ir-agent-cb" value="' + safe + '"> '
           +   safe
           + '</label>';
    }).join('');
  }

  /**
   * Client-side substring filter across whatever list element is
   * passed (main form picker or edit-popover list). Hides items +
   * group-labels whose visible text doesn't match the query. The
   * collapsed "No activity in range" <details> auto-expands while
   * the query is non-empty so users can see matches inside it
   * without manually clicking the disclosure.
   */
  function irFilterAgentList_(listEl, query) {
    if (!listEl) return;
    const q = String(query || '').trim().toLowerCase();
    const items = listEl.querySelectorAll('.ir-agent-item');
    items.forEach(function (it) {
      const name = (it.textContent || '').trim().toLowerCase();
      it.style.display = (!q || name.indexOf(q) !== -1) ? '' : 'none';
    });
    // For each agent-group container: hide if no children are
    // visible. Two structural shapes:
    //   1. Group is inside a <details> (the "No activity" wrapper)
    //      -- toggle the details visibility + auto-open on search.
    //   2. Standalone group (the "Active" block) -- also hide its
    //      previous-sibling label.
    listEl.querySelectorAll('.ir-agent-group').forEach(function (g) {
      const anyVisible = Array.prototype.some.call(
        g.querySelectorAll('.ir-agent-item'),
        function (it) { return it.style.display !== 'none'; }
      );
      const det = g.closest('details');
      if (det) {
        det.style.display = anyVisible ? '' : 'none';
        if (q && anyVisible) det.open = true;
        return;
      }
      g.style.display = anyVisible ? '' : 'none';
      const prevLabel = g.previousElementSibling;
      if (prevLabel && prevLabel.classList.contains('ir-agent-group-label')) {
        prevLabel.style.display = anyVisible ? '' : 'none';
      }
    });
  }

  function updateIrGenerateEnabled() {
    const boxes = $('ir-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('ir-generate-btn').disabled = boxes.length === 0;
  }

  function toggleIrAgents(checked) {
    selectAllActiveAgents_($('ir-agent-list'), checked);
    updateIrGenerateEnabled();
    // Persist explicitly -- programmatic cb.checked flips don't
    // fire 'change' events, so the change-listener-driven
    // irSavePrefs_ doesn't catch this.
    irSavePrefs_();
  }

  /**
   * Shared "Select all active / Select none" toggle. When checked
   * is true, only the agents in the non-muted (Active in range)
   * group are ticked -- the inactive group (hidden under the
   * collapsible details) is left alone, so users have to opt in
   * explicitly to those. When checked is false, every checkbox
   * (active + inactive) is cleared.
   *
   * Falls back to "select all" when the picker has no
   * active/inactive grouping (e.g. the active-in-range fetch
   * hasn't returned yet, or every roster member fell into one
   * bucket).
   */
  function selectAllActiveAgents_(listEl, checked) {
    if (!listEl) return;
    if (checked) {
      const activeGroup = listEl.querySelector('.ir-agent-group:not(.ir-agent-group-muted)');
      const target = activeGroup
        ? activeGroup.querySelectorAll('.ir-agent-cb')
        : listEl.querySelectorAll('.ir-agent-cb');
      target.forEach(function (cb) { cb.checked = true; });
    } else {
      listEl.querySelectorAll('.ir-agent-cb').forEach(function (cb) { cb.checked = false; });
    }
  }

  function irGetCheckedAgents_(listEl) {
    if (!listEl) return [];
    return Array.prototype.slice.call(listEl.querySelectorAll('.ir-agent-cb:checked'))
                .map(function (cb) { return cb.value; });
  }

  function irApplyCheckedAgents_(listEl, agents) {
    if (!listEl) return;
    const set = {};
    for (let i = 0; i < agents.length; i++) set[agents[i]] = true;
    listEl.querySelectorAll('.ir-agent-cb').forEach(function (cb) {
      cb.checked = !!set[cb.value];
    });
  }

  function applyIrPreset() {
    const v = $('ir-preset').value;
    irSavePrefs_();
    if (v === 'custom') return;
    const today = new Date();
    let s, e;
    e = new Date(today);
    if (v === 'thisMonth')       { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')  { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                    e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last30')     { s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months'){ s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')   { s = new Date(today.getFullYear() - 1, 0, 1);
                                    e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    $('ir-from').value = isoOf(s);
    $('ir-to').value   = isoOf(e);
    irSavePrefs_();
  }
  function resetIrPreset() {
    const p = $('ir-preset');
    if (p) p.value = 'custom';
  }

  function runIrReport() {
    irSetFormError('');
    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    if (!from || !to) { irSetFormError('Pick a start and end date.'); return; }
    if (from > to)    { irSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('ir-agent-list'));
    if (!agents.length) { irSetFormError('Select at least one agent.'); return; }

    const prior = irResolvePriorRange_(from, to);
    if (prior && prior.error) { irSetFormError(prior.error); return; }

    const btn = $('ir-generate-btn');
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = 'Loading…';

    const req = { department: dept, from: from, to: to, agents: agents };
    if (prior) { req.priorFrom = prior.from; req.priorTo = prior.to; }

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        irSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport(req);
  }

  /**
   * Resolves the active "Compare with" selection into a concrete
   * { from, to } prior range, or null when no comparison is wanted.
   * Returns { error } on validation problems so the caller can
   * surface a form-level message.
   *
   * Modes:
   *   none        -> null
   *   yoy         -> shift the current window back 1 calendar year
   *   prevPeriod  -> immediately-preceding window of the same length
   *   custom      -> pull from the ir-prior-from / ir-prior-to inputs
   */
  /**
   * THE shared client-side comparison-window resolver. One math
   * implementation for every report's "compare against" control (IR
   * and Insights today) so the mode semantics can't drift between
   * reports -- mirrors the server's shared computePriorWindow_
   * (Data.gs) for the prevPeriod case (INV-28).
   *
   *   none        -> null
   *   prevPeriod  -> immediately-preceding window of the same length
   *   yoy         -> the window shifted back 1 calendar year
   *   custom      -> the supplied customFrom/customTo ({error} when
   *                  missing or out of order; controlLabel names the
   *                  form control in the message)
   */
  function resolveComparisonWindow_(mode, from, to, customFrom, customTo, controlLabel) {
    if (!mode || mode === 'none') return null;
    if (mode === 'custom') {
      if (!customFrom || !customTo) {
        return { error: 'Pick prior start and end dates (or switch '
                      + (controlLabel || 'the compare control') + ' to a preset).' };
      }
      if (customFrom > customTo) return { error: 'Prior start must be on or before prior end.' };
      return { from: customFrom, to: customTo };
    }
    // Parse using noon-local-time to avoid DST edges.
    const parts1 = from.split('-'), parts2 = to.split('-');
    const start = new Date(Number(parts1[0]), Number(parts1[1]) - 1, Number(parts1[2]), 12);
    const end   = new Date(Number(parts2[0]), Number(parts2[1]) - 1, Number(parts2[2]), 12);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if (mode === 'yoy') {
      const ps = new Date(start.getFullYear() - 1, start.getMonth(), start.getDate(), 12);
      const pe = new Date(end.getFullYear()   - 1, end.getMonth(),   end.getDate(),   12);
      return { from: isoOf(ps), to: isoOf(pe) };
    }
    if (mode === 'prevPeriod') {
      const ms = 86400000;
      const durationDays = Math.floor((end - start) / ms);
      const pe = new Date(start.getTime() - ms);
      const ps = new Date(pe.getTime() - durationDays * ms);
      return { from: isoOf(ps), to: isoOf(pe) };
    }
    return null;
  }

  function irResolvePriorRange_(from, to) {
    const mode = $('ir-compare-mode') ? $('ir-compare-mode').value : 'none';
    return resolveComparisonWindow_(mode, from, to,
      $('ir-prior-from') ? $('ir-prior-from').value : '',
      $('ir-prior-to')   ? $('ir-prior-to').value   : '',
      'Compare with');
  }

  // Wire the Compare with dropdown: show/hide custom date inputs;
  // update the hint with a preview of the resolved prior range.
  function irInitCompareMode_() {
    const sel = $('ir-compare-mode');
    if (!sel) return;
    const refresh = function () {
      const mode = sel.value;
      const showCustom = (mode === 'custom');
      const fromWrap = $('ir-prior-from-wrap');
      const toWrap   = $('ir-prior-to-wrap');
      if (fromWrap) fromWrap.style.display = showCustom ? '' : 'none';
      if (toWrap)   toWrap.style.display   = showCustom ? '' : 'none';
      const hint = $('ir-prior-hint');
      if (!hint) return;
      if (!mode || mode === 'none') { hint.textContent = ''; return; }
      const from = $('ir-from').value, to = $('ir-to').value;
      if (!from || !to) { hint.textContent = ''; return; }
      const prior = irResolvePriorRange_(from, to);
      if (!prior) { hint.textContent = ''; return; }
      if (prior.error) { hint.textContent = prior.error; return; }
      hint.textContent = 'Comparing against ' + prior.from + ' to ' + prior.to + '.';
    };
    sel.addEventListener('change', function () { refresh(); irSavePrefs_(); });
    ['ir-from', 'ir-to', 'ir-prior-from', 'ir-prior-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', refresh);
    });
    refresh();
  }

  function irRenderReport(data) {
    irLastData = data;
    $('ir-results-title').textContent = data.mode === 'comparison'
      ? 'Peer Comparison Report' : 'Individual Performance Report';
    const headerDate = '(' + (data.dateLabel || '')
                     + (data.priorDateLabel
                          ? ' &middot; vs ' + data.priorDateLabel
                          : '')
                     + ')';
    // priorDateLabel comes from the server unescaped; the date
    // string format is fixed (Utilities.formatDate with our own
    // template), but use innerHTML here only because we already
    // included the &middot; entity above. Date contents themselves
    // are dates, not user input.
    $('ir-results-date').innerHTML = headerDate;
    irRenderEditingLine_(data.meta && data.meta.agents);
    showIrResults();
    irSetResultsStatus('');
    irCloseEditPopover_();
    // Restore the user's last-viewed chart tab (defaults to
    // Volume on first visit). Persisted in prefs.
    irActivateChartTab_();
    reportHeadline_('ir-headline', 'individual-results', irHeadline_(data));
    irRenderSummary(data.summaryData, data.teamAvg);
    irRenderCharts(data);
  }

  /**
   * Compact label for the agents in the current report. With 3 or
   * fewer agents we list them all; beyond that we list two and add
   * "+N more". Hover-tooltip on the truncated form shows the full
   * comma-separated list.
   */
  function irRenderEditingLine_(agents) {
    const el = $('ir-editing-agents');
    if (!el) return;
    const list = Array.isArray(agents) ? agents : [];
    let visible, tooltip;
    if (list.length <= 3) {
      visible = list.join(', ');
      tooltip = visible;
    } else {
      visible = list.slice(0, 2).join(', ') + ', +' + (list.length - 2) + ' more';
      tooltip = list.join(', ');
    }
    el.textContent = visible || '(none)';
    el.title = tooltip;
  }

  /**
   * Opens the edit-selection popover positioned below the "change"
   * link in the results header. Mirrors the agent picker into the
   * popover with the current selection pre-checked, then focuses
   * the search input for fast filtering.
   */
  function irOpenEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    const list = $('ir-edit-list');
    if (!list) return;
    list.innerHTML = irBuildAgentListHtml_(irLastRoster.agents || [], irLastRoster.activeAgents, irLastRoster.activeFloaters);
    // Pre-check the currently-reported agents.
    const current = (irLastData && irLastData.meta && irLastData.meta.agents) || [];
    irApplyCheckedAgents_(list, current);
    irUpdateEditApplyEnabled_();
    list.removeEventListener('change', irUpdateEditApplyEnabled_);
    list.addEventListener('change', irUpdateEditApplyEnabled_);
    pop.style.display = '';
    // Reset search + filter state.
    const search = $('ir-edit-search');
    if (search) { search.value = ''; setTimeout(function () { search.focus(); }, 0); }
    irFilterAgentList_(list, '');
  }

  function irCloseEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    pop.style.display = 'none';
  }

  function irUpdateEditApplyEnabled_() {
    const checked = irGetCheckedAgents_($('ir-edit-list'));
    $('ir-edit-apply-btn').disabled = checked.length === 0;
  }

  function irTogglePopoverAgents_(checked) {
    selectAllActiveAgents_($('ir-edit-list'), checked);
    irUpdateEditApplyEnabled_();
  }

  /**
   * Apply the popover selection: runs the report with the popover's
   * agent list while keeping the existing dept and date range.
   * Also propagates the new selection back into the main form
   * picker so going Back shows the same checkboxes.
   */
  function irApplyEditPopover_() {
    const newAgents = irGetCheckedAgents_($('ir-edit-list'));
    if (!newAgents.length) return;
    irApplyCheckedAgents_($('ir-agent-list'), newAgents);
    irCloseEditPopover_();

    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    // Re-resolve the prior range so re-running from the edit
    // popover keeps the same Compare-with mode as the original
    // Generate. Silent on validation issues -- the original
    // form's Generate path is the place where errors surface.
    const prior = irResolvePriorRange_(from, to);

    const btn = $('ir-edit-apply-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    irSetResultsStatus('loading', 'Refreshing report…');

    const req = { department: dept, from: from, to: to, agents: newAgents };
    if (prior && !prior.error) { req.priorFrom = prior.from; req.priorTo = prior.to; }

    google.script.run
      .withSuccessHandler(function (data) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irSetResultsStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport(req);
  }

  function irActivateChartTab_() {
    const container = $('ir-chart-tabs');
    if (!container) return;
    container.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-tab') === irActiveChartTab;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
      p.style.display = p.getAttribute('data-panel') === irActiveChartTab ? '' : 'none';
    });
  }

  function irRenderSummary(summaryData, teamAvg) {
    const container = $('ir-summary-container');
    if (!container) return;
    const toolbar = $('ir-cards-toolbar');
    // Sort toolbar only makes sense with 2+ cards.
    if (toolbar) toolbar.style.display = (summaryData && summaryData.length > 1) ? '' : 'none';

    // Friendly empty state when no selected agent had any call
    // activity in range. Hides the trend chart trio too since it
    // would just be 12 months of zeros.
    const anyActivity = (summaryData || []).some(function (a) {
      return a.raw.rung > 0 || a.raw.answered > 0 || a.raw.missed > 0;
    });
    if (!anyActivity) {
      container.innerHTML =
        '<div class="ir-empty-card">'
        +   '<div class="ir-empty-icon">&#x1F4ED;</div>'
        +   '<div class="ir-empty-title">No call data for this selection</div>'
        +   '<div class="ir-empty-sub">No rung, answered, or missed calls for the selected '
        +     'agent(s) in this date range. Try broadening the date range or picking '
        +     'different agents.</div>'
        + '</div>';
      const charts = $('ir-charts-container');
      if (charts) charts.style.display = 'none';
      const toggle = $('ir-datalabels-box');
      if (toggle) toggle.style.display = 'none';
      const tabs = $('ir-chart-tabs');
      if (tabs) tabs.style.display = 'none';
      const sharedLegend = $('ir-shared-legend');
      if (sharedLegend) sharedLegend.style.display = 'none';
      return;
    }
    const charts = $('ir-charts-container');
    if (charts) charts.style.display = '';
    const toggle = $('ir-datalabels-box');
    if (toggle) toggle.style.display = '';
    const tabs = $('ir-chart-tabs');
    if (tabs) tabs.style.display = '';

    // KPI-tile layout per agent. Replaces the dense comparison
    // table from Phase 1 with a row of metric tiles (big number,
    // vs-team-avg delta badge, sparkline). Each tile's sparkline
    // is drawn inline from irLastData.trendData -- no extra Chart
    // instances created. Tiles per agent:
    //   Total Rung | Answered | Missed | % Answered | Avg Talk Time
    const priorStatsAvailable = !!(irLastData && irLastData.meta
                                   && irLastData.meta.priorFrom);
    container.innerHTML = irSortSummaryData_(summaryData || []).map(function (agent) {
      const trendForAgent = (irLastData && irLastData.trendData && irLastData.trendData.datasets)
                          ? (irLastData.trendData.datasets[agent.name] || [])
                          : [];
      const safeName = escapeHtml(agent.name);
      const share = agent.share || {};
      const pStats = agent.priorStats;   // may be null when no comparison
      const pRaw   = agent.priorRaw;
      // Render the vs-prior row only when the server supplied
      // priorStats. Pass per-metric formatted strings so the row
      // shows the same precision/unit as the team row.
      const priorRow = function (key, valence) {
        if (!pStats || !pRaw) return '';
        return irPriorRow_(pStats, pRaw[key], agent.raw[key], valence, pStats[key]);
      };
      // Excluded-from-team-avg pill (E4, Phase E). Surfaces when the
      // agent appears in TEAM_AVG_EXCLUDES[dept] so the manager sees
      // why their numbers don't move the team average. INV-26.
      const excludedPill = agent.excludedFromTeamAvg
        ? ' <span class="ir-excluded-pill" title="Per TEAM_AVG_EXCLUDES, this agent\'s numbers are subtracted from BOTH numerator and denominator of the team average (INV-26).">EXCLUDED FROM TEAM AVG</span>'
        : '';
      // Floater QUEUE chip (INV-53 expansion). Only floaters get a
      // chip on the IR card -- roster agents are implicit (no chip
      // would clutter the card). Bare QUEUE for floaters on no
      // roster, QUEUE · <home depts> for multi-rostered floaters.
      // Reuses sourceChipHtml_ from My Dept's Source column path.
      const isFloater = agent.matchedViaQueue && !agent.matchedViaRoster;
      const floaterPill = isFloater ? sourceChipHtml_(agent) : '';
      return '<div class="ir-summary-card">'
           +   '<div class="ir-summary-title">'
           +     safeName
           +     (floaterPill ? ' ' + floaterPill : '')
           +     excludedPill
           +     ' <span class="ir-vs">vs Team Avg'
           +       (priorStatsAvailable ? ' &middot; vs Prior period' : '')
           +     '</span>'
           +     ' <button type="button" class="ir-copy-tsv" data-agent="' + safeName + '">Copy data</button>'
           +   '</div>'
           +   irInsightsBlock_(agent.insights || [])
           +   '<div class="ir-kpi-grid">'
           +     irKpiTile('Total Rung',  agent.stats.rung,     teamAvg.rung,
                            irDiffBadge(agent.raw.rung,     teamAvg.raw.rung,        'pos', 'rung calls'),
                            trendForAgent.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung,
                            share.rung,
                            priorRow('rung', 'pos'))
           +     irKpiTile('Answered',    agent.stats.answered, teamAvg.answered,
                            irDiffBadge(agent.raw.answered, teamAvg.raw.answered,    'pos', 'answered calls'),
                            trendForAgent.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered,
                            share.answered,
                            priorRow('answered', 'pos'))
           +     irKpiTile('Missed (rings)', agent.stats.missed, teamAvg.missed,
                            irDiffBadge(agent.raw.missed,   teamAvg.raw.missed,      'neg', 'missed calls'),
                            trendForAgent.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed,
                            share.missed,
                            priorRow('missed', 'neg'))
           +     irKpiTile('% Answered',  agent.stats.pct,      teamAvg.pct,
                            irDiffBadge(agent.raw.pct,      teamAvg.raw.pctAnswered, 'pos', '% answered'),
                            trendForAgent.map(function (x) { return x.pct; }),      (THEME.accent || '#4E79A7'),
                            null,
                            priorRow('pct', 'pos'))
           +     irKpiTile('Avg talk (per call)', agent.stats.att, teamAvg.att,
                            irAttCompare(agent.raw.att, teamAvg.raw.att),
                            trendForAgent.map(function (x) { return x.att; }),      (THEME.muted || '#9C755F'),
                            null,
                            priorRow('att', 'neu'))
           +   '</div>'
           + '</div>';
    }).join('');

    // Wire copy-data-as-TSV buttons (re-attaches every render; OK
    // since `container.innerHTML` wipes the previous handlers too).
    container.querySelectorAll('.ir-copy-tsv').forEach(function (b) {
      b.addEventListener('click', function () {
        // Build TSV from the card's KPI tiles: header + value rows.
        const card = b.closest('.ir-summary-card');
        if (!card) return;
        const rows = [];
        rows.push(['Metric', 'Agent', 'Team Avg', '% of Dept'].join('\t'));
        card.querySelectorAll('.ir-kpi-tile').forEach(function (tile) {
          const label = (tile.querySelector('.ir-kpi-label') || {}).textContent || '';
          const value = (tile.querySelector('.ir-kpi-value') || {}).textContent || '';
          const team  = (tile.querySelector('.ir-kpi-team')  || {}).textContent || '';
          const shareEl = tile.querySelector('.ir-kpi-share');
          const share = shareEl
            ? shareEl.textContent.replace(/\s*of\s+dept\s*$/i, '').trim()
            : '';
          rows.push([
            label.trim(),
            value.trim(),
            team.replace(/^Team\s*/i, '').trim(),
            share,
          ].join('\t'));
        });
        const tsv = rows.join('\n') + '\n';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(tsv).then(function () { irFlashButton(b, 'Copied'); });
        }
      });
    });
  }

  /**
   * Returns summaryData reordered per irSortOrder. "selection"
   * preserves the order the server sent (which mirrors the order
   * the user checked agents in the picker). Other keys sort by
   * the corresponding numeric field on each agent's raw stats.
   */
  function irSortSummaryData_(summaryData) {
    if (!Array.isArray(summaryData) || summaryData.length < 2) return summaryData;
    if (irSortOrder === 'selection') return summaryData;
    const out = summaryData.slice();
    if (irSortOrder === 'name') {
      out.sort(function (a, b) {
        const an = (a.name || '').toLowerCase();
        const bn = (b.name || '').toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      });
    } else if (irSortOrder === 'answered-desc') {
      out.sort(function (a, b) { return (b.raw.answered || 0) - (a.raw.answered || 0); });
    } else if (irSortOrder === 'answered-asc') {
      out.sort(function (a, b) { return (a.raw.answered || 0) - (b.raw.answered || 0); });
    } else if (irSortOrder === 'pct-desc') {
      out.sort(function (a, b) { return (b.raw.pct || 0) - (a.raw.pct || 0); });
    }
    return out;
  }

  /**
   * Single KPI tile markup. `sparklineData` is a numeric array;
   * `sparklineColor` is a hex. `share` is an optional pre-formatted
   * "X.X%" string -- when present (volume tiles only), shown as a
   * small "X.X% of dept" tag inline with the value to communicate
   * this agent's portion of the dept's total volume.
   */
  function irKpiTile(label, value, teamVal, diffBadgeHtml, sparklineData, sparklineColor, share, priorHtml) {
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    const shareHtml = share
      ? '<span class="ir-kpi-share" title="Share of dept volume in range">'
        + escapeHtml(String(share)) + ' of dept</span>'
      : '';
    return '<div class="ir-kpi-tile">'
         +   '<div class="ir-kpi-row-top">'
         +     '<div class="ir-kpi-label">' + label + '</div>'
         +     '<div class="ir-kpi-spark">' + spark + '</div>'
         +   '</div>'
         +   '<div class="ir-kpi-value-row">'
         +     '<div class="ir-kpi-value' + benchValueCls_(label, value) + '">' + escapeHtml(String(value)) + '</div>'
         +     shareHtml
         +   '</div>'
         +   '<div class="ir-kpi-row-bot">'
         +     '<span class="ir-kpi-team">Team ' + escapeHtml(String(teamVal)) + '</span>'
         +     diffBadgeHtml
         +   '</div>'
         +   (priorHtml || '')
         + '</div>';
  }

  /**
   * Per-tile "vs prior" delta line, rendered below the team-vs row
   * when summaryData.priorStats is present. Same valence model as
   * irDiffBadge: 'pos' = higher is better, 'neg' = lower is better,
   * 'neu' = direction-ambiguous (TTT/ATT). Returns empty string if
   * priorRaw is null/undefined.
   */
  function irPriorRow_(priorStats, priorVal, currVal, type, displayPrior) {
    if (!priorStats) return '';
    const prev = Number(priorVal) || 0;
    const cur  = Number(currVal)  || 0;
    if (prev === 0 && cur === 0) {
      return '<div class="ir-kpi-row-prior">'
           +   '<span class="ir-kpi-team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
           +   '<span class="ir-badge ir-badge-neu">-</span>'
           + '</div>';
    }
    let cls = 'ir-badge-neu';
    let label;
    if (type === 'neu') {
      // Direction-ambiguous metric (ATT / TTT). Show signed pct but
      // don't colorize as good/bad.
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    } else {
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
      if (type === 'pos') {
        if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
      } else if (type === 'neg') {
        if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
      }
    }
    return '<div class="ir-kpi-row-prior">'
         +   '<span class="ir-kpi-team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
         +   '<span class="ir-badge ' + cls + '">' + label + '</span>'
         + '</div>';
  }

  /**
   * Renders the per-agent insights callout. Each insight is an
   * object { type, text } where type is "positive" | "negative" |
   * "neutral" -- shown as a colored circular marker before the
   * text so managers can scan the list at a glance:
   *
   *   blue  up arrow   : favorable comparison (positive)
   *   orange down arrow: unfavorable comparison (negative)
   *   grey  bullet     : direction-ambiguous (neutral, e.g. ATT)
   *
   * Returns empty string when there are no insights so empty
   * callout boxes never appear.
   */
  function irInsightsBlock_(insights) {
    if (!insights || !insights.length) return '';
    const items = insights.map(function (item) {
      // Accept legacy v3 string-form for cache transition safety.
      const type = (item && item.type) || 'neutral';
      const text = (item && item.text)
        ? item.text
        : (typeof item === 'string' ? item : '');
      const mark = type === 'positive' ? '↑'    // up arrow
                 : type === 'negative' ? '↓'    // down arrow
                 : '•';                          // bullet
      return '<li class="ir-insight-item">'
           +   '<span class="ir-insight-mark ir-insight-mark-' + type + '" aria-hidden="true">'
           +     mark
           +   '</span>'
           +   '<span class="ir-insight-text">' + escapeHtml(text) + '</span>'
           + '</li>';
    }).join('');
    return '<div class="ir-insights">'
         +   '<div class="ir-insights-label">Insights</div>'
         +   '<ul class="ir-insights-list">' + items + '</ul>'
         + '</div>';
  }

  /**
   * Inline SVG sparkline (no Chart.js dependency, no extra Chart
   * instances). Returns the SVG markup as a string ready for
   * innerHTML. Renders a 70x22 stroke with subtle area fill below;
   * collapses to a flat baseline if all values are 0.
   */
  function irSparkline_(values, color) {
    const W = 70, H = 22;
    const n = (values || []).length;
    if (n < 2) {
      return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '"></svg>';
    }
    let min = Infinity, max = -Infinity;
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    if (!isFinite(min) || !isFinite(max)) { min = 0; max = 0; }
    const range = max - min;
    const xStep = W / (n - 1);
    const pad = 2;
    const innerH = H - pad * 2;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      const y = range === 0
        ? H / 2
        : pad + innerH - ((v - min) / range) * innerH;
      pts.push((i * xStep).toFixed(1) + ',' + y.toFixed(1));
    }
    const linePath = 'M' + pts.join(' L');
    const areaPath = linePath
                   + ' L' + ((n - 1) * xStep).toFixed(1) + ',' + H
                   + ' L0,' + H + ' Z';
    return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
         +   '<path d="' + areaPath + '" fill="' + color + '" fill-opacity="0.15" stroke="none"/>'
         +   '<path d="' + linePath + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
         + '</svg>';
  }

  function irFlashButton(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    setTimeout(function () { btn.textContent = prev; }, 1000);
  }

  function irDiffBadge(agentVal, teamVal, type, metricLabel) {
    // type: 'pos' = higher is better (Rung, Answered, % Answered).
    //       'neg' = lower is better (Missed).
    if (!teamVal) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentVal - teamVal) / teamVal) * 100;
    const label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    let cls = 'ir-badge-neu';
    if (type === 'pos') {
      if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
    } else if (type === 'neg') {
      if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
    }
    // Plain-English explainer for screen readers + hover -- the colored
    // badge alone doesn't say which direction is good for this metric.
    const metric = metricLabel ? ' for ' + metricLabel : '';
    const where = pct === 0 ? 'matches the team average'
      : Math.abs(pct).toFixed(1) + '% ' + (pct > 0 ? 'above' : 'below') + ' the team average';
    const valence = type === 'pos' ? 'Higher is better.'
                  : type === 'neg' ? 'Lower is better.' : '';
    const explain = escapeHtml((where + metric + '. ' + valence).trim());
    return '<span class="ir-badge ' + cls + '" title="' + explain
         + '" aria-label="' + explain + '">' + label + '</span>';
  }

  function irAttCompare(agentAtt, teamAtt) {
    // ATT is reported as "> Avg / < Avg (+x.x%)" since neither
    // direction is unambiguously "better" -- shorter ATT can mean
    // efficiency, longer can mean more thorough service. Neutral
    // styling.
    if (!teamAtt) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentAtt - teamAtt) / teamAtt) * 100;
    const sign = agentAtt > teamAtt ? '> Avg' : '< Avg';
    const explain = escapeHtml('Average talk time is ' + Math.abs(pct).toFixed(1) + '% '
      + (agentAtt > teamAtt ? 'longer' : 'shorter')
      + ' than the team average. Neither direction is automatically better — longer can mean more thorough service.');
    return '<span class="ir-badge ir-badge-neu" title="' + explain + '" aria-label="' + explain + '">'
         + sign + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(1) + '%)'
         + '</span>';
  }

  /**
   * Defensive cleanup: destroys any Chart.js instance currently
   * attached to the given canvas id, regardless of whether it's
   * tracked in our own *ChartInstances arrays. Necessary because
   * a previous render that crashed mid-construction may have
   * left an orphaned chart bound to the canvas, which Chart.js
   * refuses to overwrite ("Canvas is already in use").
   */
  function destroyOrphanedChartOnCanvas_(canvasId) {
    if (typeof Chart === 'undefined' || !Chart.getChart) return;
    const cvs = document.getElementById(canvasId);
    if (!cvs) return;
    try {
      const existing = Chart.getChart(cvs);
      if (existing) existing.destroy();
    } catch (e) { /* ignore */ }
  }

  function irRenderCharts(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late (slow CSS / font load) reach Chart.defaults
    // before the first chart is instantiated.
    refreshChartTheme();
    // Destroy old charts to avoid Chart.js leaks / canvas reuse errors.
    irChartInstances.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    irChartInstances = [];
    // Sweep up any orphans left by a partial-crash on the previous render.
    ['ir-vol-chart', 'ir-eff-chart', 'ir-dur-chart'].forEach(destroyOrphanedChartOnCanvas_);

    // Reveal every chart panel temporarily so each canvas has
    // non-zero dimensions at Chart.js instantiation time. Without
    // this, charts created in display:none panels come up 0x0 and
    // never recover when their tab is clicked. Restore visibility
    // at the end (active tab visible, others hidden).
    const irPanels = Array.prototype.slice.call(
      document.querySelectorAll('#ir-charts-container [data-panel]'));
    const irSavedDisplays = irPanels.map(function (p) { return p.style.display; });
    irPanels.forEach(function (p) { p.style.display = ''; });

    const showLabels = $('ir-show-datalabels') && $('ir-show-datalabels').checked;
    const labels   = data.trendData.labels || [];
    const datasets = data.trendData.datasets || {};
    const agents   = Object.keys(datasets);
    if (!agents.length) return;

    // Build dataset descriptors with a `hexColor` field; the chart
    // factory wires up gradient fill callbacks per-dataset against
    // that color (so single-agent views feel less spartan). The
    // `_irAgent` tag lets the shared comparison-mode legend find a
    // given agent's dataset across all three charts.
    const makeDs = function (label, vals, hex, opts) {
      const o = opts || {};
      return {
        label: label,
        data: vals,
        borderColor: hex,
        backgroundColor: hex,
        hexColor: hex,
        _irAgent: o.agent || null,
        tension: 0.4,
        fill: o.fill !== false,
        pointBackgroundColor: hex,
        pointBorderColor: THEME.paperCard,
        pointBorderWidth: 1.5,
        pointRadius: 3,
        pointHoverRadius: 5,
      };
    };

    // Volume chart: in individual mode show Rung/Answered/Missed for
    // the single agent; in comparison mode show each agent's Answered.
    const volData = [];
    if (data.mode === 'individual') {
      const d = datasets[agents[0]];
      volData.push(makeDs('Total Rung', d.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung));
      volData.push(makeDs('Answered',   d.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered));
      volData.push(makeDs('Missed',     d.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed));
    } else {
      agents.forEach(function (ag, i) {
        const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
        volData.push(makeDs(ag + ' (Ans)',
                            datasets[ag].map(function (x) { return x.answered; }),
                            color, { agent: ag }));
      });
    }
    irCreateChart($('ir-vol-chart'), 'Call Volume', labels, volData,
                  { isPercent: false, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Efficiency chart: % Answered per agent + a 95% goal line.
    const effData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' %',
                    datasets[ag].map(function (x) { return Number(x.pct.toFixed(1)); }),
                    color, { agent: ag });
    });
    effData.push({
      label: 'Goal', data: new Array(labels.length).fill(95),
      borderColor: THEME.muted, borderDash: [4, 4], pointRadius: 0,
      fill: false, tension: 0, hexColor: THEME.muted, _irAgent: null,
    });
    irCreateChart($('ir-eff-chart'), '% Answered', labels, effData,
                  { isPercent: true, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Duration chart: ATT in minutes (legacy converts seconds -> minutes).
    const durData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' ATT',
                    datasets[ag].map(function (x) { return Number((x.att / 60).toFixed(2)); }),
                    color, { agent: ag });
    });
    irCreateChart($('ir-dur-chart'), 'Avg Talk Time', labels, durData,
                  { isPercent: false, isTimeMinutes: true, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    irRenderSharedLegend(data, agents);

    // Restore panel visibility so only the active tab shows. The
    // charts in the just-hidden panels keep their layout state
    // (computed during the brief reveal above) and re-paint
    // correctly when their tab is clicked.
    irPanels.forEach(function (p, i) { p.style.display = irSavedDisplays[i]; });
  }

  /**
   * Single legend rendered ABOVE the chart-tab container in
   * comparison mode (>1 agent). Clicking a chip toggles that
   * agent's series visibility across all three charts; hovering
   * highlights it across all three.
   *
   * In individual mode the shared legend is hidden -- the volume
   * chart's three series (Rung/Answered/Missed) are unambiguous
   * via their colored title legend within the chart itself, and
   * Eff/Dur each have a single series.
   */
  function irRenderSharedLegend(data, agents) {
    const el = $('ir-shared-legend');
    if (!el) return;
    if (data.mode !== 'comparison' || !agents.length) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    const chips = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      const safe = escapeHtml(ag);
      return '<button type="button" class="ir-legend-chip" data-agent="' + safe + '" '
           + 'title="Click to isolate · Shift+click to hide" '
           + 'style="--chip-color: ' + color + ';">'
           +   '<span class="ir-legend-swatch"></span>'
           +   '<span class="ir-legend-name">' + safe + '</span>'
           + '</button>';
    }).join('');
    el.innerHTML = chips;
    el.style.display = '';
    irPinnedAgent = null;   // fresh legend -> no pin

    el.querySelectorAll('.ir-legend-chip').forEach(function (chip) {
      const agent = chip.getAttribute('data-agent');
      // Plain click = pin/isolate (persistent spotlight), matching the
      // Overview chart. Shift+click = hide/show this agent's series (the
      // legacy toggle). Click the pinned chip again (or another) to
      // release/switch the isolate.
      chip.addEventListener('click', function (ev) {
        if (ev.shiftKey) {
          const willHide = !chip.classList.contains('inactive');
