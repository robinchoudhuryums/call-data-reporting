<script>
(function () {
  'use strict';

  // -- Dark mode toggle (Step 1 of the Call-Analyzer visual parity work).
  // Reads persisted preference and wires the header button. Runs before
  // any other UI setup so the page paints in the right mode immediately.
  // The script.html include sits at the end of <body>, so #mode-btn and
  // document.body are already in the DOM when this executes.
  (function initModeToggle() {
    const MODE_KEY = 'dash-mode';
    let saved = null;
    try { saved = localStorage.getItem(MODE_KEY); } catch (e) {}
    // An explicit saved choice always wins; otherwise fall back to the
    // OS color-scheme so system-dark users land in dark on first load.
    let initial;
    if (saved === 'dark' || saved === 'light') {
      initial = saved;
    } else {
      const prefersDark = window.matchMedia
        && window.matchMedia('(prefers-color-scheme: dark)').matches;
      initial = prefersDark ? 'dark' : 'light';
    }
    if (initial === 'dark') document.body.dataset.mode = 'dark';

    const btn = document.getElementById('mode-btn');
    if (!btn) return;
    const render = () => {
      const dark = document.body.dataset.mode === 'dark';
      btn.textContent = dark ? '☀' : '◐';
      btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
      btn.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
      // Background-theme chips only affect light mode; grey them out +
      // make them inert while dark mode is on (the dark tokens win).
      const grid = document.getElementById('theme-chip-grid');
      if (grid) grid.classList.toggle('theme-grid-disabled', dark);
    };
    render();
    btn.addEventListener('click', () => {
      const dark = document.body.dataset.mode === 'dark';
      if (dark) delete document.body.dataset.mode;
      else document.body.dataset.mode = 'dark';
      try { localStorage.setItem(MODE_KEY, dark ? 'light' : 'dark'); } catch (e) {}
      render();
      // Notify the Chart.js theme bridge so its next render uses the
      // new tokens. Already-mounted charts keep their pixels until
      // they're rebuilt.
      window.dispatchEvent(new Event('dash-mode-change'));
    });
  })();

  // -- Background-theme settings ---------------------------------------
  // Personal-preference theme picker (Warm / Cool / Clinical) lives in
  // the Settings modal. Persisted to localStorage; applied via a
  // data-theme attribute on body so the CSS token overrides cascade
  // without any per-selector code changes. Runs at module-load time
  // so the saved theme is applied before any rendering happens; the
  // modal wiring is hooked up later from init() once the DOM is
  // settled.
  (function initThemePreference_() {
    const KEY = 'dash-theme.v1';
    let saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    // First-time visitors land on cool; explicit saved preferences
    // (including 'warm') are preserved untouched.
    const initial = (saved === 'warm' || saved === 'cool' || saved === 'clinical')
      ? saved : 'cool';
    if (initial !== 'warm') document.body.dataset.theme = initial;
    // Expose globally so the Settings modal init can read/write
    // without re-parsing storage.
    window.__themePref = {
      get: function () {
        return (document.body.dataset.theme === 'cool' ||
                document.body.dataset.theme === 'clinical')
          ? document.body.dataset.theme : 'warm';
      },
      set: function (theme) {
        if (theme === 'cool' || theme === 'clinical') {
          document.body.dataset.theme = theme;
        } else {
          delete document.body.dataset.theme;
          theme = 'warm';
        }
        try { localStorage.setItem(KEY, theme); } catch (e) {}
        // Tell chart renderers their tokens shifted so newly-built
        // charts use the right palette.
        window.dispatchEvent(new Event('dash-mode-change'));
      },
    };
  })();

  // window.__USER__ is injected by the dashboard template.
  const USER = window.__USER__ || { role: 'none', email: '', department: null, departments: [] };

  // -- Chart.js theme bridge (Step 4 of the Call-Analyzer visual parity).
  // Reads the same CSS custom properties styles.html publishes and applies
  // them to Chart.defaults so every Chart() instance picks up the slate
  // palette + Inter / IBM Plex Mono typography without per-chart wiring.
  // Resolved values are also exposed via THEME for the few sites that
  // need to set dataset/datalabel colors explicitly.
  // Toggling dark mode mid-session re-reads these tokens (see the
  // dash-mode-change listener below). The always-on Overview trend
  // chart is repainted live via repaintLiveCharts_; modal charts
  // rebuild on reopen and pick up the new values then.
  const THEME = {
    paper: '', paperCard: '', paper2: '',
    ink: '',   muted: '',     line: '',
    accent: '', accentSoft: '',
    good: '',   goodSoft: '',
    warn: '',   warnSoft: '',
  };
  function refreshChartTheme() {
    const css = getComputedStyle(document.body);
    // Resolve each CSS custom property to a canvas-canonical
    // form (#rrggbb / rgba(...)) so downstream Chart.js +
    // chartjs-plugin-datalabels code never has to handle OKLCH
    // -- some sub-paths in the plugin choke on OKLCH (silent
    // failures: text rendered with empty fillStyle = invisible
    // labels) even though core Chart.js does support it.
    const read = function (name) {
      const raw = (css.getPropertyValue(name) || '').trim();
      return raw ? colorToCanvasRgb_(raw) : '';
    };
    // Read into a local first; only commit to THEME / Chart.defaults
    // if the CSS variables actually resolved. If we run before the
    // browser has fully computed styles (rare but seen in field),
    // the reads return empty strings and would otherwise overwrite
    // Chart.defaults with '' -- silently breaking scale rendering
    // on bar / line charts (doughnut is unaffected because it has
    // no scales).
    const newValues = {
      paper:      read('--paper'),      paperCard:  read('--paper-card'),
      paper2:     read('--paper-2'),    ink:        read('--ink'),
      muted:      read('--muted'),      line:       read('--line'),
      accent:     read('--accent'),     accentSoft: read('--accent-soft'),
      good:       read('--good'),       goodSoft:   read('--good-soft'),
      warn:       read('--warn'),       warnSoft:   read('--warn-soft'),
    };
    // Commit only the non-empty values. THEME keeps any prior good
    // values across re-runs.
    Object.keys(newValues).forEach(function (k) {
      if (newValues[k]) THEME[k] = newValues[k];
    });

    if (typeof Chart === 'undefined') return;
    // Skip Chart.defaults pollution if the critical theme values
    // didn't resolve. Chart.js library defaults are perfectly
    // serviceable; better that than empty-string color props that
    // can make scale-based charts vanish.
    if (!THEME.muted || !THEME.line || !THEME.paperCard) return;

    const FONT_MONO = "'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
    const FONT_DISPLAY = "'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif";
    Chart.defaults.font.family = FONT_MONO;
    Chart.defaults.font.size = 10.5;
    Chart.defaults.color = THEME.muted;
    Chart.defaults.borderColor = THEME.line;
    // Per-scale-type defaults (Chart.js v4): grid lines + tick color
    ['linear', 'category', 'time', 'logarithmic'].forEach(function (k) {
      const s = Chart.defaults.scales && Chart.defaults.scales[k];
      if (!s) return;
      if (s.grid)   s.grid.color   = THEME.line;
      if (s.border) s.border.color = THEME.line;
      if (s.ticks)  s.ticks.color  = THEME.muted;
    });
    const radial = Chart.defaults.scales && Chart.defaults.scales.radialLinear;
    if (radial) {
      if (radial.grid)        radial.grid.color        = THEME.line;
      if (radial.angleLines)  radial.angleLines.color  = THEME.line;
      if (radial.pointLabels) radial.pointLabels.color = THEME.muted;
      if (radial.ticks)       radial.ticks.color       = THEME.muted;
    }
    // Tooltip — paper-card panel with ink text, mono body, display title.
    // O2: translucent so chart lines behind it stay legible (the Overview
    // trend chart's tooltip used to fully occlude the lines). Alpha lowered
    // 0.92 -> 0.6 so trend lines read through the card (the 1px border +
    // ink text keep it legible on the paper theme).
    const tt = Chart.defaults.plugins.tooltip;
    tt.backgroundColor = (typeof rgbaWithAlpha_ === 'function')
      ? rgbaWithAlpha_(THEME.paperCard, 0.6) : THEME.paperCard;
    tt.titleColor      = THEME.ink;
    tt.bodyColor       = THEME.ink;
    tt.borderColor     = THEME.line;
    tt.borderWidth     = 1;
    tt.cornerRadius    = 2;
    tt.padding         = 8;
    tt.titleFont       = { family: FONT_DISPLAY, size: 12, weight: '500' };
    tt.bodyFont        = { family: FONT_MONO,    size: 11 };
    tt.boxPadding      = 4;
    // Legend — muted mono labels (matches the kicker rhythm)
    const lg = Chart.defaults.plugins.legend.labels;
    lg.color = THEME.muted;
    lg.font  = { family: FONT_MONO, size: 10 };
    // Title (used by IR charts' chartHeader)
    if (Chart.defaults.plugins.title) {
      Chart.defaults.plugins.title.color = THEME.muted;
      Chart.defaults.plugins.title.font  = { family: FONT_MONO, size: 11, weight: '500' };
    }
  }
  refreshChartTheme();
  // Hook the dark-mode toggle wiring above so charts pick up the
  // inverted palette. The always-on Overview trend chart is repainted
  // live (repaintLiveCharts_); modal charts rebuild on reopen and pick
  // up the new palette then.
  window.addEventListener('dash-mode-change', function () {
    refreshChartTheme();
    IR_CHART_COLORS = irChartColors_();
    IR_VOLUME_COLORS = irVolumeColors_();
    repaintLiveCharts_();
  });

  // Re-render charts that are visible RIGHT NOW so a dark-mode toggle
  // doesn't leave stale light-mode pixels. Only the Overview trend
  // chart is always-on; modal charts repaint on reopen and are skipped.
  // Re-invokes the existing builder with the last payload (ovLastData)
  // so dataset colors are recomputed from THEME / the harmonized ramp.
  function repaintLiveCharts_() {
    if (document.body.getAttribute('data-page') === 'overview'
        && typeof ovLastData !== 'undefined' && ovLastData && ovLastData.depts) {
      ovRenderChart_(ovLastData);
    }
  }

  // -- chartjs-plugin-datalabels global registration ------------------
  // Chart.js v4 requires explicit registration -- the auto-registration
  // the plugin did via script tag was a v3 behavior that v4 dropped.
  // Without this, per-chart `plugins: [ChartDataLabels]` references
  // sometimes work and sometimes don't (we suspect a load-order quirk
  // in the Apps Script HtmlService environment).  Registering globally
  // here is belt-and-suspenders; idempotent via the registry check.
  // Charts that DON'T want labels (Missed Calls radar, Overview multi-
  // line) opt out via `options.plugins.datalabels = { display: false }`.
  (function registerChartDataLabels_() {
    if (typeof Chart === 'undefined' || typeof ChartDataLabels === 'undefined') return;
    try {
      if (Chart.registry && Chart.registry.plugins
          && Chart.registry.plugins.get && Chart.registry.plugins.get('datalabels')) {
        return;   // already registered
      }
      Chart.register(ChartDataLabels);
      // Plugin defaults to display=false starting in v1.0.0. Enable
      // globally; per-chart `display: ...` settings still override
      // (Missed Calls radar + Overview trend opt out via
      // `options.plugins.datalabels.display = false`).
      try {
        if (!Chart.defaults.plugins) Chart.defaults.plugins = {};
        if (!Chart.defaults.plugins.datalabels) Chart.defaults.plugins.datalabels = {};
        Chart.defaults.plugins.datalabels.display = true;
      } catch (e2) { /* defaults not ready; per-chart display still works */ }
    } catch (e) { /* ignore -- fall back to per-chart `plugins` option */ }
  })();

  // R7 (O-2): smooth chart animations, globally. One default -- 400ms
  // easeOutQuart on create/update -- honoring prefers-reduced-motion (falls
  // back to Chart.js-off, the established reduced-motion discipline). The
  // spotlight/pin interactions stay instant (they call update('none'));
  // per-chart `animation:` options would still win but the old blanket
  // `animation: false` opt-outs were removed with this change.
  (function setChartAnimationDefaults_() {
    if (typeof Chart === 'undefined') return;
    try {
      var reduce = false;
      try { reduce = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); } catch (e2) {}
      Chart.defaults.animation = reduce ? false : { duration: 400, easing: 'easeOutQuart' };
    } catch (e) { /* animations are polish -- never block chart setup */ }
  })();

  // O2: register the "topBand" tooltip positioner once at load. It pins the
  // tooltip to the TOP of the plot area instead of the default 'average'
  // (centered over the hovered index, occluding the lines). Opt-in per chart
  // via options.plugins.tooltip.position='topBand' (the Overview trend chart).
  // Guarded -- Chart.Tooltip may be absent in a partial build; consumers fall
  // back to the default position when the positioner is missing.
  (function registerTopBandPositioner_() {
    try {
      if (typeof Chart !== 'undefined' && Chart.Tooltip && Chart.Tooltip.positioners
          && !Chart.Tooltip.positioners.topBand) {
        Chart.Tooltip.positioners.topBand = function (elements, eventPosition) {
          const ca = this.chart && this.chart.chartArea;
          if (!ca) return eventPosition;
          return { x: eventPosition.x, y: ca.top + 6 };
        };
      }
    } catch (e) { /* positioner optional */ }
  })();

  // Graceful fallback when the Chart.js CDN fails to load (Part 4).
  // Common path is provably unchanged: when Chart is defined this is a
  // transparent pass-through to `new Chart(target, config)`. ONLY when
  // the global is missing (blocked/failed CDN, SRI mismatch) do we hide
  // the canvas and drop an inline "chart unavailable" note in its place.
  // Scoped to the CDN-absent case only -- it does NOT try/catch per-chart
  // render errors (that would change control flow on the happy path).
  function safeChart_(target, config) {
    if (typeof Chart !== 'undefined') return new Chart(target, config);
    try { chartUnavailable_(target); } catch (e) { /* best-effort */ }
    return null;
  }

  // `target` is either a 2d context (has .canvas) or a canvas element.
  function chartUnavailable_(target) {
    var canvas = target && target.canvas ? target.canvas
               : (target && target.tagName === 'CANVAS' ? target : null);
    if (!canvas || !canvas.parentNode) return;
    canvas.style.display = 'none';
    var sib = canvas.nextElementSibling;
    if (sib && sib.classList && sib.classList.contains('ds-chart-unavailable')) return; // idempotent
    var note = document.createElement('div');
    note.className = 'ds-note ds-chart-unavailable';
    note.textContent = 'Chart unavailable — the charting library could not load. '
      + 'The numbers above are unaffected; try reloading the page.';
    canvas.parentNode.insertBefore(note, canvas.nextSibling);
  }

  const state = {
    rows: [],
    totals: null,
    meta: null,
    qcd: null,   // Batch D: the dept QCD snapshot (data.qcd) -- team-strip range tiles read state.qcd.range
    diagnostics: null,
    sortKey: 'answerRate',   // default sort: the stacked Answered/Missed bar
    sortDir: 'asc',          // 'asc' | 'desc' -- asc => worst answer rate first
    // Scope: server is locked to 'both' since the Phase D toggle
    // removal cleanup. Internal `computeSummary_` still accepts
    // a scope arg (Digest.gs uses 'roster') but the public RPC
    // doesn't expose it -- the client just doesn't pass it.
  };

  // -- Modal drag & resize --------------------------------------------------
  function initModalDragResize_(panel) {
    if (window.innerWidth < 768) return;
    var header = panel.querySelector('.modal-panel-header');
    if (!header) return;

    // F-39: this runs on EVERY openModal of every modal, and each call used
    // to stack fresh document-level mousemove/mouseup + header mousedown
    // listeners that were never removed -- unbounded growth in a long-lived
    // auto-refreshing page. Shared per-panel state + wire-once for
    // everything EXCEPT the resize handle, which resetModalTransform_
    // REMOVES on close, so its mousedown re-wires per (re)creation.
    var st = panel._dragState || (panel._dragState = {
      dragging: false, resizing: false,
      startX: 0, startY: 0, startLeft: 0, startTop: 0, startW: 0, startH: 0,
    });

    function applyTransform() {
      panel.style.position = 'absolute';
      panel.style.margin = '0';
    }

    // Add resize handle if not present + wire its mousedown (per-creation).
    if (!panel.querySelector('.modal-resize-handle')) {
      var rh = document.createElement('div');
      rh.className = 'modal-resize-handle';
      rh.setAttribute('aria-hidden', 'true');
      panel.appendChild(rh);
      rh.addEventListener('mousedown', function (e) {
        e.preventDefault(); e.stopPropagation();
        st.resizing = true;
        st.startX = e.clientX; st.startY = e.clientY;
        var rect = panel.getBoundingClientRect();
        st.startW = rect.width; st.startH = rect.height;
        st.startLeft = rect.left; st.startTop = rect.top;
        applyTransform();
      });
    }

    if (panel._dragResizeWired) return;
    panel._dragResizeWired = true;

    // Drag via header (once per panel)
    header.addEventListener('mousedown', function (e) {
      if (e.target.closest('.modal-close') || e.target.closest('button') || e.target.closest('a')) return;
      e.preventDefault();
      st.dragging = true;
      var rect = panel.getBoundingClientRect();
      st.startX = e.clientX; st.startY = e.clientY;
      st.startLeft = rect.left; st.startTop = rect.top;
      applyTransform();
    });

    document.addEventListener('mousemove', function (e) {
      if (st.dragging) {
        var dx = e.clientX - st.startX, dy = e.clientY - st.startY;
        panel.style.left = Math.max(0, st.startLeft + dx) + 'px';
        panel.style.top  = Math.max(0, st.startTop + dy) + 'px';
      } else if (st.resizing) {
        var w = Math.max(360, st.startW + (e.clientX - st.startX));
        var h = Math.max(280, st.startH + (e.clientY - st.startY));
        panel.style.width    = w + 'px';
        panel.style.maxWidth = w + 'px';
        panel.style.height    = h + 'px';
        panel.style.maxHeight = h + 'px';
        panel.style.left = st.startLeft + 'px';
        panel.style.top  = st.startTop + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      st.dragging = false; st.resizing = false;
    });
  }

  function resetModalTransform_(panel) {
    panel.style.position = '';
    panel.style.left = ''; panel.style.top = '';
    panel.style.width = ''; panel.style.maxWidth = '';
    panel.style.height = ''; panel.style.maxHeight = '';
    panel.style.margin = '';
    var rh = panel.querySelector('.modal-resize-handle');
    if (rh) rh.remove();
  }

  // -- Modal focus trap -----------------------------------------------------
  var activeFocusTrap_ = null;
  function trapFocus_(modal) {
    releaseFocus_();
    var FOCUSABLE = 'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';
    function handler(e) {
      if (e.key !== 'Tab') return;
      var els = modal.querySelectorAll(FOCUSABLE);
      if (!els.length) return;
      var first = els[0], last = els[els.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    }
    modal.addEventListener('keydown', handler);
    activeFocusTrap_ = { modal: modal, handler: handler };
    var first = modal.querySelector(FOCUSABLE);
    if (first) setTimeout(function () { first.focus(); }, 0);
  }
  function releaseFocus_() {
    if (!activeFocusTrap_) return;
    activeFocusTrap_.modal.removeEventListener('keydown', activeFocusTrap_.handler);
    activeFocusTrap_ = null;
  }

  // -- Formatting helpers --------------------------------------------------

  function pad2(n) { return String(n).padStart(2, '0'); }

  function fmtDuration(seconds) {
    seconds = Math.max(0, Math.round(Number(seconds) || 0));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return h + ':' + pad2(m) + ':' + pad2(s);
  }

  function fmtNumber(n) {
    n = Number(n) || 0;
    return n.toLocaleString('en-US');
  }

  // Wraps a zero value so dense tables can mute it -- a column of 0 /
  // 0:00:00 cells reads as "mostly quiet" rather than a wall of numbers.
  // HTML-only (table cells); CSV + chart labels never pass through here.
  function zeroCell_(s) { return '<span class="cell-zero">' + s + '</span>'; }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Shared empty-state block so every "no data here" surface reads the
  // same way as the My Department page's empty state (icon + title +
  // hint) instead of ad-hoc one-liners. `icon` is a short emoji/glyph;
  // title + hint are escaped. Reuses the existing .empty-state CSS.
  function emptyStateHtml_(icon, title, hint) {
    return '<div class="empty-state">'
      +   '<div class="empty-state-icon" aria-hidden="true">' + (icon || '&#128202;') + '</div>'
      +   '<div class="empty-state-title">' + escapeHtml(title || 'No data') + '</div>'
      +   (hint ? '<div class="empty-state-hint">' + escapeHtml(hint) + '</div>' : '')
      + '</div>';
  }

  // CSV formula-injection guard. Excel / Google Sheets treat a cell
  // beginning with = + - @ (or a leading tab / CR) as a formula. Agent
  // names flow in from the external CDR feed, so a crafted name like
  // "=HYPERLINK(...)" would execute when a manager opens an exported
  // CSV. Prefix such values with a single quote so the spreadsheet app
  // forces them to plain text. Plain numbers (incl. negative / decimal)
  // are left untouched so numeric columns aren't corrupted. Call this
  // BEFORE the RFC-4180 quote-escaping (comma/quote/newline) in every
  // CSV cell writer.
  function csvSafeCell_(v) {
    var s = String(v == null ? '' : v);
    // Prefix only genuine formula text. The numeric-ish exclusion keeps
    // server-computed cells intact -- signed deltas ("+5.0%", "-12.3 pts"),
    // durations ("0:03:01"), and thousands-separated counts ("1,234") all
    // legitimately start with + / - / a digit and must NOT be mangled.
    if (/^[=+\-@\t\r]/.test(s) && !/^[-+]?[\d.,:]+\s*(%|pts)?$/.test(s)) {
      return "'" + s;
    }
    return s;
  }

  // Shared failure handler for the html2canvas-based image exports
  // (Individual / Performance / Compare Ranges). Without it a rejected
  // capture promise leaves the user staring at a disabled "Capturing…"
  // button with no feedback. Surface the error via a toast and re-enable
  // any export button that a *Feedback_ helper left disabled (its
  // original label is stashed in dataset.label). QCD has its own catch
  // because it uses a status banner instead of a button-feedback helper.
  function exportCaptureFailed_(err) {
    try { console.error('Report image capture failed', err); } catch (e) {}
    showToast("Couldn't capture the report image — please try again.", 'error');
    ['ir-export-btn', 'pr-export-btn', 'cr-export-btn', 'ins-export-btn'].forEach(function (id) {
      var btn = document.getElementById(id);
      if (btn && btn.dataset && btn.dataset.label) {
        btn.innerHTML = btn.dataset.label;
        btn.disabled = false;
      }
    });
  }

  function showToast(msg, kind, durationMs) {
    var container = $('toast-container');
    if (!container) return;
    var el = document.createElement('div');
    el.className = 'toast' + (kind ? ' toast-' + kind : '');
    el.textContent = msg;
    container.appendChild(el);
    requestAnimationFrame(function () { el.classList.add('toast-visible'); });
    setTimeout(function () {
      el.classList.remove('toast-visible');
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, durationMs || 3000);
  }

  /**
   * App-styled confirmation dialog -- a themed replacement for the browser's
   * native window.confirm (which renders in the Google Sheets / browser chrome
   * style, incongruent with the app). Returns a Promise<boolean> that resolves
   * true on confirm, false on cancel / Escape / backdrop click.
   *
   * opts: { title, message | messageHtml, confirmLabel, cancelLabel, tone }
   *   - message     : plain text (escaped for you)
   *   - messageHtml : pre-built HTML (caller MUST escape any dynamic values;
   *                   use this for emphasis like <strong> around names)
   *   - tone        : 'danger' tints the confirm button + header rule warn
   * Layered above every modal (z-index in styles.html) so it works from within
   * the Outlier Fix / Alerts / Dept Config modals.
   */
  function dsConfirm_(opts) {
    return new Promise(function (resolve) {
      var o = opts || {};
      var toneCls = o.tone === 'danger' ? ' ds-confirm--danger' : '';
      var overlay = document.createElement('div');
      overlay.className = 'ds-confirm-overlay';
      overlay.innerHTML =
          '<div class="ds-confirm' + toneCls + '" role="alertdialog" aria-modal="true">'
        +   '<div class="ds-confirm-title">' + escapeHtml(o.title || 'Please confirm') + '</div>'
        +   '<div class="ds-confirm-body">' + (o.messageHtml || escapeHtml(o.message || '')) + '</div>'
        +   '<div class="ds-confirm-actions">'
        +     '<button type="button" class="btn btn-secondary ds-confirm-cancel">' + escapeHtml(o.cancelLabel || 'Cancel') + '</button>'
        +     '<button type="button" class="btn ds-confirm-ok' + toneCls + '">' + escapeHtml(o.confirmLabel || 'Confirm') + '</button>'
        +   '</div>'
        + '</div>';
      document.body.appendChild(overlay);
      var okBtn = overlay.querySelector('.ds-confirm-ok');
      var cancelBtn = overlay.querySelector('.ds-confirm-cancel');
      var settle = function (val) {
        document.removeEventListener('keydown', onKey, true);
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        resolve(val);
      };
      var onKey = function (e) {
        if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); settle(false); }
        else if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); settle(true); }
      };
      okBtn.addEventListener('click', function () { settle(true); });
      cancelBtn.addEventListener('click', function () { settle(false); });
      overlay.addEventListener('mousedown', function (e) { if (e.target === overlay) settle(false); });
      document.addEventListener('keydown', onKey, true);
      requestAnimationFrame(function () { overlay.classList.add('is-open'); okBtn.focus(); });
    });
  }

  /**
   * Renders the header data-freshness pill: "Data through Mon May 19
   * · 14h ago".  Source is getLatestDataDates -- which returns
   * { dqe, qcd, latest }.  The pill's visible date is `latest`
   * (max across sources); the tooltip surfaces the per-source
   * breakdown so a mid-migration state where one source is fresh
   * and the other is stale is visible on hover.
   *
   * Accepts a string for backward-compat with the single-source
   * caller (treated as if it were both dqe and latest).
   *
   * "Xh ago" is computed from end-of-day on the latest date in the
   * user's local TZ (close enough -- the ingest typically lands
   * the morning after the calendar day it covers).  Pill goes
   * orange when 36h+ have passed since the latest date's end-of-
   * day, which is the empirical threshold above which the operator
   * usually wants to investigate.
   */
  function setFreshnessPill_(dates) {
    const pill = $('freshness-pill');
    if (!pill) return;

    let dqeIso = null, qcdIso = null, latestIso = null;
    if (typeof dates === 'string') {
      latestIso = dates;
      dqeIso = dates;
    } else if (dates && typeof dates === 'object') {
      dqeIso = dates.dqe || null;
      qcdIso = dates.qcd || null;
      latestIso = dates.latest || dqeIso || qcdIso || null;
    }

    if (!latestIso) {
      pill.style.display = 'none';
      pill.textContent = '';
      pill.removeAttribute('title');
      return;
    }
    const parts = String(latestIso).split('-');
    if (parts.length !== 3) { pill.style.display = 'none'; return; }
    // End-of-day local time on the latest date is the reference
    // point for "how stale is the data": calls that came in at
    // 14:55 PST land in that day's bucket.
    const eod = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]), 23, 59, 59);
    const dateLabel = eod.toLocaleDateString(undefined, {
      weekday: 'short', month: 'short', day: 'numeric',
    });
    const ageMs = Date.now() - eod.getTime();
    const ageHours = Math.max(0, Math.round(ageMs / 3600000));
    let ageLabel;
    if (ageHours < 1) {
      ageLabel = 'just now';
    } else if (ageHours < 48) {
      ageLabel = ageHours + 'h ago';
    } else {
      const ageDays = Math.round(ageHours / 24);
      ageLabel = ageDays + 'd ago';
    }
    pill.innerHTML = 'Data through <span class="freshness-date">'
                   + escapeHtml(dateLabel) + '</span> &middot; '
                   + escapeHtml(ageLabel);

    // Tooltip: always include a per-source breakdown so a
    // diverged DQE-vs-QCD state is visible. When the two agree,
    // the breakdown reads as "DQE: X · QCD: X" -- redundant but
    // honest. When they differ, the source of the recent number
    // is the one the operator should trust.
    const tipParts = ['Most recent date with data in any source.'];
    if (dqeIso) tipParts.push('DQE Historical Data: ' + dqeIso);
    if (qcdIso) tipParts.push('QCD Historical Data: ' + qcdIso);
    if (dqeIso && qcdIso && dqeIso !== qcdIso) {
      tipParts.push('Sources are out of sync -- the dashboard\'s '
        + 'My Department agent table reads from DQE; the QCD report + '
        + 'Overview QCD chips read from QCD. Pill shows whichever is '
        + 'newest so a recent refresh on either path is visible.');
    }
    pill.setAttribute('title', tipParts.join('\n'));
    pill.classList.toggle('is-stale', ageHours >= 36);
    // Non-admins get the SUBTLE variant (owner note): freshness is an
    // operational signal admins act on; for managers the loud boxed chip
    // read as an alarm. The stale (36h+) warn tint still applies to both
    // -- knowing the data is old changes how anyone reads the numbers.
    pill.classList.toggle('freshness-pill--subtle',
      !(typeof USER !== 'undefined' && USER && USER.role === 'admin'));
    pill.style.display = '';
  }

  // Work-window pill (E2, Phase E). Reads window.__WORK_WINDOW__
  // (injected server-side from DASHBOARD_WORK_WINDOW in Config.gs)
  // and populates the static pill markup. One-shot at init -- the
  // constants don't change during a session.
  function initWorkWindowPill_() {
    const pill = $('work-window-pill');
    if (!pill) return;
    const ww = window.__WORK_WINDOW__;
    if (!ww || (!ww.pst && !ww.cst)) return;
    const parts = [];
    if (ww.pst) parts.push('<strong>' + escapeHtml(ww.pst) + '</strong>');
    if (ww.cst) parts.push('<strong>' + escapeHtml(ww.cst) + '</strong>');
    pill.innerHTML = 'Work window ' + parts.join('<span class="work-window-sep">&middot;</span>');
    pill.setAttribute('title',
      'Rung / Missed / Answered / TTT / ATT columns are scoped to this work window. '
      + 'Calls before or after this window appear in the Missed Calls raw timestamps '
      + 'but are not counted in the headline totals.');
    pill.style.display = '';
  }

  function toIsoDate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function defaultRange() {
    const now = new Date();
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: toIsoDate(first), to: toIsoDate(now) };
  }

  // -- Column model --------------------------------------------------------
  // Order matches the <thead>; sortKey maps to a row property.
  // `hideable: true` marks a detail column that folds away behind the
  // "Show all columns" toggle (default hidden) -- toggled via the
  // `hide-extra` class on #agents-table (see applyDeptColsPref_). The
  // `bar` column folds Rung / Missed / Answered into one stacked
  // horizontal bar (answered green + missed red, total = rung); it
  // sorts by answer rate (`sortKey: 'answerRate'`, handled in sortRows).
  const COLUMNS = [

    { key: 'source',               label: 'Source',          type: 'chip',     hideable: true },
    { key: 'answeredBar',          label: 'Answered / Missed', type: 'bar', sortKey: 'answerRate' },

    // the split-bar cell (answeredBarHtml_ renders the rung total inline as
    // the muted "(N)"), saving a column; the CSV still emits a numeric
    // Total calls column (exportTableCsv_ splices it after the bar).
    { key: 'answerRate',           label: 'Answer %',        type: 'pct', sortKey: 'answerRate' },
    { key: 'totalUnique',          label: 'Unique',          type: 'num',      hideable: true },
    { key: 'tttSeconds',           label: 'TTT',             type: 'duration', hideable: true },
    { key: 'attSeconds',           label: 'ATT (daily avg)', type: 'duration' },
    { key: 'avgAbdWaitSeconds',    label: 'Avg Abd Wait',    type: 'duration', hideable: true },
    { key: 'csrAvgAbdWaitSeconds', label: 'CSR Avg Abd Wait', type: 'duration', hideable: true },
  ];

  // Foldable detail-columns toggle for the My Department agent table.
  // Default 'compact' (extra columns hidden); persisted per-browser.
  const DEPT_COLS_KEY = 'cdr.dept.cols';
  function applyDeptColsPref_() {
    var compact = (localStorage.getItem(DEPT_COLS_KEY) !== 'all');   // default compact

  // Shared td-class builder for the agent tables (main + Overview mini).
  // Centralizes the agent/source/bar/num base class + the foldable
  // `col-extra` marker so all four render sites stay consistent.
  function cellClass_(col, i) {
    var base;
    if (i === 0) base = 'agent-name';
    else if (col.type === 'chip' && col.key === 'source') base = 'src-cell';
    else if (col.type === 'bar') base = 'ans-bar-cell';
    else base = 'num';
    return base + (col.hideable ? ' col-extra' : '');
  }

  // Stacked Answered/Missed bar (green answered + red missed; total =
  // rung). Carries the E5 prior-period WoW chips inline on the answered
  // and missed counts so that signal survives the column consolidation.
  // The answer-rate gets the 92% benchmark tint (symmetric).
  function answeredBarHtml_(row) {
    var a = Number(row.totalAnswered) || 0;
    var m = Number(row.totalMissed)   || 0;
    var total = a + m;
    var pctA = total ? (a / total * 100) : 0;
    var rate = total ? Math.round(a / total * 100) : 0;
    var aChip = wowChipHtml_(row, { key: 'totalAnswered' });
    var mChip = wowChipHtml_(row, { key: 'totalMissed' });
    // Owner round 4: the rung total renders inline (the dedicated Total-calls
    // column was folded away). Prefer the server's own totalRung when present
    // (definitionally = answered + missed, but never invent a number).
    var rung = (row.totalRung != null && row.totalRung !== '') ? (Number(row.totalRung) || 0) : total;
    var title = a + ' answered · ' + m + ' missed · ' + rung + ' total calls (rung)'
              + (total ? ' · ' + rate + '% answered' : '');
    var segs = total
      ? '<span class="ans-seg ans" style="width:' + pctA + '%"></span>'
        + '<span class="ans-seg miss" style="width:' + (100 - pctA) + '%"></span>'
      : '<span class="ans-seg none" style="width:100%"></span>';
    var rateCls = total ? benchValueCls_('% answered', rate + '%', true) : '';
    return '<div class="ans-bar" title="' + escapeHtml(title) + '">'
         +   '<div class="ans-track">' + segs + '</div>'
         +   '<div class="ans-nums">'
         +     '<span class="ans-n">' + a + aChip + '</span>'
         +     '<span class="ans-slash">/</span>'
         +     '<span class="miss-n">' + m + mChip + '</span>'
         +     '<span class="ans-total" title="Total calls (rung)">(' + rung + ')</span>'
         +     '<span class="ans-rate' + rateCls + '">' + (total ? rate + '%' : '–') + '</span>'
         +   '</div>'
         + '</div>';
  }

  const $ = function (id) { return document.getElementById(id); };

  // #1: an all-departments manager (Access Control dept = "ALL") sees every

  // DATA-BREADTH gates (dept selector, cross-dept routing); admin-SURFACE gates

  function isAllDeptViewer_() {

  function init() {

    // Admin-only menu items: Compare Ranges (under Reports) and

    // Toggle behavior: clicking a menu button opens its list and

    // Clicking a menu item dispatches the underlying button's
    // click handler (the item IS the original report-launcher
    // button, just restyled) and closes the menu.
    (function initHeaderMenus_() {
      const buttons = document.querySelectorAll('.header-menu-btn');
      const lists   = document.querySelectorAll('.header-menu-list');
      function closeAll() {
        lists.forEach(function (l) { l.style.display = 'none'; });
        buttons.forEach(function (b) { b.setAttribute('aria-expanded', 'false'); });
      }
      buttons.forEach(function (btn) {
        const listId = btn.getAttribute('aria-controls');
        const list = document.getElementById(listId);
        if (!list) return;
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          const open = list.style.display !== 'none';
          closeAll();
          if (!open) {

            btn.setAttribute('aria-expanded', 'true');
          }

      // up to here because we listen on document.
      document.addEventListener('click', function (e) {
        if (!e.target.closest('.header-menu')) closeAll();
      });
      // Close on Escape.
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeAll();
      });
      // Close after a menu item is activated -- the modal-open
      // handler already runs because the menu item IS the original
      // launcher button.
      lists.forEach(function (list) {
        list.addEventListener('click', function (e) {
          if (e.target.closest('.header-menu-item')) closeAll();
        });
      });
    })();

    // Department selector vs static label. All-dept managers get the selector

        prLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
        crLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
        refresh();
        // If the Overview page is currently visible, re-render its

    // R7 (M-5): sticky context bar -- reveals once the controls row scrolls

    // server call fails (falls back to today's range from
    // defaultRange above).
    google.script.run
      .withSuccessHandler(function (dates) {
        // dates = { dqe, qcd, latest } per Data.gs::getLatestDataDates.
        // From/To defaults use DQE specifically (the agent table

  // -- Date preset chips ---------------------------------------------------
  function initDatePresets_() {
    var wrap = $('date-presets');
    if (!wrap) return;
    var presets = [
      { label: 'Yesterday', fn: function () { var d = daysAgo_(1); return { from: d, to: d }; } },
      { label: 'Last 7 days', fn: function () { return { from: daysAgo_(7), to: daysAgo_(1) }; } },
      { label: 'Last 30 days', fn: function () { return { from: daysAgo_(30), to: daysAgo_(1) }; } },
      { label: 'This month', fn: function () { var t = new Date(); return { from: isoDate_(new Date(t.getFullYear(), t.getMonth(), 1)), to: isoDate_(t) }; } },
      { label: 'Last month', fn: function () { var t = new Date(); var f = new Date(t.getFullYear(), t.getMonth() - 1, 1); var l = new Date(t.getFullYear(), t.getMonth(), 0); return { from: isoDate_(f), to: isoDate_(l) }; } },
    ];
    presets.forEach(function (p) {
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'date-preset-chip';
      chip.textContent = p.label;
      chip.addEventListener('click', function () {
        var r = p.fn();
        $('from-date').value = r.from;
        $('to-date').value = r.to;
        wrap.querySelectorAll('.date-preset-chip').forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');
        refresh();
      });
      wrap.appendChild(chip);
    });
  }
  function clearActivePreset_() {
    var wrap = $('date-presets');
    if (wrap) wrap.querySelectorAll('.date-preset-chip').forEach(function (c) { c.classList.remove('active'); });
  }
  function daysAgo_(n) { var d = new Date(); d.setDate(d.getDate() - n); return isoDate_(d); }
  // F-38: Mon-Fri count between two ISO dates inclusive -- the client
  // mirror of Util.gs::countWorkingDays_ (INV-35), so the CR/Insights form
  // hints agree with the server's working-day mismatch flag. UTC-noon
  // iteration is DST-safe, same as the server helper.
  function workingDaysBetween_(fromIso, toIso) {
    if (!fromIso || !toIso) return 0;
    var f = String(fromIso).split('-'), t = String(toIso).split('-');
    var ms = Date.UTC(+f[0], f[1] - 1, +f[2], 12);
    var end = Date.UTC(+t[0], t[1] - 1, +t[2], 12);
    if (isNaN(ms) || isNaN(end)) return 0;
    if (end < ms) { var tmp = ms; ms = end; end = tmp; }
    // S5: exclude company holidays (server-injected __COMPANY_HOLIDAYS__,
    // same ranges the server's countWorkingDays_ excludes) so the form
    // hint and the results' INV-35 length-mismatch flag can't disagree
    // across a holiday-straddling window.
    var holidays = (typeof window !== 'undefined' && window.__COMPANY_HOLIDAYS__) || [];
    var isHoliday = function (iso) {
      for (var i = 0; i < holidays.length; i++) {
        if (iso >= holidays[i].from && iso <= holidays[i].to) return true;
      }
      return false;
    };
    var count = 0;
    for (; ms <= end; ms += 86400000) {
      var d = new Date(ms);
      var dow = d.getUTCDay();
      if (dow === 0 || dow === 6) continue;
      if (isHoliday(d.toISOString().slice(0, 10))) continue;
      count++;
    }
    return count;
  }
  function isoDate_(d) {
    var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
    var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
    return d.getFullYear() + '-' + m + '-' + day;
  }

  // Page switcher between the Overview "home" page and the dept
  // detail page. Body[data-page] drives CSS visibility; this also
  // updates the document title block and the active-nav state.
  function setPage(page) {
    if (page !== 'overview' && page !== 'dept' && page !== 'escalations'
        && page !== 'insights') page = 'overview';
    document.body.setAttribute('data-page', page);
    const kicker = $('page-kicker');
    const title  = $('page-title');
    if (page === 'overview') {
      if (kicker) kicker.textContent = 'Company · Overview';
      if (title)  title.textContent  = 'Departments Snapshot';
      ovLoad_();
    } else if (page === 'escalations') {
      if (kicker) kicker.textContent = 'Operations · Escalations';
      if (title)  title.textContent  = 'Escalations';
      // Lazy-init the controls + load on first entry (idempotent thereafter).
      if (typeof escEnsureInit_ === 'function') escEnsureInit_(function () { escLoad_(); });
      else if (typeof escLoad_ === 'function') escLoad_();
    } else if (page === 'insights') {
      if (kicker) kicker.textContent = 'Reports · Insights';
      if (title)  title.textContent  = 'Insights';
      // First entry runs the old openModal init (form + defaults + prefs +
      // roster); re-entry only re-ensures the roster and never clobbers a
      // rendered report (owner decision 3, docs/insights-page-plan.md).
      if (typeof insEnsurePage_ === 'function') insEnsurePage_();
    } else {
      if (kicker) kicker.textContent = 'Department Dashboard';
      if (title)  title.textContent  = getRequestedDept() || '(no department)';
      // setPage doesn't load the agent table itself. If we arrived showing a
      // STALE prior dept -- the My Department nav button (which fires no
      // selector 'change'), or view-as-manager where the selector is
      // pinned+disabled -- load the CURRENT dept now, so the table (and its
      // Missed / QCD side panels) match the dept instead of a leftover load.
      // Skip when a load is already in flight (refresh disables the button) so
      // a selector-change-driven load isn't doubled.
      var _rb = $('refresh-btn');
      if (lastSummaryDept_ !== getRequestedDept() && !(_rb && _rb.disabled)) {
        refresh();
      }
    }
    // Delegate the active-tab visual indicator to the router so all
    // [data-route] tabs (page-toggles + report-openers) participate
    // in the same active-state model. Phase C consolidated this from
    // the per-button toggle that previously only handled overview /
    // my-dept buttons.
    if (typeof setRoute_ === 'function') {
      setRoute_(page === 'dept' ? '/dept'
        : (page === 'escalations' ? '/escalations'
        : (page === 'insights' ? '/report/insights' : '/overview')));
    }
    // Batch E: on entering My Department / Insights, offer to align dates with
    // the other page if its last-viewed window differs (explicit, dismissible).
    if (page === 'dept' || page === 'insights') maybeShowDateSyncChip_(page);
  }

  // -- Help & FAQ modal ---------------------------------------------------
  // Opens on "?" button in header. Closes on backdrop click, X button, or
  // Escape key. Returns focus to the help button on close. Reuses the same
  // modal infrastructure that upcoming report views will use.
  // Floating Help FAB visibility pref (Settings toggle). 'off' hides it.
  function helpFabHidden_() {
    try { return localStorage.getItem('cdr.help.fab') === 'off'; } catch (e) { return false; }
  }
  function applyHelpFabPref_() {
    const fab = $('help-fab');
    if (fab) fab.classList.toggle('is-hidden', helpFabHidden_());
  }

  function initHelpModal() {
    const btn = $('help-btn');
    const modal = $('help-modal');
    const fab = $('help-fab');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      // Tuck the FAB away while Help itself is open (it floats above modals,
      // so it would otherwise sit on top of its own panel). Restored on close.
      if (fab) fab.classList.add('is-hidden');
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      applyHelpFabPref_();   // restore FAB per the Settings pref
      btn.focus();
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    btn.addEventListener('click', openModal);
    if (fab) fab.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
    applyHelpFabPref_();   // honor the saved Settings pref on load
    initHelpNav_();        // wire the two-pane topic tree + search
  }

  // Help modal: folder-tree nav -> single-topic content view, plus a search
  // that filters topics by title AND body text.
  function initHelpNav_() {
    const modal = $('help-modal');
    if (!modal) return;
    const links = Array.prototype.slice.call(modal.querySelectorAll('.help-link'));
    const topics = Array.prototype.slice.call(modal.querySelectorAll('.help-topic'));
    const empty = $('help-search-empty');
    if (!links.length) return;

    function show(topic) {
      topics.forEach(function (t) { t.hidden = (t.id !== 'help-topic-' + topic); });
      links.forEach(function (l) { l.classList.toggle('active', l.getAttribute('data-topic') === topic); });
      const content = $('help-content');
      if (content) content.scrollTop = 0;
      if (empty) empty.hidden = true;
    }
    links.forEach(function (l) {
      l.addEventListener('click', function () {
        const cat = l.closest('.help-cat');
        if (cat && !cat.open) cat.open = true;
        show(l.getAttribute('data-topic'));
      });
    });
    links[0].classList.add('active');   // first topic is shown by default (others are [hidden])

    const search = $('help-search');
    if (search) {
      search.addEventListener('input', function () {
        const q = search.value.trim().toLowerCase();
        let anyVisible = false;
        modal.querySelectorAll('.help-cat').forEach(function (cat) {
          let catMatch = false;
          cat.querySelectorAll('.help-link').forEach(function (l) {
            let hit = !q;
            if (q) {
              const sec = document.getElementById('help-topic-' + l.getAttribute('data-topic'));
              const body = sec ? sec.textContent.toLowerCase() : '';
              hit = l.textContent.toLowerCase().indexOf(q) !== -1 || body.indexOf(q) !== -1;
            }
            l.style.display = hit ? '' : 'none';
            if (hit) catMatch = true;
          });
          cat.style.display = catMatch ? '' : 'none';
          if (catMatch && q) cat.open = true;
          if (catMatch) anyVisible = true;
        });
        if (empty) empty.hidden = anyVisible || !q;
      });
    }
  }

  // -- Settings modal (theme picker etc.) -----------------------------
  function initSettingsModal() {
    const btn = $('settings-btn');
    const modal = $('settings-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function syncChips() {
      const active = (window.__themePref && window.__themePref.get) ? window.__themePref.get() : 'warm';
      document.querySelectorAll('.theme-chip').forEach(function (chip) {
        chip.classList.toggle('active', chip.getAttribute('data-theme') === active);
      });
    }

    function openModal() {
      syncChips();
      const fabToggle = $('help-fab-toggle');
      if (fabToggle) fabToggle.checked = !helpFabHidden_();
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Floating Help button toggle: persist + apply immediately so the user
    // sees it appear/disappear behind the open Settings panel.
    const fabToggle = $('help-fab-toggle');
    if (fabToggle) fabToggle.addEventListener('change', function () {
      try { localStorage.setItem('cdr.help.fab', fabToggle.checked ? 'on' : 'off'); } catch (e) {}
      applyHelpFabPref_();
    });

    // Chip click: apply + persist theme. Modal stays open so the
    // user can visually verify the change (the background updates
    // behind the modal panel).
    document.querySelectorAll('.theme-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        const t = chip.getAttribute('data-theme');
        if (window.__themePref && window.__themePref.set) window.__themePref.set(t);
        syncChips();
      });
    });
  }

  // -- Company Overview page --------------------------------------------
  // Cross-dept snapshot: per-dept tile grid showing the latest day's
  // KPIs (rung / answered / missed / % / ATT) + a 30-day answer-rate
  // trend chart with one line per dept. Accessible to all
  // authenticated users (managers see other depts' numbers too --
  // matches the legacy DQE Report's read-only cross-dept visibility).
  //
  // Rendered inline as a full page (#overview-page), toggled with
  // the #dept-page section via body[data-page] from the header
  // buttons in setPage().

  let ovChartInstance = null;
  let ovLastData = null;
  // Sub-queue (child) lines are shown on the trend chart BY DEFAULT now
  // (dashed + parent hue, so they behave like other dept queues while staying
  // visually linked); the "sub-queues" toggle lets the user declutter to
  // top-level depts only. In the grid, children render as dense chips beneath
  // their parent tile (ovBuildSubqCard_) that expand IN PLACE into a near-full
  // card on click -- compact, but never collapsed INTO the parent card
  // (independent metrics, not a roll-up).
  let ovShowSubQueues_ = true;

  function initCompanyOverview() {
    const overviewBtn = $('overview-btn');
    const myDeptBtn   = $('my-dept-btn');
    if (overviewBtn) overviewBtn.addEventListener('click', function () { setPage('overview'); });
    if (myDeptBtn)   myDeptBtn.addEventListener('click',   function () { setPage('dept');     });
  }

  var ovAutoRefreshTimer_ = null;
  var OV_AUTO_REFRESH_MS  = 5 * 60 * 1000;

  // Stale-while-revalidate cache for the Overview (Phase 5 / decision C6).
  // Paints the last successful payload instantly on load, then revalidates.
  // Keyed by VIEWER (email + role) so a cached blob never paints for a
  // different user on a shared machine, and only the already-personalized
  // payload the client received is stored (the server strips admin-only fields
  // per-viewer before serving). Best-effort: any storage/parse error falls back
  // to the normal fetch path, and the live fetch ALWAYS runs regardless.
  var OV_CACHE_KEY_ = 'cdr.ov.cache.v1:' + (USER.email || '') + ':' + (USER.role || '');
  function ovReadCache_() {
    try {
      var raw = localStorage.getItem(OV_CACHE_KEY_);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      return (obj && obj.data && obj.data.depts) ? obj.data : null;
    } catch (e) { return null; }
  }
  function ovWriteCache_(data) {
    try {
      if (data && data.depts) {
        localStorage.setItem(OV_CACHE_KEY_, JSON.stringify({ data: data, at: Date.now() }));
      }
    } catch (e) { /* quota / disabled -- SWR is best-effort */ }
  }
  // "Showing saved snapshot · refreshing…" pill while a cached paint awaits the
  // live fetch. Cleared on the next successful load.
  function ovSetCachedIndicator_(on) {
    var el = document.getElementById('ov-cached-pill');
    if (on) {
      if (!el) {
        el = document.createElement('div');
        el.id = 'ov-cached-pill';
        el.className = 'ov-cached-pill';
        el.textContent = 'Showing saved snapshot · refreshing…';
        var body = $('ov-body');
        if (body) body.insertBefore(el, body.firstChild);
      }
      el.style.display = '';
    } else if (el) {
      el.style.display = 'none';
    }
  }

  // B1 change-flash. One-shot highlight on value nodes whose text changed
  // since the last render in the SAME scope (SWR cache->live swap on Overview,
  // or a date-range refresh on My Department). Callers tag each value node with
  // a stable data-flash-key (dept / agent name, never row index). Best-effort,
  // reduced-motion aware, and flashes ONLY on a real change -- never on first
  // paint (the hasOwnProperty guard), so opening a screen never flashes.
  var DS_PREV_VALUES_ = {};
  function dsFlashChanged_(root, scopeId) {
    if (!root || !root.querySelectorAll) return;
    var nodes = root.querySelectorAll('[data-flash-key]');
    var reduce = false;
    try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    var prev = DS_PREV_VALUES_[scopeId] || {};
    var next = {};
    nodes.forEach(function (el) {
      var k = el.getAttribute('data-flash-key');
      var v = el.textContent.trim();
      next[k] = v;
      if (!reduce && Object.prototype.hasOwnProperty.call(prev, k) && prev[k] !== v) {
        el.classList.remove('ds-flash');
        void el.offsetWidth;            // force reflow so the animation replays
        el.classList.add('ds-flash');
        el.addEventListener('animationend', function h() {
          el.classList.remove('ds-flash'); el.removeEventListener('animationend', h);
        });
      }
    });
    DS_PREV_VALUES_[scopeId] = next;   // snapshot for the next render (even on first paint)
  }

  // View-as (admin only): when set to a dept name, the admin is previewing
  // that dept manager's experience. Drives the getCompanyOverview viewAsDept
  // param (server personalizes as manager) + body[data-view-as] (CSS hides
  // admin chrome) + a pinned dept selector. null = normal admin view.
  var viewAsDept_ = null;

  // Builds the admin-only "View as" control in the header and wires it.
  // Created only for admins (called from the admin branch of init), and the
  // control itself carries NO data-admin-only so it stays visible in view-as
  // mode (the admin needs it to switch back).
  function initViewAs_() {
    var host = document.querySelector('.header-meta') || document.querySelector('.header-nav');
    if (!host || $('view-as-select')) return;
    var depts = (USER && USER.departments) || [];
    if (!depts.length) return;
    var wrap = document.createElement('div');
    wrap.className = 'view-as-ctl';
    wrap.innerHTML = '<label for="view-as-select">View as</label>'
      + '<select id="view-as-select"><option value="">Admin (me)</option>'
      + depts.map(function (d) { return '<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + ' (manager)</option>'; }).join('')
      + '</select>';
    host.appendChild(wrap);
    $('view-as-select').addEventListener('change', function () {
      applyViewAs_(this.value || null);
    });
  }

  // Enter (dept) / exit (null) the manager preview.
  function applyViewAs_(dept) {
    viewAsDept_ = dept || null;
    var sel = $('dept-selector');
    if (viewAsDept_) {
      document.body.setAttribute('data-view-as', 'manager');
      // Pin the dept selector to the previewed dept (managers can't switch).
      if (sel) {
        if (Array.prototype.slice.call(sel.options).some(function (o) { return o.value === viewAsDept_; })) {
          sel.value = viewAsDept_;
        }
        sel.disabled = true;
      }
    } else {
      document.body.removeAttribute('data-view-as');
      if (sel) sel.disabled = false;
    }
    // (The Reports dropdown (data-admin-only) is hidden in view-as by the
    // existing CSS; the top-level Insights tab carries no data-admin-only so
    // it stays visible in the preview -- the old #10 solo-button surfacing
    // is no longer needed.)
    // Re-fetch the active surface so it reflects the effective role.
    if (document.body.getAttribute('data-page') === 'overview') {
      // R7 (O-3): repaint the viewer-scoped bits IMMEDIATELY from the last
      // payload so the 'My Dept' badge + mini-table chip move on the spot --
      // the live re-fetch below can take seconds (the per-viewer SWR cache is
      // bypassed in view-as), and the stale chip read as "not changing".
      if (typeof ovLastData !== 'undefined' && ovLastData && ovLastData.depts) {
        try {
          ovRenderUserHero_(ovLastData);
          ovRenderUserTable_(ovLastData);
          ovRenderTiles_(ovLastData);
        } catch (e) { /* best-effort pre-paint; the fetch below repaints */ }
      }
      ovLoad_(false);
    } else if (typeof refresh === 'function') {
      refresh();
    }
  }

  // Reveal #ov-body, hiding #ov-loading. When the skeleton loader WAS
  // showing (cold start / first paint), run a one-shot opacity crossfade so
  // the swap reads as a fade-in rather than a hard pop (Pass-2 E-motion;
  // reduced-motion no-op via CSS). Fires only on the skeleton->content
  // transition -- silent auto-refreshes (loader already hidden) don't re-fade.
  function ovRevealBody_() {
    var loader = $('ov-loading'), body = $('ov-body');
    var wasLoading = !!(loader && loader.style.display !== 'none');
    if (loader) loader.style.display = 'none';
    if (!body) return;
    body.style.display = '';
    if (wasLoading) {
      body.classList.remove('ov-body-in');
      void body.offsetWidth;          // restart the animation
      body.classList.add('ov-body-in');
    }
  }

  // CL1-1: monotonic stale-response token for the Overview fetch (the same
  // guard class as summaryReqSeq / reportReqSeq_). Multiple fetches can be
  // in flight -- the 5-min auto-refresh, setPage('overview'), Retry, and a
  // View-as switch -- and without a token the OLDER response painted last:
  // during a view-as switch that rendered the ADMIN payload (incl. the
  // company-aggregate hero) inside the supposed manager preview.
  var ovLoadSeq_ = 0;

  function ovLoad_(silent) {
    var paintedFromCache = false;
    var __otok = ++ovLoadSeq_;
    // In view-as (admin previewing a manager) skip the per-viewer SWR cache
    // entirely -- the manager-personalized payload must not be written under
    // the admin's cache key (it would paint a manager view after exiting).
    if (!silent && !viewAsDept_) {
      var cached = ovReadCache_();
      if (cached) {
        // Instant paint from the last snapshot; the live fetch below swaps it.
        ovRevealBody_();
        ovLastData = cached;
        ovRender_(cached);
        ovSetCachedIndicator_(true);
        paintedFromCache = true;
      } else {
        $('ov-loading').style.display = '';
        $('ov-body').style.display = 'none';
      }
    }
    google.script.run
      .withSuccessHandler(function (data) {
        if (__otok !== ovLoadSeq_) return;   // superseded (e.g. view-as switched)
        ovLastData = data;
        if (!viewAsDept_) ovWriteCache_(data);   // don't cache a view-as payload
        ovRevealBody_();
        ovSetRefreshWarn_(false);   // a refresh succeeded: clear any prior warning
        ovSetCachedIndicator_(false);
        ovRender_(data);
        ovScheduleAutoRefresh_();
      })
      .withFailureHandler(function (err) {
        if (__otok !== ovLoadSeq_) return;   // a newer request owns the UI
        if (!silent && !paintedFromCache) {
          // No cached content to fall back on -- show the hard error.
          $('ov-loading').textContent = 'Error loading overview: '
            + (err && err.message ? err.message : String(err));
        } else {
          // Keep the cached / last-loaded data on screen; surface a muted
          // "refresh failing" badge instead of discarding good data.
          ovSetCachedIndicator_(false);
          ovSetRefreshWarn_(true);
        }
        ovScheduleAutoRefresh_();
      })
      .getCompanyOverview({ viewAsDept: viewAsDept_ || '' });
  }

  // Muted "auto-refresh failing" badge at the top of the Overview body.
  // Created lazily; toggled by ovLoad_'s success/failure handlers.
  function ovSetRefreshWarn_(on) {
    var id = 'ov-refresh-warn';
    var el = document.getElementById(id);
    if (on) {
      if (!el) {
        el = document.createElement('div');
        el.id = id;
        el.style.cssText = 'display:flex;align-items:center;gap:10px;margin:0 0 10px;'
          + 'padding:6px 10px;border-radius:2px;'
          + 'font-size:12px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;';
        var msg = document.createElement('span');
        msg.style.flex = '1';
        msg.textContent = 'Auto-refresh is failing — showing the last loaded data.';
        // D1a: an explicit Retry so a manager isn't stuck on stale data waiting
        // for the next auto-refresh tick. Re-runs the silent revalidate; a
        // success clears this banner and repaints (with B1 change-flash).
        var retry = document.createElement('button');
        retry.type = 'button';
        retry.className = 'link-btn';
        retry.textContent = 'Retry now';
        retry.addEventListener('click', function () {
          retry.disabled = true; retry.textContent = 'Retrying…';
          ovLoad_(true);
          setTimeout(function () { retry.disabled = false; retry.textContent = 'Retry now'; }, 4000);
        });
        el.appendChild(msg);
        el.appendChild(retry);
        var body = $('ov-body');
        if (body) body.insertBefore(el, body.firstChild);
      }
      el.style.display = '';
    } else if (el) {
      el.style.display = 'none';
    }
  }

  function ovScheduleAutoRefresh_() {
    if (ovAutoRefreshTimer_) clearTimeout(ovAutoRefreshTimer_);
    ovAutoRefreshTimer_ = setTimeout(function () {
      if (document.body.getAttribute('data-page') === 'overview') {
        ovLoad_(true);
      }
    }, OV_AUTO_REFRESH_MS);
  }

  function ovRender_(data) {
    if (!data || !data.depts) return;
    ovRenderPipelineBanner_(data);
    ovRenderOrphanNag_(data);
    ovRenderUnmappedNag_(data);
    ovRenderSummaryLine_(data);
    ovRenderCompanyAggregate_(data);
    ovRenderUserHero_(data);
    ovRenderTiles_(data);
    // Defer chart creation by one frame so the just-revealed
    // modal body lays out before Chart.js measures the canvas.
    requestAnimationFrame(function () { ovRenderChart_(data); });
    ovRenderUserTable_(data);
    // B1: flash dept/hero answer-rate values that changed vs the prior paint.
    // On the SWR path the cache paint snapshots first (no flash), then the live
    // paint flashes only what actually moved -- a returning manager sees the diff.
    dsFlashChanged_($('ov-body'), 'overview');
  }

  // Single mono-uppercase summary line above the dept grid.
  // Admin viewers see org-wide stats (rung total, % answered company-wide,
  // QCD violations MTD across all depts). Manager viewers see the same
  // shape scoped to their own dept so the line surfaces meaningful numbers
  // for both audiences without leaking the admin-only company aggregate.
  function ovRenderSummaryLine_(data) {
    // #6: this "Data through ... Rung ... % Answered ... QCD viol MTD" line was
    // removed -- "Data through" duplicates the header freshness pill, and the
    // Rung / % Answered / violations are already on the per-dept cards below
    // the chart. Kept as a hidden no-op (one-line revert) so the caller and the
    // #ov-summary-line element don't need touching.
    const el = $('ov-summary-line');
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
  }

  // Admin-only banner above the summary line surfacing Pipeline
  // Health staleness. Healthy state stays hidden; >36h since the
  // latest DQE-freshness success picks up the warn variant.
  function ovRenderPipelineBanner_(data) {
    const el = $('ov-pipeline-banner');
    if (!el) return;
    const pf = data && data.pipelineFreshness;
    if (data.viewerRole !== 'admin' || !pf || !pf.isStale) {
      el.style.display = 'none';
      el.innerHTML = '';
      el.classList.remove('is-warn');
      return;
    }
    el.style.display = '';
    el.className = 'ov-status-banner is-warn';
    let bodyHtml;
    if (pf.latestTimestamp && pf.hoursSinceFresh != null) {
      const hours = pf.hoursSinceFresh >= 24
        ? (pf.hoursSinceFresh / 24).toFixed(1) + 'd'
        : pf.hoursSinceFresh.toFixed(1) + 'h';
      bodyHtml =
          'DQE freshness is stale -- last successful build was '
        + '<strong>' + hours + ' ago</strong> ('
        + escapeHtml(pf.latestTimestamp) + ').'
        + ' Check the import pipeline (see <strong>Alerts &rarr; Pipeline Health</strong>).';
    } else {
      bodyHtml =
          'No recent DQE-freshness success found in Pipeline Health.'
        + ' Either the daily import hasn\'t run, or the success rows have aged out of the 40-row scan window.'
        + ' Check <strong>Alerts &rarr; Pipeline Health</strong>.';
    }
    el.innerHTML =
        '<span class="ov-status-banner-kicker">Pipeline</span>'
      + '<span class="ov-status-banner-body">' + bodyHtml + '</span>';
  }

  // Admin-only banner for orphan agent names that have been written
  // to DQE Historical Data in the last 7 days. Clicking opens the
  // Orphan Fix modal so the admin can triage them.
  function ovRenderOrphanNag_(data) {
    const el = $('ov-orphan-nag');
    if (!el) return;
    const on = data && data.orphanNag;
    if (data.viewerRole !== 'admin' || !on || !on.activeCount) {
      el.style.display = 'none';
      el.innerHTML = '';
      el.classList.remove('is-warn');
      return;
    }
    const names = (on.sampleNames || []).map(escapeHtml).join(', ');
    const moreCount = on.activeCount - (on.sampleNames || []).length;
    const moreClause = moreCount > 0 ? ' and ' + fmtNumber(moreCount) + ' more' : '';
    el.style.display = '';
    el.className = 'ov-status-banner is-warn';
    el.innerHTML =
        '<span class="ov-status-banner-kicker">Orphans</span>'
      + '<span class="ov-status-banner-body">'
      +   '<strong>' + fmtNumber(on.activeCount) + '</strong>'
      +   ' agent name' + (on.activeCount === 1 ? '' : 's')
      +   ' written in the last 7 days do not match any roster'
      +   (names ? ' (' + names + moreClause + ')' : '')
      +   '. Map them in the Orphan Fix modal so their calls roll up to the right dept.'
      + '</span>'
      + '<button type="button" class="ov-status-banner-action" id="ov-orphan-nag-open">Open</button>';
    const btn = $('ov-orphan-nag-open');
    if (btn) {
      btn.addEventListener('click', function () {
        const trigger = document.getElementById('orphan-fix-btn');
        if (trigger) trigger.click();
      });
    }
  }

  // F onboarding: admin-only nag for QCD queues seen in the data but mapped
  // to no department (their calls never surface until assigned). Mirrors
  // ovRenderOrphanNag_; hidden for non-admins and when nothing is unmapped.
  // The "Open" button programmatically opens the Dept Config modal.
  function ovRenderUnmappedNag_(data) {
    const el = $('ov-unmapped-nag');
    if (!el) return;
    const u = data && data.unmappedQcd;
    if (data.viewerRole !== 'admin' || !u || !u.count) {
      el.style.display = 'none';
      el.innerHTML = '';
      el.classList.remove('is-warn');
      return;
    }
    const names = (u.sampleNames || []).map(escapeHtml).join(', ');
    const moreCount = u.count - (u.sampleNames || []).length;
    const moreClause = moreCount > 0 ? ' and ' + fmtNumber(moreCount) + ' more' : '';
    el.style.display = '';
    el.className = 'ov-status-banner is-warn';
    el.innerHTML =
        '<span class="ov-status-banner-kicker">Unmapped queues</span>'
      + '<span class="ov-status-banner-body">'
      +   '<strong>' + fmtNumber(u.count) + '</strong>'
      +   ' QCD queue' + (u.count === 1 ? '' : 's')
      +   ' seen in the data ' + (u.count === 1 ? 'is' : 'are') + ' mapped to no department'
      +   (names ? ' (' + names + moreClause + ')' : '')
      +   ". Their calls won't appear in any QCD report until you assign them in Dept Config."
      + '</span>'
      + '<button type="button" class="ov-status-banner-action" id="ov-unmapped-nag-open">Open Dept Config</button>';
    const btn = $('ov-unmapped-nag-open');
    if (btn) {
      btn.addEventListener('click', function () {
        const trigger = document.getElementById('dept-config-btn');
        if (trigger) trigger.click();
      });
    }
  }

  function ovFormatDateLabel_(iso) {
    const p = iso.split('-');
    const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Which dept the viewer "owns" -- managers always show their own;
  // admins show whichever dept is currently selected in the header
  // dropdown (so they can pin a focus dept).
  function ovViewerDept_(data) {
    if (isAllDeptViewer_()) {
      const sel = $('dept-selector');
      return (sel && sel.value) || (USER.departments && USER.departments[0]) || null;
    }
    return (data && data.viewerDept) || USER.department || null;
  }

  // Company-wide aggregate hero, admin-only. Renders a single wide
  // tile above the dept grid with totals across all non-hidden
  // depts for the latest date plus a 30-day company-wide sparkline.
  function ovRenderCompanyAggregate_(data) {
    const wrap = $('ov-company-aggregate');
    const agg  = data && data.companyAggregate;
    if (!wrap) return;
    if (!agg || data.viewerRole !== 'admin') {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      return;
    }
    // Use the design system's accent color so the company tile
    // visually anchors above the dept tiles (which cycle through
    // the IR palette starting at the same accent slot).
    const sparkColor = (THEME && THEME.accent) || IR_CHART_COLORS[0] || '#4E79A7';
    const trend = (agg.trend || []).map(function (v) { return v == null ? 0 : v; });
    const spark = trend.length ? irSparkline_(trend, sparkColor) : '';

    wrap.style.display = '';
    wrap.innerHTML =
        '<div class="ov-agg-kicker">Company snapshot &middot; admin only</div>'
      + '<div class="ov-agg-row">'
      +   '<div class="ov-agg-pct-block">'
      +     '<div class="ov-agg-pct">' + escapeHtml(agg.pctFormatted) + '</div>'
      +     '<div class="ov-agg-pct-cap">answered company-wide</div>'
      +   '</div>'
      +   '<div class="ov-agg-stats">'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Rung</span><span class="ov-agg-stat-val">' + fmtNumber(agg.rung) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Answered</span><span class="ov-agg-stat-val">' + fmtNumber(agg.answered) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Missed</span><span class="ov-agg-stat-val">' + fmtNumber(agg.missed) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">ATT</span><span class="ov-agg-stat-val">' + escapeHtml(agg.attFormatted) + '</span></div>'
      +     '<div class="ov-agg-stat" title="' + escapeHtml(ovActiveTooltip_(agg)) + '"><span class="ov-agg-stat-label">Active</span><span class="ov-agg-stat-val">' + agg.activeAgents + ' of ' + (agg.recentlyActiveCount != null ? agg.recentlyActiveCount : agg.rosterSize) + '</span></div>'
      +   '</div>'
      +   (spark ? '<div class="ov-agg-spark" title="30-day company % answered trend">' + spark + '</div>' : '')
      + '</div>';
  }

  // Hero block: featured rendering of the viewer's own department,
  // sitting above the grid. Manager: their dept. Admin: whichever
  // dept is selected in the header dropdown.
  //
  // Three shapes depending on the viewer's dept position:
  //   - Top-level parent with children (e.g. Sales has PAP Q):
  //     hero shows the big parent tile + its child sub-queue tiles
  //     stacked underneath. Keeps the parent-child relationship
  //     visible even when the parent is the hero.
  //   - Top-level dept with no children: hero is just that tile.
  //   - Child sub-queue (e.g. Spanish): hero is just that child
  //     tile, with a "sub-queue · <Parent>" tag so the relationship
  //     is still visible even though the parent renders below in
  //     the grid (with the child removed from its group).
  //
  // Hidden entirely if we can't resolve a viewer dept or it isn't
  // present in the overview data (e.g. listed in
  // OVERVIEW_HIDDEN_DEPTS).
  function ovRenderUserHero_(data) {
    // RETIRED: the viewer's dept used to render as a full-width hero ABOVE the
    // chart. It now folds into the grid as the highlighted first card
    // (ovRenderTiles_ -> ov-dept-tile-viewer), which reads better and works
    // when presenting several depts at once. Keep this block hidden; the
    // function is still called from the render sequence + dept-selector change
    // handler, so it stays a safe no-op rather than being ripped out.
    const wrap = $('ov-user-hero');
    if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; }
  }

  // Card period slider (Yesterday / Last 30 / YTD). Swaps which server-shipped
  // `periods` block the dept cards' headline stats read; the sparkline, WoW
  // chip, and active-count stay period-independent. Persisted; default keeps
  // the historical latest-day view.
  const OV_CARD_PERIOD_KEY_ = 'cdr.ov.cardperiod';
  const OV_CARD_PERIODS_ = {
    yesterday: { label: 'Yesterday',    cap: 'answered (yesterday)' },
    last30:    { label: 'Last 30 days', cap: 'answered (last 30 days)' },
    ytd:       { label: 'YTD',          cap: 'answered (year to date)' },
  };
  let ovCardPeriod = (function () {
    try { var v = localStorage.getItem(OV_CARD_PERIOD_KEY_); return OV_CARD_PERIODS_[v] ? v : 'yesterday'; }
    catch (e) { return 'yesterday'; }
  })();
  function ovPeriodStats_(dept) {
    return (dept && dept.periods && dept.periods[ovCardPeriod])
      || (dept && dept.latest)
      || { pctFormatted: '—', rung: 0, answered: 0, missed: 0, attFormatted: '—' };
  }
  function ovPeriodCap_() { return (OV_CARD_PERIODS_[ovCardPeriod] || OV_CARD_PERIODS_.yesterday).cap; }

  // O4: independent period for the bottom AGENT TABLE (re-fetches the dept
  // summary for the selected range), separate from the card period above.
  const OV_TABLE_PERIOD_KEY_ = 'cdr.ov.tableperiod.v1';
  let ovTablePeriod = (function () {
    try { var v = localStorage.getItem(OV_TABLE_PERIOD_KEY_); return OV_CARD_PERIODS_[v] ? v : 'yesterday'; }
    catch (e) { return 'yesterday'; }
  })();
  // Resolve { from, to } from the latest DQE date + the selected table period.
  function ovTableRange_(latestIso) {
    if (!latestIso || ovTablePeriod === 'yesterday') return { from: latestIso, to: latestIso };
    var p = String(latestIso).split('-');
    var y = +p[0], mo = (+p[1]) - 1, d = +p[2];
    if (ovTablePeriod === 'ytd') return { from: y + '-01-01', to: latestIso };
    var start = new Date(Date.UTC(y, mo, d - 29));   // last30: latest - 29d inclusive
    var iso = function (dt) {
