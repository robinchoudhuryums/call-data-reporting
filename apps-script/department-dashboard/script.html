   *                  missing or out of order; controlLabel names the
   *                  form control in the message)
   */
  function resolveComparisonWindow_(mode, from, to, customFrom, customTo, controlLabel) {
    if (!mode || mode === 'none') return null;
    if (mode === 'custom') {
      if (!customFrom || !customTo) {
        return { error: 'Pick prior start and end dates (or switch '
                      + (controlLabel || 'the compare control') + ' to a preset).' };
      }
      if (customFrom > customTo) return { error: 'Prior start must be on or before prior end.' };
      const custom = { from: customFrom, to: customTo };
      // F3: warn (don't block) when the custom prior window overlaps the
      // current range. Server-side attribution is "current wins" -- rows in
      // the overlap count toward the current period only, so the prior
      // totals (and the deltas computed from them) understate. The report
      // still renders; this just makes the caveat visible.
      if (from && to && customFrom <= to && customTo >= from) {
        custom.warn = 'Note: this prior window overlaps the current range ('
          + from + ' – ' + to + '). Overlapping days count toward the current '
          + 'period only, so the prior period may read low.';
      }
      return custom;
    }
    // Parse using noon-local-time to avoid DST edges.
    const parts1 = from.split('-'), parts2 = to.split('-');
    const start = new Date(Number(parts1[0]), Number(parts1[1]) - 1, Number(parts1[2]), 12);
    const end   = new Date(Number(parts2[0]), Number(parts2[1]) - 1, Number(parts2[2]), 12);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if (mode === 'yoy') {
      const ps = new Date(start.getFullYear() - 1, start.getMonth(), start.getDate(), 12);
      const pe = new Date(end.getFullYear()   - 1, end.getMonth(),   end.getDate(),   12);
      return { from: isoOf(ps), to: isoOf(pe) };
    }
    if (mode === 'prevPeriod') {
      const ms = 86400000;
      const durationDays = Math.floor((end - start) / ms);
      const pe = new Date(start.getTime() - ms);
      const ps = new Date(pe.getTime() - durationDays * ms);
      return { from: isoOf(ps), to: isoOf(pe) };
    }
    return null;
  }

  function irResolvePriorRange_(from, to) {
    const mode = $('ir-compare-mode') ? $('ir-compare-mode').value : 'none';
    return resolveComparisonWindow_(mode, from, to,
      $('ir-prior-from') ? $('ir-prior-from').value : '',
      $('ir-prior-to')   ? $('ir-prior-to').value   : '',
      'Compare with');
  }

  // Wire the Compare with dropdown: show/hide custom date inputs;
  // update the hint with a preview of the resolved prior range.
  function irInitCompareMode_() {
    const sel = $('ir-compare-mode');
    if (!sel) return;
    const refresh = function () {
      const mode = sel.value;
      const showCustom = (mode === 'custom');
      const fromWrap = $('ir-prior-from-wrap');
      const toWrap   = $('ir-prior-to-wrap');
      if (fromWrap) fromWrap.style.display = showCustom ? '' : 'none';
      if (toWrap)   toWrap.style.display   = showCustom ? '' : 'none';
      const hint = $('ir-prior-hint');
      if (!hint) return;
      if (!mode || mode === 'none') { hint.textContent = ''; return; }
      const from = $('ir-from').value, to = $('ir-to').value;
      if (!from || !to) { hint.textContent = ''; return; }
      const prior = irResolvePriorRange_(from, to);
      if (!prior) { hint.textContent = ''; return; }
      if (prior.error) { hint.textContent = prior.error; return; }
      hint.textContent = 'Comparing against ' + prior.from + ' to ' + prior.to + '.'
        + (prior.warn ? ' ' + prior.warn : '');
    };
    sel.addEventListener('change', function () { refresh(); irSavePrefs_(); });
    ['ir-from', 'ir-to', 'ir-prior-from', 'ir-prior-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', refresh);
    });
    refresh();
  }

  function irRenderReport(data) {
    irLastData = data;
    $('ir-results-title').textContent = data.mode === 'comparison'
      ? 'Peer Comparison Report' : 'Individual Performance Report';
    const headerDate = '(' + (data.dateLabel || '')
                     + (data.priorDateLabel
                          ? ' &middot; vs ' + data.priorDateLabel
                          : '')
                     + ')';
    // priorDateLabel comes from the server unescaped; the date
    // string format is fixed (Utilities.formatDate with our own
    // template), but use innerHTML here only because we already
    // included the &middot; entity above. Date contents themselves
    // are dates, not user input. F-32 follow-up: when a custom prior
    // window overlaps the current range (meta.priorOverlap, individual
    // v11), append the same inline "Windows overlap" caveat Insights
    // renders -- overlap days count toward the current window only.
    $('ir-results-date').innerHTML = headerDate
      + (data.meta && data.meta.priorOverlap ? ' ' + insOverlapFlagHtml_(data.meta) : '');
    irRenderEditingLine_(data.meta && data.meta.agents);
    showIrResults();
    irSetResultsStatus('');
    irCloseEditPopover_();
    // Restore the user's last-viewed chart tab (defaults to
    // Volume on first visit). Persisted in prefs.
    irActivateChartTab_();
    reportHeadline_('ir-headline', 'individual-results', irHeadline_(data));
    irRenderSummary(data.summaryData, data.teamAvg);
    irRenderCharts(data);
  }

  /**
   * Compact label for the agents in the current report. With 3 or
   * fewer agents we list them all; beyond that we list two and add
   * "+N more". Hover-tooltip on the truncated form shows the full
   * comma-separated list.
   */
  function irRenderEditingLine_(agents) {
    const el = $('ir-editing-agents');
    if (!el) return;
    const list = Array.isArray(agents) ? agents : [];
    let visible, tooltip;
    if (list.length <= 3) {
      visible = list.join(', ');
      tooltip = visible;
    } else {
      visible = list.slice(0, 2).join(', ') + ', +' + (list.length - 2) + ' more';
      tooltip = list.join(', ');
    }
    el.textContent = visible || '(none)';
    el.title = tooltip;
  }

  /**
   * Opens the edit-selection popover positioned below the "change"
   * link in the results header. Mirrors the agent picker into the
   * popover with the current selection pre-checked, then focuses
   * the search input for fast filtering.
   */
  function irOpenEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    const list = $('ir-edit-list');
    if (!list) return;
    // #1: seed the date + compare controls from the current report so the
    // popover can change dates as well as agents.
    const curFrom = (irLastData && irLastData.meta && irLastData.meta.from) || ($('ir-from') ? $('ir-from').value : '');
    const curTo   = (irLastData && irLastData.meta && irLastData.meta.to)   || ($('ir-to')   ? $('ir-to').value   : '');
    if ($('ir-edit-from')) $('ir-edit-from').value = curFrom;
    if ($('ir-edit-to'))   $('ir-edit-to').value   = curTo;
    // The popover offers none/prevPeriod/yoy; a 'custom' prior can't be edited
    // here. Track when we seeded over a custom prior so Apply can preserve it
    // (rather than silently downgrading to "no comparison") if the user doesn't
    // touch the compare control.
    const curMode = $('ir-compare-mode') ? $('ir-compare-mode').value : 'none';
    irEditPopoverSeededCustom_ = (curMode === 'custom');
    if ($('ir-edit-compare-mode')) {
      $('ir-edit-compare-mode').value =
        (curMode === 'prevPeriod' || curMode === 'yoy') ? curMode : 'none';
    }
    list.innerHTML = irBuildAgentListHtml_(irLastRoster.agents || [], irLastRoster.activeAgents, irLastRoster.activeFloaters);
    // Pre-check the currently-reported agents.
    const current = (irLastData && irLastData.meta && irLastData.meta.agents) || [];
    irApplyCheckedAgents_(list, current);
    irUpdateEditApplyEnabled_();
    list.removeEventListener('change', irUpdateEditApplyEnabled_);
    list.addEventListener('change', irUpdateEditApplyEnabled_);
    pop.style.display = '';
    // Reset search + filter state.
    const search = $('ir-edit-search');
    if (search) { search.value = ''; setTimeout(function () { search.focus(); }, 0); }
    irFilterAgentList_(list, '');
  }

  function irCloseEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    pop.style.display = 'none';
  }

  function irUpdateEditApplyEnabled_() {
    const checked = irGetCheckedAgents_($('ir-edit-list'));
    $('ir-edit-apply-btn').disabled = checked.length === 0;
  }

  function irTogglePopoverAgents_(checked) {
    selectAllActiveAgents_($('ir-edit-list'), checked);
    irUpdateEditApplyEnabled_();
  }

  /**
   * Apply the popover selection: runs the report with the popover's
   * agent list while keeping the existing dept and date range.
   * Also propagates the new selection back into the main form
   * picker so going Back shows the same checkboxes.
   */
  function irApplyEditPopover_() {
    const newAgents = irGetCheckedAgents_($('ir-edit-list'));
    if (!newAgents.length) return;

    // #1: dates + compare mode now come from the popover too.
    const from = $('ir-edit-from') ? $('ir-edit-from').value : $('ir-from').value;
    const to   = $('ir-edit-to')   ? $('ir-edit-to').value   : $('ir-to').value;
    if (!from || !to) { irSetResultsStatus('error', 'Pick a start and end date.'); return; }
    if (from > to)    { irSetResultsStatus('error', 'Start date must be on or before end date.'); return; }
    const popMode = $('ir-edit-compare-mode') ? $('ir-edit-compare-mode').value : 'none';

    // Preserve a custom prior the popover can't represent: if we seeded over a
    // custom-prior report and the user left the compare control at 'none', keep
    // the custom prior (resolved from the setup form's inputs) instead of
    // silently dropping the comparison.
    const keepCustom = irEditPopoverSeededCustom_ && popMode === 'none';
    let prior;
    if (keepCustom) {
      prior = irResolvePriorRange_(from, to);   // reads ir-compare-mode='custom' + ir-prior-from/to
    } else {
      prior = resolveComparisonWindow_(popMode, from, to, '', '', 'the compare control');
    }

    // Sync the popover state back into the setup form so going Back (or
    // re-opening the popover) shows the same dates / agents / compare mode.
    if ($('ir-from')) $('ir-from').value = from;
    if ($('ir-to'))   $('ir-to').value   = to;
    if ($('ir-preset')) $('ir-preset').value = 'custom';
    if ($('ir-compare-mode') && !keepCustom) {
      $('ir-compare-mode').value = popMode;
      $('ir-compare-mode').dispatchEvent(new Event('change'));
    }
    irApplyCheckedAgents_($('ir-agent-list'), newAgents);
    irCloseEditPopover_();

    const dept = getRequestedDept();

    const btn = $('ir-edit-apply-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    irSetResultsStatus('loading', 'Refreshing report…');

    const req = { department: dept, from: from, to: to, agents: newAgents };
    if (prior && !prior.error) { req.priorFrom = prior.from; req.priorTo = prior.to; }

    const __rtok = ++reportReqSeq_.ir;   // F10 stale-response guard
    const __sig = reportSig_(req);   // D1b keep-last-good key
    google.script.run
      .withSuccessHandler(function (data) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        if (__rtok !== reportReqSeq_.ir) return;
        reportLastGoodWrite_('ir', __sig, data);
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        if (__rtok !== reportReqSeq_.ir) return;
        // D1b: repaint last-good for this request if cached; else the prior
        // render stays (results pane already shown) with an error banner.
        if (reportFailFallback_('ir', __sig, irRenderReport, 'ir-results-status')) return;
        irSetResultsStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport(req);
  }

  // Single authority for IR chart-panel visibility. Respects the #4
  // "All at once" toggle: in all-mode every panel is shown (stacked via
  // the .ir-charts-all container class) and the tab buttons go inert;
  // otherwise only the active tab's panel shows. Resizes the now-visible
  // charts (Chart.js can't lay out while display:none).
  function irActivateChartTab_() {
    const tabsEl = $('ir-chart-tabs');
    if (tabsEl) {
      tabsEl.classList.toggle('ir-tabs-allmode', irShowAllCharts);
      tabsEl.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = !irShowAllCharts && b.getAttribute('data-tab') === irActiveChartTab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }
    const cont = $('ir-charts-container');
    if (cont) cont.classList.toggle('ir-charts-all', irShowAllCharts);
    document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
      const show = irShowAllCharts || p.getAttribute('data-panel') === irActiveChartTab;
      p.style.display = show ? '' : 'none';
    });
    const tg = $('ir-allcharts-toggle');
    if (tg) {
      tg.classList.toggle('active', irShowAllCharts);
      tg.setAttribute('aria-pressed', irShowAllCharts ? 'true' : 'false');
    }
    if (irChartInstances && irChartInstances.length) {
      // Defer past layout. Toggling panel visibility AND the wrap height
      // (420px single -> 300px all) changes the chart containers; a
      // synchronous resize reads stale dimensions, so a chart canvas sized
      // to the old (taller) box overflows and overlaps the next panel when
      // switching modes back and forth. A double rAF lets the browser lay
      // out the now-visible panels at their new height first.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          irChartInstances.forEach(function (c) { try { c.resize(); } catch (e) {} });
        });
      });
    }
  }

  function irRenderSummary(summaryData, teamAvg) {
    const container = $('ir-summary-container');
    if (!container) return;
    const toolbar = $('ir-cards-toolbar');
    // Sort toolbar only makes sense with 2+ cards.
    if (toolbar) toolbar.style.display = (summaryData && summaryData.length > 1) ? '' : 'none';

    // Friendly empty state when no selected agent had any call
    // activity in range. Hides the trend chart trio too since it
    // would just be 12 months of zeros.
    const anyActivity = (summaryData || []).some(function (a) {
      return a.raw.rung > 0 || a.raw.answered > 0 || a.raw.missed > 0;
    });
    if (!anyActivity) {
      container.innerHTML =
        '<div class="ir-empty-card">'
        +   '<div class="ir-empty-icon">&#x1F4ED;</div>'
        +   '<div class="ir-empty-title">No call data for this selection</div>'
        +   '<div class="ir-empty-sub">No rung, answered, or missed calls for the selected '
        +     'agent(s) in this date range. Try broadening the date range or picking '
        +     'different agents.</div>'
        + '</div>';
      const charts = $('ir-charts-container');
      if (charts) charts.style.display = 'none';
      const toggle = $('ir-datalabels-box');
      if (toggle) toggle.style.display = 'none';
      const tabs = $('ir-chart-tabs');
      if (tabs) tabs.style.display = 'none';
      const sharedLegend = $('ir-shared-legend');
      if (sharedLegend) sharedLegend.style.display = 'none';
      return;
    }
    const charts = $('ir-charts-container');
    if (charts) charts.style.display = '';
    const toggle = $('ir-datalabels-box');
    if (toggle) toggle.style.display = '';
    const tabs = $('ir-chart-tabs');
    if (tabs) tabs.style.display = '';

    // KPI-tile layout per agent. Replaces the dense comparison
    // table from Phase 1 with a row of metric tiles (big number,
    // vs-team-avg delta badge, sparkline). Each tile's sparkline
    // is drawn inline from irLastData.trendData -- no extra Chart
    // instances created. Tiles per agent:
    //   Total Rung | Answered | Missed | % Answered | Avg Talk Time
    const priorStatsAvailable = !!(irLastData && irLastData.meta
                                   && irLastData.meta.priorFrom);
    container.innerHTML = irSortSummaryData_(summaryData || []).map(function (agent) {
      const trendForAgent = (irLastData && irLastData.trendData && irLastData.trendData.datasets)
                          ? (irLastData.trendData.datasets[agent.name] || [])
                          : [];
      const safeName = escapeHtml(agent.name);
      const share = agent.share || {};
      const pStats = agent.priorStats;   // may be null when no comparison
      const pRaw   = agent.priorRaw;
      // Render the vs-prior row only when the server supplied
      // priorStats. Pass per-metric formatted strings so the row
      // shows the same precision/unit as the team row.
      const priorRow = function (key, valence) {
        if (!pStats || !pRaw) return '';
        return irPriorRow_(pStats, pRaw[key], agent.raw[key], valence, pStats[key]);
      };
      // Excluded-from-team-avg pill (E4, Phase E). Surfaces when the
      // agent appears in TEAM_AVG_EXCLUDES[dept] so the manager sees
      // why their numbers don't move the team average. INV-26.
      const excludedPill = agent.excludedFromTeamAvg
        ? ' <span class="ir-excluded-pill" title="Per TEAM_AVG_EXCLUDES, this agent\'s numbers are subtracted from BOTH numerator and denominator of the team average (INV-26).">EXCLUDED FROM TEAM AVG</span>'
        : '';
      // Floater QUEUE chip (INV-53 expansion). Only floaters get a
      // chip on the IR card -- roster agents are implicit (no chip
      // would clutter the card). Bare QUEUE for floaters on no
      // roster, QUEUE · <home depts> for multi-rostered floaters.
      // Reuses sourceChipHtml_ from My Dept's Source column path.
      const isFloater = agent.matchedViaQueue && !agent.matchedViaRoster;
      const floaterPill = isFloater ? sourceChipHtml_(agent) : '';
      return '<div class="ir-summary-card">'
           +   '<div class="ir-summary-title">'
           +     safeName
           +     (floaterPill ? ' ' + floaterPill : '')
           +     excludedPill
           +     ' <span class="ir-vs">vs Team Avg'
           +       (priorStatsAvailable ? ' &middot; vs Prior period' : '')
           +     '</span>'
           +     ' <button type="button" class="ir-copy-tsv" data-agent="' + safeName + '">Copy data</button>'
           +   '</div>'
           +   irInsightsBlock_(agent.insights || [])
           +   '<div class="ir-kpi-grid">'
           +     irKpiTile('Total Rung',  agent.stats.rung,     teamAvg.rung,
                            irDiffBadge(agent.raw.rung,     teamAvg.raw.rung,        'pos', 'rung calls'),
                            trendForAgent.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung,
                            share.rung,
                            priorRow('rung', 'pos'))
           +     irKpiTile('Answered',    agent.stats.answered, teamAvg.answered,
                            irDiffBadge(agent.raw.answered, teamAvg.raw.answered,    'pos', 'answered calls'),
                            trendForAgent.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered,
                            share.answered,
                            priorRow('answered', 'pos'))
           +     irKpiTile('Missed (rings)', agent.stats.missed, teamAvg.missed,
                            irDiffBadge(agent.raw.missed,   teamAvg.raw.missed,      'neg', 'missed calls'),
                            trendForAgent.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed,
                            share.missed,
                            priorRow('missed', 'neg'))
           +     irKpiTile('% Answered',  agent.stats.pct,      teamAvg.pct,
                            irDiffBadge(agent.raw.pct,      teamAvg.raw.pctAnswered, 'pos', '% answered'),
                            trendForAgent.map(function (x) { return x.pct; }),      (THEME.accent || '#4E79A7'),
                            null,
                            priorRow('pct', 'pos'))
           +     irKpiTile('Avg talk (per call)', agent.stats.att, teamAvg.att,
                            irAttCompare(agent.raw.att, teamAvg.raw.att),
                            trendForAgent.map(function (x) { return x.att; }),      (THEME.muted || '#9C755F'),
                            null,
                            priorRow('att', 'neu'))
           +   '</div>'
           + '</div>';
    }).join('');

    // Wire copy-data-as-TSV buttons (re-attaches every render; OK
    // since `container.innerHTML` wipes the previous handlers too).
    container.querySelectorAll('.ir-copy-tsv').forEach(function (b) {
      b.addEventListener('click', function () {
        // Build TSV from the card's KPI tiles: header + value rows.
        const card = b.closest('.ir-summary-card');
        if (!card) return;
        const rows = [];
        rows.push(['Metric', 'Agent', 'Team Avg', '% of Dept'].join('\t'));
        card.querySelectorAll('.ds-kpi').forEach(function (tile) {
          const label = (tile.querySelector('.ds-kpi__label') || {}).textContent || '';
          const value = (tile.querySelector('.ds-kpi__value') || {}).textContent || '';
          // First .ds-kpi__team is the "Team X" marker (the vs-prior row, when
          // present, is a second .ds-kpi__team -- query scoped to __compare).
          const teamEl = tile.querySelector('.ds-kpi__compare .ds-kpi__team');
          const team  = (teamEl || {}).textContent || '';
          const shareEl = tile.querySelector('.ds-kpi__share');
          const share = shareEl
            ? shareEl.textContent.replace(/\s*of\s+dept\s*$/i, '').trim()
            : '';
          rows.push([
            label.trim(),
            value.trim(),
            team.replace(/^Team\s*/i, '').trim(),
            share,
          ].join('\t'));
        });
        const tsv = rows.join('\n') + '\n';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(tsv).then(function () { irFlashButton(b, 'Copied'); });
        }
      });
    });
  }

  /**
   * Returns summaryData reordered per irSortOrder. "selection"
   * preserves the order the server sent (which mirrors the order
   * the user checked agents in the picker). Other keys sort by
   * the corresponding numeric field on each agent's raw stats.
   */
  function irSortSummaryData_(summaryData) {
    if (!Array.isArray(summaryData) || summaryData.length < 2) return summaryData;
    if (irSortOrder === 'selection') return summaryData;
    const out = summaryData.slice();
    if (irSortOrder === 'name') {
      out.sort(function (a, b) {
        const an = (a.name || '').toLowerCase();
        const bn = (b.name || '').toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      });
    } else if (irSortOrder === 'answered-desc') {
      out.sort(function (a, b) { return (b.raw.answered || 0) - (a.raw.answered || 0); });
    } else if (irSortOrder === 'answered-asc') {
      out.sort(function (a, b) { return (a.raw.answered || 0) - (b.raw.answered || 0); });
    } else if (irSortOrder === 'pct-desc') {
      out.sort(function (a, b) { return (b.raw.pct || 0) - (a.raw.pct || 0); });
    }
    return out;
  }

  /**
   * Single KPI tile markup. `sparklineData` is a numeric array;
   * `sparklineColor` is a hex. `share` is an optional pre-formatted
   * "X.X%" string -- when present (volume tiles only), shown as a
   * small "X.X% of dept" tag inline with the value to communicate
   * this agent's portion of the dept's total volume.
   */
  function irKpiTile(label, value, teamVal, diffBadgeHtml, sparklineData, sparklineColor, share, priorHtml) {
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    const shareHtml = share
      ? '<span class="ds-kpi__share" title="Share of dept volume in range">'
        + escapeHtml(String(share)) + ' of dept</span>'
      : '';
    // Migrated onto the shared ds-kpi component (Phase 4). The IR-specific
    // share tag / team-average marker / vs-prior row ride the ds-kpi__* sub-
    // elements added for this; `.ds-kpi--ir` keeps the denser 5-up sizing.
    return '<div class="ds-kpi ds-kpi--ir">'
         +   '<div class="ds-kpi__top">'
         +     '<span class="ds-kpi__label">' + label + '</span>'
         +     '<span class="ds-kpi__spark ds-kpi__spark--inline">' + spark + '</span>'
         +   '</div>'
         +   '<div class="ds-kpi__value-row">'
         +     '<div class="ds-kpi__value' + benchValueCls_(label, value) + '">' + escapeHtml(String(value)) + '</div>'
         +     shareHtml
         +   '</div>'
         +   '<div class="ds-kpi__compare">'
         +     '<span class="ds-kpi__team">Team ' + escapeHtml(String(teamVal)) + '</span>'
         +     diffBadgeHtml
         +   '</div>'
         +   (priorHtml || '')
         + '</div>';
  }

  /**
   * Per-tile "vs prior" delta line, rendered below the team-vs row
   * when summaryData.priorStats is present. Same valence model as
   * irDiffBadge: 'pos' = higher is better, 'neg' = lower is better,
   * 'neu' = direction-ambiguous (TTT/ATT). Returns empty string if
   * priorRaw is null/undefined.
   */
  function irPriorRow_(priorStats, priorVal, currVal, type, displayPrior) {
    if (!priorStats) return '';
    const prev = Number(priorVal) || 0;
    const cur  = Number(currVal)  || 0;
    if (prev === 0 && cur === 0) {
      return '<div class="ds-kpi__prior">'
           +   '<span class="ds-kpi__team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
           +   '<span class="ir-badge ir-badge-neu">-</span>'
           + '</div>';
    }
    let cls = 'ir-badge-neu';
    let label;
    if (type === 'neu') {
      // Direction-ambiguous metric (ATT / TTT). Show signed pct but
      // don't colorize as good/bad.
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    } else {
      const pct = prev > 0 ? ((cur - prev) / prev) * 100 : (cur > 0 ? 100 : 0);
      label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
      if (type === 'pos') {
        if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
      } else if (type === 'neg') {
        if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
      }
    }
    return '<div class="ds-kpi__prior">'
         +   '<span class="ds-kpi__team">Prior ' + escapeHtml(String(displayPrior)) + '</span>'
         +   '<span class="ir-badge ' + cls + '">' + label + '</span>'
         + '</div>';
  }

  /**
   * Renders the per-agent insights callout. Each insight is an
   * object { type, text } where type is "positive" | "negative" |
   * "neutral" -- shown as a colored circular marker before the
   * text so managers can scan the list at a glance:
   *
   *   blue  up arrow   : favorable comparison (positive)
   *   orange down arrow: unfavorable comparison (negative)
   *   grey  bullet     : direction-ambiguous (neutral, e.g. ATT)
   *
   * Returns empty string when there are no insights so empty
   * callout boxes never appear.
   */
  function irInsightsBlock_(insights) {
    if (!insights || !insights.length) return '';
    const items = insights.map(function (item) {
      // Accept legacy v3 string-form for cache transition safety.
      const type = (item && item.type) || 'neutral';
      const text = (item && item.text)
        ? item.text
        : (typeof item === 'string' ? item : '');
      const mark = type === 'positive' ? '↑'    // up arrow
                 : type === 'negative' ? '↓'    // down arrow
                 : '•';                          // bullet
      return '<li class="ir-insight-item">'
           +   '<span class="ir-insight-mark ir-insight-mark-' + type + '" aria-hidden="true">'
           +     mark
           +   '</span>'
           +   '<span class="ir-insight-text">' + escapeHtml(text) + '</span>'
           + '</li>';
    }).join('');
    return '<div class="ir-insights">'
         +   '<div class="ir-insights-label">Insights</div>'
         +   '<ul class="ir-insights-list">' + items + '</ul>'
         + '</div>';
  }

  /**
   * Inline SVG sparkline (no Chart.js dependency, no extra Chart
   * instances). Returns the SVG markup as a string ready for
   * innerHTML. Renders a 70x22 stroke with subtle area fill below;
   * collapses to a flat baseline if all values are 0.
   */
  function irSparkline_(values, color) {
    const W = 70, H = 22;
    const n = (values || []).length;
    if (n < 2) {
      return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '"></svg>';
    }
    let min = Infinity, max = -Infinity;
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    if (!isFinite(min) || !isFinite(max)) { min = 0; max = 0; }
    const range = max - min;
    const xStep = W / (n - 1);
    const pad = 2;
    const innerH = H - pad * 2;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      const y = range === 0
        ? H / 2
        : pad + innerH - ((v - min) / range) * innerH;
      pts.push((i * xStep).toFixed(1) + ',' + y.toFixed(1));
    }
    const linePath = 'M' + pts.join(' L');
    const areaPath = linePath
                   + ' L' + ((n - 1) * xStep).toFixed(1) + ',' + H
                   + ' L0,' + H + ' Z';
    return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
         +   '<path d="' + areaPath + '" fill="' + color + '" fill-opacity="0.15" stroke="none"/>'
         +   '<path d="' + linePath + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
         + '</svg>';
  }

  function irFlashButton(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    setTimeout(function () { btn.textContent = prev; }, 1000);
  }

  function irDiffBadge(agentVal, teamVal, type, metricLabel) {
    // type: 'pos' = higher is better (Rung, Answered, % Answered).
    //       'neg' = lower is better (Missed).
    if (!teamVal) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentVal - teamVal) / teamVal) * 100;
    const label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    let cls = 'ir-badge-neu';
    if (type === 'pos') {
      if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
    } else if (type === 'neg') {
      if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
    }
    // Plain-English explainer for screen readers + hover -- the colored
    // badge alone doesn't say which direction is good for this metric.
    const metric = metricLabel ? ' for ' + metricLabel : '';
    const where = pct === 0 ? 'matches the team average'
      : Math.abs(pct).toFixed(1) + '% ' + (pct > 0 ? 'above' : 'below') + ' the team average';
    const valence = type === 'pos' ? 'Higher is better.'
                  : type === 'neg' ? 'Lower is better.' : '';
    const explain = escapeHtml((where + metric + '. ' + valence).trim());
    return '<span class="ir-badge ' + cls + '" title="' + explain
         + '" aria-label="' + explain + '">' + label + '</span>';
  }

  function irAttCompare(agentAtt, teamAtt) {
    // ATT is reported as "> Avg / < Avg (+x.x%)" since neither
    // direction is unambiguously "better" -- shorter ATT can mean
    // efficiency, longer can mean more thorough service. Neutral
    // styling.
    if (!teamAtt) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentAtt - teamAtt) / teamAtt) * 100;
    const sign = agentAtt > teamAtt ? '> Avg' : '< Avg';
    const explain = escapeHtml('Average talk time is ' + Math.abs(pct).toFixed(1) + '% '
      + (agentAtt > teamAtt ? 'longer' : 'shorter')
      + ' than the team average. Neither direction is automatically better — longer can mean more thorough service.');
    return '<span class="ir-badge ir-badge-neu" title="' + explain + '" aria-label="' + explain + '">'
         + sign + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(1) + '%)'
         + '</span>';
  }

  /**
   * Defensive cleanup: destroys any Chart.js instance currently
   * attached to the given canvas id, regardless of whether it's
   * tracked in our own *ChartInstances arrays. Necessary because
   * a previous render that crashed mid-construction may have
   * left an orphaned chart bound to the canvas, which Chart.js
   * refuses to overwrite ("Canvas is already in use").
   */
  function destroyOrphanedChartOnCanvas_(canvasId) {
    if (typeof Chart === 'undefined' || !Chart.getChart) return;
    const cvs = document.getElementById(canvasId);
    if (!cvs) return;
    try {
      const existing = Chart.getChart(cvs);
      if (existing) existing.destroy();
    } catch (e) { /* ignore */ }
  }

  function irRenderCharts(data) {
    // Refresh THEME tokens right before chart creation so values
    // resolved late (slow CSS / font load) reach Chart.defaults
    // before the first chart is instantiated.
    refreshChartTheme();
    // Destroy old charts to avoid Chart.js leaks / canvas reuse errors.
    irChartInstances.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    irChartInstances = [];
    // Sweep up any orphans left by a partial-crash on the previous render.
    ['ir-vol-chart', 'ir-eff-chart', 'ir-dur-chart'].forEach(destroyOrphanedChartOnCanvas_);

    // Reveal every chart panel temporarily so each canvas has
    // non-zero dimensions at Chart.js instantiation time. Without
    // this, charts created in display:none panels come up 0x0 and
    // never recover when their tab is clicked. Restore visibility
    // at the end (active tab visible, others hidden).
    const irPanels = Array.prototype.slice.call(
      document.querySelectorAll('#ir-charts-container [data-panel]'));
    const irSavedDisplays = irPanels.map(function (p) { return p.style.display; });
    irPanels.forEach(function (p) { p.style.display = ''; });

    const showLabels = $('ir-show-datalabels') && $('ir-show-datalabels').checked;
    const labels   = data.trendData.labels || [];
    const datasets = data.trendData.datasets || {};
    const agents   = Object.keys(datasets);
    if (!agents.length) {
      // C-6: restore panel visibility before bailing -- the reveal above
      // otherwise left all three chart panels stacked visible regardless of
      // the active tab.
      irPanels.forEach(function (p, i) { p.style.display = irSavedDisplays[i]; });
      return;
    }

    // Build dataset descriptors with a `hexColor` field; the chart
    // factory wires up gradient fill callbacks per-dataset against
    // that color (so single-agent views feel less spartan). The
    // `_irAgent` tag lets the shared comparison-mode legend find a
    // given agent's dataset across all three charts.
    const makeDs = function (label, vals, hex, opts) {
      const o = opts || {};
      return {
        label: label,
        data: vals,
        borderColor: hex,
        backgroundColor: hex,
        hexColor: hex,
        _irAgent: o.agent || null,
        tension: 0.4,
        fill: o.fill !== false,
        pointBackgroundColor: hex,
        pointBorderColor: THEME.paperCard,
        pointBorderWidth: 1.5,
        pointRadius: 3,
        pointHoverRadius: 5,
      };
    };

    // Volume chart: in individual mode show Rung/Answered/Missed for
    // the single agent; in comparison mode show each agent's Answered.
    const volData = [];
    if (data.mode === 'individual') {
      const d = datasets[agents[0]];
      volData.push(makeDs('Total Rung', d.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung));
      volData.push(makeDs('Answered',   d.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered));
      volData.push(makeDs('Missed',     d.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed));
    } else {
      agents.forEach(function (ag, i) {
        const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
        volData.push(makeDs(ag + ' (Ans)',
                            datasets[ag].map(function (x) { return x.answered; }),
                            color, { agent: ag }));
      });
    }
    irCreateChart($('ir-vol-chart'), 'Call Volume', labels, volData,
                  { isPercent: false, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Efficiency chart: % Answered per agent + a 95% goal line.
    const effData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' %',
                    datasets[ag].map(function (x) { return Number(x.pct.toFixed(1)); }),
                    color, { agent: ag });
    });
    effData.push({
      label: 'Goal', data: new Array(labels.length).fill(95),
      borderColor: THEME.muted, borderDash: [4, 4], pointRadius: 0,
      fill: false, tension: 0, hexColor: THEME.muted, _irAgent: null,
    });
    irCreateChart($('ir-eff-chart'), '% Answered', labels, effData,
                  { isPercent: true, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Duration chart: ATT in minutes (legacy converts seconds -> minutes).
    const durData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' ATT',
                    datasets[ag].map(function (x) { return Number((x.att / 60).toFixed(2)); }),
                    color, { agent: ag });
    });
    irCreateChart($('ir-dur-chart'), 'Avg Talk Time', labels, durData,
                  { isPercent: false, isTimeMinutes: true, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    irRenderSharedLegend(data, agents);

    // Restore panel visibility so only the active tab shows. The
    // charts in the just-hidden panels keep their layout state
    // (computed during the brief reveal above) and re-paint
    // correctly when their tab is clicked.
    irPanels.forEach(function (p, i) { p.style.display = irSavedDisplays[i]; });
  }

  /**
   * Single legend rendered ABOVE the chart-tab container in
   * comparison mode (>1 agent). Clicking a chip toggles that
   * agent's series visibility across all three charts; hovering
   * highlights it across all three.
   *
   * In individual mode the shared legend is hidden -- the volume
   * chart's three series (Rung/Answered/Missed) are unambiguous
   * via their colored title legend within the chart itself, and
   * Eff/Dur each have a single series.
   */
  function irRenderSharedLegend(data, agents) {
    const el = $('ir-shared-legend');
    if (!el) return;
    if (data.mode !== 'comparison' || !agents.length) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    const chips = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      const safe = escapeHtml(ag);
      return '<button type="button" class="ir-legend-chip" data-agent="' + safe + '" '
           + 'title="Click to isolate · Shift+click to hide" '
           + 'style="--chip-color: ' + color + ';">'
           +   '<span class="ir-legend-swatch"></span>'
           +   '<span class="ir-legend-name">' + safe + '</span>'
           + '</button>';
    }).join('');
    el.innerHTML = chips;
    el.style.display = '';
    irPinnedAgent = null;   // fresh legend -> no pin

    el.querySelectorAll('.ir-legend-chip').forEach(function (chip) {
      const agent = chip.getAttribute('data-agent');
      // Plain click = pin/isolate (persistent spotlight), matching the
      // Overview chart. Shift+click = hide/show this agent's series (the
      // legacy toggle). Click the pinned chip again (or another) to
      // release/switch the isolate.
      chip.addEventListener('click', function (ev) {
        if (ev.shiftKey) {
          const willHide = !chip.classList.contains('inactive');
          chip.classList.toggle('inactive', willHide);
          irChartInstances.forEach(function (chart) {
            chart.data.datasets.forEach(function (ds, idx) {
              if (ds._irAgent === agent) chart.getDatasetMeta(idx).hidden = willHide;
            });
            chart.update();
          });
          return;
        }
        if (irPinnedAgent === agent) {
          irPinnedAgent = null;
          el.querySelectorAll('.ir-legend-chip').forEach(function (c) { c.classList.remove('pinned'); });
          irHighlightAgent_(null);
        } else {
          irPinnedAgent = agent;
          el.querySelectorAll('.ir-legend-chip').forEach(function (c) {
            c.classList.toggle('pinned', c.getAttribute('data-agent') === agent);
          });
          irHighlightAgent_(agent);
        }
      });
      // Hover previews the spotlight when nothing is pinned; with a pin
      // active, leaving re-asserts the pinned selection rather than clearing.
      chip.addEventListener('mouseenter', function () { if (!irPinnedAgent) irHighlightAgent_(agent); });
      chip.addEventListener('mouseleave', function () { irHighlightAgent_(irPinnedAgent); });
    });
  }

  function irHighlightAgent_(agent) {
    irChartInstances.forEach(function (chart) {
      chart.data.datasets.forEach(function (ds) {
        if (ds._irAgent && ds.hexColor) {
          // Faded if a specific agent is highlighted and this isn't them.
          const dim = (agent !== null && ds._irAgent !== agent);
          ds.borderColor = dim ? ds.hexColor + '33' : ds.hexColor;
          ds.borderWidth = dim ? 1 : (agent && ds._irAgent === agent ? 3 : 2);
        }
      });
      chart.update('none');
    });
  }

  function irCreateChart(canvas, title, labels, datasets, opts) {
    if (!canvas) return;
    const isPercent      = !!opts.isPercent;
    const isTimeMinutes  = !!opts.isTimeMinutes;
    const showLabels     = !!opts.showLabels;
    let globalMax = 0;
    datasets.forEach(function (ds) {
      if (!ds.data) return;
      ds.data.forEach(function (v) {
        const n = parseFloat(v) || 0;
        if (n > globalMax) globalMax = n;
      });
    });
    const suggestedMax = globalMax > 0 ? globalMax * 1.1 : 1;

    // Per-chart plugin registration (rather than Chart.register'ing
    // globally) so the existing Missed Calls bar chart isn't affected
    // by data labels. Falls back gracefully if the CDN didn't load.
    const irPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    // Replace each dataset's `backgroundColor` with a function that
    // returns a vertical gradient (line color -> transparent) once
    // the chart's chartArea exists. Skip if `fill: false` is set.
    datasets.forEach(function (ds) {
      if (ds.fill === false || !ds.hexColor) return;
      const hex = ds.hexColor;
      ds.backgroundColor = function (ctx) {
        return irGradientFill_(ctx.chart, hex);
      };
    });

    const chart = safeChart_(canvas.getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: irPlugins,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        devicePixelRatio: 1,
        plugins: {
          title:   { display: true, text: title },
          legend:  {
            display: !opts.sharedLegend,
            position: 'bottom',
            labels: { boxWidth: 10 },
          },
          datalabels: {
            display: showLabels,
            align: 'top', anchor: 'center',
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) { return ctx.dataset.borderColor; },
            borderWidth: 1, borderRadius: 2,
            color: function (ctx) { return ctx.dataset.borderColor; },
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value, ctx) {
              if (ctx.dataset.label === 'Goal') return '';
              if (!value || value == 0) return '';
              if (isTimeMinutes) return irFormatMinutes(value);
              if (isPercent)     return parseFloat(value).toFixed(1) + '%';
              return value;
            },
          },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                let l = ctx.dataset.label || '';
                if (l) l += ': ';
                if (isTimeMinutes) return l + irFormatMinutes(ctx.parsed.y);
                if (isPercent)     return l + ctx.parsed.y + '%';
                return l + ctx.parsed.y;
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: suggestedMax,
            grid: { borderDash: [5, 5] },
            ticks: {
              callback: function (val) {
                if (isPercent)     return val + '%';
                if (isTimeMinutes) return irFormatMinutes(val);
                return val;
              },
            },
          },
          x: { grid: { borderDash: [5, 5] } },
        },
      },
    });
    if (chart) irChartInstances.push(chart);   // null when Chart.js CDN failed (safeChart_)
  }

  function irFormatMinutes(val) {
    if (val == null) return '';
    const n = parseFloat(val);
    if (isNaN(n)) return '';
    const m = Math.floor(n);
    const s = Math.round((n - m) * 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  // Image-export helpers. Both Copy and Email pass through
  // html2canvas; the only difference is the destination of the
  // resulting data URL.

  function irBuildCanvas(onDone) {
    const root = $('individual-results');
    if (!root) return;

    // Temporarily reveal every chart panel and resize its Chart.js
    // instance so the canvas has rendered pixels before we read it.
    // Hidden panels (the inactive tabs) leave their canvases at 0x0
    // -- toDataURL on those returns a blank PNG, which was showing
    // up as empty chart slots in the exported image / email.
    const panels = root.querySelectorAll('#ir-charts-container [data-panel]');
    const savedDisplays = [];
    panels.forEach(function (p) {
      savedDisplays.push(p.style.display);
      p.style.display = '';
    });
    irChartInstances.forEach(function (c) { c.resize(); });

    // Two rAFs: one for Chart.js's internal re-layout to settle,
    // one for the browser to actually paint the resized canvas.
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });

      // Restore tab visibility before html2canvas snapshots the
      // live DOM. onclone re-reveals all panels in the cloned doc
      // and swaps each canvas for the captured PNG so the export
      // includes all three charts regardless of which tab is
      // currently visible on screen.
      panels.forEach(function (p, i) { p.style.display = savedDisplays[i]; });
      irChartInstances.forEach(function (c) { c.resize(); });

      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.getElementById('ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const toggle = clonedDoc.getElementById('ir-datalabels-box');
          if (toggle) toggle.style.display = 'none';
          const tabs = clonedDoc.getElementById('ir-chart-tabs');
          if (tabs) tabs.style.display = 'none';
          const cardsToolbar = clonedDoc.getElementById('ir-cards-toolbar');
          if (cardsToolbar) cardsToolbar.style.display = 'none';
          const editPop = clonedDoc.getElementById('ir-edit-popover');
          if (editPop) editPop.style.display = 'none';
          const editLine = clonedDoc.querySelector('.ir-editing-edit');
          if (editLine) editLine.style.display = 'none';
          clonedDoc.querySelectorAll('.ir-copy-tsv').forEach(function (b) { b.style.display = 'none'; });
          const status = clonedDoc.getElementById('ir-results-status');
          if (status) status.style.display = 'none';

          // In the tabbed UI only the active chart panel is visible,
          // but a captured image should include all three. Force all
          // panels visible in the clone and lay them out stacked.
          clonedDoc.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
            p.style.display = '';
            p.style.marginBottom = '14px';
          });

          // Replace each <canvas> in the clone with an <img> of the
          // pre-captured PNG. Avoids the "blank chart" problem where
          // Chart.js has nothing to draw on in the detached clone.
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  /**
   * Transient feedback on the Export button while a copy/email
   * is in flight. Saves the original label, swaps it, restores
   * after `holdMs` (or immediately if `holdMs` is 0).
   */
  function irExportBtnFeedback_(label, holdMs) {
    const btn = $('ir-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) {
      setTimeout(function () {
        btn.innerHTML = btn.dataset.label;
        btn.disabled = false;

      btn.disabled = false;

  // -- Shared delta/duration helpers (ex-Compare Ranges) ----------------
  // These outlived the retired Compare Ranges report: Insights consumes
  // all four (cards/CSV classification + improvement score + quiet gate,
  // short-duration formatting in the CSV per-day columns, KPI-tile
  // per-day captions, and the heatmap cell drill).

  function crFormatSecondsShort_(totalSeconds) {
    if (!totalSeconds || totalSeconds <= 0) return '0:00';
    totalSeconds = Math.round(totalSeconds);
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    const pad = function (n) { return n < 10 ? '0' + n : String(n); };
    if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
    return m + ':' + pad(s);
  }

  // ── Generic delta-map classifiers ────────────────────────────────
  // Shared by Compare Ranges (a.deltas) and Insights (a.metrics) --
  // both shapes are { rung, missed, answered, pct, ... } maps of
  // deltaBlocks carrying `deltaPct` (relative % for volume metrics,
  // pp for pct). One implementation so the two reports' improvement
  // scoring / classification / quiet thresholds can't drift.

  function deltaImprovementScore_(d) {
    d = d || {};
    const v = function (k) { return Number((d[k] && d[k].deltaPct) || 0); };
    return v('rung') - v('missed') + v('answered') + 5 * v('pct');
  }

  /**
   * Classify a delta map's overall direction (left-border color).
   * Adds up signed-by-valence votes across the 4 valenced
   * metrics. Threshold of >=2 / <=-2 prevents 1-metric noise
   * from tipping the classification.
   */
  // Per-WORKING-DAY normalization for the trend classification (owner
  // note): comparing windows with unequal working days (a holiday week, a
  // custom prior) made a raw answered-count drop read as "Slipping" even
  // when the agent's per-day output held steady. Volume-type metrics
  // (rung / missed / answered / ttt) get their deltaPct recomputed on
  // per-working-day values; rates (pct is pp, att is per-call) are
  // untouched, and equal-workday windows are numerically unchanged. The
  // adjustment feeds ONLY the classifiers below (trend pill, triage tiers,
  // quiet test, improver/regressor sort, headline, CSV classification
  // columns) -- the card badges keep showing the raw window totals.
  function insPerDayMetrics_(metrics, meta) {
    const wdC = Number(meta && meta.currentWorkDays) || 0;
    const wdP = Number(meta && meta.priorWorkDays) || 0;
    if (!metrics || wdC <= 0 || wdP <= 0 || wdC === wdP) return metrics;
    const out = {};
    Object.keys(metrics).forEach(function (k) {
      const b = metrics[k];
      if (!b || b.type !== 'volume' || k === 'att') { out[k] = b; return; }
      const curPd = Number(b.val) / wdC, prevPd = Number(b.prev) / wdP;
      let dp;
      if (prevPd === 0 && curPd === 0) dp = 0;
      else if (prevPd === 0) dp = 100;
      else dp = ((curPd - prevPd) / prevPd) * 100;
      out[k] = { val: b.val, prev: b.prev, formatted: b.formatted,
                 delta: b.delta, deltaPct: dp, type: b.type };
    });
    return out;
  }

  function deltaClassify_(d) {
    d = d || {};
    const sign = function (v) { return v > 0.05 ? 1 : v < -0.05 ? -1 : 0; };
    let score = 0;
    score += sign(Number((d.rung     && d.rung.deltaPct)     || 0));      // up = good
    score -= sign(Number((d.missed   && d.missed.deltaPct)   || 0));      // up = bad
    score += sign(Number((d.answered && d.answered.deltaPct) || 0));      // up = good
    score += sign(Number((d.pct      && d.pct.deltaPct)      || 0));      // up = good
    if (score >=  2) return 'improved';
    if (score <= -2) return 'regressed';
    return 'mixed';
  }

  /**
   * Quiet test: every meaningful metric moved by less than a small
   * noise threshold. Cuts visual noise so users can focus on agents
   * that actually shifted.
   */
  function deltaIsQuiet_(d) {
    d = d || {};
    const absV = function (k) { return Math.abs(Number((d[k] && d[k].deltaPct) || 0)); };
    return absV('rung')     < 10
        && absV('missed')   < 10
        && absV('answered') < 10
        && absV('pct')      < 3;   // pp difference
  }

  function alRenderSubscribersTable_() {

    const dg = alDgRows_ || [], qr = alQrRows_ || [];

      const dgDupChip = c.duplicateRow

    const btn = $('al-rs-save');
    if (btn) btn.disabled = true;
    alRsStatus_('loading', 'Saving ' + email + '…');

    // Route to the existing per-report RPCs; both fire if both are ticked.
    const tasks = [];
    if (wantDigest) tasks.push(function (next) {
      google.script.run
        .withSuccessHandler(function () { next(); })
        .withFailureHandler(function (err) { next(err || new Error('digest save failed')); })
        .saveDigestConfigRow({
          email: email, department: dept,
          cadence: $('al-rs-cadence') ? $('al-rs-cadence').value : 'daily',
          format:  $('al-rs-format')  ? $('al-rs-format').value  : 'summary',
          notes: notes, active: active,
        });
    });
    if (wantQueue) tasks.push(function (next) {
      google.script.run
        .withSuccessHandler(function () { next(); })
        .withFailureHandler(function (err) { next(err || new Error('queue save failed')); })
        .saveQueueReportSubscriber({ email: email, notes: notes, active: active });
    });
    let i = 0;
    (function run(err) {
      if (err) {
        if (btn) btn.disabled = false;
        alRsStatus_('error', 'Save failed: ' + (err && err.message ? err.message : String(err)));
        return;
      }
      if (i >= tasks.length) {
        if (btn) btn.disabled = false;
        showToast('Saved subscriber ' + email, 'success');
        alRsClear_();
        alLoadInit_();   // reload both lists + trigger status
        return;
      }
      tasks[i++](run);
    })();
  }

  function alDgRemove_(idx) {
    const c = alDgRows_[idx];
    if (!c) return;
    if (!window.confirm('Remove digest subscription for "' + c.email + '" (' + c.department + ')?')) return;
    alDgStatus_('loading', 'Removing ' + c.email + '…');
    google.script.run
      .withSuccessHandler(function () { showToast('Removed digest subscriber ' + c.email, 'success'); alLoadInit_(); })
      .withFailureHandler(function (err) { alDgStatus_('error', 'Remove failed: ' + (err && err.message ? err.message : String(err))); })
      .removeDigestConfigRow({ email: c.email, department: c.department });
  }

  function initAlerts() {
    const btn = $('alerts-btn');
    const modal = $('alerts-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      alLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const previewBtn = $('al-preview-btn');
    if (previewBtn) previewBtn.addEventListener('click', alRunPreview_);

    const sendBtn = $('al-send-btn');
    if (sendBtn) sendBtn.addEventListener('click', alRunSend_);

    // C3 config-editor form buttons.
    if ($('al-cfg-save'))  $('al-cfg-save').addEventListener('click', alCfgSave_);
    if ($('al-cfg-clear')) $('al-cfg-clear').addEventListener('click', alCfgClear_);
    // Unified Report Subscribers add/edit form (Batch 3).
    if ($('al-rs-save'))       $('al-rs-save').addEventListener('click', alRsSave_);
    if ($('al-rs-clear'))      $('al-rs-clear').addEventListener('click', alRsClear_);
    if ($('al-rs-qr-preview')) $('al-rs-qr-preview').addEventListener('click', alQrPreview_);
    if ($('al-rs-type-digest')) $('al-rs-type-digest').addEventListener('change', alRsSyncTypeFields_);
    if ($('al-rs-type-queue'))  $('al-rs-type-queue').addEventListener('change', alRsSyncTypeFields_);

    const installBtn = $('al-install-trigger-btn');
    if (installBtn) installBtn.addEventListener('click', alInstallTrigger_);
    const uninstallBtn = $('al-uninstall-trigger-btn');

    // Digest install / uninstall.
    const installDigestBtn = $('al-install-digest-btn');

    const uninstallDigestBtn = $('al-uninstall-digest-btn');

    const uninstallCwBtn = $('al-uninstall-cachewarm-btn');
    if (uninstallCwBtn) uninstallCwBtn.addEventListener('click', alUninstallCacheWarm_);
    const warmNowBtn = $('al-warm-now-btn');

  function alLoadInit_() {
    $('al-loading').style.display = '';
    $('al-body').style.display = 'none';
    google.script.run
      .withSuccessHandler(function (data) {
        $('al-loading').style.display = 'none';
        $('al-body').style.display = '';
        alRenderInit_(data);
        // Digest subscribers + trigger status is loaded separately
        // so a missing Digest.gs (e.g. mid-deploy) doesn't break the
        // whole Alerts modal.
        google.script.run
          .withSuccessHandler(function (digestData) {
            alRenderDigestInit_(digestData || { config: [], trigger: {} });
          })
          .withFailureHandler(function (err) {
            // Fall back to an empty state with the error in the
            // trigger-status caption so the admin notices.
            alRenderDigestInit_({ config: [], trigger: {},
              loadError: (err && err.message) ? err.message : String(err) });
          })
          .getDigestsInit();
        // Neon keep-warm status, loaded separately so a missing
        // NeonKeepWarm.gs (mid-deploy) doesn't break the modal.
        google.script.run
          .withSuccessHandler(function (kw) { alRenderKeepWarm_(kw || {}); })
          .withFailureHandler(function (err) {
            alRenderKeepWarm_({ loadError: (err && err.message) ? err.message : String(err) });
          })
          .getNeonKeepWarmStatus();
        // Report cache-warming status (separate, same resilience).
        google.script.run
          .withSuccessHandler(function (cw) { alRenderCacheWarm_(cw || {}); })
          .withFailureHandler(function (err) {
            alRenderCacheWarm_({ loadError: (err && err.message) ? err.message : String(err) });
          })
          .getCacheWarmStatus();
        // Daily Call Queue Report subscribers + trigger status (separate, same
        // resilience so a mid-deploy missing QueueReportEmail.gs doesn't break
        // the whole Alerts modal).
        google.script.run
          .withSuccessHandler(function (qr) { alRenderQueueReport_(qr || {}); })
          .withFailureHandler(function (err) {
            alRenderQueueReport_({ loadError: (err && err.message) ? err.message : String(err) });
          })
          .getQueueReportInit();
      })
      .withFailureHandler(function (err) {
        $('al-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getAlertsInit();
  }

  function alRenderDigestInit_(data) {
    if (!data) return;
    // Batch 3: feed the unified Report Subscribers table (the two async inits
    // each set their list + call the shared renderer; trigger status is below).
    alDgRows_ = data.config || [];
    alDgLoadError_ = data.loadError || null;
    alRenderSubscribersTable_();

    // Trigger status caption + install/uninstall buttons.
    const trig = data.trigger || { daily: false, weekly: false, monthly: false };
    const installed = !!(trig.daily && trig.weekly && trig.monthly);
    const partial   = !installed && (trig.daily || trig.weekly || trig.monthly);
    alSetStatePill_('al-digest-pill', installed);
    const statusEl  = $('al-digest-trigger-status');
    if (statusEl) {
      if (data.loadError) {
        statusEl.textContent = 'Could not load digest config: ' + data.loadError;
      } else if (installed) {
        statusEl.textContent = 'Daily + weekly + monthly digest triggers are installed.';
      } else if (partial) {
        statusEl.textContent = 'Partial install (daily=' + trig.daily + ', weekly=' + trig.weekly
                            + ', monthly=' + trig.monthly
                            + '). Click "Install" to re-install all three.';
      } else {
        statusEl.textContent = 'No digest triggers installed. Subscribers won\'t receive scheduled digests until you click Install.';
      }
    }
    const installBtn   = $('al-install-digest-btn');
    const uninstallBtn = $('al-uninstall-digest-btn');
    if (installBtn)   installBtn.style.display   = installed ? 'none' : '';
    if (uninstallBtn) uninstallBtn.style.display = installed ? ''     : 'none';

    if (data.spreadsheetUrl) {
      const link = $('al-open-digest-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }

    // O-2: surface the last per-cadence run outcome (sendDigestsForCadence_'s
    // DIGEST_LAST_RESULT_* records). A FAILED-ALL line is warn-tinted -- the
    // marker was cleared server-side, so a same-day re-run/manual send works.
    const lastEl = $('al-digest-last-results');
    if (lastEl) {
      const lr = data.lastResults || {};
      const lines = ['daily', 'weekly', 'monthly']
        .filter(function (c) { return lr[c]; })
        .map(function (c) {
          const failed = String(lr[c]).indexOf('FAILED-ALL') === 0;
          return '<span' + (failed ? ' class="al-active al-active-no"' : '') + '>'
            + escapeHtml(c) + ': ' + escapeHtml(lr[c]) + '</span>';
        });
      lastEl.innerHTML = lines.length ? ('Last runs — ' + lines.join('<br>')) : '';
      lastEl.style.display = lines.length ? '' : 'none';
    }
  }

  function alRenderInit_(data) {
    if (!data) return;
    if ($('al-date') && !$('al-date').value) {
      $('al-date').value = data.defaultDate || '';
    }
    if ($('al-open-sheet') && data.spreadsheetUrl) {
      $('al-open-sheet').href = data.spreadsheetUrl;
    }
    alRenderConfigTable_(data.config || [], data.drift || {});
    alRenderTriggerStatus_(data.trigger || { installed: false });
    alRenderLog_(data.log || []);
    alRenderNeonMirror_(data.neonMirror || null);
    alRenderNeonRead_(data.neonRead || null);
    alRenderPipelineHealth_(data.pipelineHealth || []);
    alClearResults_();
    alLastPreview = null;
    $('al-send-btn').disabled = true;

  // F2 divergence detector: render the sheet-vs-Neon DQE max-date status.
  // Hidden entirely when Neon isn't configured on this project (status
  // 'unconfigured') so non-Neon installs see nothing. 'behind' is the
  // actionable case -- the mirror is stale by gapDays.
  function alRenderNeonMirror_(m) {
    const el = $('al-neon-mirror');
    if (!el) return;
    if (!m || !m.configured || m.status === 'unconfigured') {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.style.display = '';
    let cls, msg;
    if (m.status === 'behind') {
      const days = (m.gapDays == null) ? '?' : m.gapDays;
      cls = 'al-neon-mirror-warn';
      // C-7: plain strings only -- this element is set via textContent, so
      // escapeHtml here DOUBLE-encoded (& rendered literally as &amp;).
      msg = '⚠ Neon mirror is behind the sheet by ' + days + ' day'
          + (days === 1 ? '' : 's') + ' (sheet through '
          + (m.sheetMax || '?') + ', Neon through '
          + (m.neonMax || '?') + '). Re-import the missing date(s) '
          + '— the dup-guard re-mirror heals it — or run '
          + 'backfillDQEHistoryUpsert(). Only affects reads when '
          + 'DQE_READ_SOURCE=neon.';
    } else if (m.status === 'error') {
      cls = 'al-neon-mirror-warn';
      msg = '⚠ Neon mirror health: configured, but dqe_history MAX(call_date) '
          + 'could not be read (Neon unreachable or empty). Check the NEON_* '
          + 'Script Properties.';
    } else {
      cls = 'al-neon-mirror-ok';
      msg = '✓ Neon mirror current with the sheet (both through '
          + (m.neonMax || m.sheetMax || '?') + ').';   // C-7: textContent sink
    }
    el.className = 'al-neon-mirror ' + cls;
    el.textContent = msg;
  }

  // F3: render the Neon READ-back health line. The cut-over readers
  // (computeSummary_/getCompanyOverview/IR/PR/CR/Insights/Missed) fall back to
  // the sheet on any Neon error, which is correct but silent -- once
  // DQE_READ_SOURCE=neon and the sheet ages, a sustained outage serves stale
  // data with no signal. This surfaces the recorded streak. Hidden when:
  //   - Neon isn't configured on this project, OR
  //   - the read source is still 'sheet' AND there's no recorded failure
  //     (nothing relevant to show on a default sheet install).
  function alRenderNeonRead_(m) {
    const el = $('al-neon-read');
    if (!el) return;
    const failing = m && m.status === 'failing';
    if (!m || !m.configured || (m.source !== 'neon' && !failing)) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.style.display = '';
    let cls, msg;
    if (failing) {
      const n = Number(m.count) || 0;
      cls = 'al-neon-mirror-warn';
      // C-7: plain strings only (textContent sink; escapeHtml double-encoded
      // any &/< in the recorded error message).
      msg = '⚠ Neon read-back is FAILING — serving the sheet as a fallback'
          + (m.source === 'neon' ? ' (reads may be stale if the sheet has aged)' : '')
          + '. Last error ' + (m.at || '?')
          + (m.label ? ' [' + (m.label) + ']' : '')
          + ': ' + (m.message || '(no message)')
          + '. ' + n + ' consecutive failure' + (n === 1 ? '' : 's')
          + '. Check the NEON_* Script Properties / Neon instance.';
    } else {
      cls = 'al-neon-mirror-ok';
      msg = '✓ Neon read-back healthy (DQE_READ_SOURCE=neon; no recent read failures).';
    }
    el.className = 'al-neon-mirror ' + cls;
    el.textContent = msg;
  }

  function alRenderPipelineHealth_(events) {
    const tbody = $('al-pipeline-tbody');
    if (!tbody) return;
    if (!events.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No pipeline events logged yet. The Pipeline Health sheet '
        + 'starts capturing entries once the autoImport / buildDQE '
        + 'steps next run (success or failure).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = events.map(function (e) {
      const statusCls = e.status === 'success' ? 'al-active-yes'
                      : e.status === 'failure' ? 'al-active-no'
                      : '';
      const rowsCell = (e.rows == null || e.rows === '') ? '-'
                                                         : escapeHtml(String(e.rows));
      const durCell  = (e.durationMs == null || e.durationMs === '') ? '-'
                       : (Math.round(Number(e.durationMs) / 100) / 10).toFixed(1) + 's';
      return '<tr>'
           +   '<td>' + escapeHtml(e.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(e.step || '')      + '</td>'
           +   '<td><span class="al-active ' + statusCls + '">' + escapeHtml(e.status || '') + '</span></td>'
           +   '<td class="num">' + rowsCell + '</td>'
           +   '<td class="num">' + durCell  + '</td>'
           +   '<td>' + escapeHtml(e.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  function alRenderConfigTable_(config, drift) {
    const tbody = $('al-config-tbody');
    if (!tbody) return;
    alCfgRows_ = config || [];                 // C3 editor reads this for prefill
    alFillDeptSelect_('al-cfg-dept');
    if (!config.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">'
        + 'No alert config yet. Add one dept with the form below.'
        + '</td></tr>';
      return;
    }
    const driftMap = drift || {};
    tbody.innerHTML = config.map(function (c, idx) {
      const activeCls = c.active ? 'al-active-yes' : 'al-active-no';
      const activeLbl = c.active ? 'Yes' : 'No';
      // E8 Skip Dates: prefer the parsed array (server-normalized,
      // bad tokens dropped) for the display so a malformed cell
      // doesn't show garbage. Fallback to the raw string when the
      // parsed array is empty so admins can see what they typed
      // before fixing it. Empty cell shows an em-dash.
      const skipDates = Array.isArray(c.skipDates) ? c.skipDates : [];
      let skipCell = '';
      if (skipDates.length) {
        skipCell = skipDates.map(function (r) {
          return r.from === r.to ? r.from : (r.from + ' – ' + r.to);
        }).join(', ');
      } else if (c.skipDatesRaw) {
        skipCell = '⚠︎ ' + c.skipDatesRaw;
      } else {
        skipCell = '—';
      }
      // F4: an invalid-threshold dept is flagged so the admin sees it's NOT
      // being monitored, rather than the row showing a misleading "0%".
      const threshCell = c.invalidThreshold
        ? '<td class="num"><span class="al-active al-active-no" title="Invalid threshold ('
            + escapeHtml(c.thresholdRaw || 'blank') + ') -- this dept is NOT monitored. '
            + 'Set a positive number.">⚠ invalid</span></td>'
        : '<td class="num">' + Number(c.threshold).toFixed(0) + '%</td>';
      // OPS-9: a duplicate dept row is inert (first row wins server-side) --
      // chip it so the admin removes it instead of editing the wrong row.
      const dupChip = c.duplicateRow
        ? ' <span class="al-active al-active-no" title="Duplicate row for this department -- '
            + 'the FIRST row wins; this one is ignored. Remove it.">⚠ duplicate</span>'
        : '';
      // O-3: a dept name matching no roster header is silently un-monitored
      // (empty roster -> perpetual no-data) -- chip it like the F4 invalid
      // threshold so the admin fixes the Department cell.
      const unknownChip = c.unknownDept
        ? ' <span class="al-active al-active-no" title="This department matches no roster '
            + '(DO NOT EDIT!) header -- renamed or typo? It is NOT monitored (reads an empty '
            + 'roster, logs no-data every run). Fix it to match the header exactly '
            + '(case-sensitive).">⚠ unknown dept</span>'
        : '';
      return '<tr>'
           +   '<td>' + escapeHtml(c.department) + dupChip + unknownChip + '</td>'
           +   threshCell
           +   '<td>' + alDriftCellHtml_(c, driftMap[c.department]) + '</td>'
           +   '<td>' + escapeHtml((c.extraRecipients || []).join(', ') || '(none)') + '</td>'
           +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
           +   '<td class="al-skip-dates">' + escapeHtml(skipCell) + '</td>'
           +   '<td>' + escapeHtml(c.notes || '') + '</td>'
           +   '<td>'
           +     '<button type="button" class="link-btn al-cfg-edit" data-idx="' + idx + '">Edit</button> '
           +     '<button type="button" class="link-btn al-cfg-remove" data-idx="' + idx + '">Remove</button>'
           +   '</td>'
           + '</tr>';
    }).join('');
    tbody.querySelectorAll('.al-cfg-edit').forEach(function (btn) {
      btn.addEventListener('click', function () { alCfgEdit_(Number(btn.getAttribute('data-idx'))); });
    });
    tbody.querySelectorAll('.al-cfg-remove').forEach(function (btn) {
      btn.addEventListener('click', function () { alCfgRemove_(Number(btn.getAttribute('data-idx'))); });
    });
  }

  // E10 threshold-drift chip. Renders per-dept summary of the most
  // recent ~30 daily-trigger entries from the Alert Log: fire-rate
  // and mean answer rate. Severity comes from the server
  // (chronic / lenient / ok / cold); we just map it to the chip
  // palette + tooltip. Falls back to a dash when no drift data is
  // available (e.g. Alert Log unreadable, dept not yet on the
  // sheet, or scaffold tests).
  function alDriftCellHtml_(cfg, drift) {
    if (!drift || !drift.total) {
      return '<span class="al-drift-chip al-drift-cold" '
           + 'title="No daily-trigger entries logged for this dept yet">—</span>';
    }
    if (drift.severity === 'cold') {
      return '<span class="al-drift-chip al-drift-cold" '
           + 'title="Only ' + drift.total + ' daily-trigger entries -- not enough to assess">'
           + drift.fired + '/' + drift.total + '</span>';
    }
    let cls = 'al-drift-ok';
    let tip = '';
    if (drift.severity === 'chronic') {
      cls = 'al-drift-chronic';
      tip = 'Chronic: alerts firing nearly every day. Threshold of '
          + Number(cfg.threshold).toFixed(0) + '% may be too strict, '
          + 'or the dept is sustainedly under-performing.';
    } else if (drift.severity === 'lenient') {
      cls = 'al-drift-lenient';
      tip = 'Lenient: 0 fires and the dept averages '
          + (drift.meanRate != null ? drift.meanRate.toFixed(1) + '%' : 'high')
          + ' -- threshold of ' + Number(cfg.threshold).toFixed(0)
          + '% may be too low to catch a real degradation.';
    } else {
      tip = 'In range: ' + drift.fired + ' fires of ' + drift.total
          + ' trigger runs.';
    }
    const mean = drift.meanRate != null ? (' · avg ' + drift.meanRate.toFixed(1) + '%') : '';
    return '<span class="al-drift-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         + drift.fired + '/' + drift.total + mean
         + '</span>';
  }

  function alRenderKeepWarm_(kw) {
    const el = $('al-keepwarm-status');
    const installBtn = $('al-install-keepwarm-btn');
    const uninstallBtn = $('al-uninstall-keepwarm-btn');
    if (!el) return;
    alSetStatePill_('al-keepwarm-pill', !!(kw && kw.installed && !kw.loadError));
    if (kw && kw.loadError) {
      el.textContent = 'Keep-warm status unavailable: ' + kw.loadError;
      if (installBtn) installBtn.style.display = '';
      if (uninstallBtn) uninstallBtn.style.display = 'none';
      return;
    }
    const fmtH = function (h) {
      const hr = ((h % 24) + 24) % 24;
      const ampm = hr < 12 ? 'AM' : 'PM';
      const h12 = (hr % 12) === 0 ? 12 : (hr % 12);
      return h12 + ' ' + ampm;
    };
    if (kw && kw.installed) {
      let txt = 'Keep-warm is ON — pinging Neon every ' + (kw.everyMinutes || 5)
              + ' min, weekdays ' + fmtH(kw.startHour) + '–' + fmtH(kw.endHour)
              + ' ' + tzSuffix_() + ' (~' + (kw.estMonthlyHours != null ? kw.estMonthlyHours : '?')
              + ' compute-hrs/mo).';
      if (!kw.neonConfigured) txt += ' ⚠ NEON_* Script Properties not set — pings will no-op.';
      if (kw.readSource && kw.readSource !== 'neon') {
        txt += ' Note: DQE_READ_SOURCE=' + kw.readSource + ', so reads still use the sheet;'
             + ' keep-warm only matters once you flip to neon.';
      }
      if (kw.lastPing) {
        txt += ' Last ping: ' + kw.lastPing.replace('T', ' ').replace(/\..*$/, '')
             + ' (' + (kw.lastResult || '?') + ').';
      }
      el.textContent = txt;
      if (installBtn) installBtn.style.display = 'none';
      if (uninstallBtn) uninstallBtn.style.display = '';
    } else {
      el.textContent = 'Keep-warm is OFF. Enable it to keep the Neon free-tier instance '
                     + 'awake during business hours so the first DQE read of a lull '
                     + 'doesn\'t pay a cold-start penalty (only relevant when DQE_READ_SOURCE=neon).';
      if (installBtn) installBtn.style.display = '';
      if (uninstallBtn) uninstallBtn.style.display = 'none';
    }

  // Returns "CST" or "CDT" (or whatever the user's browser
  // observes for America/Chicago today). Apps Script triggers
  // fire in the script TZ (America/Chicago) which is DST-aware,
  // so the previous hardcoded "CST" was wrong half the year.
  // Falls back to "CT" on browsers that don't expose timeZoneName.
  function tzSuffix_() {
    try {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Chicago',
        timeZoneName: 'short',
      }).formatToParts(new Date());
      const tzPart = parts.find(function (p) { return p.type === 'timeZoneName'; });
      if (tzPart && tzPart.value) return tzPart.value;
    } catch (e) { /* fall through */ }
    return 'CT';
  }

  function alRenderLog_(log) {
    const tbody = $('al-log-tbody');

      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">No alerts logged yet.</td></tr>';

           +   '<td>' + escapeHtml(l.timestamp || '') + '</td>'

           +   '<td class="num">' + (l.answerRate == null ? '-' : Number(l.answerRate).toFixed(1) + '%') + '</td>'
           +   '<td class="num">' + escapeHtml(String(l.threshold || '')) + '</td>'
