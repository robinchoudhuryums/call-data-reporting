   * insDeltaBadge_ ({deltaPct, type} + valence).
   */
  function inboundDelta_(cur, prev, valence, isPp) {
    cur = Number(cur) || 0; prev = Number(prev) || 0;
    let dp;
    if (isPp) dp = cur - prev;
    else if (prev === 0 && cur === 0) dp = 0;
    else if (prev === 0) dp = 100;
    else dp = ((cur - prev) / prev) * 100;
    return insDeltaBadge_({ deltaPct: dp, type: isPp ? 'pctPoints' : 'volume' }, valence);
  }

  function inboundAbandonPct_(r) {
    const calls = Number(r.calls) || 0;
    if (!calls) return '–';
    return (((Number(r.abandoned) || 0) / calls) * 100).toFixed(1) + '%';
  }

  // Abandon-% table cell with the shared 5%-threshold benchmark tint.
  function inboundAbandonPctCell_(r) {
    const txt = inboundAbandonPct_(r);
    return '<td class="num' + benchValueCls_('abandoned %', txt) + '">' + txt + '</td>';
  }

  function inboundRenderTable_(tbodyId, rows, extraOnHold) {
    const tbody = $(tbodyId); if (!tbody) return;
    const cols = extraOnHold ? 7 : 6;
    if (!rows || !rows.length) {
      tbody.innerHTML = '<tr><td colspan="' + cols + '" class="al-empty">No data in range.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var html = '<tr><td>' + escapeHtml(r.label) + '</td>'
        + '<td class="num">' + fmtNumber(r.calls) + '</td>'
        + '<td class="num">' + fmtNumber(r.answered) + '</td>'
        + '<td class="num">' + fmtNumber(r.abandoned) + '</td>'
        + inboundAbandonPctCell_(r);
      if (extraOnHold) html += '<td class="num">' + fmtNumber(r.on_hold) + '</td>';
      html += '<td class="num">' + fmtDuration(r.avg_wait || 0) + '</td>';
      return html + '</tr>';
    }).join('');
  }

  function inboundRenderCrossTable_(rows) {
    const tbody = $('inbound-dialin-insurer-tbody'); if (!tbody) return;
    if (!rows || !rows.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="al-empty">No labeled callers in range.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      return '<tr><td>' + escapeHtml(r.dial_in) + '</td>'
        + '<td>' + escapeHtml(r.insurer) + '</td>'
        + '<td class="num">' + fmtNumber(r.calls) + '</td>'
        + '<td class="num">' + fmtNumber(r.answered) + '</td>'
        + '<td class="num">' + fmtNumber(r.abandoned) + '</td></tr>';
    }).join('');
  }

  /**
   * The insurer table: same columns as inboundRenderTable_ plus a
   * click-to-expand daily drill-down per row (decision A: fetched on
   * demand via getInboundInsurerDaily; at most one row open). The
   * expansion carries a Volume / Abandon % tab strip + a line chart.
   */
  function inboundRenderInsurerTable_(rows) {
    const tbody = $('inbound-insurer-tbody'); if (!tbody) return;
    inboundCollapseDrill_();
    if (!rows || !rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No data in range.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      return '<tr class="inbound-insurer-row" data-insurer="' + escapeHtml(r.label) + '" tabindex="0" role="button"'
        + ' title="Show this insurer’s daily trend">'
        + '<td><span class="inbound-drill-chevron" aria-hidden="true">&#9656;</span> ' + escapeHtml(r.label) + '</td>'
        + '<td class="num">' + fmtNumber(r.calls) + '</td>'
        + '<td class="num">' + fmtNumber(r.answered) + '</td>'
        + '<td class="num">' + fmtNumber(r.abandoned) + '</td>'
        + inboundAbandonPctCell_(r)
        + '<td class="num">' + fmtNumber(r.on_hold) + '</td>'
        + '<td class="num">' + fmtDuration(r.avg_wait || 0) + '</td>'
        + '</tr>';
    }).join('');
    tbody.querySelectorAll('.inbound-insurer-row').forEach(function (tr) {
      tr.addEventListener('click', function () { inboundToggleDrill_(tr); });
      tr.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); inboundToggleDrill_(tr); }
      });
    });
  }

  function inboundCollapseDrill_() {
    if (inboundDrillChart) { try { inboundDrillChart.destroy(); } catch (e) {} inboundDrillChart = null; }
    document.querySelectorAll('.inbound-drill-row').forEach(function (row) { row.remove(); });
    document.querySelectorAll('.inbound-insurer-row.drill-open').forEach(function (tr) {
      tr.classList.remove('drill-open');
    });
    inboundExpandedInsurer = null;
  }

  function inboundToggleDrill_(tr) {
    const insurer = tr.getAttribute('data-insurer');
    const wasOpen = (inboundExpandedInsurer === insurer);
    inboundCollapseDrill_();
    if (wasOpen) return;   // second click closes
    inboundExpandedInsurer = insurer;
    tr.classList.add('drill-open');

    const drill = document.createElement('tr');
    drill.className = 'inbound-drill-row';
    drill.innerHTML = '<td colspan="7">'
      + '<div class="pr-trend-subtabs inbound-drill-tabs" role="tablist">'
      +   '<button type="button" class="pr-trend-subtab' + (inboundDrillMetric === 'calls' ? ' active' : '') + '" data-metric="calls" role="tab">Volume</button>'
      +   '<button type="button" class="pr-trend-subtab' + (inboundDrillMetric === 'rate' ? ' active' : '') + '" data-metric="rate" role="tab">Abandon %</button>'
      + '</div>'
      + '<div class="inbound-drill-canvas-wrap"><canvas id="inbound-drill-chart"></canvas></div>'
      + '<div class="inbound-drill-status pr-delta-cap">Loading daily trend…</div>'
      + '</td>';
    tr.parentNode.insertBefore(drill, tr.nextSibling);

    drill.querySelector('.inbound-drill-tabs').addEventListener('click', function (e) {
      const tab = e.target.closest('.pr-trend-subtab');
      if (!tab) return;
      inboundDrillMetric = tab.getAttribute('data-metric') || 'calls';
      drill.querySelectorAll('.pr-trend-subtab').forEach(function (b) {
        b.classList.toggle('active', b === tab);
      });
      const cached = inboundDrillCache[insurer];
      if (cached) inboundRenderDrillChart_(drill, cached);
    });

    const cached = inboundDrillCache[insurer];
    if (cached) { inboundRenderDrillChart_(drill, cached); return; }
    const dept = (inboundLastData && inboundLastData.meta && inboundLastData.meta.department) || '';
    const meta = (inboundLastData && inboundLastData.meta) || {};
    google.script.run
      .withSuccessHandler(function (res) {
        if (inboundExpandedInsurer !== insurer) return;   // collapsed meanwhile
        if (!res || res.meta.available === false) {
          const st = drill.querySelector('.inbound-drill-status');
          if (st) st.textContent = 'Daily trend unavailable (Neon unreachable) — try again.';
          return;
        }
        inboundDrillCache[insurer] = res.daily || [];
        inboundRenderDrillChart_(drill, inboundDrillCache[insurer]);
      })
      .withFailureHandler(function (err) {
        const st = drill.querySelector('.inbound-drill-status');
        if (st) st.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      })
      .getInboundInsurerDaily({ from: meta.from, to: meta.to, insurer: insurer, department: dept });
  }

  function inboundRenderDrillChart_(drillRow, daily) {
    const status = drillRow.querySelector('.inbound-drill-status');
    if (!daily.length) {
      if (status) status.textContent = 'No calls from this insurer in range.';
      return;
    }
    if (status) status.textContent = '';
    refreshChartTheme();
    if (inboundDrillChart) { try { inboundDrillChart.destroy(); } catch (e) {} inboundDrillChart = null; }
    const canvas = drillRow.querySelector('canvas');
    if (!canvas) return;
    const isRate = inboundDrillMetric === 'rate';
    const labels = daily.map(function (d) { return d.d; });
    const points = daily.map(function (d) {
      if (!isRate) return Number(d.calls) || 0;
      const calls = Number(d.calls) || 0;
      return calls > 0 ? Number((((Number(d.abandoned) || 0) / calls) * 100).toFixed(1)) : 0;
    });
    const color = isRate ? (THEME.warn || '#E15759') : (THEME.accent || '#4E79A7');
    inboundDrillChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: isRate ? 'Abandon %' : 'Calls',
          data: points,
          borderColor: color,
          backgroundColor: function (ctx) { return irGradientFill_(ctx.chart, color); },
          tension: 0.3, fill: true,
          pointBackgroundColor: color,
          pointBorderColor: THEME.paperCard, pointBorderWidth: 1.5,
          pointRadius: 2.5, pointHoverRadius: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          datalabels: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                return (isRate ? 'Abandon %: ' + ctx.parsed.y + '%' : 'Calls: ' + ctx.parsed.y);
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: isRate ? 100 : undefined,
            ticks: { callback: function (v) { return isRate ? v + '%' : v; } },
          },
        },
      },
    });
  }

  function inboundSetResultsStatus_(kind, msg) {
    const el = $('inbound-results-status'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; el.className = 'status'; return; }
    el.className = 'status status-' + (kind || 'info');
    el.textContent = msg;
    el.style.display = '';
  }

  function inboundRenderReport_(data) {
    inboundLastData = data;
    inboundDrillCache = {};   // drill-down series are per (range, dept)
    inboundCollapseDrill_();
    const meta = data.meta || {};
    const scopeLabel = meta.companyView ? 'All departments' : (meta.department || '');
    $('inbound-results-date').textContent =
      '(' + scopeLabel + ' · ' + (meta.from || '') + ' – ' + (meta.to || '') + ')';
    const cmp = $('inbound-compare-line');
    if (cmp) {
      cmp.textContent = (meta.priorFrom && meta.priorTo)
        ? 'Deltas compare against the immediately-preceding period: ' + meta.priorFrom + ' – ' + meta.priorTo
        : '';
    }

    // Unavailable (Neon down / table missing) -> show the empty-state, hide body.
    const unavail = $('inbound-unavailable'), body = $('inbound-body');
    const csvBtn = $('inbound-csv-btn');
    if (meta.available === false) {
      if (unavail) unavail.style.display = '';
      if (body) body.style.display = 'none';
      if (csvBtn) csvBtn.style.display = 'none';
      inboundSetResultsStatus_('', '');
      return;
    }
    if (unavail) unavail.style.display = 'none';
    if (body) body.style.display = '';
    if (csvBtn) csvBtn.style.display = '';

    // Dept with no mapped queues: same operator hint QCD uses (the dept
    // needs a Dept Config row / DEPT_QCD_QUEUES entry before its inbound
    // slice can attribute anything).
    inboundSetResultsStatus_('', '');
    if (meta.unmapped) {
      inboundSetResultsStatus_('warn', 'No queues are mapped for '
        + (meta.department || 'this department')
        + ' — map its A_Q_* queue names in Dept Config (admin) to populate this view.');
    }

    reportHeadline_('inbound-headline', 'inbound-results', inboundHeadline_(data));

    const k = data.kpis || {};
    const p = data.kpisPrior || {};
    const tiles = [
      inboundKpiTile_('Inbound calls', fmtNumber(k.total),
        (k.anonymous ? fmtNumber(k.anonymous) + ' anonymous' : ''),
        inboundDelta_(k.total, p.total, 'neu', false)),
      inboundKpiTile_('Answered', fmtNumber(k.answered), (k.answerRate || 0) + '%',
        inboundDelta_(k.answered, p.answered, 'pos', false)),
      inboundKpiTile_('Abandoned', fmtNumber(k.abandoned), (k.abandonRate || 0) + '%',
        inboundDelta_(k.abandoned, p.abandoned, 'neg', false)),
      inboundKpiTile_('Abandoned on hold', fmtNumber(k.abandonedOnHold), 'caller hung up held',
        inboundDelta_(k.abandonedOnHold, p.abandonedOnHold, 'neg', false)),
      inboundKpiTile_('Avg wait', fmtDuration(k.avgWaitSec), 'to answer / abandon',
        inboundDelta_(k.avgWaitSec, p.avgWaitSec, 'neg', false)),
      inboundKpiTile_('Avg hold', fmtDuration(k.avgHoldSec), 'when held',
        inboundDelta_(k.avgHoldSec, p.avgHoldSec, 'neu', false)),
    ];
    // IVR abandons never reached a queue, so they're unattributable to any
    // dept -- the bucket only renders on the company-wide view (decision C).
    if (meta.companyView) {
      tiles.push(inboundKpiTile_('Abandoned in IVR', fmtNumber(k.abandonedIvr),
        'unattributable — no queue reached',
        inboundDelta_(k.abandonedIvr, p.abandonedIvr, 'neg', false)));
    }
    $('inbound-kpi-row').innerHTML = tiles.join('');

    inboundRenderInsurerTable_(data.byInsurer);
    inboundRenderTable_('inbound-dialin-tbody', data.byDialIn, false);
    inboundRenderTable_('inbound-queue-tbody', data.byQueue, false);
    inboundRenderCrossTable_(data.byDialInInsurer);
  }

  /**
   * Client-side CSV of the full inbound payload (KPIs vs prior, the
   * three breakdowns, the dial-in x insurer cross-cut, and the daily
   * series -- which has no on-screen table, so the CSV is the only way
   * to get it). Every cell routes through csvSafeCell_ before the
   * RFC-4180 quoting (insurer labels are admin text; queue/dial-in
   * values originate upstream -- treat all as untrusted).
   */
  function inboundDownloadCsv_() {
    if (!inboundLastData || (inboundLastData.meta || {}).available === false) return;
    const d = inboundLastData;
    const meta = d.meta || {};
    const esc = function (v) {
      const s = csvSafeCell_(v == null ? '' : v);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const row = function (cells) { return cells.map(esc).join(','); };
    const lines = [];
    lines.push(row(['Inbound Calls report', meta.from + ' to ' + meta.to]));
    lines.push(row(['Scope', meta.companyView ? 'All departments' : (meta.department || '')]));
    lines.push(row(['Prior window', meta.priorFrom + ' to ' + meta.priorTo]));
    lines.push('');
    lines.push(row(['KPI', 'Current', 'Prior']));
    const k = d.kpis || {}, p = d.kpisPrior || {};
    [['Inbound calls', 'total'], ['Answered', 'answered'], ['Abandoned', 'abandoned'],
     ['Missed', 'missed'], ['Abandoned on hold', 'abandonedOnHold'], ['Anonymous', 'anonymous'],
     ['Answer rate %', 'answerRate'], ['Abandon rate %', 'abandonRate'],
     ['Avg wait sec', 'avgWaitSec'], ['Avg hold sec', 'avgHoldSec']].forEach(function (m) {
      lines.push(row([m[0], k[m[1]] != null ? k[m[1]] : '', p[m[1]] != null ? p[m[1]] : '']));
    });
    const breakdown = function (title, firstCol, rows, withOnHold) {
      lines.push('');
      lines.push(row([title]));
      const head = [firstCol, 'Calls', 'Answered', 'Abandoned'];
      if (withOnHold) head.push('On-hold abandon');
      head.push('Avg wait sec');
      lines.push(row(head));
      (rows || []).forEach(function (r) {
        const cells = [r.label, r.calls, r.answered, r.abandoned];
        if (withOnHold) cells.push(r.on_hold);
        cells.push(r.avg_wait != null ? r.avg_wait : '');
        lines.push(row(cells));
      });
    };
    breakdown('By insurer (labeled callers only)', 'Insurer', d.byInsurer, true);
    breakdown('By dial-in', 'Dial-in', d.byDialIn, false);
    breakdown('By entry queue', 'Entry queue', d.byQueue, false);
    lines.push('');
    lines.push(row(['By dial-in x insurer (labeled callers only)']));
    lines.push(row(['Dial-in', 'Insurer', 'Calls', 'Answered', 'Abandoned']));
    (d.byDialInInsurer || []).forEach(function (r) {
      lines.push(row([r.dial_in, r.insurer, r.calls, r.answered, r.abandoned]));
    });
    lines.push('');
    lines.push(row(['Daily']));
    lines.push(row(['Date', 'Calls', 'Abandoned']));
    (d.daily || []).forEach(function (r) {
      lines.push(row([r.d, r.calls, r.abandoned]));
    });
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inbound-calls_' + (meta.from || '') + '_' + (meta.to || '') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  // -- Caller Lookup (admin) ----------------------------------------------
  // "Explain the full call path for this caller on this day." Phone +
  // date range -> getCallerLookup (CallerLookup.gs) -> one timeline card
  // per inbound call. Calls captured since the journey extension render
  // the leg-by-leg path; older rows fall back to the entry->final queue
  // summary. The raw number never leaves the request payload -- the
  // server hashes it in memory and queries by hash.

  function initCallerLookup() {
    const btn = $('caller-lookup-btn');
    const modal = $('caller-lookup-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      clSetDefaultDates_();
      const phone = $('cl-phone');
      if (phone) phone.focus();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const lookupBtn = $('cl-lookup-btn');
    if (lookupBtn) lookupBtn.addEventListener('click', runCallerLookup_);
    const phoneInput = $('cl-phone');
    if (phoneInput) phoneInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') runCallerLookup_();
    });
  }

  function clSetDefaultDates_() {
    if ($('cl-from') && $('cl-from').value) return;   // keep last-used range
    if ($('cl-from')) $('cl-from').value = launcherIsoDaysAgo_(30);
    if ($('cl-to'))   $('cl-to').value   = launcherIsoDaysAgo_(0);
  }

  function clSetError_(msg) {
    const el = $('cl-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function clShowOnly_(id) {
    ['cl-unconfigured', 'cl-unavailable', 'cl-empty', 'cl-results'].forEach(function (x) {
      const el = $(x);
      if (el) el.style.display = (x === id) ? '' : 'none';
    });
  }

  function runCallerLookup_() {
    clSetError_('');
    const phone = ($('cl-phone') && $('cl-phone').value) || '';
    const digits = phone.replace(/\D/g, '');
    if (digits.length < 10) { clSetError_('Enter a phone number with at least 10 digits.'); return; }
    const from = $('cl-from').value, to = $('cl-to').value;
    if (!from || !to) { clSetError_('Pick a start and end date.'); return; }
    if (from > to)    { clSetError_('Start date must be on or before end date.'); return; }

    const btn = $('cl-lookup-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Looking up…';
    clShowOnly_('');
    const status = $('cl-status');
    if (status) { status.className = 'status status-loading'; status.textContent = 'Searching inbound calls…'; status.style.display = ''; }

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false; btn.textContent = prev;
        if (status) status.style.display = 'none';
        clRenderResults_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        if (status) status.style.display = 'none';
        clSetError_('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getCallerLookup({ phone: phone, from: from, to: to });
  }

  function clRenderResults_(data) {
    const meta = (data && data.meta) || {};
    if (meta.configured === false) { clShowOnly_('cl-unconfigured'); return; }
    if (meta.available === false)  { clShowOnly_('cl-unavailable');  return; }
    const calls = (data && data.calls) || [];
    if (!calls.length) {
      const hint = $('cl-empty-hint');
      if (hint) hint.textContent = 'No inbound calls from this number between '
        + (meta.from || '?') + ' and ' + (meta.to || '?')
        + '. Capture starts the day the inbound mirror first ran — older calls were never recorded.';
      clShowOnly_('cl-empty');
      return;
    }
    const title = $('cl-results-title');
    if (title) title.textContent = calls.length + ' call' + (calls.length === 1 ? '' : 's')
      + (calls[0].insurer ? ' · ' + calls[0].insurer : '')
      + (meta.truncated ? ' (truncated)' : '');
    const dateEl = $('cl-results-date');
    if (dateEl) dateEl.textContent = (meta.from || '') + ' → ' + (meta.to || '');
    $('cl-call-list').innerHTML = calls.map(clCallCardHtml_).join('');
    clShowOnly_('cl-results');
  }

  function clOutcomeChip_(c) {
    let cls = 'cl-chip-muted', label = c.disposition || 'unknown';
    if (c.disposition === 'answered')  { cls = 'cl-chip-good'; label = 'Answered'; }
    if (c.disposition === 'missed')    { label = 'Missed'; }
    if (c.disposition === 'abandoned') {
      cls = 'cl-chip-warn';
      label = c.abandonStage === 'ivr' ? 'Abandoned in IVR' : 'Abandoned in queue';
    }
    let html = '<span class="cl-chip ' + cls + '">' + escapeHtml(label) + '</span>';
    if (c.abandonedOnHold) {
      html += ' <span class="cl-chip cl-chip-warn">Hung up on hold</span>';
    }
    return html;
  }

  function clCallCardHtml_(c) {
    const when = escapeHtml((c.callDate || '?') + (c.callStart ? ' · ' + c.callStart : ''));
    const facts = [];
    if (c.waitSeconds != null) facts.push('Waited ' + fmtDuration(c.waitSeconds));
    if (c.holdSeconds > 0)     facts.push('Held ' + fmtDuration(c.holdSeconds));
    if (c.finalDept)           facts.push('Answered by ' + escapeHtml(c.finalDept));
    if (c.dialIn)              facts.push('Dialed ' + escapeHtml(c.dialIn));
    let body;
    if (c.journey && c.journey.length) {
      body = clChainHtml_(c.journey)
           + '<div class="cl-journey">' + c.journey.map(clJourneyRowHtml_).join('') + '</div>';
    } else {
      // Pre-journey-extension row: queue-level summary only.
      const path = c.entryQueue
        ? escapeHtml(c.entryQueue) + (c.finalQueue && c.finalQueue !== c.entryQueue
            ? ' → ' + escapeHtml(c.finalQueue) + ' (' + c.numTransfers + ' transfer' + (c.numTransfers === 1 ? '' : 's') + ')'
            : '')
        : 'Never reached a queue (IVR only)';
      body = '<div class="cl-journey-summary">' + path
           + ' <span class="cl-journey-note">— leg-by-leg detail not captured for this call (recorded before the journey extension)</span></div>';
    }
    return '<div class="cl-call-card">'
         +   '<div class="cl-call-head">'
         +     '<span class="cl-call-when">' + when + '</span>'
         +     clOutcomeChip_(c)
         +   '</div>'
         +   (facts.length ? '<div class="cl-call-facts">' + facts.join(' · ') + '</div>' : '')
         +   body
         + '</div>';
  }

  /**
   * Compact visual path above the detailed timeline: queue + agent legs
   * as arrow-chained tokens (IVR legs collapse into one leading token).
   * "IVR → Sales → Anna ✗ → Ben ✓ 4:12" reads the whole call at a glance;
   * the timeline below keeps the exact timestamps / hold detail.
   */
  function clChainHtml_(journey) {
    const toks = [];
    let leadingIvr = false;
    journey.forEach(function (ev) {
      if (ev.kind === 'queue') {
        toks.push({ txt: String(ev.name || '').replace(/^A_Q_/i, ''), cls: 'cl-tok-queue' });
      } else if (ev.kind === 'answer') {
        toks.push({ txt: (ev.name || '?') + ' ✓' + (ev.talk ? ' ' + fmtDuration(ev.talk) : ''), cls: 'cl-tok-answer' });
      } else if (ev.missed) {
        toks.push({ txt: (ev.name || '?') + ' ✗', cls: 'cl-tok-missed' });
      } else if (!toks.length) {
        leadingIvr = true;   // pre-queue IVR/menu legs collapse to one token
      }
    });
    if (!toks.length) return '';
    const parts = (leadingIvr ? [{ txt: 'IVR', cls: 'cl-tok-ivr' }] : []).concat(toks);
    return '<div class="cl-chain">'
      + parts.map(function (p) {
          return '<span class="cl-tok ' + p.cls + '">' + escapeHtml(p.txt) + '</span>';
        }).join('<span class="cl-arrow" aria-hidden="true">→</span>')
      + '</div>';
  }

  function clJourneyRowHtml_(ev) {
    const kindIcon = ev.kind === 'queue' ? '⧖' : (ev.kind === 'answer' ? '✓' : '·');
    const kindCls  = ev.kind === 'answer' ? ' cl-ev-answer' : (ev.kind === 'queue' ? ' cl-ev-queue' : '');
    const bits = [];
    if (ev.talk)  bits.push('talked ' + fmtDuration(ev.talk));
    else if (ev.secs != null) bits.push(fmtDuration(ev.secs));
    if (ev.hold)  bits.push('held ' + fmtDuration(ev.hold));
    if (ev.abandoned) bits.push('caller hung up');
    else if (ev.missed && ev.kind !== 'queue') bits.push('no answer');
    return '<div class="cl-ev' + kindCls + '">'
         +   '<span class="cl-ev-time">' + escapeHtml(ev.t || '') + '</span>'
         +   '<span class="cl-ev-icon" aria-hidden="true">' + kindIcon + '</span>'
         +   '<span class="cl-ev-name">' + escapeHtml(ev.name || '(unknown)') + '</span>'
         +   (bits.length ? '<span class="cl-ev-bits">' + escapeHtml(bits.join(' · ')) + '</span>' : '')
         + '</div>';
  }

  let qcdChartInstance = null;
  let qcdActiveMetric = 'totalCalls';

  function initQcdReport() {

    const viewToggle = $('qcd-view-toggle');
    if (viewToggle) viewToggle.addEventListener('click', function (e) {
      const btn = e.target.closest('.seg-btn');
      if (!btn) return;
      const next = btn.getAttribute('data-view') || 'monthly';
      if (next === qcdActiveView) return;
      qcdActiveView = next;
      viewToggle.querySelectorAll('.seg-btn').forEach(function (b) {
        const active = b === btn;
        b.classList.toggle('active', active);
        b.setAttribute('aria-checked', active ? 'true' : 'false');

      if (qcdLastData) qcdRenderChart_(qcdLastData);

    // Export menu
    const exportBtn  = $('qcd-export-btn');
    const exportMenu = $('qcd-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        exportMenu.style.display = exportMenu.style.display === 'none' ? '' : 'none';
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        exportMenu.style.display = 'none';

      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        exportMenu.style.display = 'none';
      });
    }
  }

  function setQcdDefaultDates_() {
    const now = new Date();
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    const yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
    $('qcd-from').value = isoOf(yesterday);
    $('qcd-to').value   = isoOf(yesterday);
    var p = $('qcd-preset');
    if (p) p.value = 'yesterday';
  }

  function applyQcdPreset() {
    const v = $('qcd-preset').value;
    if (v === 'custom') return;
    const now = new Date();
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    let s, e;
    if (v === 'yesterday') {
      s = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      e = new Date(s);
    } else if (v === 'thisMonth') {
      s = new Date(now.getFullYear(), now.getMonth(), 1);
      e = now;
    } else if (v === 'lastMonth') {
      s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      e = new Date(now.getFullYear(), now.getMonth(), 0);
    } else if (v === 'last30') {
      s = new Date(now.getTime() - 29 * 86400000);
      e = now;
    } else if (v === 'last3Months') {
      s = new Date(now.getFullYear(), now.getMonth() - 3, 1);
      e = now;
    } else if (v === 'last12Months') {
      s = new Date(now.getFullYear(), now.getMonth() - 12, 1);
      e = now;
    } else if (v === 'lastYear') {
      s = new Date(now.getFullYear() - 1, 0, 1);
      e = new Date(now.getFullYear() - 1, 11, 31);
    }
    if (!s) return;
    $('qcd-from').value = isoOf(s);
    $('qcd-to').value   = isoOf(e);
  }

  function showQcdForm() {
    launcherHideLoading_('qcd-launcher-loading');
    $('qcd-form').style.display    = '';
    $('qcd-results').style.display = 'none';
    qcdSetFormError_('');
  }
  function showQcdResults_() {
    launcherHideLoading_('qcd-launcher-loading');
    $('qcd-form').style.display    = 'none';
    $('qcd-results').style.display = '';
  }
  function qcdSetFormError_(msg) {
    const el = $('qcd-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function runQcdReport() {
    qcdSetFormError_('');
    const dept = getRequestedDept();
    const from = $('qcd-from').value;
    const to   = $('qcd-to').value;
    if (!from || !to) { qcdSetFormError_('Pick a start and end date.'); return; }
    if (from > to)    { qcdSetFormError_('Start date must be on or before end date.'); return; }

    const btn = $('qcd-generate-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Loading…';

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false; btn.textContent = prev;
        qcdRenderReport_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        showQcdForm();   // dismisses the launcher loading pane if active
        qcdSetFormError_('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getQcdReport({ department: dept, from: from, to: to,
                      includeSubQueues: qcdIncludeSubQueues_() });
  }

  /** Sub-queue rollup toggle state (defaults to true = INV-51 rollup). */
  function qcdIncludeSubQueues_() {
    const cb = $('qcd-include-sub');
    return cb ? !!cb.checked : true;
  }

  function qcdRenderReport_(data) {
    reportHeadline_('qcd-headline', 'qcd-results', qcdHeadline_(data));
    qcdLastData = data;
    $('qcd-results-title').textContent = 'QCD Report';
    $('qcd-results-date').textContent  = '(' + (data.dateLabel || '') + ')';
    showQcdResults_();

    // Consistent empty-state: an unmapped dept OR no QCD activity in the
    // selected range shows the shared .empty-state block and hides the
    // data sections (KPIs / tables / chart) -- so it reads like the My
    // Department empty state rather than a wall of zeros. Returns early to
    // skip the data renders + the chart (which would otherwise draw into a
    // now-hidden canvas).
    var qcdUnmapped = !!(data.meta && data.meta.unmapped);
    var qcdTotalCalls = (data.totals && Number(data.totals.totalCalls)) || 0;
    var qcdEmptyEl = $('qcd-empty');
    var qcdDataEl  = $('qcd-data-sections');
    if (qcdUnmapped || qcdTotalCalls === 0) {
      if (qcdEmptyEl) {
        qcdEmptyEl.innerHTML = qcdUnmapped
          ? emptyStateHtml_('&#128230;', 'No queues mapped for this department',
              'Map this department’s A_Q_* queues via the Dept Config tab (admin) so its QCD data can be surfaced.')
          : emptyStateHtml_('&#128202;', 'No QCD activity in this range',
              'No calls were recorded for this department’s mapped queues on the selected dates. Try a wider range.');
        qcdEmptyEl.style.display = '';
      }
      if (qcdDataEl) qcdDataEl.style.display = 'none';
      return;
    }
    if (qcdEmptyEl) qcdEmptyEl.style.display = 'none';
    if (qcdDataEl)  qcdDataEl.style.display  = '';

    var hint = $('qcd-queue-hint');
    if (hint) {
      if (data.meta && data.meta.unmapped) {
        hint.textContent = 'No queues mapped for this department. Add a '
          + 'row to DEPT_QCD_QUEUES in Config.gs and redeploy.';
        hint.style.display = '';
      } else {
        hint.style.display = 'none';
      }
    }
    // Single-day range: hide the Daily view toggle since a single
    // point isn't useful as a line chart; force monthly view.
    var isSingleDay = data.meta && data.meta.from === data.meta.to;
    var dailyBtn = document.querySelector('#qcd-view-toggle [data-view="daily"]');
    if (dailyBtn) dailyBtn.style.display = isSingleDay ? 'none' : '';
    if (isSingleDay && qcdActiveView === 'daily') {
      qcdActiveView = 'monthly';
      var vt = $('qcd-view-toggle');
      if (vt) vt.querySelectorAll('.seg-btn').forEach(function (b) {
        var active = b.getAttribute('data-view') === 'monthly';
        b.classList.toggle('active', active);
        b.setAttribute('aria-checked', active ? 'true' : 'false');
      });
    }
    qcdRenderForecast_(data);
    qcdRenderKpiTiles_(data.totals || {});
    qcdRenderQueueTable_(data.queueBreakdown || [], data.totals || {});
    qcdRenderDailyTable_(data.dailySeries || []);
    requestAnimationFrame(function () { qcdRenderChart_(data); });
  }

  // Days-to-violation forecast (E9, Phase E). Linear regression on
  // the last 7 entries of dailySeries.abandonedPct; if slope > 0 and
  // the regression projects a crossing of the 5% violation threshold
  // within QCD_FORECAST_HORIZON_DAYS (=7), surface a warn-tinted
  // banner above the KPI tiles. Hidden in healthy states (negative
  // slope, projected crossing too far out, or already above 5%).
  //
  // Math (avoids any library dep):
  //   slope = (n*Σxy - Σx*Σy) / (n*Σx² - (Σx)²)
  //   daysToCross = (5 - currentY) / slope
  // where currentY is the last observed abandonedPct and x is days
  // since the first point in the window.
  const QCD_FORECAST_HORIZON_DAYS = 7;
  const QCD_FORECAST_WINDOW_DAYS  = 7;
  /**
   * SHARED days-to-violation forecast (INV-51 / E9 semantics): 7-day
   * linear regression on a daily abandoned-% series, projecting when
   * the 5% threshold will cross. Returns inner HTML, or '' in the
   * three healthy states (already over / flat-or-improving / crossing
   * beyond the horizon). Consumed by the QCD Report AND the Insights
   * Queue health section, so the two can't disagree.
   */
  function abandonForecastHtml_(pcts) {
    const series = pcts || [];
    if (series.length < QCD_FORECAST_WINDOW_DAYS) return '';
    const ys = series.slice(-QCD_FORECAST_WINDOW_DAYS).map(function (v) { return Number(v) || 0; });
    const currentY = ys[ys.length - 1];
    // Already above threshold? No forecast -- the operator is past
    // the projection horizon; existing chrome already flags it.
    if (currentY >= 5) return '';
    const n = ys.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) {
      sumX  += i;
      sumY  += ys[i];
      sumXY += i * ys[i];
      sumXX += i * i;
    }
    const denom = n * sumXX - sumX * sumX;
    if (denom === 0) return '';
    const slope = (n * sumXY - sumX * sumY) / denom;
    // Healthy: trend is flat or improving. Skip the banner.
    if (slope <= 0.01) return '';
    const daysToCross = (5 - currentY) / slope;
    if (daysToCross <= 0 || daysToCross > QCD_FORECAST_HORIZON_DAYS) return '';
    const wholeDays = Math.max(1, Math.round(daysToCross));
    const slopeDay  = slope.toFixed(2);
    return '<span class="qcd-forecast-kicker">Forecast</span>'
      + 'Abandoned % is trending up '
      + '<strong>+' + escapeHtml(slopeDay) + '%/day</strong>'
      + ' over the last ' + QCD_FORECAST_WINDOW_DAYS + ' days. '
      + 'At this rate, it crosses the 5% violation threshold in '
      + '<strong>~' + wholeDays + ' day' + (wholeDays === 1 ? '' : 's') + '</strong>.';
  }

  function qcdRenderForecast_(data) {
    const el = $('qcd-forecast');
    if (!el) return;
    const series = ((data && data.dailySeries) || []).map(function (d) { return d.abandonedPct; });
    const html = abandonForecastHtml_(series);
    el.innerHTML = html;
    el.style.display = html ? '' : 'none';
  }

  function qcdRenderKpiTiles_(t) {
    const wrap = $('qcd-kpi-row');
    if (!wrap) return;
    // Reuse the Performance Report KPI tile DOM shape so existing
    // styling carries over. No prev/delta on QCD's KPIs -- absolute
    // values only. Two tiles are color-coded:
    //   - Abandoned %: warn-red when >= 5% (pipeline's violation
    //     threshold). Mirrors the Overview tile chip color rule.
    //   - Violations (current month): warn-red when > 0. Server
    //     sources this as MTD across the dept's mapped queues, NOT
    //     the selected-range sum -- operationally more useful as
    //     "how many bad days this month?"
    const tile = function (label, value, valueClass) {
      return '<div class="pr-kpi-tile">'
           +   '<div class="pr-kpi-label">' + escapeHtml(label) + '</div>'
           +   '<div class="pr-kpi-value' + (valueClass ? ' ' + valueClass : '') + '">'
           +     escapeHtml(String(value))
           +   '</div>'
           + '</div>';
    };
    const pct = Number(t.abandonedPct) || 0;
    const pctCls  = pct >= 5 ? 'pr-delta-neg' : '';
    const violCls = (Number(t.violations) || 0) > 0 ? 'pr-delta-neg' : '';
    wrap.innerHTML =
        tile('Total Calls',  fmtNumber(t.totalCalls    || 0))
      + tile('Answered',     fmtNumber(t.totalAnswered || 0))
      + tile('Abandoned',    fmtNumber(t.abandoned     || 0))
      + tile('Abandoned %',  String(t.abandonedPctStr  || '0.00%'), pctCls)
      + tile('Longest Wait', String(t.longestWait      || '0:00:00'))
      + tile('Avg Answer',   String(t.avgAnswer        || '0:00:00'))
      + tile('Violations (current month)', fmtNumber(t.violations || 0), violCls);
  }

  function qcdRenderDailyTable_(rows) {
    const tbody = $('qcd-daily-tbody');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">No daily QCD rows in the selected range for this dept\'s mapped queues.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var pct = Number(r.abandonedPct) || 0;
      var pctCls = pct >= 5 ? 'num qcd-warn-light' : 'num';
      var viol = Number(r.violations) || 0;
      var violCls = viol > 0 ? 'num qcd-warn-light' : 'num';
      return '<tr>'
           +   '<td>' + escapeHtml(r.date) + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalCalls)    + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalAnswered) + '</td>'
           +   '<td class="num">' + fmtNumber(r.abandoned)     + '</td>'
           +   '<td class="' + pctCls + '">' + escapeHtml(r.abandonedPctStr) + '</td>'
           +   '<td class="' + violCls + '">' + fmtNumber(r.violations)    + '</td>'
           + '</tr>';
    }).join('');
  }

  function qcdRenderQueueTable_(rows, totals) {
    var tbody = $('qcd-queue-tbody');
    var tfoot = $('qcd-queue-tfoot');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">No QCD rows for this dept\'s mapped queues in the selected range.</td></tr>';
      if (tfoot) tfoot.innerHTML = '';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var viol = Number(r.violations) || 0;
      var pct = Number(r.abandonedPct) || 0;
      var violCls = viol > 3 ? 'qcd-warn-strong' : (viol > 0 ? 'qcd-warn-light' : '');
      var pctCls  = pct >= 5 ? 'qcd-warn-light' : '';
      var hasDetail = viol > 0 && r.violationDates && r.violationDates.length;
      var chevron = hasDetail ? ' <span class="qcd-expand-icon">&#9654;</span>' : '';
      var rowCls = hasDetail ? ' class="qcd-expandable"' : '';
      var html = '<tr' + rowCls + ' data-queue="' + escapeHtml(r.queue) + '">'
           +   '<td>' + escapeHtml(r.queue) + chevron + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalCalls)    + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalAnswered) + '</td>'
           +   '<td class="num">' + fmtNumber(r.abandoned)     + '</td>'
           +   '<td class="num' + (pctCls ? ' ' + pctCls : '') + '">' + escapeHtml(r.abandonedPctStr) + '</td>'
           +   '<td class="num">' + escapeHtml(r.longestWait)  + '</td>'
           +   '<td class="num">' + escapeHtml(r.avgAnswer)    + '</td>'
           +   '<td class="num' + (violCls ? ' ' + violCls : '') + '">' + fmtNumber(r.violations) + '</td>'
           + '</tr>';
      if (hasDetail) {
        html += '<tr class="qcd-detail-row" style="display:none;"><td colspan="8">'
             +  '<div class="qcd-detail-wrap"><strong>Violation dates:</strong> '
             +  r.violationDates.map(function (d) { return escapeHtml(d); }).join(', ')
             +  '</div></td></tr>';
      }
      return html;
    }).join('');
    // Expandable rows: click to toggle detail
    tbody.addEventListener('click', function (e) {
      var row = e.target.closest('.qcd-expandable');
      if (!row) return;
      var detail = row.nextElementSibling;
      if (!detail || !detail.classList.contains('qcd-detail-row')) return;
      var open = detail.style.display !== 'none';
      detail.style.display = open ? 'none' : '';
      var icon = row.querySelector('.qcd-expand-icon');
      if (icon) icon.textContent = open ? '▶' : '▼';
    });
    if (tfoot && totals) {
      var tPct = Number(totals.abandonedPct) || 0;
      var tPctCls = tPct >= 5 ? 'qcd-warn-light' : '';
      var tViol = Number(totals.violations) || 0;
      var tViolCls = tViol > 3 ? 'qcd-warn-strong' : (tViol > 0 ? 'qcd-warn-light' : '');
      tfoot.innerHTML = '<tr class="qcd-row-total">'
        +   '<td>Department total</td>'
        +   '<td class="num">' + fmtNumber(totals.totalCalls)    + '</td>'
        +   '<td class="num">' + fmtNumber(totals.totalAnswered) + '</td>'
        +   '<td class="num">' + fmtNumber(totals.abandoned)     + '</td>'
        +   '<td class="num' + (tPctCls ? ' ' + tPctCls : '') + '">' + escapeHtml(totals.abandonedPctStr || '0.00%') + '</td>'
        +   '<td class="num">' + escapeHtml(totals.longestWait || '0:00:00')   + '</td>'
        +   '<td class="num">' + escapeHtml(totals.avgAnswer || '0:00:00')     + '</td>'
        +   '<td class="num' + (tViolCls ? ' ' + tViolCls : '') + '">' + fmtNumber(totals.violations) + '</td>'
        + '</tr>';
    }
  }

  function qcdRenderChart_(data) {
    if (typeof Chart === 'undefined') return;
    var canvas = document.getElementById('qcd-chart');
    if (!canvas) return;
    destroyOrphanedChartOnCanvas_('qcd-chart');
    if (qcdChartInstance) { try { qcdChartInstance.destroy(); } catch (e) {} qcdChartInstance = null; }

    var isDaily = (qcdActiveView === 'daily');
    var labels, deptSeries;
    if (isDaily) {
      var daily = data.dailySeries || [];
      labels = daily.map(function (r) { return r.date ? r.date.slice(5) : ''; });
      deptSeries = daily;
    } else {
      var td = data.trendData || { labels: [], series: [] };
      labels = td.labels || [];
      deptSeries = td.series || [];
    }
    var metric = qcdActiveMetric;
    var viewLabel = isDaily ? 'daily' : 'monthly';
    var headerLabels = {
      totalCalls:   'Total Calls (' + viewLabel + ')',
      abandonedPct: 'Abandoned % (' + viewLabel + ')',
      violations:   'Violations (' + viewLabel + ')',
    };
    $('qcd-chart-header').textContent = headerLabels[metric] || 'Trend';

    var formatPct = (metric === 'abandonedPct');
    var extractVal = function (x) {
      if (metric === 'totalCalls') return x.totalCalls;
      if (metric === 'abandonedPct') return Number((x.abandonedPct || 0).toFixed(2));
      return x.violations;
    };

    var queues = (data.meta && data.meta.queues) || [];
    var perQueue = data.perQueue || {};
    var multiQueue = queues.length > 1;
    var queueColors = irChartColors_();
    var datasets = [];

    if (multiQueue) {
      queues.forEach(function (q, i) {
        var qData = perQueue[q];
        if (!qData) return;
        var src = isDaily ? (qData.daily || []) : (qData.monthly || []);
        datasets.push({
          label: q,
          data: src.map(extractVal),
          borderColor: queueColors[i % queueColors.length],
          backgroundColor: queueColors[i % queueColors.length],
          fill: false,
          tension: 0.25,
          pointRadius: 3,
          borderWidth: 2,
        });
      });
      var deptColor = (THEME && THEME.muted) || '#9ca3af';
      datasets.push({
        label: 'Dept total',
        data: deptSeries.map(extractVal),
        borderColor: deptColor,
        backgroundColor: deptColor,
        fill: false,
        tension: 0.25,
        pointRadius: 2,
        borderWidth: 2,
        borderDash: [6, 3],
      });
    } else {
      var color = (metric === 'totalCalls')
        ? ((THEME && THEME.accent) || '#4E79A7')
        : ((THEME && THEME.warn)   || '#c66b4b');
      datasets.push({
        label: headerLabels[metric] || metric,
        data: deptSeries.map(extractVal),
        borderColor: color,
        backgroundColor: color,
        fill: false,
        tension: 0.25,
        pointRadius: 3,
      });
    }

    refreshChartTheme();
    qcdChartInstance = new Chart(canvas, {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          datalabels: { display: false },
          // Multi-queue charts get the shared legend spotlight (hover-dim
          // + click-to-pin), matching the Overview chart.
          legend: Object.assign({ display: multiQueue },
                                 multiQueue ? chartSpotlightLegend_() : {}),
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var prefix = multiQueue ? (ctx.dataset.label + ': ') : '';
                return prefix + (formatPct ? ctx.formattedValue + '%' : ctx.formattedValue);
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: function (v) { return formatPct ? v + '%' : v; },
            },
          },
        },
      },
    });
    if (multiQueue) chartSpotlightStash_(qcdChartInstance);
  }

  // -- Export helpers (mirror IR/PR/CR pattern, simplified) ---------
  function qcdBuildCanvas_(onDone) {
    const root = $('qcd-results');
    if (!root || typeof html2canvas === 'undefined') return;
    // Capture the chart as an image so html2canvas can render it
    // alongside the rest of the DOM (canvas elements don't make it
    // into html2canvas output otherwise).
    const cvs = document.getElementById('qcd-chart');
    let dataUrl = null;
    try { if (cvs) dataUrl = cvs.toDataURL('image/png'); } catch (e) { /* OK */ }
    html2canvas(root, {
      backgroundColor: (THEME.paper || '#f6f7f9'),
      scale: 2,
      onclone: function (clonedDoc) {
        const ab = clonedDoc.querySelector('#qcd-results .ir-action-buttons');
        if (ab) ab.style.display = 'none';
        const tabs = clonedDoc.getElementById('qcd-chart-tabs');
        if (tabs) tabs.style.display = 'none';
        const cClone = clonedDoc.getElementById('qcd-chart');
        if (cClone && dataUrl) {
          const img = clonedDoc.createElement('img');
          img.src = dataUrl;
          img.style.width = '100%';
          img.style.height = 'auto';
          cClone.parentNode.replaceChild(img, cClone);
        }
      },
    }).then(onDone).catch(function (err) {
      try { console.error('QCD report image capture failed', err); } catch (e) {}
      showToast("Couldn't capture the report image — please try again.", 'error');
      qcdSetExportStatus_('error', 'Could not capture the report image. Please try again.');
    });
  }

  // -- Status banner helper for export feedback ---------------------
  // The previous round of exports failed silently because none of
  // the three actions reported back to the user (no success ack,
  // no error toast). Every export path now routes feedback through
  // qcdSetExportStatus_; "loading" while async work runs, then
  // "success" or "error" depending on outcome.
  function qcdSetExportStatus_(kind, msg) {
    const el = $('qcd-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg || '';
    el.style.display = '';
    if (kind === 'success') {
      setTimeout(function () {
        if (el.className.indexOf('status-success') !== -1) {
          el.style.display = 'none';
        }
      }, 3500);
    }
  }

  function qcdCopyImage_() {
    if (!(navigator.clipboard && window.ClipboardItem)) {
      qcdSetExportStatus_('error', 'Clipboard API not available in this browser.');
      return;
    }
    qcdSetExportStatus_('loading', 'Capturing report…');
    qcdBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (!blob) {
          qcdSetExportStatus_('error', 'Capture produced an empty image.');
          return;
        }
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
          .then(function () {
            qcdSetExportStatus_('success', 'Report image copied to clipboard.');
          }, function (err) {
            qcdSetExportStatus_('error', 'Clipboard write failed: '
              + (err && err.message ? err.message : String(err)));
          });
      }, 'image/png');
    });
  }

  function qcdEmailImage_() {
    qcdSetExportStatus_('loading', 'Capturing report…');
    qcdBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      qcdSetExportStatus_('loading', 'Sending email…');
      google.script.run
        .withSuccessHandler(function (res) {
          const to = (res && res.to) ? res.to : 'your inbox';
          qcdSetExportStatus_('success', 'Emailed report image to ' + to + '.');
          showToast('Report emailed to ' + to, 'success');
        })
        .withFailureHandler(function (err) {
          qcdSetExportStatus_('error', 'Email failed: '
            + (err && err.message ? err.message : String(err)));
          showToast('Email failed', 'error');
        })
        .sendQcdReportEmail({
          imageBase64: dataUrl,
          dateLabel:   qcdLastData && qcdLastData.dateLabel ? qcdLastData.dateLabel : '',
        });
    });
  }

  // Print opens the new window SYNCHRONOUSLY inside the click
  // handler so the browser preserves the user gesture and doesn't
  // popup-block the call. The captured image is written into the
  // already-open window once html2canvas finishes. Previous
  // implementation called window.open inside the async .then() and
  // got silently blocked.
  function qcdPrint_() {
    const w = window.open('about:blank');
    if (!w) {
      qcdSetExportStatus_('error', 'Browser blocked the print window. Allow popups for this dashboard and retry.');
      return;
    }
    try {
      w.document.write('<title>QCD Report — printing…</title>'
        + '<p style="font-family:sans-serif;color:#666;padding:24px;">'
        + 'Preparing print preview…</p>');
      w.document.close();
    } catch (e) { /* OK */ }
    qcdSetExportStatus_('loading', 'Capturing report for print…');
    qcdBuildCanvas_(function (canvas) {
      try {
        w.document.body.innerHTML = '<img src="' + canvas.toDataURL('image/png')
          + '" style="width:100%;display:block;">';
        w.focus();
        w.print();
        qcdSetExportStatus_('success', 'Sent to print preview.');
      } catch (e) {
        qcdSetExportStatus_('error', 'Print failed: '
          + (e && e.message ? e.message : String(e)));
      }
    });
  }

  // Wait for DOM, then go.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
