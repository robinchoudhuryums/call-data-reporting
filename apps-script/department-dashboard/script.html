    const td = (data && data.trendDaily) || {};
    const byLabel = {};
    (td.labels || []).forEach(function (l, i) { byLabel[l] = (td.series || [])[i]; });
    // R7 (I-1): dept-total daily abandoned % (queueHealth.dailySeries, ISO
    // dates) backs the new 'Abd %' calendar metric. Offered only when present.
    const qhDaily = (data && data.queueHealth && data.queueHealth.dailySeries) || [];
    const byIsoAbd = {};
    qhDaily.forEach(function (d) { if (d && d.date) byIsoAbd[d.date] = d; });
    const hasAbd = qhDaily.length > 0;
    // Arriving from the Abd % trend tab, default the cells to the abandon
    // metric (the tab the user toggled Calendar from); a saved 'abd' pref
    // falls back to Answer % when this dept has no queue daily series.
    if (insActiveTrendMetric === 'queues' && hasAbd && insCalMetric !== 'abd') insCalMetric = 'abd';
    if (insCalMetric === 'abd' && !hasAbd) insCalMetric = 'pct';
    const isMissed = insCalMetric === 'missed';
    const isAbd    = insCalMetric === 'abd';
    let maxMissed = 0;
    (td.series || []).forEach(function (s) {
      maxMissed = Math.max(maxMissed, Number(s && s.missed) || 0);
    });

    // Month pagination: one month per view; ‹ › flip within the window.
    const months = insCalMonthsInWindow_(meta.from, meta.to);
    if (!months.length) { host.innerHTML = ''; return; }
    const winKey = String(meta.from || '') + '|' + String(meta.to || '');
    if (winKey !== insCalWinKey_ || months.indexOf(insCalMonth_) === -1) {
      insCalWinKey_ = winKey;
      insCalMonth_ = months[months.length - 1];   // default: most recent month
    }
    const mi = months.indexOf(insCalMonth_);

    const seg = function (m, label, title) {
      const on = insCalMetric === m;
      return '<button type="button" class="seg-btn' + (on ? ' active' : '') + '" data-cal-metric="' + m + '"'
        + ' role="radio" aria-checked="' + (on ? 'true' : 'false') + '" title="' + escapeHtml(title) + '">'
        + label + '</button>';
    };
    const legend = isMissed
      ? 'Darker = more missed rings that day.'
      : (isAbd
        ? 'Sage = under the 5% abandon threshold · warmer = at/above it.'
        : 'Sage = at/above the 92% answer target · warmer = further below it.');
    const navBtn = function (idx, glyph, label) {
      const ok = idx >= 0 && idx < months.length;
      return '<button type="button" class="ins-cal-nav-btn"' + (ok ? ' data-cal-nav="' + months[idx] + '"' : ' disabled')
        + ' aria-label="' + label + '" title="' + label + '">' + glyph + '</button>';
    };
    let html = '<div class="ins-cal-toolbar">'
      + '<div class="segmented" role="radiogroup" aria-label="Calendar metric">'
      +   seg('pct', 'Answer %', 'Each day colored against the 92% company answer-rate target.')
      +   seg('missed', 'Missed', 'Each day shaded by how many rings went unanswered.')
      +   (hasAbd ? seg('abd', 'Abd %', 'Each day colored against the 5% queue-abandon threshold (dept total across mapped queues).') : '')
      + '</div>'
      + (months.length > 1
        ? '<div class="ins-cal-nav">' + navBtn(mi - 1, '&lsaquo;', 'Previous month')
          + '<span class="ins-cal-month">' + escapeHtml(insCalMonthLabel_(insCalMonth_))
          + ' <span class="ins-cal-month-pos">(' + (mi + 1) + ' of ' + months.length + ')</span></span>'
          + navBtn(mi + 1, '&rsaquo;', 'Next month') + '</div>'
        : '<span class="ins-cal-month">' + escapeHtml(insCalMonthLabel_(insCalMonth_)) + '</span>')
      + '<span class="ins-cal-legend">' + legend + '</span>'
      + '</div>';
    html += '<div class="ins-cal-head">'
      + ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].map(function (d) {
          return '<span>' + d + '</span>';
        }).join('') + '</div>';

    // Walk the SELECTED month clipped to the report window, five weekday
    // cells per row. Days outside the month-window intersection render as
    // blank out-of-window cells.
    const mp = insCalMonth_.split('-');
    const monthStart = new Date(+mp[0], +mp[1] - 1, 1, 12);
    const monthEnd   = new Date(+mp[0], +mp[1], 0, 12);   // last day of month
    const cur = new Date(monthStart.getTime());
    const end = monthEnd;
    cur.setDate(cur.getDate() - ((cur.getDay() + 6) % 7));   // rewind to Monday
    let weeks = '';
    while (cur <= end) {
      let cells = '';
      for (let i = 0; i < 5; i++) {
        const iso = insIsoOf_(cur);
        const inMonth = iso.slice(0, 7) === insCalMonth_;
        const inWin = inMonth && iso >= meta.from && iso <= meta.to;
        const s = inWin ? (isAbd ? byIsoAbd[iso] : byLabel[iso.slice(5)]) : null;
        const dayNum = cur.getDate();
        if (!inWin) {
          cells += '<span class="ins-cal-cell ins-cal-out" aria-hidden="true"></span>';
        } else if (!s) {
          const noneHint = isAbd ? 'no queue call data (holiday / not imported / unmapped)'
                                 : 'no call data (holiday / not imported)';
          cells += '<span class="ins-cal-cell ins-cal-none" title="' + iso + ' — ' + noneHint + '">'
            + '<span class="ins-cal-day">' + dayNum + '</span><span class="ins-cal-val">–</span></span>';
        } else {
          let style, valHtml, title;
          if (isAbd) {
            const abd = Math.round((Number(s.abandonedPct) || 0) * 10) / 10;
            const calls = Number(s.totalCalls) || 0;
            style = abd < 5
              ? 'background: color-mix(in srgb, var(--good) ' + Math.round(14 + Math.min(22, (5 - abd) * 4)) + '%, var(--paper-card));'
              : 'background: color-mix(in srgb, var(--warn) ' + Math.round(14 + Math.min(46, (abd - 5) * 6)) + '%, var(--paper-card));';
            valHtml = abd + '%';
            title = iso + ' — ' + calls + ' queue call' + (calls === 1 ? '' : 's') + ' · '
              + (Number(s.abandoned) || 0) + ' abandoned · ' + abd + '% abandoned (5% threshold). Click to reload for this day.';
          } else {
            const pct = Math.round(Number(s.pct) || 0);
            const missed = Number(s.missed) || 0;
            if (isMissed) {
              const sev = maxMissed > 0 ? (missed / maxMissed) : 0;
              style = missed === 0
                ? 'background: color-mix(in srgb, var(--good) 12%, var(--paper-card));'
                : 'background: color-mix(in srgb, var(--warn) ' + Math.round(12 + 48 * sev) + '%, var(--paper-card));';
            } else {
              style = pct >= 92
                ? 'background: color-mix(in srgb, var(--good) ' + Math.round(14 + Math.min(22, (pct - 92) * 3)) + '%, var(--paper-card));'
                : 'background: color-mix(in srgb, var(--warn) ' + Math.round(14 + Math.min(46, (92 - pct) * 1.6)) + '%, var(--paper-card));';
            }
            valHtml = isMissed ? String(missed) : pct + '%';
            title = iso + ' — ' + (Number(s.answered) || 0) + ' answered · '
              + missed + ' missed · ' + pct + '% answered. Click to reload for this day.';
          }
          cells += '<button type="button" class="ins-cal-cell ins-cal-drill" data-iso="' + iso + '"'
            + ' style="' + style + '" title="' + escapeHtml(title) + '">'
            + '<span class="ins-cal-day">' + dayNum + '</span>'
            + '<span class="ins-cal-val">' + valHtml + '</span>'
            + '</button>';
        }
        cur.setDate(cur.getDate() + 1);
      }
      cur.setDate(cur.getDate() + 2);   // hop the weekend
      weeks += '<div class="ins-cal-week">' + cells + '</div>';
    }
    host.innerHTML = html + weeks;
  }

  // Delta badge mirroring dsKpiTile_'s logic for the per-agent card grid.
  function insDeltaBadge_(stat, valence, priorLabel) {
    const s = stat || { deltaPct: 0, type: 'volume' };
    const isPct = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    // #11e: explain the chip on hover -- what it compares against + the color
    // convention. CR-parity: when the caller passes priorLabel, the prior
    // window's exact value leads the tooltip (Compare Ranges showed P1
    // explicitly; here it rides the hover so the card stays compact).
    const priorBit = priorLabel ? 'Prior window: ' + priorLabel + '. ' : '';
    const baseTitle = 'Change vs the same-length prior period (the "Comparing against…" window in the '
      + 'results header). Green = the change is good for this metric, orange = worse.';
    if (Math.abs(dp) < 0.05) {
      return '<span class="pr-delta pr-delta-neu" title="'
           + escapeHtml(priorBit + 'No meaningful change vs the prior period. ' + baseTitle) + '">–</span>';
    }
    let cls = 'pr-delta-neu';
    if (valence === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
    else if (valence === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
    const arrow = dp > 0 ? '▲' : '▼';
    const suffix = isPct ? ' pts' : '%';
    const title = priorBit + arrow + ' ' + Math.abs(dp).toFixed(1) + suffix + ' vs the prior period. ' + baseTitle;
    return '<span class="pr-delta ' + cls + '" title="' + escapeHtml(title) + '">'
         + '<span class="pr-delta-arrow">' + arrow + '</span> '
         + Math.abs(dp).toFixed(1) + suffix + '</span>';
  }

  /**
   * Per-agent cards, enriched with the analytics ported from Compare
   * Ranges: improved/regressed/mixed classification (left-border
   * color via the shared deltaClassify_), a "vs Team" badge comparing
   * the agent's improvement score to the team's, sort control
   * (default answered-desc / name / biggest improvers / regressors),
   * and a collapsible quiet-agents section (deltaIsQuiet_) so the
   * visible grid is the notable movers. Per-day sublines render on
   * volume/time metrics when meta.lengthMismatch (custom prior of a
   * different length).
   */
  // A1 triage: labeled group header rendered as a FULL-WIDTH grid item so it
  // spans the card grid without nesting a second grid (cards flow after it).
  // Standing-first per-agent tier for Insights (#11c). The category reflects
  // the agent's CURRENT standing vs the 92% company answer-rate target (with a
  // volume gate so a handful-of-calls agent isn't branded either way), NOT the
  // direction of change -- so a strong agent stays "Strong" through a small dip
  // and a struggling agent stays "Needs attention" even while improving from
  // worse. The prior-period TREND is shown separately (the trend pill).
  // Returns 'strong' | 'steady' | 'attention'.
  // I7/I6: PEER-RELATIVE standing -- an agent's answer rate vs their TEAM's
  // answer rate (not the absolute 92% company target, which unfairly branded an
  // agent who beats a struggling team). Returns 'attention' (Behind team),
  // 'steady' (On par), or 'strong' (Ahead of team). A volume gate keeps a
  // handful-of-calls agent "on par" (too little signal). The direction-of-
  // change TREND stays a separate secondary pill (insTrendPill_).
  var INS_PEER_GAP_PTS = 5;   // >= this many points below/above team = Behind/Ahead
  var INS_MIN_VOL      = 5;   // fewer rung calls than this = on par (low signal)
  function insClassifyAgent_(card, teamPct) {
    var m = (card && card.metrics) || {};
    var pct  = Number((m.pct  && m.pct.val)  || 0);   // current % answered (0-100)
    var rung = Number((m.rung && m.rung.val) || 0);   // volume (total rings)
    if (rung < INS_MIN_VOL) return 'steady';          // too little signal to judge
    var d = pct - (Number(teamPct) || 0);
    if (d <= -INS_PEER_GAP_PTS) return 'attention';   // behind the team
    if (d >=  INS_PEER_GAP_PTS) return 'strong';      // ahead of the team
    return 'steady';                                  // on par with the team
  }

  function insTriageHeader_(label, count, tone) {
    return '<div class="ins-group-head ins-group-head--' + tone + '">'
         +   '<span class="ins-group-dot"></span>'
         +   '<span class="ins-group-label">' + escapeHtml(label) + '</span>'
         +   '<span class="ins-group-count">' + count + '</span>'
         + '</div>';
  }
  // Legend: the rail + tier encode PEER-RELATIVE standing (vs the team's answer
  // rate, with a small-volume gate), NOT the absolute 92% target and NOT the
  // direction of change (that's the separate trend pill).
  function insTriageLegend_() {
    return '<div class="ins-group-legend" title="The left rail + tier of each card show how the agent\'s answer rate compares to the TEAM average (with a small-volume gate) — not the 92% company target, and not the direction of change (that\'s the trend pill on each card).">'
         +   'vs team'
         +   '<span class="ins-leg-dot ins-leg-good"></span>ahead'
         +   '<span class="ins-leg-dot ins-leg-muted"></span>on par'
         +   '<span class="ins-leg-dot ins-leg-warn"></span>behind'
         + '</div>';
  }

  function insRenderAgentCards_(cards, meta, teamStats) {
    const wrap = $('ins-agent-cards'); if (!wrap) return;
    const toolbar = $('ins-cards-toolbar');
    const det = $('ins-quiet-details');
    if (!cards.length) {
      wrap.innerHTML = emptyStateHtml_('&#128100;', 'No agents to compare',
        'No selected agent had activity (or matched this department) in the range.');
      if (toolbar) toolbar.style.display = 'none';
      if (det) { det.style.display = 'none'; $('ins-quiet-cards').innerHTML = ''; }
      return;
    }
    if (toolbar) toolbar.style.display = cards.length > 1 ? '' : 'none';
    // The Cards/Chart toggle lives in the toolbar, which is hidden for a
    // single agent -- force Cards view so a restored 'chart' pref can't
    // strand a 1-agent report with no way to switch back.
    if (cards.length <= 1) insCardsView = 'cards';

    const teamScore = deltaImprovementScore_(insPerDayMetrics_(teamStats || {}, meta));
    // I6/I7: peer baseline for the standing classification -- the team's answer
    // rate this window. The rail/tier compare each agent to THIS, not 92%.
    const teamPctForStanding = Number((teamStats && teamStats.pct && teamStats.pct.val) || 0);
    const enriched = cards.map(function (c) {
      // Classification runs on per-working-day-adjusted metrics (see
      // insPerDayMetrics_) so an unequal-window comparison can't brand an
      // agent "Slipping" over raw volume; badges keep the raw values.
      const adj = insPerDayMetrics_(c.metrics, meta);
      return {
        card: c,
        score: deltaImprovementScore_(adj),
        standing: insClassifyAgent_(c, teamPctForStanding),  // rail + tier (peer-relative)
        trend: deltaClassify_(adj),               // secondary: direction vs prior (trend pill)
        quiet: deltaIsQuiet_(adj),
      };
    });
    const main  = enriched.filter(function (x) { return !x.quiet; });
    const quiet = enriched.filter(function (x) { return  x.quiet; });

    let sortedMain = main;
    if (main.length > 1 && insCardSort !== 'default') {
      sortedMain = main.slice();
      if (insCardSort === 'name') {
        sortedMain.sort(function (a, b) {
          const an = (a.card.name || '').toLowerCase();
          const bn = (b.card.name || '').toLowerCase();
          return an < bn ? -1 : an > bn ? 1 : 0;
        });
      } else if (insCardSort === 'improvers') {
        sortedMain.sort(function (a, b) { return b.score - a.score; });
      } else if (insCardSort === 'regressors') {
        sortedMain.sort(function (a, b) { return a.score - b.score; });
      }
    }

    // Team average per metric -- the baseline the per-card bars compare
    // against (#5). Volume metrics are per-agent averages (team total /
    // roster-agent count); % Answered is the team rate itself.
    const ts = teamStats || {};
    const nRoster = (meta && meta.rosterAgentCount)
      || cards.filter(function (c) { return c.matchedViaRoster; }).length
      || cards.length || 1;
    const teamAvg = {
      answered: ((ts.answered && Number(ts.answered.val)) || 0) / nRoster,
      missed:   ((ts.missed   && Number(ts.missed.val))   || 0) / nRoster,
      pct:      (ts.pct && Number(ts.pct.val)) || 0,
    };

    const renderCard = function (x) { return insBuildCard_(x, teamScore, meta, teamAvg); };
    // A1 performance triage -- ALWAYS-ON tier grouping (Phase 15). Stable-
    // partition the already-sorted COPY (never insLastData.agentData -- the
    // Cards/Chart toggle reads that independently) by STANDING (#11c: current
    // vs the 92% target) into Needs attention / Steady / Strong, and render a
    // labeled group header before each NON-EMPTY tier whenever there's more
    // than one card. Within-group order is whatever the sort control produced.
    // A single card stays a flat grid (a lone header is noise).
    const attention = sortedMain.filter(function (x) { return x.standing === 'attention'; });
    const steady    = sortedMain.filter(function (x) { return x.standing === 'steady'; });
    const strong    = sortedMain.filter(function (x) { return x.standing === 'strong'; });
    if (sortedMain.length > 1) {
      let html = insTriageLegend_();
      const tiers = [
        { group: attention, label: 'Behind team', tone: 'warn' },
        { group: steady,    label: 'On par',      tone: 'muted' },
        { group: strong,    label: 'Ahead of team', tone: 'good' },
      ];
      if (insIsSimple_()) {
        // D1 Simple: only the Behind-team tier stays expanded; On par +
        // Ahead of team fold behind one "+N on track" expander (full-width
        // grid item, same headers inside). Quiet agents keep their own
        // existing <details> below. Presentation only -- same cards, same
        // order, same renderCard.
        if (attention.length) {
          html += insTriageHeader_('Behind team', attention.length, 'warn')
                + attention.map(renderCard).join('');
        }
        const onTrack = steady.concat(strong);
        if (onTrack.length) {
          let inner = '';
          [{ group: steady, label: 'On par', tone: 'muted' },
           { group: strong, label: 'Ahead of team', tone: 'good' }].forEach(function (t) {
            if (!t.group.length) return;
            inner += insTriageHeader_(t.label, t.group.length, t.tone)
                   + t.group.map(renderCard).join('');
          });
          html += '<details class="ins-ontrack-details">'
                +   '<summary>+ ' + onTrack.length + ' agent' + (onTrack.length === 1 ? '' : 's')
                +     ' on track (on par or ahead of the team average)</summary>'
                +   '<div class="ins-agent-cards ins-ontrack-cards">' + inner + '</div>'
                + '</details>';
        }
        wrap.innerHTML = html;
      } else {
        tiers.forEach(function (t) {
          if (!t.group.length) return;
          html += insTriageHeader_(t.label, t.group.length, t.tone)
                + t.group.map(renderCard).join('');
        });
        wrap.innerHTML = html;
      }
    } else {
      wrap.innerHTML = sortedMain.map(renderCard).join('');
    }

    insHasQuiet_ = quiet.length > 0;
    if (det) {
      if (insHasQuiet_) {
        det.querySelector('.cr-quiet-summary').textContent =
          'Show ' + quiet.length + ' quiet agent' + (quiet.length === 1 ? '' : 's')
          + ' (no notable changes)';
        $('ins-quiet-cards').innerHTML = quiet.map(renderCard).join('');
      } else {
        $('ins-quiet-cards').innerHTML = '';
      }
    }
    // Apply the Cards/Chart view (sets visibility + renders the chart).
    insApplyCardsView_();
  }

  /**
   * Cards/Chart view switch for the per-agent comparison (#3). Cards view
   * shows the card grid (+ quiet collapsible if any); Chart view shows a
   * grouped current-vs-prior bar across all selected agents.
   */
  function insApplyCardsView_() {
    // D1: Simple is cards-only -- force the cards DISPLAY without touching
    // the saved insCardsView pref (a manager's default-chart pref survives
    // and re-applies the moment they switch to Detailed).
    const chartView = (insCardsView === 'chart') && !insIsSimple_();
    // I5a: sync the Cards/Chart toggle + Gap/Absolute sub-toggle to the active
    // state on every render, so a role default (or programmatic change) with no
    // saved pref is reflected in the buttons.
    const vseg = $('ins-cards-view-toggle');
    if (vseg) vseg.querySelectorAll('.seg-btn').forEach(function (b) {
      const on = (b.getAttribute('data-view') === insCardsView);
      b.classList.toggle('active', on);
      b.setAttribute('aria-checked', on ? 'true' : 'false');
    });
    insSyncCardsChartMode_();
    const cardsWrap = $('ins-agent-cards');
    const chartWrap = $('ins-cards-chart-wrap');
    const det = $('ins-quiet-details');
    const metricWrap = $('ins-cards-chart-metric-wrap');
    const modeSeg = $('ins-cards-chart-mode');
    if (cardsWrap)  cardsWrap.style.display = chartView ? 'none' : '';
    if (det)        det.style.display = chartView ? 'none' : (insHasQuiet_ ? '' : 'none');
    if (chartWrap)  chartWrap.style.display = chartView ? '' : 'none';
    // The metric selector applies to the gap + prior bases -- Absolute
    // always shows Answered + Missed volumes (+ % dots) for every agent.
    if (metricWrap) metricWrap.style.display = (chartView && insCardsChartMode !== 'abs') ? '' : 'none';
    if (modeSeg)    modeSeg.style.display = chartView ? '' : 'none';
    if (chartView) insRenderCardsChart_();
    // R7 (I-4): one-shot fade on whichever view just became visible, so
    // Cards⇄Chart / Gap⇄Absolute swaps read as a transition, not a pop
    // (reduced-motion no-ops via CSS).
    const shownWrap = chartView ? chartWrap : cardsWrap;
    if (shownWrap) {
      shownWrap.classList.remove('ins-view-fade');
      void shownWrap.offsetWidth;   // restart the animation on repeat swaps
      shownWrap.classList.add('ins-view-fade');
    }
  }

  // Reflect insCardsChartMode on the sub-toggle's buttons (restore + click).
  function insSyncCardsChartMode_() {
    const seg = $('ins-cards-chart-mode');
    if (!seg) return;
    seg.querySelectorAll('.seg-btn').forEach(function (x) {
      const active = (x.getAttribute('data-mode') || 'gap') === insCardsChartMode;
      x.classList.toggle('active', active);
      x.setAttribute('aria-checked', active ? 'true' : 'false');
    });
  }

  /**
   * Cross-agent comparison chart (#6): each selected agent's GAP vs the team
   * average for one metric (insCardsChartMetric). Diverging bars from a zero
   * baseline (= team average); colored by favorability (Missed is inverse).
   * Value labels show the absolute number; click a bar to drill into IR.
   * Colors via THEME (INV-42); datalabels on (INV-41) to carry the values.
   */
  // R7 (N-2): does this agent have ANY activity in the current window?
  // Ex-employees kept on the roster (historical-data preservation) and agents
  // absent for the range come back all-zero -- they add no information as
  // chart bars, so both cross-agent charts drop them. Cards are untouched
  // (the quiet tier already folds inactive agents away in the grid).
  function insAgentHasActivity_(c) {
    const v = function (k) {
      const s = c && c.metrics && c.metrics[k];
      return s ? (Number(s.val) || 0) : 0;
    };
    return (v('rung') + v('missed') + v('answered')) > 0;
  }

  function insRenderCardsChart_() {
    const canvas = $('ins-cards-chart');
    if (!canvas) return;
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-cards-chart');
    if (insCardsChartInstance) { try { insCardsChartInstance.destroy(); } catch (e) {} insCardsChartInstance = null; }
    // R7 (N-2): zero-activity agents are excluded from BOTH chart bases
    // (the 'abs' dispatch below passes this filtered set through).
    const cards = ((insLastData && insLastData.agentData) || []).filter(insAgentHasActivity_);
    const meta  = (insLastData && insLastData.meta) || {};
    const ts    = (insLastData && insLastData.teamStats) || {};
    if (insCardsChartMode === 'abs')   { insRenderCardsChartAbs_(canvas, cards); return; }
    const metric = insCardsChartMetric;
    const isPct = (metric === 'pct');
    const nRoster = meta.rosterAgentCount
      || cards.filter(function (c) { return c.matchedViaRoster; }).length
      || cards.length || 1;
    const teamAvg = isPct
      ? ((ts.pct && Number(ts.pct.val)) || 0)
      : (((ts[metric] && Number(ts[metric].val)) || 0) / nRoster);
    const labels = cards.map(function (c) { return c.name; });
    const vals = cards.map(function (c) {
      const s = c.metrics && c.metrics[metric]; return s ? (Number(s.val) || 0) : 0;
    });
    const gaps = vals.map(function (v) { return Number((v - teamAvg).toFixed(isPct ? 1 : 2)); });
    // Favorability: for Missed, BELOW team is good; everything else ABOVE.
    const favUp = (metric !== 'missed');
    const good = THEME.good || '#4e9a6b';
    const warn = THEME.warn || '#c66b4b';
    const colors = gaps.map(function (g) {
      if (g === 0) return THEME.muted;
      const above = g > 0;
      return (above === favUp) ? good : warn;
    });
    const fmtV = function (n) { return isPct ? (Number(n).toFixed(1) + '%') : String(Math.round(n)); };

    insCardsChartInstance = safeChart_(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels: labels, datasets: [{ label: 'Gap vs team avg', data: gaps,
        backgroundColor: colors, borderColor: colors }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: function (evt, els) {
          if (els && els.length) {
            const name = labels[els[0].index];
            if (name && typeof irDrillToAgent_ === 'function') {
              irDrillToAgent_(name, $('ins-from').value, $('ins-to').value);
            }
          }
        },
        plugins: {
          legend: { display: false },
          datalabels: {
            display: true,
            anchor: function (ctx) { return ctx.dataset.data[ctx.dataIndex] >= 0 ? 'end' : 'start'; },
            align: function (ctx) { return ctx.dataset.data[ctx.dataIndex] >= 0 ? 'end' : 'start'; },
            color: THEME.ink,
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (g, ctx) { return fmtV(vals[ctx.dataIndex]); },
          },
          tooltip: { callbacks: { label: function (ctx) {
            const g = gaps[ctx.dataIndex];
            return fmtV(vals[ctx.dataIndex]) + '  (team avg ' + fmtV(teamAvg) + ', '
              + (g >= 0 ? '+' : '') + fmtV(g) + ' vs team)';
          } } },
        },
        scales: {
          x: { ticks: { maxRotation: 45, minRotation: 0, autoSkip: false } },
          y: { title: { display: true, text: 'gap vs team avg' + (isPct ? ' (pts)' : '') },
               grid: { color: function (c) { return c.tick.value === 0 ? THEME.ink : THEME.line; } },
               ticks: { callback: function (v) { return isPct ? v + '%' : v; } } },
        },
        onHover: function (evt, els) {
          if (evt && evt.native && evt.native.target) {
            evt.native.target.style.cursor = (els && els.length) ? 'pointer' : 'default';
          }
        },
      },
    });
  }

  /**
   * vs-Prior basis for the cards Chart view: the Compare Ranges report's
   * grouped per-agent bars, absorbed here for the CR retirement -- one
   * current-window bar + one (muted) prior-window bar per agent for the
   * metric the selector picks. Values from the same deltaBlock_ stats the
   * cards render (st.val / st.prev); click drills into IR like the other
   * bases; datalabels always on (they carry the values, like gap mode).
   */

  /**
   * Absolute basis for the cards Chart view: the Performance Report's
   * "Volume & Efficiency" chart, absorbed here for the PR retirement --
   * one stacked bar per agent (Answered green + Missed red; stack height =
   * rung) with a "% Answered" dot per agent on a right-hand 0-100% axis.
   * Built client-side from agentData (each card already carries the
   * absolute answered/missed/pct values). Data labels honor the report's
   * "Show data labels" toggle; click a bar/dot drills into IR (same as gap).
   */
  function insRenderCardsChartAbs_(canvas, cards) {
    const labels   = cards.map(function (c) { return c.name; });
    const val = function (c, key) {
      const s = c.metrics && c.metrics[key];
      return s ? (Number(s.val) || 0) : 0;
    };
    const answered = cards.map(function (c) { return val(c, 'answered'); });
    const missed   = cards.map(function (c) { return val(c, 'missed'); });
    const pct      = cards.map(function (c) { return Number(val(c, 'pct').toFixed(1)); });
    const showLabels = !!($('ins-show-datalabels') && $('ins-show-datalabels').checked);
    const drill = function (evt, els) {
      if (els && els.length) {
        const name = labels[els[0].index];
        if (name && typeof irDrillToAgent_ === 'function') {
          irDrillToAgent_(name, $('ins-from').value, $('ins-to').value);
        }
      }
    };
    insCardsChartInstance = safeChart_(canvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Answered', type: 'bar', data: answered,
            backgroundColor: IR_VOLUME_COLORS.answered, stack: 'vol', yAxisID: 'y', order: 2 },
          { label: 'Missed', type: 'bar', data: missed,
            backgroundColor: IR_VOLUME_COLORS.missed, stack: 'vol', yAxisID: 'y', order: 2 },
          { label: '% Answered', type: 'line', data: pct,
            // Discrete per-agent dots, not a connected line -- agents are
            // independent categories (the PR chart's showLine:false rationale).
            showLine: false,
            borderColor: THEME.accent, backgroundColor: THEME.accent,
            fill: false, yAxisID: 'y1',
            pointRadius: 6, pointHoverRadius: 8,
            pointBackgroundColor: THEME.accent,
            pointBorderColor: THEME.paperCard, pointBorderWidth: 2,
            order: 1 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: drill,
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 14, font: { size: 11 } } },
          tooltip: { callbacks: { label: function (ctx) {
            if (ctx.dataset.type === 'line') return '% Answered: ' + ctx.parsed.y + '%';
            return ctx.dataset.label + ': ' + fmtNumber(ctx.parsed.y);
          } } },
          datalabels: {
            display: showLabels,
            color: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.ink;
            },
            backgroundColor: THEME.paperCard,
            borderColor: function (ctx) {
              if (ctx.dataset.type === 'line') return THEME.accent;
              const bg = ctx.dataset.backgroundColor;
              return typeof bg === 'string' ? bg : THEME.line;
            },
            borderWidth: 1, borderRadius: 2,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            anchor: 'center',
            align: function (ctx) { return ctx.dataset.type === 'line' ? 'top' : 'center'; },
            clamp: true, clip: false,
            font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
            formatter: function (value, ctx) {
              if (value == null) return '';
              if (ctx.dataset.type === 'line') return value + '%';
              return value > 0 ? value : '';
            },
          },
        },
        scales: {
          x: { stacked: true, ticks: { autoSkip: false, maxRotation: 45, minRotation: 0 } },
          y: { stacked: true, beginAtZero: true, position: 'left',
               title: { display: true, text: 'Calls', font: { size: 11 } } },
          y1: { beginAtZero: true, max: 100, position: 'right',
                title: { display: true, text: '% Answered', font: { size: 11 } },
                grid: { drawOnChartArea: false },
                ticks: { callback: function (v) { return v + '%'; } } },
        },
        onHover: function (evt, els) {
          if (evt && evt.native && evt.native.target) {
            evt.native.target.style.cursor = (els && els.length) ? 'pointer' : 'default';
          }
        },
      },
    });
  }

  // Trend pill -- the SECONDARY signal: direction of change vs the prior period
  // (rung/missed/answered/% answered). Distinct from the card's rail + tier,
  // which now show current STANDING vs the 92% target (#11c). Carries a gloss
  // tooltip.
  function insTrendPill_(direction) {
    var map = {
      improved:  ['ins-trend-up',   '▲ Improving'],
      regressed: ['ins-trend-down', '▼ Slipping'],
      mixed:     ['ins-trend-flat', '≈ Steady'],
    };
    var m = map[direction] || map.mixed;
    var title = 'Trend vs the prior period across rung, missed, answered and % answered '
      + '(▲ improving / ▼ slipping / ≈ steady). Volume metrics are compared PER WORKING DAY, '
      + 'so a shorter or holiday-bearing window doesn\'t read as a slip on raw counts alone. '
      + 'This is the direction of change — separate from '
      + 'the card\'s standing rail/tier, which shows the current level vs the 92% target.';
    return '<span class="ins-trend-pill ' + m[0] + ' gloss" title="' + escapeHtml(title) + '">' + m[1] + '</span>';
  }

  // vs-team chip -- the agent's STANDING this period: answered calls vs the
  // team average (the same marker shown on the Answered bar). A LEVEL compare
  // (not the old improvement-vs-improvement, which was the confusing part).
  function insVsTeamBadge_(agentVal, teamAvgVal) {
    var a = Number(agentVal) || 0, t = Number(teamAvgVal) || 0;
    var tr = Math.round(t);
    var tol = Math.max(1, t * 0.1);   // within 10% of the average reads "on par"
    // Name the metric + show the comparison inline so it reads at a glance.
    var detail = ' · ' + a + ' vs ' + tr + ' ans';
    var title = 'Answered calls vs the team average this period: ' + a + ' vs ~' + tr
      + ' (the average teammate). Above = handled more, below = fewer.';
    var g = ' gloss" title="' + escapeHtml(title) + '">';
    if (Math.abs(a - t) <= tol) return '<span class="cr-vs-team cr-vs-team-flat' + g + '≈ on par' + detail + '</span>';
    if (a > t) return '<span class="cr-vs-team cr-vs-team-pos' + g + '▲ above team' + detail + '</span>';
    return '<span class="cr-vs-team cr-vs-team-neg' + g + '▼ below team' + detail + '</span>';
  }

  function insBuildCard_(x, teamScore, meta, teamAvg) {
    const c = x.card;
    const isFloater = c.matchedViaQueue && !c.matchedViaRoster;
    const chip = isFloater ? sourceChipHtml_(c) : '';
    // Migrated onto the shared ds-card--rail (Phase 4): the left rail color
    // comes from --status. Floaters keep the warn rail (the QUEUE signal wins);
    // everyone else gets STANDING-based color (#11c) -- strong=good /
    // attention=warn / steady=muted -- so the rail matches the tier grouping.
    const statusColor = isFloater ? 'var(--warn)'
                      : x.standing === 'strong'    ? 'var(--good)'
                      : x.standing === 'attention' ? 'var(--warn)'
                      : 'var(--muted)';
    const debugAttrs =
      ' data-standing="' + x.standing + '"'
      + ' data-trend="' + x.trend + '"'
      + ' data-score="' + (x.score == null ? '' : x.score.toFixed(1)) + '"';
    const mm = c.metrics || {};
    const ta = teamAvg || {};
    // Three DISTINCT, labeled signals: the left RAIL + tier show STANDING (#11c:
    // current % answered vs the 92% target); the trend pill shows the direction
    // of change vs the prior period (secondary); the vs-team chip shows answered
    // calls vs the team average this period. A card can legitimately be "Strong"
    // (rail) yet "Slipping" (trend pill): above target but down from last period.
    // Floaters keep only the QUEUE chip.
    const trendPill = isFloater ? '' : insTrendPill_(x.trend);
    const vsTeam = isFloater ? '' : insVsTeamBadge_(
      Number((mm.answered || {}).val) || 0, Number(ta.answered) || 0);

    // Primary (featured): % Answered / Answered / Missed as bars vs the
    // TEAM AVERAGE (a marker on each track), with the agent's value as a
    // data label. The team baseline makes cross-agent reads honest (#5) --
    // a low bar that's still above the team marker is good. A small prior-
    // period delta chip keeps the trend visible too.
    const cbar = function (lbl, key, cls, isPct, deltaValence) {
      const st = mm[key] || {};
      const val  = Number(st.val)  || 0;
      const tAvg = Number(ta[key]) || 0;
      const max  = isPct ? 100 : Math.max(val, tAvg, 1);
      const valLbl  = isPct ? val.toFixed(1) + '%' : (st.formatted != null ? String(st.formatted) : String(val));
      const tAvgLbl = isPct ? tAvg.toFixed(1) + '%' : String(Math.round(tAvg));
      // #3: the value sits OUTSIDE the track (its own column), not absolutely
      // positioned inside it -- when pinned to the right edge it painted over
      // the team-average marker whenever the team avg was near the agent's
      // value, hiding the key reference. Track now shows only fill + marker.
      return '<div class="ins-cbar-row" title="' + escapeHtml(lbl) + ': ' + escapeHtml(valLbl)
           +   ' (team avg ' + escapeHtml(tAvgLbl) + ')">'
           +   '<span class="ins-cbar-lbl">' + lbl + '</span>'
           +   '<span class="ins-cbar-track">'
           +     '<span class="ins-cbar-fill ' + cls + '" style="width:' + Math.max(2, Math.min(100, Math.round(val / max * 100))) + '%"></span>'
           +     '<span class="ins-cbar-team" style="left:' + Math.min(100, Math.round(tAvg / max * 100)) + '%" title="team avg ' + escapeHtml(tAvgLbl) + '"></span>'
           +   '</span>'
           +   '<span class="ins-cbar-val">' + escapeHtml(valLbl) + '</span>'
           +   '<span class="ins-cbar-delta">' + insDeltaBadge_(st, deltaValence,
                 st.prev == null ? '' : (isPct ? (Number(st.prev) || 0).toFixed(1) + '%' : fmtNumber(Number(st.prev) || 0))) + '</span>'
           + '</div>';
    };
    const primary = '<div class="ins-card-bars2">'
      +   cbar('% Ans',    'pct',      'ins-cbar-pct', true,  'pos')
      +   cbar('Answered', 'answered', 'ins-cbar-ans', false, 'pos')
      +   cbar('Missed',   'missed',   'ins-cbar-miss', false, 'neg')
      + '</div>';

    // Secondary (collapsible): Rung / ATT / TTT numbers + deltas.
    const secDefs = [['Rung', 'rung', 'pos'], ['ATT', 'att', 'neu'], ['TTT', 'ttt', 'neu']];
    const secondary = secDefs.map(function (m) {
      const st = mm[m[1]] || { formatted: '-' };
      const priorLbl = st.prev == null ? ''
        : (m[1] === 'rung' ? fmtNumber(Number(st.prev) || 0)
                           : crFormatSecondsShort_(Number(st.prev) || 0));
      return '<div class="ins-metric">'
           +   '<div class="ins-metric-label">' + m[0] + '</div>'
           +   '<div class="ins-metric-val">' + escapeHtml(String(st.formatted)) + '</div>'
           +   '<div class="ins-metric-delta">' + insDeltaBadge_(st, m[2], priorLbl) + '</div>'
           + '</div>';
    }).join('');

    // Drill-through to the Individual Report (same agent + same window).
    const irLink = '<button type="button" class="ins-card-ir-link" data-agent="' + escapeHtml(c.name) + '"'
      + ' title="Open this agent&#39;s Individual Report for the same date range">IR &#8599;</button>';

    return '<div class="ds-card ds-card--rail ins-card" style="--status:' + statusColor + '"'
         +   ' data-ins-agent="' + escapeHtml(c.name) + '"' + debugAttrs + '>'
         +   '<div class="ins-card-head"><span class="ins-card-name">' + escapeHtml(c.name) + '</span>' + trendPill + chip + vsTeam + irLink + '</div>'
         +   primary
         +   '<details class="ins-card-more"><summary>Rung &middot; ATT &middot; TTT</summary>'
         +     '<div class="ins-card-grid ins-card-grid-sec">' + secondary + '</div>'
         +   '</details>'
         + '</div>';
  }

  /**
   * Per-day subline on volume/time metrics when the comparison
   * windows differ in length (meta.lengthMismatch): "cur/day vs
   * prior/day". Rates (% Ans, ATT) are already length-independent.
   */
  function insMetricPerDay_(st, kind, meta) {
    if (!meta || !meta.lengthMismatch) return '';
    if (kind !== 'volume' && kind !== 'time') return '';
    if (st == null || st.val == null || st.prev == null) return '';
    if (!(meta.currentDays > 0) || !(meta.priorDays > 0)) return '';
    const fmt = (kind === 'time')
      ? function (v) { return crFormatSecondsShort_(v); }
      : function (v) { return v.toFixed(1); };
    return '<div class="ins-metric-perday">'
         +   fmt(st.val / meta.currentDays) + '/day'
         +   ' <span class="pr-delta-cap">vs ' + fmt(st.prev / meta.priorDays) + '</span>'
         + '</div>';
  }

  function insSetResultsStatus_(kind, msg) {
    const el = $('ins-results-status'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; el.className = 'status'; return; }
    el.className = 'status status-' + (kind || 'info');
    el.textContent = msg;
    el.style.display = '';
  }

  function insSetExportMenuOpen_(open) {
    const btn  = $('ins-export-btn');
    const menu = $('ins-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function insBtnFeedback_(label, holdMs) {
    const btn = $('ins-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) setTimeout(function () { btn.innerHTML = btn.dataset.label; btn.disabled = false; }, holdMs);
    return function restore() { btn.innerHTML = btn.dataset.label; btn.disabled = false; };
  }

  /**
   * html2canvas capture for the Insights results (same approach as the
   * PR capture: snapshot the live chart canvas, swap it for an <img>
   * in the clone so the chart pixels survive the render).
   */
  function insBuildCanvas_(onDone) {
    const root = $('insights-results');
    if (!root) return;
    if (insChartInstance) insChartInstance.resize();
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });
      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.querySelector('#insights-results .ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const subTabs = clonedDoc.getElementById('ins-trend-subtabs');
          if (subTabs) subTabs.style.display = 'none';
          const status = clonedDoc.getElementById('ins-results-status');
          if (status) status.style.display = 'none';
          const toolbar = clonedDoc.getElementById('ins-cards-toolbar');
          if (toolbar) toolbar.style.display = 'none';
          // Force the quiet-agents section open so the capture is the
          // complete comparison (mirrors the CR print/export behavior).
          const quiet = clonedDoc.getElementById('ins-quiet-details');
          if (quiet && quiet.style.display !== 'none') {
            quiet.setAttribute('open', '');
            const summary = quiet.querySelector('.cr-quiet-summary');
            if (summary) summary.style.display = 'none';
          }
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  function insCopyImage_() {
    const restore = insBtnFeedback_('Capturing…', 0);
    insBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              restore();
              insBtnFeedback_('Copied!', 1200);
            }, function (err) {
              insSetResultsStatus_('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              restore();
            });
        } else {
          insSetResultsStatus_('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  // Emails a SERVER-RENDERED HTML insights report (not an html2canvas
  // screenshot, which mis-rendered the per-agent card bars in mail clients).
  // Sends the same params the modal used so the server recomputes the identical
  // report. Charts stay in the web app (Copy image / Print).
  // ---- Phase 2 #8: saved views + copy share link ------------------------
  // Views are PERSONAL (localStorage, per user -- the prefs-key pattern) and
  // snapshot the SHARE_STATE_ provider's state: dates, compare mode, custom
  // prior, agents ('' = whole department), Simple/Detailed. Deliberately NOT
  // the department -- the header selector owns that, and managers are pinned.
  // Applying a view (or opening a shared link) runs the NORMAL fetch +
  // permission path; nothing is rendered from storage.
  var INS_VIEWS_MAX_ = 12;
  function insViewsKey_() {
    return 'cdr.ins.views.v1:' + String((typeof USER !== 'undefined' && USER && USER.email) || '').toLowerCase();
  }
  function insViewsLoad_() {
    try {
      const v = JSON.parse(localStorage.getItem(insViewsKey_()) || '[]');
      return Array.isArray(v) ? v : [];
    } catch (e) { return []; }
  }
  function insViewsStore_(views) {
    try { localStorage.setItem(insViewsKey_(), JSON.stringify(views.slice(0, INS_VIEWS_MAX_))); }
    catch (e) { /* storage full/blocked: best-effort */ }
  }
  function insCurrentViewState_() {
    try {
      const provider = SHARE_STATE_['/report/insights'];
      return provider ? provider.collect() : null;
    } catch (e) { return null; }
  }
  function insApplyViewState_(state) {
    if (!state) return;
    try { SHARE_STATE_['/report/insights'].apply(state); } catch (e) {}
    // The provider's pending-selection hook fires on the NEXT roster render;
    // when the picker is already rendered, apply the selection directly. A
    // view with NO agents param is an agent-free (whole-department) snapshot
    // -- uncheck everything so the run stays agent-free.
    const list = $('ins-agent-list');
    if (list && list.querySelector('.ir-agent-cb')) {
      const want = state.agents != null
        ? String(state.agents).split('|').filter(function (a) { return !!a; }) : [];
      irApplyCheckedAgents_(list, want);
      insPendingAgentSelection_ = null;
    }
    insSavePrefs_();
    runInsReport();
  }
  function insCopyShareLink_() {
    const baseUrl = (typeof window !== 'undefined' && window.__DASHBOARD_URL__) || '';
    if (!baseUrl) {
      showToast('Set the DASHBOARD_URL Script Property to enable share links.', 'error');
      return;
    }
    let suffix = '';
    try {
      const state = insCurrentViewState_();
      const encoded = state ? encodeShareParams_(state) : '';
      if (encoded) suffix = '?' + encoded;
    } catch (e) { /* bare route */ }
    const url = baseUrl + '#/report/insights' + suffix;
    const ok = function () { showToast('Share link copied. Recipients see only departments they can access.', 'success'); };
    const fail = function () { showToast('Copy blocked by the browser — link: ' + url, 'error'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(ok, fail);
    } else {
      try {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        ok();
      } catch (e) { fail(); }
    }
  }
  function insRenderViewsMenu_() {
    const menu = $('ins-views-menu');
    if (!menu) return;
    const views = insViewsLoad_();
    let html = '<button type="button" role="menuitem" data-views-action="share" '
      + 'title="Copy a link that opens Insights with these dates, comparison, agents, and view mode.">Copy share link</button>'
      + '<div class="ins-views-sep"></div>';
    if (views.length) {
      html += views.map(function (v, i) {
        return '<div class="ins-views-row">'
          + '<button type="button" role="menuitem" class="ins-views-apply" data-view-idx="' + i + '" '
          +   'title="Apply this saved view">' + escapeHtml(v.name) + '</button>'
          + '<button type="button" class="ins-views-del" data-view-idx="' + i + '" '
          +   'title="Delete this saved view" aria-label="Delete ' + escapeHtml(v.name) + '">&times;</button>'
          + '</div>';
      }).join('') + '<div class="ins-views-sep"></div>';
    } else {
      html += '<div class="ins-views-empty">No saved views yet.</div>';
    }
    html += '<div class="ins-views-saverow">'
      + '<input type="text" id="ins-views-name" placeholder="Name this view…" maxlength="40">'
      + '<button type="button" class="btn" id="ins-views-save">Save</button>'
      + '</div>'
      + '<div class="ins-views-note">Saves dates, comparison, agents &amp; Simple/Detailed — not the department.</div>';
    menu.innerHTML = html;
  }
  function insSaveCurrentView_() {
    const nameEl = $('ins-views-name');
    const name = String((nameEl && nameEl.value) || '').trim();
    if (!name) { showToast('Name the view first.', 'error'); return; }
    const state = insCurrentViewState_();
    if (!state) { showToast('Generate a report first.', 'error'); return; }
    const views = insViewsLoad_().filter(function (v) { return v.name !== name; });
    views.unshift({ name: name, state: state });
    insViewsStore_(views);
    insRenderViewsMenu_();
    showToast('View “' + name + '” saved.', 'success');
  }

  function insEmailReport_(opts) {
    if (!insLastData || !insLastData.meta) {
      showToast('Generate a report first.', 'error');
      return;
    }
    const m = insLastData.meta;
    const restore = insBtnFeedback_('Sending…', 0);
    google.script.run
      .withSuccessHandler(function (res) {
        restore();
        insBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
        showToast('Report emailed to ' + (res && res.to ? res.to : 'you'), 'success');
      })
      .withFailureHandler(function (err) {
        insSetResultsStatus_('error', 'Email failed: ' + (err && err.message ? err.message : err));
        showToast('Email failed', 'error');
        restore();
      })
      .sendInsightsReportEmail({
        department: m.department,
        from:       m.from,
        to:         m.to,
        agents:     m.agents || [],
        priorFrom:  m.priorFrom || '',
        priorTo:    m.priorTo || '',
        // Phase 2 #9: 'summary' = takeaway + tiles + behind-team list only.
        style:      (opts && opts.summary) ? 'summary' : '',
      });
  }

  /**
   * Client-side CSV of the Insights payload: scope lines, the team
   * rollup (current / prior / delta per metric), and one row per agent
   * with each metric's current + prior + delta, plus the
   * classification / improvement-score / quiet / floater columns and
   * per-day normalization columns when meta.lengthMismatch (the CR CSV
   * contract -- this export is the prerequisite for retiring CR's).
   * Every cell routes through csvSafeCell_ (agent names are untrusted
   * CDR-feed input) before the RFC-4180 quoting.
   */
  function insDownloadCsv_() {
    if (!insLastData) return;
    const d = insLastData;
    const meta = d.meta || {};
    const esc = function (v) {
      const s = csvSafeCell_(v == null ? '' : v);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const row = function (cells) { return cells.map(esc).join(','); };
    const deltaStr = function (st) {
      if (!st) return '';
      const dp = Number(st.deltaPct || 0);
      return dp.toFixed(1) + (st.type === 'pctPoints' ? ' pts' : '%');
    };
    const mismatch = !!meta.lengthMismatch;
    const lines = [];
    lines.push(row(['Insights report', meta.department || '', (meta.from || '') + ' to ' + (meta.to || '')]));
    lines.push(row(['Comparison window', (meta.priorFrom || '') + ' to ' + (meta.priorTo || ''),
                    meta.comparisonMode === 'custom' ? 'custom/YoY' : 'immediately-preceding']));
    if (mismatch) {
      lines.push(row(['Note', 'Different window lengths (' + meta.currentDays + 'd vs '
        + meta.priorDays + 'd) — volume totals not directly comparable; see the /day columns']));
    }
    lines.push('');
    // Per-day helper (CR's crCsvRow_ semantics): only meaningful for the
    // volume/time metrics, only when the windows mismatch; time formats via
    // the shared short-duration formatter instead of raw seconds.
    const perDay = function (raw, days, isTime) {
      if (raw == null || !(days > 0)) return '';
      return isTime ? crFormatSecondsShort_(raw / days) : (raw / days).toFixed(1);
    };
    const teamHead = ['Team rollup (roster only)', 'Current', 'Prior', 'Delta'];
    if (mismatch) teamHead.push('Current/day', 'Prior/day');
    lines.push(row(teamHead));
    const t = d.teamStats || {};
    [['Rung', 'rung', 'volume'], ['Missed', 'missed', 'volume'],
     ['Answered', 'answered', 'volume'], ['% Answered', 'pct', null],
     ['TTT', 'ttt', 'time'], ['Avg ATT', 'att', null]].forEach(function (m) {
      const st = t[m[1]] || {};
      const cells = [m[0], st.formatted != null ? st.formatted : '',
                     st.prev != null ? st.prev : '', deltaStr(st)];
      if (mismatch) {
        // Rates (% / per-call ATT) are length-independent -- no /day cells.
        cells.push(m[2] ? perDay(st.val, meta.currentDays, m[2] === 'time') : '',
                   m[2] ? perDay(st.prev, meta.priorDays,  m[2] === 'time') : '');
      }
      lines.push(row(cells));
    });
    lines.push('');
    const head = ['Agent', 'Source', 'Classification', 'Improvement score', 'Quiet'];
    const metricCols = [['Rung', 'rung', true], ['Missed', 'missed', true],
                        ['Answered', 'answered', true], ['% Ans', 'pct', false],
                        ['TTT', 'ttt', true], ['ATT', 'att', false]];
    metricCols.forEach(function (m) {
      head.push(m[0], m[0] + ' prior', m[0] + ' Δ');
      if (mismatch && m[2] && m[1] !== 'pct' && m[1] !== 'att') {
        head.push(m[0] + '/day', m[0] + '/day prior');
      }
    });
    lines.push(row(head));
    (d.agentData || []).forEach(function (a) {
      const isFloater = a.matchedViaQueue && !a.matchedViaRoster;
      // Classification columns use the same per-working-day-adjusted
      // metrics as the card trend pills (insPerDayMetrics_).
      const adjMetrics = insPerDayMetrics_(a.metrics, d.meta);
      const cells = [
        a.name,
        isFloater ? 'QUEUE' + ((a.sourceHomes || []).length ? ' · ' + a.sourceHomes.join('/') : '') : 'ROSTER',
        deltaClassify_(adjMetrics),
        deltaImprovementScore_(adjMetrics).toFixed(1),
        deltaIsQuiet_(adjMetrics) ? 'yes' : 'no',
      ];
      metricCols.forEach(function (m) {
        const st = (a.metrics && a.metrics[m[1]]) || {};
        cells.push(st.formatted != null ? st.formatted : '',
                   st.prev != null ? st.prev : '', deltaStr(st));
        if (mismatch && m[2] && m[1] !== 'pct' && m[1] !== 'att') {
          // TTT is stored in seconds -- format its /day as a short duration
          // (CR's crCsvRow_ 'time' kind) instead of a bare seconds number.
          cells.push(perDay(st.val, meta.currentDays, m[1] === 'ttt'),
                     perDay(st.prev, meta.priorDays,  m[1] === 'ttt'));
        }
      });
      lines.push(row(cells));
    });
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'insights_' + (meta.department || 'report') + '_' + (meta.from || '') + '_' + (meta.to || '') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  function initInboundReport() {
    const btn = $('inbound-report-btn');
    const modal = $('inbound-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      inboundShowForm();
      inboundSetDefaultDates();
      inboundEnsureDeptOptions_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const preset = $('inbound-preset');
    if (preset) preset.addEventListener('change', inboundApplyPreset);
    const fromEl = $('inbound-from'), toEl = $('inbound-to');
    if (fromEl) fromEl.addEventListener('change', function () { if ($('inbound-preset')) $('inbound-preset').value = 'custom'; });
    if (toEl)   toEl.addEventListener('change',   function () { if ($('inbound-preset')) $('inbound-preset').value = 'custom'; });
    const gen = $('inbound-generate-btn');
    if (gen) gen.addEventListener('click', runInboundReport);
    const back = $('inbound-back-btn');
    if (back) back.addEventListener('click', inboundShowForm);
    const csv = $('inbound-csv-btn');
    if (csv) csv.addEventListener('click', inboundDownloadCsv_);
  }

  function inboundShowResults() { $('inbound-form').style.display = 'none'; $('inbound-results').style.display = ''; }
  function inboundSetError(msg) {
    const el = $('inbound-form-error'); if (!el) return;

  function inboundIsoOf_(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function inboundSetDefaultDates() {
    if ($('inbound-from') && $('inbound-from').value) return;
    const today = new Date(); const s = new Date(today); s.setDate(today.getDate() - 30);
    if ($('inbound-from')) $('inbound-from').value = inboundIsoOf_(s);
    if ($('inbound-to'))   $('inbound-to').value   = inboundIsoOf_(today);
  }
  function inboundApplyPreset() {
    const v = $('inbound-preset').value;
    if (v === 'custom') return;
    const today = new Date(); let s, e = new Date(today);
    if (v === 'last7')        { s = new Date(today); s.setDate(today.getDate() - 7); }
    // "Last 30 days" = 30 days ending yesterday -- matches the main page's
    // chip and the IR/Insights presets (see applyIrPreset).
    else if (v === 'last30')  { e = new Date(today); e.setDate(today.getDate() - 1);
                                s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'thisMonth') { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth') { s = new Date(today.getFullYear(), today.getMonth() - 1, 1); e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last3Months') { s = new Date(today); s.setMonth(today.getMonth() - 3); }
    if (!s) return;
    $('inbound-from').value = inboundIsoOf_(s);
    $('inbound-to').value   = inboundIsoOf_(e);
  }

  function runInboundReport() {
    const from = $('inbound-from').value, to = $('inbound-to').value;
    if (!from || !to) { inboundSetError('Pick a start and end date.'); return; }
    if (from > to) { inboundSetError('Start date must be on or before end date.'); return; }
    inboundSetError('');
    const dept = $('inbound-dept') ? $('inbound-dept').value : '';
    const gen = $('inbound-generate-btn'); const prev = gen.textContent;
    gen.disabled = true; gen.innerHTML = DS_EQ_HTML_ + 'Generating…';
    const __sig = reportSig_({ from: from, to: to, department: dept });   // D1b key
    const __rtok = ++reportReqSeq_.inb;   // C-8: stale-response guard
    const __inboundRepaint = function (d, opts) { inboundRenderReport_(d, opts); inboundShowResults(); reportSetStatus_('inbound-results-status', ''); };
    reportSwrPaint_('inbound', __sig, __inboundRepaint, 'inbound-results-status');   // SWR: instant repeat-paint
    google.script.run
      .withSuccessHandler(function (data) {
        if (__rtok !== reportReqSeq_.inb) return;   // superseded by a newer request
        gen.disabled = false; gen.textContent = prev;
        reportLastGoodWrite_('inbound', __sig, data);
        __inboundRepaint(data);
      })
      .withFailureHandler(function (err) {
        if (__rtok !== reportReqSeq_.inb) return;
        gen.disabled = false; gen.textContent = prev;
        // D1b: repaint last-good for this exact request (if any) instead of just
        // a form error (which is hidden once results show).
        if (reportFailFallback_('inbound', __sig, __inboundRepaint, 'inbound-results-status')) return;
        inboundSetError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getInboundReport({ from: from, to: to, department: dept });
  }

  // ds-kpi tile for the simpler (label, value, cap, deltaHtml) shape used by
  // the Inbound report KPI row + the Insights queue-health tiles. Distinct from
  // dsKpiTile_ (which takes a stat object + sparkline); this one keeps its
  // pre-formatted value + pre-built delta badge + a bench-tinted caption.
  // (Phase 1 ds-* migration; cap tint preserved by the .ds-kpi__foot.bm-*
  // overrides in styles.html.)
  function inboundKpiTile_(label, value, cap, deltaHtml, valueCls) {
    return '<div class="ds-kpi">'
      + '<div class="ds-kpi__top">'
      +   '<span class="ds-kpi__label">' + escapeHtml(label) + '</span>'
      +   (deltaHtml || '')
      + '</div>'
      + '<div class="ds-kpi__value' + (valueCls || '') + '">' + escapeHtml(String(value)) + '</div>'
      + (cap ? '<div class="ds-kpi__foot' + benchValueCls_(label, cap, true) + '">' + escapeHtml(cap) + '</div>' : '')
      + '</div>';
  }

  /**
   * Delta badge for an inbound KPI vs the prior window. `isPp` =
   * already-percent metrics (answer/abandon rate) compare as point
   * differences; everything else as relative % (deltaBlock_ semantics:
   * 0 -> 0 is 0, 0 -> nonzero is +100). Renders via the shared
   * insDeltaBadge_ ({deltaPct, type} + valence).
   */
  function inboundDelta_(cur, prev, valence, isPp) {
    cur = Number(cur) || 0; prev = Number(prev) || 0;
    let dp;
    if (isPp) dp = cur - prev;
    else if (prev === 0 && cur === 0) dp = 0;
    else if (prev === 0) dp = 100;
    else dp = ((cur - prev) / prev) * 100;
    return insDeltaBadge_({ deltaPct: dp, type: isPp ? 'pctPoints' : 'volume' }, valence);
  }

  function inboundAbandonPct_(r) {
    const calls = Number(r.calls) || 0;
    if (!calls) return '–';
    return (((Number(r.abandoned) || 0) / calls) * 100).toFixed(1) + '%';
  }

  function inboundCollapseDrill_() {
    if (inboundDrillChart) { try { inboundDrillChart.destroy(); } catch (e) {} inboundDrillChart = null; }
    document.querySelectorAll('.inbound-drill-row').forEach(function (row) { row.remove(); });

  function inboundToggleDrill_(tr) {
    const insurer = tr.getAttribute('data-insurer');
    const wasOpen = (inboundExpandedInsurer === insurer);
    inboundCollapseDrill_();
    if (wasOpen) return;   // second click closes
    inboundExpandedInsurer = insurer;
    tr.classList.add('drill-open');

    const drill = document.createElement('tr');
    drill.className = 'inbound-drill-row';
    drill.innerHTML = '<td colspan="7">'
      + '<div class="pr-trend-subtabs inbound-drill-tabs" role="tablist">'
