  function alRunPreview_() {
    const date = $('al-date').value;
    if (!date) { alSetRunStatus_('error', 'Pick a date first.'); return; }
    const btn = $('al-preview-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Loading…';
    alSetRunStatus_('loading', 'Running preview for ' + date + '…');
    google.script.run
      .withSuccessHandler(function (results) {
        btn.disabled = false; btn.textContent = prev;
        alLastPreview = { date: date, results: results || [] };
        alRenderResults_(results || [], /*isPreview=*/true);
        const wouldFire = (results || []).filter(function (r) { return r.status === 'would-send'; }).length;
        alSetRunStatus_(wouldFire > 0 ? 'success' : '', wouldFire > 0
          ? 'Preview complete. ' + wouldFire + ' dept' + (wouldFire === 1 ? '' : 's')
            + ' would be alerted. Review below, then click Send alerts.'
          : 'Preview complete. No alerts would fire for ' + date + '.');
        $('al-send-btn').disabled = wouldFire === 0;
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Preview failed: ' + (err && err.message ? err.message : String(err)));
      })
      .previewAlerts({ date: date });
  }

  function alRunSend_() {
    const date = $('al-date').value;
    if (!date) { alSetRunStatus_('error', 'Pick a date first.'); return; }
    if (!alLastPreview || alLastPreview.date !== date) {
      alSetRunStatus_('error', 'Preview for ' + date + ' first.');
      return;
    }
    const wouldFire = alLastPreview.results.filter(function (r) { return r.status === 'would-send'; });
    if (!wouldFire.length) {
      alSetRunStatus_('error', 'Nothing to send for this date.');
      return;
    }
    const ok = window.confirm(
      'Send ' + wouldFire.length + ' alert email' + (wouldFire.length === 1 ? '' : 's')
      + ' for ' + date + '? Recipients are listed in the preview table.');
    if (!ok) return;

    const btn = $('al-send-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Sending…';
    alSetRunStatus_('loading', 'Sending alerts…');
    google.script.run
      .withSuccessHandler(function (results) {
        btn.disabled = true; btn.textContent = prev;
        alRenderResults_(results || [], /*isPreview=*/false);
        const sent = (results || []).filter(function (r) { return r.status === 'sent'; }).length;
        alSetRunStatus_('success', 'Done. ' + sent + ' alert' + (sent === 1 ? '' : 's')
          + ' sent. Refresh the page to see the updated log.');
        showToast(sent + ' alert' + (sent === 1 ? '' : 's') + ' sent', 'success');
        // Re-fetch the log so the new entries appear inline.
        google.script.run
          .withSuccessHandler(function (data) { if (data) alRenderLog_(data.log || []); })
          .withFailureHandler(function () { /* ignore */ })
          .getAlertsInit();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Send failed: ' + (err && err.message ? err.message : String(err)));
      })
      .sendAlerts({ date: date });
  }

  function alRenderResults_(results, isPreview) {
    const wrap = $('al-results-wrap');
    const tbody = $('al-results-tbody');
    if (!wrap || !tbody) return;
    wrap.style.display = '';

    const counts = { sent: 0, 'would-send': 0, 'above-threshold': 0,
                     'no-data': 0, 'no-recipients': 0, skipped: 0, error: 0 };
    results.forEach(function (r) { counts[r.status] = (counts[r.status] || 0) + 1; });

    const summary = [];
    if (counts['sent'])          summary.push(counts['sent'] + ' sent');
    if (counts['would-send'])    summary.push(counts['would-send'] + ' would fire');
    if (counts['above-threshold']) summary.push(counts['above-threshold'] + ' above threshold');
    if (counts['no-data'])       summary.push(counts['no-data'] + ' no data');
    if (counts['no-recipients']) summary.push(counts['no-recipients'] + ' no recipients');
    if (counts['skipped'])       summary.push(counts['skipped'] + ' inactive');
    if (counts['error'])         summary.push(counts['error'] + ' errored');
    $('al-results-summary').textContent = summary.join(' · ');

    tbody.innerHTML = results.map(function (r) {
      const rateCell = r.answerRate == null ? '-'
        : Number(r.answerRate).toFixed(1) + '%';
      const recipientsCell = (r.recipients || []).length
        ? escapeHtml(r.recipients.join(', '))
        : '<span class="al-empty-inline">-</span>';
      const statusCell = alStatusBadge_(r.status, isPreview);
      return '<tr class="al-row-' + r.status + '">'
           +   '<td>' + escapeHtml(r.department) + '</td>'
           +   '<td class="num">' + rateCell + '</td>'
           +   '<td class="num">' + Number(r.threshold).toFixed(0) + '%</td>'
           +   '<td class="al-recipients-cell">' + recipientsCell + '</td>'
           +   '<td>' + statusCell + '</td>'
           +   '<td>' + escapeHtml(r.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  function alStatusBadge_(status, isPreview) {
    const labels = {
      'sent':            { text: 'Sent',            cls: 'pr-delta-pos' },
      'would-send':      { text: 'Will alert',      cls: 'pr-delta-neg' },
      'above-threshold': { text: 'Healthy',         cls: 'pr-delta-neu' },
      'no-data':         { text: 'No data',         cls: 'pr-delta-neu' },
      'no-recipients':   { text: 'No recipients',   cls: 'pr-delta-neg' },
      'skipped':         { text: 'Inactive',        cls: 'pr-delta-neu' },
      'error':           { text: 'Error',           cls: 'pr-delta-neg' },
    };
    const meta = labels[status] || { text: status, cls: 'pr-delta-neu' };
    return '<span class="pr-delta ' + meta.cls + '">' + meta.text + '</span>';
  }

  // -- Outlier Fix modal (admin-only) ---------------------------------
  // The only admin UI that triggers WRITES from the dashboard. The
  // server-side OrphanFix.gs enforces the security model (assertAdmin
  // + input validation + LockService + audit log); this client is
  // just the form layer.
  //
  // Naming note: the feature is labeled "Outlier Fix" in user-
  // facing copy (button, modal title, empty states). The file name
  // (OrphanFix.gs), sheet names (Agent Alias Overrides, Orphan
  // Fix Log), audit-log action values (alias-add, rename, rename+
  // alias), and JS internals (initOrphanFix, ofRenderOrphans_, etc.)
  // all keep the original "Orphan" naming so existing sheet data
  // doesn't have to migrate. Search either term to find the
  // feature.

  let ofLastInit = null;
  // Guards against the click-race the user hit: after Apply fired, the modal
  // still accepted more clicks until the async write returned + relaunched.
  // While true, every write handler no-ops and ofSetBusy_ disables the
  // controls, so a batch/single apply can't be double-submitted.
  let ofBusy_ = false;
  // Batch 4: membership set of valid roster names, for the searchable
  // "Map to roster name" input (an <input list> can hold free text -- a row is
  // only rename-ready when its value is an EXACT roster name).
  let ofRosterSet_ = {};

  function initOrphanFix() {
    const btn   = $('orphan-fix-btn');
    const modal = $('orphan-fix-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    // Batch controls (static elements) wired once. Row checkboxes + selects
    // are dynamic, wired per-render in ofRenderOrphans_.
    const selAll = $('of-select-all');
    if (selAll) selAll.addEventListener('change', function () {
      if (ofBusy_) return;
      const tbody = $('of-orphans-tbody');
      if (tbody) tbody.querySelectorAll('.of-row-check:not(:disabled)')
        .forEach(function (c) { c.checked = selAll.checked; });
      ofUpdateBatchState_();
    });
    const batchApply = $('of-batch-apply');
    if (batchApply) batchApply.addEventListener('click', ofBatchApply_);

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      ofLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
  }

  // preserveStatus: keep the current #of-run-status message across the reload
  // (the write paths set a result message + reload; without this the reload's
  // clear would wipe a batch's "N applied, M failed" summary). The status div
  // lives inside #of-body, so it just re-appears when the body re-shows.
  function ofLoadInit_(preserveStatus) {
    $('of-loading').style.display = '';
    $('of-body').style.display = 'none';
    if (!preserveStatus) ofSetStatus_(null);
    google.script.run
      .withSuccessHandler(function (data) {
        $('of-loading').style.display = 'none';
        $('of-body').style.display = '';
        ofLastInit = data || { orphans: [], rosterNames: [], aliases: [], log: [] };
        ofRender_(ofLastInit);
      })
      .withFailureHandler(function (err) {
        $('of-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getOrphanFixInit();
  }

  function ofRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('of-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    ofRenderOrphans_(data.orphans || [], data.rosterNames || []);
    ofRenderAliases_(data.aliases || []);
    ofRenderLog_(data.log || []);
  }

  function ofRenderOrphans_(orphans, rosterNames) {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    if (!orphans.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">'
        + 'No outliers in the last 180 days. Every agent name in DQE '
        + 'Historical Data maps to a roster entry. &#x1F389;'
        + '</td></tr>';
      const bar0 = $('of-batch-bar'); if (bar0) bar0.style.display = 'none';
      const sa0 = $('of-select-all'); if (sa0) { sa0.checked = false; sa0.indeterminate = false; sa0.disabled = true; }
      return;
    }
    // Batch 4: membership set for the searchable canonical-name input.
    ofRosterSet_ = {};
    rosterNames.forEach(function (n) { ofRosterSet_[n] = true; });
    // Populate the shared datalist for the searchable "Map to roster name"
    // inputs (one datalist, reused by every row via list="of-roster-datalist").
    const dl = $('of-roster-datalist');
    if (dl) {
      dl.innerHTML = rosterNames.map(function (n) {
        return '<option value="' + escapeHtml(n) + '"></option>';
      }).join('');
    }

    // Dept options for the "New Assignment" add-to-roster flow.
    const deptOptionsHtml = '<option value="">(pick department)</option>'
      + ((ofLastInit && ofLastInit.departments) || []).map(function (d) {
          return '<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + '</option>';
        }).join('');

    tbody.innerHTML = orphans.map(function (o, idx) {
      const exts = (o.sampleExts || []).map(escapeHtml).join(', ') || '<span class="al-empty-inline">-</span>';
      // Two rows per orphan: the main row, plus a hidden inline form for
      // the "this is actually a NEW ASSIGNMENT" flow -- adds them to a
      // dept's DO NOT EDIT! column instead of renaming to someone else.
      return '<tr data-orphan-idx="' + idx + '">'
           +   '<td class="of-check-col"><input type="checkbox" class="of-row-check" data-idx="' + idx + '" '
           +       'title="Select for batch apply (enabled once mapped or a new assignment is filled)" aria-label="Select ' + escapeHtml(o.name) + ' for batch apply" disabled></td>'
           +   '<td>' + escapeHtml(o.name) + '</td>'
           +   '<td class="num">' + o.rows + '</td>'
           +   '<td>' + escapeHtml(o.lastSeen || '') + '</td>'
           +   '<td>' + exts + '</td>'
           +   '<td><input type="text" class="of-row-select" data-idx="' + idx + '" '
           +       'list="of-roster-datalist" autocomplete="off" spellcheck="false" '
           +       'placeholder="type to search roster…" aria-label="Map ' + escapeHtml(o.name) + ' to a roster name"></td>'
           +   '<td class="of-action-cell">'
           +     '<button type="button" class="btn btn-secondary of-row-apply" '
           +       'data-idx="' + idx + '" disabled>Apply</button> '
           +     '<button type="button" class="btn btn-secondary of-row-addnew" data-idx="' + idx + '" '
           +       'title="This isn’t a misspelling of an existing agent — it’s a new assignment (a new employee, or someone being added to this department). Add them to a department’s roster.">New Assignment…</button>'
           +   '</td>'
           + '</tr>'
           + '<tr class="of-add-row" data-add-idx="' + idx + '" style="display:none;">'
           +   '<td colspan="7">'
           +     '<div class="of-add-form">'
           +       '<span class="of-add-label">Add <strong>' + escapeHtml(o.name) + '</strong> to roster:</span>'
           +       '<select class="of-add-dept" data-idx="' + idx + '">' + deptOptionsHtml + '</select>'
           +       '<input type="text" class="of-add-exts" data-idx="' + idx + '" '
           +         'placeholder="e.g. 1042 — the agent’s own extension" '
           +         'value="' + (o.sampleExts || []).map(escapeHtml).join(', ') + '">'
           +       '<button type="button" class="btn of-add-confirm" data-idx="' + idx + '" disabled>Add to roster</button>'
           +       '<span class="of-add-hint"><strong>Enter the agent’s own individual (direct) extension</strong> — NOT the department queue extension. '
           +         'Digit-only; comma-separate multiple. Writes one &ldquo;Name, ext1, ext2&rdquo; cell to the bottom of that dept’s '
           +         'DO NOT EDIT! column (required; audited to Orphan Fix Log). Tick the row to include it in a batch apply.</span>'
           +     '</div>'
           +   '</td>'
           + '</tr>';
    }).join('');

    // Searchable canonical-name input: a row is rename-ready only when its value
    // is an EXACT roster name (ofSyncRowReady_ enforces membership). Both 'input'
    // (typing) and 'change' (datalist pick / blur) update readiness live.
    tbody.querySelectorAll('.of-row-select').forEach(function (inp) {
      const sync = function () { ofSyncRowReady_(inp.getAttribute('data-idx')); };
      inp.addEventListener('input', sync);
      inp.addEventListener('change', sync);
    });
    tbody.querySelectorAll('.of-row-check').forEach(function (chk) {
      chk.addEventListener('change', ofUpdateBatchState_);
    });
    tbody.querySelectorAll('.of-row-apply').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (ofBusy_) return;
        const idx = Number(btn.getAttribute('data-idx'));
        const orphan = (ofLastInit.orphans || [])[idx];
        const inp = tbody.querySelector('.of-row-select[data-idx="' + idx + '"]');
        const canonical = (inp && ofRosterSet_[inp.value]) ? inp.value : '';
        if (!orphan || !canonical) return;
        ofConfirmAndApply_(orphan, canonical);
      });
    });

    // "New Assignment…" toggles the inline add-to-roster form; opening/closing it
    // (and editing dept/ext) updates batch readiness so a filled new-assignment
    // row can be ticked for a batch apply alongside renames.
    tbody.querySelectorAll('.of-row-addnew').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = btn.getAttribute('data-idx');
        const row = tbody.querySelector('.of-add-row[data-add-idx="' + idx + '"]');
        if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
        ofSyncRowReady_(idx);
      });
    });
    tbody.querySelectorAll('.of-add-dept').forEach(function (sel) {
      sel.addEventListener('change', function () { ofSyncRowReady_(sel.getAttribute('data-idx')); });
    });
    tbody.querySelectorAll('.of-add-exts').forEach(function (inp) {
      inp.addEventListener('input', function () { ofSyncRowReady_(inp.getAttribute('data-idx')); });
    });
    tbody.querySelectorAll('.of-add-confirm').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (ofBusy_) return;
        const idx = Number(btn.getAttribute('data-idx'));
        const orphan = (ofLastInit.orphans || [])[idx];
        const dept = tbody.querySelector('.of-add-dept[data-idx="' + idx + '"]');
        const exts = tbody.querySelector('.of-add-exts[data-idx="' + idx + '"]');
        if (!orphan || !dept || !dept.value || !exts || !exts.value.trim()) return;
        ofConfirmAndAddToRoster_(orphan, dept.value, exts.value);
      });
    });

    // Batch bar visible now there are outliers; reset selection state.
    const bar = $('of-batch-bar');
    if (bar) bar.style.display = '';
    const selAll = $('of-select-all');
    if (selAll) { selAll.checked = false; selAll.indeterminate = false; }
    ofUpdateBatchState_();
  }

  // Batch 4: a row's batch action + readiness. A row is batch-ready when its
  // canonical-name input holds a valid roster name (=> rename) OR its New
  // Assignment form is open and filled (=> roster-add). The New-Assignment path
  // takes precedence when its form is open+filled (an explicit "new person"
  // intent), else the canonical rename.
  function ofRowReady_(idx) {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return { ready: false };
    const inp  = tbody.querySelector('.of-row-select[data-idx="' + idx + '"]');
    const dept = tbody.querySelector('.of-add-dept[data-idx="' + idx + '"]');
    const exts = tbody.querySelector('.of-add-exts[data-idx="' + idx + '"]');
    const addRow = tbody.querySelector('.of-add-row[data-add-idx="' + idx + '"]');
    const canonical = (inp && ofRosterSet_[inp.value]) ? inp.value : '';
    const addOpen = !!(addRow && addRow.style.display !== 'none');
    const addFilled = !!(addOpen && dept && dept.value && exts && exts.value.trim());
    let kind = null;
    if (addFilled) kind = 'roster-add';
    else if (canonical) kind = 'rename';
    return {
      ready:     !!kind,
      kind:      kind,
      canonical: canonical,
      addFilled: addFilled,
      department: (dept && dept.value) || '',
      extensions: (exts && exts.value.trim()) || '',
    };
  }

  // Reconciles a single row's Apply / Add-to-roster / checkbox enabled state
  // from its current values, then refreshes the batch toolbar.
  function ofSyncRowReady_(idx) {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    const r = ofRowReady_(idx);
    const applyBtn   = tbody.querySelector('.of-row-apply[data-idx="' + idx + '"]');
    const addConfirm = tbody.querySelector('.of-add-confirm[data-idx="' + idx + '"]');
    const chk        = tbody.querySelector('.of-row-check[data-idx="' + idx + '"]');
    if (applyBtn)   applyBtn.disabled   = !r.canonical;   // single Apply = rename only
    if (addConfirm) addConfirm.disabled = !r.addFilled;
    if (chk) { chk.disabled = !r.ready; if (!r.ready) chk.checked = false; }
    ofUpdateBatchState_();
  }

  // Recomputes the batch toolbar + select-all from the current row state.
  function ofUpdateBatchState_() {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    const checked = tbody.querySelectorAll('.of-row-check:checked').length;
    const enabled = tbody.querySelectorAll('.of-row-check:not(:disabled)').length;
    const applyBtn = $('of-batch-apply');
    if (applyBtn) {
      applyBtn.disabled = ofBusy_ || checked === 0;
      applyBtn.textContent = checked ? ('Apply ' + checked + ' selected') : 'Apply selected';
    }
    const selAll = $('of-select-all');
    if (selAll) {
      selAll.checked = enabled > 0 && checked === enabled;
      selAll.indeterminate = checked > 0 && checked < enabled;
      selAll.disabled = ofBusy_ || enabled === 0;
    }
  }

  // Disables/enables every interactive control while a write is in flight so
  // clicks can't queue up behind the async round-trip (the reported race).
  function ofSetBusy_(busy) {
    ofBusy_ = busy;
    const body = $('of-body');
    if (body) body.classList.toggle('of-busy', busy);
    if (busy) {
      ['of-orphans-tbody', 'of-aliases-tbody'].forEach(function (id) {
        const t = $(id);
        if (t) t.querySelectorAll('button, select, input').forEach(function (el) { el.disabled = true; });
      });
      const sa = $('of-select-all'); if (sa) sa.disabled = true;
      const ba = $('of-batch-apply'); if (ba) ba.disabled = true;
    } else {
      ofRefreshRowStates_();
    }
  }

  // Restores each control's correct enabled/disabled state after a busy spell
  // (deterministic from the current DOM values -- no reload needed on failure).
  function ofRefreshRowStates_() {
    const tbody = $('of-orphans-tbody');
    if (tbody) {
      // Re-enable the inputs first, then reconcile each row's Apply /
      // Add-to-roster / checkbox state from its current values (ofSyncRowReady_
      // handles both the rename and new-assignment readiness paths).
      tbody.querySelectorAll('.of-row-select, .of-row-addnew, .of-add-dept, .of-add-exts')
        .forEach(function (el) { el.disabled = false; });
      const seen = {};
      tbody.querySelectorAll('.of-row-select').forEach(function (inp) {
        const idx = inp.getAttribute('data-idx');
        if (!seen[idx]) { seen[idx] = true; ofSyncRowReady_(idx); }
      });
    }
    const aliasTbody = $('of-aliases-tbody');
    if (aliasTbody) aliasTbody.querySelectorAll('.of-alias-remove').forEach(function (b) { b.disabled = false; });
    ofUpdateBatchState_();
  }

  // Item 5a: seamless in-place refresh after a write, replacing ofLoadInit_(true)
  // (which re-fetches getOrphanFixInit and re-runs the expensive orphan scan --
  // the "relaunch" feel testers flagged). Removes the just-fixed orphans from
  // the in-memory list and refreshes the aliases / log / rosterNames panels from
  // the write RESPONSE (the RPCs now return them), then re-renders with no loader
  // and no round-trip. The server busts its init cache on every write, so a
  // subsequent COLD open still recomputes from scratch.
  function ofApplyLocalUpdate_(res, removedNames) {
    if (!ofLastInit) { ofLoadInit_(true); return; }   // nothing loaded -> fall back
    res = res || {};
    if (removedNames && removedNames.length) {
      const drop = {};
      removedNames.forEach(function (n) { drop[n] = true; });
      ofLastInit.orphans = (ofLastInit.orphans || []).filter(function (o) { return !drop[o.name]; });
    }
    if (res.aliases)     ofLastInit.aliases = res.aliases;
    if (res.log)         ofLastInit.log = res.log;
    if (res.rosterNames) ofLastInit.rosterNames = res.rosterNames;
    ofRender_(ofLastInit);   // re-renders + re-wires all three panels in place
  }

  // Applies a list of actions SEQUENTIALLY (server-side LockService serializes
  // writes anyway, so parallel would just contend). Each item is a rename
  // ({kind:'rename'|undefined, fromName, toName}) or a new-assignment
  // ({kind:'roster-add', fromName, department, extensions}). Resolves
  // { ok:[{item,renamed,res}], failed:[{item,err}] }.
  function ofRunApplySequence_(items, onProgress) {
    return new Promise(function (resolve) {
      const ok = [], failed = [];
      let i = 0;
      const next = function () {
        if (i >= items.length) { resolve({ ok: ok, failed: failed }); return; }
        const it = items[i];
        if (onProgress) onProgress(i, items.length, it);
        const runner = google.script.run
          .withSuccessHandler(function (res) { ok.push({ item: it, renamed: (res && res.renamed) || 0, res: res }); i++; next(); })
          .withFailureHandler(function (err) { failed.push({ item: it, err: (err && err.message) ? err.message : String(err) }); i++; next(); });
        if (it.kind === 'roster-add') {
          runner.addOrphanToRoster({ name: it.fromName, department: it.department, extensions: it.extensions, notes: '' });
        } else {
          runner.applyOrphanRename({ fromName: it.fromName, toName: it.toName, alsoAddAlias: true, notes: '' });
        }
      };
      next();
    });
  }

  function ofBatchApply_() {
    if (ofBusy_) return;
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    // Batch 4: a checked row is a rename OR a new-assignment (add-to-roster),
    // per ofRowReady_. Collect the right action for each.
    const items = [];
    tbody.querySelectorAll('.of-row-check:checked').forEach(function (chk) {
      const idx = Number(chk.getAttribute('data-idx'));
      const orphan = (ofLastInit.orphans || [])[idx];
      if (!orphan) return;
      const r = ofRowReady_(idx);
      if (r.kind === 'roster-add') {
        items.push({ kind: 'roster-add', fromName: orphan.name,
          department: r.department, extensions: r.extensions, rows: orphan.rows || 0 });
      } else if (r.kind === 'rename') {
        items.push({ kind: 'rename', fromName: orphan.name, toName: r.canonical, rows: orphan.rows || 0 });
      }
    });
    if (!items.length) return;
    const renameItems = items.filter(function (it) { return it.kind === 'rename'; });
    const addItems    = items.filter(function (it) { return it.kind === 'roster-add'; });
    const totalRows   = renameItems.reduce(function (a, b) { return a + (b.rows || 0); }, 0);
    const parts = [];
    if (renameItems.length) parts.push('<strong>' + renameItems.length + '</strong> rename'
      + (renameItems.length === 1 ? '' : 's') + ' across <strong>' + totalRows + '</strong> historical row'
      + (totalRows === 1 ? '' : 's'));
    if (addItems.length) parts.push('<strong>' + addItems.length + '</strong> new roster assignment'
      + (addItems.length === 1 ? '' : 's'));
    dsConfirm_({
      title: 'Apply ' + items.length + ' change' + (items.length === 1 ? '' : 's'),
      tone: 'danger',
      messageHtml: 'Apply ' + parts.join(' and ') + '? '
        + (renameItems.length ? 'Renames modify past data in DQE Historical Data and add aliases so future imports map correctly. ' : '')
        + (addItems.length ? 'New assignments append a cell to the department roster. ' : '')
        + 'All actions are audited to Orphan Fix Log.',
      confirmLabel: 'Apply ' + items.length, cancelLabel: 'Cancel',
    }).then(function (okc) {
      if (!okc) return;
      ofSetBusy_(true);
      ofRunApplySequence_(items, function (k, total, it) {
        const label = it.kind === 'roster-add'
          ? (it.fromName + ' → ' + it.department + ' (new)')
          : (it.fromName + ' → ' + it.toName);
        ofSetStatus_('loading', 'Applying ' + (k + 1) + ' of ' + total + ': ' + label + '…');
      }).then(function (res) {
        ofSetBusy_(false);
        const renamedRows = res.ok.reduce(function (a, b) { return a + (b.renamed || 0); }, 0);
        const okRenames = res.ok.filter(function (o) { return o.item.kind !== 'roster-add'; }).length;
        const okAdds    = res.ok.filter(function (o) { return o.item.kind === 'roster-add'; }).length;
        if (res.failed.length) {
          ofSetStatus_('error', 'Applied ' + res.ok.length + ' of ' + items.length + '. '
            + res.failed.length + ' failed: '
            + res.failed.map(function (f) { return f.item.fromName + ' (' + f.err + ')'; }).join('; '));
        } else {
          const bits = [];
          if (okRenames) bits.push('renamed ' + renamedRows + ' row' + (renamedRows === 1 ? '' : 's')
            + ' across ' + okRenames + ' outlier' + (okRenames === 1 ? '' : 's'));
          if (okAdds) bits.push('added ' + okAdds + ' new assignment' + (okAdds === 1 ? '' : 's'));
          ofSetStatus_('success', 'Done — ' + bits.join(' and ')
            + '. Overview updates immediately; other views may take up to 30 minutes (cache TTL).');
        }
        showToast('Applied ' + res.ok.length + ' change' + (res.ok.length === 1 ? '' : 's'),
          res.failed.length ? 'error' : 'success');
        // Seamless refresh (Batch 1): drop applied orphans + merge the freshest
        // aliases / log / rosterNames across the batch (roster-adds return
        // rosterNames+log; renames return aliases+log -- take the latest of each).
        const applied = res.ok.map(function (o) { return o.item.fromName; });
        const merged = {};
        res.ok.forEach(function (o) {
          const rr = o.res || {};
          if (rr.aliases)     merged.aliases = rr.aliases;
          if (rr.log)         merged.log = rr.log;
          if (rr.rosterNames) merged.rosterNames = rr.rosterNames;
        });
        ofApplyLocalUpdate_(merged, applied);
      });
    });
  }

  function ofConfirmAndAddToRoster_(orphan, dept, exts) {
    if (ofBusy_) return;
    dsConfirm_({
      title: 'Add new assignment to roster',
      messageHtml: 'Add <strong>' + escapeHtml(orphan.name) + '</strong> to the <strong>'
        + escapeHtml(dept) + '</strong> roster with extension(s) <strong>' + escapeHtml(exts) + '</strong>? '
        + 'Enter the agent&rsquo;s own individual extension, not the department queue extension. '
        + 'This writes one cell to the DO NOT EDIT! sheet. Their ' + orphan.rows + ' existing data row'
        + (orphan.rows === 1 ? '' : 's') + ' will match immediately, and future imports canonicalize '
        + 'against it. Audited to Orphan Fix Log.',
      confirmLabel: 'Add to roster', cancelLabel: 'Cancel',
    }).then(function (okc) {
      if (!okc) return;
      ofSetBusy_(true);
      ofSetStatus_('loading', 'Adding ' + orphan.name + ' to the ' + dept + ' roster…');
      ofDoAddToRoster_(orphan, dept, exts);
    });
  }

  function ofDoAddToRoster_(orphan, dept, exts) {
    google.script.run
      .withSuccessHandler(function (res) {
        ofSetBusy_(false);
        ofSetStatus_('success',
          'Added "' + orphan.name + '" to ' + dept
          + (res && res.cell ? ' (cell ' + res.cell + ')' : '')
          + '. Overview updates immediately; other views may take up to 30 minutes (cache TTL).');
        showToast('Added to ' + dept + ' roster', 'success');
        // Item 5a: drop the now-rostered agent from the outlier list + refresh
        // the log / roster-name options in place (res carries rosterNames + log).
        ofApplyLocalUpdate_(res, [orphan.name]);
      })
      .withFailureHandler(function (err) {
        ofSetBusy_(false);
        ofSetStatus_('error', 'Add failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .addOrphanToRoster({
        name:       orphan.name,
        department: dept,
        extensions: exts,
        notes:      '',
      });
  }

  function ofConfirmAndApply_(orphan, canonical) {
    if (ofBusy_) return;
    dsConfirm_({
      title: 'Rename outlier',
      tone: 'danger',
      messageHtml: 'Rename <strong>' + escapeHtml(orphan.name) + '</strong> to <strong>'
        + escapeHtml(canonical) + '</strong> in <strong>' + orphan.rows + '</strong> historical row'
        + (orphan.rows === 1 ? '' : 's') + '? This modifies past data in DQE Historical Data and adds '
        + 'an alias to Agent Alias Overrides so the next daily build keeps the mapping. '
        + 'Audited to Orphan Fix Log.',
      confirmLabel: 'Rename', cancelLabel: 'Cancel',
    }).then(function (okc) {
      if (!okc) return;
      ofSetBusy_(true);
      ofSetStatus_('loading', 'Applying rename: ' + orphan.name + ' → ' + canonical + '…');
      ofRunApplySequence_([{ fromName: orphan.name, toName: canonical, rows: orphan.rows }])
        .then(function (res) {
          ofSetBusy_(false);
          if (res.failed.length) {
            ofSetStatus_('error', 'Rename failed: ' + res.failed[0].err);
            showToast('Rename failed', 'error');
            return;
          }
          const n = res.ok[0].renamed;
          ofSetStatus_('success',
            'Renamed ' + n + ' row' + (n === 1 ? '' : 's')
            + '. Alias added so future imports map correctly. '
            + 'Overview updates immediately; other dashboard views may take up to 30 minutes (cache TTL) to reflect the change.');
          showToast('Renamed ' + n + ' row' + (n === 1 ? '' : 's'), 'success');
          // Item 5a: drop the renamed orphan + refresh aliases/log in place.
          ofApplyLocalUpdate_(res.ok[0].res, [orphan.name]);
        });
    });
  }

  function ofRenderAliases_(aliases) {
    const tbody = $('of-aliases-tbody');
    if (!tbody) return;
    if (!aliases.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No aliases yet. Aliases get added automatically when you Apply '
        + 'a rename above.'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = aliases.map(function (a) {
      const activeCls = a.active ? 'al-active-yes' : 'al-active-no';
      const activeLbl = a.active ? 'Yes' : 'No';
      const removeBtn = a.active
        ? '<button type="button" class="link-btn of-alias-remove" '
          + 'data-old="' + escapeHtml(a.oldName) + '" title="Deactivate this alias">Deactivate</button>'
        : '';
      return '<tr>'
           +   '<td>' + escapeHtml(a.oldName) + '</td>'
           +   '<td>' + escapeHtml(a.canonicalName) + '</td>'
           +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
           +   '<td>' + escapeHtml(a.addedBy || '') + '</td>'
           +   '<td>' + escapeHtml(a.addedAt || '') + '</td>'
           +   '<td>' + removeBtn + '</td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.of-alias-remove').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (ofBusy_) return;
        const oldName = btn.getAttribute('data-old');
        dsConfirm_({
          title: 'Deactivate alias',
          messageHtml: 'Deactivate the alias for <strong>' + escapeHtml(oldName) + '</strong>? '
            + 'The pipeline will stop mapping this raw name on the next build. '
            + 'Historical rows that were already renamed stay renamed.',
          confirmLabel: 'Deactivate', cancelLabel: 'Cancel',
        }).then(function (okc) {
          if (!okc) return;
          ofSetBusy_(true);
          ofSetStatus_('loading', 'Deactivating alias…');
          google.script.run
            .withSuccessHandler(function (res) {
              ofSetBusy_(false);
              const n = (res && res.removed) || 0;
              ofSetStatus_('success', 'Deactivated ' + n + ' alias row'
                + (n === 1 ? '' : 's') + '.');
              // Item 5a: refresh the aliases + log panels in place (res carries
              // both); no orphan changes on an alias deactivate.
              ofApplyLocalUpdate_(res, []);
            })
            .withFailureHandler(function (err) {
              ofSetBusy_(false);
              ofSetStatus_('error', 'Deactivate failed: '
                + (err && err.message ? err.message : String(err)));
            })
            .removeAgentAlias({ oldName: oldName });
        });
      });
    });
  }

  function ofRenderLog_(log) {
    const tbody = $('of-log-tbody');
    if (!tbody) return;
    if (!log.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No outlier-fix actions logged yet.</td></tr>';
      return;
    }
    tbody.innerHTML = log.map(function (e) {
      return '<tr>'
           +   '<td>' + escapeHtml(e.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(e.admin || '')     + '</td>'
           +   '<td>' + escapeHtml(e.action || '')    + '</td>'
           +   '<td>' + escapeHtml(e.fromName || '')  + '</td>'
           +   '<td>' + escapeHtml(e.toName || '')    + '</td>'
           +   '<td class="num">' + (e.affectedRows == null ? '-' : escapeHtml(String(e.affectedRows))) + '</td>'
           +   '<td>' + escapeHtml(e.notes || '')     + '</td>'
           + '</tr>';
    }).join('');
  }

  function ofSetStatus_(kind, msg) {
    const el = $('of-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // -- Dept Config modal -----------------------------------------------
  // Admin-only, no-redeploy authoring for the per-dept QCD queue map,
  // Overview sub-queue nesting, and team-avg exclusions. Mirrors the
  // Outlier Fix modal: load init -> render discovered queues +
  // per-dept effective config -> inline edit form -> save/deactivate.
  // Server (DeptConfig.gs) validates every save.

  let dcLastInit = null;
  let dcEditDept = null;

  // -- Access Control modal (admin-only manager-access editor, C1) -----
  // Add/edit/remove manager dashboard access (email + department). Writes
  // the sheet via the admin-gated RPCs; changes take effect within the 60 s
  // auth cache TTL. Mirrors the Dept Config modal pattern.
  var acLastInit = { rows: [], departments: [], adminEmails: [] };

  function initAccessControl() {
    const btn = $('access-control-btn');
    const modal = $('access-control-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');
    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      acLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }
    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
    if ($('ac-save-btn'))  $('ac-save-btn').addEventListener('click', acSave_);
    if ($('ac-clear-btn')) $('ac-clear-btn').addEventListener('click', acClearForm_);
    if ($('ac-tbody'))     $('ac-tbody').addEventListener('click', acOnTableClick_);
  }

  function acSetStatus_(kind, msg) {
    const el = $('ac-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function acLoadInit_() {
    $('ac-loading').style.display = '';
    $('ac-body').style.display = 'none';
    acSetStatus_(null);
    google.script.run
      .withSuccessHandler(function (data) {
        $('ac-loading').style.display = 'none';
        $('ac-body').style.display = '';
        acLastInit = data || { rows: [], departments: [], adminEmails: [] };
        acRenderDeptOptions_(acLastInit.departments || []);
        acRenderRows_(acLastInit.rows || []);
        acClearForm_();
      })
      .withFailureHandler(function (err) {
        $('ac-loading').textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      })
      .getAccessControlInit();
  }

  function acRenderDeptOptions_(depts) {
    const sel = $('ac-dept');
    if (!sel) return;
    // R5 (owner): surface the ALL-DEPARTMENTS sentinel the server already
    // supports (saveAccessControlRow canonicalizes 'ALL'/'*'; see the
    // role-model gotcha) -- a manager-role viewer with every dept's DATA
    // breadth (dept selector like an admin) but no admin surfaces. No new
    // role needed; this only makes the existing grant reachable from the UI.
    sel.innerHTML = '<option value="">— pick —</option>'
      + '<option value="ALL">ALL — every department (manager, no admin surfaces)</option>'
      + depts.map(function (d) { return '<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + '</option>'; }).join('');
  }

  function acRenderRows_(rows) {
    const tbody = $('ac-tbody');
    const count = $('ac-count');
    if (count) count.textContent = rows.length;
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">No managers yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r, idx) {
      return '<tr data-ac-idx="' + idx + '">'
        + '<td>' + escapeHtml(r.email) + '</td>'
        + '<td>' + (r.department ? escapeHtml(r.department) : '<span class="al-empty-inline">—</span>') + '</td>'
        + '<td>' + (r.notes ? escapeHtml(r.notes) : '<span class="al-empty-inline">—</span>') + '</td>'
        + '<td>'
        +   '<button type="button" class="link-btn ac-row-edit" data-idx="' + idx + '">Edit</button> '
        +   '<button type="button" class="link-btn ac-row-remove" data-idx="' + idx + '">Remove</button>'
        + '</td>'
        + '</tr>';
    }).join('');
  }

  function acOnTableClick_(e) {
    const editBtn = e.target.closest && e.target.closest('.ac-row-edit');
    if (editBtn) { acEditRow_(Number(editBtn.getAttribute('data-idx'))); return; }
    const remBtn = e.target.closest && e.target.closest('.ac-row-remove');
    if (remBtn) { acRemoveRow_(Number(remBtn.getAttribute('data-idx'))); return; }
  }

  function acEditRow_(idx) {
    const r = (acLastInit.rows || [])[idx];
    if (!r) return;
    if ($('ac-email')) $('ac-email').value = r.email;
    if ($('ac-dept'))  $('ac-dept').value = r.department || '';
    if ($('ac-notes')) $('ac-notes').value = r.notes || '';
    if ($('ac-form-title')) $('ac-form-title').textContent = 'Edit manager access';
    if ($('ac-email')) $('ac-email').focus();
  }

  function acClearForm_() {
    if ($('ac-email')) $('ac-email').value = '';
    if ($('ac-dept'))  $('ac-dept').value = '';
    if ($('ac-notes')) $('ac-notes').value = '';
    if ($('ac-form-title')) $('ac-form-title').textContent = 'Add manager access';
    acSetStatus_(null);
  }

  function acSave_() {
    const email = ($('ac-email') ? $('ac-email').value : '').trim();
    const department = ($('ac-dept') ? $('ac-dept').value : '').trim();
    const notes = ($('ac-notes') ? $('ac-notes').value : '').trim();
    if (!email) { acSetStatus_('error', 'Enter a manager email.'); return; }
    if (!department) { acSetStatus_('error', 'Pick a department.'); return; }
    const btn = $('ac-save-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span>Saving…'; }
    const restore = function () { if (btn) { btn.disabled = false; btn.textContent = 'Save'; } };
    acSetStatus_('loading', 'Saving ' + email + '…');
    google.script.run
      .withSuccessHandler(function () {
        restore();
        acSetStatus_('success', 'Saved ' + email + ' → ' + department + '. Takes effect within ~60 s.');
        showToast('Saved access for ' + email, 'success');
        acLoadInit_();
      })
      .withFailureHandler(function (err) {
        restore();
        acSetStatus_('error', 'Save failed: ' + (err && err.message ? err.message : String(err)));
      })
      .saveAccessControlRow({ email: email, department: department, notes: notes });
  }

  function acRemoveRow_(idx) {
    const r = (acLastInit.rows || [])[idx];
    if (!r) return;
    // R5: app-styled confirm (dsConfirm_) instead of the browser-native
    // window.confirm that rendered in Sheets chrome (owner note).
    dsConfirm_({
      title: 'Remove dashboard access',
      tone: 'danger',
      message: 'Remove dashboard access for "' + r.email + '"? They will no longer be able to open the dashboard.',
      confirmLabel: 'Remove access', cancelLabel: 'Cancel',
    }).then(function (ok) {
      if (!ok) return;
      acSetStatus_('loading', 'Removing ' + r.email + '…');
      google.script.run
        .withSuccessHandler(function () {
          acSetStatus_('success', 'Removed ' + r.email + '. Takes effect within ~60 s.');
          showToast('Removed access for ' + r.email, 'success');
          acLoadInit_();
        })
        .withFailureHandler(function (err) {
          acSetStatus_('error', 'Remove failed: ' + (err && err.message ? err.message : String(err)));
        })
        .removeAccessControlRow({ email: r.email });
    });
  }

  function initDeptConfig() {
    const btn   = $('dept-config-btn');
    const modal = $('dept-config-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      dcLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Static edit-form buttons (wired once; the form is populated per
    // dept by dcOpenEdit_).
    const saveBtn = $('dc-save-btn');
    if (saveBtn) saveBtn.addEventListener('click', dcSave_);
    const deactivateBtn = $('dc-deactivate-btn');
    if (deactivateBtn) deactivateBtn.addEventListener('click', dcDeactivate_);
    const cancelBtn = $('dc-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', dcCloseEdit_);
  }

  function dcLoadInit_() {
    $('dc-loading').style.display = '';
    $('dc-body').style.display = 'none';
    dcSetStatus_(null);
    dcCloseEdit_();
    google.script.run
      .withSuccessHandler(function (data) {
        $('dc-loading').style.display = 'none';
        $('dc-body').style.display = '';
        dcLastInit = data || { departments: [], rosterByDept: {}, effective: [], rows: [], discoveredQueues: [], unmappedCount: 0 };
        dcRender_(dcLastInit);
      })
      .withFailureHandler(function (err) {
        $('dc-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getDeptConfigInit();
  }

  function dcRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('dc-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    // Department datalist for the Overview-parent input.
    const dl = $('dc-dept-datalist');
    if (dl) {
      dl.innerHTML = (data.departments || []).map(function (d) {
        return '<option value="' + escapeHtml(d) + '"></option>';
      }).join('');
    }
    dcRenderDiscovered_(data.discoveredQueues || [], data.unmappedCount || 0);
    dcRenderInboundDiscovered_(data.inboundDiscovery || null);
    dcRenderEffective_(data.effective || []);
  }

  // S1(c): the inbound name-space twin of dcRenderDiscovered_. Neon-backed,
  // so it has an explicit "unavailable" state (distinct from "no rows").
  function dcRenderInboundDiscovered_(disc) {
    const tbody = $('dc-inbound-tbody');
    if (!tbody) return;
    const badge = $('dc-inbound-badge');
    const queues = (disc && disc.queues) || [];
    const unattributed = queues.filter(function (q) { return !q.mappedTo; }).length;
    if (badge) {
      if (unattributed > 0) {
        badge.textContent = unattributed + ' unattributed';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
    if (!disc || disc.available === false) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">'
        + 'Inbound queue discovery is unavailable — Neon could not be reached '
        + '(or isn’t configured on this project). The rest of this modal is unaffected.'
        + '</td></tr>';
      return;
    }
    if (!queues.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">'
        + 'No inbound queue names found in inbound_calls (last 180 days).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = queues.map(function (q) {
      const mapped = q.mappedTo
        ? '<span class="al-active al-active-yes">' + escapeHtml(q.mappedTo) + '</span>'
        : '<span class="al-active al-active-no">unattributed</span>';
      return '<tr>'
           +   '<td>' + escapeHtml(q.queue) + '</td>'
           +   '<td class="num">' + (q.calls || 0) + '</td>'
           +   '<td>' + escapeHtml(q.lastSeen || '') + '</td>'
           +   '<td>' + mapped + '</td>'
           + '</tr>';
    }).join('');
  }

  function dcRenderDiscovered_(queues, unmappedCount) {
    const badge = $('dc-unmapped-badge');
    if (badge) {
      if (unmappedCount > 0) {
        badge.textContent = unmappedCount + ' unmapped';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
    const tbody = $('dc-discovered-tbody');
    if (!tbody) return;
    if (!queues.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">'
        + 'No queue names found in QCD Historical Data (last 180 days).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = queues.map(function (q) {
      const mapped = q.mappedTo
        ? '<span class="al-active al-active-yes">' + escapeHtml(q.mappedTo) + '</span>'
        : '<span class="al-active al-active-no">unmapped</span>';
      return '<tr>'
           +   '<td>' + escapeHtml(q.queue) + '</td>'
           +   '<td class="num">' + (q.rows || 0) + '</td>'
           +   '<td>' + escapeHtml(q.lastSeen || '') + '</td>'
           +   '<td>' + mapped + '</td>'
           + '</tr>';
    }).join('');
  }

  function dcRenderEffective_(effective) {
    const tbody = $('dc-effective-tbody');
    if (!tbody) return;
    if (!effective.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">No departments found.</td></tr>';
      return;
    }
    const cell = function (str) {
      return str ? escapeHtml(str) : '<span class="al-empty-inline">-</span>';
    };
    tbody.innerHTML = effective.map(function (e, idx) {
      const source = e.hasRow
        ? '<span class="al-active al-active-yes">sheet</span>'
        : '<span class="al-active al-active-no">default</span>';
      return '<tr data-dc-idx="' + idx + '">'
           +   '<td>' + escapeHtml(e.dept) + '</td>'
           +   '<td>' + cell((e.qcdQueues || []).join(', ')) + '</td>'
           +   '<td>' + cell(e.overviewParent || '') + '</td>'
           +   '<td>' + cell((e.teamAvgExcludes || []).join(', ')) + '</td>'
           +   '<td>' + cell((e.queueExtOverrides || []).join(', ')) + '</td>'
           +   '<td>' + cell((e.inboundAliases || []).join(', ')) + '</td>'
           +   '<td>' + source + '</td>'
           +   '<td><button type="button" class="link-btn dc-row-edit" data-idx="' + idx + '">Edit</button></td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.dc-row-edit').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const e = (dcLastInit.effective || [])[idx];
        if (e) dcOpenEdit_(e);
      });
    });
  }

  function dcOpenEdit_(eff) {
    dcEditDept = eff.dept;
    const nameEl = $('dc-edit-dept-name');
    if (nameEl) nameEl.textContent = eff.dept;
    $('dc-edit-qcd').value      = (eff.qcdQueues || []).join(', ');
    $('dc-edit-parent').value   = eff.overviewParent || '';
    $('dc-edit-excludes').value = (eff.teamAvgExcludes || []).join(', ');
    $('dc-edit-qext').value     = (eff.queueExtOverrides || []).join(', ');
    var inbAliasEl = $('dc-edit-inbound-aliases');
    if (inbAliasEl) inbAliasEl.value = (eff.inboundAliases || []).join(', ');
    $('dc-edit-notes').value    = '';
    // Deactivate only makes sense when a sheet row exists for the dept.
    const deact = $('dc-deactivate-btn');
    if (deact) deact.style.display = eff.hasRow ? '' : 'none';
    $('dc-edit-section').style.display = '';
    $('dc-edit-qcd').focus();
  }

  function dcCloseEdit_() {
    dcEditDept = null;
    const sec = $('dc-edit-section');
    if (sec) sec.style.display = 'none';
  }

  function dcSave_() {
    if (!dcEditDept) return;
    const req = {
      dept:              dcEditDept,
      qcdQueues:         $('dc-edit-qcd').value,
      overviewParent:    $('dc-edit-parent').value,
      teamAvgExcludes:   $('dc-edit-excludes').value,
      queueExtOverrides: $('dc-edit-qext').value,
      inboundAliases:    ($('dc-edit-inbound-aliases') || {}).value || '',
      active:            true,
      notes:             $('dc-edit-notes').value,
    };
    const saveBtn = $('dc-save-btn');
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span>Saving…';
    }
    const restoreSaveBtn = function () {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
    };
    dcSetStatus_('loading', 'Saving config for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function (res) {
        restoreSaveBtn();
        const warns = (res && res.warnings) || [];
        if (warns.length) {
          dcSetStatus_('success', 'Saved ' + dcEditDept + '. ⚠ ' + warns.join(' ')
            + ' Double-mapped queues are tolerated but usually a config mistake — '
            + 'remove the queue from one dept if unintended.');
          showToast('Saved ' + dcEditDept + ' — queue mapped to 2+ depts', 'success');
        } else {
          dcSetStatus_('success', 'Saved ' + dcEditDept
            + '. Changes take effect on the next request (Overview refreshes immediately; report caches within ~30 min).');
          showToast('Saved config for ' + dcEditDept, 'success');
        }
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        restoreSaveBtn();
        dcSetStatus_('error', 'Save failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .saveDeptConfig(req);
  }

  function dcDeactivate_() {
    if (!dcEditDept) return;
    if (!window.confirm('Deactivate the override row for "' + dcEditDept
        + '"? This reverts the dept to the built-in defaults.')) return;
    const deact = $('dc-deactivate-btn');
    if (deact) deact.disabled = true;
    dcSetStatus_('loading', 'Deactivating override for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function (res) {
        if (deact) deact.disabled = false;
        const n = (res && res.removed) || 0;
        dcSetStatus_('success', 'Deactivated ' + n + ' override row'
          + (n === 1 ? '' : 's') + '. Reverted to defaults.');
        showToast('Reverted ' + dcEditDept + ' to defaults', 'success');
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        if (deact) deact.disabled = false;
        dcSetStatus_('error', 'Deactivate failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .removeDeptConfig({ dept: dcEditDept });
  }

  function dcSetStatus_(kind, msg) {
    const el = $('dc-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // ===================================================================
  // Insights Report (combined: department rollup + per-agent prior cards)
  // Reuses the shared picker HTML (irBuildAgentListHtml_), the shared KPI
  // tile + delta logic (dsKpiTile_), the IR insight callout
  // (irInsightsBlock_), and the Source chip (sourceChipHtml_). Server:
  // getInsightsReportInit / getInsightsReport (InsightsReport.gs).
  // ===================================================================

  let insCardsChartMode = (typeof USER !== 'undefined' && USER && USER.role === 'manager') ? 'abs' : 'gap';   // I5a: managers default to Absolute
  let insCardsChartInstance = null;
  let insHasQuiet_ = false;        // whether the current render has quiet agents

  // 'totalCalls' | 'violations'. Persisted in prefs.

  let insCardSort = 'default';      // default (answered desc) | name | improvers | regressors

    if (!$('insights-page')) return;

      insPageInited_ = true;

      // launcher-window default with an agent-free whole-department run
      // (INV-45) -- and every later change goes through the "Edit dates &

      insAutoRunPending_ = true;

  function insResizeCharts_() {

      [insChartInstance, insShareChartInstance, insCardsChartInstance].forEach(function (c) {
        try { if (c) c.resize(); } catch (e) { /* destroyed mid-swap */ }
      });
    }); });

  function initInsightsReport() {
    const btn = $('insights-report-btn');
    const page = $('insights-page');
    // Insights is a full PAGE (modal->page conversion): the top-level tab
    // navigates like the Overview / My Department / Escalations tabs;

    // modal open/close/drag/focus-trap/scroll-lock/Escape -- the Escalations
    // pattern (#6).
    if (btn) btn.addEventListener('click', function () { setPage('insights'); });

    const preset = $('ins-preset');
    if (preset) preset.addEventListener('change', insApplyPreset);
    const fromEl = $('ins-from'), toEl = $('ins-to');
    if (fromEl) fromEl.addEventListener('change', function () {

    const selAll = $('ins-select-all'), selNone = $('ins-select-none');

    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); insToggleAgents(false); });
    const search = $('ins-agent-search');

    insWirePeriodBar_();   // I4: unified period slider drives the report window

    const insRefreshBtn = $('ins-refresh-btn');
    if (insRefreshBtn) insRefreshBtn.addEventListener('click', function () { runInsReport(); });

    // slider scrolls out; its ↻ re-runs the report like the header button.
    initStickyBar_('ins-sticky-bar', '#ins-period-bar', 'insights');
    const insStickyRefresh = $('ins-sticky-refresh');
    if (insStickyRefresh) insStickyRefresh.addEventListener('click', function () { runInsReport(); });

          .withSuccessHandler(function (data) { reportLastGoodWrite_('ir', sig, data); })
          .withFailureHandler(function () { /* best-effort -- the drill's own fetch surfaces errors */ })
          .getIndividualReport(req);

      if (!card) return;

    // (The results-header "« Back" button is retired with the setup-form

    insInitCompareMode_();

    // Card-sort control (CR pattern). Re-renders the card grid in

    if (cardSortSel) cardSortSel.addEventListener('change', function () {

      const b = e.target.closest('.seg-btn');
      if (!b) return;
      insSetDensity_(b.getAttribute('data-density') || 'detailed');
    });
    const simpleNoteBtn = $('ins-simple-note-detailed');
    if (simpleNoteBtn) simpleNoteBtn.addEventListener('click', function () {
      insSetDensity_('detailed');
    });
    const introDismiss = $('ins-intro-dismiss');
    if (introDismiss) introDismiss.addEventListener('click', function () {
      try { localStorage.setItem('cdr.ins.intro.v1', 'done'); } catch (e2) {}

      if (card) card.style.display = 'none';
    });

    // Cards/Chart view toggle (#3) + the Chart-view metric selector.
    const cardsViewToggle = $('ins-cards-view-toggle');
    if (cardsViewToggle) cardsViewToggle.addEventListener('click', function (e) {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      const next = b.getAttribute('data-view') || 'cards';
      if (next === insCardsView) return;
      insCardsView = next;
      cardsViewToggle.querySelectorAll('.seg-btn').forEach(function (x) {
        const active = x === b;
        x.classList.toggle('active', active);
        x.setAttribute('aria-checked', active ? 'true' : 'false');
      });
      insSavePrefs_();
      insApplyCardsView_();
    });
    const cardsChartMetricSel = $('ins-cards-chart-metric');
    if (cardsChartMetricSel) cardsChartMetricSel.addEventListener('change', function () {
      insCardsChartMetric = cardsChartMetricSel.value;
      insSavePrefs_();
      if (insCardsView === 'chart') insRenderCardsChart_();
    });
    // Chart-view basis sub-toggle: Gap vs team / Absolute (PR's volume view).
    const cardsChartModeSeg = $('ins-cards-chart-mode');
    if (cardsChartModeSeg) cardsChartModeSeg.addEventListener('click', function (e) {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      const next = b.getAttribute('data-mode') || 'gap';
      if (next === insCardsChartMode) return;
      insCardsChartMode = next;
      insSyncCardsChartMode_();
      insSavePrefs_();
      insApplyCardsView_();   // re-toggles the gap-only metric selector + re-renders
    });

    // Trend-metric sub-tabs (same pattern as the PR trend chart).
    const subTabs = $('ins-trend-subtabs');
    if (subTabs) subTabs.addEventListener('click', function (e) {
      const tab = e.target.closest('.pr-trend-subtab');
      if (!tab) return;
      insActiveTrendMetric = tab.getAttribute('data-metric') || 'answered';
      subTabs.querySelectorAll('.pr-trend-subtab').forEach(function (b) {
        const active = b === tab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      insSavePrefs_();
      if (insLastData) insRenderTrendChart_(insLastData);
    });

    // gap 1: per-queue metric sub-selector (only meaningful on the By Queue tab).
    const queueMetricSel = $('ins-queue-metric');
    if (queueMetricSel) queueMetricSel.addEventListener('change', function () {
      insQueueMetric = this.value || 'abandonedPct';
      insSavePrefs_();
      if (insLastData) insRenderTrendChart_(insLastData);
    });

    // Export dropdown -- same pattern as Individual / Performance.
    const exportBtn  = $('ins-export-btn');
    const exportMenu = $('ins-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        insSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        insSetExportMenuOpen_(false);
        if (action === 'csv')        insDownloadCsv_();
        else if (action === 'copy')  insCopyImage_();
        else if (action === 'email') insEmailReport_();
        else if (action === 'email-summary') insEmailReport_({ summary: true });   // Phase 2 #9
        else if (action === 'print') insPrint_();
      });

      // Phase 2 #8: Views menu (saved views + copy share link). Rebuilt on
      // every open so the list reflects saves/deletes; clicks inside the
      // save row keep the menu open.
      const viewsBtn = $('ins-views-btn');
      const viewsMenu = $('ins-views-menu');
      if (viewsBtn && viewsMenu) {
        const setViewsOpen = function (open) {
          viewsMenu.style.display = open ? '' : 'none';
          viewsBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
          if (open) insRenderViewsMenu_();
        };
        viewsBtn.addEventListener('click', function () {
          setViewsOpen(viewsMenu.style.display === 'none');
        });
        document.addEventListener('click', function (e) {
          if (viewsMenu.style.display === 'none') return;
          if (viewsBtn.contains(e.target) || viewsMenu.contains(e.target)) return;
          setViewsOpen(false);
        });
        viewsMenu.addEventListener('click', function (e) {
          if (e.target.closest('[data-views-action="share"]')) {
            setViewsOpen(false);
            insCopyShareLink_();
            return;
          }
          const del = e.target.closest('.ins-views-del');
          if (del) {
            const views = insViewsLoad_();
            views.splice(Number(del.getAttribute('data-view-idx')), 1);
            insViewsStore_(views);
            insRenderViewsMenu_();
            return;
          }
          const apply = e.target.closest('.ins-views-apply');
          if (apply) {
            const v = insViewsLoad_()[Number(apply.getAttribute('data-view-idx'))];
            setViewsOpen(false);
            if (v) insApplyViewState_(v.state);
            return;
          }
          if (e.target.closest('#ins-views-save')) insSaveCurrentView_();
        });
        viewsMenu.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && e.target && e.target.id === 'ins-views-name') {
            e.preventDefault();
            insSaveCurrentView_();
          }
        });
      }
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        insSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          insSetExportMenuOpen_(false);
        }
      });
    }
  }

  /**
   * Resolves the "Compare against" selection to an explicit prior
   * window (mirrors IR's irResolvePriorRange_, with ins-* element
   * ids). Returns:
   *   null              -> prevPeriod: omit priorFrom/priorTo and let
   *                        the server compute the INV-28 auto-adjacent
   *                        window (keeps the cache key 'auto').
   *   { from, to }      -> explicit window to send (yoy / custom).
   *   { error }         -> custom mode with missing/invalid dates.
   */
  function insResolvePriorRange_(from, to) {
    const mode = $('ins-compare-mode') ? $('ins-compare-mode').value : 'prevPeriod';
    if (!mode || mode === 'prevPeriod') return null;
    if (mode === 'custom') {
      const pf = $('ins-prior-from') ? $('ins-prior-from').value : '';
      const pt = $('ins-prior-to')   ? $('ins-prior-to').value   : '';
      if (!pf || !pt) return { error: 'Pick prior start and end dates (or switch Compare against to a preset).' };
      if (pf > pt)    return { error: 'Prior start must be on or before prior end.' };
      const out = { from: pf, to: pt };
      // F3: warn (don't block) when the custom prior overlaps the current
      // range -- server attribution is "current wins", so overlapping days
      // count toward the current period only and the prior reads low.
      if (from && to && pf <= to && pt >= from) {
        out.warn = 'Note: this prior window overlaps the current range ('
          + from + ' – ' + to + '). Overlapping days count toward the current '
          + 'period only, so the prior period may read low.';
      }
      return out;
    }
    if (mode === 'yoy') {
      const p1 = from.split('-'), p2 = to.split('-');
      const ps = new Date(Number(p1[0]) - 1, Number(p1[1]) - 1, Number(p1[2]), 12);
      const pe = new Date(Number(p2[0]) - 1, Number(p2[1]) - 1, Number(p2[2]), 12);
      return { from: insIsoOf_(ps), to: insIsoOf_(pe) };
    }
    return null;
  }

  // Wire the Compare against dropdown: show/hide custom inputs and
  // preview the resolved window in the hint (mirrors irInitCompareMode_).
  function insInitCompareMode_() {
    const sel = $('ins-compare-mode');
    if (!sel) return;
    const refresh = function () {
      const mode = sel.value;
      const showCustom = (mode === 'custom');
      if ($('ins-prior-from-wrap')) $('ins-prior-from-wrap').style.display = showCustom ? '' : 'none';
      if ($('ins-prior-to-wrap'))   $('ins-prior-to-wrap').style.display   = showCustom ? '' : 'none';
      const hint = $('ins-prior-hint');
      if (!hint) return;
      const from = $('ins-from').value, to = $('ins-to').value;
      if (!from || !to) { hint.textContent = ''; return; }
      const prior = insResolvePriorRange_(from, to);
      if (!prior) { hint.textContent = ''; return; }   // prevPeriod: server hint suffices
      if (prior.error) { hint.textContent = prior.error; return; }
      // INV-35-style form-side warning when a custom window's length
      // differs >= 1.2x from the current range (CR's S18 pattern).
      let lengthNote = '';
      // F-38: WORKING-day ratio, matching the server's INV-35 flag
      // (insights v12) so the hint and the generated report agree.
      const curDays = workingDaysBetween_(from, to);
      const priDays = workingDaysBetween_(prior.from, prior.to);
      if (curDays > 0 && priDays > 0
          && Math.max(curDays, priDays) / Math.min(curDays, priDays) >= 1.2) {
        const ratio = (Math.max(curDays, priDays) / Math.min(curDays, priDays)).toFixed(1);
        lengthNote = ' (the ' + (priDays > curDays ? 'prior window' : 'selected range')
                   + ' is ' + ratio + 'x longer in working days — volume totals won\'t be directly comparable)';
      }
      hint.textContent = 'Comparing against ' + prior.from + ' to ' + prior.to + '.' + lengthNote
        + (prior.warn ? ' ' + prior.warn : '');
    };
    sel.addEventListener('change', function () { refresh(); insSavePrefs_(); });
    ['ins-from', 'ins-to', 'ins-prior-from', 'ins-prior-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', refresh);
    });
    refresh();
  }

  function insShowForm()    { launcherHideLoading_('ins-launcher-loading'); $('insights-form').style.display = ''; $('insights-results').style.display = 'none'; insSetFormError(''); }
  function insShowResults() { launcherHideLoading_('ins-launcher-loading'); $('insights-form').style.display = 'none'; $('insights-results').style.display = ''; }
  function insSetFormError(msg) {
    const el = $('ins-form-error'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function insIsoOf_(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')
      + '-' + String(d.getDate()).padStart(2, '0');
  }
  function insSetDefaultDates() {
    if ($('ins-from') && $('ins-from').value) return;   // keep restored/last value
    // Default = the launcher window (last 30 days ending yesterday) -- the
    // exact agent-free request CacheWarm pre-warms per dept, so the
    // form-less first entry usually paints from cache instead of a cold
    // aggregation. (Was month-to-date, which was never warmed.)
    if ($('ins-from')) $('ins-from').value = launcherIsoDaysAgo_(30);
    if ($('ins-to'))   $('ins-to').value   = launcherIsoDaysAgo_(1);
  }
  function insApplyPreset() {
    const v = $('ins-preset').value; insSavePrefs_();
    if (v === 'custom') return;
    const today = new Date(); let s, e = new Date(today);
    // Short-window presets (#2) for the agent-free queue/dept quick-look.
    // daysSinceMon: 0=Mon .. 6=Sun (JS getDay is 0=Sun..6=Sat).
    if (v === 'yesterday')        { s = new Date(today); s.setDate(today.getDate() - 1); e = new Date(s); }
    else if (v === 'thisWeek')    { const dsm = (today.getDay() + 6) % 7; s = new Date(today); s.setDate(today.getDate() - dsm); }
    else if (v === 'lastWeek')    { const dsm = (today.getDay() + 6) % 7;
                                    e = new Date(today); e.setDate(today.getDate() - dsm - 1);
                                    s = new Date(e); s.setDate(e.getDate() - 6); }
    else if (v === 'thisMonth')   { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')   { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                    e = new Date(today.getFullYear(), today.getMonth(), 0); }
    // "Last 30 days" = 30 days ending yesterday (matches the main page's
    // chip, the Overview launcher window, and CacheWarm -- see applyIrPreset).
    else if (v === 'last30')      { e = new Date(today); e.setDate(today.getDate() - 1);
                                    s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months') { s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')    { s = new Date(today.getFullYear() - 1, 0, 1);
                                    e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    $('ins-from').value = insIsoOf_(s);
    $('ins-to').value   = insIsoOf_(e);
    insScheduleActiveRefetch_(); insSavePrefs_();
  }

  // -- Picker (mirrors the IR picker; reuses the shared helpers) ----------
  function insEnsureRoster() {
    const dept = getRequestedDept();
    if (!dept) { $('ins-agent-loader').textContent = 'No department selected.'; $('ins-agent-list').style.display = 'none'; return; }
    const from = $('ins-from').value, to = $('ins-to').value;
    const rangeKey = from + '|' + to;
    if (insLastRoster.dept === dept && insLastRoster.agents.length && insLastRoster.rangeKey === rangeKey) {
      insRenderAgentList(); return;
    }
    $('ins-agent-loader').style.display = ''; $('ins-agent-list').style.display = 'none'; $('ins-generate-btn').disabled = true;
    const __rk = ++insRosterReqSeq_;
    google.script.run
      .withSuccessHandler(function (data) {
        if (__rk !== insRosterReqSeq_) return;   // superseded by a newer fetch
        insLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        insRenderAgentList();
      })
      .withFailureHandler(function (err) {
        if (__rk !== insRosterReqSeq_) return;   // a newer fetch owns the picker
        // The launcher AND the first-entry auto-run hide the form behind a
        // loading pane; on a roster failure, cancel the pending auto-run
        // and fall back to the form so the loader error is visible instead
        // of an eternal loading pane (the IR #1-Part-B pattern).
        if (insLauncherAutoRun_ || insAutoRunPending_) {
          insLauncherAutoRun_ = false;
          insAutoRunPending_ = false;
          insShowForm();
        }
        $('ins-agent-loader').style.display = '';
        $('ins-agent-loader').textContent = 'Error loading roster: ' + (err && err.message ? err.message : String(err));
      })
      .getInsightsReportInit({ department: dept, from: from, to: to });
  }
  function insScheduleActiveRefetch_() {
    if (insActiveFetchTimer) clearTimeout(insActiveFetchTimer);
    insActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept(); if (!dept) return;
      const from = $('ins-from').value, to = $('ins-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (insLastRoster.dept === dept && insLastRoster.rangeKey === rangeKey) return;
      const __rk = ++insRosterReqSeq_;
      google.script.run
        .withSuccessHandler(function (data) {
          if (__rk !== insRosterReqSeq_) return;   // superseded by a newer fetch
          insLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          insLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          insLastRoster.rangeKey = rangeKey;
          const checked = irGetCheckedAgents_($('ins-agent-list'));
          insRenderAgentList();
          irApplyCheckedAgents_($('ins-agent-list'), checked);
          insUpdateGenerate();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getInsightsReportInit({ department: dept, from: from, to: to });
    }, 350);
  }
  function insRenderAgentList() {
    const list = $('ins-agent-list');
    $('ins-agent-loader').style.display = 'none';
    if (!insLastRoster.agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = ''; $('ins-generate-btn').disabled = true; return;
    }
    // Insights is roster-only (see computeInsights_ visibleAgents) -- don't
    // offer the queue-only floater group in the picker, so it can't be picked
    // into a report that would then drop it. IR/PR/CR still surface floaters.
    list.innerHTML = irBuildAgentListHtml_(insLastRoster.agents, insLastRoster.activeAgents, []);
    list.style.display = '';
    if (insListChangeHandler_) list.removeEventListener('change', insListChangeHandler_);
    insListChangeHandler_ = function () { insUpdateGenerate(); insSavePrefs_(); };
    list.addEventListener('change', insListChangeHandler_);
    if (insPendingAgentSelection_) { irApplyCheckedAgents_(list, insPendingAgentSelection_); insPendingAgentSelection_ = null; }
    insUpdateGenerate();
    // Overview question-launcher flow: the picker render is the race-free
    // point to select the whole active roster and run. One-shot.
    if (insLauncherAutoRun_) {
      insLauncherAutoRun_ = false;
      insAutoRunPending_ = false;   // the launcher run covers first-entry too
      insToggleAgents(true);
      if (!$('ins-generate-btn').disabled) runInsReport();
      else insShowForm();   // empty roster: surface the picker's message, not an eternal pane
    } else if (insAutoRunPending_) {
      // First-entry auto-run (form retired): respect any prefs-restored
      // agent selection (applied via insPendingAgentSelection_ above);
      // nothing checked = the agent-free whole-department run (INV-45).
      insAutoRunPending_ = false;
      if (!$('ins-generate-btn').disabled) runInsReport();
      else insShowForm();
    }
  }
  function insToggleAgents(on) { selectAllActiveAgents_($('ins-agent-list'), on); insUpdateGenerate(); insSavePrefs_(); }
  function insUpdateGenerate() {
    // Agent-free run: Generate is enabled whenever the roster has any agent
    // (checked or not) -- leaving everything unchecked runs the whole
    // department (the QCD-style queue / dept quick-look). Only a truly empty
    // roster disables it.
    const total = $('ins-agent-list').querySelectorAll('.ir-agent-cb').length;
    $('ins-generate-btn').disabled = total === 0;
  }

  // -- In-results edit popover (IR's pattern, adapted to Insights) --------
  // Lets the user change dates / comparison / agent selection from the
