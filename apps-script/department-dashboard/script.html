<script>
(function () {
  'use strict';

  // window.__USER__ is injected by the dashboard template.
  const USER = window.__USER__ || { role: 'none', email: '', department: null, departments: [] };

  const state = {
    rows: [],
    totals: null,
    meta: null,
    diagnostics: null,
    sortKey: 'totalMissed',
    sortDir: 'desc',     // 'asc' | 'desc'
    scope: 'roster',     // 'roster' | 'queue' | 'both'
  };

  // -- Formatting helpers --------------------------------------------------

  function pad2(n) { return String(n).padStart(2, '0'); }

  function fmtDuration(seconds) {
    seconds = Math.max(0, Math.round(Number(seconds) || 0));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return h + ':' + pad2(m) + ':' + pad2(s);
  }

  function fmtNumber(n) {
    n = Number(n) || 0;
    return n.toLocaleString('en-US');
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function toIsoDate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function defaultRange() {
    const now = new Date();
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: toIsoDate(first), to: toIsoDate(now) };
  }

  // -- Column model --------------------------------------------------------
  // Order matches the <thead>; sortKey maps to a row property.
  const COLUMNS = [
    { key: 'agent',                label: 'Agent',           type: 'text' },
    { key: 'totalUnique',          label: 'Unique',          type: 'num' },
    { key: 'totalRung',            label: 'Rung',            type: 'num' },
    { key: 'totalMissed',          label: 'Missed',          type: 'num', highlight: 'missed' },
    { key: 'totalAnswered',        label: 'Answered',        type: 'num' },
    { key: 'tttSeconds',           label: 'TTT',             type: 'duration' },
    { key: 'attSeconds',           label: 'ATT',             type: 'duration' },
    { key: 'avgAbdWaitSeconds',    label: 'Avg Abd Wait',    type: 'duration' },
    { key: 'csrAvgAbdWaitSeconds', label: 'CSR Avg Abd Wait', type: 'duration' },
  ];

  // -- DOM ----------------------------------------------------------------

  const $ = function (id) { return document.getElementById(id); };

  function init() {
    // Header
    $('user-email').textContent = USER.email || '(unknown)';
    const tag = $('role-tag');
    tag.textContent = USER.role;
    tag.classList.add('tag-' + USER.role);

    // Department selector vs static label
    if (USER.role === 'admin' && USER.departments && USER.departments.length) {
      const sel = $('dept-selector');
      USER.departments.forEach(function (d) {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        sel.appendChild(opt);
      });
      $('dept-selector-wrap').style.display = '';
      sel.addEventListener('change', function () {
        // Admin switched depts; the Individual Report's cached agent
        // roster is now stale, so wipe it so the next modal open
        // refetches.
        irLastRoster = { dept: null, agents: [] };
        refresh();
      });
      $('dept-name').textContent = sel.value;
    } else {
      $('dept-name').textContent = USER.department || '(no department)';
    }

    // Date range defaults
    const range = defaultRange();
    $('from-date').value = range.from;
    $('to-date').value = range.to;
    $('from-date').addEventListener('change', refresh);
    $('to-date').addEventListener('change', refresh);

    $('refresh-btn').addEventListener('click', refresh);

    // Scope segmented control
    document.querySelectorAll('#scope-toggle .seg-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const next = btn.getAttribute('data-scope');
        if (next === state.scope) return;
        state.scope = next;
        document.querySelectorAll('#scope-toggle .seg-btn').forEach(function (b) {
          const active = b.getAttribute('data-scope') === next;
          b.classList.toggle('active', active);
          b.setAttribute('aria-checked', active ? 'true' : 'false');
        });
        refresh();
      });
    });

    // Sortable headers
    document.querySelectorAll('#agents-table thead th[data-sort]').forEach(function (th) {
      th.addEventListener('click', function () { onSort(th.getAttribute('data-sort')); });
    });

    initHelpModal();
    initMissedReport();
    initIndividualReport();

    refresh();
  }

  // -- Help & FAQ modal ---------------------------------------------------
  // Opens on "?" button in header. Closes on backdrop click, X button, or
  // Escape key. Returns focus to the help button on close. Reuses the same
  // modal infrastructure that upcoming report views will use.
  function initHelpModal() {
    const btn = $('help-btn');
    const modal = $('help-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (closeBtn) closeBtn.focus();
      document.addEventListener('keydown', onKeyDown);
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
  }

  // -- Missed Calls Report modal -----------------------------------------
  // Opens with the dashboard's current dept/from/to/scope. Fetches via
  // google.script.run.getMissedCallsReport, renders a Chart.js bar chart
  // for the hour-of-day distribution + a per-agent card grid with each
  // agent's missed-call timestamps (abandoned ones marked).
  //
  // Re-fetches every time the modal opens (cheap; respects 5-min server
  // cache). The Chart instance is kept on a closure variable and updated
  // on subsequent renders rather than re-instantiated.

  let missedChart = null;
  let lastMissedData = null;       // last server response (for chart-click drill-in)
  let activeBucketIdx = -1;        // currently-shown detail bucket; -1 = none

  function initMissedReport() {
    const btn = $('missed-report-btn');
    const modal = $('missed-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', onKeyDown);
      if (closeBtn) closeBtn.focus();
      fetchAndRender();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Close button on the bucket-detail panel (chart drill-in).
    const detailClose = $('bucket-detail-close');
    if (detailClose) detailClose.addEventListener('click', hideBucketDetail);

    function fetchAndRender() {
      const dept = getRequestedDept();
      const req = {
        department: dept,
        from: $('from-date').value,
        to:   $('to-date').value,
        scope: state.scope,
      };

      setMissedStatus('loading', 'Loading missed-call data...');
      $('missed-summary').innerHTML = '';
      $('missed-agents').innerHTML = '';
      // Destroy any previous chart + canvas so the stale visual
      // doesn't linger while the new fetch is in flight.
      clearMissedChart();
      hideBucketDetail();
      hideQueueOnlySection();
      lastMissedData = null;

      google.script.run
        .withSuccessHandler(renderMissedReport)
        .withFailureHandler(function (err) {
          setMissedStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
        })
        .getMissedCallsReport(req);
    }
  }

  function clearMissedChart() {
    if (missedChart) {
      missedChart.destroy();
      missedChart = null;
    }
    const wrap = $('missed-chart-wrap');
    if (wrap) {
      wrap.innerHTML = '<div class="chart-loading">Loading chart&hellip;</div>';
    }
  }

  function setMissedStatus(kind, msg) {
    const el = $('missed-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function renderMissedReport(data) {
    if (!data) {
      setMissedStatus('error', 'No data returned.');
      return;
    }
    setMissedStatus(null);
    lastMissedData = data;

    const m = data.meta || {};
    const summaryParts = [
      '<span class="label">Department:</span><span class="val">' + escapeHtml(m.department || '') + '</span>',
      '<span class="label">Range:</span><span class="val">' + escapeHtml(m.from || '') + ' to ' + escapeHtml(m.to || '') + '</span>',
      '<span class="label">Scope:</span><span class="val">' + escapeHtml(m.scope || 'roster') + '</span>',
      '<span class="label">Total missed:</span><span class="val">' + fmtNumber(m.totalMissed || 0) + '</span>',
      // Total abandoned (rang-an-agent + queue-only). One abandoned
      // parent counts as 1 regardless of how many agents rang.
      '<span class="label">Abandoned calls:</span><span class="val">' + fmtNumber(m.abandonedCallCount || 0) + '</span>',
    ];
    // Only surface "No-ring abandons" when there are any, so the
    // summary stays tidy on typical days.
    if ((m.noRingAbandonCount || 0) > 0) {
      summaryParts.push(
        '<span class="label">No-ring abandons:</span><span class="val">' +
          fmtNumber(m.noRingAbandonCount) + '</span>'
      );
    }
    summaryParts.push(
      '<span class="label">Agents:</span><span class="val">' + fmtNumber(m.agentCount || 0) + '</span>'
    );
    $('missed-summary').innerHTML = summaryParts.join('<span class="sep">|</span>');

    renderMissedChart(data.chart || { labels: [], counts: [] });
    renderQueueOnly(data.queueOnly || []);
    renderMissedAgents(data.agents || []);
  }

  function renderMissedChart(chart) {
    const wrap = $('missed-chart-wrap');
    if (!wrap) return;

    // Recreate the canvas (clearMissedChart() replaced the container
    // contents with a loading placeholder).
    wrap.innerHTML = '<canvas id="missed-chart" aria-label="Hour-of-day distribution of missed calls"></canvas>';
    const canvas = $('missed-chart');

    if (typeof Chart === 'undefined') {
      // Chart.js failed to load (CDN blocked?). Surface a fallback.
      wrap.innerHTML = '<p class="chart-loading">Chart library failed to load. The agent grid below still shows the data.</p>';
      return;
    }

    const ctx = canvas.getContext('2d');
    // Radar chart, matching the legacy DQE Report's missed-calls
    // visualization (clock-like, with each axis = a 30-min bucket).
    const cfg = {
      type: 'radar',
      data: {
        labels: chart.labels || [],
        datasets: [{
          label: 'Missed calls',
          data: chart.counts || [],
          fill: true,
          backgroundColor: 'rgba(255, 99, 132, 0.2)',
          borderColor: 'rgb(255, 99, 132)',
          pointBackgroundColor: 'rgb(255, 99, 132)',
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) { return items[0].label + ' CST'; },
              label: function (item) { return item.parsed.r + ' missed call' + (item.parsed.r === 1 ? '' : 's'); }
            }
          }
        },
        scales: {
          r: {
            beginAtZero: true,
            ticks: { display: false, stepSize: 1 },
            pointLabels: {
              font: { size: 10 },
              // Make the 18 axis labels feel clickable too -- they
              // open the same detail panel as a data-point click.
              padding: 6
            }
          }
        },
        layout: { padding: 10 },
        // Click a data point (or the axis label nearest a point) to
        // see the contributing rings for that 30-min bucket.
        onClick: function (evt, items, chartObj) {
          if (items && items.length) {
            toggleBucketDetail(items[0].index);
            return;
          }
          // Allow clicking near an axis label even if not exactly on a
          // data point: snap to the nearest point.
          const near = chartObj.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
          if (near && near.length) toggleBucketDetail(near[0].index);
        }
      }
    };

    // Canvas is always freshly recreated above, so we always
    // instantiate a new Chart rather than update an existing one.
    missedChart = new Chart(ctx, cfg);
  }

  // -- Bucket detail (chart drill-in) ------------------------------------
  // Click a chart bucket -> show all rings (date, agent, time) that
  // contributed to that 30-min slot. Click the same bucket again, or
  // the "Close" link, to dismiss. Hidden on every fresh fetch.

  function toggleBucketDetail(idx) {
    if (idx === activeBucketIdx) {
      hideBucketDetail();
    } else {
      showBucketDetail(idx);
    }
  }

  function showBucketDetail(idx) {
    if (!lastMissedData || !lastMissedData.chart || !lastMissedData.agents) return;
    const labels = lastMissedData.chart.labels || [];
    if (idx < 0 || idx >= labels.length) return;

    activeBucketIdx = idx;
    const bucketLabel = labels[idx];

    // Collect every event whose .bucket matches idx, across both
    // agent rings AND queue-only abandoned entries. Queue entries
    // are displayed with the queue name in the agent column and a
    // "(no agent rang)" suffix.
    const rings = [];
    (lastMissedData.agents || []).forEach(function (a) {
      a.missedTimes.forEach(function (m) {
        if (m.bucket === idx) {
          rings.push({
            agent: a.name,
            date: m.date,
            label: m.label,
            abandoned: m.abandoned,
            parentId: m.parentId || null,
            sortKey: m.sortKey,
            isQueueOnly: false,
          });
        }
      });
    });
    (lastMissedData.queueOnly || []).forEach(function (q) {
      q.entries.forEach(function (m) {
        if (m.bucket === idx) {
          rings.push({
            agent: q.queue + ' (no agent rang)',
            date: m.date,
            label: m.label,
            abandoned: true,
            parentId: m.parentId || null,
            sortKey: m.sortKey,
            isQueueOnly: true,
          });
        }
      });
    });
    rings.sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return (a.sortKey || 0) - (b.sortKey || 0);
    });

    const titleEl = $('bucket-detail-title');
    const bodyEl  = $('bucket-detail-body');
    const wrap    = $('missed-bucket-detail');
    if (!titleEl || !bodyEl || !wrap) return;

    titleEl.textContent = bucketLabel + ' CST  ·  ' + rings.length
                        + ' ring' + (rings.length === 1 ? '' : 's');

    if (!rings.length) {
      bodyEl.innerHTML = '<p class="bucket-detail-empty">No rings in this bucket.</p>';
    } else {
      bodyEl.innerHTML = '<ul class="bucket-detail-list">' + rings.map(function (r) {
        const cls = r.abandoned ? 'abandoned' : '';
        const siren = r.abandoned ? ' 🚨' : '';
        const dateLabel = r.date ? r.date.slice(5) : '';   // MM-DD
        return '<li class="' + cls + '">'
             +   '<span class="ring-date">'  + escapeHtml(dateLabel) + '</span>'
             +   '<span class="ring-agent">' + escapeHtml(r.agent)   + '</span>'
             +   '<span class="ring-time">'  + escapeHtml(r.label) + siren
             +     parentIdBadge(r.parentId)
             +   '</span>'
             + '</li>';
      }).join('') + '</ul>';
    }

    wrap.style.display = '';
    const row = $('chart-row');
    if (row) row.classList.remove('no-detail');
    initClipboardOnce();
    // Scroll the panel into view if it's offscreen below the chart.
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideBucketDetail() {
    activeBucketIdx = -1;
    const wrap = $('missed-bucket-detail');
    if (!wrap) return;
    wrap.style.display = 'none';
    const bodyEl = $('bucket-detail-body');
    if (bodyEl) bodyEl.innerHTML = '';
    const row = $('chart-row');
    if (row) row.classList.add('no-detail');
  }

  // Renders the parent-call-ID chip + copy button used on every
  // abandoned timestamp. Pasting the parent ID into raw CDR search
  // is the manual verification step, so the copy button is worth
  // the extra DOM. Returns '' for falsy IDs (non-abandoned rows).
  function parentIdBadge(parentId) {
    if (!parentId) return '';
    const safe = escapeHtml(String(parentId));
    return ' <span class="parent-id" title="Parent call ID">'
         +   '<span class="pid-num">#' + safe + '</span>'
         +   '<button type="button" class="pid-copy" '
         +     'data-pid="' + safe + '" '
         +     'aria-label="Copy parent ID ' + safe + '" '
         +     'title="Copy">📋</button>'
         + '</span>';
  }

  // Renders the "[also rang Backup CSR, A_Q_Spanish]" suffix used on
  // queue-only entries when the same parent ID appears under multiple
  // queue sentinels (overflow). Empty when the call only hit this
  // queue, so no visual noise on the common case.
  function alsoInBadge(alsoIn) {
    if (!alsoIn || !alsoIn.length) return '';
    return ' <span class="also-in">'
         +   '[also rang ' + alsoIn.map(escapeHtml).join(', ') + ']'
         + '</span>';
  }

  // Wire a single delegated click handler for ALL copy buttons inside
  // the missed-calls modal. data-pid carries the value; we use the
  // async Clipboard API with a fallback no-op + visual confirmation
  // (button flips to ✓ for ~1s) so the user knows it worked.
  function initClipboardOnce() {
    if (initClipboardOnce.done) return;
    initClipboardOnce.done = true;
    const modal = $('missed-modal');
    if (!modal) return;
    modal.addEventListener('click', function (e) {
      const btn = e.target.closest && e.target.closest('.pid-copy');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const pid = btn.getAttribute('data-pid') || '';
      if (!pid) return;
      const flashOk = function () {
        const prev = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = prev;
          btn.classList.remove('copied');
        }, 1000);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pid).then(flashOk, function () {});
      } else {
        // Apps Script web app may run in a sandboxed iframe where
        // clipboard API is unavailable; fall back to a hidden textarea
        // + execCommand so copy still works in older paths.
        try {
          const ta = document.createElement('textarea');
          ta.value = pid;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          flashOk();
        } catch (err) { /* swallow */ }
      }
    });
  }

  // -- Queue-only abandoned section --------------------------------------
  // Renders a banner + per-queue lists for abandoned calls that never
  // rang an agent (queue had no available agent). Hidden when empty.

  function renderQueueOnly(queueOnly) {
    const wrap = $('missed-queue-only');
    const body = $('queue-only-body');
    const sub  = $('queue-only-subhead');
    if (!wrap || !body) return;

    if (!queueOnly.length) {
      hideQueueOnlySection();
      return;
    }

    // Headline uses unique-by-parent-ID count alongside the per-queue
    // event sum, so overflow (one call ringing two queues) is visible:
    //   "8 unique calls across 3 queues (10 ring events)"
    // Fall back to the raw sum if the server didn't send the unique
    // count (older cached payload).
    const meta = (lastMissedData && lastMissedData.meta) || {};
    const eventSum = (typeof meta.queueOnlyEventCount === 'number')
                   ? meta.queueOnlyEventCount
                   : queueOnly.reduce(function (s, q) { return s + q.total; }, 0);
    const uniqueCalls = (typeof meta.queueOnlyUniqueCount === 'number')
                      ? meta.queueOnlyUniqueCount
                      : eventSum;
    const headParts = [
      uniqueCalls + ' unique call' + (uniqueCalls === 1 ? '' : 's'),
      'across ' + queueOnly.length + ' queue' + (queueOnly.length === 1 ? '' : 's'),
    ];
    if (eventSum !== uniqueCalls) {
      headParts.push('(' + eventSum + ' ring events)');
    }
    sub.textContent = '(no agent rang) — ' + headParts.join(' ');

    body.innerHTML = queueOnly.map(function (q) {
      const itemsHtml = q.entries.map(function (m) {
        const dateLabel = m.date ? m.date.slice(5) : '';   // MM-DD
        return '<li>'
             +   '<span class="ring-date">' + escapeHtml(dateLabel) + '</span>'
             +   '<span class="ring-time">' + escapeHtml(m.label)   + ' 🚨'
             +     parentIdBadge(m.parentId)
             +     alsoInBadge(m.alsoIn)
             +   '</span>'
             + '</li>';
      }).join('');
      return '<div class="queue-only-card">'
           +   '<div class="qname">' + escapeHtml(q.queue) + ' &middot; '
           +     q.total + ' abandoned</div>'
           +   '<ul class="queue-only-list">' + itemsHtml + '</ul>'
           + '</div>';
    }).join('');

    wrap.style.display = '';
    initClipboardOnce();
  }

  function hideQueueOnlySection() {
    const wrap = $('missed-queue-only');
    if (!wrap) return;
    wrap.style.display = 'none';
    const body = $('queue-only-body');
    if (body) body.innerHTML = '';
  }

  function renderMissedAgents(agents) {
    const wrap = $('missed-agents');
    if (!wrap) return;

    if (!agents.length) {
      wrap.innerHTML = '<div class="agent-card no-data">No missed calls in this range for any agent in scope.</div>';
      return;
    }

    wrap.innerHTML = agents.map(function (a) {
      const itemsHtml = a.missedTimes.map(function (m) {
        const dateLabel = m.date ? '<span class="date">' + escapeHtml(m.date.slice(5)) + '</span>' : '';
        const cls = m.abandoned ? 'abandoned' : '';
        const siren = m.abandoned ? ' 🚨' : '';
        return '<li class="' + cls + '">'
             +   dateLabel + escapeHtml(m.label) + siren
             +   parentIdBadge(m.parentId)
             + '</li>';
      }).join('');

      return '<div class="agent-card">'
           +   '<div class="agent-name">' + escapeHtml(a.name) + '</div>'
           +   '<div class="agent-total">' + a.total + ' missed</div>'
           +   '<ul class="missed-list">' + itemsHtml + '</ul>'
           + '</div>';
    }).join('');
    initClipboardOnce();
  }

  function getRequestedDept() {
    if (USER.role === 'admin') {
      const sel = $('dept-selector');
      return sel ? sel.value : '';
    }
    return USER.department || '';
  }

  function setStatus(kind, msg) {
    const el = $('status');
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function refresh() {
    const dept = getRequestedDept();
    if (!dept) {
      setStatus('error', 'No department available.');
      return;
    }
    const req = {
      department: dept,
      from: $('from-date').value,
      to: $('to-date').value,
      scope: state.scope,
    };
    if (!req.from || !req.to) {
      setStatus('error', 'Pick a from and to date.');
      return;
    }

    setStatus('loading', 'Loading...');
    $('refresh-btn').disabled = true;
    $('dept-name').textContent = dept;

    google.script.run
      .withSuccessHandler(onData)
      .withFailureHandler(onError)
      .getDepartmentSummary(req);
  }

  function onData(data) {
    $('refresh-btn').disabled = false;
    state.rows = (data && data.rows) || [];
    state.totals = (data && data.totals) || null;
    state.meta = (data && data.meta) || null;
    state.diagnostics = (data && data.diagnostics) || null;

    // Mock banner (only shown if the server flagged a mocked response;
    // Step D returns real data so this should always hide).
    const banner = $('mock-banner');
    if (state.meta && state.meta.mock) {
      banner.style.display = '';
    } else {
      banner.style.display = 'none';
    }

    if (!state.rows.length) {
      setStatus('empty',
        state.meta && state.meta.rosterSize === 0
          ? 'No agents found for this department in the roster sheet.'
          : 'No rows for this department in the selected range.');
    } else {
      setStatus(null);
    }
    render();
    renderInfoLine();
    renderDiagnostics();
  }

  function renderInfoLine() {
    const el = $('info-line');
    if (!state.meta) { el.style.display = 'none'; return; }
    const m = state.meta;
    const parts = [
      'Scope: ' + (m.scope || 'roster'),
      'Roster: ' + (m.rosterSize || 0) + ' agents',
      'Matched: ' + (m.rowsMatched || 0) + ' / ' + (m.rowsScanned || 0) + ' rows',
    ];
    if (typeof m.computeMs === 'number') {
      parts.push('Computed in ' + m.computeMs + ' ms');
    }
    const cachePill = m.cacheHit
      ? '<span class="pill pill-cache">cache hit</span>'
      : '<span class="pill pill-fresh">fresh read</span>';
    el.innerHTML = parts.join(' &middot; ') + cachePill;
    el.style.display = '';
  }

  function renderDiagnostics() {
    const wrap = $('diagnostics');
    const content = $('diag-content');
    const count = $('diag-count');
    if (!state.diagnostics) {
      wrap.style.display = 'none';
      return;
    }
    const d = state.diagnostics;
    const rosterMissing = d.rosterWithNoData || [];
    const queueOnly = d.queueOnlyMatched || [];
    const total = rosterMissing.length + queueOnly.length;
    if (total === 0) {
      wrap.style.display = 'none';
      return;
    }
    count.textContent = '(' + total + ')';

    const sections = [];
    if (rosterMissing.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Roster agents with no data in this range (' + rosterMissing.length + ')</h3>' +
        '<p>These agents are on the department roster but had no rows in <code>DQE Historical Data</code> for the selected dates. They may have been off, or the data hasn\'t been imported yet.</p>' +
        '<div class="diag-chips">' +
          rosterMissing.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    if (queueOnly.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Agents matched only via queue (' + queueOnly.length + ')</h3>' +
        '<p>These agents handled this department\'s queue extensions but aren\'t on the department roster. Either they covered for the dept, or they belong on the roster and the <code>DO NOT EDIT!</code> sheet should be updated.</p>' +
        '<div class="diag-chips">' +
          queueOnly.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    content.innerHTML = sections.join('');
    wrap.style.display = '';
  }

  function onError(err) {
    $('refresh-btn').disabled = false;
    state.rows = [];
    state.totals = null;
    state.meta = null;
    state.diagnostics = null;
    setStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
    render();
    renderInfoLine();
    renderDiagnostics();
  }

  // -- Sort ---------------------------------------------------------------

  function onSort(key) {
    if (state.sortKey === key) {
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sortKey = key;
      // Numbers default desc (most useful first), text asc.
      const col = COLUMNS.find(function (c) { return c.key === key; });
      state.sortDir = (col && col.type === 'text') ? 'asc' : 'desc';
    }
    render();
  }

  function sortRows(rows) {
    const key = state.sortKey;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    const col = COLUMNS.find(function (c) { return c.key === key; });
    const isText = col && col.type === 'text';
    return rows.slice().sort(function (a, b) {
      const av = a[key], bv = b[key];
      if (isText) {
        return String(av).localeCompare(String(bv)) * dir;
      }
      return ((Number(av) || 0) - (Number(bv) || 0)) * dir;
    });
  }

  // -- Render -------------------------------------------------------------

  function fmtCell(col, row) {
    const v = row[col.key];
    if (col.type === 'text') return escapeHtml(v == null ? '' : v);
    if (col.type === 'duration') return fmtDuration(v);
    return fmtNumber(v);
  }

  function render() {
    // Header sort arrows
    document.querySelectorAll('#agents-table thead th[data-sort]').forEach(function (th) {
      const key = th.getAttribute('data-sort');
      const arrow = th.querySelector('.arrow');
      if (!arrow) return;
      if (key === state.sortKey) {
        arrow.textContent = state.sortDir === 'asc' ? '▲' : '▼';
        arrow.style.color = '#374151';
      } else {
        arrow.textContent = '▽';
        arrow.style.color = '#9ca3af';
      }
    });

    const tbody = $('agents-tbody');
    const tfoot = $('agents-tfoot');

    if (!state.rows.length) {
      tbody.innerHTML = '';
      tfoot.innerHTML = '';
      return;
    }

    const sorted = sortRows(state.rows);
    tbody.innerHTML = sorted.map(function (row) {
      // Agents matched only via queue (not in the roster) get a small
      // "(queue-only)" tag next to the name in CSS.
      const rowClass = (row.matchedViaQueue && !row.matchedViaRoster) ? 'via-queue' : '';
      return '<tr' + (rowClass ? ' class="' + rowClass + '"' : '') + '>' + COLUMNS.map(function (col, i) {
        const cls = i === 0 ? 'agent-name' : 'num';
        const extra = (col.highlight === 'missed' && Number(row.totalMissed) > 0) ? ' missed-high' : '';
        return '<td class="' + cls + extra + '">' + fmtCell(col, row) + '</td>';
      }).join('') + '</tr>';
    }).join('');

    if (state.totals) {
      tfoot.innerHTML = '<tr>' + COLUMNS.map(function (col, i) {
        if (i === 0) return '<td>Total</td>';
        // Some keys (like totalUnique, totalRung) live on totals; ATT
        // and abd-wait are weighted on the server.
        return '<td class="num">' + fmtCell(col, state.totals) + '</td>';
      }).join('') + '</tr>';
    } else {
      tfoot.innerHTML = '';
    }
  }

  // -- Individual Report modal -------------------------------------------
  // Opens a form for date range + agent multi-select, then runs the
  // report server-side and renders per-agent summary cards + 3 Chart.js
  // line charts (volume / efficiency / duration). 1 agent = individual
  // mode; 2+ = peer comparison.
  //
  // The agent roster is fetched once on first open per dept; if the
  // user switches dept on the main page (admin only), we re-fetch.

  // Tableau-10-derived palette; tested against deuteranopia + protanopia
  // simulators. Chart series cycle through this for peer comparison.
  const IR_CHART_COLORS = [
    '#4E79A7', '#F28E2B', '#76B7B2', '#59A14F', '#EDC948',
    '#B07AA1', '#FF9DA7', '#9C755F', '#BAB0AC', '#E15759',
  ];

  // Used in Individual mode where the three Rung/Answered/Missed
  // series should be unambiguous even for color-blind viewers.
  // Blue / Teal / Orange instead of red/green for the missed series.
  const IR_VOLUME_COLORS = {
    rung:     '#4E79A7',  // blue
    answered: '#59A14F',  // green (kept; "answered = good" reads well)
    missed:   '#F28E2B',  // orange (replaces red; readable for CVD users)
  };

  // Translates a hex color to a Chart.js fill callback that paints a
  // top-to-bottom gradient from the line color (alpha .25) down to
  // transparent. Applied to every IR line chart so single-agent views
  // have visual weight without dominating the comparison ones.
  function irGradientFill_(chart, hexColor) {
    const ctx = chart.ctx;
    const area = chart.chartArea;
    if (!area) return 'rgba(0,0,0,0)';
    const gradient = ctx.createLinearGradient(0, area.top, 0, area.bottom);
    gradient.addColorStop(0, hexColor + '40');   // hex + 25% alpha
    gradient.addColorStop(1, hexColor + '00');   // fully transparent
    return gradient;
  }

  let irChartInstances = [];
  let irLastData = null;
  // Cached roster + active subset for the current modal session.
  // `activeAgents` is null until the first init call with from/to
  // succeeds; null means "we don't know yet, show all as one
  // group". `rangeKey` is the (from|to) the activeAgents were
  // computed for, so we can skip a re-fetch when neither input
  // has changed.
  let irLastRoster = { dept: null, agents: [], activeAgents: null, rangeKey: '' };
  let irActiveFetchTimer = null;

  function initIndividualReport() {
    const btn = $('individual-report-btn');
    const modal = $('individual-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', onKeyDown);
      showIrForm();
      ensureIrRoster();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Wire form controls.
    const preset = $('ir-preset');
    if (preset) preset.addEventListener('change', applyIrPreset);

    const fromEl = $('ir-from');
    const toEl   = $('ir-to');
    if (fromEl) fromEl.addEventListener('change', function () { resetIrPreset(); scheduleActiveAgentRefetch_(); });
    if (toEl)   toEl.addEventListener('change',   function () { resetIrPreset(); scheduleActiveAgentRefetch_(); });

    const selAll  = $('ir-select-all');
    const selNone = $('ir-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); toggleIrAgents(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); toggleIrAgents(false); });

    const search = $('ir-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('ir-agent-list'), search.value);
    });

    // Edit-selection popover wiring (results header).
    const editBtn = $('ir-edit-selection-btn');
    if (editBtn) editBtn.addEventListener('click', irOpenEditPopover_);
    const editClose = $('ir-edit-popover-close');
    if (editClose) editClose.addEventListener('click', irCloseEditPopover_);
    const editApply = $('ir-edit-apply-btn');
    if (editApply) editApply.addEventListener('click', irApplyEditPopover_);
    const editSelAll  = $('ir-edit-select-all');
    const editSelNone = $('ir-edit-select-none');
    if (editSelAll)  editSelAll.addEventListener('click',  function (e) { e.preventDefault(); irTogglePopoverAgents_(true);  });
    if (editSelNone) editSelNone.addEventListener('click', function (e) { e.preventDefault(); irTogglePopoverAgents_(false); });
    const editSearch = $('ir-edit-search');
    if (editSearch) editSearch.addEventListener('input', function () {
      irFilterAgentList_($('ir-edit-list'), editSearch.value);
    });
    // Close on click outside the popover.
    document.addEventListener('click', function (e) {
      const pop = $('ir-edit-popover');
      if (!pop || pop.style.display === 'none') return;
      if (pop.contains(e.target)) return;
      if (e.target === editBtn) return;
      irCloseEditPopover_();
    });

    const genBtn = $('ir-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runIrReport);

    const backBtn = $('ir-back-btn');
    if (backBtn) backBtn.addEventListener('click', showIrForm);

    const labelToggle = $('ir-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      if (irLastData) irRenderCharts(irLastData);
    });

    const copyBtn = $('ir-copy-img-btn');
    if (copyBtn) copyBtn.addEventListener('click', irCopyImage);

    const emailBtn = $('ir-email-img-btn');
    if (emailBtn) emailBtn.addEventListener('click', irEmailImage);

    // Chart panel tabs. Only one of the three charts is visible at
    // a time so each gets the full container width. Default: Volume.
    const tabContainer = $('ir-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      const which = tab.getAttribute('data-tab');
      tabContainer.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b.getAttribute('data-tab') === which;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
        p.style.display = p.getAttribute('data-panel') === which ? '' : 'none';
      });
      // Force the now-visible chart to resize against its newly-
      // measurable container -- Chart.js can't compute layout while
      // a panel is display:none, so we ask it explicitly.
      irChartInstances.forEach(function (c) { c.resize(); });
    });

    const printBtn = $('ir-print-btn');
    if (printBtn) printBtn.addEventListener('click', function () {
      // A print stylesheet (styles.html @media print) hides the
      // dashboard chrome and the modal backdrop / action buttons so
      // only the report content lands on the page. Browser's
      // built-in print preview can "save as PDF" for sharing.
      document.body.classList.add('ir-printing');
      window.print();
      document.body.classList.remove('ir-printing');
    });

    // Defaults: this-month-to-date.
    setIrDefaultDates();
  }

  function setIrDefaultDates() {
    // Match the main dashboard's default behavior: current month to
    // today. Lets a manager glance at the report without futzing
    // with dates first.
    const today = new Date();
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('ir-from')) $('ir-from').value = isoOf(first);
    if ($('ir-to'))   $('ir-to').value   = isoOf(today);
  }

  function showIrForm() {
    $('individual-form').style.display = '';
    $('individual-results').style.display = 'none';
    irSetFormError('');
  }
  function showIrResults() {
    $('individual-form').style.display = 'none';
    $('individual-results').style.display = '';
  }

  function irSetFormError(msg) {
    const el = $('ir-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg;
    el.style.display = '';
  }

  function irSetResultsStatus(kind, msg) {
    const el = $('ir-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // Fetches the dept roster (agent picker source) the first time the
  // modal opens for a given dept; subsequent opens reuse the cached
  // list as long as the dashboard's dept hasn't changed. Also asks
  // for the active-in-range subset using the current modal dates so
  // the picker can show an Active / Inactive split.
  function ensureIrRoster() {
    const dept = getRequestedDept();
    if (!dept) {
      $('ir-agent-loader').textContent = 'No department selected.';
      $('ir-agent-list').style.display = 'none';
      return;
    }
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    const rangeKey = from + '|' + to;

    if (irLastRoster.dept === dept && irLastRoster.agents.length
        && irLastRoster.rangeKey === rangeKey) {
      renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents);
      return;
    }
    $('ir-agent-loader').style.display = '';
    $('ir-agent-list').style.display = 'none';
    $('ir-generate-btn').disabled = true;

    google.script.run
      .withSuccessHandler(function (data) {
        irLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents: (data && data.activeAgents) || null,
          rangeKey: rangeKey,
        };
        renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents);
      })
      .withFailureHandler(function (err) {
        $('ir-agent-loader').textContent = 'Error loading roster: '
          + (err && err.message ? err.message : String(err));
      })
      .getIndividualReportInit({ department: dept, from: from, to: to });
  }

  /**
   * Re-fetches the active-in-range subset 350ms after the user
   * stops changing the date inputs. Doesn't block the form -- the
   * full roster is already rendered and selectable; the response
   * just splits it into Active / Inactive groups visually.
   */
  function scheduleActiveAgentRefetch_() {
    if (irActiveFetchTimer) clearTimeout(irActiveFetchTimer);
    irActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept();
      if (!dept) return;
      const from = $('ir-from').value;
      const to   = $('ir-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (irLastRoster.dept === dept && irLastRoster.rangeKey === rangeKey) return;

      google.script.run
        .withSuccessHandler(function (data) {
          irLastRoster.activeAgents = (data && data.activeAgents) || null;
          irLastRoster.rangeKey = rangeKey;
          // Preserve current selection across the regroup.
          const checked = irGetCheckedAgents_($('ir-agent-list'));
          renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents);
          irApplyCheckedAgents_($('ir-agent-list'), checked);
          updateIrGenerateEnabled();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getIndividualReportInit({ department: dept, from: from, to: to });
    }, 350);
  }

  /**
   * Renders the agent picker into `list` with Active / Inactive
   * grouping when an activeAgents subset is provided; otherwise a
   * single flat list. Used by both the main form picker and the
   * results-header edit popover.
   */
  function renderIrAgentList(agents, activeAgents) {
    const list = $('ir-agent-list');
    $('ir-agent-loader').style.display = 'none';
    if (!agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = '';
      $('ir-generate-btn').disabled = true;
      return;
    }
    list.innerHTML = irBuildAgentListHtml_(agents, activeAgents);
    list.style.display = '';

    // Listen once per render; container.innerHTML wipes previous
    // listeners so no accumulation.
    list.addEventListener('change', updateIrGenerateEnabled);
    updateIrGenerateEnabled();
  }

  function irBuildAgentListHtml_(agents, activeAgents) {
    // No activity info or no inactive members -> flat list.
    if (!activeAgents) return irAgentItemsHtml_(agents);
    const activeSet = {};
    for (let i = 0; i < activeAgents.length; i++) activeSet[activeAgents[i]] = true;
    const active = [];
    const inactive = [];
    for (let i = 0; i < agents.length; i++) {
      (activeSet[agents[i]] ? active : inactive).push(agents[i]);
    }
    if (!inactive.length) return irAgentItemsHtml_(active);

    let html = '';
    if (active.length) {
      html += '<div class="ir-agent-group-label">'
            + 'Active in range <span class="ir-agent-group-count">(' + active.length + ')</span>'
            + '</div>'
            + '<div class="ir-agent-group">' + irAgentItemsHtml_(active) + '</div>';
    }
    html += '<div class="ir-agent-group-label ir-agent-group-label-muted">'
          + 'No activity in range <span class="ir-agent-group-count">(' + inactive.length + ')</span>'
          + '</div>'
          + '<div class="ir-agent-group ir-agent-group-muted">' + irAgentItemsHtml_(inactive) + '</div>';
    return html;
  }

  function irAgentItemsHtml_(agents) {
    return agents.map(function (a) {
      const safe = escapeHtml(a);
      return '<label class="ir-agent-item">'
           +   '<input type="checkbox" class="ir-agent-cb" value="' + safe + '"> '
           +   safe
           + '</label>';
    }).join('');
  }

  /**
   * Client-side substring filter across whatever list element is
   * passed (main form picker or edit-popover list). Hides items +
   * group-labels whose visible text doesn't match the query.
   */
  function irFilterAgentList_(listEl, query) {
    if (!listEl) return;
    const q = String(query || '').trim().toLowerCase();
    const items = listEl.querySelectorAll('.ir-agent-item');
    items.forEach(function (it) {
      const name = (it.textContent || '').trim().toLowerCase();
      it.style.display = (!q || name.indexOf(q) !== -1) ? '' : 'none';
    });
    // Hide a group label if no items in its group are visible.
    listEl.querySelectorAll('.ir-agent-group').forEach(function (g) {
      const anyVisible = Array.prototype.some.call(
        g.querySelectorAll('.ir-agent-item'),
        function (it) { return it.style.display !== 'none'; }
      );
      g.style.display = anyVisible ? '' : 'none';
      const prevLabel = g.previousElementSibling;
      if (prevLabel && prevLabel.classList.contains('ir-agent-group-label')) {
        prevLabel.style.display = anyVisible ? '' : 'none';
      }
    });
  }

  function updateIrGenerateEnabled() {
    const boxes = $('ir-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('ir-generate-btn').disabled = boxes.length === 0;
  }

  function toggleIrAgents(checked) {
    $('ir-agent-list').querySelectorAll('.ir-agent-cb').forEach(function (cb) { cb.checked = checked; });
    updateIrGenerateEnabled();
  }

  function irGetCheckedAgents_(listEl) {
    if (!listEl) return [];
    return Array.prototype.slice.call(listEl.querySelectorAll('.ir-agent-cb:checked'))
                .map(function (cb) { return cb.value; });
  }

  function irApplyCheckedAgents_(listEl, agents) {
    if (!listEl) return;
    const set = {};
    for (let i = 0; i < agents.length; i++) set[agents[i]] = true;
    listEl.querySelectorAll('.ir-agent-cb').forEach(function (cb) {
      cb.checked = !!set[cb.value];
    });
  }

  function applyIrPreset() {
    const v = $('ir-preset').value;
    if (v === 'custom') return;
    const today = new Date();
    let s, e;
    e = new Date(today);
    if (v === 'thisMonth')       { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')  { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                    e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last30')     { s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months'){ s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')   { s = new Date(today.getFullYear() - 1, 0, 1);
                                    e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    $('ir-from').value = isoOf(s);
    $('ir-to').value   = isoOf(e);
  }
  function resetIrPreset() {
    const p = $('ir-preset');
    if (p) p.value = 'custom';
  }

  function runIrReport() {
    irSetFormError('');
    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    if (!from || !to) { irSetFormError('Pick a start and end date.'); return; }
    if (from > to)    { irSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('ir-agent-list'));
    if (!agents.length) { irSetFormError('Select at least one agent.'); return; }

    const btn = $('ir-generate-btn');
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = 'Loading…';

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        irSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport({ department: dept, from: from, to: to, agents: agents });
  }

  function irRenderReport(data) {
    irLastData = data;
    $('ir-results-title').textContent = data.mode === 'comparison'
      ? 'Peer Comparison Report' : 'Individual Performance Report';
    $('ir-results-date').textContent = '(' + (data.dateLabel || '') + ')';
    irRenderEditingLine_(data.meta && data.meta.agents);
    showIrResults();
    irSetResultsStatus('');
    irCloseEditPopover_();
    // Reset to the Volume tab on each render so the user lands on
    // the default view rather than wherever they happened to leave
    // the previous report.
    irResetTabsToVolume_();
    irRenderSummary(data.summaryData, data.teamAvg);
    irRenderCharts(data);
  }

  /**
   * Compact label for the agents in the current report. With 3 or
   * fewer agents we list them all; beyond that we list two and add
   * "+N more". Hover-tooltip on the truncated form shows the full
   * comma-separated list.
   */
  function irRenderEditingLine_(agents) {
    const el = $('ir-editing-agents');
    if (!el) return;
    const list = Array.isArray(agents) ? agents : [];
    let visible, tooltip;
    if (list.length <= 3) {
      visible = list.join(', ');
      tooltip = visible;
    } else {
      visible = list.slice(0, 2).join(', ') + ', +' + (list.length - 2) + ' more';
      tooltip = list.join(', ');
    }
    el.textContent = visible || '(none)';
    el.title = tooltip;
  }

  /**
   * Opens the edit-selection popover positioned below the "change"
   * link in the results header. Mirrors the agent picker into the
   * popover with the current selection pre-checked, then focuses
   * the search input for fast filtering.
   */
  function irOpenEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    const list = $('ir-edit-list');
    if (!list) return;
    list.innerHTML = irBuildAgentListHtml_(irLastRoster.agents || [], irLastRoster.activeAgents);
    // Pre-check the currently-reported agents.
    const current = (irLastData && irLastData.meta && irLastData.meta.agents) || [];
    irApplyCheckedAgents_(list, current);
    irUpdateEditApplyEnabled_();
    list.addEventListener('change', irUpdateEditApplyEnabled_);
    pop.style.display = '';
    // Reset search + filter state.
    const search = $('ir-edit-search');
    if (search) { search.value = ''; setTimeout(function () { search.focus(); }, 0); }
    irFilterAgentList_(list, '');
  }

  function irCloseEditPopover_() {
    const pop = $('ir-edit-popover');
    if (!pop) return;
    pop.style.display = 'none';
  }

  function irUpdateEditApplyEnabled_() {
    const checked = irGetCheckedAgents_($('ir-edit-list'));
    $('ir-edit-apply-btn').disabled = checked.length === 0;
  }

  function irTogglePopoverAgents_(checked) {
    $('ir-edit-list').querySelectorAll('.ir-agent-cb').forEach(function (cb) { cb.checked = checked; });
    irUpdateEditApplyEnabled_();
  }

  /**
   * Apply the popover selection: runs the report with the popover's
   * agent list while keeping the existing dept and date range.
   * Also propagates the new selection back into the main form
   * picker so going Back shows the same checkboxes.
   */
  function irApplyEditPopover_() {
    const newAgents = irGetCheckedAgents_($('ir-edit-list'));
    if (!newAgents.length) return;
    irApplyCheckedAgents_($('ir-agent-list'), newAgents);
    irCloseEditPopover_();

    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;

    const btn = $('ir-edit-apply-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    irSetResultsStatus('loading', 'Refreshing report…');

    google.script.run
      .withSuccessHandler(function (data) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.textContent = 'Apply'; btn.disabled = false; }
        irSetResultsStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport({ department: dept, from: from, to: to, agents: newAgents });
  }

  function irResetTabsToVolume_() {
    const container = $('ir-chart-tabs');
    if (!container) return;
    container.querySelectorAll('.ir-tab').forEach(function (b) {
      const active = b.getAttribute('data-tab') === 'vol';
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
      p.style.display = p.getAttribute('data-panel') === 'vol' ? '' : 'none';
    });
  }

  function irRenderSummary(summaryData, teamAvg) {
    const container = $('ir-summary-container');
    if (!container) return;

    // Friendly empty state when no selected agent had any call
    // activity in range. Hides the trend chart trio too since it
    // would just be 12 months of zeros.
    const anyActivity = (summaryData || []).some(function (a) {
      return a.raw.rung > 0 || a.raw.answered > 0 || a.raw.missed > 0;
    });
    if (!anyActivity) {
      container.innerHTML =
        '<div class="ir-empty-card">'
        +   '<div class="ir-empty-icon">&#x1F4ED;</div>'
        +   '<div class="ir-empty-title">No call data for this selection</div>'
        +   '<div class="ir-empty-sub">No rung, answered, or missed calls for the selected '
        +     'agent(s) in this date range. Try broadening the date range or picking '
        +     'different agents.</div>'
        + '</div>';
      const charts = $('ir-charts-container');
      if (charts) charts.style.display = 'none';
      const toggle = $('ir-datalabels-box');
      if (toggle) toggle.style.display = 'none';
      const tabs = $('ir-chart-tabs');
      if (tabs) tabs.style.display = 'none';
      const sharedLegend = $('ir-shared-legend');
      if (sharedLegend) sharedLegend.style.display = 'none';
      return;
    }
    const charts = $('ir-charts-container');
    if (charts) charts.style.display = '';
    const toggle = $('ir-datalabels-box');
    if (toggle) toggle.style.display = '';
    const tabs = $('ir-chart-tabs');
    if (tabs) tabs.style.display = '';

    // KPI-tile layout per agent. Replaces the dense comparison
    // table from Phase 1 with a row of metric tiles (big number,
    // vs-team-avg delta badge, sparkline). Each tile's sparkline
    // is drawn inline from irLastData.trendData -- no extra Chart
    // instances created. Tiles per agent:
    //   Total Rung | Answered | Missed | % Answered | Avg Talk Time
    container.innerHTML = (summaryData || []).map(function (agent) {
      const trendForAgent = (irLastData && irLastData.trendData && irLastData.trendData.datasets)
                          ? (irLastData.trendData.datasets[agent.name] || [])
                          : [];
      const safeName = escapeHtml(agent.name);
      const share = agent.share || {};
      return '<div class="ir-summary-card">'
           +   '<div class="ir-summary-title">'
           +     safeName
           +     ' <span class="ir-vs">vs Team Avg</span>'
           +     ' <button type="button" class="ir-copy-tsv" data-agent="' + safeName + '">Copy data</button>'
           +   '</div>'
           +   irInsightsBlock_(agent.insights || [])
           +   '<div class="ir-kpi-grid">'
           +     irKpiTile('Total Rung',  agent.stats.rung,     teamAvg.rung,
                            irDiffBadge(agent.raw.rung,     teamAvg.raw.rung,        'pos'),
                            trendForAgent.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung,
                            share.rung)
           +     irKpiTile('Answered',    agent.stats.answered, teamAvg.answered,
                            irDiffBadge(agent.raw.answered, teamAvg.raw.answered,    'pos'),
                            trendForAgent.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered,
                            share.answered)
           +     irKpiTile('Missed',      agent.stats.missed,   teamAvg.missed,
                            irDiffBadge(agent.raw.missed,   teamAvg.raw.missed,      'neg'),
                            trendForAgent.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed,
                            share.missed)
           +     irKpiTile('% Answered',  agent.stats.pct,      teamAvg.pct,
                            irDiffBadge(agent.raw.pct,      teamAvg.raw.pctAnswered, 'pos'),
                            trendForAgent.map(function (x) { return x.pct; }),      '#4E79A7',
                            null)
           +     irKpiTile('Avg Talk',    agent.stats.att,      teamAvg.att,
                            irAttCompare(agent.raw.att, teamAvg.raw.att),
                            trendForAgent.map(function (x) { return x.att; }),      '#9C755F',
                            null)
           +   '</div>'
           + '</div>';
    }).join('');

    // Wire copy-data-as-TSV buttons (re-attaches every render; OK
    // since `container.innerHTML` wipes the previous handlers too).
    container.querySelectorAll('.ir-copy-tsv').forEach(function (b) {
      b.addEventListener('click', function () {
        // Build TSV from the card's KPI tiles: header + value rows.
        const card = b.closest('.ir-summary-card');
        if (!card) return;
        const rows = [];
        rows.push(['Metric', 'Agent', 'Team Avg', '% of Dept'].join('\t'));
        card.querySelectorAll('.ir-kpi-tile').forEach(function (tile) {
          const label = (tile.querySelector('.ir-kpi-label') || {}).textContent || '';
          const value = (tile.querySelector('.ir-kpi-value') || {}).textContent || '';
          const team  = (tile.querySelector('.ir-kpi-team')  || {}).textContent || '';
          const shareEl = tile.querySelector('.ir-kpi-share');
          const share = shareEl
            ? shareEl.textContent.replace(/\s*of\s+dept\s*$/i, '').trim()
            : '';
          rows.push([
            label.trim(),
            value.trim(),
            team.replace(/^Team\s*/i, '').trim(),
            share,
          ].join('\t'));
        });
        const tsv = rows.join('\n') + '\n';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(tsv).then(function () { irFlashButton(b, 'Copied'); });
        }
      });
    });
  }

  /**
   * Single KPI tile markup. `sparklineData` is a numeric array;
   * `sparklineColor` is a hex. `share` is an optional pre-formatted
   * "X.X%" string -- when present (volume tiles only), shown as a
   * small "X.X% of dept" tag inline with the value to communicate
   * this agent's portion of the dept's total volume.
   */
  function irKpiTile(label, value, teamVal, diffBadgeHtml, sparklineData, sparklineColor, share) {
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    const shareHtml = share
      ? '<span class="ir-kpi-share" title="Share of dept volume in range">'
        + escapeHtml(String(share)) + ' of dept</span>'
      : '';
    return '<div class="ir-kpi-tile">'
         +   '<div class="ir-kpi-row-top">'
         +     '<div class="ir-kpi-label">' + label + '</div>'
         +     '<div class="ir-kpi-spark">' + spark + '</div>'
         +   '</div>'
         +   '<div class="ir-kpi-value-row">'
         +     '<div class="ir-kpi-value">' + escapeHtml(String(value)) + '</div>'
         +     shareHtml
         +   '</div>'
         +   '<div class="ir-kpi-row-bot">'
         +     '<span class="ir-kpi-team">Team ' + escapeHtml(String(teamVal)) + '</span>'
         +     diffBadgeHtml
         +   '</div>'
         + '</div>';
  }

  /**
   * Renders the per-agent insights callout. Server-side rules
   * produce up to 3 short strings comparing this agent to team
   * avg on % Answered, volume, ATT, and missed-call count.
   * Returns empty string if no insights -- no empty box.
   */
  function irInsightsBlock_(insights) {
    if (!insights || !insights.length) return '';
    const items = insights.map(function (s) {
      return '<li>' + escapeHtml(s) + '</li>';
    }).join('');
    return '<div class="ir-insights">'
         +   '<div class="ir-insights-label">Insights</div>'
         +   '<ul class="ir-insights-list">' + items + '</ul>'
         + '</div>';
  }

  /**
   * Inline SVG sparkline (no Chart.js dependency, no extra Chart
   * instances). Returns the SVG markup as a string ready for
   * innerHTML. Renders a 70x22 stroke with subtle area fill below;
   * collapses to a flat baseline if all values are 0.
   */
  function irSparkline_(values, color) {
    const W = 70, H = 22;
    const n = (values || []).length;
    if (n < 2) {
      return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '"></svg>';
    }
    let min = Infinity, max = -Infinity;
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    if (!isFinite(min) || !isFinite(max)) { min = 0; max = 0; }
    const range = max - min;
    const xStep = W / (n - 1);
    const pad = 2;
    const innerH = H - pad * 2;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const v = Number(values[i]) || 0;
      const y = range === 0
        ? H / 2
        : pad + innerH - ((v - min) / range) * innerH;
      pts.push((i * xStep).toFixed(1) + ',' + y.toFixed(1));
    }
    const linePath = 'M' + pts.join(' L');
    const areaPath = linePath
                   + ' L' + ((n - 1) * xStep).toFixed(1) + ',' + H
                   + ' L0,' + H + ' Z';
    return '<svg class="ir-spark-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
         +   '<path d="' + areaPath + '" fill="' + color + '" fill-opacity="0.15" stroke="none"/>'
         +   '<path d="' + linePath + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
         + '</svg>';
  }

  function irFlashButton(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    setTimeout(function () { btn.textContent = prev; }, 1000);
  }

  function irDiffBadge(agentVal, teamVal, type) {
    // type: 'pos' = higher is better (Rung, Answered, % Answered).
    //       'neg' = lower is better (Missed).
    if (!teamVal) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentVal - teamVal) / teamVal) * 100;
    const label = (pct > 0 ? '+' : '') + pct.toFixed(1) + '%';
    let cls = 'ir-badge-neu';
    if (type === 'pos') {
      if (pct > 0) cls = 'ir-badge-pos'; else if (pct < 0) cls = 'ir-badge-neg';
    } else if (type === 'neg') {
      if (pct < 0) cls = 'ir-badge-pos'; else if (pct > 0) cls = 'ir-badge-neg';
    }
    return '<span class="ir-badge ' + cls + '">' + label + '</span>';
  }

  function irAttCompare(agentAtt, teamAtt) {
    // ATT is reported as "> Avg / < Avg (+x.x%)" since neither
    // direction is unambiguously "better" -- shorter ATT can mean
    // efficiency, longer can mean more thorough service. Neutral
    // styling.
    if (!teamAtt) return '<span class="ir-badge ir-badge-neu">-</span>';
    const pct = ((agentAtt - teamAtt) / teamAtt) * 100;
    const sign = agentAtt > teamAtt ? '> Avg' : '< Avg';
    return '<span class="ir-badge ir-badge-neu">'
         + sign + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(1) + '%)'
         + '</span>';
  }

  function irRenderCharts(data) {
    // Destroy old charts to avoid Chart.js leaks / canvas reuse errors.
    irChartInstances.forEach(function (c) { c.destroy(); });
    irChartInstances = [];

    const showLabels = $('ir-show-datalabels') && $('ir-show-datalabels').checked;
    const labels   = data.trendData.labels || [];
    const datasets = data.trendData.datasets || {};
    const agents   = Object.keys(datasets);
    if (!agents.length) return;

    // Build dataset descriptors with a `hexColor` field; the chart
    // factory wires up gradient fill callbacks per-dataset against
    // that color (so single-agent views feel less spartan). The
    // `_irAgent` tag lets the shared comparison-mode legend find a
    // given agent's dataset across all three charts.
    const makeDs = function (label, vals, hex, opts) {
      const o = opts || {};
      return {
        label: label,
        data: vals,
        borderColor: hex,
        backgroundColor: hex,
        hexColor: hex,
        _irAgent: o.agent || null,
        tension: 0.4,
        fill: o.fill !== false,
        pointBackgroundColor: hex,
        pointBorderColor: '#fff',
        pointBorderWidth: 1.5,
        pointRadius: 3,
        pointHoverRadius: 5,
      };
    };

    // Volume chart: in individual mode show Rung/Answered/Missed for
    // the single agent; in comparison mode show each agent's Answered.
    const volData = [];
    if (data.mode === 'individual') {
      const d = datasets[agents[0]];
      volData.push(makeDs('Total Rung', d.map(function (x) { return x.rung; }),     IR_VOLUME_COLORS.rung));
      volData.push(makeDs('Answered',   d.map(function (x) { return x.answered; }), IR_VOLUME_COLORS.answered));
      volData.push(makeDs('Missed',     d.map(function (x) { return x.missed; }),   IR_VOLUME_COLORS.missed));
    } else {
      agents.forEach(function (ag, i) {
        const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
        volData.push(makeDs(ag + ' (Ans)',
                            datasets[ag].map(function (x) { return x.answered; }),
                            color, { agent: ag }));
      });
    }
    irCreateChart($('ir-vol-chart'), 'Call Volume', labels, volData,
                  { isPercent: false, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Efficiency chart: % Answered per agent + a 95% goal line.
    const effData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' %',
                    datasets[ag].map(function (x) { return Number(x.pct.toFixed(1)); }),
                    color, { agent: ag });
    });
    effData.push({
      label: 'Goal', data: new Array(labels.length).fill(95),
      borderColor: '#9CA3AF', borderDash: [4, 4], pointRadius: 0,
      fill: false, tension: 0, hexColor: '#9CA3AF', _irAgent: null,
    });
    irCreateChart($('ir-eff-chart'), '% Answered', labels, effData,
                  { isPercent: true, isTimeMinutes: false, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    // Duration chart: ATT in minutes (legacy converts seconds -> minutes).
    const durData = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return makeDs(ag + ' ATT',
                    datasets[ag].map(function (x) { return Number((x.att / 60).toFixed(2)); }),
                    color, { agent: ag });
    });
    irCreateChart($('ir-dur-chart'), 'Avg Talk Time', labels, durData,
                  { isPercent: false, isTimeMinutes: true, showLabels: showLabels, sharedLegend: data.mode === 'comparison' });

    irRenderSharedLegend(data, agents);
  }

  /**
   * Single legend rendered ABOVE the chart-tab container in
   * comparison mode (>1 agent). Clicking a chip toggles that
   * agent's series visibility across all three charts; hovering
   * highlights it across all three.
   *
   * In individual mode the shared legend is hidden -- the volume
   * chart's three series (Rung/Answered/Missed) are unambiguous
   * via their colored title legend within the chart itself, and
   * Eff/Dur each have a single series.
   */
  function irRenderSharedLegend(data, agents) {
    const el = $('ir-shared-legend');
    if (!el) return;
    if (data.mode !== 'comparison' || !agents.length) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    const chips = agents.map(function (ag, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      const safe = escapeHtml(ag);
      return '<button type="button" class="ir-legend-chip" data-agent="' + safe + '" '
           + 'style="--chip-color: ' + color + ';">'
           +   '<span class="ir-legend-swatch"></span>'
           +   '<span class="ir-legend-name">' + safe + '</span>'
           + '</button>';
    }).join('');
    el.innerHTML = chips;
    el.style.display = '';

    el.querySelectorAll('.ir-legend-chip').forEach(function (chip) {
      const agent = chip.getAttribute('data-agent');
      chip.addEventListener('click', function () {
        const willHide = !chip.classList.contains('inactive');
        chip.classList.toggle('inactive', willHide);
        irChartInstances.forEach(function (chart) {
          chart.data.datasets.forEach(function (ds, idx) {
            if (ds._irAgent === agent) {
              chart.getDatasetMeta(idx).hidden = willHide;
            }
          });
          chart.update();
        });
      });
      // Hover: dim the OTHER agents' series across all charts to
      // emphasize the hovered one. Restore on mouseleave.
      chip.addEventListener('mouseenter', function () { irHighlightAgent_(agent); });
      chip.addEventListener('mouseleave', function () { irHighlightAgent_(null); });
    });
  }

  function irHighlightAgent_(agent) {
    irChartInstances.forEach(function (chart) {
      chart.data.datasets.forEach(function (ds) {
        if (ds._irAgent && ds.hexColor) {
          // Faded if a specific agent is highlighted and this isn't them.
          const dim = (agent !== null && ds._irAgent !== agent);
          ds.borderColor = dim ? ds.hexColor + '33' : ds.hexColor;
          ds.borderWidth = dim ? 1 : (agent && ds._irAgent === agent ? 3 : 2);
        }
      });
      chart.update('none');
    });
  }

  function irCreateChart(canvas, title, labels, datasets, opts) {
    if (!canvas) return;
    const isPercent      = !!opts.isPercent;
    const isTimeMinutes  = !!opts.isTimeMinutes;
    const showLabels     = !!opts.showLabels;
    let globalMax = 0;
    datasets.forEach(function (ds) {
      if (!ds.data) return;
      ds.data.forEach(function (v) {
        const n = parseFloat(v) || 0;
        if (n > globalMax) globalMax = n;
      });
    });
    const suggestedMax = globalMax > 0 ? globalMax * 1.1 : 1;

    // Per-chart plugin registration (rather than Chart.register'ing
    // globally) so the existing Missed Calls bar chart isn't affected
    // by data labels. Falls back gracefully if the CDN didn't load.
    const irPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    // Replace each dataset's `backgroundColor` with a function that
    // returns a vertical gradient (line color -> transparent) once
    // the chart's chartArea exists. Skip if `fill: false` is set.
    datasets.forEach(function (ds) {
      if (ds.fill === false || !ds.hexColor) return;
      const hex = ds.hexColor;
      ds.backgroundColor = function (ctx) {
        return irGradientFill_(ctx.chart, hex);
      };
    });

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: irPlugins,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        devicePixelRatio: 1,
        plugins: {
          title:   { display: true, text: title },
          legend:  {
            display: !opts.sharedLegend,
            position: 'bottom',
            labels: { boxWidth: 10 },
          },
          datalabels: {
            display: showLabels,
            align: 'top', anchor: 'center',
            backgroundColor: 'rgba(255,255,255,0.9)',
            borderColor: function (ctx) { return ctx.dataset.borderColor; },
            borderWidth: 1, borderRadius: 3,
            color: function (ctx) { return ctx.dataset.borderColor; },
            font: { size: 10, weight: 'bold' },
            formatter: function (value, ctx) {
              if (ctx.dataset.label === 'Goal') return '';
              if (!value || value == 0) return '';
              if (isTimeMinutes) return irFormatMinutes(value);
              if (isPercent)     return parseFloat(value).toFixed(1) + '%';
              return value;
            },
          },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                let l = ctx.dataset.label || '';
                if (l) l += ': ';
                if (isTimeMinutes) return l + irFormatMinutes(ctx.parsed.y);
                if (isPercent)     return l + ctx.parsed.y + '%';
                return l + ctx.parsed.y;
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: suggestedMax,
            grid: { borderDash: [5, 5] },
            ticks: {
              callback: function (val) {
                if (isPercent)     return val + '%';
                if (isTimeMinutes) return irFormatMinutes(val);
                return val;
              },
            },
          },
          x: { grid: { borderDash: [5, 5] } },
        },
      },
    });
    irChartInstances.push(chart);
  }

  function irFormatMinutes(val) {
    if (val == null) return '';
    const n = parseFloat(val);
    if (isNaN(n)) return '';
    const m = Math.floor(n);
    const s = Math.round((n - m) * 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  // Image-export helpers. Both Copy and Email pass through
  // html2canvas; the only difference is the destination of the
  // resulting data URL.

  function irBuildCanvas(onDone) {
    const root = $('individual-results');
    if (!root) return;
    // Snapshot the canvases NOW (before clone) so the cloned doc
    // can use the rendered pixels rather than re-rendering Chart.js
    // off-screen, where layout differs.
    const canvasMap = {};
    document.querySelectorAll('#individual-results canvas').forEach(function (cvs) {
      canvasMap[cvs.id] = cvs.toDataURL('image/png');
    });

    html2canvas(root, {
      scale: 2, useCORS: true, backgroundColor: '#f4f6f9',
      onclone: function (clonedDoc) {
        const btns = clonedDoc.getElementById('ir-action-buttons');
        if (btns) btns.style.display = 'none';
        const toggle = clonedDoc.getElementById('ir-datalabels-box');
        if (toggle) toggle.style.display = 'none';
        const tabs = clonedDoc.getElementById('ir-chart-tabs');
        if (tabs) tabs.style.display = 'none';
        const editPop = clonedDoc.getElementById('ir-edit-popover');
        if (editPop) editPop.style.display = 'none';
        const editLine = clonedDoc.querySelector('.ir-editing-edit');
        if (editLine) editLine.style.display = 'none';
        clonedDoc.querySelectorAll('.ir-copy-tsv').forEach(function (b) { b.style.display = 'none'; });
        const status = clonedDoc.getElementById('ir-results-status');
        if (status) status.style.display = 'none';

        // In the tabbed UI only the active chart panel is visible,
        // but a captured image should include all three. Force all
        // panels visible in the clone and lay them out stacked.
        clonedDoc.querySelectorAll('#ir-charts-container [data-panel]').forEach(function (p) {
          p.style.display = '';
          p.style.marginBottom = '14px';
        });

        // Replace each <canvas> in the clone with an <img> of the
        // pre-captured PNG. Avoids the "blank chart" problem where
        // Chart.js has nothing to draw on in the detached clone.
        Object.keys(canvasMap).forEach(function (id) {
          const cvs = clonedDoc.getElementById(id);
          if (!cvs) return;
          const img = clonedDoc.createElement('img');
          img.src = canvasMap[id];
          img.style.width = '100%';
          img.style.height = 'auto';
          img.style.display = 'block';
          cvs.parentNode.replaceChild(img, cvs);
        });
      },
    }).then(function (canvas) { onDone(canvas); });
  }

  function irCopyImage() {
    const btn = $('ir-copy-img-btn');
    const prev = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Capturing…';
    irBuildCanvas(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              btn.textContent = 'Copied!';
              setTimeout(function () { btn.textContent = prev; btn.disabled = false; }, 1200);
            }, function (err) {
              irSetResultsStatus('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              btn.textContent = prev; btn.disabled = false;
            });
        } else {
          irSetResultsStatus('error', 'Clipboard API not available in this browser.');
          btn.textContent = prev; btn.disabled = false;
        }
      }, 'image/png');
    });
  }

  function irEmailImage() {
    const btn = $('ir-email-img-btn');
    const prev = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Capturing…';
    irBuildCanvas(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      btn.textContent = 'Sending…';
      google.script.run
        .withSuccessHandler(function (res) {
          btn.textContent = 'Sent to ' + (res && res.to ? res.to : 'you');
          setTimeout(function () { btn.textContent = prev; btn.disabled = false; }, 2000);
        })
        .withFailureHandler(function (err) {
          irSetResultsStatus('error', 'Email failed: ' + (err && err.message ? err.message : err));
          btn.textContent = prev; btn.disabled = false;
        })
        .sendIndividualReportEmail({
          imageBase64: dataUrl,
          dateLabel: irLastData && irLastData.dateLabel ? irLastData.dateLabel : '',
        });
    });
  }

  // Wait for DOM, then go.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
