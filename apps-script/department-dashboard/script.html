  function glossaryKeyFor_(el) {
    let text = (el.textContent || '');
    return text.replace(/[▲▼↑↓]/g, '')   // sort arrows
               .replace(/\s+/g, ' ').trim().toLowerCase()
               .replace(/:$/, '');
  }

  function applyGlossaryTooltips_(root) {
    if (!root || !root.querySelectorAll) return;
    const sel = 'th, .ds-kpi__label, .dept-qcd-label, .ov-dept-stat-label';
    root.querySelectorAll(sel).forEach(function (el) {
      // Skip already-titled elements AND ones whose title is temporarily
      // stashed in data-gloss while the styled tooltip is showing, so the
      // observer can't re-add a native title mid-hover (double tooltip).
      if (el.title || el.hasAttribute('data-gloss')) return;
      const key = glossaryKeyFor_(el);
      const def = METRIC_GLOSSARY_[key];
      if (!def) return;
      el.title = def;
      el.classList.add('gloss');
      const rich = METRIC_GLOSSARY_RICH_[key];
      if (rich) el.setAttribute('data-gloss-rich', rich);
    });
  }

  // Styled tooltip for glossary terms (.gloss) -- replaces the unstyleable
  // native `title=` popover with a token-styled one. Reads the definition from
  // the element's `title`, suppresses the native popover by stashing the title
  // in `data-gloss` while shown (restored on leave -- preserves it for SR /
  // non-hover), and one shared element is positioned by event delegation so it
  // covers dynamically-rendered terms too. pointer-events:none keeps the
  // tooltip out of the hover hit-test.
  function initGlossTooltip_() {
    const tip = document.createElement('div');
    tip.className = 'ds-tooltip';
    tip.setAttribute('role', 'tooltip');
    tip.style.display = 'none';
    document.body.appendChild(tip);
    let current = null;

    function position(el) {
      const r = el.getBoundingClientRect();
      const tw = tip.offsetWidth, th = tip.offsetHeight, gap = 8;
      let left = r.left + r.width / 2 - tw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
      let top = r.top - th - gap;                 // prefer above
      if (top < 8) top = r.bottom + gap;          // flip below if no room
      tip.style.left = Math.round(left) + 'px';
      tip.style.top = Math.round(top) + 'px';
    }
    function show(el) {
      const rich = el.getAttribute('data-gloss-rich');
      const text = el.getAttribute('title') || el.getAttribute('data-gloss');
      if (!rich && !text) return;
      if (el.hasAttribute('title')) {             // suppress native popover
        el.setAttribute('data-gloss', el.getAttribute('title'));
        el.removeAttribute('title');
      }
      current = el;
      // Rich entries render developer-authored HTML (titled def + benchmark
      // chip); everything else stays plain text.
      if (rich) { tip.innerHTML = rich; tip.classList.add('ds-tooltip--rich'); }
      else { tip.textContent = text; tip.classList.remove('ds-tooltip--rich'); }
      tip.style.display = 'block';
      position(el);
    }
    function hide() {
      if (current && current.hasAttribute('data-gloss')) {
        current.setAttribute('title', current.getAttribute('data-gloss'));
        current.removeAttribute('data-gloss');
      }
      current = null;
      tip.style.display = 'none';
    }
    function glossOf(node) { return node && node.closest ? node.closest('.gloss') : null; }

    document.addEventListener('mouseover', function (e) {
      const el = glossOf(e.target);
      if (el && el !== current) { hide(); show(el); }
    });
    document.addEventListener('mouseout', function (e) {
      const el = glossOf(e.target);
      if (el && el === current && (!e.relatedTarget || !el.contains(e.relatedTarget))) hide();
    });
    document.addEventListener('focusin', function (e) {
      const el = glossOf(e.target);
      if (el) { hide(); show(el); }
    });
    document.addEventListener('focusout', hide);
    window.addEventListener('scroll', hide, true);
    window.addEventListener('resize', hide);
  }

  function initMetricGlossary_() {
    applyGlossaryTooltips_(document);
    // Report tables/tiles render after async fetches; a debounced
    // childList observer re-applies over the whole document (cheap:
    // a few hundred elements, and already-titled ones short-circuit).
    let timer = null;
    const obs = new MutationObserver(function () {
      if (timer) clearTimeout(timer);
      timer = setTimeout(function () { applyGlossaryTooltips_(document); }, 250);
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  // -- Universal benchmark tints (anti-intimidation layer) ----------------
  // The install has exactly two company-wide standards: the 92% answer-
  // rate target (the Overview chart baseline) and the 5% abandoned-%
  // violation threshold (the QCD pipeline rule). This helper applies them
  // consistently to KPI tile values so a manager reading ANY report sees
  // the same green-at-target / orange-over-threshold language the QCD and
  // Overview surfaces already speak. Dept-specific ALERT thresholds stay
  // with the Alerts engine -- no invented thresholds here.
  // Keep a From/To (Start/End) date pair valid: picking a Start past the End
  // (or an End before the Start) nudges the OTHER input so From <= To. ISO
  // 'YYYY-MM-DD' strings compare correctly as plain strings.
  function linkDateRange_(fromId, toId) {
    const from = $(fromId), to = $(toId);
    if (!from || !to) return;
    from.addEventListener('change', function () {
      if (from.value && to.value && from.value > to.value) to.value = from.value;
    });
    to.addEventListener('change', function () {
      if (from.value && to.value && to.value < from.value) from.value = to.value;
    });
  }

  // Wire every report setup modal's From/To pair (incl. custom-prior windows and
  // the Compare-Ranges P1/P2 pairs). Inputs are static, so one init pass suffices.
  function initDateRangeLinks_() {
    [
      ['from-date', 'to-date'],
      ['ir-from', 'ir-to'], ['ir-prior-from', 'ir-prior-to'], ['ir-edit-from', 'ir-edit-to'],
      ['qcd-alldept-from', 'qcd-alldept-to'],
      ['ins-from', 'ins-to'], ['ins-prior-from', 'ins-prior-to'], ['ins-edit-from', 'ins-edit-to'],
      ['inbound-from', 'inbound-to'], ['cl-from', 'cl-to'],
    ].forEach(function (p) { linkDateRange_(p[0], p[1]); });
  }

  function benchValueCls_(label, formatted, symmetric) {
    const text = String(label).replace(/<[^>]*>/g, '').toLowerCase();
    const str = String(formatted);
    if (str.indexOf('%') === -1) return '';
    const num = parseFloat(str);
    if (!isFinite(num)) return '';
    // Binary by default (highlight only the notable direction -- the documented
    // table behavior). `symmetric` (KPI tiles) tints BOTH sides of the SAME
    // 92% / 5% standard, so a below-target answer rate reads "watch" (orange)
    // and a healthy abandon rate reads "good" (green) instead of plain black.
    // Still no invented thresholds (decision C2).
    if (/answer/.test(text)) return num >= 92 ? ' bm-target' : (symmetric ? ' bm-over'   : '');
    if (/aband/.test(text))  return num >= 5  ? ' bm-over'   : (symmetric ? ' bm-target' : '');
    return '';
  }

  // -- Answer-first headlines (anti-intimidation layer) ------------------
  // Every report's results open with 2-3 PLAIN-ENGLISH sentences composed
  // client-side from the payload it already received (no server change,
  // no cache bump). The charts/tables stay; the headline just answers
  // "what does this say?" before the manager has to read a number. Each
  // composer guards its no-data case; an empty sentence list hides the
  // block entirely.

  /**
   * Renders `sentences` (pre-escaped HTML strings) into a headline block
   * at the top of `containerId`'s results -- inserted right after the
   * `.ir-results-header` (or as the first child when there isn't one).
   * Creates the element on first use.
   */
  function reportHeadline_(id, containerId, headline) {
    const container = $(containerId);
    if (!container) return;
    let el = $(id);
    if (!el) {
      el = document.createElement('div');
      el.id = id;
      el.className = 'report-headline';
      const header = container.querySelector('.ir-results-header');
      if (header) {
        // Insert after the header AND after any status / loading / error
        // elements that immediately follow it, so transient "Loading…" and
        // error banners always render ABOVE the headline, not under it.
        // Also skip an inline edit popover (the IR / Insights "change" panel)
        // so it expands directly beneath its button, ABOVE the headline.
        let anchor = header.nextElementSibling;
        while (anchor && (anchor.classList.contains('status')
                          || anchor.classList.contains('ir-loader')
                          || anchor.classList.contains('ir-edit-popover')
                          || anchor.classList.contains('empty-state'))) {
          anchor = anchor.nextElementSibling;
        }
        container.insertBefore(el, anchor);
      }
      // Anchor without a results header (e.g. the Missed modal's
      // summary strip): place the headline just above the anchor.
      else container.parentNode.insertBefore(el, container);
    }
    // Composers return either a bare sentences array (neutral) OR
    // { sentences, tone } where tone = { cls:'is-good'|'is-warn', badge } from
    // headlineTone_ (the 92% / 5% standards only). Arrays stay neutral.
    const sentences = Array.isArray(headline) ? headline : ((headline && headline.sentences) || []);
    const tone = (!Array.isArray(headline) && headline && headline.tone) || null;
    const lines = (sentences || []).filter(function (s) { return !!s; });
    if (!lines.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = '';
    el.className = 'report-headline' + (tone && tone.cls ? ' ' + tone.cls : '');
    const badge = (tone && tone.badge) ? tone.badge : 'At a glance';
    el.innerHTML = '<div class="report-headline-kicker">' + escapeHtml(badge) + '</div>'
      + lines.map(function (s) { return '<div class="report-headline-line">' + s + '</div>'; }).join('');
  }

  /**
   * "…, up 8.2% vs the prior period" phrase from a deltaBlock. Empty
   * string when there's no meaningful prior; "about the same" inside
   * the noise band. pctPoints deltas read as "points".
   */
  function headlineDeltaPhrase_(stat) {
    if (!stat || (Number(stat.prev || 0) === 0 && Number(stat.val || 0) === 0)) return '';
    const dp = Number(stat.deltaPct || 0);
    if (Math.abs(dp) < 0.05) return ', about the same as the prior period';
    return ', ' + (dp > 0 ? 'up ' : 'down ') + Math.abs(dp).toFixed(1)
         + (stat.type === 'pctPoints' ? ' points' : '%') + ' vs the prior period';
  }

  function headlineName_(n) { return '<strong>' + escapeHtml(n) + '</strong>'; }

  // Status tone for the answer-first headline, from the ONLY two company-wide
  // standards (answer rate >= 92% = "On track"; answer < 92% OR abandon >= 5%
  // = "Watch"). Returns null when neither metric is available -> neutral
  // "At a glance". No invented thresholds (decision C2 + the headline decision).
  function headlineTone_(opts) {
    opts = opts || {};
    const a = opts.answerPct, b = opts.abandonPct;
    const hasA = a != null && isFinite(Number(a));
    const hasB = b != null && isFinite(Number(b));
    if (!hasA && !hasB) return null;
    const warn = (hasA && Number(a) < 92) || (hasB && Number(b) >= 5);
    return warn ? { cls: 'is-warn', badge: 'Watch' } : { cls: 'is-good', badge: 'On track' };
  }

  // IR1: PEER-AWARE banner tone for the single-agent Individual Report. The
  // absolute headlineTone_ read "Watch" (red) whenever the agent was under 92%,
  // even when they beat their team. Instead:
  //   - agent meets the 92% company standard        -> "On track" (green)
  //   - below 92% but AT/ABOVE the team average      -> NEUTRAL (no tint; owner
  //     ruling: beating a struggling team isn't "Watch", but isn't "On track")
  //   - below the team average                       -> "Watch" (warn)
  function irHeadlineTone_(agentPct, teamPct) {
    if (agentPct == null || !isFinite(Number(agentPct))) return null;
    const a = Number(agentPct);
    if (a >= 92) return { cls: 'is-good', badge: 'On track' };
    const tp = Number(teamPct);
    if (teamPct != null && isFinite(tp) && tp > 0 && a >= tp) return null;   // neutral
    return { cls: 'is-warn', badge: 'Watch' };
  }

  function insHeadline_(data) {
    const t = data.teamStats || {};
    if (!Number((t.rung || {}).val) && !Number((t.rung || {}).prev)) {
      return ['No call activity for the selected agents in this range.'];
    }
    const s = [];
    s.push('Your team answered <strong>' + escapeHtml(String((t.answered || {}).formatted || 0))
      + '</strong> of ' + escapeHtml(String((t.rung || {}).formatted || 0))
      + ' rung calls (<strong>' + escapeHtml(String((t.pct || {}).formatted || '0%')) + '</strong>'
      + headlineDeltaPhrase_(t.pct) + ').');
    const cards = data.agentData || [];
    if (cards.length > 1) {
      let top = null, bottom = null;
      cards.forEach(function (c) {
        // Per-working-day-adjusted, matching the card trend pills below.
        const score = deltaImprovementScore_(insPerDayMetrics_(c.metrics, data.meta));
        if (!top || score > top.score) top = { name: c.name, score: score };
        if (!bottom || score < bottom.score) bottom = { name: c.name, score: score };
      });
      const bits = [];
      if (top && top.score > 5) bits.push(headlineName_(top.name) + ' improved the most');
      if (bottom && bottom.score < -5 && (!top || bottom.name !== top.name)) {
        bits.push(headlineName_(bottom.name) + ' slipped the most');
      }
      if (bits.length) s.push(bits.join('; ') + ' vs the prior window.');
      // I6: count the SAME set the card rails flag -- agents BEHIND the team
      // (peer-relative standing), so the headline number matches the orange
      // edges below exactly (was a direction-of-change "regressed" count, which
      // disagreed with the standing-based rails).
      const teamPctH = Number((t.pct || {}).val) || 0;
      const behind = cards.filter(function (c) {
        return insClassifyAgent_(c, teamPctH) === 'attention';
      }).length;
      if (behind > 0) {
        s.push(behind + ' agent' + (behind === 1 ? '' : 's')
          + ' ' + (behind === 1 ? 'is' : 'are') + ' behind the team average — their cards carry the orange edge below.');
      }
    }
    // Queue health: one sentence when the abandon rate crosses the 5%
    // threshold (the only company-wide queue standard).
    const qh = data.queueHealth;
    if (qh && qh.totals && Number(qh.totals.totalCalls) > 0 && Number(qh.totals.abandonedPct) >= 5) {
      s.push('Heads up: callers abandoned <strong>'
        + escapeHtml(String(qh.totals.abandonedPctStr)) + '</strong> of queue calls — over the 5% threshold (see Queue health below).');
    }
    // When the comparison windows differ a lot (> 7 days), the deltas in the
    // headline are apples-to-oranges, so neutralize the status tone (drop the
    // green/orange "On track"/"Watch" banner) to avoid a false alarm. The
    // sentences -- including any real >=5% abandon heads-up -- still render.
    const meta = data.meta || {};
    const bigMismatch = !!meta.lengthMismatch
      && Math.abs((meta.currentDays || 0) - (meta.priorDays || 0)) > 7;
    return { sentences: s.slice(0, 3), tone: bigMismatch ? null : headlineTone_({
      answerPct: (t.pct || {}).val,
      abandonPct: (qh && qh.totals) ? qh.totals.abandonedPct : null,
    }) };
  }

  function irHeadline_(data) {
    const cards = data.summaryData || [];
    if (!cards.length) return [];
    if (data.mode !== 'comparison') {
      const a = cards[0];
      const raw = a.raw || {};
      if (!raw.rung) return [headlineName_(a.name) + ' had no rung calls in this range.'];
      const teamPct = (data.teamAvg && data.teamAvg.raw && data.teamAvg.raw.pctAnswered) || 0;
      const diff = (raw.pct || 0) - teamPct;
      let vsTeam = '';
      if (teamPct > 0) {
        vsTeam = Math.abs(diff) < 1
          ? ', right around the team average'
          : ', about ' + Math.abs(diff).toFixed(1) + ' points '
            + (diff > 0 ? 'above' : 'below') + ' the team average ('
            + teamPct.toFixed(1) + '%)';
      }
      const s = [headlineName_(a.name) + ' answered <strong>' + escapeHtml(String(a.stats.answered))
        + '</strong> of ' + escapeHtml(String(a.stats.rung)) + ' rung calls (<strong>'
        + escapeHtml(String(a.stats.pct)) + '</strong>' + vsTeam + ').'];
      const ins = a.insights || [];
      if (ins.length && ins[0].text) s.push(escapeHtml(ins[0].text));
      // IR1: peer-aware tone (below 92% but at/above team reads neutral, not red).
      return { sentences: s, tone: irHeadlineTone_((a.raw || {}).pct, teamPct) };
    }
    let top = cards[0];
    cards.forEach(function (c) { if ((c.raw || {}).answered > (top.raw || {}).answered) top = c; });
    return ['Comparing ' + cards.length + ' agents. ' + headlineName_(top.name)
      + ' answered the most calls (<strong>' + escapeHtml(String(top.stats.answered))
      + '</strong>, ' + escapeHtml(String(top.share.answered)) + ' of the group\'s total).'];
  }

  function missedHeadline_(meta) {
    if (!meta) return [];
    const missed = Number(meta.totalMissed || 0);
    const abandoned = Number(meta.abandonedCallCount || 0);
    const noRing = Number(meta.noRingAbandonCount || 0);
    // Note when some rows' abandoned detail was lost to the number-coercion bug
    // (excluded from the counts above) so a lost row isn't read as "0 abandoned".
    let lostNote = null;
    if (meta.abandonedDetailLost) {
      const n = (meta.abandonedDetailLostDates || []).length;
      lostNote = '<span class="missed-lost-note">&#9888; Abandoned-call detail is '
        + 'unavailable for <strong>' + fmtNumber(n) + '</strong> day' + (n === 1 ? '' : 's')
        + ' in this range (a formatting bug corrupted those rows — rebuild them from Raw '
        + 'Data). Counts above exclude those days.</span>';
    }
    if (!missed && !abandoned) {
      return lostNote
        ? [lostNote]
        : ['No missed calls in this range — every rung call was picked up.'];
    }
    const s = ['Your team missed <strong>' + fmtNumber(missed) + '</strong> ring'
      + (missed === 1 ? '' : 's') + ' in this range.'];
    if (abandoned > 0) {
      s.push('<strong>' + fmtNumber(abandoned) + '</strong> call' + (abandoned === 1 ? '' : 's')
        + ' were abandoned — the caller hung up before anyone answered'
        + (noRing > 0 ? ', including ' + fmtNumber(noRing) + ' that never rang any agent' : '') + '.');
    }
    if (lostNote) s.push(lostNote);
    return s;
  }

  function inboundHeadline_(data) {
    const k = data.kpis || {}, p = data.kpisPrior || {};
    const meta = data.meta || {};
    if (!Number(k.total)) return ['No inbound calls in this range.'];
    const ratePhrase = headlineDeltaPhrase_({
      val: k.answerRate, prev: p.answerRate,
      deltaPct: (Number(k.answerRate) || 0) - (Number(p.answerRate) || 0),
      type: 'pctPoints',
    });
    const s = ['You received <strong>' + fmtNumber(k.total) + '</strong> inbound calls; <strong>'
      + escapeHtml(String(k.answerRate || 0)) + '%</strong> were answered' + ratePhrase + '.'];
    if (Number(k.abandonedOnHold) > 0) {
      s.push(fmtNumber(k.abandonedOnHold) + ' caller' + (Number(k.abandonedOnHold) === 1 ? '' : 's')
        + ' hung up while on hold.');
    }
    if (meta.companyView && Number(k.abandonedIvr) > 0) {
      s.push(fmtNumber(k.abandonedIvr) + ' abandoned in the IVR before reaching any queue.');
    }
    return { sentences: s.slice(0, 3), tone: headlineTone_({ answerPct: Number(k.answerRate) }) };
  }

  // -- Missed Calls report (My Department inline section) ----------------
  // The standalone Missed Calls modal was RETIRED -- the My Department
  // page's inline missed section (deptMissedFetch_/deptMissedRender_,
  // below) is the report now, at full parity: shared headline composer,
  // summary strip, the 18-bucket hour-of-day chart (bars/radar toggle) +
  // bucket drill-in, queue-only abandoned section, and the per-agent
  // missed-time timelines with the journey drill. Fetches via
  // google.script.run.getMissedCallsReport on every dept-page refresh.

  let deptMissedLastData = null;   // My Department missed section's last response
  // One-shot flag: scroll the dept missed section into view the next time it
  // renders. Set by launcherOpenMissed_ and the legacy '#/report/missed' deep
  // link (the standalone Missed Calls modal was retired -- this section IS the
  // report); consumed in deptMissedRender_ so the scroll never races the fetch.
  let deptMissedScrollPending_ = false;

  // Factory for the chart-bucket drill-in panel. Historically shared by the
  // Missed Calls modal and the My Department missed section; the modal is
  // retired, but the factory shape is kept (one instance now) since it holds
  // the panel's active-bucket state cleanly.
  function makeMissedBucketDetail_(getData, ids) {
    var active = -1;
    function collectRings(data, idx) {
      var rings = [];
      (data.agents || []).forEach(function (a) {
        (a.missedTimes || []).forEach(function (m) {
          if (m.bucket === idx) rings.push({ agent: a.name, date: m.date, label: m.label,
            abandoned: m.abandoned, parentId: m.parentId || null, sortKey: m.sortKey });
        });
      });
      (data.queueOnly || []).forEach(function (q) {
        (q.entries || []).forEach(function (m) {
          if (m.bucket === idx) rings.push({ agent: q.queue + ' (no agent rang)', date: m.date,
            label: m.label, abandoned: true, parentId: m.parentId || null, sortKey: m.sortKey });
        });
      });
      rings.sort(function (a, b) {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        return (a.sortKey || 0) - (b.sortKey || 0);
      });
      return rings;
    }
    function show(idx) {
      var data = getData();
      if (!data || !data.chart || !data.agents) return;
      var labels = data.chart.labels || [];
      if (idx < 0 || idx >= labels.length) return;
      active = idx;
      var rings = collectRings(data, idx);
      var titleEl = $(ids.title), bodyEl = $(ids.body), wrap = $(ids.wrap);
      if (!titleEl || !bodyEl || !wrap) return;
      titleEl.textContent = labels[idx] + ' CST  ·  ' + rings.length + ' ring' + (rings.length === 1 ? '' : 's');
      if (!rings.length) {
        bodyEl.innerHTML = '<p class="bucket-detail-empty">No rings in this bucket.</p>';
      } else {
        bodyEl.innerHTML = '<ul class="bucket-detail-list">' + rings.map(function (r) {
          var cls = r.abandoned ? 'abandoned' : '';
          var siren = r.abandoned ? ' 🚨' : '';
          var dateLabel = r.date ? r.date.slice(5) : '';   // MM-DD
          return '<li class="' + cls + '">'
               +   '<span class="ring-date">'  + escapeHtml(dateLabel) + '</span>'
               +   '<span class="ring-agent">' + escapeHtml(r.agent)   + '</span>'
               +   '<span class="ring-time">'  + escapeHtml(r.label) + siren + parentIdBadge(r.parentId, r.date)
               +   '</span>'
               + '</li>';
        }).join('') + '</ul>';
      }
      wrap.style.display = '';
      if (ids.row) { var row = $(ids.row); if (row) row.classList.remove('no-detail'); }
      initClipboardOnce();
      wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function hide() {
      active = -1;
      var wrap = $(ids.wrap);
      if (!wrap) return;
      wrap.style.display = 'none';
      var bodyEl = $(ids.body);
      if (bodyEl) bodyEl.innerHTML = '';
      if (ids.row) { var row = $(ids.row); if (row) row.classList.add('no-detail'); }
    }
    function toggle(idx) { if (idx === active) hide(); else show(idx); }
    return { toggle: toggle, hide: hide };
  }

  const deptMissedBucketDetail_ = makeMissedBucketDetail_(
    function () { return deptMissedLastData; },
    { wrap: 'dept-missed-bucket-detail', title: 'dept-bucket-detail-title', body: 'dept-bucket-detail-body',
      row: 'dept-missed-chart-row' });

  function missedRadarCfg_(chart, onBucketClick) {
    return {
      type: 'radar',
      data: {
        labels: chart.labels || [],
        datasets: [{
          label: 'Missed calls',
          data: chart.counts || [],
          fill: true,
          backgroundColor: THEME.warnSoft,
          borderColor: THEME.warn,
          pointBackgroundColor: THEME.warn,
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) { return items[0].label + ' CST'; },
              label: function (item) { return item.parsed.r + ' missed call' + (item.parsed.r === 1 ? '' : 's'); }
            }
          },
          // Opt out of datalabels -- the plugin is registered
          // globally for the report charts (PR / CR / IR) that DO
          // want labels; the missed-calls radar would get
          // default-rendered labels on all 18 buckets without this.
          datalabels: { display: false }
        },
        scales: {
          r: {
            beginAtZero: true,
            ticks: { display: false, stepSize: 1 },
            pointLabels: {
              font: { size: 10 },
              // Make the 18 axis labels feel clickable too -- they
              // open the same detail panel as a data-point click.
              padding: 6
            }
          }
        },
        layout: { padding: 10 },
        // Click a data point (or the axis label nearest a point) to
        // see the contributing rings for that 30-min bucket.
        onClick: function (evt, items, chartObj) {
          if (!onBucketClick) return;
          if (items && items.length) {
            onBucketClick(items[0].index);
            return;
          }
          // Allow clicking near an axis label even if not exactly on a
          // data point: snap to the nearest point.
          const near = chartObj.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
          if (near && near.length) onBucketClick(near[0].index);
        }
      }
    };
  }

  // Re-alpha a color string. Fast path parses 'rgb(...)'/'rgba(...)'; anything
  // else (HEX in particular) delegates to the canvas-based colorWithAlpha_.
  // R7 (O-1) root cause: colorToCanvasRgb_ (INV-42) returns canvas fillStyle,
  // which is '#rrggbb' HEX for fully-OPAQUE colors ('rgba(...)' only when
  // alpha < 1) -- so THEME tokens missed the old rgb-only regex and this
  // function silently returned them UNCHANGED. That kept the chart tooltip
  // fully opaque despite the alpha-0.6 setting AND flattened the missed-bar
  // volume ramp (every bar the same solid warn). Never return the input
  // un-alpha'd when a parse misses -- delegate instead.
  function rgbaWithAlpha_(str, a) {
    const m = String(str).match(/rgba?\(([^)]+)\)/);
    if (!m) return colorWithAlpha_(str, a);   // HEX / named / oklch -> canvas resolve
    const p = m[1].split(',');
    return 'rgba(' + p[0].trim() + ',' + p[1].trim() + ',' + p[2].trim() + ',' + a + ')';
  }

  // R7 (M-3): faint clock-face watermark behind the missed-calls BAR chart
  // (owner ask). Drawn as vectors (circle + ticks + hands) so it's crisp,
  // theme-safe (muted token at low alpha via the same canvas-resolve path the
  // charts use), and needs no emoji font. beforeDraw = behind the bars.
  const missedClockWatermark_ = {
    id: 'missedClockWatermark',
    beforeDraw: function (chart) {
      try {
        const area = chart.chartArea;
        if (!area) return;
        const ctx = chart.ctx;
        const cx = (area.left + area.right) / 2;
        const cy = (area.top + area.bottom) / 2;
        const r = Math.min(area.right - area.left, area.bottom - area.top) * 0.32;
        if (r < 24) return;   // too small to read as a clock -- skip
        const stroke = rgbaWithAlpha_(THEME.muted || '#8a8578', 0.14);
        ctx.save();
        ctx.strokeStyle = stroke;
        ctx.lineCap = 'round';
        // Face
        ctx.lineWidth = Math.max(2, r * 0.05);
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        // Hour ticks
        ctx.lineWidth = Math.max(1.5, r * 0.035);
        for (let h = 0; h < 12; h++) {
          const a = (h / 12) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.sin(a) * r * 0.86, cy - Math.cos(a) * r * 0.86);
          ctx.lineTo(cx + Math.sin(a) * r * 0.94, cy - Math.cos(a) * r * 0.94);
          ctx.stroke();
        }
        // Hands (a static ~10:10 -- the classic legible pose)
        ctx.lineWidth = Math.max(2, r * 0.055);
        const hand = function (angleDeg, len) {
          const a = (angleDeg / 360) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.sin(a) * r * len, cy - Math.cos(a) * r * len);
          ctx.stroke();
        };
        hand(305, 0.5);    // hour
        hand(50, 0.72);    // minute
        ctx.restore();
      } catch (e) { /* watermark is decoration -- never break the chart */ }
    }
  };

  // ALTERNATE missed-calls chart: a VERTICAL bar timeline (one bar per 30-min
  // bucket, 8 AM-5 PM CST left-to-right -- R7/M-3 swapped the axes from the
  // earlier horizontal layout so the buckets read as a workday timeline and
  // fill the wide chart slot). Spice-up for "reads like a work day": a COLOR
  // INTENSITY RAMP (each bar's fill alpha scales with its count, so the
  // busiest stretch pops), the PEAK bucket outlined + tooltip-flagged, the
  // count printed above each bar, and a faint clock watermark behind the
  // plot. Same shared `chart = {labels, counts}` + bucket-click drill as the
  // radar.
  function missedBarCfg_(chart, onBucketClick) {
    const counts = (chart.counts || []).map(function (v) { return Number(v) || 0; });
    const abandoned = (chart.abandoned || []).map(function (v) { return Number(v) || 0; });
    const max = counts.reduce(function (m, v) { return Math.max(m, v); }, 0) || 1;
    let peakIdx = -1, peakVal = -1;
    counts.forEach(function (v, i) { if (v > peakVal) { peakVal = v; peakIdx = i; } });
    // Color pivots on whether the bucket CONTAINS an abandoned call: a bucket
    // with >=1 abandoned ring renders SOLID warn red (still volume-ramped so the
    // busiest abandoned window reads hottest); an abandoned-free bucket renders
    // a much lighter, semi-transparent warn so it recedes. (Falls back to the
    // faint shade for a pre-v12 cached payload with no `abandoned` array.)
    const bg = counts.map(function (v, i) {
      const ramp = v / max;                       // 0..1 by volume
      return (abandoned[i] || 0) > 0
        ? rgbaWithAlpha_(THEME.warn, 0.58 + 0.42 * ramp)   // solid, hot (has abandons)
        : rgbaWithAlpha_(THEME.warn, 0.28 + 0.22 * ramp);  // light orange, clearly visible
    });
    // Peak bucket keeps its outline: 2px reads as "marked" without the heavy
    // 3px frame that looked too loud at the compact size.
    const border = counts.map(function (v, i) { return (i === peakIdx && peakVal > 0) ? THEME.ink : 'transparent'; });
    const borderW = counts.map(function (v, i) { return (i === peakIdx && peakVal > 0) ? 2 : 0; });
    return {
      type: 'bar',
      data: {
        labels: chart.labels || [],
        datasets: [{
          label: 'Missed calls',
          data: counts,
          backgroundColor: bg,
          borderColor: border,
          borderWidth: borderW,
          borderRadius: 2,
          maxBarThickness: 26,
        }]
      },
      plugins: [missedClockWatermark_],   // R7 (M-3): faint clock behind the bars
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 2,                 // wide-and-short: the timeline fills the slot
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) {
                return items[0].label + ' CST' + (items[0].dataIndex === peakIdx && peakVal > 0 ? '  •  peak' : '');
              },
              label: function (item) { return item.parsed.y + ' missed call' + (item.parsed.y === 1 ? '' : 's'); }
            }
          },
          // Bars are readable (unlike the radar, INV-41), so SHOW the count
          // above each bar. Boolean display + empty-string formatter hides
          // zeros (avoids the function-form display footgun on this plugin
          // version).
          datalabels: {
            display: true,
            anchor: 'end', align: 'end', clamp: true,
            color: THEME.ink, font: { size: 10 },
            formatter: function (v) { return (Number(v) || 0) > 0 ? v : ''; }
          }
        },
        scales: {
          // Time buckets on X (workday reads left->right); every other label
          // shown so 18 buckets don't crowd the half-width column.
          x: {
            ticks: {
              font: { size: 10 }, maxRotation: 0, autoSkip: false,
              callback: function (v, i) { return i % 2 === 0 ? this.getLabelForValue(v) : ''; }
            },
            grid: { display: false }
          },
          y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: THEME.line } }
        },
        onClick: function (evt, items, chartObj) {
          if (!onBucketClick) return;
          if (items && items.length) { onBucketClick(items[0].index); return; }
          const near = chartObj.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
          if (near && near.length) onBucketClick(near[0].index);
        }
      }
    };
  }

  // Persisted chart mode for the My Department missed section (previously
  // shared with the retired Missed Calls modal -- the localStorage key is
  // kept so an existing preference survives). Default 'bars' (the more
  // legible view).
  const MISSED_CHART_MODE_KEY = 'cdr.missed.chartmode';
  function missedChartMode_() {
    try { return localStorage.getItem(MISSED_CHART_MODE_KEY) === 'radar' ? 'radar' : 'bars'; }
    catch (e) { return 'bars'; }
  }
  function missedChartCfg_(chart, onBucketClick) {
    return missedChartMode_() === 'radar'
      ? missedRadarCfg_(chart, onBucketClick)
      : missedBarCfg_(chart, onBucketClick);
  }
  // Reflect the active mode on every Bars/Radar toggle currently in the DOM,
  // and tag each chart-row so CSS can widen the bar view (bars fill the column;
  // the square radar keeps its 520px cap).
  function missedSyncToggles_() {
    const mode = missedChartMode_();
    document.querySelectorAll('.missed-chart-mode [data-mode]').forEach(function (b) {
      const on = b.getAttribute('data-mode') === mode;
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    ['dept-missed-chart-row'].forEach(function (id) {
      const row = document.getElementById(id);
      if (row) {
        row.classList.toggle('mode-bars',  mode === 'bars');
        row.classList.toggle('mode-radar', mode === 'radar');
      }
    });
  }
  function setMissedChartMode_(mode) {
    mode = (mode === 'radar') ? 'radar' : 'bars';
    try { localStorage.setItem(MISSED_CHART_MODE_KEY, mode); } catch (e) {}
    missedSyncToggles_();
    // Re-render only charts that are instantiated AND visible (offsetParent
    // is null under display:none) -- rebuilding in a hidden container would
    // render at zero size.
    const visible = function (id) { const el = $(id); return el && el.offsetParent !== null; };
    if (deptMissedChart && deptMissedLastData && visible('dept-missed-chart-wrap')) {
      deptMissedDrawChart_(deptMissedLastData);
    }
  }
  // One delegated handler for the dept-section toolbar (delegation kept so
  // any future surface reusing .missed-chart-mode participates for free).
  document.addEventListener('click', function (e) {
    const b = e.target.closest && e.target.closest('.missed-chart-mode [data-mode]');
    if (b) { e.preventDefault(); setMissedChartMode_(b.getAttribute('data-mode')); }
  });

  // -- Bucket detail (chart drill-in) ------------------------------------
  // Click a chart bucket -> show all rings (date, agent, time) in that 30-min
  // slot; click again (or Close) to dismiss. Implemented by the
  // makeMissedBucketDetail_ factory (the My Dept instance, above).

  // Renders the parent-call-ID chip + copy button used on every
  // abandoned timestamp. Pasting the parent ID into raw CDR search
  // is the manual verification step, so the copy button is worth
  // the extra DOM. Returns '' for falsy IDs (non-abandoned rows).
  function parentIdBadge(parentId, date) {
    if (!parentId) return '';
    const safe = escapeHtml(String(parentId));
    // #3: "view path" affordance on abandoned rings -- the parent call id +
    // date key inbound_calls for the leg-by-leg journey (getCallJourney).
    const pathBtn = date
      ? '<button type="button" class="pid-journey" '
        +   'data-journey-pid="' + safe + '" '
        +   'data-journey-date="' + escapeHtml(String(date)) + '" '
        +   'title="View this call’s path (IVR → queues → agents)" '
        +   'aria-label="View call path">↳ path</button>'
      : '';
    // Owner round 4: the raw call-ID chip + copy button are the ADMIN
    // verification workflow (paste into raw CDR search); managers only need
    // the journey drill, so non-admins get the "↳ path" button alone.
    if (typeof USER !== 'undefined' && USER && USER.role !== 'admin') {
      return pathBtn ? ' <span class="parent-id">' + pathBtn + '</span>' : '';
    }
    return ' <span class="parent-id">'
         +   '<span class="pid-num" title="Call ID ' + safe + ' (hover for full · use 📋 to copy)">#' + safe + '</span>'
         +   '<button type="button" class="pid-copy" '
         +     'data-pid="' + safe + '" '
         +     'aria-label="Copy parent ID ' + safe + '" '
         +     'title="Copy">📋</button>'
         +   pathBtn
         + '</span>';
  }

  // Renders the "[also rang Backup CSR, A_Q_Spanish]" suffix used on
  // queue-only entries when the same parent ID appears under multiple
  // queue sentinels (overflow). Empty when the call only hit this
  // queue, so no visual noise on the common case.
  function alsoInBadge(alsoIn) {
    if (!alsoIn || !alsoIn.length) return '';
    return ' <span class="also-in">'
         +   '[also rang ' + alsoIn.map(escapeHtml).join(', ') + ']'
         + '</span>';
  }

  // Wire a single delegated click handler for ALL copy buttons inside
  // the missed-calls modal. data-pid carries the value; we use the
  // async Clipboard API with a fallback no-op + visual confirmation
  // (button flips to ✓ for ~1s) so the user knows it worked.
  function initClipboardOnce() {
    if (initClipboardOnce.done) return;
    initClipboardOnce.done = true;
    // Delegated on document so the parentId copy badges work in BOTH the Missed
    // Calls modal AND the My Department inline missed section (#9b). Strict
    // no-op unless the click lands on a .pid-copy badge.
    document.addEventListener('click', function (e) {
      // #3: "↳ path" drill -> open the inbound-call journey for this parent id.
      const jbtn = e.target.closest && e.target.closest('.pid-journey');
      if (jbtn) {
        e.preventDefault(); e.stopPropagation();
        callJourneyShow_(jbtn.getAttribute('data-journey-pid') || '',
                         jbtn.getAttribute('data-journey-date') || '');
        return;
      }
      const btn = e.target.closest && e.target.closest('.pid-copy');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const pid = btn.getAttribute('data-pid') || '';
      if (!pid) return;
      const flashOk = function () {
        const prev = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = prev;
          btn.classList.remove('copied');
        }, 1000);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pid).then(flashOk, function () {});
      } else {
        // Apps Script web app may run in a sandboxed iframe where
        // clipboard API is unavailable; fall back to a hidden textarea
        // + execCommand so copy still works in older paths.
        try {
          const ta = document.createElement('textarea');
          ta.value = pid;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          flashOk();
        } catch (err) { /* swallow */ }
      }
    });
  }

  // #3: inbound-call PATH drill-through. Opens a lightweight overlay showing
  // the leg-by-leg journey for one abandoned call (keyed by parent id + date),
  // reusing the Caller Lookup journey renderers (clChainHtml_/clJourneyRowHtml_).
  function ensureCallJourneyOverlay_() {
    var ov = $('call-journey-overlay');
    if (ov) return ov;
    ov = document.createElement('div');
    ov.id = 'call-journey-overlay';
    ov.className = 'cj-overlay';
    ov.style.display = 'none';
    ov.innerHTML = '<div class="cj-backdrop" data-cj-close></div>'
      + '<div class="cj-panel" role="dialog" aria-modal="true" aria-label="Call path">'
      +   '<button type="button" class="cj-close" data-cj-close aria-label="Close">&times;</button>'
      +   '<div class="cj-title">Call path</div>'
      +   '<div class="cj-body"></div>'
      + '</div>';
    document.body.appendChild(ov);
    ov.addEventListener('click', function (e) {
      if (e.target.hasAttribute('data-cj-close')) callJourneyHide_();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && ov.style.display !== 'none') callJourneyHide_();
    });
    return ov;
  }
  function callJourneyHide_() {
    var ov = $('call-journey-overlay');
    if (ov) ov.style.display = 'none';
  }
  // Stale-response token: clicking a second "↳ path" link while the first
  // fetch is in flight must not let the OLDER response overwrite the newer
  // call's panel when it lands late.
  var callJourneySeq_ = 0;
  function callJourneyShow_(callId, date) {
    if (!callId || !date) return;
    var ov = ensureCallJourneyOverlay_();
    var body = ov.querySelector('.cj-body');
    ov.style.display = '';
    body.innerHTML = dsRingsHtml_('Loading call path…');
    var __tok = ++callJourneySeq_;
    google.script.run
      .withSuccessHandler(function (resp) {
        if (__tok !== callJourneySeq_) return;   // superseded by a newer drill
        if (!resp || resp.available === false) {
          body.innerHTML = '<div class="ds-note">Call path unavailable — the inbound-calls store (Neon) could not be reached.</div>';
          return;
        }
        if (!resp.found || !resp.call) {
          body.innerHTML = '<div class="ds-note">No inbound-call path on record for this call. It may predate inbound capture, or it isn’t an inbound call attributable to this department.</div>';
          return;
        }
        body.innerHTML = callJourneyHtml_(resp.call);
      })
      .withFailureHandler(function (err) {
        if (__tok !== callJourneySeq_) return;   // a newer drill owns the panel
        body.innerHTML = '<div class="status status-error">' + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
      })
      .getCallJourney({ callId: callId, date: date, department: getRequestedDept() });
  }
  // Mirrors the Caller Lookup card body: full chain + timeline when the
  // journey was captured, else the entry->final summary for pre-extension rows.
  function callJourneyHtml_(c) {
    var head = '<div class="cj-head">'
      + (c.callStart ? escapeHtml(clCstTime_(c.callStart)) + ' · ' : '')
      + escapeHtml(c.callDate || '')
      + (c.disposition ? ' · <strong>' + escapeHtml(c.disposition) + '</strong>' : '')
      + (c.abandonStage ? ' (' + escapeHtml(c.abandonStage) + ')' : '')
      + (c.dialIn ? ' · dial-in ' + escapeHtml(c.dialIn) : '')
      + '</div>';
    if (c.journey && c.journey.length) {
      return head + clChainHtml_(c.journey)
        + '<div class="cl-journey">' + c.journey.map(clJourneyRowHtml_).join('')
        + clJourneyEndRowHtml_(c.journey) + '</div>';
    }
    var path = [c.entryQueue, c.finalQueue].filter(Boolean).map(escapeHtml).join(' → ');
    return head + '<div class="cl-journey-summary">' + (path || '(no queue path recorded)')
      + ' <span class="cl-journey-note">— leg-by-leg detail not captured for this call (recorded before the journey extension)</span></div>';
  }

  // -- Queue-only abandoned section --------------------------------------
  // Renders a banner + per-queue lists for abandoned calls that never
  // rang an agent (queue had no available agent). Hidden when empty.

  /**
   * Builder for the queue-only abandoned section -- returns the subhead
   * string + per-queue body HTML for the My Department inline section
   * (deptMissedRender_; previously also the retired Missed Calls modal).
   * Takes the report meta explicitly (for the unique/event counts) rather
   * than reading a module global.
   */
  // Range (inclusive days) between two ISO dates, or null if either is absent.
  function isoRangeDays_(from, to) {
    if (!from || !to) return null;
    var a = new Date(from + 'T00:00:00'), b = new Date(to + 'T00:00:00');
    if (isNaN(a) || isNaN(b)) return null;
    return Math.round((b - a) / 86400000) + 1;
  }

  function missedQueueOnlyParts_(queueOnly, meta) {
    meta = meta || {};
    // Default the per-queue cards COLLAPSED on a multi-day range (> 2 days):
    // long ranges accumulate many timestamps per queue, so an all-open list
    // is a wall of rows. Short ranges (<= 2 days) stay open for quick scanning.
    const rangeDays = isoRangeDays_(meta.from, meta.to);
    const cardsOpen = !(rangeDays != null && rangeDays > 2);
    // Headline uses unique-by-parent-ID count alongside the per-queue event
    // sum, so overflow (one call ringing two queues) is visible. Fall back to
    // the raw sum if the server didn't send the unique count (older payload).
    const eventSum = (typeof meta.queueOnlyEventCount === 'number')
                   ? meta.queueOnlyEventCount
                   : queueOnly.reduce(function (s, q) { return s + q.total; }, 0);
    const uniqueCalls = (typeof meta.queueOnlyUniqueCount === 'number')
                      ? meta.queueOnlyUniqueCount
                      : eventSum;
    const headParts = [
      uniqueCalls + ' unique call' + (uniqueCalls === 1 ? '' : 's'),
      'across ' + queueOnly.length + ' queue' + (queueOnly.length === 1 ? '' : 's'),
    ];
    if (eventSum !== uniqueCalls) headParts.push('(' + eventSum + ' ring events)');
    const bodyHtml = queueOnly.map(function (q) {
      const itemsHtml = q.entries.map(function (m) {
        const dateLabel = m.date ? m.date.slice(5) : '';   // MM-DD
        // R5 (owner): per-call facts from the server's inbound_calls
        // enrichment -- wait time before abandoning + the insurer label
        // when the caller is a labeled insurance number. Absent fields
        // (Neon miss / pre-capture rows / non-insurer callers) render
        // nothing, so the line degrades to the old shape.
        const facts = [];
        if (m.waitSec != null) facts.push('waited ' + crFormatSecondsShort_(m.waitSec));
        if (m.insurer) facts.push(escapeHtml(m.insurer));
        const factsHtml = facts.length
          ? ' <span class="qo-facts" title="From the inbound-call record: time the caller waited before hanging up' + (m.insurer ? ' · caller is a labeled insurance line' : '') + '">· ' + facts.join(' · ') + '</span>'
          : '';
        return '<li>'
             +   '<span class="ring-date">' + escapeHtml(dateLabel) + '</span>'
             +   '<span class="ring-time">' + escapeHtml(m.label)   + ' 🚨'
             +     factsHtml
             +     parentIdBadge(m.parentId, m.date)
             +     alsoInBadge(m.alsoIn)
             +   '</span>'
             + '</li>';
      }).join('');
      return '<details class="queue-only-card"' + (cardsOpen ? ' open' : '') + '>'
           +   '<summary class="qname">' + escapeHtml(q.queue) + ' &middot; '
           +     q.total + ' abandoned</summary>'
           +   '<ul class="queue-only-list">' + itemsHtml + '</ul>'
           + '</details>';
    }).join('');
    return { subhead: '(no agent rang) — ' + headParts.join(' '), bodyHtml: bodyHtml };
  }

  function missedQuantile_(sortedAsc, q) {
    if (!sortedAsc.length) return 0;
    const pos = (sortedAsc.length - 1) * q;
    const lo = Math.floor(pos), hi = Math.ceil(pos);
    if (lo === hi) return sortedAsc[lo];
    return sortedAsc[lo] + (sortedAsc[hi] - sortedAsc[lo]) * (pos - lo);
  }

  function missedAgentsHtml_(agents) {
    // Phase 15: most-missed first so the worst timelines lead. Stable
    // tiebreak by name keeps equal-count agents in a deterministic order.
    const sorted = agents.slice().sort(function (a, b) {
      return (b.total || 0) - (a.total || 0) || a.name.localeCompare(b.name);
    });

    // Relative severity tiers across the agents shown (tertile cutoffs on
    // the missed totals). Gated so a low-signal group -- few agents or
    // tiny counts -- stays neutral rather than branding a 1-missed agent
    // "Most missed". No company standard exists for per-agent missed
    // counts, so the tiering is intentionally RELATIVE to the cohort.
    const totalsAsc = sorted.map(function (a) { return a.total || 0; })
      .sort(function (x, y) { return x - y; });
    const maxTotal = totalsAsc.length ? totalsAsc[totalsAsc.length - 1] : 0;
    const useTiers = sorted.length >= 3 && maxTotal >= 3;
    const cutHigh = useTiers ? missedQuantile_(totalsAsc, 0.67) : Infinity;
    const cutLow = useTiers ? missedQuantile_(totalsAsc, 0.34) : -Infinity;

    return sorted.map(function (a) {
      const itemsHtml = a.missedTimes.map(function (m) {
        const dateLabel = m.date ? '<span class="date">' + escapeHtml(m.date.slice(5)) + '</span>' : '';
        const cls = m.abandoned ? 'abandoned' : '';
        const siren = m.abandoned ? ' 🚨' : '';
        return '<li class="' + cls + '">'
             +   dateLabel + escapeHtml(m.label) + siren
             +   parentIdBadge(m.parentId, m.date)
             + '</li>';
      }).join('');

      var tier = '', tierChip = '';
      if (useTiers) {
        const t = a.total || 0;
        if (t >= cutHigh && t >= 3) tier = 'high';
        else if (t <= cutLow) tier = 'low';
        else tier = 'med';
        const tierLabel = tier === 'high' ? 'Most missed' : (tier === 'low' ? 'Fewest' : 'Moderate');
        tierChip = '<span class="agent-tier agent-tier--' + tier + '">' + tierLabel + '</span>';
      }

      return '<details class="agent-card' + (tier ? ' agent-card--tier-' + tier : '') + '" open>'
           +   '<summary class="agent-card-head">'
           +     '<span class="agent-name">' + escapeHtml(a.name) + '</span>'
           +     '<span class="agent-card-meta">' + tierChip
           +       '<span class="agent-total">' + a.total + ' missed</span>'
           +     '</span>'
           +   '</summary>'
           +   '<ul class="missed-list">' + itemsHtml + '</ul>'
           + '</details>';
    }).join('');
  }

  function getRequestedDept() {
    if (isAllDeptViewer_()) {
      const sel = $('dept-selector');
      return sel ? sel.value : '';
    }
    return USER.department || '';
  }

  function setStatus(kind, msg) {
    const el = $('status');
    var skel = $('dept-table-skeleton');
    var empt = $('dept-empty-state');
    if (!kind) {
      el.style.display = 'none'; el.textContent = '';
      if (skel) skel.style.display = 'none';
      if (empt) empt.style.display = 'none';
      return;
    }
    if (kind === 'loading') {
      el.style.display = 'none';
      if (empt) empt.style.display = 'none';
      if (skel) skel.style.display = '';
      return;
    }
    if (skel) skel.style.display = 'none';
    if (kind === 'empty') {
      el.style.display = 'none';
      if (empt) {
        var title = $('dept-empty-title');
        var hint  = $('dept-empty-hint');
        if (title) title.textContent = 'No agent data found';
        if (hint) hint.textContent = msg || '';
        empt.style.display = '';
      }
      return;
    }
    if (empt) empt.style.display = 'none';
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // Inline equalizer busy-indicator markup (Part 7) for report-fetch
  // buttons. Set via innerHTML on the busy label; the restore path sets
  // textContent back to the idle label, which clears the span.
  var DS_EQ_HTML_ = '<span class="ds-loader--eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span> ';

  // C1 signal-rings block loader -- for an indeterminate query whose results
  // area has no shape to skeleton (Caller Lookup). Optional caption.
  function dsRingsHtml_(label) {
    return '<div class="ds-loader-block">'
         +   '<div class="ds-loader--rings" aria-hidden="true"><span></span><span></span><span></span></div>'
         +   (label ? '<div class="ds-loader-block-label">' + escapeHtml(label) + '</div>' : '')
         + '</div>';
  }

  // M3: frost-and-ripple overlay. Frosts `host` (blur + dim) with the ripple
  // loader centered over it, so data being refreshed stays in place instead of
  // collapsing to a top skeleton that pushes the page down. Idempotent; the
  // host gains position:relative via .ds-frost-host.
  function dsFrostShow_(host, label) {
    if (!host) return;
    var ov = host.querySelector(':scope > .ds-frost');
    if (!ov) {
      ov = document.createElement('div');
      ov.className = 'ds-frost';
      ov.innerHTML = dsRingsHtml_(label || 'Refreshing…');
      host.appendChild(ov);
    } else {
      ov.style.display = '';
    }
    host.classList.add('ds-frost-host');
  }
  function dsFrostHide_(host) {
    if (!host) return;
    var ov = host.querySelector(':scope > .ds-frost');
    if (ov) ov.style.display = 'none';
    host.classList.remove('ds-frost-host');
  }

  // R7 (M-5/I-2): sticky context bar. The bar (position:fixed, hidden by
  // default) reveals while `sentinel` -- the page's own controls / results
  // header row -- is scrolled ABOVE the viewport top and its page is active.
  // IntersectionObserver keeps it scroll-handler-free; a hidden page's
  // sentinel reports a zeroed rect, which fails the `top < 0` test, so bars
  // never leak across pages (the fixed bar also lives inside its display:none
  // page section, which hides it outright on page swaps).
  function initStickyBar_(barId, sentinelSel, pageName) {
    const bar = $(barId);
    const sentinel = document.querySelector(sentinelSel);
    if (!bar || !sentinel || typeof IntersectionObserver === 'undefined') return;
    new IntersectionObserver(function (entries) {
      const en = entries[entries.length - 1];
      const pageOk = document.body.getAttribute('data-page') === pageName;
      const gone = !!(en && !en.isIntersecting
        && en.boundingClientRect && en.boundingClientRect.top < 0);
      const stuck = pageOk && gone;
      bar.classList.toggle('is-stuck', stuck);
      bar.setAttribute('aria-hidden', stuck ? 'false' : 'true');
    }, { threshold: 0 }).observe(sentinel);
  }

  // Generic trailing-edge debounce. Returns a wrapped fn that defers
  // invocation until `ms` have elapsed since the last call.
  function debounce_(fn, ms) {
    var t = null;
    return function () {
      var args = arguments, self = this;
      if (t) clearTimeout(t);
      t = setTimeout(function () { t = null; fn.apply(self, args); }, ms);
    };
  }

  // Monotonic request token for getDepartmentSummary. A rapid sequence
  // of date edits can have several requests in flight; only the latest
  // may paint. Stale responses (token !== summaryReqSeq) are dropped so
  // an earlier, slower response can't clobber a newer one.
  var summaryReqSeq = 0;

  // The dept whose rows are currently painted in the agent table. Lets
  // refresh() blank the table the instant the dept CHANGES (admin clicking
  // a different Overview tile, header dropdown, view-as) so the previous
  // dept's rows don't linger on screen while the new summary loads -- the
  // cross-dept "stale flash". A SAME-dept refresh keeps its rows (no
  // flash-to-empty); only a genuine switch clears.
  var lastSummaryDept_ = null;

  // F10: monotonic stale-response tokens for the agent reports. Generate +
  // edit-apply + dept-switch-then-regenerate can leave two fetches in
  // flight; without a guard the slower (older) response paints last and
  // wins, showing stale data for the now-current selection. Each fetch
  // captures ++reportReqSeq_.<report> and its handlers RESET their own
  // button unconditionally (so a superseded request never leaves a button
  // stuck) but SKIP rendering when the token is stale.
  // CL2-1: PER-REPORT counters (was one shared counter). The shared token
  // meant the Insights->IR drill's auto-run CANCELLED an in-flight Insights
  // response: its SWR "refreshing now..." note never cleared and "Back to
  // Insights" restored STALE data under a permanent loading note. IR and
  // Insights render into separate containers, so cross-report responses
  // never actually conflict.
  var reportReqSeq_ = { ir: 0, ins: 0, inb: 0, dir: 0 };   // C-8: inbound/direct join the guard family

  // D1b: per-report last-good payload cache (localStorage). On a FAILED fetch
  // the report repaints the last good payload for the SAME request (if any)
  // with a non-destructive staleness note, instead of blanking to a hard
  // error -- the modal-report analogue of the Overview SWR cache (which the
  // reports don't have; they re-fetch fresh each open). Bounded: ONE entry per
  // report (keyed by report name), matched by a request signature, so it can't
  // grow unbounded and only repaints when the SAME view's fetch fails (a
  // transient backend blip / reopen while Neon is briefly unreachable).
  var REPORT_LASTGOOD_PREFIX_ = 'cdr.rpt.lastgood.v1:';
  // Per-VIEWER key segment (mirrors the Overview SWR cache's per-email keying,
  // INV-39 spirit) so a shared browser can never repaint one viewer's cached
  // report for another. Belt-and-suspenders on top of the dept-in-signature
  // entitlement boundary (a manager only ever requests their own dept, so the
  // sig already differs across depts).
  function reportLastGoodKey_(report) {
    var who = '';
    try { who = (typeof USER !== 'undefined' && USER && USER.email) ? USER.email : ''; } catch (e) {}
    return REPORT_LASTGOOD_PREFIX_ + who + ':' + report;
  }
  // Stable signature of a report request (agents sorted so selection order
  // doesn't churn the key).
  function reportSig_(req) {
    try {
      var clone = JSON.parse(JSON.stringify(req || {}));
      if (Array.isArray(clone.agents)) clone.agents = clone.agents.slice().sort();
      return JSON.stringify(clone);
    } catch (e) { return ''; }
  }
  function reportLastGoodWrite_(report, sig, data) {
    try { localStorage.setItem(reportLastGoodKey_(report),
      JSON.stringify({ sig: sig, at: Date.now(), data: data })); } catch (e) {}
  }
  // Returns the cached entry ONLY when its signature matches the current
  // request (so a stale, different-params payload is never shown as "current").
  function reportLastGoodRead_(report, sig) {
    try {
      var raw = localStorage.getItem(reportLastGoodKey_(report));
      if (!raw) return null;
      var obj = JSON.parse(raw);
      return (obj && obj.sig === sig && obj.data) ? obj : null;
    } catch (e) { return null; }
  }
  function reportStaleNote_(at) {
    var when = '';
    try { when = at ? new Date(at).toLocaleString() : ''; } catch (e) {}
    return 'Couldn’t refresh — showing the last loaded report'
      + (when ? ' (as of ' + when + ')' : '') + '. Try again in a moment.';
  }
  // Generic results-status setter by element id (matches the per-report
  // *SetResultsStatus bodies; used for reports whose setter isn't in scope here).
  function reportSetStatus_(elId, kind, msg) {
    var el = $(elId); if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind; el.textContent = msg; el.style.display = '';
  }
  // On a failed fetch: repaint the last-good payload for this exact request
  // (if cached) + a staleness note, and return true so the caller SKIPS its
  // hard-error path. Returns false when there's nothing to fall back to.
  function reportFailFallback_(report, sig, repaintFn, statusElId) {
    var lg = reportLastGoodRead_(report, sig);
    if (!lg) return false;
    try {
      repaintFn(lg.data);                                   // renders + shows the results pane
      reportSetStatus_(statusElId, 'warn', reportStaleNote_(lg.at));
      return true;
    } catch (e) { return false; }
  }
  // SWR (stale-while-revalidate) companion to the D1b store: when the
  // last-good payload matches this EXACT request signature, paint it
  // immediately with a visible "previous result — refreshing" note, so a
  // repeat Generate feels instant instead of showing a skeleton for the
  // full server round-trip. Perceived speed only -- the live fetch ALWAYS
  // runs: on success the report's normal repaint path clears the note (every
  // wired renderer resets its results-status line); on failure
  // reportFailFallback_ swaps it for the couldn't-refresh warning. Signature
  // matching means a changed dept/range/agents never paints someone else's
  // stale shape -- those requests take the normal skeleton path.
  function reportSwrPaint_(report, sig, repaintFn, statusElId) {
    var lg = reportLastGoodRead_(report, sig);
    if (!lg) return false;
    try {
      // swr:true lets a renderer skip side-fetches (e.g. the abandon
      // heatmap) on the pre-paint -- the live pass triggers them once.
      repaintFn(lg.data, { swr: true });
      var when = '';

  function deptMissedFetch_() {

  // Re-measure the dept missed chart after layout settles. rAF (twice, to

  // created in the same frame the section is unhidden, so Chart.js can

  /**
   * "Yesterday's QCD" mini-section under the agent table on My

    try { var v = localStorage.getItem(DEPT_QCD_PERIOD_KEY_); return (v === 'mtd' || v === 'yesterday') ? v : 'yesterday'; }
    catch (e) { return 'yesterday'; }
  })();

  function renderDeptQcdSnapshot_(qcd) {
    var wrap = $('dept-qcd-snapshot');
    if (!wrap) return;
    if (!qcd) { wrap.style.display = 'none'; deptQcdSnap_ = null; return; }
    deptQcdSnap_ = qcd;
    // Resolve the active period block. MTD is only offered when the server
    // shipped it; a missing `mtd` (older cache) falls back to Yesterday.
    var hasMtd = !!qcd.mtd;
    var period = (deptQcdPeriod === 'mtd' && hasMtd) ? 'mtd' : 'yesterday';
    var block = (period === 'mtd') ? qcd.mtd : qcd;
    deptQcdWirePeriod_(hasMtd, period);
    var titleEl = $('dept-qcd-title');
    if (titleEl) {
      if (period === 'mtd') {
        var msStr = qcd.mtdStart || '';
        var msLabel = '';
        if (msStr) {
          var mp = msStr.split('-');
          var monthsShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          msLabel = monthsShort[Number(mp[1]) - 1] + ' ' + Number(mp[2]);
        }
        titleEl.textContent = 'Queue Call Data — Month to date' + (msLabel ? ' (since ' + msLabel + ')' : '');
        titleEl.title = 'Month-to-date across this department’s queues, through the '
          + 'latest day with queue data. For a custom range, open the Insights '
          + 'report’s Queue health section.';

      } else {

        if (dateStr) {

          var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
          var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          dateStr = days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
        }
        titleEl.textContent = 'Queue Call Data — ' + dateStr;

        // independent of the date range above (QCD can update on a different day
        // than DQE, and the range defaults to the latest DQE date). Clarify that
        // so the static card next to the range controls doesn't read as broken.
        titleEl.title = 'Most recent day of queue data — independent of the date '

    // the card can't read as showing the selected range's numbers. The note
    // is diagnostic (owner follow-up): comparing against the COMPANY-wide
    // latest QCD day (latestQcdIso_) distinguishes "queue data simply hasn't
    // landed past this date" from "OTHER depts have newer queue rows" -- the
    // latter usually means this dept's queue mapping misses a renamed queue.
    var dateEl = $('dept-qcd-date');
    if (dateEl) {
      var pageTo = $('to-date') ? $('to-date').value : '';
      var note = '';
