      data: labels.map(function () { return 92; }),
      borderColor: (THEME && THEME.muted) || '#606872',
      backgroundColor: 'rgba(0,0,0,0)',
      borderWidth: 1,
      borderDash: [6, 4],
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      tension: 0,
      // Render behind everything else so dept lines stay on top.
      order: 99,
    });

    const ovPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    ovChartInstance = new Chart($('ov-trend-chart').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: ovPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: Object.assign({
            position: 'bottom',
            labels: { boxWidth: 12, font: { size: 11 } },
          }, chartSpotlightLegend_()),
          tooltip: {
            filter: function (ctx) {
              // Hide the 92% baseline from the per-line tooltip list.
              return ctx.dataset.label !== '92% target';
            },
            callbacks: {
              label: function (ctx) {
                const v = ctx.parsed && ctx.parsed.y;
                if (v == null) return ctx.dataset.label + ': no data';
                return ctx.dataset.label + ': ' + v.toFixed(1) + '%';
              },
            },
          },
          datalabels: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: 100,
            ticks: { callback: function (v) { return v + '%'; } },
            title: { display: true, text: '% Answered', font: { size: 11 } },
          },
          x: { ticks: { autoSkip: true, maxTicksLimit: 10 } },
        },
        interaction: { mode: 'index', intersect: false },
        // Point click -> deep-link into that dept + date's My Department
        // view (admins, or a manager clicking their own dept's line).
        onClick: function (evt, elements, chart) {
          ovHandlePointClick_(evt, chart, data);
        },
      },
    });

    // Generic legend spotlight (hover-dim + click-to-pin/isolate). Skip
    // the 92% baseline. Stash resting styles + the ISO date axis + the
    // viewer's dept so the tile-hover and point-click handlers can use them.
    chartSpotlightStash_(ovChartInstance, { skipLabel: '92% target' });
    ovChartInstance._trendIso = data.trendIsoLabels || [];
    ovChartInstance._viewerDept = ovViewerDept_(data);
    ovWireAxisZoom_();
  }

  // ---- Generic Chart.js legend spotlight (shared) ----------------------
  // Hover a legend item -> dim every other series (transient preview).
  // Click a legend item -> PIN that series (persistent dim of others);
  // click it again (or another) to release/switch. Used by the multi-dept
  // Overview chart and the multi-queue QCD chart. Datasets must have been
  // stashed via chartSpotlightStash_ first. A `skipLabel` dataset (e.g. a
  // reference baseline / dept-total line) is never dimmed.
  const CHART_DIM_COLOR = 'rgba(140,140,140,0.18)';

  function chartSpotlightStash_(chart, opts) {
    if (!chart || !chart.data) return;
    chart._spotlightSkip = (opts && opts.skipLabel) || null;
    chart._spotlightPinned = null;
    chart.data.datasets.forEach(function (ds) {
      if (ds._origBorder == null) ds._origBorder = ds.borderColor;
      if (ds._origWidth == null) ds._origWidth = ds.borderWidth;
    });
  }

  function chartSpotlightApply_(chart, activeIndex) {
    if (!chart || !chart.data) return;
    chart.data.datasets.forEach(function (ds, i) {
      if (chart._spotlightSkip && ds.label === chart._spotlightSkip) return;
      if (i === activeIndex) {
        ds.borderColor = ds._origBorder;
        ds.borderWidth = (ds._origWidth || 2) + 0.8;
      } else {
        ds.borderColor = CHART_DIM_COLOR;
        ds.borderWidth = ds._origWidth || 1.4;
      }
    });
    chart.update('none');
  }

  function chartSpotlightClear_(chart) {
    if (!chart || !chart.data) return;
    chart.data.datasets.forEach(function (ds) {
      if (chart._spotlightSkip && ds.label === chart._spotlightSkip) return;
      if (ds._origBorder != null) ds.borderColor = ds._origBorder;
      if (ds._origWidth != null) ds.borderWidth = ds._origWidth;
    });
    chart.update('none');
  }

  // Returns legend onHover/onLeave/onClick callbacks implementing the
  // spotlight model. Spread into a chart's plugins.legend config.
  function chartSpotlightLegend_() {
    return {
      onHover: function (e, item, legend) {
        const chart = legend.chart;
        if (chart._spotlightPinned != null) return;   // pin wins over hover
        if (item && item.datasetIndex != null) chartSpotlightApply_(chart, item.datasetIndex);
      },
      onLeave: function (e, item, legend) {
        const chart = legend.chart;
        if (chart._spotlightPinned != null) return;
        chartSpotlightClear_(chart);
      },
      onClick: function (e, item, legend) {
        const chart = legend.chart;
        if (!item || item.datasetIndex == null) return;
        if (chart._spotlightPinned === item.datasetIndex) {
          chart._spotlightPinned = null;
          chartSpotlightClear_(chart);
        } else {
          chart._spotlightPinned = item.datasetIndex;
          chartSpotlightApply_(chart, item.datasetIndex);
        }
      },
    };
  }

  // Spotlight a dept's line by name (used by dept-tile hover). No-op when
  // a legend pin is active so a hover doesn't fight the pinned selection.
  function ovSpotlightDept_(deptName) {
    const chart = ovChartInstance;
    if (!chart || !chart.data || chart._spotlightPinned != null) return;
    if (deptName == null) { chartSpotlightClear_(chart); return; }
    let idx = -1;
    chart.data.datasets.forEach(function (ds, i) { if (ds._deptName === deptName) idx = i; });
    if (idx >= 0) chartSpotlightApply_(chart, idx);
  }

  // Point click -> deep-link to that dept + date. Only routes for admins
  // or a manager clicking their OWN dept's line (others can't view it).
  function ovHandlePointClick_(evt, chart, data) {
    if (!chart || typeof chart.getElementsAtEventForMode !== 'function') return;
    const hits = chart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
    if (!hits || !hits.length) return;
    const ds = chart.data.datasets[hits[0].datasetIndex];
    if (!ds || !ds._deptName) return;                 // baseline / non-dept line
    const deptName = ds._deptName;
    const viewerDept = chart._viewerDept || ovViewerDept_(data);
    if (USER.role !== 'admin' && deptName !== viewerDept) return;
    const iso = (chart._trendIso || [])[hits[0].index] || null;
    ovRouteToDept_(deptName, iso);
  }

  // Axis zoom toggle: Full (0-100%) <-> Fit (auto-scale to the data range,
  // so depts clustered near the top spread out). Wired once; the button
  // lives in the ov-chart-tabs row (dashboard.html).
  let ovAxisZoom = 'full';
  let ovAxisZoomWired = false;
  function ovWireAxisZoom_() {
    if (ovAxisZoomWired) return;
    const btn = $('ov-axis-zoom-btn');
    if (!btn) return;
    ovAxisZoomWired = true;
    btn.addEventListener('click', function () {
      if (!ovChartInstance) return;
      ovAxisZoom = (ovAxisZoom === 'full') ? 'fit' : 'full';
      const y = ovChartInstance.options.scales.y;
      if (ovAxisZoom === 'fit') {
        y.beginAtZero = false; y.min = undefined; y.max = undefined;
      } else {
        y.beginAtZero = true;  y.min = undefined; y.max = 100;
      }
      ovChartInstance.update();
      btn.textContent = ovAxisZoom === 'fit' ? 'Zoom: Fit' : 'Zoom: Full';
      btn.setAttribute('aria-pressed', ovAxisZoom === 'fit' ? 'true' : 'false');
    });
  }

  // -- Router + URL hash routing (Phase C) -------------------------------
  // Lightweight in-page router that lets the user deep-link into a
  // specific report modal -- the primary use-case is the "Open in
  // new tab" affordance, which lets users OS-tile two browser
  // windows for side-by-side comparison.
  //
  // Design:
  //   * The header nav already has the modal-trigger buttons we want
  //     (Missed / Individual / Performance / Compare / QCD / Alerts /
  //     Outlier Fix). Each tab carries a data-route="..." attribute.
  //   * This router adds a click listener on every [data-route]
  //     element that tracks the active route + paints the active-tab
  //     visual indicator. It does NOT open the modal itself --
  //     each per-modal initXxxReport already has its own click
  //     handler that does the open. Two listeners fire on the same
  //     button click; they don't conflict.
  //   * On modal close (close button or backdrop), the router
  //     reverts the active state to the underlying page tab
  //     (Overview or My Department) so the highlight follows what's
  //     actually visible. Escape-key closes are not intercepted in
  //     this phase; the tab stays highlighted until the next click
  //     -- a minor visual cosmetic miss that's reversible by any
  //     subsequent tab interaction.
  //   * On page load, google.script.url.getLocation reads the parent
  //     URL's hash; if it matches a known route, the corresponding
  //     tab is programmatically clicked so the deep-link lands on
  //     the right view. Defensive against unknown / malformed hashes:
  //     the tab lookup quietly no-ops if no match.
  //
  // The router does not push hash updates to the parent URL on
  // modal open -- that would require google.script.history which
  // has had spotty browser behavior. The currentRoute is tracked
  // purely in-JS and consumed by the "Open in new tab" buttons,
  // which build a fresh URL from window.__DASHBOARD_URL__ + the
  // current route. The new tab loads the dashboard fresh and the
  // init-time hash read opens the deep-linked modal.

  const ROUTES_ = {
    '/overview':           { kind: 'page',  page: 'overview' },
    '/dept':               { kind: 'page',  page: 'dept' },
    '/report/missed':      { kind: 'modal', modalId: 'missed-modal',      buttonId: 'missed-report-btn' },
    '/report/individual':  { kind: 'modal', modalId: 'individual-modal',  buttonId: 'individual-report-btn' },
    '/report/performance': { kind: 'modal', modalId: 'performance-modal', buttonId: 'performance-report-btn' },
    '/report/compare':     { kind: 'modal', modalId: 'compare-modal',     buttonId: 'compare-ranges-btn' },
    '/report/qcd':         { kind: 'modal', modalId: 'qcd-modal',         buttonId: 'qcd-report-btn' },
    '/report/insights':    { kind: 'modal', modalId: 'insights-modal',    buttonId: 'insights-report-btn' },
    '/report/inbound':     { kind: 'modal', modalId: 'inbound-modal',     buttonId: 'inbound-report-btn' },
    '/admin/alerts':       { kind: 'modal', modalId: 'alerts-modal',      buttonId: 'alerts-btn' },
    '/admin/orphan-fix':   { kind: 'modal', modalId: 'orphan-fix-modal',  buttonId: 'orphan-fix-btn' },
    '/admin/dept-config':  { kind: 'modal', modalId: 'dept-config-modal', buttonId: 'dept-config-btn' },
    '/admin/caller-lookup': { kind: 'modal', modalId: 'caller-lookup-modal', buttonId: 'caller-lookup-btn' },
  };

  // The route currently considered "active". Starts as '/overview'
  // matching the default landing page. Reset to the underlying page
  // ('/overview' or '/dept') whenever a modal closes.
  var currentRoute = '/overview';

  function updateTabActiveState_(route) {
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      const isActive = btn.getAttribute('data-route') === route;
      btn.classList.toggle('header-nav-current', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    // If the active route lives inside a collapsed header dropdown (the
    // Reports group), its menu-item highlight is hidden, so also light
    // up the dropdown's trigger. Generic over any .header-menu so it
    // keeps working if more groups are collapsed later.
    document.querySelectorAll('.header-menu').forEach(function (menu) {
      const trigger = menu.querySelector('.header-menu-btn[aria-controls]');
      if (!trigger) return;
      const hasActive = !!menu.querySelector(
        '.header-menu-list [data-route="' + route + '"]');
      trigger.classList.toggle('header-nav-current', hasActive);
    });
  }

  function setRoute_(route) {
    if (!ROUTES_[route]) return;
    currentRoute = route;
    updateTabActiveState_(route);
  }

  function basePageRoute_() {
    return document.body.getAttribute('data-page') === 'dept' ? '/dept' : '/overview';
  }

  function initRouter() {
    // Wire up click on every [data-route] element. The per-modal
    // initXxxReport already adds its own click handler that opens
    // the modal; this just tracks the route + active state.
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const route = btn.getAttribute('data-route');
        if (!route || !ROUTES_[route]) return;
        setRoute_(route);
      });
    });

    // Wire up modal close paths to revert the active state. We hook
    // the close button + the backdrop click; Escape-key closes are
    // not intercepted in this phase (see header comment above).
    Object.keys(ROUTES_).forEach(function (route) {
      const def = ROUTES_[route];
      if (def.kind !== 'modal') return;
      const modal = document.getElementById(def.modalId);
      if (!modal) return;
      const onClose = function () {
        // Async so the modal's own close handler runs first and
        // body[data-page] is already correct.
        setTimeout(function () { setRoute_(basePageRoute_()); }, 0);
      };
      modal.querySelectorAll('.modal-close, [data-close]').forEach(function (el) {
        el.addEventListener('click', onClose);
      });
    });

    // Initial route from parent URL hash. google.script.url.getLocation
    // returns the parent URL's hash (without the leading '#') so deep
    // links like ".../exec#/report/individual" hit ROUTES_ exactly.
    // A '?' query suffix carries optional FORM STATE (dates, compare
    // mode, agents) serialized by the Open-in-new-tab buttons -- split
    // it off before the route lookup and apply it after the modal opens.
    if (typeof google !== 'undefined' && google.script && google.script.url) {
      google.script.url.getLocation(function (loc) {
        const hash = (loc && loc.hash) || '';
        if (!hash) return;
        // Allow either '#/report/individual' (leading slash) or
        // '#report/individual' (no leading slash) for resilience to
        // hand-typed URLs.
        const normalized = hash.charAt(0) === '/' ? hash : '/' + hash;
        const qIdx = normalized.indexOf('?');
        const route = qIdx === -1 ? normalized : normalized.slice(0, qIdx);
        const params = qIdx === -1 ? null : decodeShareParams_(normalized.slice(qIdx + 1));
        const trigger = document.querySelector('[data-route="' + route + '"]');
        if (!trigger) return;
        // A deep link to an admin-only view (data-admin-only tabs:
        // alerts / orphan-fix / dept-config) by a non-admin would open
        // the modal only to surface a server "admin-only" error. Skip it
        // and stay on the base page instead.
        if (trigger.hasAttribute('data-admin-only') && USER.role !== 'admin') return;
        trigger.click();
        // Apply AFTER the click: the modal's openModal has now run its
        // defaults + prefs restore synchronously, so the shared state
        // wins; the agent selection lands via the report's pending-
        // selection hook once the roster fetch renders.
        if (params) {
          const provider = SHARE_STATE_[route];
          if (provider) {
            try { provider.apply(params); } catch (e) { /* best-effort */ }
          }
        }
      });
    }
  }

  // -- Share-state (state-in-URL) for the report forms ------------------
  // Serializes a report form's state into the deep-link hash so an
  // "Open in new tab" target (or a pasted link) restores the exact
  // form -- dates, compare mode, custom prior window, and agent
  // selection -- with one click left (Generate). Generation is NOT
  // auto-triggered: the roster/agent picker loads async and the
  // primed form keeps the flow race-free and predictable.

  function encodeShareParams_(obj) {
    const parts = [];
    Object.keys(obj).forEach(function (k) {
      const v = obj[k];
      if (v == null || v === '') return;
      parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
    });
    return parts.join('&');
  }

  function decodeShareParams_(str) {
    const out = {};
    String(str || '').split('&').forEach(function (pair) {
      if (!pair) return;
      const i = pair.indexOf('=');
      if (i === -1) return;
      try {
        out[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
      } catch (e) { /* skip malformed token */ }
    });
    return out;
  }

  /** Sets an input/select value and fires its change handlers. */
  function shareSetField_(id, value) {
    const el = $(id);
    if (!el || value == null || value === '') return;
    el.value = value;
    el.dispatchEvent(new Event('change'));
  }

  /**
   * Per-route share-state providers. `collect()` reads the CURRENT form
   * (returns null when there's nothing meaningful to share); `apply()`
   * writes params back into the form + the report's pending-agent hook.
   * Agent lists are '|'-joined inside one encoded param. Only the four
   * agent-comparison reports participate -- they're where "look at this
   * exact view" matters; the simpler forms (QCD / Missed / Inbound) are
   * candidates for a follow-on.
   */
  function shareDatesProvider_(ids, getPending) {
    return {
      collect: function () {
        const out = {};
        Object.keys(ids.fields).forEach(function (k) {
          const el = $(ids.fields[k]);
          if (el && el.value) out[k] = el.value;
        });
        const list = $(ids.agentList);
        if (list) {
          const agents = irGetCheckedAgents_(list);
          if (agents.length) out.agents = agents.join('|');
        }
        return (out.from || out.p1from) ? out : null;
      },
      apply: function (params) {
        Object.keys(ids.fields).forEach(function (k) {
          shareSetField_(ids.fields[k], params[k]);
        });
        if (params.agents && getPending) {
          getPending(String(params.agents).split('|').filter(function (a) { return !!a; }));
        }
      },
    };
  }

  const SHARE_STATE_ = {
    '/report/individual': shareDatesProvider_(
      { fields: { from: 'ir-from', to: 'ir-to', mode: 'ir-compare-mode', pfrom: 'ir-prior-from', pto: 'ir-prior-to' },
        agentList: 'ir-agent-list' },
      function (list) { irPendingAgentSelection_ = list; }),
    '/report/performance': shareDatesProvider_(
      { fields: { from: 'pr-from', to: 'pr-to', mode: 'pr-compare-mode', pfrom: 'pr-prior-from', pto: 'pr-prior-to' },
        agentList: 'pr-agent-list' },
      function (list) { prPendingAgentSelection_ = list; }),
    '/report/compare': shareDatesProvider_(
      { fields: { p1from: 'cr-p1-from', p1to: 'cr-p1-to', p2from: 'cr-p2-from', p2to: 'cr-p2-to' },
        agentList: 'cr-agent-list' },
      function (list) { crPendingAgentSelection_ = list; }),
    '/report/insights': shareDatesProvider_(
      { fields: { from: 'ins-from', to: 'ins-to', mode: 'ins-compare-mode', pfrom: 'ins-prior-from', pto: 'ins-prior-to' },
        agentList: 'ins-agent-list' },
      function (list) { insPendingAgentSelection_ = list; }),
  };

  // Open-in-new-tab buttons on each report modal. Builds the target
  // URL from window.__DASHBOARD_URL__ (DASHBOARD_URL Script Property)
  // + the modal's data-open-tab-route. Hidden via .is-disabled when
  // the property is unset -- the alert/email path already requires
  // it so most installs have it set; CLAUDE.md README setup section
  // documents how.
  function initOpenInNewTabButtons_() {
    const dashboardUrl = (window.__DASHBOARD_URL__ || '').trim();
    document.querySelectorAll('.modal-open-tab-btn').forEach(function (btn) {
      if (!dashboardUrl) {
        btn.classList.add('is-disabled');
        return;
      }
      btn.addEventListener('click', function () {
        const route = btn.getAttribute('data-open-tab-route') || currentRoute;
        // Strip any existing fragment from the configured URL before
        // appending ours, so an admin-pasted URL ending in "#anything"
        // doesn't produce a double-hash target.
        const baseUrl = dashboardUrl.split('#')[0];
        // Carry the modal's CURRENT form state (dates / compare mode /
        // agents) so the new tab restores the exact view primed for one
        // Generate click. Best-effort: any provider failure falls back
        // to the bare route.
        let suffix = '';
        try {
          const provider = SHARE_STATE_[route];
          const state = provider ? provider.collect() : null;
          const encoded = state ? encodeShareParams_(state) : '';
          if (encoded) suffix = '?' + encoded;
        } catch (e) { /* bare route */ }
        window.open(baseUrl + '#' + route + suffix, '_blank', 'noopener');
      });
    });
  }

  // -- Overview question launcher (anti-intimidation layer) --------------
  // Four plain-English questions on the Overview page, each mapped to an
  // existing report primed with a sensible window. Where the report needs
  // no agent selection (Missed / QCD) or can default to the whole active
  // roster (Insights) the launcher runs it immediately; the Individual
  // Report stops at the primed form because "which agent?" is the user's
  // question to answer. No new server endpoints -- this is routing sugar
  // over the modals' existing open + form machinery.

  let latestDqeIso_ = null;          // set by the getLatestDataDates init fetch
  let insLauncherAutoRun_ = false;   // consumed by insRenderAgentList

  function launcherIsoDaysAgo_(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')
      + '-' + String(d.getDate()).padStart(2, '0');
  }

  function initOverviewLauncher_() {
    const wrap = $('ov-launcher');
    if (!wrap) return;
    wrap.addEventListener('click', function (e) {
      const btn = e.target.closest('[data-launch]');
      if (!btn) return;
      const kind = btn.getAttribute('data-launch');
      try {
        if (kind === 'team-lately')           launcherOpenInsights_();
        else if (kind === 'missed-yesterday') launcherOpenMissed_();
        else if (kind === 'agent-trend')      launcherOpenIndividual_();
        else if (kind === 'abandons')         launcherOpenQcd_();
      } catch (err) { /* best-effort: the modal is still open/openable by hand */ }
    });
  }

  // Launcher-initiated runs skip the form: a loading pane (with the
  // question being answered) replaces it until the report renders. The
  // pane is created on demand before the form element; each modal's
  // showForm/showResults helpers hide it, so any failure path that falls
  // back to the form dismisses it automatically.
  function launcherShowLoading_(loadingId, formId, resultsId, question) {
    const form = $(formId), results = $(resultsId);
    if (!form) return;
    form.style.display = 'none';
    if (results) results.style.display = 'none';
    let el = $(loadingId);
    if (!el) {
      el = document.createElement('div');
      el.id = loadingId;
      el.className = 'launcher-loading';
      form.parentNode.insertBefore(el, form);
    }
    el.innerHTML = '<div class="launcher-loading-q">' + escapeHtml(question) + '</div>'
      + '<div class="skeleton-row"><div class="skeleton-line" style="width:60%;"></div></div>'
      + '<div class="skeleton-row"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>'
      + '<div class="skeleton-row"><div class="skeleton-line" style="height:120px;flex:1;"></div></div>'
      + '<div class="launcher-loading-cap">Generating the report…</div>';
    el.style.display = '';
  }
  function launcherHideLoading_(loadingId) {
    const el = $(loadingId);
    if (el) el.style.display = 'none';
  }

  // "How is my team doing lately?" -> Insights, last 30 days, all active
  // agents, auto-generated. The button click runs the modal's normal
  // open (defaults + prefs + roster fetch); we then override the dates
  // and re-ensure the roster for the new range -- insRenderAgentList
  // consumes insLauncherAutoRun_ once the picker is rendered, so the
  // select-all + generate happen at a race-free synchronization point.
  // The form never flashes: a loading pane covers the roster fetch +
  // generate; failures fall back to the primed form (insShowForm).
  function launcherOpenInsights_() {
    const btn = $('insights-report-btn');
    if (!btn) return;
    btn.click();
    if ($('ins-from')) $('ins-from').value = launcherIsoDaysAgo_(30);
    if ($('ins-to'))   $('ins-to').value   = launcherIsoDaysAgo_(1);
    const p = $('ins-preset');
    if (p) p.value = 'custom';
    insLauncherAutoRun_ = true;
    launcherShowLoading_('ins-launcher-loading', 'insights-form', 'insights-results',
      'How is my team doing lately?');
    insEnsureRoster();
  }

  // "Why did we miss calls recently?" -> Missed Calls on the most recent
  // date with data (the report reads the My Department From/To fields,
  // so we set those first, then keep the dept table consistent with a
  // background refresh).
  function launcherOpenMissed_() {
    const btn = $('missed-report-btn');
    if (!btn) return;
    const iso = latestDqeIso_ || launcherIsoDaysAgo_(1);
    if ($('from-date')) $('from-date').value = iso;
    if ($('to-date'))   $('to-date').value   = iso;
    clearActivePreset_();
    btn.click();        // openModal fetches with the dates just set
    refresh();          // keep the dept page's table in sync with its inputs
  }

  // "Is one of my agents struggling or improving?" -> Individual Report
  // primed with a 30-day window; agent choice is deliberately left to
  // the user (that IS the question), so no auto-run.
  function launcherOpenIndividual_() {
    const btn = $('individual-report-btn');
    if (!btn) return;
    btn.click();
    const provider = SHARE_STATE_['/report/individual'];
    if (provider) provider.apply({ from: launcherIsoDaysAgo_(30), to: launcherIsoDaysAgo_(1) });
    const search = $('ir-agent-search');
    if (search) search.focus();
  }

  // "Are callers giving up before we answer?" -> QCD report over the
  // last 30 days, auto-generated (no agent selection needed). Loading
  // pane instead of a form flash; failures fall back to the form.
  function launcherOpenQcd_() {
    const btn = $('qcd-report-btn');
    if (!btn) return;
    btn.click();
    const p = $('qcd-preset');
    if (p) { p.value = 'last30'; applyQcdPreset(); }
    launcherShowLoading_('qcd-launcher-loading', 'qcd-form', 'qcd-results',
      'Are callers giving up before we answer?');
    runQcdReport();
  }

  // -- Metric glossary (anti-intimidation layer) --------------------------
  // One central dictionary of plain-English metric definitions, applied as
  // hover tooltips (title=) on table headers and KPI labels everywhere --
  // static markup at init, dynamically-rendered report content via a
  // debounced MutationObserver. Matched elements pick up the .gloss class
  // (dotted underline + help cursor) so the affordance is discoverable.
  // Keys are normalized label text: lowercased, trimmed, sort-arrows and
  // trailing colons stripped.

  const METRIC_GLOSSARY_ = {
    'source': 'Where this agent matched into the department: ROSTER (on this dept’s roster), BOTH (roster + shared-queue activity), or QUEUE (a floater who handled this dept’s queue but is rostered elsewhere — shown for visibility, excluded from the totals row).',
    'unique': 'Distinct parent calls this agent was rung on inside the 8:30 AM–5:00 PM CST work window.',
    'rung': 'Times this agent’s phone rang inside the work window. A call that overflows across agents counts once per agent it rang.',
    'missed': 'Rings this agent didn’t pick up. A missed ring isn’t necessarily a lost call — another agent may have answered the same call.',
    'missed (rings)': 'Rings agents didn’t pick up. One call can ring several agents, so this counts RINGS, not lost calls — a missed ring is often answered by someone else. For calls callers actually gave up on, see Abandoned (queue data).',
    'att (daily avg)': 'Average Talk Time as the simple mean of each day’s stored ATT value. This is the My Department lens; the reports use the per-call weighted version, so the two can differ for the same range — neither is wrong, they answer different questions.',
    'att (per call)': 'Average Talk Time weighted by answered calls (total talk ÷ calls answered). Days with no answered calls don’t drag it down. The My Department table shows the daily-mean version instead, so the two can differ for the same range.',
    'avg talk (per call)': 'Average Talk Time weighted by answered calls (total talk ÷ calls answered). Longer isn’t automatically worse — it can mean thorough service.',
    'answered': 'Calls this agent answered inside the work window.',
    'ttt': 'Total Talk Time: the sum of this agent’s own conversation time on answered calls in the window.',
    'att': 'Average Talk Time per answered call. Longer isn’t automatically worse — it can mean thorough service; read it alongside % answered.',
    'avg abd wait': 'Average time abandoning callers waited before hanging up (across all of that day’s queues).',
    'csr avg abd wait': 'Average abandon wait for the CSR queues specifically.',
    '% answered': 'Answered calls as a share of calls that rang. The company-wide target is 92%.',
    'answer rate': 'Answered calls as a share of calls offered. The company-wide target is 92%.',
    'answer rate %': 'Answered calls as a share of calls offered. The company-wide target is 92%.',
    'abandoned': 'Callers who hung up while waiting in the queue, before any agent answered.',
    'abandoned %': 'Share of queue calls where the caller hung up before being answered. 5% or more on a day counts as a violation.',
    'aband. %': 'Share of calls where the caller hung up before being answered. 5% or more is over the abandon threshold.',
    'abandon rate %': 'Share of calls where the caller hung up before being answered. 5% or more is over the abandon threshold.',
    'violations': 'Days where a queue’s abandoned % exceeded the 5% threshold. Month-to-date in the totals row.',
    'longest wait': 'The single longest time any caller waited in the queue that day.',
    'avg answer': 'Average time callers waited before an agent answered.',
    'avg wait': 'Average time callers waited in the queue before being answered or giving up.',
    'total calls': 'All calls offered to the queue, answered or not.',
    'on-hold abandon': 'Calls an agent answered but the caller later hung up while parked on hold.',
    'entry queue': 'The first queue the call entered. A call that overflows to another department still attributes to its entry queue’s department.',
    'dial-in number': 'The phone number the caller dialed to reach us.',
    'insurer': 'The insurance company a caller’s number is registered to in the DO NOT EDIT! insurance block. Unregistered numbers show as (unlabeled).',
    'inbound calls': 'Every distinct call that dialed in during the range, answered or not.',
    'abandoned on hold': 'Calls an agent answered but the caller later hung up while parked on hold.',
    'abandoned in ivr': 'Callers who hung up in the phone menu before reaching any queue — unattributable to a department, so shown on the company view only.',
    'avg hold': 'Average time answered callers spent parked on hold.',
  };
  // KPI tile labels are variants of the same metrics -- alias them to
  // one definition each so the glossary never drifts per surface.
  (function () {
    const g = METRIC_GLOSSARY_;
    g['total rung']   = g['rung'];
    g['total missed'] = g['missed'];
    g['total ttt']    = g['ttt'];
    g['avg att']      = g['att'];
    g['avg talk']     = g['att'];
  })();

  function glossaryKeyFor_(el) {
    let text = (el.textContent || '');
    return text.replace(/[▲▼↑↓]/g, '')   // sort arrows
               .replace(/\s+/g, ' ').trim().toLowerCase()
               .replace(/:$/, '');
  }

  function applyGlossaryTooltips_(root) {
    if (!root || !root.querySelectorAll) return;
    const sel = 'th, .ir-kpi-label, .pr-kpi-label, .dept-qcd-label, .ov-dept-stat-label';
    root.querySelectorAll(sel).forEach(function (el) {
      if (el.title) return;                       // never clobber an existing tooltip
      const def = METRIC_GLOSSARY_[glossaryKeyFor_(el)];
      if (!def) return;
      el.title = def;
      el.classList.add('gloss');
    });
  }

  function initMetricGlossary_() {
    applyGlossaryTooltips_(document);
    // Report tables/tiles render after async fetches; a debounced
    // childList observer re-applies over the whole document (cheap:
    // a few hundred elements, and already-titled ones short-circuit).
    let timer = null;
    const obs = new MutationObserver(function () {
      if (timer) clearTimeout(timer);
      timer = setTimeout(function () { applyGlossaryTooltips_(document); }, 250);
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  // -- Universal benchmark tints (anti-intimidation layer) ----------------
  // The install has exactly two company-wide standards: the 92% answer-
  // rate target (the Overview chart baseline) and the 5% abandoned-%
  // violation threshold (the QCD pipeline rule). This helper applies them
  // consistently to KPI tile values so a manager reading ANY report sees
  // the same green-at-target / orange-over-threshold language the QCD and
  // Overview surfaces already speak. Dept-specific ALERT thresholds stay
  // with the Alerts engine -- no invented thresholds here.
  function benchValueCls_(label, formatted) {
    const text = String(label).replace(/<[^>]*>/g, '').toLowerCase();
    const str = String(formatted);
    if (str.indexOf('%') === -1) return '';
    const num = parseFloat(str);
    if (!isFinite(num)) return '';
    if (/answer/.test(text)) return num >= 92 ? ' bm-target' : '';
    if (/aband/.test(text))  return num >= 5  ? ' bm-over'   : '';
    return '';
  }

  // -- Answer-first headlines (anti-intimidation layer) ------------------
  // Every report's results open with 2-3 PLAIN-ENGLISH sentences composed
  // client-side from the payload it already received (no server change,
  // no cache bump). The charts/tables stay; the headline just answers
  // "what does this say?" before the manager has to read a number. Each
  // composer guards its no-data case; an empty sentence list hides the
  // block entirely.

  /**
   * Renders `sentences` (pre-escaped HTML strings) into a headline block
   * at the top of `containerId`'s results -- inserted right after the
   * `.ir-results-header` (or as the first child when there isn't one,
   * e.g. the Missed Calls modal body). Creates the element on first use.
   */
  function reportHeadline_(id, containerId, sentences) {
    const container = $(containerId);
    if (!container) return;
    let el = $(id);
    if (!el) {
      el = document.createElement('div');
      el.id = id;
      el.className = 'report-headline';
      const header = container.querySelector('.ir-results-header');
      if (header) {
        // Insert after the header AND after any status / loading / error
        // elements that immediately follow it, so transient "Loading…" and
        // error banners always render ABOVE the headline, not under it.
        let anchor = header.nextElementSibling;
        while (anchor && (anchor.classList.contains('status')
                          || anchor.classList.contains('ir-loader')
                          || anchor.classList.contains('empty-state'))) {
          anchor = anchor.nextElementSibling;
        }
        container.insertBefore(el, anchor);
      }
      // Anchor without a results header (e.g. the Missed modal's
      // summary strip): place the headline just above the anchor.
      else container.parentNode.insertBefore(el, container);
    }
    const lines = (sentences || []).filter(function (s) { return !!s; });
    if (!lines.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = '';
    el.innerHTML = '<div class="report-headline-kicker">At a glance</div>'
      + lines.map(function (s) { return '<div class="report-headline-line">' + s + '</div>'; }).join('');
  }

  /**
   * "…, up 8.2% vs the prior period" phrase from a deltaBlock. Empty
   * string when there's no meaningful prior; "about the same" inside
   * the noise band. pctPoints deltas read as "points".
   */
  function headlineDeltaPhrase_(stat) {
    if (!stat || (Number(stat.prev || 0) === 0 && Number(stat.val || 0) === 0)) return '';
    const dp = Number(stat.deltaPct || 0);
    if (Math.abs(dp) < 0.05) return ', about the same as the prior period';
    return ', ' + (dp > 0 ? 'up ' : 'down ') + Math.abs(dp).toFixed(1)
         + (stat.type === 'pctPoints' ? ' points' : '%') + ' vs the prior period';
  }

  function headlineName_(n) { return '<strong>' + escapeHtml(n) + '</strong>'; }

  function insHeadline_(data) {
    const t = data.teamStats || {};
    if (!Number((t.rung || {}).val) && !Number((t.rung || {}).prev)) {
      return ['No call activity for the selected agents in this range.'];
    }
    const s = [];
    s.push('Your team answered <strong>' + escapeHtml(String((t.answered || {}).formatted || 0))
      + '</strong> of ' + escapeHtml(String((t.rung || {}).formatted || 0))
      + ' rung calls (<strong>' + escapeHtml(String((t.pct || {}).formatted || '0%')) + '</strong>'
      + headlineDeltaPhrase_(t.pct) + ').');
    const cards = data.agentData || [];
    if (cards.length > 1) {
      let top = null, bottom = null;
      cards.forEach(function (c) {
        const score = deltaImprovementScore_(c.metrics);
        if (!top || score > top.score) top = { name: c.name, score: score };
        if (!bottom || score < bottom.score) bottom = { name: c.name, score: score };
      });
      const bits = [];
      if (top && top.score > 5) bits.push(headlineName_(top.name) + ' improved the most');
      if (bottom && bottom.score < -5 && (!top || bottom.name !== top.name)) {
        bits.push(headlineName_(bottom.name) + ' slipped the most');
      }
      if (bits.length) s.push(bits.join('; ') + ' vs the prior window.');
      const regressed = cards.filter(function (c) { return deltaClassify_(c.metrics) === 'regressed'; }).length;
      if (regressed > 0) {
        s.push(regressed + ' agent' + (regressed === 1 ? '' : 's')
          + ' regressed overall — their cards carry the orange edge below.');
      }
    }
    // Queue health: one sentence when the abandon rate crosses the 5%
    // threshold (the only company-wide queue standard).
    const qh = data.queueHealth;
    if (qh && qh.totals && Number(qh.totals.totalCalls) > 0 && Number(qh.totals.abandonedPct) >= 5) {
      s.push('Heads up: callers abandoned <strong>'
        + escapeHtml(String(qh.totals.abandonedPctStr)) + '</strong> of queue calls — over the 5% threshold (see Queue health below).');
    }
    return s.slice(0, 3);
  }

  function prHeadline_(data) {
    const t = data.teamStats || {};
    if (!Number((t.rung || {}).val) && !Number((t.rung || {}).prev)) {
      return ['No call activity for the selected agents in this range.'];
    }
    const s = [];
    s.push('Your team answered <strong>' + escapeHtml(String((t.answered || {}).formatted || 0))
      + '</strong> of ' + escapeHtml(String((t.rung || {}).formatted || 0))
      + ' rung calls (<strong>' + escapeHtml(String((t.pct || {}).formatted || '0%')) + '</strong>'
      + headlineDeltaPhrase_(t.pct) + ').');
    const ins = data.teamInsights || [];
    if (ins.length && ins[0].text) s.push(escapeHtml(ins[0].text));
    return s;
  }

  function crHeadline_(data) {
    const t = data.teamStats || {};
    const p2 = (t.answered || {}).formatted, p1 = (t.answered || {}).prevFormatted;
    if (p2 == null) return [];
    const s = [];
    s.push('Period 2: <strong>' + escapeHtml(String(p2)) + '</strong> answered ('
      + escapeHtml(String((t.pct || {}).formatted || '0%')) + ') vs Period 1: '
      + escapeHtml(String(p1 == null ? '0' : p1)) + ' ('
      + escapeHtml(String((t.pct || {}).prevFormatted || '0%')) + ').');
    const cards = data.agentData || [];
    if (cards.length > 1) {
      let up = 0, down = 0, flat = 0;
      cards.forEach(function (a) {
        const cls = crClassifyAgent_(a);
        if (cls === 'improved') up++; else if (cls === 'regressed') down++; else flat++;
      });
      s.push(up + ' agent' + (up === 1 ? '' : 's') + ' improved, ' + down + ' regressed, and '
        + flat + ' showed little change between the two periods.');
    }
    return s;
  }

  function irHeadline_(data) {
    const cards = data.summaryData || [];
    if (!cards.length) return [];
    if (data.mode !== 'comparison') {
      const a = cards[0];
      const raw = a.raw || {};
      if (!raw.rung) return [headlineName_(a.name) + ' had no rung calls in this range.'];
      const teamPct = (data.teamAvg && data.teamAvg.raw && data.teamAvg.raw.pctAnswered) || 0;
      const diff = (raw.pct || 0) - teamPct;
      let vsTeam = '';
      if (teamPct > 0) {
        vsTeam = Math.abs(diff) < 1
          ? ', right around the team average'
          : ', about ' + Math.abs(diff).toFixed(1) + ' points '
            + (diff > 0 ? 'above' : 'below') + ' the team average ('
            + teamPct.toFixed(1) + '%)';
      }
      const s = [headlineName_(a.name) + ' answered <strong>' + escapeHtml(String(a.stats.answered))
        + '</strong> of ' + escapeHtml(String(a.stats.rung)) + ' rung calls (<strong>'
        + escapeHtml(String(a.stats.pct)) + '</strong>' + vsTeam + ').'];
      const ins = a.insights || [];
      if (ins.length && ins[0].text) s.push(escapeHtml(ins[0].text));
      return s;
    }
    let top = cards[0];
    cards.forEach(function (c) { if ((c.raw || {}).answered > (top.raw || {}).answered) top = c; });
    return ['Comparing ' + cards.length + ' agents. ' + headlineName_(top.name)
      + ' answered the most calls (<strong>' + escapeHtml(String(top.stats.answered))
      + '</strong>, ' + escapeHtml(String(top.share.answered)) + ' of the group\'s total).'];
  }

  function missedHeadline_(meta) {
    if (!meta) return [];
    const missed = Number(meta.totalMissed || 0);
    const abandoned = Number(meta.abandonedCallCount || 0);
    const noRing = Number(meta.noRingAbandonCount || 0);
    if (!missed && !abandoned) {
      return ['No missed calls in this range — every rung call was picked up.'];
    }
    const s = ['Your team missed <strong>' + fmtNumber(missed) + '</strong> ring'
      + (missed === 1 ? '' : 's') + ' in this range.'];
    if (abandoned > 0) {
      s.push('<strong>' + fmtNumber(abandoned) + '</strong> call' + (abandoned === 1 ? '' : 's')
        + ' were abandoned — the caller hung up before anyone answered'
        + (noRing > 0 ? ', including ' + fmtNumber(noRing) + ' that never rang any agent' : '') + '.');
    }
    return s;
  }

  function qcdHeadline_(data) {
    const t = data.totals || {};
    if (!Number(t.totalCalls)) return ['No queue activity in this range.'];
    const pct = Number(t.abandonedPct || 0);
    const s = ['<strong>' + escapeHtml(String(t.abandonedPctStr || '0%')) + '</strong> of callers abandoned before being answered ('
      + fmtNumber(t.abandoned || 0) + ' of ' + fmtNumber(t.totalCalls || 0) + ' calls) — '
      + (pct >= 5 ? 'above' : 'within') + ' the 5% violation threshold.'];
    if (Number(t.violations) > 0) {
      s.push('<strong>' + fmtNumber(t.violations) + '</strong> violation day'
        + (Number(t.violations) === 1 ? '' : 's') + ' so far this month.');
    }
    return s;
  }

  function inboundHeadline_(data) {
    const k = data.kpis || {}, p = data.kpisPrior || {};
    const meta = data.meta || {};
    if (!Number(k.total)) return ['No inbound calls in this range.'];
    const ratePhrase = headlineDeltaPhrase_({
      val: k.answerRate, prev: p.answerRate,
      deltaPct: (Number(k.answerRate) || 0) - (Number(p.answerRate) || 0),
      type: 'pctPoints',
    });
    const s = ['You received <strong>' + fmtNumber(k.total) + '</strong> inbound calls; <strong>'
      + escapeHtml(String(k.answerRate || 0)) + '%</strong> were answered' + ratePhrase + '.'];
    if (Number(k.abandonedOnHold) > 0) {
      s.push(fmtNumber(k.abandonedOnHold) + ' caller' + (Number(k.abandonedOnHold) === 1 ? '' : 's')
        + ' hung up while on hold.');
    }
    if (meta.companyView && Number(k.abandonedIvr) > 0) {
      s.push(fmtNumber(k.abandonedIvr) + ' abandoned in the IVR before reaching any queue.');
    }
    return s.slice(0, 3);
  }

  // -- Missed Calls Report modal -----------------------------------------
  // Opens with the dashboard's current dept/from/to/scope. Fetches via
  // google.script.run.getMissedCallsReport, renders a Chart.js bar chart
  // for the hour-of-day distribution + a per-agent card grid with each
  // agent's missed-call timestamps (abandoned ones marked).
  //
  // Re-fetches every time the modal opens (cheap; respects 5-min server
  // cache). The Chart instance is kept on a closure variable and updated
  // on subsequent renders rather than re-instantiated.

  let missedChart = null;
  let lastMissedData = null;       // last server response (for chart-click drill-in)
  let activeBucketIdx = -1;        // currently-shown detail bucket; -1 = none

  function initMissedReport() {
    const btn = $('missed-report-btn');
    const modal = $('missed-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      // The modal carries its OWN range (drill-down), defaulted from the
      // My Department fields on every open so it starts in sync.
      if ($('missed-from')) $('missed-from').value = $('from-date').value;
      if ($('missed-to'))   $('missed-to').value   = $('to-date').value;
      fetchAndRender();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Drill-down range controls (modal-local).
    const missedRefresh = $('missed-refresh-btn');
    if (missedRefresh) missedRefresh.addEventListener('click', fetchAndRender);
    ['missed-from', 'missed-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', fetchAndRender);
    });

    // Close button on the bucket-detail panel (chart drill-in).
    const detailClose = $('bucket-detail-close');
    if (detailClose) detailClose.addEventListener('click', hideBucketDetail);

    function fetchAndRender() {
      const dept = getRequestedDept();
      const req = {
        department: dept,
        // Modal-local range when present (drill-down); falls back to the
        // page fields for safety.
        from: ($('missed-from') && $('missed-from').value) || $('from-date').value,
        to:   ($('missed-to')   && $('missed-to').value)   || $('to-date').value,
      };

      setMissedStatus('loading', 'Loading missed-call data...');
      $('missed-summary').innerHTML = '';
      $('missed-agents').innerHTML = '';
      // Destroy any previous chart + canvas so the stale visual
      // doesn't linger while the new fetch is in flight.
      clearMissedChart();
      hideBucketDetail();
      hideQueueOnlySection();
      lastMissedData = null;

      google.script.run
        .withSuccessHandler(renderMissedReport)
        .withFailureHandler(function (err) {
          setMissedStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
        })
        .getMissedCallsReport(req);
    }
  }

  function clearMissedChart() {
    if (missedChart) {
      missedChart.destroy();
      missedChart = null;
    }
    const wrap = $('missed-chart-wrap');
    if (wrap) {
      wrap.innerHTML = '<div class="chart-loading">Loading chart&hellip;</div>';
    }
  }

  function setMissedStatus(kind, msg) {
    const el = $('missed-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function renderMissedReport(data) {
    if (!data) {
      setMissedStatus('error', 'No data returned.');
      return;
    }
    setMissedStatus(null);
    lastMissedData = data;

    const m = data.meta || {};
    reportHeadline_('missed-headline', 'missed-summary', missedHeadline_(m));
    const summaryParts = [
      '<span class="label">Department:</span><span class="val">' + escapeHtml(m.department || '') + '</span>',
      '<span class="label">Range:</span><span class="val">' + escapeHtml(m.from || '') + ' to ' + escapeHtml(m.to || '') + '</span>',
      '<span class="label">Total missed:</span><span class="val">' + fmtNumber(m.totalMissed || 0) + '</span>',
      // Total abandoned (rang-an-agent + queue-only). One abandoned
      // parent counts as 1 regardless of how many agents rang.
      '<span class="label">Abandoned calls:</span><span class="val">' + fmtNumber(m.abandonedCallCount || 0) + '</span>',
    ];
    // Only surface "No-ring abandons" when there are any, so the
    // summary stays tidy on typical days.
    if ((m.noRingAbandonCount || 0) > 0) {
      summaryParts.push(
        '<span class="label">No-ring abandons:</span><span class="val">' +
          fmtNumber(m.noRingAbandonCount) + '</span>'
      );
    }
    summaryParts.push(
      '<span class="label">Agents:</span><span class="val">' + fmtNumber(m.agentCount || 0) + '</span>'
    );
    $('missed-summary').innerHTML = summaryParts.join('<span class="sep">|</span>');

    renderMissedChart(data.chart || { labels: [], counts: [] });
    renderQueueOnly(data.queueOnly || []);
    renderMissedAgents(data.agents || []);
  }

  /**
   * SHARED radar config for the missed-calls 30-min bucket chart --
   * consumed by the Missed Calls modal AND the My Department drill-down
   * section, so the two visualizations can't drift. `onBucketClick`
   * receives the clicked bucket index (or pass null for non-interactive).
   * datalabels stay off in boolean form (INV-41).
   */
  function missedRadarCfg_(chart, onBucketClick) {
    return {
      type: 'radar',
      data: {
        labels: chart.labels || [],
        datasets: [{
          label: 'Missed calls',
          data: chart.counts || [],
          fill: true,
          backgroundColor: THEME.warnSoft,
          borderColor: THEME.warn,
          pointBackgroundColor: THEME.warn,
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) { return items[0].label + ' CST'; },
              label: function (item) { return item.parsed.r + ' missed call' + (item.parsed.r === 1 ? '' : 's'); }
            }
          },
          // Opt out of datalabels -- the plugin is registered
          // globally for the report charts (PR / CR / IR) that DO
          // want labels; the missed-calls radar would get
          // default-rendered labels on all 18 buckets without this.
          datalabels: { display: false }
        },
        scales: {
          r: {
            beginAtZero: true,
            ticks: { display: false, stepSize: 1 },
            pointLabels: {
              font: { size: 10 },
              // Make the 18 axis labels feel clickable too -- they
              // open the same detail panel as a data-point click.
              padding: 6
            }
          }
        },
        layout: { padding: 10 },
        // Click a data point (or the axis label nearest a point) to
        // see the contributing rings for that 30-min bucket.
        onClick: function (evt, items, chartObj) {
          if (!onBucketClick) return;
          if (items && items.length) {
            onBucketClick(items[0].index);
            return;
          }
          // Allow clicking near an axis label even if not exactly on a
          // data point: snap to the nearest point.
          const near = chartObj.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
          if (near && near.length) onBucketClick(near[0].index);
        }
      }
    };
  }

  function renderMissedChart(chart) {
    const wrap = $('missed-chart-wrap');
    if (!wrap) return;

    // Recreate the canvas (clearMissedChart() replaced the container
    // contents with a loading placeholder).
    wrap.innerHTML = '<canvas id="missed-chart" aria-label="Hour-of-day distribution of missed calls"></canvas>';
    const canvas = $('missed-chart');

    if (typeof Chart === 'undefined') {
      // Chart.js failed to load (CDN blocked?). Surface a fallback.
      wrap.innerHTML = '<p class="chart-loading">Chart library failed to load. The agent grid below still shows the data.</p>';
      return;
    }

    const ctx = canvas.getContext('2d');
    // Radar chart, matching the legacy DQE Report's missed-calls
    // visualization (clock-like, with each axis = a 30-min bucket).
    // Modal version drills into the per-bucket detail panel on click.
    const cfg = missedRadarCfg_(chart, function (idx) { toggleBucketDetail(idx); });

    // Refresh THEME tokens right before chart creation so values
    // resolved late reach Chart.defaults pre-instantiation.
    refreshChartTheme();
    // Canvas is always freshly recreated above, so we always
    // instantiate a new Chart rather than update an existing one.
    missedChart = new Chart(ctx, cfg);
  }

  // -- Bucket detail (chart drill-in) ------------------------------------
  // Click a chart bucket -> show all rings (date, agent, time) that
  // contributed to that 30-min slot. Click the same bucket again, or
  // the "Close" link, to dismiss. Hidden on every fresh fetch.

  function toggleBucketDetail(idx) {
    if (idx === activeBucketIdx) {
      hideBucketDetail();
    } else {
      showBucketDetail(idx);
    }
  }

  function showBucketDetail(idx) {
    if (!lastMissedData || !lastMissedData.chart || !lastMissedData.agents) return;
    const labels = lastMissedData.chart.labels || [];
    if (idx < 0 || idx >= labels.length) return;

    activeBucketIdx = idx;
    const bucketLabel = labels[idx];

    // Collect every event whose .bucket matches idx, across both
    // agent rings AND queue-only abandoned entries. Queue entries
    // are displayed with the queue name in the agent column and a
    // "(no agent rang)" suffix.
    const rings = [];
    (lastMissedData.agents || []).forEach(function (a) {
      a.missedTimes.forEach(function (m) {
        if (m.bucket === idx) {
          rings.push({
            agent: a.name,
            date: m.date,
            label: m.label,
            abandoned: m.abandoned,
            parentId: m.parentId || null,
            sortKey: m.sortKey,
            isQueueOnly: false,
          });
        }
      });
    });
    (lastMissedData.queueOnly || []).forEach(function (q) {
      q.entries.forEach(function (m) {
        if (m.bucket === idx) {
          rings.push({
            agent: q.queue + ' (no agent rang)',
            date: m.date,
            label: m.label,
            abandoned: true,
            parentId: m.parentId || null,
            sortKey: m.sortKey,
            isQueueOnly: true,
          });
        }
      });
    });
    rings.sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return (a.sortKey || 0) - (b.sortKey || 0);
    });

    const titleEl = $('bucket-detail-title');
    const bodyEl  = $('bucket-detail-body');
    const wrap    = $('missed-bucket-detail');
    if (!titleEl || !bodyEl || !wrap) return;

    titleEl.textContent = bucketLabel + ' CST  ·  ' + rings.length
                        + ' ring' + (rings.length === 1 ? '' : 's');

    if (!rings.length) {
      bodyEl.innerHTML = '<p class="bucket-detail-empty">No rings in this bucket.</p>';
    } else {
      bodyEl.innerHTML = '<ul class="bucket-detail-list">' + rings.map(function (r) {
        const cls = r.abandoned ? 'abandoned' : '';
        const siren = r.abandoned ? ' 🚨' : '';
        const dateLabel = r.date ? r.date.slice(5) : '';   // MM-DD
        return '<li class="' + cls + '">'
             +   '<span class="ring-date">'  + escapeHtml(dateLabel) + '</span>'
             +   '<span class="ring-agent">' + escapeHtml(r.agent)   + '</span>'
             +   '<span class="ring-time">'  + escapeHtml(r.label) + siren
             +     parentIdBadge(r.parentId)
             +   '</span>'
             + '</li>';
      }).join('') + '</ul>';
    }

    wrap.style.display = '';
    const row = $('chart-row');
    if (row) row.classList.remove('no-detail');
    initClipboardOnce();
    // Scroll the panel into view if it's offscreen below the chart.
    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideBucketDetail() {
    activeBucketIdx = -1;
    const wrap = $('missed-bucket-detail');
    if (!wrap) return;
    wrap.style.display = 'none';
    const bodyEl = $('bucket-detail-body');
    if (bodyEl) bodyEl.innerHTML = '';
    const row = $('chart-row');
    if (row) row.classList.add('no-detail');
  }

  // Renders the parent-call-ID chip + copy button used on every
  // abandoned timestamp. Pasting the parent ID into raw CDR search
  // is the manual verification step, so the copy button is worth
  // the extra DOM. Returns '' for falsy IDs (non-abandoned rows).
  function parentIdBadge(parentId) {
    if (!parentId) return '';
    const safe = escapeHtml(String(parentId));
    return ' <span class="parent-id" title="Parent call ID">'
         +   '<span class="pid-num">#' + safe + '</span>'
         +   '<button type="button" class="pid-copy" '
         +     'data-pid="' + safe + '" '
         +     'aria-label="Copy parent ID ' + safe + '" '
         +     'title="Copy">📋</button>'
         + '</span>';
  }

  // Renders the "[also rang Backup CSR, A_Q_Spanish]" suffix used on
  // queue-only entries when the same parent ID appears under multiple
  // queue sentinels (overflow). Empty when the call only hit this
  // queue, so no visual noise on the common case.
  function alsoInBadge(alsoIn) {
    if (!alsoIn || !alsoIn.length) return '';
    return ' <span class="also-in">'
         +   '[also rang ' + alsoIn.map(escapeHtml).join(', ') + ']'
         + '</span>';
  }

  // Wire a single delegated click handler for ALL copy buttons inside
  // the missed-calls modal. data-pid carries the value; we use the
  // async Clipboard API with a fallback no-op + visual confirmation
  // (button flips to ✓ for ~1s) so the user knows it worked.
  function initClipboardOnce() {
    if (initClipboardOnce.done) return;
    initClipboardOnce.done = true;
    const modal = $('missed-modal');
    if (!modal) return;
    modal.addEventListener('click', function (e) {
      const btn = e.target.closest && e.target.closest('.pid-copy');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const pid = btn.getAttribute('data-pid') || '';
      if (!pid) return;
      const flashOk = function () {
        const prev = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = prev;
          btn.classList.remove('copied');
        }, 1000);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pid).then(flashOk, function () {});
      } else {
        // Apps Script web app may run in a sandboxed iframe where
        // clipboard API is unavailable; fall back to a hidden textarea
        // + execCommand so copy still works in older paths.
        try {
          const ta = document.createElement('textarea');
          ta.value = pid;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          flashOk();
        } catch (err) { /* swallow */ }
      }
    });
  }

  // -- Queue-only abandoned section --------------------------------------
  // Renders a banner + per-queue lists for abandoned calls that never
  // rang an agent (queue had no available agent). Hidden when empty.

  function renderQueueOnly(queueOnly) {
    const wrap = $('missed-queue-only');
    const body = $('queue-only-body');
    const sub  = $('queue-only-subhead');
    if (!wrap || !body) return;

    if (!queueOnly.length) {
      hideQueueOnlySection();
      return;
    }

    // Headline uses unique-by-parent-ID count alongside the per-queue
    // event sum, so overflow (one call ringing two queues) is visible:
    //   "8 unique calls across 3 queues (10 ring events)"
    // Fall back to the raw sum if the server didn't send the unique
    // count (older cached payload).
    const meta = (lastMissedData && lastMissedData.meta) || {};
    const eventSum = (typeof meta.queueOnlyEventCount === 'number')
                   ? meta.queueOnlyEventCount
                   : queueOnly.reduce(function (s, q) { return s + q.total; }, 0);
    const uniqueCalls = (typeof meta.queueOnlyUniqueCount === 'number')
                      ? meta.queueOnlyUniqueCount
                      : eventSum;
    const headParts = [
      uniqueCalls + ' unique call' + (uniqueCalls === 1 ? '' : 's'),
      'across ' + queueOnly.length + ' queue' + (queueOnly.length === 1 ? '' : 's'),
    ];
    if (eventSum !== uniqueCalls) {
      headParts.push('(' + eventSum + ' ring events)');
    }
    sub.textContent = '(no agent rang) — ' + headParts.join(' ');

    body.innerHTML = queueOnly.map(function (q) {
      const itemsHtml = q.entries.map(function (m) {
        const dateLabel = m.date ? m.date.slice(5) : '';   // MM-DD
        return '<li>'
             +   '<span class="ring-date">' + escapeHtml(dateLabel) + '</span>'
             +   '<span class="ring-time">' + escapeHtml(m.label)   + ' 🚨'
             +     parentIdBadge(m.parentId)
             +     alsoInBadge(m.alsoIn)
             +   '</span>'
             + '</li>';
      }).join('');
      return '<div class="queue-only-card">'
           +   '<div class="qname">' + escapeHtml(q.queue) + ' &middot; '
           +     q.total + ' abandoned</div>'
           +   '<ul class="queue-only-list">' + itemsHtml + '</ul>'
           + '</div>';
    }).join('');

    wrap.style.display = '';
    initClipboardOnce();
  }

  function hideQueueOnlySection() {
    const wrap = $('missed-queue-only');
    if (!wrap) return;
    wrap.style.display = 'none';
    const body = $('queue-only-body');
    if (body) body.innerHTML = '';
  }

  function renderMissedAgents(agents) {
    const wrap = $('missed-agents');
    if (!wrap) return;

    if (!agents.length) {
      wrap.innerHTML = emptyStateHtml_('&#128276;', 'No missed calls in this range',
        'No agent in scope had a missed or abandoned call for the selected dates.');
      return;
    }

    wrap.innerHTML = agents.map(function (a) {
      const itemsHtml = a.missedTimes.map(function (m) {
        const dateLabel = m.date ? '<span class="date">' + escapeHtml(m.date.slice(5)) + '</span>' : '';
        const cls = m.abandoned ? 'abandoned' : '';
        const siren = m.abandoned ? ' 🚨' : '';
        return '<li class="' + cls + '">'
             +   dateLabel + escapeHtml(m.label) + siren
             +   parentIdBadge(m.parentId)
             + '</li>';
      }).join('');

      return '<div class="agent-card">'
           +   '<div class="agent-name">' + escapeHtml(a.name) + '</div>'
           +   '<div class="agent-total">' + a.total + ' missed</div>'
           +   '<ul class="missed-list">' + itemsHtml + '</ul>'
           + '</div>';
    }).join('');
    initClipboardOnce();
  }

  function getRequestedDept() {
    if (USER.role === 'admin') {
      const sel = $('dept-selector');
      return sel ? sel.value : '';
    }
    return USER.department || '';
  }

  function setStatus(kind, msg) {
    const el = $('status');
    var skel = $('dept-table-skeleton');
    var empt = $('dept-empty-state');
    if (!kind) {
      el.style.display = 'none'; el.textContent = '';
      if (skel) skel.style.display = 'none';
      if (empt) empt.style.display = 'none';
      return;
    }
    if (kind === 'loading') {
      el.style.display = 'none';
      if (empt) empt.style.display = 'none';
      if (skel) skel.style.display = '';
      return;
    }
    if (skel) skel.style.display = 'none';
    if (kind === 'empty') {
      el.style.display = 'none';
      if (empt) {
        var title = $('dept-empty-title');
        var hint  = $('dept-empty-hint');
        if (title) title.textContent = 'No agent data found';
        if (hint) hint.textContent = msg || '';
        empt.style.display = '';
      }
      return;
    }
    if (empt) empt.style.display = 'none';
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function refresh() {
    const dept = getRequestedDept();
    if (!dept) {
      setStatus('error', 'No department available.');
      return;
    }
    const req = {
      department: dept,
      from: $('from-date').value,
      to: $('to-date').value,
    };
    if (!req.from || !req.to) {
      setStatus('error', 'Pick a from and to date.');
      return;
    }

    setStatus('loading', 'Loading...');
    $('refresh-btn').disabled = true;
    // Page title belongs to the dept page; only update it when
    // we're actually showing that page (otherwise we'd clobber
    // "Departments Snapshot" on the Overview).
    if (document.body.getAttribute('data-page') !== 'overview') {
      $('page-title').textContent = dept;
    }

    google.script.run
      .withSuccessHandler(onData)
      .withFailureHandler(onError)
      .getDepartmentSummary(req);
  }

  function onData(data) {
    $('refresh-btn').disabled = false;
    state.rows = (data && data.rows) || [];
    state.totals = (data && data.totals) || null;
    var csvBtn = $('csv-export-btn');
    if (csvBtn) csvBtn.style.display = state.rows.length ? '' : 'none';
    state.meta = (data && data.meta) || null;
    state.diagnostics = (data && data.diagnostics) || null;

    var dqeHeader = $('dqe-table-header');
    if (dqeHeader) {
      dqeHeader.style.display = state.rows.length ? '' : 'none';
      var dqeDateEl = $('dqe-table-date');
      if (dqeDateEl) {
        var f = $('from-date') ? $('from-date').value : '';
        var t = $('to-date') ? $('to-date').value : '';
        dqeDateEl.textContent = (f && t) ? (f === t ? f : f + ' to ' + t) : '';
      }
    }

    // Mock banner (only shown if the server flagged a mocked response;
    // Step D returns real data so this should always hide).
    const banner = $('mock-banner');
    if (state.meta && state.meta.mock) {
      banner.style.display = '';
    } else {
      banner.style.display = 'none';
    }

    if (!state.rows.length) {
      var hint = state.meta && state.meta.rosterSize === 0
        ? 'No agents are mapped to this department in the roster sheet. Check the DO NOT EDIT! tab or contact your admin.'
        : 'No activity found for this date range. Try expanding the range, or check that the daily import has run (Pipeline Health in the Alerts modal).';
      setStatus('empty', hint);
    } else {
      setStatus(null);
    }
    render();
    renderInfoLine();
    renderDeptQcdSnapshot_(data && data.qcd);
    deptMissedFetch_();
    renderDiagnostics();
  }

  // -- Missed Calls drill-down on My Department (consolidation phase B) --
  // Auto-generates the missed-calls summary (headline + radar) for the
  // SAME range as the agent table, after every summary load. Independent
  // async: a failure hides the section and never blocks the table. The
  // "Full report" button (and a radar click) opens the Missed Calls
  // modal, which carries its own range for deeper digging.
  let deptMissedChart = null;
  let deptMissedReqKey = '';   // ignore out-of-order responses

  function deptMissedFetch_() {
    const wrap = $('dept-missed-section');
    if (!wrap) return;
    const dept = getRequestedDept();
    const from = $('from-date').value, to = $('to-date').value;
    if (!dept || !from || !to) { wrap.style.display = 'none'; return; }
    const key = dept + '|' + from + '|' + to;
    deptMissedReqKey = key;
    google.script.run
      .withSuccessHandler(function (data) {
        if (deptMissedReqKey !== key) return;   // stale response
        deptMissedRender_(data, from, to);
      })
      .withFailureHandler(function () {
        if (deptMissedReqKey !== key) return;
        wrap.style.display = 'none';
      })
      .getMissedCallsReport({ department: dept, from: from, to: to });
  }

  function deptMissedRender_(data, from, to) {
    const wrap = $('dept-missed-section');
    if (!wrap) return;
    const m = (data && data.meta) || {};

    const dateEl = $('dept-missed-date');
    if (dateEl) dateEl.textContent = from === to ? from : from + ' to ' + to;

    // Headline (same composer the modal uses).
    const head = $('dept-missed-headline');
    if (head) {
      const lines = missedHeadline_(m);
      head.innerHTML = lines.length
        ? '<div class="report-headline-kicker">At a glance</div>'
          + lines.map(function (l) { return '<div class="report-headline-line">' + l + '</div>'; }).join('')
        : '';
      head.style.display = lines.length ? '' : 'none';
    }

    // Radar: same shared config as the modal (clicks open the full
    // report rather than the in-modal bucket panel).
    const chartWrap = $('dept-missed-chart-wrap');
    if (deptMissedChart) { try { deptMissedChart.destroy(); } catch (e) {} deptMissedChart = null; }
    const hasMissed = Number(m.totalMissed || 0) > 0 || Number(m.abandonedCallCount || 0) > 0;
    if (chartWrap) {
      chartWrap.style.display = hasMissed ? '' : 'none';
      if (hasMissed && typeof Chart !== 'undefined') {
        chartWrap.innerHTML = '<canvas id="dept-missed-chart" aria-label="Hour-of-day distribution of missed calls"></canvas>';
        refreshChartTheme();
        const openFull = function () { const b = $('missed-report-btn'); if (b) b.click(); };
        deptMissedChart = new Chart($('dept-missed-chart').getContext('2d'),
          missedRadarCfg_((data && data.chart) || { labels: [], counts: [] },
                          function () { openFull(); }));
      }
    }
    wrap.style.display = '';
  }

  /**
   * "Yesterday's QCD" mini-section under the agent table on My
   * Department. Server returns data.qcd as the dept's most-recent
   * QCD daily roll-up (sum across mapped queues; null when the
   * dept isn't mapped in DEPT_QCD_QUEUES or has no recent rows).
   * Hidden when null.
   */
  function renderDeptQcdSnapshot_(qcd) {
    var wrap = $('dept-qcd-snapshot');
    if (!wrap) return;
    if (!qcd) { wrap.style.display = 'none'; return; }
    var titleEl = $('dept-qcd-title');
    if (titleEl) {
      var dateStr = qcd.date || '';
      if (dateStr) {
        var parts = dateStr.split('-');
        var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        dateStr = days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
      }
      titleEl.textContent = 'Queue Call Data — ' + dateStr;
    }
    var dateEl = $('dept-qcd-date');
    if (dateEl) dateEl.textContent = '';
    const tiles = $('dept-qcd-tiles');
    if (!tiles) return;

    const tile = function (label, value, valueClass) {
      return '<div class="dept-qcd-tile">'
           +   '<div class="dept-qcd-label">' + escapeHtml(label) + '</div>'
           +   '<div class="dept-qcd-value' + (valueClass ? ' ' + valueClass : '') + '">'
           +     escapeHtml(String(value))
           +   '</div>'
           + '</div>';
    };
    const tileRow = function (q) {
      const violCls = (Number(q.violations) || 0) > 0 ? 'dept-qcd-warn' : '';
      const pctCls  = (Number(q.abandonedPct) || 0) >= 5 ? 'dept-qcd-warn' : '';
      return tile('Total Calls', fmtNumber(q.totalCalls    || 0))
           + tile('Answered',    fmtNumber(q.totalAnswered || 0))
           + tile('Abandoned',   fmtNumber(q.abandoned     || 0))
           + tile('Abandoned %', String(q.abandonedPctStr  || '0.00%'), pctCls)
           + tile('Violations',  fmtNumber(q.violations    || 0),       violCls);
    };

    // Per-queue separation: each queue (incl. sub-queue children, which
    // can behave very differently from the parent) renders its OWN tile
    // row; the all-queues sum renders last as a clearly-labeled muted
    // row. Single-queue depts keep the flat row (no redundant total).
    const perQueue = qcd.perQueue || [];
    if (perQueue.length > 1) {
      tiles.innerHTML = perQueue.map(function (q) {
        const tag = q.subDept
          ? ' <span class="dept-qcd-subtag">sub-queue · ' + escapeHtml(q.subDept) + '</span>'
          : '';
        return '<div class="dept-qcd-queue-row">'
             +   '<div class="dept-qcd-queue-name">' + escapeHtml(q.queue) + tag + '</div>'
             +   '<div class="dept-qcd-tiles-inner">' + tileRow(q) + '</div>'
             + '</div>';
      }).join('')
      + '<div class="dept-qcd-queue-row dept-qcd-total-row">'
      +   '<div class="dept-qcd-queue-name">All queues</div>'
      +   '<div class="dept-qcd-tiles-inner">' + tileRow(qcd) + '</div>'
      + '</div>';
    } else {
      tiles.innerHTML = tileRow(perQueue.length === 1 ? perQueue[0] : qcd);
    }
    wrap.style.display = '';
  }

  function renderInfoLine() {
    const el = $('info-line');
    if (!state.meta) { el.style.display = 'none'; return; }
    const m = state.meta;
    const parts = [
      'Roster: ' + (m.rosterSize || 0) + ' agents',
      'Matched: ' + (m.rowsMatched || 0) + ' / ' + (m.rowsScanned || 0) + ' rows',
    ];
    if (typeof m.computeMs === 'number') {
      parts.push('Computed in ' + m.computeMs + ' ms');
    }
    const cachePill = m.cacheHit
      ? '<span class="pill pill-cache">cache hit</span>'
      : '<span class="pill pill-fresh">fresh read</span>';
    el.innerHTML = parts.join(' &middot; ') + cachePill;
    el.style.display = '';
  }

  function renderDiagnostics() {
    const wrap = $('diagnostics');
    const content = $('diag-content');
    const count = $('diag-count');
    if (!state.diagnostics) {
      wrap.style.display = 'none';
      wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
      return;
    }
    const d = state.diagnostics;
    const rosterMissing = d.rosterWithNoData || [];
    const queueOnly = d.queueOnlyMatched || [];
    const total = rosterMissing.length + queueOnly.length;
    if (total === 0) {
      wrap.style.display = 'none';
      wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
      return;
    }
    count.textContent = '(' + total + ')';
    // Severity chip (E3, Phase E): warn-soft for 1-5 issues, bad-soft
    // for >5. Drives a visual indicator at the section header without
    // forcing the user to expand the panel.
    wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
    wrap.classList.add(total > 5 ? 'diag-severity-bad' : 'diag-severity-warn');

    const sections = [];
    if (rosterMissing.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Roster agents with no data in this range (' + rosterMissing.length + ')</h3>' +
        '<p>These agents are on the department roster but had no rows in <code>DQE Historical Data</code> for the selected dates. They may have been off, or the data hasn\'t been imported yet.</p>' +
        '<div class="diag-chips">' +
          rosterMissing.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    if (queueOnly.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Agents matched only via queue (' + queueOnly.length + ')</h3>' +
        '<p>These agents handled this department\'s queue extensions but aren\'t on the department roster. Either they covered for the dept, or they belong on the roster and the <code>DO NOT EDIT!</code> sheet should be updated.</p>' +
        '<div class="diag-chips">' +
          queueOnly.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    content.innerHTML = sections.join('');
    wrap.style.display = '';
  }

  function onError(err) {
    $('refresh-btn').disabled = false;
    state.rows = [];
    state.totals = null;
    state.meta = null;
    state.diagnostics = null;
    setStatus('error', 'Error: ' + (err && err.message ? err.message : String(err)));
    render();
    renderInfoLine();
    renderDiagnostics();
  }

  // -- Sort ---------------------------------------------------------------

  function onSort(key) {
    if (state.sortKey === key) {
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sortKey = key;
      // Numbers default desc (most useful first), text asc.
      const col = COLUMNS.find(function (c) { return c.key === key; });
      state.sortDir = (col && col.type === 'text') ? 'asc' : 'desc';
    }
    render();
  }

  function sortRows(rows) {
    const key = state.sortKey;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    const col = COLUMNS.find(function (c) { return c.key === key; });
    const isText = col && col.type === 'text';
    return rows.slice().sort(function (a, b) {
      const av = a[key], bv = b[key];
      if (isText) {
        return String(av).localeCompare(String(bv)) * dir;
      }
      return ((Number(av) || 0) - (Number(bv) || 0)) * dir;
    });
  }

  // -- Render -------------------------------------------------------------

  function fmtCell(col, row) {
