<script>
(function () {
  'use strict';

  // -- Dark mode toggle (Step 1 of the Call-Analyzer visual parity work).
  // Reads persisted preference and wires the header button. Runs before
  // any other UI setup so the page paints in the right mode immediately.
  // The script.html include sits at the end of <body>, so #mode-btn and
  // document.body are already in the DOM when this executes.
  (function initModeToggle() {
    const MODE_KEY = 'dash-mode';
    let saved = null;
    try { saved = localStorage.getItem(MODE_KEY); } catch (e) {}
    const initial = (saved === 'dark' || saved === 'light') ? saved : 'light';
    if (initial === 'dark') document.body.dataset.mode = 'dark';

    const btn = document.getElementById('mode-btn');
    if (!btn) return;
    const render = () => {
      const dark = document.body.dataset.mode === 'dark';
      btn.textContent = dark ? '☀' : '◐';
      btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
      btn.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
    };
    render();
    btn.addEventListener('click', () => {
      const dark = document.body.dataset.mode === 'dark';
      if (dark) delete document.body.dataset.mode;
      else document.body.dataset.mode = 'dark';
      try { localStorage.setItem(MODE_KEY, dark ? 'light' : 'dark'); } catch (e) {}
      render();
      // Notify the Chart.js theme bridge so its next render uses the
      // new tokens. Already-mounted charts keep their pixels until
      // they're rebuilt.
      window.dispatchEvent(new Event('dash-mode-change'));
    });
  })();

  // -- Background-theme settings ---------------------------------------
  // Personal-preference theme picker (Warm / Cool / Clinical) lives in
  // the Settings modal. Persisted to localStorage; applied via a
  // data-theme attribute on body so the CSS token overrides cascade
  // without any per-selector code changes. Runs at module-load time
  // so the saved theme is applied before any rendering happens; the
  // modal wiring is hooked up later from init() once the DOM is
  // settled.
  (function initThemePreference_() {
    const KEY = 'dash-theme.v1';
    let saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    // First-time visitors land on cool; explicit saved preferences
    // (including 'warm') are preserved untouched.
    const initial = (saved === 'warm' || saved === 'cool' || saved === 'clinical')
      ? saved : 'cool';
    if (initial !== 'warm') document.body.dataset.theme = initial;
    // Expose globally so the Settings modal init can read/write
    // without re-parsing storage.
    window.__themePref = {
      get: function () {
        return (document.body.dataset.theme === 'cool' ||
                document.body.dataset.theme === 'clinical')
          ? document.body.dataset.theme : 'warm';
      },
      set: function (theme) {
        if (theme === 'cool' || theme === 'clinical') {
          document.body.dataset.theme = theme;
        } else {
          delete document.body.dataset.theme;
          theme = 'warm';
        }
        try { localStorage.setItem(KEY, theme); } catch (e) {}
        // Tell chart renderers their tokens shifted so newly-built
        // charts use the right palette.
        window.dispatchEvent(new Event('dash-mode-change'));
      },
    };
  })();

  // window.__USER__ is injected by the dashboard template.
  const USER = window.__USER__ || { role: 'none', email: '', department: null, departments: [] };

  // -- Chart.js theme bridge (Step 4 of the Call-Analyzer visual parity).
  // Reads the same CSS custom properties styles.html publishes and applies
  // them to Chart.defaults so every Chart() instance picks up the slate
  // palette + Inter / IBM Plex Mono typography without per-chart wiring.
  // Resolved values are also exposed via THEME for the few sites that
  // need to set dataset/datalabel colors explicitly.
  // Trade-off: existing chart canvases don't re-paint when the user
  // toggles dark mode mid-session. The next chart instantiated after
  // the toggle picks up the new values; previously-rendered ones keep
  // their light-mode pixels until they're closed + reopened.
  const THEME = {
    paper: '', paperCard: '', paper2: '',
    ink: '',   muted: '',     line: '',
    accent: '', accentSoft: '',
    good: '',   goodSoft: '',
    warn: '',   warnSoft: '',
  };
  function refreshChartTheme() {
    const css = getComputedStyle(document.body);
    // Resolve each CSS custom property to a canvas-canonical
    // form (#rrggbb / rgba(...)) so downstream Chart.js +
    // chartjs-plugin-datalabels code never has to handle OKLCH
    // -- some sub-paths in the plugin choke on OKLCH (silent
    // failures: text rendered with empty fillStyle = invisible
    // labels) even though core Chart.js does support it.
    const read = function (name) {
      const raw = (css.getPropertyValue(name) || '').trim();
      return raw ? colorToCanvasRgb_(raw) : '';
    };
    // Read into a local first; only commit to THEME / Chart.defaults
    // if the CSS variables actually resolved. If we run before the
    // browser has fully computed styles (rare but seen in field),
    // the reads return empty strings and would otherwise overwrite
    // Chart.defaults with '' -- silently breaking scale rendering
    // on bar / line charts (doughnut is unaffected because it has
    // no scales).
    const newValues = {
      paper:      read('--paper'),      paperCard:  read('--paper-card'),
      paper2:     read('--paper-2'),    ink:        read('--ink'),
      muted:      read('--muted'),      line:       read('--line'),
      accent:     read('--accent'),     accentSoft: read('--accent-soft'),
      good:       read('--good'),       goodSoft:   read('--good-soft'),
      warn:       read('--warn'),       warnSoft:   read('--warn-soft'),
    };
    // Commit only the non-empty values. THEME keeps any prior good
    // values across re-runs.
    Object.keys(newValues).forEach(function (k) {
      if (newValues[k]) THEME[k] = newValues[k];
    });

    if (typeof Chart === 'undefined') return;
    // Skip Chart.defaults pollution if the critical theme values
    // didn't resolve. Chart.js library defaults are perfectly
    // serviceable; better that than empty-string color props that
    // can make scale-based charts vanish.
    if (!THEME.muted || !THEME.line || !THEME.paperCard) return;

    const FONT_MONO = "'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
    const FONT_DISPLAY = "'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif";
    Chart.defaults.font.family = FONT_MONO;
    Chart.defaults.font.size = 10.5;
    Chart.defaults.color = THEME.muted;
    Chart.defaults.borderColor = THEME.line;
    // Per-scale-type defaults (Chart.js v4): grid lines + tick color
    ['linear', 'category', 'time', 'logarithmic'].forEach(function (k) {
      const s = Chart.defaults.scales && Chart.defaults.scales[k];
      if (!s) return;
      if (s.grid)   s.grid.color   = THEME.line;
      if (s.border) s.border.color = THEME.line;
      if (s.ticks)  s.ticks.color  = THEME.muted;
    });
    const radial = Chart.defaults.scales && Chart.defaults.scales.radialLinear;
    if (radial) {
      if (radial.grid)        radial.grid.color        = THEME.line;
      if (radial.angleLines)  radial.angleLines.color  = THEME.line;
      if (radial.pointLabels) radial.pointLabels.color = THEME.muted;
      if (radial.ticks)       radial.ticks.color       = THEME.muted;
    }
    // Tooltip — paper-card panel with ink text, mono body, display title
    const tt = Chart.defaults.plugins.tooltip;
    tt.backgroundColor = THEME.paperCard;
    tt.titleColor      = THEME.ink;
    tt.bodyColor       = THEME.ink;
    tt.borderColor     = THEME.line;
    tt.borderWidth     = 1;
    tt.cornerRadius    = 2;
    tt.padding         = 8;
    tt.titleFont       = { family: FONT_DISPLAY, size: 12, weight: '500' };
    tt.bodyFont        = { family: FONT_MONO,    size: 11 };
    tt.boxPadding      = 4;
    // Legend — muted mono labels (matches the kicker rhythm)
    const lg = Chart.defaults.plugins.legend.labels;
    lg.color = THEME.muted;
    lg.font  = { family: FONT_MONO, size: 10 };
    // Title (used by IR charts' chartHeader)
    if (Chart.defaults.plugins.title) {
      Chart.defaults.plugins.title.color = THEME.muted;
      Chart.defaults.plugins.title.font  = { family: FONT_MONO, size: 11, weight: '500' };
    }
  }
  refreshChartTheme();
  // Hook the dark-mode toggle wiring above so newly-rendered charts
  // pick up the inverted palette. (Already-rendered canvases keep
  // their old pixels — acceptable trade-off; documented above.)
  window.addEventListener('dash-mode-change', function () {
    refreshChartTheme();
    IR_CHART_COLORS = irChartColors_();
    IR_VOLUME_COLORS = irVolumeColors_();
  });

  // -- chartjs-plugin-datalabels global registration ------------------
  // Chart.js v4 requires explicit registration -- the auto-registration
  // the plugin did via script tag was a v3 behavior that v4 dropped.
  // Without this, per-chart `plugins: [ChartDataLabels]` references
  // sometimes work and sometimes don't (we suspect a load-order quirk
  // in the Apps Script HtmlService environment).  Registering globally
  // here is belt-and-suspenders; idempotent via the registry check.
  // Charts that DON'T want labels (Missed Calls radar, Overview multi-
  // line) opt out via `options.plugins.datalabels = { display: false }`.
  (function registerChartDataLabels_() {
    if (typeof Chart === 'undefined' || typeof ChartDataLabels === 'undefined') return;
    try {
      if (Chart.registry && Chart.registry.plugins
          && Chart.registry.plugins.get && Chart.registry.plugins.get('datalabels')) {
        return;   // already registered
      }
      Chart.register(ChartDataLabels);
      // Plugin defaults to display=false starting in v1.0.0. Enable
      // globally; per-chart `display: ...` settings still override
      // (Missed Calls radar + Overview trend opt out via
      // `options.plugins.datalabels.display = false`).
      try {
        if (!Chart.defaults.plugins) Chart.defaults.plugins = {};
        if (!Chart.defaults.plugins.datalabels) Chart.defaults.plugins.datalabels = {};
        Chart.defaults.plugins.datalabels.display = true;
      } catch (e2) { /* defaults not ready; per-chart display still works */ }
    } catch (e) { /* ignore -- fall back to per-chart `plugins` option */ }
  })();

  const state = {
    rows: [],
    totals: null,
    meta: null,
    diagnostics: null,
    sortKey: 'totalMissed',
    sortDir: 'desc',     // 'asc' | 'desc'
    // Phase D: default flipped from 'roster' to 'both' so the agent
    // table surfaces queue-only floaters by default. Queue-only rows
    // are tagged via the Source column chip and excluded from the
    // totals row on the server side. Scope toggle stays available
    // (matching aria-checked="true" on the Both button in markup)
    // for parallel-run validation; slated for removal once the new
    // defaults prove out.
    scope: 'both',       // 'roster' | 'queue' | 'both'
  };

  // -- Modal drag & resize --------------------------------------------------
  function initModalDragResize_(panel) {
    if (window.innerWidth < 768) return;
    var header = panel.querySelector('.modal-panel-header');
    if (!header) return;

    // Add resize handle if not present
    if (!panel.querySelector('.modal-resize-handle')) {
      var rh = document.createElement('div');
      rh.className = 'modal-resize-handle';
      rh.setAttribute('aria-hidden', 'true');
      panel.appendChild(rh);
    }

    var dragging = false, resizing = false;
    var startX, startY, startLeft, startTop, startW, startH;

    function applyTransform() {
      panel.style.position = 'absolute';
      panel.style.margin = '0';
    }

    // Drag via header
    header.addEventListener('mousedown', function (e) {
      if (e.target.closest('.modal-close') || e.target.closest('button') || e.target.closest('a')) return;
      e.preventDefault();
      dragging = true;
      var rect = panel.getBoundingClientRect();
      startX = e.clientX; startY = e.clientY;
      startLeft = rect.left; startTop = rect.top;
      applyTransform();
    });

    // Resize via handle
    var rh = panel.querySelector('.modal-resize-handle');
    if (rh) rh.addEventListener('mousedown', function (e) {
      e.preventDefault(); e.stopPropagation();
      resizing = true;
      startX = e.clientX; startY = e.clientY;
      var rect = panel.getBoundingClientRect();
      startW = rect.width; startH = rect.height;
      startLeft = rect.left; startTop = rect.top;
      applyTransform();
    });

    document.addEventListener('mousemove', function (e) {
      if (dragging) {
        var dx = e.clientX - startX, dy = e.clientY - startY;
        panel.style.left = Math.max(0, startLeft + dx) + 'px';
        panel.style.top  = Math.max(0, startTop + dy) + 'px';
      } else if (resizing) {
        var w = Math.max(360, startW + (e.clientX - startX));
        var h = Math.max(280, startH + (e.clientY - startY));
        panel.style.width    = w + 'px';
        panel.style.maxWidth = w + 'px';
        panel.style.height    = h + 'px';
        panel.style.maxHeight = h + 'px';
        panel.style.left = startLeft + 'px';
        panel.style.top  = startTop + 'px';
      }
    });

    document.addEventListener('mouseup', function () {
      dragging = false; resizing = false;
    });
  }

  function resetModalTransform_(panel) {
    panel.style.position = '';
    panel.style.left = ''; panel.style.top = '';
    panel.style.width = ''; panel.style.maxWidth = '';
    panel.style.height = ''; panel.style.maxHeight = '';
    panel.style.margin = '';
    var rh = panel.querySelector('.modal-resize-handle');
    if (rh) rh.remove();
  }

  // -- Modal focus trap -----------------------------------------------------
  var activeFocusTrap_ = null;
  function trapFocus_(modal) {
    releaseFocus_();
    var FOCUSABLE = 'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';
    function handler(e) {
      if (e.key !== 'Tab') return;
      var els = modal.querySelectorAll(FOCUSABLE);
      if (!els.length) return;
      var first = els[0], last = els[els.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    }
    modal.addEventListener('keydown', handler);
    activeFocusTrap_ = { modal: modal, handler: handler };
    var first = modal.querySelector(FOCUSABLE);
    if (first) setTimeout(function () { first.focus(); }, 0);
  }
  function releaseFocus_() {
    if (!activeFocusTrap_) return;
    activeFocusTrap_.modal.removeEventListener('keydown', activeFocusTrap_.handler);
    activeFocusTrap_ = null;
  }

  // -- Formatting helpers --------------------------------------------------

  function pad2(n) { return String(n).padStart(2, '0'); }

  function fmtDuration(seconds) {
    seconds = Math.max(0, Math.round(Number(seconds) || 0));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return h + ':' + pad2(m) + ':' + pad2(s);
  }

  function fmtNumber(n) {
    n = Number(n) || 0;
    return n.toLocaleString('en-US');
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // CSV formula-injection guard. Excel / Google Sheets treat a cell
  // beginning with = + - @ (or a leading tab / CR) as a formula. Agent
  // names flow in from the external CDR feed, so a crafted name like
  // "=HYPERLINK(...)" would execute when a manager opens an exported
  // CSV. Prefix such values with a single quote so the spreadsheet app
  // forces them to plain text. Plain numbers (incl. negative / decimal)
  // are left untouched so numeric columns aren't corrupted. Call this
  // BEFORE the RFC-4180 quote-escaping (comma/quote/newline) in every
  // CSV cell writer.
  function csvSafeCell_(v) {
    var s = String(v == null ? '' : v);
    // Prefix only genuine formula text. The numeric-ish exclusion keeps
    // server-computed cells intact -- signed deltas ("+5.0%", "-12.3 pts"),
    // durations ("0:03:01"), and thousands-separated counts ("1,234") all
    // legitimately start with + / - / a digit and must NOT be mangled.
    if (/^[=+\-@\t\r]/.test(s) && !/^[-+]?[\d.,:]+\s*(%|pts)?$/.test(s)) {
      return "'" + s;
    }
    return s;
  }

  // Shared failure handler for the html2canvas-based image exports
  // (Individual / Performance / Compare Ranges). Without it a rejected
  // capture promise leaves the user staring at a disabled "Capturing…"
  // button with no feedback. Surface the error via a toast and re-enable
  // any export button that a *Feedback_ helper left disabled (its
  // original label is stashed in dataset.label). QCD has its own catch
  // because it uses a status banner instead of a button-feedback helper.
  function exportCaptureFailed_(err) {
    try { console.error('Report image capture failed', err); } catch (e) {}
    showToast("Couldn't capture the report image — please try again.", 'error');
    ['ir-export-btn', 'pr-export-btn', 'cr-export-btn'].forEach(function (id) {
      var btn = document.getElementById(id);
      if (btn && btn.dataset && btn.dataset.label) {
        btn.innerHTML = btn.dataset.label;
        btn.disabled = false;
      }
    });
  }

  function showToast(msg, kind, durationMs) {
    var container = $('toast-container');
    if (!container) return;
    var el = document.createElement('div');
    el.className = 'toast' + (kind ? ' toast-' + kind : '');
    el.textContent = msg;
    container.appendChild(el);
    requestAnimationFrame(function () { el.classList.add('toast-visible'); });
    setTimeout(function () {
      el.classList.remove('toast-visible');
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, durationMs || 3000);
  }

  /**
   * Renders the header data-freshness pill: "Data through Mon May 19
   * · 14h ago".  Source is getLatestDataDates -- which returns
   * { dqe, qcd, latest }.  The pill's visible date is `latest`
   * (max across sources); the tooltip surfaces the per-source
   * breakdown so a mid-migration state where one source is fresh
   * and the other is stale is visible on hover.
   *
   * Accepts a string for backward-compat with the single-source
   * caller (treated as if it were both dqe and latest).
   *
   * "Xh ago" is computed from end-of-day on the latest date in the
   * user's local TZ (close enough -- the ingest typically lands
   * the morning after the calendar day it covers).  Pill goes
   * orange when 36h+ have passed since the latest date's end-of-
   * day, which is the empirical threshold above which the operator
   * usually wants to investigate.
   */
  function setFreshnessPill_(dates) {
    const pill = $('freshness-pill');
    if (!pill) return;

    let dqeIso = null, qcdIso = null, latestIso = null;
    if (typeof dates === 'string') {
      latestIso = dates;
      dqeIso = dates;
    } else if (dates && typeof dates === 'object') {
      dqeIso = dates.dqe || null;
      qcdIso = dates.qcd || null;
      latestIso = dates.latest || dqeIso || qcdIso || null;
    }

    if (!latestIso) {
      pill.style.display = 'none';
      pill.textContent = '';
      pill.removeAttribute('title');
      return;
    }
    const parts = String(latestIso).split('-');
    if (parts.length !== 3) { pill.style.display = 'none'; return; }
    // End-of-day local time on the latest date is the reference
    // point for "how stale is the data": calls that came in at
    // 14:55 PST land in that day's bucket.
    const eod = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]), 23, 59, 59);
    const dateLabel = eod.toLocaleDateString(undefined, {
      weekday: 'short', month: 'short', day: 'numeric',
    });
    const ageMs = Date.now() - eod.getTime();
    const ageHours = Math.max(0, Math.round(ageMs / 3600000));
    let ageLabel;
    if (ageHours < 1) {
      ageLabel = 'just now';
    } else if (ageHours < 48) {
      ageLabel = ageHours + 'h ago';
    } else {
      const ageDays = Math.round(ageHours / 24);
      ageLabel = ageDays + 'd ago';
    }
    pill.innerHTML = 'Data through <span class="freshness-date">'
                   + escapeHtml(dateLabel) + '</span> &middot; '
                   + escapeHtml(ageLabel);

    // Tooltip: always include a per-source breakdown so a
    // diverged DQE-vs-QCD state is visible. When the two agree,
    // the breakdown reads as "DQE: X · QCD: X" -- redundant but
    // honest. When they differ, the source of the recent number
    // is the one the operator should trust.
    const tipParts = ['Most recent date with data in any source.'];
    if (dqeIso) tipParts.push('DQE Historical Data: ' + dqeIso);
    if (qcdIso) tipParts.push('QCD Historical Data: ' + qcdIso);
    if (dqeIso && qcdIso && dqeIso !== qcdIso) {
      tipParts.push('Sources are out of sync -- the dashboard\'s '
        + 'My Department agent table reads from DQE; the QCD report + '
        + 'Overview QCD chips read from QCD. Pill shows whichever is '
        + 'newest so a recent refresh on either path is visible.');
    }
    pill.setAttribute('title', tipParts.join('\n'));
    pill.classList.toggle('is-stale', ageHours >= 36);
    pill.style.display = '';
  }

  // Work-window pill (E2, Phase E). Reads window.__WORK_WINDOW__
  // (injected server-side from DASHBOARD_WORK_WINDOW in Config.gs)
  // and populates the static pill markup. One-shot at init -- the
  // constants don't change during a session.
  function initWorkWindowPill_() {
    const pill = $('work-window-pill');
    if (!pill) return;
    const ww = window.__WORK_WINDOW__;
    if (!ww || (!ww.pst && !ww.cst)) return;
    const parts = [];
    if (ww.pst) parts.push('<strong>' + escapeHtml(ww.pst) + '</strong>');
    if (ww.cst) parts.push('<strong>' + escapeHtml(ww.cst) + '</strong>');
    pill.innerHTML = 'Work window ' + parts.join('<span class="work-window-sep">&middot;</span>');
    pill.setAttribute('title',
      'Rung / Missed / Answered / TTT / ATT columns are scoped to this work window. '
      + 'Calls before or after this window appear in the Missed Calls raw timestamps '
      + 'but are not counted in the headline totals.');
    pill.style.display = '';
  }

  function toIsoDate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function defaultRange() {
    const now = new Date();
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: toIsoDate(first), to: toIsoDate(now) };
  }

  // -- Column model --------------------------------------------------------
  // Order matches the <thead>; sortKey maps to a row property.
  const COLUMNS = [
    { key: 'agent',                label: 'Agent',           type: 'text' },
    // Phase D Source column. Renders a chip (ROSTER / BOTH / QUEUE)
    // from each row's matchedViaRoster / matchedViaQueue flags --
    // see fmtCell handling for `type: 'chip'`. Plain-text export
    // (CSV) is handled in exportTableCsv_ via sourceChipCsv_.
    { key: 'source',               label: 'Source',          type: 'chip' },
    { key: 'totalUnique',          label: 'Unique',          type: 'num' },
    { key: 'totalRung',            label: 'Rung',            type: 'num' },
    { key: 'totalMissed',          label: 'Missed',          type: 'num', highlight: 'missed' },
    { key: 'totalAnswered',        label: 'Answered',        type: 'num' },
    { key: 'tttSeconds',           label: 'TTT',             type: 'duration' },
    { key: 'attSeconds',           label: 'ATT',             type: 'duration' },
    { key: 'avgAbdWaitSeconds',    label: 'Avg Abd Wait',    type: 'duration' },
    { key: 'csrAvgAbdWaitSeconds', label: 'CSR Avg Abd Wait', type: 'duration' },
  ];

  // -- DOM ----------------------------------------------------------------

  const $ = function (id) { return document.getElementById(id); };

  function init() {
    // Header
    $('user-email').textContent = USER.email || '(unknown)';
    const tag = $('role-tag');
    tag.textContent = USER.role;
    tag.classList.add('tag-' + USER.role);

    // Admin-only menu items: Compare Ranges (under Reports) and
    // the entire Admin menu wrap (which holds Alerts). The Alerts
    // menu item itself stays visible inside the admin wrap so a
    // single role check governs both. Server enforces independently.
    if (USER.role === 'admin') {
      document.querySelectorAll('[data-admin-only]').forEach(function (el) {
        el.style.display = '';
      });
    }

    // -- Header dropdown menus (Reports + Admin) --------------------
    // Toggle behavior: clicking a menu button opens its list and
    // closes any other open menu; clicking the same button again
    // closes it; clicking outside or pressing Escape dismisses.
    // Clicking a menu item dispatches the underlying button's
    // click handler (the item IS the original report-launcher
    // button, just restyled) and closes the menu.
    (function initHeaderMenus_() {
      const buttons = document.querySelectorAll('.header-menu-btn');
      const lists   = document.querySelectorAll('.header-menu-list');
      function closeAll() {
        lists.forEach(function (l) { l.style.display = 'none'; });
        buttons.forEach(function (b) { b.setAttribute('aria-expanded', 'false'); });
      }
      buttons.forEach(function (btn) {
        const listId = btn.getAttribute('aria-controls');
        const list = document.getElementById(listId);
        if (!list) return;
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          const open = list.style.display !== 'none';
          closeAll();
          if (!open) {
            list.style.display = '';
            btn.setAttribute('aria-expanded', 'true');
          }
        });
      });
      // Close on outside click. Items inside the list don't bubble
      // up to here because we listen on document.
      document.addEventListener('click', function (e) {
        if (!e.target.closest('.header-menu')) closeAll();
      });
      // Close on Escape.
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeAll();
      });
      // Close after a menu item is activated -- the modal-open
      // handler already runs because the menu item IS the original
      // launcher button.
      lists.forEach(function (list) {
        list.addEventListener('click', function (e) {
          if (e.target.closest('.header-menu-item')) closeAll();
        });
      });
    })();

    // Department selector vs static label
    if (USER.role === 'admin' && USER.departments && USER.departments.length) {
      const sel = $('dept-selector');
      USER.departments.forEach(function (d) {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        sel.appendChild(opt);
      });
      $('dept-selector-wrap').style.display = '';
      sel.addEventListener('change', function () {
        // Admin switched depts; all per-report cached agent
        // rosters are now stale -- wipe so the next modal open
        // refetches against the new dept.
        irLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
        prLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
        crLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
        refresh();
        // If the Overview page is currently visible, re-render its
        // viewer-personalized bits (hero + user-table) so they
        // reflect the new dept without a full reload.
        if (document.body.getAttribute('data-page') === 'overview' && ovLastData) {
          ovRenderUserHero_(ovLastData);
          ovRenderUserTable_(ovLastData);
          ovRenderTiles_(ovLastData);  // exclude new viewer-dept from the grid
        }
      });
      $('page-title').textContent = sel.value;
    } else {
      $('page-title').textContent = USER.department || '(no department)';
    }

    // Date range defaults. Provisional value = today (fallback if
    // the getLatestDataDate fetch below is slow or fails); the
    // actual default lands on the most recent date with data in
    // DQE Historical Data so the table isn't empty when a manager
    // first opens the dashboard before today's ingest has run.
    const range = defaultRange();
    $('from-date').value = range.from;
    $('to-date').value = range.to;
    $('from-date').addEventListener('change', function () { clearActivePreset_(); refresh(); });
    $('to-date').addEventListener('change', function () { clearActivePreset_(); refresh(); });

    initDatePresets_();

    $('refresh-btn').addEventListener('click', refresh);
    var csvBtn = $('csv-export-btn');
    if (csvBtn) csvBtn.addEventListener('click', exportTableCsv_);

    // Scope segmented control
    document.querySelectorAll('#scope-toggle .seg-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const next = btn.getAttribute('data-scope');
        if (next === state.scope) return;
        state.scope = next;
        document.querySelectorAll('#scope-toggle .seg-btn').forEach(function (b) {
          const active = b.getAttribute('data-scope') === next;
          b.classList.toggle('active', active);
          b.setAttribute('aria-checked', active ? 'true' : 'false');
        });
        refresh();
      });
    });

    // Sortable headers
    document.querySelectorAll('#agents-table thead th[data-sort]').forEach(function (th) {
      th.addEventListener('click', function () { onSort(th.getAttribute('data-sort')); });
    });

    initHelpModal();
    initSettingsModal();
    initCompanyOverview();
    initMissedReport();
    initIndividualReport();
    initPerformanceReport();
    initCompareRanges();
    initAlerts();
    initOrphanFix();
    initDeptConfig();
    initQcdReport();
    // Router last so its modal-close listeners attach after each
    // per-modal init has wired up its own close-button handlers.
    initRouter();
    initOpenInNewTabButtons_();
    initWorkWindowPill_();

    // Fetch the most recent date with data in DQE Historical Data
    // and snap From/To to that date. Defers the initial table
    // render until either the date is known (typical) or the
    // server call fails (falls back to today's range from
    // defaultRange above).
    google.script.run
      .withSuccessHandler(function (dates) {
        // dates = { dqe, qcd, latest } per Data.gs::getLatestDataDates.
        // From/To defaults use DQE specifically (the agent table
        // draws from DQE; defaulting to a QCD-only date would
        // empty the table). Pill uses the overall max + a
        // per-source tooltip breakdown so an out-of-sync state
        // (e.g. mid-migration) doesn't make the pill look stuck.
        const dqe = dates && dates.dqe ? dates.dqe : null;
        if (dqe) {
          $('from-date').value = dqe;
          $('to-date').value = dqe;
        }
        setFreshnessPill_(dates || null);
        refresh();
      })
      .withFailureHandler(function () { refresh(); })
      .getLatestDataDates();

    // Default landing page is the Overview. Calling setPage here
    // (after refresh() has been kicked off above) sets the body
    // attribute that controls page visibility AND triggers the
    // Overview's data fetch.
    setPage('overview');
  }

  // -- Date preset chips ---------------------------------------------------
  function initDatePresets_() {
    var wrap = $('date-presets');
    if (!wrap) return;
    var presets = [
      { label: 'Yesterday', fn: function () { var d = daysAgo_(1); return { from: d, to: d }; } },
      { label: 'Last 7 days', fn: function () { return { from: daysAgo_(7), to: daysAgo_(1) }; } },
      { label: 'Last 30 days', fn: function () { return { from: daysAgo_(30), to: daysAgo_(1) }; } },
      { label: 'This month', fn: function () { var t = new Date(); return { from: isoDate_(new Date(t.getFullYear(), t.getMonth(), 1)), to: isoDate_(t) }; } },
      { label: 'Last month', fn: function () { var t = new Date(); var f = new Date(t.getFullYear(), t.getMonth() - 1, 1); var l = new Date(t.getFullYear(), t.getMonth(), 0); return { from: isoDate_(f), to: isoDate_(l) }; } },
    ];
    presets.forEach(function (p) {
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'date-preset-chip';
      chip.textContent = p.label;
      chip.addEventListener('click', function () {
        var r = p.fn();
        $('from-date').value = r.from;
        $('to-date').value = r.to;
        wrap.querySelectorAll('.date-preset-chip').forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');
        refresh();
      });
      wrap.appendChild(chip);
    });
  }
  function clearActivePreset_() {
    var wrap = $('date-presets');
    if (wrap) wrap.querySelectorAll('.date-preset-chip').forEach(function (c) { c.classList.remove('active'); });
  }
  function daysAgo_(n) { var d = new Date(); d.setDate(d.getDate() - n); return isoDate_(d); }
  function isoDate_(d) {
    var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
    var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
    return d.getFullYear() + '-' + m + '-' + day;
  }

  // Page switcher between the Overview "home" page and the dept
  // detail page. Body[data-page] drives CSS visibility; this also
  // updates the document title block and the active-nav state.
  function setPage(page) {
    if (page !== 'overview' && page !== 'dept') page = 'overview';
    document.body.setAttribute('data-page', page);
    const kicker = $('page-kicker');
    const title  = $('page-title');
    if (page === 'overview') {
      if (kicker) kicker.textContent = 'Company · Overview';
      if (title)  title.textContent  = 'Departments Snapshot';
      ovLoad_();
    } else {
      if (kicker) kicker.textContent = 'Department Dashboard';
      if (title)  title.textContent  = getRequestedDept() || '(no department)';
    }
    // Delegate the active-tab visual indicator to the router so all
    // [data-route] tabs (page-toggles + report-openers) participate
    // in the same active-state model. Phase C consolidated this from
    // the per-button toggle that previously only handled overview /
    // my-dept buttons.
    if (typeof setRoute_ === 'function') {
      setRoute_(page === 'dept' ? '/dept' : '/overview');
    }
  }

  // -- Help & FAQ modal ---------------------------------------------------
  // Opens on "?" button in header. Closes on backdrop click, X button, or
  // Escape key. Returns focus to the help button on close. Reuses the same
  // modal infrastructure that upcoming report views will use.
  function initHelpModal() {
    const btn = $('help-btn');
    const modal = $('help-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
  }

  // -- Settings modal (theme picker etc.) -----------------------------
  function initSettingsModal() {
    const btn = $('settings-btn');
    const modal = $('settings-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function syncChips() {
      const active = (window.__themePref && window.__themePref.get) ? window.__themePref.get() : 'warm';
      document.querySelectorAll('.theme-chip').forEach(function (chip) {
        chip.classList.toggle('active', chip.getAttribute('data-theme') === active);
      });
    }

    function openModal() {
      syncChips();
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Chip click: apply + persist theme. Modal stays open so the
    // user can visually verify the change (the background updates
    // behind the modal panel).
    document.querySelectorAll('.theme-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        const t = chip.getAttribute('data-theme');
        if (window.__themePref && window.__themePref.set) window.__themePref.set(t);
        syncChips();
      });
    });
  }

  // -- Company Overview page --------------------------------------------
  // Cross-dept snapshot: per-dept tile grid showing the latest day's
  // KPIs (rung / answered / missed / % / ATT) + a 30-day answer-rate
  // trend chart with one line per dept. Accessible to all
  // authenticated users (managers see other depts' numbers too --
  // matches the legacy DQE Report's read-only cross-dept visibility).
  //
  // Rendered inline as a full page (#overview-page), toggled with
  // the #dept-page section via body[data-page] from the header
  // buttons in setPage().

  let ovChartInstance = null;
  let ovLastData = null;

  function initCompanyOverview() {
    const overviewBtn = $('overview-btn');
    const myDeptBtn   = $('my-dept-btn');
    if (overviewBtn) overviewBtn.addEventListener('click', function () { setPage('overview'); });
    if (myDeptBtn)   myDeptBtn.addEventListener('click',   function () { setPage('dept');     });
  }

  var ovAutoRefreshTimer_ = null;
  var OV_AUTO_REFRESH_MS  = 5 * 60 * 1000;

  function ovLoad_(silent) {
    if (!silent) {
      $('ov-loading').style.display = '';
      $('ov-body').style.display = 'none';
    }
    google.script.run
      .withSuccessHandler(function (data) {
        ovLastData = data;
        $('ov-loading').style.display = 'none';
        $('ov-body').style.display = '';
        ovRender_(data);
        ovScheduleAutoRefresh_();
      })
      .withFailureHandler(function (err) {
        if (!silent) {
          $('ov-loading').textContent = 'Error loading overview: '
            + (err && err.message ? err.message : String(err));
        }
        ovScheduleAutoRefresh_();
      })
      .getCompanyOverview();
  }

  function ovScheduleAutoRefresh_() {
    if (ovAutoRefreshTimer_) clearTimeout(ovAutoRefreshTimer_);
    ovAutoRefreshTimer_ = setTimeout(function () {
      if (document.body.getAttribute('data-page') === 'overview') {
        ovLoad_(true);
      }
    }, OV_AUTO_REFRESH_MS);
  }

  function ovRender_(data) {
    if (!data || !data.depts) return;
    ovRenderPipelineBanner_(data);
    ovRenderOrphanNag_(data);
    ovRenderSummaryLine_(data);
    ovRenderCompanyAggregate_(data);
    ovRenderUserHero_(data);
    ovRenderTiles_(data);
    // Defer chart creation by one frame so the just-revealed
    // modal body lays out before Chart.js measures the canvas.
    requestAnimationFrame(function () { ovRenderChart_(data); });
    ovRenderUserTable_(data);
  }

  // Single mono-uppercase summary line above the dept grid.
  // Admin viewers see org-wide stats (rung total, % answered company-wide,
  // QCD violations MTD across all depts). Manager viewers see the same
  // shape scoped to their own dept so the line surfaces meaningful numbers
  // for both audiences without leaking the admin-only company aggregate.
  function ovRenderSummaryLine_(data) {
    const el = $('ov-summary-line');
    if (!el) return;
    const dateLabel = data.latestDate
      ? ovFormatDateLabel_(data.latestDate)
      : '(no data)';
    const sep = '<span class="ov-summary-sep">&middot;</span>';
    const segs = [];
    segs.push(
      '<span class="ov-summary-label">Data through</span> '
      + '<strong>' + escapeHtml(dateLabel) + '</strong>'
    );
    const isAdmin = data.viewerRole === 'admin';
    if (isAdmin && data.companyAggregate) {
      // Top-level dept count (sub-queues fold into their parent for
      // the "DEPTS N" headline so the number matches what a viewer
      // can see in the tile grid).
      const topLevel = (data.depts || []).filter(function (d) { return !d.parent; }).length;
      segs.push(
        '<span class="ov-summary-label">Depts</span> '
        + '<strong>' + fmtNumber(topLevel) + '</strong>'
      );
      segs.push(
        '<span class="ov-summary-label">Rung</span> '
        + '<strong>' + fmtNumber(data.companyAggregate.rung) + '</strong>'
      );
      segs.push(
        '<span class="ov-summary-label">% Answered</span> '
        + '<strong>' + escapeHtml(data.companyAggregate.pctFormatted) + '</strong>'
      );
      const violTotal = (data.depts || []).reduce(function (acc, d) {
        return acc + ((d.qcd && d.qcd.violationsMtd) || 0);
      }, 0);
      segs.push(
        '<span class="ov-summary-label">QCD viol MTD</span> '
        + '<strong>' + fmtNumber(violTotal) + '</strong>'
      );
    } else {
      // Manager view: scope to the viewer's own dept so the summary
      // line shows actionable stats. Falls back to the data-through
      // line alone if the viewer's dept can't be matched (defensive --
      // the auth layer guarantees a manager has at least one dept).
      const viewerDept = data.viewerDept;
      const dept = viewerDept
        ? (data.depts || []).find(function (d) { return d.name === viewerDept; })
        : null;
      if (dept) {
        segs.push(
          '<span class="ov-summary-label">Dept</span> '
          + '<strong>' + escapeHtml(dept.name) + '</strong>'
        );
        segs.push(
          '<span class="ov-summary-label">Rung</span> '
          + '<strong>' + fmtNumber(dept.latest.rung) + '</strong>'
        );
        segs.push(
          '<span class="ov-summary-label">% Answered</span> '
          + '<strong>' + escapeHtml(dept.latest.pctFormatted) + '</strong>'
        );
        const violMtd = (dept.qcd && dept.qcd.violationsMtd) || 0;
        segs.push(
          '<span class="ov-summary-label">QCD viol MTD</span> '
          + '<strong>' + fmtNumber(violMtd) + '</strong>'
        );
      }
    }
    el.innerHTML = segs.join(' ' + sep + ' ');
  }

  // Admin-only banner above the summary line surfacing Pipeline
  // Health staleness. Healthy state stays hidden; >36h since the
  // latest DQE-freshness success picks up the warn variant.
  function ovRenderPipelineBanner_(data) {
    const el = $('ov-pipeline-banner');
    if (!el) return;
    const pf = data && data.pipelineFreshness;
    if (data.viewerRole !== 'admin' || !pf || !pf.isStale) {
      el.style.display = 'none';
      el.innerHTML = '';
      el.classList.remove('is-warn');
      return;
    }
    el.style.display = '';
    el.className = 'ov-status-banner is-warn';
    let bodyHtml;
    if (pf.latestTimestamp && pf.hoursSinceFresh != null) {
      const hours = pf.hoursSinceFresh >= 24
        ? (pf.hoursSinceFresh / 24).toFixed(1) + 'd'
        : pf.hoursSinceFresh.toFixed(1) + 'h';
      bodyHtml =
          'DQE freshness is stale -- last successful build was '
        + '<strong>' + hours + ' ago</strong> ('
        + escapeHtml(pf.latestTimestamp) + ').'
        + ' Check the import pipeline (see <strong>Alerts &rarr; Pipeline Health</strong>).';
    } else {
      bodyHtml =
          'No recent DQE-freshness success found in Pipeline Health.'
        + ' Either the daily import hasn\'t run, or the success rows have aged out of the 40-row scan window.'
        + ' Check <strong>Alerts &rarr; Pipeline Health</strong>.';
    }
    el.innerHTML =
        '<span class="ov-status-banner-kicker">Pipeline</span>'
      + '<span class="ov-status-banner-body">' + bodyHtml + '</span>';
  }

  // Admin-only banner for orphan agent names that have been written
  // to DQE Historical Data in the last 7 days. Clicking opens the
  // Orphan Fix modal so the admin can triage them.
  function ovRenderOrphanNag_(data) {
    const el = $('ov-orphan-nag');
    if (!el) return;
    const on = data && data.orphanNag;
    if (data.viewerRole !== 'admin' || !on || !on.activeCount) {
      el.style.display = 'none';
      el.innerHTML = '';
      el.classList.remove('is-warn');
      return;
    }
    const names = (on.sampleNames || []).map(escapeHtml).join(', ');
    const moreCount = on.activeCount - (on.sampleNames || []).length;
    const moreClause = moreCount > 0 ? ' and ' + fmtNumber(moreCount) + ' more' : '';
    el.style.display = '';
    el.className = 'ov-status-banner is-warn';
    el.innerHTML =
        '<span class="ov-status-banner-kicker">Orphans</span>'
      + '<span class="ov-status-banner-body">'
      +   '<strong>' + fmtNumber(on.activeCount) + '</strong>'
      +   ' agent name' + (on.activeCount === 1 ? '' : 's')
      +   ' written in the last 7 days do not match any roster'
      +   (names ? ' (' + names + moreClause + ')' : '')
      +   '. Map them in the Orphan Fix modal so their calls roll up to the right dept.'
      + '</span>'
      + '<button type="button" class="ov-status-banner-action" id="ov-orphan-nag-open">Open</button>';
    const btn = $('ov-orphan-nag-open');
    if (btn) {
      btn.addEventListener('click', function () {
        const trigger = document.getElementById('orphan-fix-btn');
        if (trigger) trigger.click();
      });
    }
  }

  function ovFormatDateLabel_(iso) {
    const p = iso.split('-');
    const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Which dept the viewer "owns" -- managers always show their own;
  // admins show whichever dept is currently selected in the header
  // dropdown (so they can pin a focus dept).
  function ovViewerDept_(data) {
    if (USER.role === 'admin') {
      const sel = $('dept-selector');
      return (sel && sel.value) || (USER.departments && USER.departments[0]) || null;
    }
    return (data && data.viewerDept) || USER.department || null;
  }

  // Company-wide aggregate hero, admin-only. Renders a single wide
  // tile above the dept grid with totals across all non-hidden
  // depts for the latest date plus a 30-day company-wide sparkline.
  function ovRenderCompanyAggregate_(data) {
    const wrap = $('ov-company-aggregate');
    const agg  = data && data.companyAggregate;
    if (!wrap) return;
    if (!agg || data.viewerRole !== 'admin') {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      return;
    }
    // Use the design system's accent color so the company tile
    // visually anchors above the dept tiles (which cycle through
    // the IR palette starting at the same accent slot).
    const sparkColor = (THEME && THEME.accent) || IR_CHART_COLORS[0] || '#4E79A7';
    const trend = (agg.trend || []).map(function (v) { return v == null ? 0 : v; });
    const spark = trend.length ? irSparkline_(trend, sparkColor) : '';

    wrap.style.display = '';
    wrap.innerHTML =
        '<div class="ov-agg-kicker">Company snapshot &middot; admin only</div>'
      + '<div class="ov-agg-row">'
      +   '<div class="ov-agg-pct-block">'
      +     '<div class="ov-agg-pct">' + escapeHtml(agg.pctFormatted) + '</div>'
      +     '<div class="ov-agg-pct-cap">answered company-wide</div>'
      +   '</div>'
      +   '<div class="ov-agg-stats">'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Rung</span><span class="ov-agg-stat-val">' + fmtNumber(agg.rung) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Answered</span><span class="ov-agg-stat-val">' + fmtNumber(agg.answered) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">Missed</span><span class="ov-agg-stat-val">' + fmtNumber(agg.missed) + '</span></div>'
      +     '<div class="ov-agg-stat"><span class="ov-agg-stat-label">ATT</span><span class="ov-agg-stat-val">' + escapeHtml(agg.attFormatted) + '</span></div>'
      +     '<div class="ov-agg-stat" title="' + escapeHtml(ovActiveTooltip_(agg)) + '"><span class="ov-agg-stat-label">Active</span><span class="ov-agg-stat-val">' + agg.activeAgents + ' of ' + (agg.recentlyActiveCount != null ? agg.recentlyActiveCount : agg.rosterSize) + '</span></div>'
      +   '</div>'
      +   (spark ? '<div class="ov-agg-spark" title="30-day company % answered trend">' + spark + '</div>' : '')
      + '</div>';
  }

  // Hero block: featured rendering of the viewer's own department,
  // sitting above the grid. Manager: their dept. Admin: whichever
  // dept is selected in the header dropdown.
  //
  // Three shapes depending on the viewer's dept position:
  //   - Top-level parent with children (e.g. Sales has PAP Q):
  //     hero shows the big parent tile + its child sub-queue tiles
  //     stacked underneath. Keeps the parent-child relationship
  //     visible even when the parent is the hero.
  //   - Top-level dept with no children: hero is just that tile.
  //   - Child sub-queue (e.g. Spanish): hero is just that child
  //     tile, with a "sub-queue · <Parent>" tag so the relationship
  //     is still visible even though the parent renders below in
  //     the grid (with the child removed from its group).
  //
  // Hidden entirely if we can't resolve a viewer dept or it isn't
  // present in the overview data (e.g. listed in
  // OVERVIEW_HIDDEN_DEPTS).
  function ovRenderUserHero_(data) {
    const wrap = $('ov-user-hero');
    if (!wrap) return;
    const viewerDept = ovViewerDept_(data);
    if (!viewerDept) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
    const depts = data.depts || [];
    const dept = depts.find(function (d) { return d.name === viewerDept; });
    if (!dept) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }

    // The viewer's children if the viewer is a top-level parent.
    const heroChildren = depts.filter(function (d) { return d.parent === dept.name; });

    // Find the dept's slot in the top-level color cycle (children
    // inherit their parent's slot color); used for the hero's
    // spark + accent.
    const colors = IR_CHART_COLORS;
    let slot = 0, ownIdx = -1, parentIdx = -1;
    depts.forEach(function (d) {
      if (d.parent) return;
      if (d.name === viewerDept)         ownIdx    = slot;
      if (dept.parent && d.name === dept.parent) parentIdx = slot;
      slot++;
    });
    // Use the viewer's own slot if top-level; otherwise inherit
    // the parent's slot. Fallback to 0 if neither matched (e.g.
    // viewer dept was orphaned for some reason).
    const colorIdx = ownIdx >= 0 ? ownIdx : (parentIdx >= 0 ? parentIdx : 0);
    const color = colors[colorIdx % colors.length];

    wrap.style.display = '';
    const childTiles = heroChildren.map(function (c) {
      return ovBuildGridTile_(c, color, /*isChild=*/true,
                              /*routable=*/USER.role === 'admin');
    }).join('');
    const childBlock = heroChildren.length
      ? '<div class="ov-user-hero-children">' + childTiles + '</div>'
      : '';
    wrap.innerHTML = ovBuildHeroTile_(dept, color) + childBlock;

    // Hero is always clickable -- routes to the My Department
    // page where the full configurable date-range detail lives.
    // Children inside the hero are clickable separately (admin
    // route-to-child); we use closest() to disambiguate.
    wrap.onclick = function (e) {
      const childTile = e.target.closest('.ov-user-hero-children .ov-dept-tile-clickable');
      if (childTile && USER.role === 'admin') {
        const target = childTile.getAttribute('data-dept');
        if (target) { ovRouteToDept_(target); return; }
      }
      // Click anywhere else in the hero -> go to dept detail page.
      setPage('dept');
    };
  }

  function ovBuildHeroTile_(dept, color) {
    const trend = (dept.trend || []).map(function (v) { return v == null ? 0 : v; });
    const spark = irSparkline_(trend, color);
    const subTag = dept.parent
      ? '<span class="ov-dept-parent-tag">sub-queue &middot; ' + escapeHtml(dept.parent) + '</span>'
      : '';
    return '<div class="ov-dept-tile ov-dept-tile-hero" data-dept="' + escapeHtml(dept.name) + '" style="border-top-color:' + color + ';">'
         +   '<div class="ov-dept-tile-head">'
         +     '<div>'
         +       '<div class="ov-hero-kicker">Your department</div>'
         +       '<span class="ov-dept-name ov-hero-name">' + escapeHtml(dept.name) + '</span>'
         +       (subTag ? ' ' + subTag : '')
         +     '</div>'
         +     '<div class="ov-hero-meta">'
         +       ovBuildAlertPill_(dept)
         +       '<span class="ov-dept-active" title="' + escapeHtml(ovActiveTooltip_(dept)) + '">'
         +         dept.activeAgents + ' of ' + (dept.recentlyActiveCount != null ? dept.recentlyActiveCount : dept.rosterSize) + ' agents active'
         +       '</span>'
         +     '</div>'
         +   '</div>'
         +   '<div class="ov-hero-body">'
         +     '<div class="ov-hero-pct-block">'
         +       '<div class="ov-hero-pct">' + escapeHtml(dept.latest.pctFormatted) + '</div>'
         +       '<div class="ov-dept-pct-cap">answered (latest day)</div>'
         +       ovBuildWowChip_(dept)
         +     '</div>'
         +     '<div class="ov-hero-stats">'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Rung</span><span>' + fmtNumber(dept.latest.rung) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Answered</span><span>' + fmtNumber(dept.latest.answered) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">Missed</span><span>' + fmtNumber(dept.latest.missed) + '</span></div>'
         +       '<div class="ov-hero-stat"><span class="ov-dept-stat-label">ATT</span><span>' + escapeHtml(dept.latest.attFormatted) + '</span></div>'
         +     '</div>'
         +     '<div class="ov-hero-spark" title="30-day % answered trend">' + spark + '</div>'
         +   '</div>'
         + '</div>';
  }

  function ovBuildWowChip_(dept) {
    if (!dept.wow) return '';
    const d = Number(dept.wow.deltaPct) || 0;
    const arrow = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
    let cls = 'ov-wow-flat';
    if (d > 0.5)  cls = 'ov-wow-up';
    if (d < -0.5) cls = 'ov-wow-down';
    const tip = 'Last 7 days ' + dept.wow.curPct.toFixed(1) + '% vs prior 7 days '
              + dept.wow.prevPct.toFixed(1) + '%';
    return '<span class="ov-wow-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         + arrow + ' ' + Math.abs(d).toFixed(1) + '% WoW</span>'
         + ovBuildWowDriver_(dept)
         + ovBuildQcdCaption_(dept);
  }

  // QCD info that isn't already covered by DQE on the dept tile.
  // Two chips:
  //   - "Abandoned: N (P%)" — always rendered when QCD data exists,
  //     warn-tinted when % >= 5% (pipeline's violation threshold).
  //   - "X viol MTD" — month-to-date violations across this dept's
  //     mapped queues; only rendered when X > 0.
  // Tooltip on the abandoned chip carries the latest-date context.
  function ovBuildQcdCaption_(dept) {
    if (!dept || !dept.qcd) return '';
    var q = dept.qcd;
    var queues = q.perQueue || [];
    var multiQueue = queues.length > 1;
    var html = '';

    if (multiQueue) {
      html += '<div class="ov-qcd-queue-list">';
      queues.forEach(function (pq) {
        var qPct = Number(pq.abandonedPct) || 0;
        var qAbnd = Number(pq.abandoned) || 0;
        var qViol = Number(pq.violations) || 0;
        var chips = '';
        chips += '<span class="ov-qcd-flag' + (qPct >= 5 ? ' ov-qcd-violation' : ' ov-qcd-elevated') + '">'
              + escapeHtml(pq.abandonedPctStr || '0.00%') + '</span>';
        if (qAbnd > 0) {
          chips += '<span class="ov-qcd-flag' + (qPct >= 5 ? ' ov-qcd-violation' : '') + '">'
                + fmtNumber(qAbnd) + ' aban</span>';
        }
        if (qViol > 0) {
          chips += '<span class="ov-qcd-flag ov-qcd-violation">' + qViol + ' viol</span>';
        }
        html += '<div class="ov-qcd-queue-row"><span class="ov-qcd-queue-name">'
             + escapeHtml(pq.queue) + '</span>' + chips + '</div>';
      });
      html += '</div>';
    } else {
      var pct = Number(q.abandonedPct) || 0;
      var abandoned = Number(q.abandoned) || 0;
      var abndCls = pct >= 5 ? 'ov-qcd-flag ov-qcd-violation' : 'ov-qcd-flag ov-qcd-elevated';
      html += '<span class="' + abndCls + '">'
           + escapeHtml(q.abandonedPctStr || '0.00%') + '</span>';
      if (abandoned > 0) {
        html += '<span class="' + abndCls + '">'
             + fmtNumber(abandoned) + ' aban</span>';
      }
    }

    var mtdViol = Number(q.violationsMtd) || 0;
    if (mtdViol > 0) {
      html += '<span class="ov-qcd-flag ov-qcd-violation" title="'
            + mtdViol + ' QCD violation' + (mtdViol === 1 ? '' : 's')
            + ' month-to-date">' + mtdViol + ' viol MTD</span>';
    }
    return html;
  }

  // "What changed" driver: surfaces the per-agent activity change
  // that most contributed to the dept's WoW shift. Server attaches
  // a `driver` field on dept.wow when the delta is notable (>=1.5pt).
  // Renders as a small caption next to the WoW chip, e.g.
  //   "Sarah +12 answered" (positive WoW) or
  //   "Mark +8 missed"     (negative WoW).
  function ovBuildWowDriver_(dept) {
    if (!dept.wow || !dept.wow.driver) return '';
    const drv = dept.wow.driver;
    const dlt = Number(drv.delta) || 0;
    const sign = dlt > 0 ? '+' : '';
    const cls = drv.positive ? 'ov-wow-driver-up' : 'ov-wow-driver-down';
    const tip = drv.agent + ' ' + drv.metric + ': '
              + drv.prev + ' → ' + drv.cur
              + ' (vs prior week) — largest contributor to this dept’s shift.';
    return '<span class="ov-wow-driver ' + cls + '" title="' + escapeHtml(tip) + '">'
         +   escapeHtml(drv.agent) + ' ' + sign + dlt + ' ' + escapeHtml(drv.metric)
         + '</span>';
  }

  // Tooltip text for the active-agents caption. Spells out the
  // three counts (today's active / recently active / full roster)
  // so the user understands why the denominator isn't the full
  // roster size -- ex-employees on the roster sheet (kept for
  // historical-data preservation) get filtered out of the
  // "recently active" count.
  function ovActiveTooltip_(rec) {
    if (!rec) return '';
    const recent  = rec.recentlyActiveCount;
    const roster  = rec.rosterSize;
    const parts = [];
    parts.push(rec.activeAgents + ' agent(s) had activity on the latest date');
    if (recent != null) {
      parts.push(recent + ' agent(s) had activity in the past 30 days (the denominator)');
    }
    if (roster != null) {
      parts.push(roster + ' agent(s) on the full roster sheet');
    }
    return parts.join('. ') + '.';
  }

  function ovBuildAlertPill_(dept) {
    if (!dept.alertedOnLatest) return '';
    return '<span class="ov-alert-pill" title="A low-answer-rate alert was sent for this department on the latest data date.">'
         + '<span aria-hidden="true">🚨</span> Alerted today</span>';
  }

  // Shared grid tile builder. Used by both the main grid and the
  // hero block (for parent-viewers' nested child sub-queues).
  // Set `isChild=true` for sub-queues -- they pick up the
  // accent-tinted background + tree-line connector via CSS.
  function ovBuildGridTile_(dept, color, isChild, routable) {
    const spark = irSparkline_(
      (dept.trend || []).map(function (v) { return v == null ? 0 : v; }),
      color);
    const parentTag = isChild
      ? '<span class="ov-dept-parent-tag">sub-queue &middot; ' + escapeHtml(dept.parent) + '</span>'
      : '';
    const cls = 'ov-dept-tile'
              + (isChild ? ' ov-dept-tile-child' : '')
              + (routable ? ' ov-dept-tile-clickable' : '');
    return '<div class="' + cls + '" data-dept="' + escapeHtml(dept.name) + '">'
         +   '<div class="ov-dept-tile-head">'
         +     '<span class="ov-dept-name">' + escapeHtml(dept.name) + '</span>'
         +     '<span class="ov-dept-active" title="' + escapeHtml(ovActiveTooltip_(dept)) + '">'
         +       dept.activeAgents + ' of ' + (dept.recentlyActiveCount != null ? dept.recentlyActiveCount : dept.rosterSize) + ' agents'
         +     '</span>'
         +   '</div>'
         +   parentTag
         +   ovBuildAlertPill_(dept)
         +   '<div class="ov-dept-tile-pct">'
         +     escapeHtml(dept.latest.pctFormatted)
         +     ' <span class="ov-dept-pct-cap">answered</span>'
         +     ovBuildWowChip_(dept)
         +   '</div>'
         +   '<div class="ov-dept-tile-row">'
         +     '<span><span class="ov-dept-stat-label">Rung</span> ' + dept.latest.rung + '</span>'
         +     '<span><span class="ov-dept-stat-label">Ans</span> ' + dept.latest.answered + '</span>'
         +     '<span><span class="ov-dept-stat-label">Miss</span> ' + dept.latest.missed + '</span>'
         +   '</div>'
         +   '<div class="ov-dept-tile-row">'
         +     '<span><span class="ov-dept-stat-label">ATT</span> ' + escapeHtml(dept.latest.attFormatted) + '</span>'
         +   '</div>'
         +   '<div class="ov-dept-tile-spark" title="30-day % answered trend">' + spark + '</div>'
         + '</div>';
  }

  function ovRenderTiles_(data) {
    const colors = IR_CHART_COLORS;
    const viewerDept = ovViewerDept_(data);
    const depts = data.depts || [];
    const viewerObj = viewerDept ? depts.find(function (d) { return d.name === viewerDept; }) : null;
    // If the viewer is a top-level PARENT, the entire group (parent
    // + its children) is hoisted into the hero block above. So the
    // grid needs to skip that whole group -- otherwise the parent
    // appears twice (hero + grid) or the children appear orphaned
    // below their hoisted parent. If the viewer is a CHILD, we only
    // skip that one tile from its parent group; the parent still
    // appears in the grid (with one fewer sub-queue).
    const skippedParent = viewerObj && !viewerObj.parent ? viewerObj.name : null;
    const skippedChild  = viewerObj &&  viewerObj.parent ? viewerObj.name : null;

    const groups = [];
    const slotByName = {};
    let slot = 0;
    depts.forEach(function (d) {
      if (d.name === skippedChild) return;
      if (d.parent === skippedParent) return;   // parent + its kids in hero
      if (d.name === skippedParent) return;
      if (!d.parent) {
        slotByName[d.name] = slot++;
        groups.push({ parent: d, children: [] });
      } else {
        const last = groups[groups.length - 1];
        if (last && last.parent.name === d.parent) last.children.push(d);
        else {
          // Parent was filtered out for some other reason -- the
          // child becomes a standalone top-level tile in the grid
          // so it still surfaces.
          slotByName[d.name] = slot++;
          groups.push({ parent: d, children: [] });
        }
      }
    });

    const tileRoutable = (USER.role === 'admin');
    const html = groups.map(function (g) {
      const color = colors[(slotByName[g.parent.name] || 0) % colors.length];
      const parentTile = ovBuildGridTile_(g.parent, color, false, tileRoutable);
      const childTiles = g.children.map(function (c) {
        return ovBuildGridTile_(c, color, true, tileRoutable);
      }).join('');
      return '<div class="ov-dept-group">' + parentTile + childTiles + '</div>';
    }).join('');
    $('ov-dept-grid').innerHTML = html;

    // Admin tile-click: route the main dashboard to that dept and
    // navigate to the My Department page. Cheap because the server
    // summary is cached. For managers, tiles are non-routing (they
    // can't switch); their data is fully visible in the tile so no
    // extra hover state is needed.
    if (tileRoutable) {
      $('ov-dept-grid').querySelectorAll('.ov-dept-tile-clickable')
        .forEach(function (tile) {
          tile.addEventListener('click', function () {
            const target = tile.getAttribute('data-dept');
            if (!target) return;
            ovRouteToDept_(target);
          });
        });
    }
  }

  // Admin-only: switch the main dashboard to a different dept and
  // navigate to the My Department page so the new dept's full
  // detail is visible.
  function ovRouteToDept_(deptName) {
    const sel = $('dept-selector');
    if (sel && sel.value !== deptName) {
      sel.value = deptName;
      // Trigger the same 'change' handler the manual dropdown uses
      // -- wipes stale roster caches and re-fetches the summary.
      sel.dispatchEvent(new Event('change'));
    }
    setPage('dept');
  }

  // Renders the user's own dept's agent table at the latest date
  // inside the Overview modal, below the trend chart. For admins,
  // shows whichever dept they currently have selected in the
  // header dropdown. Independent of the main dashboard's date
  // range: always uses latestDate. Fetches via getDepartmentSummary,
  // which is cached server-side per (dept, scope, from, to).
  function ovRenderUserTable_(data) {
    const wrap = $('ov-user-table-wrap');
    const tbody = $('ov-user-tbody');
    const tfoot = $('ov-user-tfoot');
    const status = $('ov-user-table-status');
    if (!wrap || !tbody || !tfoot) return;

    const viewerDept = ovViewerDept_(data);
    if (!viewerDept || !data.latestDate) {
      wrap.style.display = 'none';
      return;
    }
    wrap.style.display = '';

    const title = (USER.role === 'admin' ? 'Selected dept: ' : 'Your dept: ') + viewerDept;
    $('ov-user-table-title').textContent = title;
    $('ov-user-table-date').textContent = ovFormatDateLabel_(data.latestDate);

    status.style.display = '';
    status.className = 'status status-loading';
    status.textContent = 'Loading agent detail…';
    tbody.innerHTML = '';
    tfoot.innerHTML = '';

    google.script.run
      .withSuccessHandler(function (resp) {
        status.style.display = 'none';
        if (!resp || !resp.rows || !resp.rows.length) {
          tbody.innerHTML = '<tr><td colspan="' + COLUMNS.length + '" class="ov-user-empty">No agent rows for this dept on '
                          + escapeHtml(data.latestDate) + '.</td></tr>';
          return;
        }
        // Default sort: missed desc, then name asc -- matches the
        // server's default. Users wanting more sort control can
        // close the modal and use the main table.
        const rows = resp.rows.slice().sort(function (a, b) {
          if (b.totalMissed !== a.totalMissed) return b.totalMissed - a.totalMissed;
          return a.agent.localeCompare(b.agent);
        });
        tbody.innerHTML = rows.map(function (row) {
          const rowClass = (row.matchedViaQueue && !row.matchedViaRoster) ? 'via-queue' : '';
          return '<tr' + (rowClass ? ' class="' + rowClass + '"' : '') + '>'
               + COLUMNS.map(function (col, i) {
                   const isAgent  = (i === 0);
                   const isSource = (col.type === 'chip' && col.key === 'source');
                   const cls = isAgent ? 'agent-name' : (isSource ? 'src-cell' : 'num');
                   const extra = (col.highlight === 'missed' && Number(row.totalMissed) > 0) ? ' missed-high' : '';
                   return '<td class="' + cls + extra + '">' + fmtCell(col, row) + '</td>';
                 }).join('')
               + '</tr>';
        }).join('');
        if (resp.totals) {
          const queueCount = resp.totals.queueOnlyAgentCount || 0;
          const totalLabel = queueCount > 0
            ? 'Totals (roster only · ' + queueCount + ' floater' + (queueCount === 1 ? '' : 's') + ' excluded)'
            : 'Totals';
          tfoot.innerHTML = '<tr>' + COLUMNS.map(function (col, i) {
            const isAgent  = (i === 0);
            const isSource = (col.type === 'chip' && col.key === 'source');
            const cls = isAgent ? 'agent-name' : (isSource ? 'src-cell' : 'num');
            if (isAgent) return '<td class="' + cls + '">' + totalLabel + '</td>';
            if (isSource) return '<td class="' + cls + '"></td>';
            return '<td class="' + cls + '">' + fmtCell(col, resp.totals) + '</td>';
          }).join('') + '</tr>';
        }
      })
      .withFailureHandler(function (err) {
        status.className = 'status status-error';
        status.textContent = 'Error loading detail: '
          + (err && err.message ? err.message : String(err));
      })
      .getDepartmentSummary({
        department: viewerDept,
        from:       data.latestDate,
        to:         data.latestDate,
        scope:      'roster',
      });
  }

  function ovRenderChart_(data) {
    if (ovChartInstance) {
      try { ovChartInstance.destroy(); } catch (e) {}
      ovChartInstance = null;
    }
    destroyOrphanedChartOnCanvas_('ov-trend-chart');
    refreshChartTheme();

    const labels = data.trendLabels || [];
    const colors = IR_CHART_COLORS;
    // Color assignment: walk top-level depts in payload order and
    // give each one a slot from IR_CHART_COLORS. Child depts inherit
    // their parent's hue so the parent-vs-child relationship is
    // legible at a glance. Built once up front instead of per-dept
    // so children referencing parents that appear later in `depts`
    // still resolve correctly (defensive -- depts are typically
    // ordered parent-then-children today, but don't lean on it).
    const colorByDept = {};
    let nextColorSlot = 0;
    (data.depts || []).forEach(function (dept) {
      if (dept.parent) return;
      colorByDept[dept.name] = colors[nextColorSlot % colors.length];
      nextColorSlot++;
    });
    (data.depts || []).forEach(function (dept) {
      if (!dept.parent) return;
      colorByDept[dept.name] = colorByDept[dept.parent]
        || colors[nextColorSlot++ % colors.length];
    });

    const datasets = (data.depts || []).map(function (dept) {
      const color = colorByDept[dept.name];
      const isChild = !!dept.parent;
      return {
        label: dept.name + (isChild ? ' (sub-queue)' : ''),
        data: dept.trend || [],
        borderColor: color,
        // No fill on the overlaid multi-dept chart -- 10+ stacked
        // gradients muddle the view. The soft-area treatment (25%
        // gradient via irGradientFill_) is intentionally reserved
        // for single-series charts like the Individual / Performance
        // monthly trends. Per-dept parent/child differentiation
        // happens via line weight + dash pattern instead.
        backgroundColor: 'rgba(0,0,0,0)',
        fill: false,
        tension: 0.4,
        borderWidth: isChild ? 1.4 : 2.2,
        borderDash: isChild ? [4, 3] : [],
        pointRadius: 0,
        pointHoverRadius: 4,
        pointBackgroundColor: color,
        pointBorderColor: THEME.paperCard,
        pointBorderWidth: 1.5,
        spanGaps: false,    // honor nulls -> gaps for no-data days
      };
    });

    // 92% target dashed baseline -- visualizes the answer-rate goal
    // alert thresholds typically cluster around. Drawn as a faint
    // muted line behind the dept series so it reads as a reference
    // rather than competing data.
    datasets.push({
      label: '92% target',
      data: labels.map(function () { return 92; }),
      borderColor: (THEME && THEME.muted) || '#606872',
      backgroundColor: 'rgba(0,0,0,0)',
      borderWidth: 1,
      borderDash: [6, 4],
      pointRadius: 0,
      pointHoverRadius: 0,
      fill: false,
      tension: 0,
      // Render behind everything else so dept lines stay on top.
      order: 99,
    });

    const ovPlugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];

    ovChartInstance = new Chart($('ov-trend-chart').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      plugins: ovPlugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 12, font: { size: 11 } },
          },
          tooltip: {
            filter: function (ctx) {
              // Hide the 92% baseline from the per-line tooltip list.
              return ctx.dataset.label !== '92% target';
            },
            callbacks: {
              label: function (ctx) {
                const v = ctx.parsed && ctx.parsed.y;
                if (v == null) return ctx.dataset.label + ': no data';
                return ctx.dataset.label + ': ' + v.toFixed(1) + '%';
              },
            },
          },
          datalabels: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: 100,
            ticks: { callback: function (v) { return v + '%'; } },
            title: { display: true, text: '% Answered', font: { size: 11 } },
          },
          x: { ticks: { autoSkip: true, maxTicksLimit: 10 } },
        },
        interaction: { mode: 'index', intersect: false },
      },
    });
  }

  // -- Router + URL hash routing (Phase C) -------------------------------
  // Lightweight in-page router that lets the user deep-link into a
  // specific report modal -- the primary use-case is the "Open in
  // new tab" affordance, which lets users OS-tile two browser
  // windows for side-by-side comparison.
  //
  // Design:
  //   * The header nav already has the modal-trigger buttons we want
  //     (Missed / Individual / Performance / Compare / QCD / Alerts /
  //     Outlier Fix). Each tab carries a data-route="..." attribute.
  //   * This router adds a click listener on every [data-route]
  //     element that tracks the active route + paints the active-tab
  //     visual indicator. It does NOT open the modal itself --
  //     each per-modal initXxxReport already has its own click
  //     handler that does the open. Two listeners fire on the same
  //     button click; they don't conflict.
  //   * On modal close (close button or backdrop), the router
  //     reverts the active state to the underlying page tab
  //     (Overview or My Department) so the highlight follows what's
  //     actually visible. Escape-key closes are not intercepted in
  //     this phase; the tab stays highlighted until the next click
  //     -- a minor visual cosmetic miss that's reversible by any
  //     subsequent tab interaction.
  //   * On page load, google.script.url.getLocation reads the parent
  //     URL's hash; if it matches a known route, the corresponding
  //     tab is programmatically clicked so the deep-link lands on
  //     the right view. Defensive against unknown / malformed hashes:
  //     the tab lookup quietly no-ops if no match.
  //
  // The router does not push hash updates to the parent URL on
  // modal open -- that would require google.script.history which
  // has had spotty browser behavior. The currentRoute is tracked
  // purely in-JS and consumed by the "Open in new tab" buttons,
  // which build a fresh URL from window.__DASHBOARD_URL__ + the
  // current route. The new tab loads the dashboard fresh and the
  // init-time hash read opens the deep-linked modal.

  const ROUTES_ = {
    '/overview':           { kind: 'page',  page: 'overview' },
    '/dept':               { kind: 'page',  page: 'dept' },
    '/report/missed':      { kind: 'modal', modalId: 'missed-modal',      buttonId: 'missed-report-btn' },
    '/report/individual':  { kind: 'modal', modalId: 'individual-modal',  buttonId: 'individual-report-btn' },
    '/report/performance': { kind: 'modal', modalId: 'performance-modal', buttonId: 'performance-report-btn' },
    '/report/compare':     { kind: 'modal', modalId: 'compare-modal',     buttonId: 'compare-ranges-btn' },
    '/report/qcd':         { kind: 'modal', modalId: 'qcd-modal',         buttonId: 'qcd-report-btn' },
    '/admin/alerts':       { kind: 'modal', modalId: 'alerts-modal',      buttonId: 'alerts-btn' },
    '/admin/orphan-fix':   { kind: 'modal', modalId: 'orphan-fix-modal',  buttonId: 'orphan-fix-btn' },
    '/admin/dept-config':  { kind: 'modal', modalId: 'dept-config-modal', buttonId: 'dept-config-btn' },
  };

  // The route currently considered "active". Starts as '/overview'
  // matching the default landing page. Reset to the underlying page
  // ('/overview' or '/dept') whenever a modal closes.
  var currentRoute = '/overview';

  function updateTabActiveState_(route) {
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      const isActive = btn.getAttribute('data-route') === route;
      btn.classList.toggle('header-nav-current', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
  }

  function setRoute_(route) {
    if (!ROUTES_[route]) return;
    currentRoute = route;
    updateTabActiveState_(route);
  }

  function basePageRoute_() {
    return document.body.getAttribute('data-page') === 'dept' ? '/dept' : '/overview';
  }

  function initRouter() {
    // Wire up click on every [data-route] element. The per-modal
    // initXxxReport already adds its own click handler that opens
    // the modal; this just tracks the route + active state.
    document.querySelectorAll('[data-route]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const route = btn.getAttribute('data-route');
        if (!route || !ROUTES_[route]) return;
        setRoute_(route);
      });
    });

    // Wire up modal close paths to revert the active state. We hook
