      return '<span class="al-drift-chip al-drift-cold" '
           + 'title="No daily-trigger entries logged for this dept yet">—</span>';
    }
    if (drift.severity === 'cold') {
      return '<span class="al-drift-chip al-drift-cold" '
           + 'title="Only ' + drift.total + ' daily-trigger entries -- not enough to assess">'
           + drift.fired + '/' + drift.total + '</span>';
    }
    let cls = 'al-drift-ok';
    let tip = '';
    if (drift.severity === 'chronic') {
      cls = 'al-drift-chronic';
      tip = 'Chronic: alerts firing nearly every day. Threshold of '
          + Number(cfg.threshold).toFixed(0) + '% may be too strict, '
          + 'or the dept is sustainedly under-performing.';
    } else if (drift.severity === 'lenient') {
      cls = 'al-drift-lenient';
      tip = 'Lenient: 0 fires and the dept averages '
          + (drift.meanRate != null ? drift.meanRate.toFixed(1) + '%' : 'high')
          + ' -- threshold of ' + Number(cfg.threshold).toFixed(0)
          + '% may be too low to catch a real degradation.';
    } else {
      tip = 'In range: ' + drift.fired + ' fires of ' + drift.total
          + ' trigger runs.';
    }
    const mean = drift.meanRate != null ? (' · avg ' + drift.meanRate.toFixed(1) + '%') : '';
    return '<span class="al-drift-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         + drift.fired + '/' + drift.total + mean
         + '</span>';
  }

  function alRenderTriggerStatus_(trigger) {
    const el = $('al-trigger-status');
    const installBtn = $('al-install-trigger-btn');
    const uninstallBtn = $('al-uninstall-trigger-btn');
    if (!el) return;
    if (trigger && trigger.installed) {
      el.textContent = 'Daily trigger is installed (runs at '
                     + (trigger.hour || 8) + ':00 ' + tzSuffix_()
                     + '). The trigger runs the previous day\'s check; weekends are skipped.';
      if (installBtn) installBtn.style.display = 'none';
      if (uninstallBtn) uninstallBtn.style.display = '';
    } else {
      el.textContent = 'No daily trigger installed. Without it, alerts only fire when you click "Send alerts" below.';
      if (installBtn) installBtn.style.display = '';
      if (uninstallBtn) uninstallBtn.style.display = 'none';
    }
  }

  // Returns "CST" or "CDT" (or whatever the user's browser
  // observes for America/Chicago today). Apps Script triggers
  // fire in the script TZ (America/Chicago) which is DST-aware,
  // so the previous hardcoded "CST" was wrong half the year.
  // Falls back to "CT" on browsers that don't expose timeZoneName.
  function tzSuffix_() {
    try {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Chicago',
        timeZoneName: 'short',
      }).formatToParts(new Date());
      const tzPart = parts.find(function (p) { return p.type === 'timeZoneName'; });
      if (tzPart && tzPart.value) return tzPart.value;
    } catch (e) { /* fall through */ }
    return 'CT';
  }

  function alRenderLog_(log) {
    const tbody = $('al-log-tbody');
    if (!tbody) return;
    if (!log.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">No alerts logged yet.</td></tr>';
      return;
    }
    tbody.innerHTML = log.map(function (l) {
      const sentCls = l.triggered ? 'al-active-yes' : 'al-active-no';
      const sentLbl = l.triggered ? 'Yes' : 'No';
      return '<tr>'
           +   '<td>' + escapeHtml(l.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(l.department || '') + '</td>'
           +   '<td>' + escapeHtml(String(l.dateChecked || '')) + '</td>'
           +   '<td class="num">' + (l.answerRate == null ? '-' : Number(l.answerRate).toFixed(1) + '%') + '</td>'
           +   '<td class="num">' + escapeHtml(String(l.threshold || '')) + '</td>'
           +   '<td><span class="al-active ' + sentCls + '">' + sentLbl + '</span></td>'
           +   '<td>' + escapeHtml(l.triggeredBy || '') + '</td>'
           +   '<td>' + escapeHtml(l.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  function alSetRunStatus_(kind, msg) {
    const el = $('al-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  function alClearResults_() {
    const wrap = $('al-results-wrap');
    if (wrap) wrap.style.display = 'none';
    $('al-results-tbody').innerHTML = '';
    $('al-results-summary').innerHTML = '';
  }

  function alRunPreview_() {
    const date = $('al-date').value;
    if (!date) { alSetRunStatus_('error', 'Pick a date first.'); return; }
    const btn = $('al-preview-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Loading…';
    alSetRunStatus_('loading', 'Running preview for ' + date + '…');
    google.script.run
      .withSuccessHandler(function (results) {
        btn.disabled = false; btn.textContent = prev;
        alLastPreview = { date: date, results: results || [] };
        alRenderResults_(results || [], /*isPreview=*/true);
        const wouldFire = (results || []).filter(function (r) { return r.status === 'would-send'; }).length;
        alSetRunStatus_(wouldFire > 0 ? 'success' : '', wouldFire > 0
          ? 'Preview complete. ' + wouldFire + ' dept' + (wouldFire === 1 ? '' : 's')
            + ' would be alerted. Review below, then click Send alerts.'
          : 'Preview complete. No alerts would fire for ' + date + '.');
        $('al-send-btn').disabled = wouldFire === 0;
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Preview failed: ' + (err && err.message ? err.message : String(err)));
      })
      .previewAlerts({ date: date });
  }

  function alRunSend_() {
    const date = $('al-date').value;
    if (!date) { alSetRunStatus_('error', 'Pick a date first.'); return; }
    if (!alLastPreview || alLastPreview.date !== date) {
      alSetRunStatus_('error', 'Preview for ' + date + ' first.');
      return;
    }
    const wouldFire = alLastPreview.results.filter(function (r) { return r.status === 'would-send'; });
    if (!wouldFire.length) {
      alSetRunStatus_('error', 'Nothing to send for this date.');
      return;
    }
    const ok = window.confirm(
      'Send ' + wouldFire.length + ' alert email' + (wouldFire.length === 1 ? '' : 's')
      + ' for ' + date + '? Recipients are listed in the preview table.');
    if (!ok) return;

    const btn = $('al-send-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Sending…';
    alSetRunStatus_('loading', 'Sending alerts…');
    google.script.run
      .withSuccessHandler(function (results) {
        btn.disabled = true; btn.textContent = prev;
        alRenderResults_(results || [], /*isPreview=*/false);
        const sent = (results || []).filter(function (r) { return r.status === 'sent'; }).length;
        alSetRunStatus_('success', 'Done. ' + sent + ' alert' + (sent === 1 ? '' : 's')
          + ' sent. Refresh the page to see the updated log.');
        showToast(sent + ' alert' + (sent === 1 ? '' : 's') + ' sent', 'success');
        // Re-fetch the log so the new entries appear inline.
        google.script.run
          .withSuccessHandler(function (data) { if (data) alRenderLog_(data.log || []); })
          .withFailureHandler(function () { /* ignore */ })
          .getAlertsInit();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Send failed: ' + (err && err.message ? err.message : String(err)));
      })
      .sendAlerts({ date: date });
  }

  function alRenderResults_(results, isPreview) {
    const wrap = $('al-results-wrap');
    const tbody = $('al-results-tbody');
    if (!wrap || !tbody) return;
    wrap.style.display = '';

    const counts = { sent: 0, 'would-send': 0, 'above-threshold': 0,
                     'no-data': 0, 'no-recipients': 0, skipped: 0, error: 0 };
    results.forEach(function (r) { counts[r.status] = (counts[r.status] || 0) + 1; });

    const summary = [];
    if (counts['sent'])          summary.push(counts['sent'] + ' sent');
    if (counts['would-send'])    summary.push(counts['would-send'] + ' would fire');
    if (counts['above-threshold']) summary.push(counts['above-threshold'] + ' above threshold');
    if (counts['no-data'])       summary.push(counts['no-data'] + ' no data');
    if (counts['no-recipients']) summary.push(counts['no-recipients'] + ' no recipients');
    if (counts['skipped'])       summary.push(counts['skipped'] + ' inactive');
    if (counts['error'])         summary.push(counts['error'] + ' errored');
    $('al-results-summary').textContent = summary.join(' · ');

    tbody.innerHTML = results.map(function (r) {
      const rateCell = r.answerRate == null ? '-'
        : Number(r.answerRate).toFixed(1) + '%';
      const recipientsCell = (r.recipients || []).length
        ? escapeHtml(r.recipients.join(', '))
        : '<span class="al-empty-inline">-</span>';
      const statusCell = alStatusBadge_(r.status, isPreview);
      return '<tr class="al-row-' + r.status + '">'
           +   '<td>' + escapeHtml(r.department) + '</td>'
           +   '<td class="num">' + rateCell + '</td>'
           +   '<td class="num">' + Number(r.threshold).toFixed(0) + '%</td>'
           +   '<td class="al-recipients-cell">' + recipientsCell + '</td>'
           +   '<td>' + statusCell + '</td>'
           +   '<td>' + escapeHtml(r.notes || '') + '</td>'
           + '</tr>';
    }).join('');
  }

  function alStatusBadge_(status, isPreview) {
    const labels = {
      'sent':            { text: 'Sent',            cls: 'pr-delta-pos' },
      'would-send':      { text: 'Will alert',      cls: 'pr-delta-neg' },
      'above-threshold': { text: 'Healthy',         cls: 'pr-delta-neu' },
      'no-data':         { text: 'No data',         cls: 'pr-delta-neu' },
      'no-recipients':   { text: 'No recipients',   cls: 'pr-delta-neg' },
      'skipped':         { text: 'Inactive',        cls: 'pr-delta-neu' },
      'error':           { text: 'Error',           cls: 'pr-delta-neg' },
    };
    const meta = labels[status] || { text: status, cls: 'pr-delta-neu' };
    return '<span class="pr-delta ' + meta.cls + '">' + meta.text + '</span>';
  }

  function alInstallTrigger_() {
    const btn = $('al-install-trigger-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Installing…';
    google.script.run
      .withSuccessHandler(function (status) {
        btn.disabled = false; btn.textContent = prev;
        alRenderTriggerStatus_(status || { installed: true });
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Install failed: ' + (err && err.message ? err.message : String(err)));
      })
      .installAlertTrigger();
  }

  function alUninstallTrigger_() {
    const ok = window.confirm('Stop the daily alert trigger? Alerts will only fire when you click "Send alerts" manually.');
    if (!ok) return;
    const btn = $('al-uninstall-trigger-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Uninstalling…';
    google.script.run
      .withSuccessHandler(function (status) {
        btn.disabled = false; btn.textContent = prev;
        alRenderTriggerStatus_(status || { installed: false });
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        alSetRunStatus_('error', 'Uninstall failed: ' + (err && err.message ? err.message : String(err)));
      })
      .uninstallAlertTrigger();
  }

  // -- Outlier Fix modal (admin-only) ---------------------------------
  // The only admin UI that triggers WRITES from the dashboard. The
  // server-side OrphanFix.gs enforces the security model (assertAdmin
  // + input validation + LockService + audit log); this client is
  // just the form layer.
  //
  // Naming note: the feature is labeled "Outlier Fix" in user-
  // facing copy (button, modal title, empty states). The file name
  // (OrphanFix.gs), sheet names (Agent Alias Overrides, Orphan
  // Fix Log), audit-log action values (alias-add, rename, rename+
  // alias), and JS internals (initOrphanFix, ofRenderOrphans_, etc.)
  // all keep the original "Orphan" naming so existing sheet data
  // doesn't have to migrate. Search either term to find the
  // feature.

  let ofLastInit = null;

  function initOrphanFix() {
    const btn   = $('orphan-fix-btn');
    const modal = $('orphan-fix-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      ofLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
  }

  function ofLoadInit_() {
    $('of-loading').style.display = '';
    $('of-body').style.display = 'none';
    ofSetStatus_(null);
    google.script.run
      .withSuccessHandler(function (data) {
        $('of-loading').style.display = 'none';
        $('of-body').style.display = '';
        ofLastInit = data || { orphans: [], rosterNames: [], aliases: [], log: [] };
        ofRender_(ofLastInit);
      })
      .withFailureHandler(function (err) {
        $('of-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getOrphanFixInit();
  }

  function ofRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('of-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    ofRenderOrphans_(data.orphans || [], data.rosterNames || []);
    ofRenderAliases_(data.aliases || []);
    ofRenderLog_(data.log || []);
  }

  function ofRenderOrphans_(orphans, rosterNames) {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    if (!orphans.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No outliers in the last 180 days. Every agent name in DQE '
        + 'Historical Data maps to a roster entry. &#x1F389;'
        + '</td></tr>';
      return;
    }
    // Build the roster-name <option> list once; reused per row.
    const optionsHtml = '<option value="">(pick canonical name)</option>'
      + rosterNames.map(function (n) {
          return '<option value="' + escapeHtml(n) + '">' + escapeHtml(n) + '</option>';
        }).join('');

    tbody.innerHTML = orphans.map(function (o, idx) {
      const exts = (o.sampleExts || []).join(', ') || '<span class="al-empty-inline">-</span>';
      return '<tr data-orphan-idx="' + idx + '">'
           +   '<td>' + escapeHtml(o.name) + '</td>'
           +   '<td class="num">' + o.rows + '</td>'
           +   '<td>' + escapeHtml(o.lastSeen || '') + '</td>'
           +   '<td>' + exts + '</td>'
           +   '<td><select class="of-row-select" data-idx="' + idx + '">'
           +     optionsHtml
           +     '</select></td>'
           +   '<td><button type="button" class="btn btn-secondary of-row-apply" '
           +     'data-idx="' + idx + '" disabled>Apply</button></td>'
           + '</tr>';
    }).join('');

    // Wire selects to enable Apply when a non-empty value is chosen,
    // and Apply buttons to fire the rename.
    tbody.querySelectorAll('.of-row-select').forEach(function (sel) {
      sel.addEventListener('change', function () {
        const idx = sel.getAttribute('data-idx');
        const applyBtn = tbody.querySelector('.of-row-apply[data-idx="' + idx + '"]');
        if (applyBtn) applyBtn.disabled = !sel.value;
      });
    });
    tbody.querySelectorAll('.of-row-apply').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const orphan = (ofLastInit.orphans || [])[idx];
        const sel = tbody.querySelector('.of-row-select[data-idx="' + idx + '"]');
        const canonical = sel ? sel.value : '';
        if (!orphan || !canonical) return;
        ofConfirmAndApply_(btn, orphan, canonical);
      });
    });
  }

  function ofConfirmAndApply_(btn, orphan, canonical) {
    const msg = 'Rename "' + orphan.name + '" to "' + canonical + '" in '
              + orphan.rows + ' historical row' + (orphan.rows === 1 ? '' : 's')
              + '?\n\nThis modifies past data in DQE Historical Data. An '
              + 'alias will also be added to Agent Alias Overrides so the '
              + 'next daily build keeps the mapping. The action is audited '
              + 'to Orphan Fix Log.';
    if (!window.confirm(msg)) return;

    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Applying…';
    ofSetStatus_('loading', 'Applying rename: ' + orphan.name + ' -> ' + canonical + '…');

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false; btn.textContent = prev;
        const n = (res && res.renamed) || 0;
        ofSetStatus_('success',
          'Renamed ' + n + ' row' + (n === 1 ? '' : 's')
          + '. Alias added so future imports map correctly. '
          + 'Dashboard caches may take up to 5 minutes to reflect the change.');
        showToast('Renamed ' + n + ' row' + (n === 1 ? '' : 's'), 'success');
        ofLoadInit_();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        ofSetStatus_('error', 'Rename failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .applyOrphanRename({
        fromName:     orphan.name,
        toName:       canonical,
        alsoAddAlias: true,
        notes:        '',
      });
  }

  function ofRenderAliases_(aliases) {
    const tbody = $('of-aliases-tbody');
    if (!tbody) return;
    if (!aliases.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No aliases yet. Aliases get added automatically when you Apply '
        + 'a rename above.'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = aliases.map(function (a) {
      const activeCls = a.active ? 'al-active-yes' : 'al-active-no';
      const activeLbl = a.active ? 'Yes' : 'No';
      const removeBtn = a.active
        ? '<button type="button" class="link-btn of-alias-remove" '
          + 'data-old="' + escapeHtml(a.oldName) + '" title="Deactivate this alias">Deactivate</button>'
        : '';
      return '<tr>'
           +   '<td>' + escapeHtml(a.oldName) + '</td>'
           +   '<td>' + escapeHtml(a.canonicalName) + '</td>'
           +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
           +   '<td>' + escapeHtml(a.addedBy || '') + '</td>'
           +   '<td>' + escapeHtml(a.addedAt || '') + '</td>'
           +   '<td>' + removeBtn + '</td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.of-alias-remove').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const oldName = btn.getAttribute('data-old');
        if (!window.confirm('Deactivate alias for "' + oldName + '"? The pipeline will stop mapping this raw name on the next build. Historical rows that were already renamed stay renamed.')) return;
        btn.disabled = true;
        ofSetStatus_('loading', 'Deactivating alias…');
        google.script.run
          .withSuccessHandler(function (res) {
            const n = (res && res.removed) || 0;
            ofSetStatus_('success', 'Deactivated ' + n + ' alias row'
              + (n === 1 ? '' : 's') + '.');
            ofLoadInit_();
          })
          .withFailureHandler(function (err) {
            btn.disabled = false;
            ofSetStatus_('error', 'Deactivate failed: '
              + (err && err.message ? err.message : String(err)));
          })
          .removeAgentAlias({ oldName: oldName });
      });
    });
  }

  function ofRenderLog_(log) {
    const tbody = $('of-log-tbody');
    if (!tbody) return;
    if (!log.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No outlier-fix actions logged yet.</td></tr>';
      return;
    }
    tbody.innerHTML = log.map(function (e) {
      return '<tr>'
           +   '<td>' + escapeHtml(e.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(e.admin || '')     + '</td>'
           +   '<td>' + escapeHtml(e.action || '')    + '</td>'
           +   '<td>' + escapeHtml(e.fromName || '')  + '</td>'
           +   '<td>' + escapeHtml(e.toName || '')    + '</td>'
           +   '<td class="num">' + (e.affectedRows == null ? '-' : escapeHtml(String(e.affectedRows))) + '</td>'
           +   '<td>' + escapeHtml(e.notes || '')     + '</td>'
           + '</tr>';
    }).join('');
  }

  function ofSetStatus_(kind, msg) {
    const el = $('of-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // -- Dept Config modal -----------------------------------------------
  // Admin-only, no-redeploy authoring for the per-dept QCD queue map,
  // Overview sub-queue nesting, and team-avg exclusions. Mirrors the
  // Outlier Fix modal: load init -> render discovered queues +
  // per-dept effective config -> inline edit form -> save/deactivate.
  // Server (DeptConfig.gs) validates every save.

  let dcLastInit = null;
  let dcEditDept = null;

  function initDeptConfig() {
    const btn   = $('dept-config-btn');
    const modal = $('dept-config-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      dcLoadInit_();

    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();

    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    // Static edit-form buttons (wired once; the form is populated per

  function dcLoadInit_() {
    $('dc-loading').style.display = '';
    $('dc-body').style.display = 'none';
    dcSetStatus_(null);
    dcCloseEdit_();
    google.script.run
      .withSuccessHandler(function (data) {
        $('dc-loading').style.display = 'none';
        $('dc-body').style.display = '';
        dcLastInit = data || { departments: [], rosterByDept: {}, effective: [], rows: [], discoveredQueues: [], unmappedCount: 0 };
        dcRender_(dcLastInit);
      })
      .withFailureHandler(function (err) {
        $('dc-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getDeptConfigInit();
  }

  function dcRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('dc-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    // Department datalist for the Overview-parent input.
    const dl = $('dc-dept-datalist');
    if (dl) {
      dl.innerHTML = (data.departments || []).map(function (d) {
        return '<option value="' + escapeHtml(d) + '"></option>';
      }).join('');
    }
    dcRenderDiscovered_(data.discoveredQueues || [], data.unmappedCount || 0);
    dcRenderEffective_(data.effective || []);
  }

  function dcRenderDiscovered_(queues, unmappedCount) {
    const badge = $('dc-unmapped-badge');
    if (badge) {
      if (unmappedCount > 0) {
        badge.textContent = unmappedCount + ' unmapped';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
    const tbody = $('dc-discovered-tbody');
    if (!tbody) return;
    if (!queues.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">'
        + 'No queue names found in QCD Historical Data (last 180 days).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = queues.map(function (q) {
      const mapped = q.mappedTo
        ? '<span class="al-active al-active-yes">' + escapeHtml(q.mappedTo) + '</span>'
        : '<span class="al-active al-active-no">unmapped</span>';
      return '<tr>'
           +   '<td>' + escapeHtml(q.queue) + '</td>'
           +   '<td class="num">' + (q.rows || 0) + '</td>'
           +   '<td>' + escapeHtml(q.lastSeen || '') + '</td>'
           +   '<td>' + mapped + '</td>'
           + '</tr>';
    }).join('');
  }

  function dcRenderEffective_(effective) {
    const tbody = $('dc-effective-tbody');
    if (!tbody) return;
    if (!effective.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No departments found.</td></tr>';
      return;
    }
    const cell = function (str) {
      return str ? escapeHtml(str) : '<span class="al-empty-inline">-</span>';
    };
    tbody.innerHTML = effective.map(function (e, idx) {
      const source = e.hasRow
        ? '<span class="al-active al-active-yes">sheet</span>'
        : '<span class="al-active al-active-no">default</span>';
      return '<tr data-dc-idx="' + idx + '">'
           +   '<td>' + escapeHtml(e.dept) + '</td>'
           +   '<td>' + cell((e.qcdQueues || []).join(', ')) + '</td>'
           +   '<td>' + cell(e.overviewParent || '') + '</td>'
           +   '<td>' + cell((e.teamAvgExcludes || []).join(', ')) + '</td>'
           +   '<td>' + cell((e.queueExtOverrides || []).join(', ')) + '</td>'
           +   '<td>' + source + '</td>'
           +   '<td><button type="button" class="link-btn dc-row-edit" data-idx="' + idx + '">Edit</button></td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.dc-row-edit').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const e = (dcLastInit.effective || [])[idx];
        if (e) dcOpenEdit_(e);
      });
    });
  }

  function dcOpenEdit_(eff) {
    dcEditDept = eff.dept;
    const nameEl = $('dc-edit-dept-name');
    if (nameEl) nameEl.textContent = eff.dept;
    $('dc-edit-qcd').value      = (eff.qcdQueues || []).join(', ');
    $('dc-edit-parent').value   = eff.overviewParent || '';
    $('dc-edit-excludes').value = (eff.teamAvgExcludes || []).join(', ');
    $('dc-edit-qext').value     = (eff.queueExtOverrides || []).join(', ');
    $('dc-edit-notes').value    = '';
    // Deactivate only makes sense when a sheet row exists for the dept.
    const deact = $('dc-deactivate-btn');
    if (deact) deact.style.display = eff.hasRow ? '' : 'none';
    $('dc-edit-section').style.display = '';
    $('dc-edit-qcd').focus();
  }

  function dcCloseEdit_() {
    dcEditDept = null;
    const sec = $('dc-edit-section');
    if (sec) sec.style.display = 'none';
  }

  function dcSave_() {
    if (!dcEditDept) return;
    const req = {
      dept:              dcEditDept,
      qcdQueues:         $('dc-edit-qcd').value,
      overviewParent:    $('dc-edit-parent').value,
      teamAvgExcludes:   $('dc-edit-excludes').value,
      queueExtOverrides: $('dc-edit-qext').value,
      active:            true,
      notes:             $('dc-edit-notes').value,
    };
    const saveBtn = $('dc-save-btn');
    if (saveBtn) saveBtn.disabled = true;
    dcSetStatus_('loading', 'Saving config for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function () {
        if (saveBtn) saveBtn.disabled = false;
        dcSetStatus_('success', 'Saved ' + dcEditDept
          + '. Changes take effect on the next request (caches refresh within ~5 min).');
        showToast('Saved config for ' + dcEditDept, 'success');
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        if (saveBtn) saveBtn.disabled = false;
        dcSetStatus_('error', 'Save failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .saveDeptConfig(req);
  }

  function dcDeactivate_() {
    if (!dcEditDept) return;
    if (!window.confirm('Deactivate the override row for "' + dcEditDept
        + '"? This reverts the dept to the built-in defaults.')) return;
    const deact = $('dc-deactivate-btn');
    if (deact) deact.disabled = true;
    dcSetStatus_('loading', 'Deactivating override for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function (res) {
        if (deact) deact.disabled = false;
        const n = (res && res.removed) || 0;
        dcSetStatus_('success', 'Deactivated ' + n + ' override row'
          + (n === 1 ? '' : 's') + '. Reverted to defaults.');
        showToast('Reverted ' + dcEditDept + ' to defaults', 'success');
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        if (deact) deact.disabled = false;
        dcSetStatus_('error', 'Deactivate failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .removeDeptConfig({ dept: dcEditDept });
  }

  function dcSetStatus_(kind, msg) {
    const el = $('dc-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // -- QCD Report modal ------------------------------------------------
  // Queue Call Detail report. Per-dept gated; reads QCD Historical
  // Data via QCDReport.gs. Layout: dept-level KPI tiles ->
  // per-source breakdown table -> 12-month monthly trend chart
  // with tab strip (Total Calls / Abandoned % / Violations).

  let qcdLastData = null;
  let qcdChartInstance = null;
  let qcdActiveMetric = 'totalCalls';
  let qcdActiveView   = 'monthly';   // 'monthly' (default) | 'daily'

  function initQcdReport() {
    const btn   = $('qcd-report-btn');
    const modal = $('qcd-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      showQcdForm();
      setQcdDefaultDates_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const preset = $('qcd-preset');
    if (preset) preset.addEventListener('change', applyQcdPreset);
    ['qcd-from', 'qcd-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', function () {
        const p = $('qcd-preset');
        if (p) p.value = 'custom';
      });
    });

    const gen = $('qcd-generate-btn');
    if (gen) gen.addEventListener('click', runQcdReport);
    const back = $('qcd-back-btn');
    if (back) back.addEventListener('click', showQcdForm);

    // Chart metric tabs
    const tabs = $('qcd-chart-tabs');
    if (tabs) tabs.addEventListener('click', function (e) {
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      qcdActiveMetric = tab.getAttribute('data-metric') || 'totalCalls';
      tabs.querySelectorAll('.ir-tab').forEach(function (b) {
        const active = b === tab;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      if (qcdLastData) qcdRenderChart_(qcdLastData);
    });

    // Chart-view toggle (Monthly / Daily). Switches the chart's
    // x-axis between the 12-month trend window and one point per
    // day within the selected From/To range.
    const viewToggle = $('qcd-view-toggle');
    if (viewToggle) viewToggle.addEventListener('click', function (e) {
      const btn = e.target.closest('.seg-btn');
      if (!btn) return;
      const next = btn.getAttribute('data-view') || 'monthly';
      if (next === qcdActiveView) return;
      qcdActiveView = next;
      viewToggle.querySelectorAll('.seg-btn').forEach(function (b) {
        const active = b === btn;
        b.classList.toggle('active', active);
        b.setAttribute('aria-checked', active ? 'true' : 'false');
      });
      if (qcdLastData) qcdRenderChart_(qcdLastData);
    });

    // Export menu
    const exportBtn  = $('qcd-export-btn');
    const exportMenu = $('qcd-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        exportMenu.style.display = exportMenu.style.display === 'none' ? '' : 'none';
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        exportMenu.style.display = 'none';
        if (action === 'copy')  qcdCopyImage_();
        else if (action === 'email') qcdEmailImage_();
        else if (action === 'print') qcdPrint_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        exportMenu.style.display = 'none';
      });
    }
  }

  function setQcdDefaultDates_() {
    const now = new Date();
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    const yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
    $('qcd-from').value = isoOf(yesterday);
    $('qcd-to').value   = isoOf(yesterday);
    var p = $('qcd-preset');
    if (p) p.value = 'yesterday';
  }

  function applyQcdPreset() {
    const v = $('qcd-preset').value;
    if (v === 'custom') return;
    const now = new Date();
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    let s, e;
    if (v === 'yesterday') {
      s = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      e = new Date(s);
    } else if (v === 'thisMonth') {
      s = new Date(now.getFullYear(), now.getMonth(), 1);
      e = now;
    } else if (v === 'lastMonth') {
      s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      e = new Date(now.getFullYear(), now.getMonth(), 0);
    } else if (v === 'last30') {
      s = new Date(now.getTime() - 29 * 86400000);
      e = now;
    } else if (v === 'last3Months') {
      s = new Date(now.getFullYear(), now.getMonth() - 3, 1);
      e = now;
    } else if (v === 'last12Months') {
      s = new Date(now.getFullYear(), now.getMonth() - 12, 1);
      e = now;
    } else if (v === 'lastYear') {
      s = new Date(now.getFullYear() - 1, 0, 1);
      e = new Date(now.getFullYear() - 1, 11, 31);
    }
    if (!s) return;
    $('qcd-from').value = isoOf(s);
    $('qcd-to').value   = isoOf(e);
  }

  function showQcdForm() {
    $('qcd-form').style.display    = '';
    $('qcd-results').style.display = 'none';
    qcdSetFormError_('');
  }
  function showQcdResults_() {
    $('qcd-form').style.display    = 'none';
    $('qcd-results').style.display = '';
  }
  function qcdSetFormError_(msg) {
    const el = $('qcd-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function runQcdReport() {
    qcdSetFormError_('');
    const dept = getRequestedDept();
    const from = $('qcd-from').value;
    const to   = $('qcd-to').value;
    if (!from || !to) { qcdSetFormError_('Pick a start and end date.'); return; }
    if (from > to)    { qcdSetFormError_('Start date must be on or before end date.'); return; }

    const btn = $('qcd-generate-btn');
    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Loading…';

    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false; btn.textContent = prev;
        qcdRenderReport_(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        qcdSetFormError_('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getQcdReport({ department: dept, from: from, to: to });
  }

  function qcdRenderReport_(data) {
    qcdLastData = data;
    $('qcd-results-title').textContent = 'QCD Report';
    $('qcd-results-date').textContent  = '(' + (data.dateLabel || '') + ')';
    showQcdResults_();
    var hint = $('qcd-queue-hint');
    if (hint) {
      if (data.meta && data.meta.unmapped) {
        hint.textContent = 'No queues mapped for this department. Add a '
          + 'row to DEPT_QCD_QUEUES in Config.gs and redeploy.';
        hint.style.display = '';
      } else {
        hint.style.display = 'none';
      }
    }
    // Single-day range: hide the Daily view toggle since a single
    // point isn't useful as a line chart; force monthly view.
    var isSingleDay = data.meta && data.meta.from === data.meta.to;
    var dailyBtn = document.querySelector('#qcd-view-toggle [data-view="daily"]');
    if (dailyBtn) dailyBtn.style.display = isSingleDay ? 'none' : '';
    if (isSingleDay && qcdActiveView === 'daily') {
      qcdActiveView = 'monthly';
      var vt = $('qcd-view-toggle');
      if (vt) vt.querySelectorAll('.seg-btn').forEach(function (b) {
        var active = b.getAttribute('data-view') === 'monthly';
        b.classList.toggle('active', active);
        b.setAttribute('aria-checked', active ? 'true' : 'false');
      });
    }
    qcdRenderForecast_(data);
    qcdRenderKpiTiles_(data.totals || {});
    qcdRenderQueueTable_(data.queueBreakdown || [], data.totals || {});
    qcdRenderDailyTable_(data.dailySeries || []);
    requestAnimationFrame(function () { qcdRenderChart_(data); });
  }

  // Days-to-violation forecast (E9, Phase E). Linear regression on
  // the last 7 entries of dailySeries.abandonedPct; if slope > 0 and
  // the regression projects a crossing of the 5% violation threshold
  // within QCD_FORECAST_HORIZON_DAYS (=7), surface a warn-tinted
  // banner above the KPI tiles. Hidden in healthy states (negative
  // slope, projected crossing too far out, or already above 5%).
  //
  // Math (avoids any library dep):
  //   slope = (n*Σxy - Σx*Σy) / (n*Σx² - (Σx)²)
  //   daysToCross = (5 - currentY) / slope
  // where currentY is the last observed abandonedPct and x is days
  // since the first point in the window.
  const QCD_FORECAST_HORIZON_DAYS = 7;
  const QCD_FORECAST_WINDOW_DAYS  = 7;
  function qcdRenderForecast_(data) {
    const el = $('qcd-forecast');
    if (!el) return;
    el.style.display = 'none';
    el.innerHTML = '';
    const series = (data && data.dailySeries) || [];
    if (series.length < QCD_FORECAST_WINDOW_DAYS) return;
    const window = series.slice(-QCD_FORECAST_WINDOW_DAYS);
    const ys = window.map(function (d) { return Number(d.abandonedPct) || 0; });
    const currentY = ys[ys.length - 1];
    // Already above threshold? No forecast -- the operator is past
    // the projection horizon; existing chrome already flags it.
    if (currentY >= 5) return;
    const n = ys.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) {
      sumX  += i;
      sumY  += ys[i];
      sumXY += i * ys[i];
      sumXX += i * i;
    }
    const denom = n * sumXX - sumX * sumX;
    if (denom === 0) return;
    const slope = (n * sumXY - sumX * sumY) / denom;
    // Healthy: trend is flat or improving. Skip the banner.
    if (slope <= 0.01) return;
    const daysToCross = (5 - currentY) / slope;
    if (daysToCross <= 0 || daysToCross > QCD_FORECAST_HORIZON_DAYS) return;
    const wholeDays = Math.max(1, Math.round(daysToCross));
    const slopeDay  = slope.toFixed(2);
    el.innerHTML =
        '<span class="qcd-forecast-kicker">Forecast</span>'
      + 'Abandoned % is trending up '
      + '<strong>+' + escapeHtml(slopeDay) + '%/day</strong>'
      + ' over the last ' + QCD_FORECAST_WINDOW_DAYS + ' days. '
      + 'At this rate, it crosses the 5% violation threshold in '
      + '<strong>~' + wholeDays + ' day' + (wholeDays === 1 ? '' : 's') + '</strong>.';
    el.style.display = '';
  }

  function qcdRenderKpiTiles_(t) {
    const wrap = $('qcd-kpi-row');
    if (!wrap) return;
    // Reuse the Performance Report KPI tile DOM shape so existing
    // styling carries over. No prev/delta on QCD's KPIs -- absolute
    // values only. Two tiles are color-coded:
    //   - Abandoned %: warn-red when >= 5% (pipeline's violation
    //     threshold). Mirrors the Overview tile chip color rule.
    //   - Violations (current month): warn-red when > 0. Server
    //     sources this as MTD across the dept's mapped queues, NOT
    //     the selected-range sum -- operationally more useful as
    //     "how many bad days this month?"
    const tile = function (label, value, valueClass) {
      return '<div class="pr-kpi-tile">'
           +   '<div class="pr-kpi-label">' + escapeHtml(label) + '</div>'
           +   '<div class="pr-kpi-value' + (valueClass ? ' ' + valueClass : '') + '">'
           +     escapeHtml(String(value))
           +   '</div>'
           + '</div>';
    };
    const pct = Number(t.abandonedPct) || 0;
    const pctCls  = pct >= 5 ? 'pr-delta-neg' : '';
    const violCls = (Number(t.violations) || 0) > 0 ? 'pr-delta-neg' : '';
    wrap.innerHTML =
        tile('Total Calls',  fmtNumber(t.totalCalls    || 0))
      + tile('Answered',     fmtNumber(t.totalAnswered || 0))
      + tile('Abandoned',    fmtNumber(t.abandoned     || 0))
      + tile('Abandoned %',  String(t.abandonedPctStr  || '0.00%'), pctCls)
      + tile('Longest Wait', String(t.longestWait      || '0:00:00'))
      + tile('Avg Answer',   String(t.avgAnswer        || '0:00:00'))
      + tile('Violations (current month)', fmtNumber(t.violations || 0), violCls);
  }

  function qcdRenderDailyTable_(rows) {
    const tbody = $('qcd-daily-tbody');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">No daily QCD rows in the selected range for this dept\'s mapped queues.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var pct = Number(r.abandonedPct) || 0;
      var pctCls = pct >= 5 ? 'num qcd-warn-light' : 'num';
      var viol = Number(r.violations) || 0;
      var violCls = viol > 0 ? 'num qcd-warn-light' : 'num';
      return '<tr>'
           +   '<td>' + escapeHtml(r.date) + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalCalls)    + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalAnswered) + '</td>'
           +   '<td class="num">' + fmtNumber(r.abandoned)     + '</td>'
           +   '<td class="' + pctCls + '">' + escapeHtml(r.abandonedPctStr) + '</td>'
           +   '<td class="' + violCls + '">' + fmtNumber(r.violations)    + '</td>'
           + '</tr>';
    }).join('');
  }

  function qcdRenderQueueTable_(rows, totals) {
    var tbody = $('qcd-queue-tbody');
    var tfoot = $('qcd-queue-tfoot');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="al-empty">No QCD rows for this dept\'s mapped queues in the selected range.</td></tr>';
      if (tfoot) tfoot.innerHTML = '';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var viol = Number(r.violations) || 0;
      var pct = Number(r.abandonedPct) || 0;
      var violCls = viol > 3 ? 'qcd-warn-strong' : (viol > 0 ? 'qcd-warn-light' : '');
      var pctCls  = pct >= 5 ? 'qcd-warn-light' : '';
      var hasDetail = viol > 0 && r.violationDates && r.violationDates.length;
      var chevron = hasDetail ? ' <span class="qcd-expand-icon">&#9654;</span>' : '';
      var rowCls = hasDetail ? ' class="qcd-expandable"' : '';
      var html = '<tr' + rowCls + ' data-queue="' + escapeHtml(r.queue) + '">'
           +   '<td>' + escapeHtml(r.queue) + chevron + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalCalls)    + '</td>'
           +   '<td class="num">' + fmtNumber(r.totalAnswered) + '</td>'
           +   '<td class="num">' + fmtNumber(r.abandoned)     + '</td>'
           +   '<td class="num' + (pctCls ? ' ' + pctCls : '') + '">' + escapeHtml(r.abandonedPctStr) + '</td>'
           +   '<td class="num">' + escapeHtml(r.longestWait)  + '</td>'
           +   '<td class="num">' + escapeHtml(r.avgAnswer)    + '</td>'
           +   '<td class="num' + (violCls ? ' ' + violCls : '') + '">' + fmtNumber(r.violations) + '</td>'
           + '</tr>';
      if (hasDetail) {
        html += '<tr class="qcd-detail-row" style="display:none;"><td colspan="8">'
             +  '<div class="qcd-detail-wrap"><strong>Violation dates:</strong> '
             +  r.violationDates.map(function (d) { return escapeHtml(d); }).join(', ')
             +  '</div></td></tr>';
      }
      return html;
    }).join('');
    // Expandable rows: click to toggle detail
    tbody.addEventListener('click', function (e) {
      var row = e.target.closest('.qcd-expandable');
      if (!row) return;
      var detail = row.nextElementSibling;
      if (!detail || !detail.classList.contains('qcd-detail-row')) return;
      var open = detail.style.display !== 'none';
      detail.style.display = open ? 'none' : '';
      var icon = row.querySelector('.qcd-expand-icon');
      if (icon) icon.textContent = open ? '▶' : '▼';
    });
    if (tfoot && totals) {
      var tPct = Number(totals.abandonedPct) || 0;
      var tPctCls = tPct >= 5 ? 'qcd-warn-light' : '';
      var tViol = Number(totals.violations) || 0;
      var tViolCls = tViol > 3 ? 'qcd-warn-strong' : (tViol > 0 ? 'qcd-warn-light' : '');
      tfoot.innerHTML = '<tr class="qcd-row-total">'
        +   '<td>Department total</td>'
        +   '<td class="num">' + fmtNumber(totals.totalCalls)    + '</td>'
        +   '<td class="num">' + fmtNumber(totals.totalAnswered) + '</td>'
        +   '<td class="num">' + fmtNumber(totals.abandoned)     + '</td>'
        +   '<td class="num' + (tPctCls ? ' ' + tPctCls : '') + '">' + escapeHtml(totals.abandonedPctStr || '0.00%') + '</td>'
        +   '<td class="num">' + escapeHtml(totals.longestWait || '0:00:00')   + '</td>'
        +   '<td class="num">' + escapeHtml(totals.avgAnswer || '0:00:00')     + '</td>'
        +   '<td class="num' + (tViolCls ? ' ' + tViolCls : '') + '">' + fmtNumber(totals.violations) + '</td>'
        + '</tr>';
    }
  }

  function qcdRenderChart_(data) {
    if (typeof Chart === 'undefined') return;
    var canvas = document.getElementById('qcd-chart');
    if (!canvas) return;
    destroyOrphanedChartOnCanvas_('qcd-chart');
    if (qcdChartInstance) { try { qcdChartInstance.destroy(); } catch (e) {} qcdChartInstance = null; }

    var isDaily = (qcdActiveView === 'daily');
    var labels, deptSeries;
    if (isDaily) {
      var daily = data.dailySeries || [];
      labels = daily.map(function (r) { return r.date ? r.date.slice(5) : ''; });
      deptSeries = daily;
    } else {
      var td = data.trendData || { labels: [], series: [] };
      labels = td.labels || [];
      deptSeries = td.series || [];
    }
    var metric = qcdActiveMetric;
    var viewLabel = isDaily ? 'daily' : 'monthly';
    var headerLabels = {
      totalCalls:   'Total Calls (' + viewLabel + ')',
      abandonedPct: 'Abandoned % (' + viewLabel + ')',
      violations:   'Violations (' + viewLabel + ')',
    };
    $('qcd-chart-header').textContent = headerLabels[metric] || 'Trend';

    var formatPct = (metric === 'abandonedPct');
    var extractVal = function (x) {
      if (metric === 'totalCalls') return x.totalCalls;
      if (metric === 'abandonedPct') return Number((x.abandonedPct || 0).toFixed(2));
      return x.violations;
    };

    var queues = (data.meta && data.meta.queues) || [];
    var perQueue = data.perQueue || {};
    var multiQueue = queues.length > 1;
    var queueColors = irChartColors_();
    var datasets = [];

    if (multiQueue) {
      queues.forEach(function (q, i) {
        var qData = perQueue[q];
        if (!qData) return;
        var src = isDaily ? (qData.daily || []) : (qData.monthly || []);
        datasets.push({
          label: q,
          data: src.map(extractVal),
          borderColor: queueColors[i % queueColors.length],
          backgroundColor: queueColors[i % queueColors.length],
          fill: false,
          tension: 0.25,
          pointRadius: 3,
          borderWidth: 2,
        });
      });
      var deptColor = (THEME && THEME.muted) || '#9ca3af';
      datasets.push({
        label: 'Dept total',
        data: deptSeries.map(extractVal),
        borderColor: deptColor,
        backgroundColor: deptColor,
        fill: false,
        tension: 0.25,
        pointRadius: 2,
        borderWidth: 2,
        borderDash: [6, 3],
      });
    } else {
      var color = (metric === 'totalCalls')
        ? ((THEME && THEME.accent) || '#4E79A7')
        : ((THEME && THEME.warn)   || '#c66b4b');
      datasets.push({
        label: headerLabels[metric] || metric,
        data: deptSeries.map(extractVal),
        borderColor: color,
        backgroundColor: color,
        fill: false,
        tension: 0.25,
        pointRadius: 3,
      });
    }

    refreshChartTheme();
    qcdChartInstance = new Chart(canvas, {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          datalabels: { display: false },
          legend:     { display: multiQueue },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var prefix = multiQueue ? (ctx.dataset.label + ': ') : '';
                return prefix + (formatPct ? ctx.formattedValue + '%' : ctx.formattedValue);
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: function (v) { return formatPct ? v + '%' : v; },
            },
          },
        },
      },
    });
  }

  // -- Export helpers (mirror IR/PR/CR pattern, simplified) ---------
  function qcdBuildCanvas_(onDone) {
    const root = $('qcd-results');
    if (!root || typeof html2canvas === 'undefined') return;
    // Capture the chart as an image so html2canvas can render it
    // alongside the rest of the DOM (canvas elements don't make it
    // into html2canvas output otherwise).
    const cvs = document.getElementById('qcd-chart');
    let dataUrl = null;
    try { if (cvs) dataUrl = cvs.toDataURL('image/png'); } catch (e) { /* OK */ }
    html2canvas(root, {
      backgroundColor: (THEME.paper || '#f6f7f9'),
      scale: 2,
      onclone: function (clonedDoc) {
        const ab = clonedDoc.querySelector('#qcd-results .ir-action-buttons');
        if (ab) ab.style.display = 'none';
        const tabs = clonedDoc.getElementById('qcd-chart-tabs');
        if (tabs) tabs.style.display = 'none';
        const cClone = clonedDoc.getElementById('qcd-chart');
        if (cClone && dataUrl) {
          const img = clonedDoc.createElement('img');
          img.src = dataUrl;
          img.style.width = '100%';
          img.style.height = 'auto';
          cClone.parentNode.replaceChild(img, cClone);
        }
      },
    }).then(onDone).catch(function (err) {
      try { console.error('QCD report image capture failed', err); } catch (e) {}
      showToast("Couldn't capture the report image — please try again.", 'error');
      qcdSetExportStatus_('error', 'Could not capture the report image. Please try again.');
    });
  }

  // -- Status banner helper for export feedback ---------------------
  // The previous round of exports failed silently because none of
  // the three actions reported back to the user (no success ack,
  // no error toast). Every export path now routes feedback through
  // qcdSetExportStatus_; "loading" while async work runs, then
  // "success" or "error" depending on outcome.
  function qcdSetExportStatus_(kind, msg) {
    const el = $('qcd-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg || '';
    el.style.display = '';
    if (kind === 'success') {
      setTimeout(function () {
        if (el.className.indexOf('status-success') !== -1) {
          el.style.display = 'none';
        }
      }, 3500);
    }
  }

  function qcdCopyImage_() {
    if (!(navigator.clipboard && window.ClipboardItem)) {
      qcdSetExportStatus_('error', 'Clipboard API not available in this browser.');
      return;
    }
    qcdSetExportStatus_('loading', 'Capturing report…');
    qcdBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (!blob) {
          qcdSetExportStatus_('error', 'Capture produced an empty image.');
          return;
        }
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
          .then(function () {
            qcdSetExportStatus_('success', 'Report image copied to clipboard.');
          }, function (err) {
            qcdSetExportStatus_('error', 'Clipboard write failed: '
              + (err && err.message ? err.message : String(err)));
          });
      }, 'image/png');
    });
  }

  function qcdEmailImage_() {
    qcdSetExportStatus_('loading', 'Capturing report…');
    qcdBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      qcdSetExportStatus_('loading', 'Sending email…');
      google.script.run
        .withSuccessHandler(function (res) {
          const to = (res && res.to) ? res.to : 'your inbox';
          qcdSetExportStatus_('success', 'Emailed report image to ' + to + '.');
          showToast('Report emailed to ' + to, 'success');
        })
        .withFailureHandler(function (err) {
          qcdSetExportStatus_('error', 'Email failed: '
            + (err && err.message ? err.message : String(err)));
          showToast('Email failed', 'error');
        })
        .sendQcdReportEmail({
          imageBase64: dataUrl,
          dateLabel:   qcdLastData && qcdLastData.dateLabel ? qcdLastData.dateLabel : '',
        });
    });
  }

  // Print opens the new window SYNCHRONOUSLY inside the click
  // handler so the browser preserves the user gesture and doesn't
  // popup-block the call. The captured image is written into the
  // already-open window once html2canvas finishes. Previous
  // implementation called window.open inside the async .then() and
  // got silently blocked.
  function qcdPrint_() {
    const w = window.open('about:blank');
    if (!w) {
      qcdSetExportStatus_('error', 'Browser blocked the print window. Allow popups for this dashboard and retry.');
      return;
    }
    try {
      w.document.write('<title>QCD Report — printing…</title>'
        + '<p style="font-family:sans-serif;color:#666;padding:24px;">'
        + 'Preparing print preview…</p>');
      w.document.close();
    } catch (e) { /* OK */ }
    qcdSetExportStatus_('loading', 'Capturing report for print…');
    qcdBuildCanvas_(function (canvas) {
      try {
        w.document.body.innerHTML = '<img src="' + canvas.toDataURL('image/png')
          + '" style="width:100%;display:block;">';
        w.focus();
        w.print();
        qcdSetExportStatus_('success', 'Sent to print preview.');
      } catch (e) {
        qcdSetExportStatus_('error', 'Print failed: '
          + (e && e.message ? e.message : String(e)));
      }
    });
  }

  // Wait for DOM, then go.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
