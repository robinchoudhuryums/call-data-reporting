      // single-day Yesterday view; MTD is a range so there's no one day to
      // reconcile against the To date.
      if (period === 'yesterday' && qcd.date && pageTo && qcd.date !== pageTo) {
        var mmdd = function (iso) {
          var p = String(iso).split('-');
          return p.length === 3 ? (Number(p[1]) + '/' + Number(p[2])) : iso;
        };
        if (latestQcdIso_ && latestQcdIso_ > qcd.date) {
          note = 'latest day with queue data for this department’s queues — '
            + 'company queue data runs through ' + mmdd(latestQcdIso_)
            + ', so if this looks behind, the dept’s queue mapping may need updating';
        } else {
          note = 'latest queue day — queue data lands separately from the '
            + 'agent call data above (which runs through '
            + mmdd(latestDqeIso_ || pageTo) + ')';
        }
      }
      dateEl.textContent = note;
    }
    const tiles = $('dept-qcd-tiles');
    if (!tiles) return;

    const tile = function (label, value, valueClass) {
      return '<div class="dept-qcd-tile">'
           +   '<div class="dept-qcd-label">' + escapeHtml(label) + '</div>'
           +   '<div class="dept-qcd-value' + (valueClass ? ' ' + valueClass : '') + '">'
           +     escapeHtml(String(value))
           +   '</div>'
           + '</div>';
    };
    const tileRow = function (q) {
      const violCls = (Number(q.violations) || 0) > 0 ? 'dept-qcd-warn' : '';
      const pctCls  = (Number(q.abandonedPct) || 0) >= 5 ? 'dept-qcd-warn' : '';
      // Owner note: Answered / Abandoned merged into ONE color-split tile
      // ("Ans / Abd" -- green X / warm Y) so the compact side panel reads
      // at a glance instead of two look-alike number tiles.
      const ansAbd = '<div class="dept-qcd-tile">'
        + '<div class="dept-qcd-label">Ans / Abd</div>'
        + '<div class="dept-qcd-value">'
        +   '<span class="dept-qcd-ans">' + escapeHtml(fmtNumber(q.totalAnswered || 0)) + '</span>'
        +   '<span class="dept-qcd-sep"> / </span>'
        +   '<span class="dept-qcd-abd">' + escapeHtml(fmtNumber(q.abandoned || 0)) + '</span>'
        + '</div></div>';
      return tile('Total Calls', fmtNumber(q.totalCalls    || 0))
           + ansAbd
           + tile('Abandoned %', String(q.abandonedPctStr  || '0.00%'), pctCls)
           + tile('Violations',  fmtNumber(q.violations    || 0),       violCls);
    };

    // Per-queue separation: each queue (incl. sub-queue children, which can
    // behave very differently from the parent) is its OWN page. To keep the
    // sticky side column compact, multi-queue depts render a CAROUSEL -- one
    // queue page at a time with ‹ › nav + a dot indicator, plus a trailing
    // "All queues" total page -- instead of stacking every queue vertically.
    // Single-queue depts keep the flat tile row (no redundant total).
    const perQueue = block.perQueue || [];
    if (perQueue.length > 1) {
      const pages = perQueue.map(function (q) {
        const tag = q.subDept
          ? ' <span class="dept-qcd-subtag">sub-queue · ' + escapeHtml(q.subDept) + '</span>'
          : '';
        return { name: escapeHtml(q.queue) + tag, html: tileRow(q) };
      });
      // P3: gated summary pages. The own-dept total is the canonical number
      // that reconciles with the QCD modal / Overview; the all-inclusive
      // figure is shown only under an explicit "All queues (incl.
      // sub-queues)" label so it can't be mistaken for the dept total. Each
      // subtotal renders only when it isn't a redundant copy of a single row:
      //   - Main-queues subtotal: only when >1 own queue.
      //   - Sub-queues subtotal: only when >1 sub-queue.
      //   - All-queues total: only when sub-queues exist (else it == main).
      // With no sub-queues, the own rollup is simply "Department total".
      const hasSub = (block.subQueueCount || 0) > 0;
      const ownTotals = {
        totalCalls:      block.totalCalls,
        totalAnswered:   block.totalAnswered,
        abandoned:       block.abandoned,
        abandonedPct:    block.abandonedPct,
        abandonedPctStr: block.abandonedPctStr,
        violations:      block.violations,
      };
      if ((block.mainQueueCount || 0) > 1) {
        pages.push({ name: hasSub ? 'Main queues' : 'Department total', html: tileRow(ownTotals) });
      }
      if ((block.subQueueCount || 0) > 1 && block.subTotals) {
        pages.push({ name: 'Sub-queues (separate depts)', html: tileRow(block.subTotals) });
      }
      if (hasSub && block.allTotals) {
        pages.push({ name: 'All queues (incl. sub-queues)', html: tileRow(block.allTotals) });
      }

      tiles.innerHTML =
          '<div class="dept-qcd-carousel">'
        +   '<div class="dept-qcd-carousel-head">'
        +     '<button type="button" class="dept-qcd-nav" data-dir="-1" aria-label="Previous queue">&#8249;</button>'
        +     '<span class="dept-qcd-queue-name" id="dept-qcd-cur-name"></span>'
        +     '<button type="button" class="dept-qcd-nav" data-dir="1" aria-label="Next queue">&#8250;</button>'
        +   '</div>'
        +   '<div class="dept-qcd-tiles-inner" id="dept-qcd-cur-tiles"></div>'
        +   '<div class="dept-qcd-dots" id="dept-qcd-dots">'
        +     pages.map(function (_p, i) { return '<span class="dept-qcd-dot" data-idx="' + i + '"></span>'; }).join('')
        +   '</div>'
        + '</div>';

      let cur = 0;
      const nameEl = $('dept-qcd-cur-name');
      const curTiles = $('dept-qcd-cur-tiles');
      const dotsWrap = $('dept-qcd-dots');
      const showPage = function (i) {
        cur = (i + pages.length) % pages.length;
        if (nameEl) nameEl.innerHTML = pages[cur].name;
        if (curTiles) curTiles.innerHTML = pages[cur].html;
        if (dotsWrap) {
          const dots = dotsWrap.querySelectorAll('.dept-qcd-dot');
          for (let d = 0; d < dots.length; d++) dots[d].classList.toggle('is-active', d === cur);
        }
      };
      const navs = tiles.querySelectorAll('.dept-qcd-nav');
      for (let n = 0; n < navs.length; n++) {
        navs[n].addEventListener('click', function () {
          showPage(cur + Number(this.getAttribute('data-dir')));
        });
      }
      if (dotsWrap) {
        const dots = dotsWrap.querySelectorAll('.dept-qcd-dot');
        for (let d = 0; d < dots.length; d++) {
          dots[d].addEventListener('click', function () {
            showPage(Number(this.getAttribute('data-idx')));
          });
        }
      }
      showPage(0);
    } else {
      tiles.innerHTML = tileRow(perQueue.length === 1 ? perQueue[0] : block);
    }
    wrap.style.display = '';
  }

  // Wire the QCD panel's Yesterday / MTD toggle. Syncs active state every
  // render; hides the toggle entirely when the server didn't ship an MTD block
  // (older cache). Wired once; a switch re-renders from the stashed snapshot.
  let deptQcdPeriodWired = false;
  function deptQcdWirePeriod_(hasMtd, activePeriod) {
    const bar = $('dept-qcd-period');
    if (!bar) return;
    bar.style.display = hasMtd ? '' : 'none';
    bar.querySelectorAll('.dept-qcd-period-btn').forEach(function (b) {
      const on = b.getAttribute('data-period') === activePeriod;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    if (deptQcdPeriodWired) return;
    deptQcdPeriodWired = true;
    bar.addEventListener('click', function (e) {
      const b = e.target.closest('.dept-qcd-period-btn');
      if (!b) return;
      const p = b.getAttribute('data-period');
      if ((p !== 'yesterday' && p !== 'mtd') || p === deptQcdPeriod) return;
      deptQcdPeriod = p;
      try { localStorage.setItem(DEPT_QCD_PERIOD_KEY_, p); } catch (e2) { /* best-effort */ }
      if (deptQcdSnap_) renderDeptQcdSnapshot_(deptQcdSnap_);
    });
  }

  function renderInfoLine() {
    const el = $('info-line');
    // Owner round 4: the roster/matched/compute-time + cache-hit line is an
    // operational/debug readout -- admin-only, like the Diagnostics panel.
    if (typeof USER !== 'undefined' && USER && USER.role !== 'admin') {
      el.style.display = 'none';
      return;
    }
    if (!state.meta) { el.style.display = 'none'; return; }
    const m = state.meta;
    const parts = [
      'Roster: ' + (m.rosterSize || 0) + ' agents',
      'Matched: ' + (m.rowsMatched || 0) + ' / ' + (m.rowsScanned || 0) + ' rows',
    ];
    if (typeof m.computeMs === 'number') {
      parts.push('Computed in ' + m.computeMs + ' ms');
    }
    const cachePill = m.cacheHit
      ? '<span class="pill pill-cache">cache hit</span>'
      : '<span class="pill pill-fresh">fresh read</span>';
    el.innerHTML = parts.join(' &middot; ') + cachePill;
    el.style.display = '';
  }

  function renderDiagnostics() {
    const wrap = $('diagnostics');
    const content = $('diag-content');
    const count = $('diag-count');
    // Admin-only: the Diagnostics panel is an operational/debug surface (roster
    // gaps, queue-only matches), not a manager-facing metric. Hide it for
    // non-admins (and for the admin's own view-as-manager preview, which keeps
    // USER.role === 'admin' -- so this is a deliberate no-hide there; the
    // data-admin-only CSS on the panel handles the view-as case).
    if (!wrap) return;
    if (USER.role !== 'admin') {
      wrap.style.display = 'none';
      wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
      return;
    }
    if (!state.diagnostics) {
      wrap.style.display = 'none';
      wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
      return;
    }
    const d = state.diagnostics;
    const rosterMissing = d.rosterWithNoData || [];
    const queueOnly = d.queueOnlyMatched || [];
    const total = rosterMissing.length + queueOnly.length;
    if (total === 0) {
      wrap.style.display = 'none';
      wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
      return;
    }
    count.textContent = '(' + total + ')';
    // Severity chip (E3, Phase E): warn-soft for 1-5 issues, bad-soft
    // for >5. Drives a visual indicator at the section header without
    // forcing the user to expand the panel.
    wrap.classList.remove('diag-severity-warn', 'diag-severity-bad');
    wrap.classList.add(total > 5 ? 'diag-severity-bad' : 'diag-severity-warn');

    const sections = [];
    if (rosterMissing.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Roster agents with no data in this range (' + rosterMissing.length + ')</h3>' +
        '<p>These agents are on the department roster but had no rows in <code>DQE Historical Data</code> for the selected dates. They may have been off, or the data hasn\'t been imported yet.</p>' +
        '<div class="diag-chips">' +
          rosterMissing.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    if (queueOnly.length) {
      sections.push(
        '<div class="diag-section">' +
        '<h3>Agents matched only via queue (' + queueOnly.length + ')</h3>' +
        '<p>These agents handled this department\'s queue extensions but aren\'t on the department roster. Either they covered for the dept, or they belong on the roster and the <code>DO NOT EDIT!</code> sheet should be updated.</p>' +
        '<div class="diag-chips">' +
          queueOnly.map(function (n) {
            return '<span class="diag-chip">' + escapeHtml(n) + '</span>';
          }).join('') +
        '</div></div>'
      );
    }
    content.innerHTML = sections.join('');
    wrap.style.display = '';
  }

  function onError(err, hadSwrPaint) {
    $('refresh-btn').disabled = false;
    // M3: clear the frost overlay on failure (the stale table stays visible).
    var __fh = document.querySelector('.agents-table-wrap');
    if (__fh) dsFrostHide_(__fh);
    // R7 (M-1): the missed-section frost armed at refresh() start has no
    // deptMissedFetch_ coming to clear it -- unfrost here (content stays as-is).
    var __mw = $('dept-missed-section');
    if (__mw) { dsFrostHide_(__mw); __mw.classList.remove('dm-loading'); }
    var msg = (err && err.message ? err.message : String(err));
    // When this request SWR-painted the last-good table, keep it on screen
    // under the error status (the behavior refresh()'s SWR comment promises)
    // instead of wiping the rows to an empty table.
    if (hadSwrPaint && state.rows.length) {
      setStatus('error', "Couldn't refresh — showing your previous result. " + msg);
      return;
    }
    state.rows = [];
    state.totals = null;
    state.meta = null;
    state.diagnostics = null;
    setStatus('error', 'Error: ' + msg);
    render();
    renderInfoLine();
    renderDiagnostics();
  }

  // -- Sort ---------------------------------------------------------------

  function onSort(key) {
    if (state.sortKey === key) {
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sortKey = key;
      // Numbers default desc (most useful first), text asc.
      const col = COLUMNS.find(function (c) { return c.key === key; });
      state.sortDir = (col && col.type === 'text') ? 'asc' : 'desc';
    }
    render();
  }

  // #8: parametrized so the Overview mini-table can reuse it with its own sort
  // state (was reading the My Department `state` globals). Callers pass
  // (rows, sortKey, sortDir).
  function sortRows(rows, sortKey, sortDir) {
    const key = sortKey;
    const dir = sortDir === 'asc' ? 1 : -1;
    const col = COLUMNS.find(function (c) { return c.key === key; });
    const isText = col && col.type === 'text';
    return rows.slice().sort(function (a, b) {
      // Answer-rate sort (the stacked bar column). Idle agents -- no
      // rung activity at all -- always sink to the bottom regardless of
      // direction so they don't crowd the top of an ascending sort.
      if (key === 'answerRate') {
        const at = (Number(a.totalAnswered) || 0) + (Number(a.totalMissed) || 0);
        const bt = (Number(b.totalAnswered) || 0) + (Number(b.totalMissed) || 0);
        if (!at && !bt) return String(a.agent).localeCompare(String(b.agent));
        if (!at) return 1;
        if (!bt) return -1;
        const ar = (Number(a.totalAnswered) || 0) / at;
        const br = (Number(b.totalAnswered) || 0) / bt;
        if (ar !== br) return (ar - br) * dir;
        return String(a.agent).localeCompare(String(b.agent));
      }
      const av = a[key], bv = b[key];
      if (isText) {
        return String(av).localeCompare(String(bv)) * dir;
      }
      return ((Number(av) || 0) - (Number(bv) || 0)) * dir;
    });
  }

  // -- Render -------------------------------------------------------------

  function fmtCell(col, row) {
    if (col.type === 'chip' && col.key === 'source') {
      return sourceChipHtml_(row);
    }
    if (col.type === 'bar') {
      return answeredBarHtml_(row);
    }
    if (col.type === 'pct') {
      // #8 Answer % = answered / (answered + missed), matching the bar + the
      // answerRate sort. Idle rows (no rung) show a muted dash; the rest carry
      // the 92% benchmark tint (symmetric), like the bar's inline rate.
      const pa = Number(row.totalAnswered) || 0, pm = Number(row.totalMissed) || 0, pt = pa + pm;
      if (!pt) return zeroCell_('–');
      const prate = Math.round(pa / pt * 100);
      return '<span class="ans-rate' + benchValueCls_('% answered', prate + '%', true) + '">' + prate + '%</span>';
    }
    const v = row[col.key];
    if (col.type === 'text') return escapeHtml(v == null ? '' : v);
    if (col.type === 'duration') {
      const dur = fmtDuration(v);
      return (Number(v) || 0) === 0 ? zeroCell_(dur) : dur;
    }
    // E5: append a small prior-period delta chip after the number on
    // the three chipped columns. No chip on totals row (no prior
    // window for a sum row). Zero values are muted (zeroCell_), but the
    // WoW chip stays full-color since a delta against zero is signal.
    const num = fmtNumber(v);
    const numHtml = (Number(v) || 0) === 0 ? zeroCell_(num) : num;
    return numHtml + wowChipHtml_(row, col);
  }

  // E5 prior-period delta chip. Maps each chipped column to its
  // prior-window field on `row` (priorRung / priorMissed /
  // priorAnswered), computes the delta, and returns a small inline
  // chip with the direction arrow + magnitude. Returns '' when:
  //   - the column isn't one we chip (only totalRung/Missed/Answered)
  //   - the row is the tfoot totals row (no priorHasData field)
  //   - the prior window had no included rows for this agent
  //     (priorHasData=false; client renders the plain number alone)
  //
  // Valence:
  //   totalRung     -> up = good (more inbound engagement)
  //   totalAnswered -> up = good (more handled)
  //   totalMissed   -> up = warn (worse)
  // Small deltas (|delta| < WOW_NOISE_THRESHOLD) get the muted
  // styling regardless of direction so the table isn't a sea of
  // colors on routine day-to-day fluctuation.
  const WOW_NOISE_THRESHOLD = 3;
  const WOW_PRIOR_KEYS = {
    totalRung:     { priorKey: 'priorRung',     valence: 'good' },
    totalAnswered: { priorKey: 'priorAnswered', valence: 'good' },
    totalMissed:   { priorKey: 'priorMissed',   valence: 'warn' },
  };
  function wowChipHtml_(row, col) {
    const spec = WOW_PRIOR_KEYS[col.key];
    if (!spec) return '';
    if (!row || row.priorHasData !== true) return '';
    const current = Number(row[col.key]) || 0;
    const prior   = Number(row[spec.priorKey]) || 0;
    const delta   = current - prior;
    const abs     = Math.abs(delta);
    let cls;
    let arrow;
    if (delta === 0) {
      cls = 'wow-chip-muted';
      arrow = '→';   // → flat
    } else if (abs < WOW_NOISE_THRESHOLD) {
      cls = 'wow-chip-muted';
      arrow = delta > 0 ? '▲' : '▼';  // ▲ ▼ muted
    } else {
      // Above threshold: color by valence direction. For "good"
      // metrics (rung/answered), up = good; for "warn" (missed),
      // up = bad. Down inverts.
      const isUp = delta > 0;
      if (spec.valence === 'good') {
        cls = isUp ? 'wow-chip-good' : 'wow-chip-warn';
      } else {
        cls = isUp ? 'wow-chip-warn' : 'wow-chip-good';
      }
      arrow = isUp ? '▲' : '▼';
    }
    const sign = delta > 0 ? '+' : (delta < 0 ? '−' : '');  // − minus
    const label = delta === 0 ? '0' : (sign + abs);
    // Tooltip carries the raw prior value + the explicit window so
    // a manager can sanity-check the delta without doing math. Uses the
    // RENDER CONTEXT's meta (C-3): the Overview mini-table sets
    // wowChipMetaOverride_ for its synchronous render pass, because its rows
    // come from its OWN getDepartmentSummary call -- reading the dept PAGE's
    // state.meta here cited that page's prior window (or blank) on the
    // Overview chips. Deltas were always per-row correct; only this hover
    // label borrowed the wrong window.
    const wm = wowChipMetaOverride_ || (state && state.meta) || {};
    const pf = wm.priorFrom || '';
    const pt = wm.priorTo   || '';
    const tip = 'Prior period ' + pf + ' – ' + pt
              + ': ' + prior + '. Delta ' + (delta >= 0 ? '+' : '') + delta + '.';
    return ' <span class="wow-chip ' + cls + '" title="' + escapeHtml(tip) + '">'
         +   arrow + label
         + '</span>';
  }

  // Source chip for the Phase D Source column. Three variants:
  //   - matchedViaRoster && matchedViaQueue -> BOTH (good-soft)
  //   - matchedViaRoster only               -> ROSTER (accent-soft)
  //   - matchedViaQueue only                -> QUEUE [· dept1, dept2] (warn-soft)
  // sourceHomes is an array (server-populated) listing every dept
  // whose roster a queue-only floater appears on. Empty array =
  // bare "QUEUE" with no suffix (floater on no dept's roster --
  // they only touched the current dept's queue extensions). One
  // entry = "QUEUE · Sales". Multiple = "QUEUE · Sales, Power" so
  // multi-rostered floaters surface their full home list.
  function sourceChipHtml_(row) {
    if (row.matchedViaRoster && row.matchedViaQueue) {
      return '<span class="src-chip src-chip-both"><span class="src-dot"></span>BOTH</span>';
    }
    if (row.matchedViaRoster) {
      return '<span class="src-chip src-chip-roster"><span class="src-dot"></span>ROSTER</span>';
    }
    if (row.matchedViaQueue) {
      const homes = Array.isArray(row.sourceHomes) ? row.sourceHomes : [];
      const suffix = homes.length
        ? ' &middot; ' + homes.map(escapeHtml).join(', ')
        : '';
      return '<span class="src-chip src-chip-queue"><span class="src-dot"></span>QUEUE' + suffix + '</span>';
    }
    return '';
  }

  // CSV-safe plain text for a source row. Mirrors the chip's
  // variants without the chip markup; consumed by exportTableCsv_.
  function sourceChipCsv_(row) {
    if (row.matchedViaRoster && row.matchedViaQueue) return 'BOTH';
    if (row.matchedViaRoster) return 'ROSTER';
    if (row.matchedViaQueue) {
      const homes = Array.isArray(row.sourceHomes) ? row.sourceHomes : [];
      return homes.length ? 'QUEUE - ' + homes.join(', ') : 'QUEUE';
    }
    return '';
  }

  // B1: derive the ROSTER team prior-window totals from the per-row prior
  // fields the server already ships (priorAnswered/priorMissed/priorRung on
  // matchedViaRoster rows with priorHasData). Same roster-only scope as the
  // tfoot totals + the same limitation as the per-row WoW chips: agents with
  // prior-only activity (no current-window row) aren't represented. `has` is
  // false when no row carried a prior baseline -> the strip shows no delta.
  function deptTeamPrior_(rows) {
    var out = { answered: 0, missed: 0, rung: 0, has: false };
    (rows || []).forEach(function (r) {
      if (!r.matchedViaRoster || r.priorHasData !== true) return;
      out.answered += Number(r.priorAnswered) || 0;
      out.missed   += Number(r.priorMissed)   || 0;
      out.rung     += Number(r.priorRung)     || 0;
      out.has = true;
    });
    return out;
  }

  // B1: compact vs-prior delta chip for the team strip. Mirrors the table's
  // WoW valence + noise-muting (WOW_NOISE_THRESHOLD) so a small move stays
  // quiet. `valence` = 'good' (up is good: answered/rate) or 'warn' (up is
  // bad: missed).
  function deptStripDelta_(delta, valence, threshold, unit, tip) {
    var abs = Math.abs(delta);
    var cls, arrow;
    if (delta === 0) { cls = 'wow-chip-muted'; arrow = '→'; }
    else if (abs < threshold) { cls = 'wow-chip-muted'; arrow = delta > 0 ? '▲' : '▼'; }
    else {
      var up = delta > 0;
      cls = (valence === 'good') ? (up ? 'wow-chip-good' : 'wow-chip-warn')
                                 : (up ? 'wow-chip-warn' : 'wow-chip-good');
      arrow = up ? '▲' : '▼';
    }
    var sign = delta > 0 ? '+' : (delta < 0 ? '−' : '');
    var label = delta === 0 ? '0' : (sign + abs + (unit || ''));
    return '<span class="dts-delta ' + cls + '" title="' + escapeHtml(tip || '') + '">'
         + arrow + ' ' + label + '</span>';
  }

  // B1: team summary strip (answer rate hero + answered / missed / avg talk)
  // for the selected range. Built from state.totals (roster-only, server-
  // summed) -- no new fetch. Hidden when there are no data rows.
  function renderDeptTeamStrip_(state) {
    var zone = $('dept-team-zone');
    var strip = $('dept-team-strip');
    if (!strip) return;
    var t = state && state.totals;
    if (!t || !state.rows || !state.rows.length) {
      strip.style.display = 'none'; strip.innerHTML = '';
      if (zone) zone.style.display = 'none';
      return;
    }
    var a = Number(t.totalAnswered) || 0;
    var m = Number(t.totalMissed)   || 0;
    var total = a + m;
    var rate = total ? Math.round(a / total * 100) : 0;

    var prior = deptTeamPrior_(state.rows);
    var priorTip = '';
    if (prior.has) {
      var pf = (state.meta && state.meta.priorFrom) || '';
      var pt = (state.meta && state.meta.priorTo)   || '';
      priorTip = 'Prior period ' + pf + ' – ' + pt;
    }
    var rateDeltaHtml = '', ansDeltaHtml = '';
    if (prior.has) {
      var pTotal = prior.answered + prior.missed;
      var pRate = pTotal ? Math.round(prior.answered / pTotal * 100) : 0;
      rateDeltaHtml = deptStripDelta_(rate - pRate, 'good', 1, ' pts', priorTip + ': ' + pRate + '%');
      ansDeltaHtml  = deptStripDelta_(a - prior.answered, 'good', WOW_NOISE_THRESHOLD, '', priorTip + ': ' + prior.answered);
    }

    var rateCls = total ? benchValueCls_('% answered', rate + '%', true) : '';
    var under92 = total && rate < 92;
    var fillPct = total ? Math.max(0, Math.min(100, rate)) : 0;

    var heroTile = '<div class="dts-tile dts-tile--hero">'
      + '<div class="dts-label">% Answered (rings) <span class="dts-scope">this range</span></div>'
      + '<div class="dts-value' + rateCls + '" data-flash-key="dts:rate">' + (total ? rate + '%' : '–') + '</div>'
      + '<div class="dts-track" title="92% company target">'
      +   '<span class="dts-track-fill' + (under92 ? ' is-under' : '') + '" style="width:' + fillPct + '%"></span>'
      +   '<span class="dts-track-tick"></span>'
      + '</div>'
      + (rateDeltaHtml ? '<div class="dts-sub">' + rateDeltaHtml + ' vs prior</div>' : '')
      + '</div>';
    var ansTile = '<div class="dts-tile">'
      + '<div class="dts-label">Answered</div>'
      + '<div class="dts-value" data-flash-key="dts:answered">' + fmtNumber(a) + '</div>'
      + (ansDeltaHtml ? '<div class="dts-sub">' + ansDeltaHtml + ' vs prior</div>' : '')
      + '</div>';
    // (Owner round: the Missed + Avg-talk tiles were dropped so the strip fits
    // one row -- missed lives in the agent table's split bar + the Missed
    // section below; ATT keeps its per-agent column.)

    // Batch D: range-scoped Queue calls + Abandoned % tiles from the QCD
    // snapshot's `range` block (own-queues-only, the selected From/To). Shown
    // only for QCD-mapped depts with queue activity in the range. Owner round:
    // Queue calls renders BETWEEN the hero and Answered, and carries an
    // implied per-WORKDAY rate (Mon-Fri minus company holidays -- the INV-35
    // workingDaysBetween_ mirror, so it agrees with the Insights workday math).
    var qCallsTile = '', qAbdTile = '';
    var qr = state.qcd && state.qcd.range;
    if (qr && (Number(qr.totalCalls) || 0) > 0) {
      var qCalls = Number(qr.totalCalls) || 0;
      var qAbd   = Number(qr.abandoned) || 0;
      var abStr  = qr.abandonedPctStr || ((Number(qr.abandonedPct) || 0).toFixed(2) + '%');
      var abCls  = benchValueCls_('abandoned %', abStr, true);   // 5% company standard
      var qFrom = (state.meta && state.meta.from) || ($('from-date') && $('from-date').value) || '';
      var qTo   = (state.meta && state.meta.to)   || ($('to-date')   && $('to-date').value)   || '';
      var wd = workingDaysBetween_(qFrom, qTo);
      // R7 (M-4): a 1-workday range's "≈ N/day over 1 workday" just restates
      // the headline number -- show the per-day sub only for multi-day ranges.
      var perDaySub = wd > 1
        ? '&asymp; ' + (Math.round((qCalls / wd) * 10) / 10) + '/day over ' + wd + ' workdays'
        : 'across mapped queues';
      qCallsTile =
          '<div class="dts-tile" title="Across the department&#39;s mapped queues. Workdays = Mon&ndash;Fri minus company holidays.">'
        +   '<div class="dts-label">Queue calls <span class="dts-scope">this range</span></div>'
        +   '<div class="dts-value" data-flash-key="dts:qcalls">' + fmtNumber(qCalls) + '</div>'
        +   '<div class="dts-sub">' + perDaySub + '</div>'
        + '</div>';
      qAbdTile =
          '<div class="dts-tile">'
        +   '<div class="dts-label">Abandoned %</div>'
        +   '<div class="dts-value' + abCls + '" data-flash-key="dts:qabd">' + escapeHtml(abStr) + '</div>'
        +   '<div class="dts-sub">' + fmtNumber(qAbd) + ' abandoned</div>'
        + '</div>';
    }

    strip.innerHTML = heroTile + qCallsTile + ansTile + qAbdTile;
    strip.style.display = '';
    if (zone) zone.style.display = '';
    dsFlashChanged_(strip, 'deptstrip:' + getRequestedDept());
  }

  // Lighter Insights hand-off strip: a COLLAPSED one-line summary of the
  // deeper Insights report for this dept + range, expandable, with an
  // "Open full report" button that carries the current dept & dates. The
  // one-line takeaway is derived from the SAME server totals the team strip
  // uses (no new fetch); the full per-agent / queue-health / heatmap story is
  // one click away on the Insights page. Hidden when there are no data rows.
  function renderDeptInsightsStrip_(state) {
    var strip = $('dept-insights-strip');
    if (!strip) return;
    var t = state && state.totals;
    if (!t || !state.rows || !state.rows.length) {
      strip.style.display = 'none'; strip.innerHTML = '';
      return;
    }
    var total = (Number(t.totalAnswered) || 0) + (Number(t.totalMissed) || 0);
    var dept = getRequestedDept() || 'this department';
    var from = ($('from-date') && $('from-date').value) || '';
    var to   = ($('to-date')   && $('to-date').value)   || '';
    // #3b: the rate% / missed count already live in the KPI tiles above, so the
    // strip no longer restates them (that duplication was the flagged clutter).
    // It keeps its "what the full report adds" hook + the Open-report hand-off.
    var teaser = total
      ? 'Deeper per-agent &amp; queue-health breakdown for this range.'
      : 'No call activity in this range.';
    strip.innerHTML =
        '<div class="dis-row">'
      +   '<button class="dis-toggle" type="button" aria-expanded="false" aria-controls="dept-insights-more" '
      +           'title="Show what the full Insights report adds">'
      +     '<span class="dis-chevron" aria-hidden="true">&#9656;</span>'
      +     '<span class="dis-kicker">Insights</span>'
      +   '</button>'
      +   '<span class="dis-teaser">' + teaser + '</span>'
      +   '<button class="btn btn-secondary dis-open" type="button" '
      +           'title="Open the full Insights report for this department and date range.">Open full report &#8594;</button>'
      + '</div>'
      + '<div class="dis-more" id="dept-insights-more" hidden>'
      +   'The full Insights report adds per-agent improvers &amp; laggards (vs the team average), '
      +   'queue health &amp; violations, and the abandon heatmap &mdash; for <strong>' + escapeHtml(dept) + '</strong>'
      +   (from && to ? ', <strong>' + escapeHtml(from) + '</strong> to <strong>' + escapeHtml(to) + '</strong>' : '') + '.'
      + '</div>';
    strip.style.display = '';
    wireDeptInsightsStrip_();
  }

  // Delegated wiring for the Insights hand-off strip (attached once on the
  // container so the per-render innerHTML swap never detaches it).
  var deptInsightsStripWired_ = false;
  function wireDeptInsightsStrip_() {
    if (deptInsightsStripWired_) return;
    var strip = $('dept-insights-strip');
    if (!strip) return;
    deptInsightsStripWired_ = true;
    strip.addEventListener('click', function (e) {
      if (e.target.closest('.dis-open')) {
        handoffToInsights_(($('from-date') || {}).value, ($('to-date') || {}).value, null);
        return;
      }
      var tog = e.target.closest('.dis-toggle');
      if (tog) {
        var more = $('dept-insights-more');
        var expanded = tog.getAttribute('aria-expanded') === 'true';
        tog.setAttribute('aria-expanded', expanded ? 'false' : 'true');
        tog.classList.toggle('is-open', !expanded);

      }
    });

  function render() {
    // Header sort arrows
    document.querySelectorAll('#agents-table thead th[data-sort]').forEach(function (th) {
      const key = th.getAttribute('data-sort');
      const arrow = th.querySelector('.arrow');
      if (!arrow) return;
      if (key === state.sortKey) {
        arrow.textContent = state.sortDir === 'asc' ? '▲' : '▼';
        arrow.style.color = THEME.ink || '#374151';
      } else {
        arrow.textContent = '▽';
        arrow.style.color = THEME.muted || '#9ca3af';
      }
    });

    const tbody = $('agents-tbody');
    const tfoot = $('agents-tfoot');

    if (!state.rows.length) {
      tbody.innerHTML = '';
      tfoot.innerHTML = '';
      renderDeptTeamStrip_(state);   // B1: hides itself when there are no rows
      renderDeptInsightsStrip_(state);   // Insights hand-off strip (hides too)
      return;
    }

    const sorted = sortRows(state.rows, state.sortKey, state.sortDir);
    tbody.innerHTML = sorted.map(function (row) {
      // Agents matched only via queue (not in the roster) get a small
      // "(queue-only)" tag next to the name in CSS.
      // Phase D: the .via-queue row class is no longer needed for
      // visual distinction (the Source chip handles that), but we
      // keep it so any consumer that styles whole-row queue-only
      // emphasis (e.g. user CSS, future hover handling) still works.
      const rowClass = (row.matchedViaQueue && !row.matchedViaRoster) ? 'via-queue' : '';
      // data-agent powers the row drill-through to the Individual Report.
      return '<tr data-agent="' + escapeHtml(row.agent) + '"'
           + (rowClass ? ' class="' + rowClass + '"' : '')
           + ' title="Open ' + escapeHtml(row.agent) + '’s Individual Report">'
           + COLUMNS.map(function (col, i) {
        // B1: tag the Answered/Missed bar cell so a date-range refresh flashes
        // the agents whose volume actually changed (key by agent name, stable).
        var fk = (col.type === 'bar') ? ' data-flash-key="ag:' + escapeHtml(row.agent) + '"' : '';
        return '<td class="' + cellClass_(col, i) + '"' + fk + '>' + fmtCell(col, row) + '</td>';
      }).join('') + '</tr>';
    }).join('');

    if (state.totals) {
      // Roster-vs-floater count caption surfaced as the tfoot's
      // first cell when queue-only floaters are visible. Keeps the
      // "totals exclude floaters" semantics legible without a second
      // tfoot row. Falls back to the plain "Total" label when there
      // are no floaters in the current view.
      const queueCount = state.totals.queueOnlyAgentCount || 0;
      const totalLabel = queueCount > 0
        ? 'Total (roster only · ' + queueCount + ' floater' + (queueCount === 1 ? '' : 's') + ' excluded)'
        : 'Total';
      tfoot.innerHTML = '<tr>' + COLUMNS.map(function (col, i) {
        if (i === 0) return '<td>' + totalLabel + '</td>';
        // Source column has no aggregate value -- leave its tfoot
        // cell empty so it doesn't try to render a chip from totals.
        if (col.type === 'chip' && col.key === 'source') return '<td class="src-cell' + (col.hideable ? ' col-extra' : '') + '"></td>';
        // The bar / num / duration cells render from the totals object
        // (ATT and abd-wait are weighted on the server).
        return '<td class="' + cellClass_(col, i) + '">' + fmtCell(col, state.totals) + '</td>';
      }).join('') + '</tr>';
    } else {
      tfoot.innerHTML = '';
    }
    // B1: team summary strip for the selected range (roster rollup), lifted
    // from the same server totals -- rendered here so it repaints on sort /
    // refresh alongside the table.
    renderDeptTeamStrip_(state);
    renderDeptInsightsStrip_(state);   // Insights hand-off strip (collapsed summary + link-out)
    // B1: flash agents whose Answered/Missed changed since the last paint for
    // this dept. Scoped per dept so switching depts doesn't cross-flash; a sort
    // re-render leaves values unchanged per key, so it never flashes.
    dsFlashChanged_($('agents-tbody'), 'dept:' + getRequestedDept());
  }

  // -- CSV export for the main agent table --------------------------------
  function exportTableCsv_() {
    var sorted = sortRows(state.rows, state.sortKey, state.sortDir);
    if (!sorted.length) return;
    var csvEscape = function (v) {
      var s = csvSafeCell_(v);
      return (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1)
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    // CSV exports ALL columns (incl. the foldable detail ones) regardless
    // of the on-screen toggle -- a data dump should be complete. The bar
    // column emits "answered / missed (rate%)" text.
    var barCsv = function (row) {
      var a = Number(row.totalAnswered) || 0, m = Number(row.totalMissed) || 0, t = a + m;
      return a + ' / ' + m + (t ? ' (' + Math.round(a / t * 100) + '%)' : '');
    };
    // #8: Answer % column value for CSV (answered / (answered+missed)).
    var pctCsv = function (row) {
      var a = Number(row.totalAnswered) || 0, m = Number(row.totalMissed) || 0, t = a + m;
      return t ? Math.round(a / t * 100) + '%' : '';
    };
    // Owner round 4: the on-screen Total-calls column folded into the bar,
    // but the CSV stays complete -- a numeric Total calls column is spliced
    // in right after the bar column.
    var cellsFor = function (row, isTotals) {
      var out = [];
      COLUMNS.forEach(function (col, i) {
        if (isTotals && i === 0) { out.push(csvEscape('Total (roster only)')); }
        // Source column has no aggregate meaning in the totals row.
        else if (col.type === 'chip' && col.key === 'source') out.push(isTotals ? '' : csvEscape(sourceChipCsv_(row)));
        else if (col.type === 'bar') out.push(csvEscape(barCsv(row)));
        else if (col.type === 'pct') out.push(csvEscape(pctCsv(row)));
        else if (col.type === 'duration') out.push(csvEscape(fmtDuration(row[col.key])));
        else out.push(csvEscape(row[col.key]));
        if (col.type === 'bar') out.push(csvEscape(row.totalRung != null ? row.totalRung : ''));
      });
      return out.join(',');
    };
    var header = COLUMNS.reduce(function (acc, c) {
      acc.push(csvEscape(c.label));
      if (c.type === 'bar') acc.push(csvEscape('Total calls'));
      return acc;
    }, []).join(',');
    var rows = sorted.map(function (row) { return cellsFor(row, false); });
    if (state.totals) rows.push(cellsFor(state.totals, true));
    var blob = new Blob([header + '\n' + rows.join('\n')], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (getRequestedDept() || 'department') + '_' + (($('from-date') && $('from-date').value) || 'data') + '_to_' + (($('to-date') && $('to-date').value) || 'data') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // -- Individual Report modal -------------------------------------------
  // Opens a form for date range + agent multi-select, then runs the
  // report server-side and renders per-agent summary cards + 3 Chart.js
  // line charts (volume / efficiency / duration). 1 agent = individual
  // mode; 2+ = peer comparison.
  //
  // The agent roster is fetched once on first open per dept; if the
  // user switches dept on the main page (admin only), we re-fetch.

  // Peer-comparison palette. The first slot pulls from --accent so the
  // primary agent matches the dashboard's slate-blue chrome; the rest
  // are kept from the Tableau-10-derived CVD-safe palette so 2-10
  // agents stay visually distinct in comparison mode.
  // Harmonized categorical ramp — constant L/C, hue walk. Slots 1-3 are
  // the brand accent / terracotta / sage so few-agent views match the
  // rest of the app. Light values for light themes; lightened set for
  // dark mode (mirrors the --accent/--warn/--good dark overrides).
  var IR_RAMP_LIGHT = ['#4e7bc4','#c66b4b','#3d9476','#7a5aa8','#b89244',
                       '#5391a3','#a8597d','#6f8f4c','#8a8f9c','#9c6f4a'];
  var IR_RAMP_DARK  = ['#7ba3df','#e08a63','#5cb494','#a98fd0','#d8b25f',
                       '#74b3c6','#cd83a4','#97b873','#aab0bd','#c4946a'];

  function irChartColors_() {
    var dark = document.body.dataset.mode === 'dark';
    return (dark ? IR_RAMP_DARK : IR_RAMP_LIGHT).slice();
  }
  var IR_CHART_COLORS = irChartColors_();

  function irVolumeColors_() {
    return {
      rung:     THEME.accent || '#4e7bc4',
      answered: THEME.good   || '#3d9476',
      missed:   THEME.warn   || '#c66b4b',
    };
  }
  var IR_VOLUME_COLORS = irVolumeColors_();

  // Translates a hex color to a Chart.js fill callback that paints a
  // top-to-bottom gradient from the line color (alpha .25) down to
  // transparent. Applied to every IR line chart so single-agent views
  // have visual weight without dominating the comparison ones.
  /**
   * Resolves a CSS color string to canvas-canonical RGB form
   * (`#rrggbb` for opaque colors, `rgba(r, g, b, a)` for
   * transparent). Used by refreshChartTheme() to normalize the
   * design-system tokens before they reach Chart.js / the
   * datalabels plugin, which have inconsistent OKLCH support in
   * their many sub-paths.
   */
  function colorToCanvasRgb_(color) {
    try {
      const cvs = document.createElement('canvas');
      cvs.width = cvs.height = 1;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = 'rgb(1,2,3)';
      const sentinel = ctx.fillStyle;
      ctx.fillStyle = color;
      if (ctx.fillStyle === sentinel) return color;
      return ctx.fillStyle;
    } catch (e) { return color; }
  }

  /**
   * Returns the given CSS color with the supplied alpha applied,
   * as an `rgba(...)` string. Paints the color onto a 1x1 canvas
   * and reads back the resulting RGB pixel -- canvas resolves any
   * supported color format (#rrggbb, rgb(), hsl(), oklch(),
   * oklab(), named) into an RGB triple. Cleaner than DOM-resolve
   * (some browsers return getComputedStyle().color as oklch() for
   * oklch() inputs, which the prior regex didn't parse; that
   * produced opaque fills where we wanted faded gradients).
   *
   * Falls back to returning the input color unchanged if canvas
   * doesn't recognize it (rare; CSS-supported but canvas-
   * unsupported formats).
   */
  function colorWithAlpha_(color, alpha) {
    if (!color) return 'rgba(0,0,0,0)';
    try {
      const cvs = document.createElement('canvas');
      cvs.width = cvs.height = 1;
      const ctx = cvs.getContext('2d');
      // Sentinel: set a known fillStyle first. If the next
      // assignment is rejected by canvas (unsupported format),
      // fillStyle keeps the sentinel value -- we detect that and
      // bail out instead of painting the wrong color.
      ctx.fillStyle = 'rgb(1, 2, 3)';
      const sentinel = ctx.fillStyle;
      ctx.fillStyle = color;
      if (ctx.fillStyle === sentinel) return color;
      ctx.fillRect(0, 0, 1, 1);
      const data = ctx.getImageData(0, 0, 1, 1).data;
      return 'rgba(' + data[0] + ', ' + data[1] + ', ' + data[2] + ', ' + alpha + ')';
    } catch (e) {
      return color;
    }
  }

  function irGradientFill_(chart, color) {
    const ctx = chart.ctx;
    const area = chart.chartArea;
    if (!area) return 'rgba(0,0,0,0)';
    const gradient = ctx.createLinearGradient(0, area.top, 0, area.bottom);
    gradient.addColorStop(0, colorWithAlpha_(color, 0.25));
    gradient.addColorStop(1, colorWithAlpha_(color, 0));
    return gradient;
  }

  let irChartInstances = [];
  let irPinnedAgent = null;   // peer-comparison legend: pinned/isolated agent (null = none)
  let irLastData = null;
  // Cached roster + active subset for the current modal session.
  // `activeAgents` is null until the first init call with from/to
  // succeeds; null means "we don't know yet, show all as one
  // group". `rangeKey` is the (from|to) the activeAgents were
  // computed for, so we can skip a re-fetch when neither input
  // has changed.
  let irLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
  let irActiveFetchTimer = null;
  // Stale-response token for the IR roster/active-subset fetches: the full
  // init fetch and the debounced date-change refetch hit the same endpoint
  // and both write irLastRoster (incl. rangeKey), so an out-of-order older
  // response could repaint the picker with a stale grouping AND poison
  // rangeKey so the correct refetch never fires. Each fetch takes a token;
  // only the newest response is applied.
  let irRosterReqSeq_ = 0;
  // Persisted user preferences (mirrors the Performance Report's
  // prefs model). Restored on modal init, saved on every state
  // change so the next visit picks up where the user left off.
  let irSortOrder = 'selection';   // selection | name | answered-desc | answered-asc | pct-desc
  let irActiveChartTab = 'vol';    // vol | eff | dur
  let irShowAllCharts = false;     // #4: stack all 3 trend charts vs one tab at a time
  let irPendingAgentSelection_ = null;
  let irPendingAutoRun_ = false;   // drill-through: auto-generate once the picker renders
  let irCameFromInsights_ = false; // drill-through from Insights -> show "Back to Insights"
  let irEditPopoverSeededCustom_ = false; // #1: edit popover opened over a custom-prior report
  let irListChangeHandler_ = null;
  // L3: per-email key. The IR prefs blob stores the AGENT SELECTION, which must
  // NOT restore for a different viewer on a shared machine (the same reason
  // insPrefsKey_ is per-email). IR previously used a bare global key, leaking
  // one manager's dates / compare mode / agent names -- and pre-checking a
  // same-dept colleague's exact selection -- into the next viewer's session.
  // Pre-per-user blobs under the old bare `cdr.ir.prefs.v1` are now orphaned.
  function irPrefsKey_() {
    var who = '';
    try { who = (typeof USER !== 'undefined' && USER && USER.email) ? USER.email : ''; } catch (e) {}
    return 'cdr.ir.prefs.v1:' + who;
  }

  /**
   * Drill-through entry: open the Individual Report for ONE agent over a
   * given date range and auto-generate. Reuses the existing one-shot
   * pending-selection hook (irPendingAgentSelection_) + a run flag honored
   * at the end of renderIrAgentList. Called from the My Department table's
   * row click. No comparison (plain Individual Report); the user can add a
   * vs-self comparison from the form afterward.
   */
  function irDrillToAgent_(agentName, from, to) {
    if (!agentName) return;
    if (from && $('ir-from')) $('ir-from').value = from;
    if (to   && $('ir-to'))   $('ir-to').value   = to;
    if ($('ir-preset')) $('ir-preset').value = 'custom';
    if ($('ir-compare-mode')) {
      $('ir-compare-mode').value = 'none';
      // Fire change so the prior-range inputs + hint sync to "no comparison".
      $('ir-compare-mode').dispatchEvent(new Event('change'));
    }
    irPendingAgentSelection_ = [agentName];
    irPendingAutoRun_ = true;
    // Force a roster re-fetch for this range so renderIrAgentList re-runs
    // (and applies the pending selection + auto-run) even if the cached
    // roster matched.
    irLastRoster = { dept: null, agents: [], activeAgents: null, activeFloaters: null, rangeKey: '' };
    // Drill-through from the Insights PAGE (modal->page conversion): the IR
    // modal simply overlays it -- the rendered report stays put behind the
    // overlay, so nothing is hidden or restored. Just flag the origin and
    // reveal the "Back to Insights" button on the IR modal (#2).
    const fromInsights = document.body.getAttribute('data-page') === 'insights';
    if (fromInsights) {
      irCameFromInsights_ = true;
      const bk = $('ir-back-to-insights-btn'); if (bk) bk.style.display = '';
      // Hide the generic "« Back" (returns to the IR setup form) for the
      // duration of the drill -- two Back buttons side by side read as
      // redundant/confusing, and during a drill "back" means Insights.
      // Restored by closeModal's irCameFromInsights_ branch.
      const gb = $('ir-back-btn'); if (gb) gb.style.display = 'none';
    }
    const btn = $('individual-report-btn');
    if (btn) btn.click();   // -> openModal -> ensureIrRoster -> renderIrAgentList
  }

  function initIndividualReport() {
    const btn = $('individual-report-btn');
    const modal = $('individual-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      // Drill-through (irPendingAutoRun_) shows a loader instead of the form,
      // which auto-generates once the roster loads (#1 Part B). Direct opens
      // show the setup form as before.
      if (irPendingAutoRun_) showIrDrillLoading_();
      else showIrForm();
      ensureIrRoster();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.removeEventListener('keydown', onKeyDown);
      // If we drilled in from the Insights page, ANY close (Back / X /
      // Escape) reveals it again -- the page sat behind the IR overlay all
      // along, so there's nothing to re-show and no scroll lock to keep;
      // just restore the Back buttons (#2/#7). Focus deliberately stays put
      // (the launcher button lives in the admin-only Reports dropdown).
      if (irCameFromInsights_) {
        irCameFromInsights_ = false;
        const bk = $('ir-back-to-insights-btn'); if (bk) bk.style.display = 'none';
        const gb = $('ir-back-btn'); if (gb) gb.style.display = '';   // restore the generic Back
        document.body.style.overflow = '';
      } else {
        document.body.style.overflow = '';
        btn.focus();
      }
      // Revert the header-tab highlight to the underlying page's route.
      // initRouter's generic revert hook only covers .modal-close /
      // [data-close] clicks, which missed the "Back to Insights" button and
      // Escape closes -- the Individual tab stayed lit over the Insights
      // page. Async (like the router hook) and idempotent with it.
      if (typeof setRoute_ === 'function') {
        setTimeout(function () { setRoute_(basePageRoute_()); }, 0);
      }
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
    const backToIns = $('ir-back-to-insights-btn');
    if (backToIns) backToIns.addEventListener('click', closeModal);

    // Wire form controls.
    const preset = $('ir-preset');
    if (preset) preset.addEventListener('change', applyIrPreset);

    const fromEl = $('ir-from');
    const toEl   = $('ir-to');
    if (fromEl) fromEl.addEventListener('change', function () {
      resetIrPreset(); scheduleActiveAgentRefetch_(); irSavePrefs_();
    });
    if (toEl) toEl.addEventListener('change', function () {
      resetIrPreset(); scheduleActiveAgentRefetch_(); irSavePrefs_();
    });

    const selAll  = $('ir-select-all');
    const selNone = $('ir-select-none');
    if (selAll)  selAll.addEventListener('click',  function (e) { e.preventDefault(); toggleIrAgents(true);  });
    if (selNone) selNone.addEventListener('click', function (e) { e.preventDefault(); toggleIrAgents(false); });

    const search = $('ir-agent-search');
    if (search) search.addEventListener('input', function () {
      irFilterAgentList_($('ir-agent-list'), search.value);
    });

    // Edit-selection popover wiring (results header).
    const editBtn = $('ir-edit-selection-btn');
    if (editBtn) editBtn.addEventListener('click', irOpenEditPopover_);
    const editClose = $('ir-edit-popover-close');
    if (editClose) editClose.addEventListener('click', irCloseEditPopover_);
    const editApply = $('ir-edit-apply-btn');
    if (editApply) editApply.addEventListener('click', irApplyEditPopover_);
    const editSelAll  = $('ir-edit-select-all');
    const editSelNone = $('ir-edit-select-none');
    if (editSelAll)  editSelAll.addEventListener('click',  function (e) { e.preventDefault(); irTogglePopoverAgents_(true);  });
    if (editSelNone) editSelNone.addEventListener('click', function (e) { e.preventDefault(); irTogglePopoverAgents_(false); });
    const editSearch = $('ir-edit-search');
    if (editSearch) editSearch.addEventListener('input', function () {
      irFilterAgentList_($('ir-edit-list'), editSearch.value);
    });
    // Close on click outside the popover.
    document.addEventListener('click', function (e) {
      const pop = $('ir-edit-popover');
      if (!pop || pop.style.display === 'none') return;
      if (pop.contains(e.target)) return;
      if (e.target === editBtn) return;
      irCloseEditPopover_();
    });

    const genBtn = $('ir-generate-btn');
    if (genBtn) genBtn.addEventListener('click', runIrReport);

    const backBtn = $('ir-back-btn');
    if (backBtn) backBtn.addEventListener('click', showIrForm);

    const labelToggle = $('ir-show-datalabels');
    if (labelToggle) labelToggle.addEventListener('change', function () {
      irSavePrefs_();
      if (irLastData) irRenderCharts(irLastData);
    });

    // Export dropdown: consolidates Copy image / Email image /
    // Print under one button. Click toggles open; click on an
    // item runs the action and closes; outside click + Escape
    // dismiss.
    const exportBtn  = $('ir-export-btn');
    const exportMenu = $('ir-export-menu');
    if (exportBtn && exportMenu) {
      exportBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        irSetExportMenuOpen_(exportMenu.style.display === 'none');
      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        irSetExportMenuOpen_(false);
        if (action === 'copy')  irCopyImage();
        else if (action === 'email') irEmailImage();
        else if (action === 'print') irPrintReport_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;
        if (exportMenu.contains(e.target) || e.target === exportBtn) return;
        irSetExportMenuOpen_(false);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && exportMenu.style.display !== 'none') {
          irSetExportMenuOpen_(false);
        }
      });
    }

    // Chart panel tabs. Only one of the three charts is visible at
    // a time so each gets the full container width. Default: Volume.
    const tabContainer = $('ir-chart-tabs');
    if (tabContainer) tabContainer.addEventListener('click', function (e) {
      // #4: the "All at once" toggle shares this strip -- flip the mode and
      // re-apply the layout (irActivateChartTab_ handles show/hide + resize).
      if (e.target.closest('#ir-allcharts-toggle')) {
        irShowAllCharts = !irShowAllCharts;
        irActivateChartTab_();
        irSavePrefs_();
        return;
      }
      const tab = e.target.closest('.ir-tab');
      if (!tab) return;
      // Clicking a specific chart-type tab exits all-at-once mode and shows
      // just that tab (previously tabs were inert in all-mode, leaving the
      // only way out a second click on the toggle).
      if (irShowAllCharts) irShowAllCharts = false;
      irActiveChartTab = tab.getAttribute('data-tab');
      irActivateChartTab_();
      irSavePrefs_();
    });

    // Card-sort dropdown: re-renders the summary cards in place.
    const sortSel = $('ir-card-sort');
    if (sortSel) sortSel.addEventListener('change', function () {
      irSortOrder = sortSel.value;
      irSavePrefs_();
      if (irLastData) irRenderSummary(irLastData.summaryData, irLastData.teamAvg);
    });

    // Defaults: this-month-to-date.
    setIrDefaultDates();
    // Restore last-used form state if any. Runs after default
    // dates so a saved preset/dates pair overrides the defaults.
    irRestorePrefs_();
    // Wire the Compare with dropdown + auto-update the hint.
    irInitCompareMode_();
  }

  /**
   * Persists the user's Individual Report state to localStorage so
   * the next modal open picks up where they left off. Best-effort.
   */
  function irSavePrefs_() {
    try {
      const prefs = {
        preset:      $('ir-preset')       ? $('ir-preset').value       : 'custom',
        from:        $('ir-from')         ? $('ir-from').value         : '',
        to:          $('ir-to')           ? $('ir-to').value           : '',
        compareMode: $('ir-compare-mode') ? $('ir-compare-mode').value : 'none',
        priorFrom:   $('ir-prior-from')   ? $('ir-prior-from').value   : '',
        priorTo:     $('ir-prior-to')     ? $('ir-prior-to').value     : '',
        agents:      irGetCheckedAgents_($('ir-agent-list')),
        showLabels:  $('ir-show-datalabels') ? $('ir-show-datalabels').checked : false,
        sortOrder:   irSortOrder,
        chartTab:    irActiveChartTab,
        showAllCharts: irShowAllCharts,
      };
      localStorage.setItem(irPrefsKey_(), JSON.stringify(prefs));
    } catch (e) { /* ignore */ }
  }

  function irRestorePrefs_() {
    let prefs;
    try {
      const raw = localStorage.getItem(irPrefsKey_());
      if (!raw) return;
      prefs = JSON.parse(raw);
    } catch (e) { return; }
    if (!prefs || typeof prefs !== 'object') return;

    if (prefs.preset && $('ir-preset')) $('ir-preset').value = prefs.preset;
    if (prefs.from   && $('ir-from'))   $('ir-from').value   = prefs.from;
    if (prefs.to     && $('ir-to'))     $('ir-to').value     = prefs.to;
    if (prefs.compareMode && $('ir-compare-mode')) $('ir-compare-mode').value = prefs.compareMode;
    if (prefs.priorFrom   && $('ir-prior-from'))   $('ir-prior-from').value   = prefs.priorFrom;
    if (prefs.priorTo     && $('ir-prior-to'))     $('ir-prior-to').value     = prefs.priorTo;
    if (typeof prefs.showLabels === 'boolean' && $('ir-show-datalabels')) {
      $('ir-show-datalabels').checked = prefs.showLabels;
    }
    if (prefs.sortOrder) irSortOrder = prefs.sortOrder;
    if (prefs.chartTab)  irActiveChartTab = prefs.chartTab;
    if (typeof prefs.showAllCharts === 'boolean') irShowAllCharts = prefs.showAllCharts;
    if ($('ir-card-sort')) $('ir-card-sort').value = irSortOrder;

    // Stash agents so we can pre-check the boxes once the roster
    // list finishes rendering.
    if (Array.isArray(prefs.agents) && prefs.agents.length) {
      irPendingAgentSelection_ = prefs.agents;
    }
  }

  function irSetExportMenuOpen_(open) {
    const btn  = $('ir-export-btn');
    const menu = $('ir-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function irPrintReport_() {
    var panels = document.querySelectorAll('#ir-charts-container [data-panel]');
    var saved = [];
    panels.forEach(function (p) { saved.push(p.style.display); p.style.display = ''; });
    irChartInstances.forEach(function (c) { c.resize(); });
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      panels.forEach(function (p, i) { p.style.display = saved[i]; });
      document.body.classList.add('ir-printing');
      window.print();
      document.body.classList.remove('ir-printing');
    }); });
  }

  function setIrDefaultDates() {
    // Match the main dashboard's default behavior: current month to
    // today. Lets a manager glance at the report without futzing
    // with dates first.
    const today = new Date();
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    if ($('ir-from')) $('ir-from').value = isoOf(first);
    if ($('ir-to'))   $('ir-to').value   = isoOf(today);
  }

  function showIrForm() {
    hideIrDrillLoading_();
    $('individual-form').style.display = '';
    $('individual-results').style.display = 'none';
    irSetFormError('');
  }
  function showIrResults() {
    hideIrDrillLoading_();
    $('individual-form').style.display = 'none';
    $('individual-results').style.display = '';
  }
  // #1 Part B: drill-through loader shown IN PLACE of the setup form while a
  // drill (Insights / My Department "IR" buttons) auto-generates, so the form
  // doesn't flash. showIrForm/showIrResults clear it on ANY transition, so a
  // drill can never get stuck on the loader (failure paths fall back to the form).
  function showIrDrillLoading_() {
    const l = $('ir-drill-loader'); if (l) l.style.display = '';
    $('individual-form').style.display = 'none';
    $('individual-results').style.display = 'none';
  }
  function hideIrDrillLoading_() {
    const l = $('ir-drill-loader'); if (l) l.style.display = 'none';
  }

  function irSetFormError(msg) {
    const el = $('ir-form-error');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg;
    el.style.display = '';
  }

  function irSetResultsStatus(kind, msg) {
    const el = $('ir-results-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // Fetches the dept roster (agent picker source) the first time the
  // modal opens for a given dept; subsequent opens reuse the cached
  // list as long as the dashboard's dept hasn't changed. Also asks
  // for the active-in-range subset using the current modal dates so
  // the picker can show an Active / Inactive split.
  function ensureIrRoster() {
    const dept = getRequestedDept();
    if (!dept) {
      $('ir-agent-loader').textContent = 'No department selected.';
      $('ir-agent-list').style.display = 'none';
      return;
    }
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    const rangeKey = from + '|' + to;

    if (irLastRoster.dept === dept && irLastRoster.agents.length
        && irLastRoster.rangeKey === rangeKey) {
      renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
      return;
    }
    $('ir-agent-loader').style.display = '';
    $('ir-agent-list').style.display = 'none';
    $('ir-generate-btn').disabled = true;

    const __rk = ++irRosterReqSeq_;
    google.script.run
      .withSuccessHandler(function (data) {
        if (__rk !== irRosterReqSeq_) return;   // superseded by a newer fetch
        irLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
      })
      .withFailureHandler(function (err) {
        if (__rk !== irRosterReqSeq_) return;   // a newer fetch owns the picker
        // #1 Part B: a drill hides the form behind the loader; if the roster
        // fetch fails, fall back to the form so the error (in the loader text)
        // is visible and cancel the pending auto-run.
        if (irPendingAutoRun_) { irPendingAutoRun_ = false; showIrForm(); }
        $('ir-agent-loader').style.display = '';
        $('ir-agent-loader').textContent = 'Error loading roster: '
          + (err && err.message ? err.message : String(err));
      })
      .getIndividualReportInit({ department: dept, from: from, to: to });
  }

  /**
   * Re-fetches the active-in-range subset 350ms after the user
   * stops changing the date inputs. Doesn't block the form -- the
   * full roster is already rendered and selectable; the response
   * just splits it into Active / Inactive groups visually.
   */
  function scheduleActiveAgentRefetch_() {
    if (irActiveFetchTimer) clearTimeout(irActiveFetchTimer);
    irActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept();
      if (!dept) return;
      const from = $('ir-from').value;
      const to   = $('ir-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (irLastRoster.dept === dept && irLastRoster.rangeKey === rangeKey) return;

      const __rk = ++irRosterReqSeq_;
      google.script.run
        .withSuccessHandler(function (data) {
          if (__rk !== irRosterReqSeq_) return;   // superseded by a newer fetch
          irLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          irLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          irLastRoster.rangeKey = rangeKey;
          // Preserve current selection across the regroup.
          const checked = irGetCheckedAgents_($('ir-agent-list'));
          renderIrAgentList(irLastRoster.agents, irLastRoster.activeAgents, irLastRoster.activeFloaters);
          irApplyCheckedAgents_($('ir-agent-list'), checked);
          updateIrGenerateEnabled();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getIndividualReportInit({ department: dept, from: from, to: to });
    }, 350);
  }

  /**
   * Renders the agent picker into `list` with Active / Inactive
   * grouping when an activeAgents subset is provided; otherwise a
   * single flat list. Used by both the main form picker and the
   * results-header edit popover.
   */
  function renderIrAgentList(agents, activeAgents, activeFloaters) {
    const list = $('ir-agent-list');
    $('ir-agent-loader').style.display = 'none';
    if (!agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = '';
      $('ir-generate-btn').disabled = true;
      return;
    }
    list.innerHTML = irBuildAgentListHtml_(agents, activeAgents, activeFloaters);
    list.style.display = '';

    if (irListChangeHandler_) list.removeEventListener('change', irListChangeHandler_);
    irListChangeHandler_ = function () {
      updateIrGenerateEnabled();
      irSavePrefs_();
    };
    list.addEventListener('change', irListChangeHandler_);
    // Apply any pending selection from restored prefs OR a drill-through
    // once. (irDrillToAgent_ sets this to a single-agent array.)
    if (irPendingAgentSelection_) {
      irApplyCheckedAgents_(list, irPendingAgentSelection_);
      irPendingAgentSelection_ = null;
    }
    updateIrGenerateEnabled();
    // Drill-through: auto-generate once the picker (with the pre-selected
    // agent) has rendered. Cleared so it fires exactly once.
    if (irPendingAutoRun_) {
      irPendingAutoRun_ = false;
      runIrReport();
    }
  }

  function irBuildAgentListHtml_(agents, activeAgents, activeFloaters) {
    // No activity info or no inactive members -> flat list.
    if (!activeAgents) return irAgentItemsHtml_(agents);
    const activeSet = {};
    for (let i = 0; i < activeAgents.length; i++) activeSet[activeAgents[i]] = true;
    const active = [];
    const inactive = [];
    for (let i = 0; i < agents.length; i++) {
      (activeSet[agents[i]] ? active : inactive).push(agents[i]);
    }
    const floaters = Array.isArray(activeFloaters) ? activeFloaters : [];
    if (!inactive.length && !floaters.length) return irAgentItemsHtml_(active);

    let html = '';
    if (active.length) {
      html += '<div class="ir-agent-group-label">'
            + 'Active in range <span class="ir-agent-group-count">(' + active.length + ')</span>'
            + '</div>'
            + '<div class="ir-agent-group">' + irAgentItemsHtml_(active) + '</div>';
    }
    // Inactive group wrapped in <details>, collapsed by default --
    // managers rarely need to pick zero-activity agents and the
    // collapsed state cleans up the picker. Search auto-expands it
    // (see irFilterAgentList_) when a query matches an inactive
    // name.
    if (inactive.length) {
      html += '<details class="ir-agent-details">'
            +   '<summary class="ir-agent-group-label ir-agent-group-label-muted">'
            +     'No activity in range <span class="ir-agent-group-count">(' + inactive.length + ')</span>'
            +   '</summary>'
            +   '<div class="ir-agent-group ir-agent-group-muted">' + irAgentItemsHtml_(inactive) + '</div>'
            + '</details>';
    }
    // Floaters group (INV-53 expansion). Queue-only agents matched
    // into this dept via shared-queue extension overlap, not on the
    // dept's roster. Collapsed by default like the inactive group.
    // Items render with the QUEUE chip + sourceHomes suffix from
    // the picker so managers see immediately which floater belongs
    // to which other dept. Picking a floater sends their name in
    // agents[] like any other; the server flags them and excludes
    // their numbers from team-avg.
    if (floaters.length) {
      html += '<details class="ir-agent-details">'
            +   '<summary class="ir-agent-group-label ir-agent-group-label-muted">'
            +     'Floaters (queue-only) <span class="ir-agent-group-count">(' + floaters.length + ')</span>'
            +   '</summary>'
            +   '<div class="ir-agent-group ir-agent-group-muted">' + irAgentItemsHtml_(floaters) + '</div>'
            + '</details>';
    }
    return html;
  }

  // Accepts either a plain string[] of agent names, OR an array of
  // { name, sourceHomes } objects (the floaters shape). Object items
  // render with a small QUEUE chip + sourceHomes suffix so the picker
  // mirrors the My Department Source-column chip rendering.
  function irAgentItemsHtml_(agents) {
    return agents.map(function (a) {
      if (a && typeof a === 'object' && a.name) {
        const safe = escapeHtml(a.name);
        const homes = Array.isArray(a.sourceHomes) ? a.sourceHomes : [];
        const suffix = homes.length
          ? ' &middot; ' + homes.map(escapeHtml).join(', ')
          : '';
        return '<label class="ir-agent-item">'
             +   '<input type="checkbox" class="ir-agent-cb" value="' + safe + '"> '
             +   safe
             +   ' <span class="src-chip src-chip-queue ir-agent-floater-chip">'
             +     '<span class="src-dot"></span>QUEUE' + suffix
             +   '</span>'
             + '</label>';
      }
      const safe = escapeHtml(a);
      return '<label class="ir-agent-item">'
           +   '<input type="checkbox" class="ir-agent-cb" value="' + safe + '"> '
           +   safe
           + '</label>';
    }).join('');
  }

  /**
   * Client-side substring filter across whatever list element is
   * passed (main form picker or edit-popover list). Hides items +
   * group-labels whose visible text doesn't match the query. The
   * collapsed "No activity in range" <details> auto-expands while
   * the query is non-empty so users can see matches inside it
   * without manually clicking the disclosure.
   */
  function irFilterAgentList_(listEl, query) {
    if (!listEl) return;
    const q = String(query || '').trim().toLowerCase();
    const items = listEl.querySelectorAll('.ir-agent-item');
    items.forEach(function (it) {
      const name = (it.textContent || '').trim().toLowerCase();
      it.style.display = (!q || name.indexOf(q) !== -1) ? '' : 'none';
    });
    // For each agent-group container: hide if no children are
    // visible. Two structural shapes:
    //   1. Group is inside a <details> (the "No activity" wrapper)
    //      -- toggle the details visibility + auto-open on search.
    //   2. Standalone group (the "Active" block) -- also hide its
    //      previous-sibling label.
    listEl.querySelectorAll('.ir-agent-group').forEach(function (g) {
      const anyVisible = Array.prototype.some.call(
        g.querySelectorAll('.ir-agent-item'),
        function (it) { return it.style.display !== 'none'; }
      );
      const det = g.closest('details');
      if (det) {
        det.style.display = anyVisible ? '' : 'none';
        if (q && anyVisible) det.open = true;
        return;
      }
      g.style.display = anyVisible ? '' : 'none';
      const prevLabel = g.previousElementSibling;
      if (prevLabel && prevLabel.classList.contains('ir-agent-group-label')) {
        prevLabel.style.display = anyVisible ? '' : 'none';
      }
    });
  }

  function updateIrGenerateEnabled() {
    const boxes = $('ir-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('ir-generate-btn').disabled = boxes.length === 0;
  }

  function toggleIrAgents(checked) {
    selectAllActiveAgents_($('ir-agent-list'), checked);
    updateIrGenerateEnabled();
    // Persist explicitly -- programmatic cb.checked flips don't
    // fire 'change' events, so the change-listener-driven
    // irSavePrefs_ doesn't catch this.
    irSavePrefs_();
  }

  /**
   * Shared "Select all active / Select none" toggle. When checked
   * is true, only the agents in the non-muted (Active in range)
   * group are ticked -- the inactive group (hidden under the
   * collapsible details) is left alone, so users have to opt in
   * explicitly to those. When checked is false, every checkbox
   * (active + inactive) is cleared.
   *
   * Falls back to "select all" when the picker has no
   * active/inactive grouping (e.g. the active-in-range fetch
   * hasn't returned yet, or every roster member fell into one
   * bucket).
   */
  function selectAllActiveAgents_(listEl, checked) {
    if (!listEl) return;
    if (checked) {
      const activeGroup = listEl.querySelector('.ir-agent-group:not(.ir-agent-group-muted)');
      const target = activeGroup
        ? activeGroup.querySelectorAll('.ir-agent-cb')
        : listEl.querySelectorAll('.ir-agent-cb');
      target.forEach(function (cb) { cb.checked = true; });
    } else {
      listEl.querySelectorAll('.ir-agent-cb').forEach(function (cb) { cb.checked = false; });
    }
  }

  function irGetCheckedAgents_(listEl) {
    if (!listEl) return [];
    return Array.prototype.slice.call(listEl.querySelectorAll('.ir-agent-cb:checked'))
                .map(function (cb) { return cb.value; });
  }

  function irApplyCheckedAgents_(listEl, agents) {
    if (!listEl) return;
    const set = {};
    for (let i = 0; i < agents.length; i++) set[agents[i]] = true;
    listEl.querySelectorAll('.ir-agent-cb').forEach(function (cb) {
      cb.checked = !!set[cb.value];
    });
  }

  function applyIrPreset() {
    const v = $('ir-preset').value;
    irSavePrefs_();
    if (v === 'custom') return;
    const today = new Date();
    let s, e;
    e = new Date(today);
    if (v === 'thisMonth')       { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')  { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                    e = new Date(today.getFullYear(), today.getMonth(), 0); }
    // "Last 30 days" = a 30-day window ENDING YESTERDAY, matching the main
    // page's preset chip (daysAgo_(30)..daysAgo_(1)) and the Overview
    // launcher / CacheWarm window -- today's ingest usually hasn't landed,
    // and the old today-30..today form was 31 days ending today.
    else if (v === 'last30')     { e = new Date(today); e.setDate(today.getDate() - 1);
                                    s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months'){ s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')   { s = new Date(today.getFullYear() - 1, 0, 1);
                                    e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    const isoOf = function (d) {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    };
    $('ir-from').value = isoOf(s);
    $('ir-to').value   = isoOf(e);
    irSavePrefs_();
  }
  function resetIrPreset() {
    const p = $('ir-preset');
    if (p) p.value = 'custom';
  }

  function runIrReport() {
    irSetFormError('');
    const dept = getRequestedDept();
    const from = $('ir-from').value;
    const to   = $('ir-to').value;
    if (!from || !to) { irSetFormError('Pick a start and end date.'); return; }
    if (from > to)    { irSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('ir-agent-list'));
    if (!agents.length) { irSetFormError('Select at least one agent.'); return; }

    const prior = irResolvePriorRange_(from, to);
    if (prior && prior.error) { irSetFormError(prior.error); return; }

    const btn = $('ir-generate-btn');
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.innerHTML = DS_EQ_HTML_ + 'Loading…';

    const req = { department: dept, from: from, to: to, agents: agents };
    if (prior) { req.priorFrom = prior.from; req.priorTo = prior.to; }

    const __rtok = ++reportReqSeq_.ir;   // F10 stale-response guard
    const __sig = reportSig_(req);   // D1b keep-last-good key
    reportSwrPaint_('ir', __sig, irRenderReport, 'ir-results-status');   // SWR: instant repeat-paint
    google.script.run
      .withSuccessHandler(function (data) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        if (__rtok !== reportReqSeq_.ir) return;   // superseded by a newer request
        reportLastGoodWrite_('ir', __sig, data);
        irRenderReport(data);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = originalLabel;
        if (__rtok !== reportReqSeq_.ir) return;
        // D1b: repaint last-good for this exact request (if any) instead of blanking.
        if (reportFailFallback_('ir', __sig, irRenderReport, 'ir-results-status')) return;
        // #1 Part B: on a drill the form is hidden behind the loader; surface it
        // so the error is visible (showIrForm clears the loader + any prior error).
        showIrForm();
        irSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getIndividualReport(req);
  }

  /**
   * Resolves the active "Compare with" selection into a concrete
   * { from, to } prior range, or null when no comparison is wanted.
   * Returns { error } on validation problems so the caller can
   * surface a form-level message.
   *
   * Modes:
   *   none        -> null
   *   yoy         -> shift the current window back 1 calendar year
   *   prevPeriod  -> immediately-preceding window of the same length
   *   custom      -> pull from the ir-prior-from / ir-prior-to inputs
   */
  /**
   * THE shared client-side comparison-window resolver. One math
   * implementation for every report's "compare against" control (IR
   * and Insights today) so the mode semantics can't drift between
   * reports -- mirrors the server's shared computePriorWindow_
   * (Data.gs) for the prevPeriod case (INV-28).
   *
   *   none        -> null
   *   prevPeriod  -> immediately-preceding window of the same length
   *   yoy         -> the window shifted back 1 calendar year
   *   custom      -> the supplied customFrom/customTo ({error} when
