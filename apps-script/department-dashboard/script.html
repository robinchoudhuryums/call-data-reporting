  // results header without a round-trip through the setup form (fewer
  // screens). Two Insights-specific semantics vs the IR popover:
  //  (1) Apply allows an EMPTY selection -- Insights' agent-free contract
  //      runs the whole department roster (INV-45 digest pattern), so
  //      "Select none (whole department)" is a feature, not an invalid
  //      state, and Apply is never disabled.
  //  (2) The compare control defaults to a 'keep' sentinel: left there,
  //      Apply re-resolves through the MAIN form's compare mode (including
  //      a custom prior window the popover can't represent); picking a
  //      preset syncs it back into the form first, so the form and the
  //      report never disagree.

  /** Compact "Showing: ..." label (IR's truncation rules) + the agent-free
   *  wording when the last request carried no explicit agents. */
  function insRenderEditingLine_(data) {
    const el = $('ins-editing-agents');
    if (!el) return;
    const meta = (data && data.meta) || {};
    const resolved = Array.isArray(meta.agents) ? meta.agents : [];
    let visible, tooltip;
    if (insLastRequestedAgents_ && !insLastRequestedAgents_.length) {
      visible = 'Whole department (' + resolved.length + ' agent' + (resolved.length === 1 ? '' : 's') + ')';
      tooltip = resolved.join(', ');
    } else if (resolved.length <= 3) {
      visible = resolved.join(', ');
      tooltip = visible;
    } else {
      visible = resolved.slice(0, 2).join(', ') + ', +' + (resolved.length - 2) + ' more';
      tooltip = resolved.join(', ');
    }
    el.textContent = visible || '(none)';
    el.title = tooltip;
  }

  function insOpenEditPopover_() {
    const pop = $('ins-edit-popover');
    const list = $('ins-edit-list');
    if (!pop || !list) return;
    const meta = (insLastData && insLastData.meta) || {};
    if ($('ins-edit-from')) $('ins-edit-from').value = meta.from || ($('ins-from') ? $('ins-from').value : '');
    if ($('ins-edit-to'))   $('ins-edit-to').value   = meta.to   || ($('ins-to')   ? $('ins-to').value   : '');
    if ($('ins-edit-compare-mode')) $('ins-edit-compare-mode').value = 'keep';
    if ($('ins-edit-prior-row')) $('ins-edit-prior-row').style.display = 'none';   // re-shown on Compare=custom
    // Roster-only list (no floater group), same as the main Insights picker.
    list.innerHTML = irBuildAgentListHtml_(insLastRoster.agents || [], insLastRoster.activeAgents, []);
    // Pre-check the REQUESTED selection -- an agent-free run pre-checks
    // nothing, so an untouched Apply preserves the whole-department run.
    irApplyCheckedAgents_(list, insLastRequestedAgents_ || []);
    // D2: the compare / prior / agent controls live behind Advanced options
    // now. Auto-open it when the CURRENT report already uses them -- a custom
    // prior window or a partial agent selection must stay visible, never
    // silently folded away.
    const adv = $('ins-edit-advanced');
    if (adv) {
      const partialAgents = !!(insLastRequestedAgents_ && insLastRequestedAgents_.length);
      const customPrior = (insLastData && insLastData.meta
        && insLastData.meta.comparisonMode === 'custom');
      adv.open = partialAgents || !!customPrior;
    }
    pop.style.display = '';
    const search = $('ins-edit-search');
    if (search) { search.value = ''; setTimeout(function () { search.focus(); }, 0); }
    irFilterAgentList_(list, '');
  }

  function insCloseEditPopover_() {
    const pop = $('ins-edit-popover');
    if (pop) pop.style.display = 'none';
  }

  function insTogglePopoverAgents_(checked) {
    selectAllActiveAgents_($('ins-edit-list'), checked);
  }

  // I4: unified period slider. Resolves a preset id to an absolute { from, to }
  // window that ENDS yesterday (the launcher convention every Insights default
  // uses). 'custom' returns null -- that button opens the Edit popover instead.
  function insPeriodRange_(preset) {
    const to = launcherIsoDaysAgo_(1);
    if (preset === 'last7')  return { from: launcherIsoDaysAgo_(7),  to: to };
    if (preset === 'last30') return { from: launcherIsoDaysAgo_(30), to: to };
    if (preset === 'mtd')    return { from: String(to).slice(0, 8) + '01', to: to };   // first of to's month
    if (preset === 'ytd')    return { from: String(to).slice(0, 4) + '-01-01', to: to };
    return null;
  }

  // Sync the active preset button to the currently-rendered window; highlight
  // "Custom…" when the window matches no preset (e.g. after an Edit-popover
  // custom range, or when viewing a report generated on a prior day).
  function insSyncPeriodBar_(meta) {
    const bar = $('ins-period-bar');
    if (!bar) return;
    const from = meta && meta.from, to = meta && meta.to;
    recordPageWindow_('insights', from, to);   // Batch E: for the My Department date-sync offer
    // R7 (I-2): keep the sticky context bar's text current (dept · window).
    const stTxt = $('ins-sticky-text');
    if (stTxt && from && to) {
      stTxt.textContent = 'Insights · ' + (getRequestedDept() || '')
        + ' · ' + (from === to ? from : from + ' – ' + to);
    }
    let active = 'custom';
    ['last7', 'last30', 'mtd', 'ytd'].some(function (p) {
      const r = insPeriodRange_(p);
      if (r && r.from === from && r.to === to) { active = p; return true; }
      return false;
    });
    bar.querySelectorAll('.ov-period-btn').forEach(function (b) {
      const on = b.getAttribute('data-ins-period') === active;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  // Wire the period slider once. A preset drives the WHOLE report window by
  // setting the hidden form dates + reusing runInsReport (so it inherits the
  // SWR paint, D1b keep-last-good, and stale-response guard), preserving the
  // compare mode + agent selection -- the same path insApplyEditPopover_ takes,
  // minus the popover. "Custom…" defers to the Edit popover for arbitrary
  // windows / agents / comparison. No prefs schema change: the window persists
  // via the existing from/to prefs and the button re-syncs from meta on render.
  let insPeriodBarWired_ = false;
  function insWirePeriodBar_() {
    const bar = $('ins-period-bar');
    if (!bar || insPeriodBarWired_) return;
    insPeriodBarWired_ = true;
    bar.addEventListener('click', function (e) {
      const b = e.target.closest('.ov-period-btn');
      if (!b) return;
      const preset = b.getAttribute('data-ins-period');
      if (preset === 'custom') {
        // Custom opens the Edit-selection popover (its From/To are the custom
        // range). #3c: the popover can open below the fold / not obviously tied
        // to this click ("Custom did nothing"), so scroll it into view and land
        // focus on the From date -- without touching the shared open handler.
        const eb = $('ins-edit-selection-btn'); if (eb) eb.click();
        const pop = $('ins-edit-popover');
        if (pop && pop.style.display !== 'none') {
          try { pop.scrollIntoView({ block: 'nearest' }); } catch (scrollErr) { /* older browsers */ }
          const fromEl = $('ins-edit-from');
          if (fromEl) setTimeout(function () { try { fromEl.focus(); } catch (focusErr) {} }, 0);
        }
        return;
      }
      const r = insPeriodRange_(preset);
      if (!r) return;
      if ($('ins-from')) $('ins-from').value = r.from;
      if ($('ins-to'))   $('ins-to').value   = r.to;
      if ($('ins-preset')) $('ins-preset').value = 'custom';
      // Validate the (kept) comparison before firing -- the setup form is
      // hidden, so its error line would be invisible; surface on the results.
      const prior = insResolvePriorRange_(r.from, r.to);
      if (prior && prior.error) { insSetResultsStatus_('error', prior.error); return; }
      insScheduleActiveRefetch_();   // re-group the picker for the new range
      insSavePrefs_();
      insSetResultsStatus_('loading', 'Refreshing report…');
      runInsReport();
    });
  }

  function insApplyEditPopover_() {
    const from = $('ins-edit-from') ? $('ins-edit-from').value : '';
    const to   = $('ins-edit-to')   ? $('ins-edit-to').value   : '';
    if (!from || !to) { insSetResultsStatus_('error', 'Pick a start and end date.'); return; }
    if (from > to)    { insSetResultsStatus_('error', 'Start date must be on or before end date.'); return; }
    const newAgents = irGetCheckedAgents_($('ins-edit-list'));   // empty = whole department
    const popMode = $('ins-edit-compare-mode') ? $('ins-edit-compare-mode').value : 'keep';

    // Custom prior range (owner note: with the setup-form step retired,
    // the popover must be able to EXPRESS a custom prior, not just keep
    // one): validate + stage the prior dates before the form sync below.
    if (popMode === 'custom') {
      const pf = $('ins-edit-prior-from') ? $('ins-edit-prior-from').value : '';
      const pt = $('ins-edit-prior-to')   ? $('ins-edit-prior-to').value   : '';
      if (!pf || !pt) { insSetResultsStatus_('error', 'Pick prior start and end dates.'); return; }
      if (pf > pt)    { insSetResultsStatus_('error', 'Prior start must be on or before prior end.'); return; }
      if ($('ins-prior-from')) $('ins-prior-from').value = pf;
      if ($('ins-prior-to'))   $('ins-prior-to').value   = pt;
    }

    // Sync the popover state back into the (hidden) setup form so re-open /
    // saved prefs all agree, then reuse runInsReport end-to-end (it brings
    // the SWR paint, D1b keep-last-good, and the stale-response guard).
    if ($('ins-from')) $('ins-from').value = from;
    if ($('ins-to'))   $('ins-to').value   = to;
    if ($('ins-preset')) $('ins-preset').value = 'custom';
    if (popMode !== 'keep' && $('ins-compare-mode')) {
      $('ins-compare-mode').value = popMode;
      $('ins-compare-mode').dispatchEvent(new Event('change'));   // custom-input visibility + hint
    }
    irApplyCheckedAgents_($('ins-agent-list'), newAgents);
    insScheduleActiveRefetch_();   // re-group the main picker for the new range
    insSavePrefs_();

    // Validate the (possibly kept-custom) comparison BEFORE firing: the
    // setup form is hidden here, so its error line would be invisible.
    const prior = insResolvePriorRange_(from, to);
    if (prior && prior.error) { insSetResultsStatus_('error', prior.error); return; }

    insCloseEditPopover_();
    insSetResultsStatus_('loading', 'Refreshing report…');
    runInsReport();
  }

  function runInsReport() {
    const dept = getRequestedDept(); if (!dept) { insSetFormError('No department selected.'); return; }
    const from = $('ins-from').value, to = $('ins-to').value;
    if (!from || !to) { insSetFormError('Pick a start and end date.'); return; }
    if (from > to) { insSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('ins-agent-list'));
    // Agent-free run: an empty selection is allowed -- the server defaults to
    // the full department roster (the QCD-replacement queue / dept view).
    // Resolve the comparison window. prevPeriod -> null (server's
    // INV-28 auto-adjacent default); yoy/custom -> explicit dates.
    const prior = insResolvePriorRange_(from, to);
    if (prior && prior.error) { insSetFormError(prior.error); return; }
    insSetFormError('');
    insLastRequestedAgents_ = agents.slice();   // edit popover reads the REQUESTED form
    const req = { department: dept, from: from, to: to, agents: agents };
    if (prior) { req.priorFrom = prior.from; req.priorTo = prior.to; }
    const gen = $('ins-generate-btn'); const prev = gen.textContent;
    gen.disabled = true; gen.innerHTML = DS_EQ_HTML_ + 'Generating…';
    const __rtok = ++reportReqSeq_.ins;   // F10 stale-response guard
    const __sig = reportSig_(req);   // D1b keep-last-good key
    // R7 (I-3): a re-run over an ALREADY-RENDERED report (period slider, edit
    // popover, Refresh) frosts the whole results container -- the M3/M-1
    // pattern -- instead of relying on the thin one-line status note. The SWR
    // pre-paint below stays readable under the frost; live/fail handlers clear
    // it. A first run (results hidden) keeps the existing loading pane.
    const __insFrostHost = $('insights-results');
    const __insUseFrost = !!(__insFrostHost && __insFrostHost.style.display !== 'none'
                             && __insFrostHost.childElementCount > 0);
    if (__insUseFrost) dsFrostShow_(__insFrostHost, 'Refreshing report…');
    // Repaint path shared by live data / SWR / fail-fallback; clears the
    // results-status line so the SWR "refreshing" note can't outlive the
    // response it announced.
    const __insRepaint = function (d, opts) {
      insRenderReport_(d, opts); insShowResults(); reportSetStatus_('ins-results-status', '');
      // SWR pre-paint keeps the frost up (still refreshing); live/fallback clears.
      if (!(opts && opts.swr) && __insFrostHost) dsFrostHide_(__insFrostHost);
    };
    reportSwrPaint_('ins', __sig, __insRepaint, 'ins-results-status');   // SWR: instant repeat-paint
    // With the frost up, the "previous result — refreshing" status line is
    // redundant (the dept-table M3 precedent) -- the frost signals the refresh.
    if (__insUseFrost) reportSetStatus_('ins-results-status', '');
    google.script.run
      .withSuccessHandler(function (data) {
        gen.disabled = false; gen.textContent = prev;
        if (__rtok !== reportReqSeq_.ins) return;
        reportLastGoodWrite_('ins', __sig, data);
        insSavePrefs_(); __insRepaint(data);
      })
      .withFailureHandler(function (err) {
        gen.disabled = false; gen.textContent = prev;
        if (__rtok !== reportReqSeq_.ins) return;
        if (__insFrostHost) dsFrostHide_(__insFrostHost);   // R7 (I-3)
        // D1b: repaint last-good for this exact request (if any) instead of blanking.
        if (reportFailFallback_('ins', __sig, __insRepaint, 'ins-results-status')) return;
        insShowForm();   // dismisses the launcher loading pane if active
        insSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getInsightsReport(req);
  }

  /**
   * Shared ds-* KPI tile (Phase 1 redesign; see docs/design-update-plan.md).
   * Used by the Insights team rollup (and, until its retirement, the
   * Performance Report rollup -- the first ds-* component shared across two
   * reports). Same (label, stat, valenceDirection, sparklineData,
   * sparklineColor) shape. Behavior is identical to the retired prKpiTile_ -- same
   * valence-to-color mapping, the same binary benchValueCls_ tint on the value
   * (92% / 5% only; NO invented 85%/8% bands, decision C2), and the same shared
   * irSparkline_. Emits the ds-kpi structure (mono label + delta pill on top,
   * display value, full-width sparkline, quiet "vs prior" footer).
   */
  function dsKpiTile_(label, stat, valenceDirection, sparklineData, sparklineColor) {
    const s = stat || { formatted: '-', deltaPct: 0, type: 'volume' };
    const isPctType = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    let badge;
    if (Math.abs(dp) < 0.05) {
      badge = '<span class="ds-delta ds-delta--neutral">— no change</span>';
    } else {
      let mod = 'ds-delta--neutral';
      if (valenceDirection === 'pos')      mod = dp > 0 ? 'ds-delta--good' : 'ds-delta--warn';
      else if (valenceDirection === 'neg') mod = dp > 0 ? 'ds-delta--warn' : 'ds-delta--good';
      const arrow = dp > 0 ? '▲' : '▼';
      const suffix = isPctType ? ' pts' : '%';
      badge = '<span class="ds-delta ' + mod + '">' + arrow + ' ' + Math.abs(dp).toFixed(1) + suffix + '</span>';
    }
    const spark = irSparkline_(sparklineData || [], sparklineColor || '#4E79A7');
    return '<div class="ds-kpi">'
         +   '<div class="ds-kpi__top">'
         +     '<span class="ds-kpi__label">' + label + '</span>'
         +     badge
         +   '</div>'
         +   '<div class="ds-kpi__value' + benchValueCls_(label, s.formatted, true) + '">' + escapeHtml(String(s.formatted)) + '</div>'
         +   '<div class="ds-kpi__spark">' + spark + '</div>'
         +   '<div class="ds-kpi__foot">vs prior</div>'
         + '</div>';
  }

  // "N workdays" (singular-aware). Prefers the server's INV-35 count
  // (holiday-aware) when present; falls back to the client mirror.
  function insWorkdaysLabel_(serverCount, fromIso, toIso) {
    const n = (serverCount && serverCount > 0)
      ? serverCount
      : workingDaysBetween_(fromIso, toIso);
    if (!n) return '';
    return n + (n === 1 ? ' workday' : ' workdays');
  }

  // A2: is the Team-detail <details> currently expanded? A missing wrapper
  // (older markup) counts as open so the charts always render.
  function insDetailOpen_() {
    var d = $('ins-team-detail');
    return !d || d.open;
  }

  // A2: render the two Chart.js canvases (trend + share) from the cached
  // payload. Called during the main render when the Team-detail is already
  // open, and by the <details> toggle handler on first open (charts built
  // while collapsed render at zero height -- the missed-chart offsetParent
  // lesson). Queue health + heatmap are DOM/CSS-grid, so they render in the
  // main pass whether or not this section is open.
  function insRenderDeferredCharts_() {
    if (!insLastData || !insDetailOpen_()) return;
    // I4: only the share doughnut is deferred now -- the trend chart moved out
    // of this <details> to the always-visible bottom Trends section and renders
    // in the main pass (insDrawTrendChart_).
    insRenderShareChart_(insLastData.agentData || []);
  }

  // I4: measure-guarded trend render for the main pass. The trend chart lives
  // at the bottom of the report as its own always-visible section now, but the
  // main render can run before #insights-results is shown (the __insRepaint
  // path renders then calls insShowResults), so Chart.js could measure a
  // zero-size canvas and come up blank. Defer creation via bounded rAF until
  // the wrap is laid out -- the missed-chart lesson (MC2). User-interaction
  // callers (subtab / view toggle / datalabels) run while visible and call
  // insRenderTrendChart_ directly.
  var insTrendDrawAttempts_ = 0;
  function insDrawTrendChart_(data) {
    var wrap = $('ins-trend-wrap');
    if (!wrap) { insRenderTrendChart_(data); return; }   // older markup: render directly
    var measurable = wrap.offsetParent !== null && wrap.clientWidth > 0;
    if (!measurable) {
      if (insTrendDrawAttempts_ < 30 && typeof requestAnimationFrame === 'function') {
        insTrendDrawAttempts_++;
        requestAnimationFrame(function () { insDrawTrendChart_(data); });
      }
      return;
    }
    insTrendDrawAttempts_ = 0;
    insRenderTrendChart_(data);
  }

  // A1: among the valenced volume/rate metrics, the one that moved MOST
  // unfavorably (per-working-day-adjusted, matching the trend pill's
  // classification). Returns { label, arrow } or null when nothing moved
  // the wrong way. Valence: % answered / answered up = good; missed up = bad.
  function insWorstMover_(metrics, meta) {
    var adj = insPerDayMetrics_(metrics || {}, meta) || {};
    var defs = [
      { key: 'pct',      label: '% answered', inverse: false },
      { key: 'answered', label: 'answered',   inverse: false },
      { key: 'missed',   label: 'missed',     inverse: true  },
    ];
    var worst = null;
    defs.forEach(function (d) {
      var st = adj[d.key];
      if (!st || st.deltaPct == null) return;
      var dp = Number(st.deltaPct) || 0;
      var badness = d.inverse ? dp : -dp;   // > 0 = an unfavorable move
      if (badness <= 0.05) return;
      if (!worst || badness > worst.badness) {
        worst = { badness: badness, label: d.label, arrow: d.inverse ? '▲' : '▼' };
      }
    });
    return worst ? { label: worst.label, arrow: worst.arrow } : null;
  }

  // I2: the needs-attention chips are now folded INTO the headline banner (one
  // "here's who's behind" surface instead of a separate strip). One chip per
  // BEHIND-TEAM agent -- the SAME peer-relative set the card orange rails flag
  // (insClassifyAgent_ 'attention'), so the banner count, these chips, and the
  // rails all agree (I6). Each chip scrolls to that agent's card. Hidden for a
  // single-agent report; no chips when nobody's behind (the banner's team
  // sentence carries the story). The standalone #ins-needs-attention element is
  // retired (kept hidden).
  // D3 (#6): the all-clear renders only when the team is also flat -- within
  // this many pct-POINTS of the prior window (the pct stat is pctPoints).
  var INS_ALLCLEAR_MAX_PTS_ = 1.5;

  // D3 (#7): small-sample display threshold -- average answerable calls
  // (answered + missed) per shown agent over the window. FRONT-END display
  // constant only: below it a note renders near the headline and the delta
  // pills mute (CSS), so a newcomer doesn't over-read a ±40% swing on 5
  // calls. Never changes the compute or hides data.
  var INS_SMALL_SAMPLE_PER_AGENT_ = 10;
  function insRenderSmallSampleNote_(data) {
    var el = $('ins-small-sample');
    var res = $('insights-results');
    if (!el) return;
    var cards = (data && data.agentData) || [];
    var small = false;
    if (cards.length) {
      var total = 0;
      cards.forEach(function (c) {
        var m = c.metrics || {};
        total += (Number(m.answered && m.answered.val) || 0)
               + (Number(m.missed && m.missed.val) || 0);
      });
      small = (total / cards.length) < INS_SMALL_SAMPLE_PER_AGENT_;
    }
    el.style.display = small ? '' : 'none';
    if (small) {
      el.textContent = 'Small sample — on average fewer than ' + INS_SMALL_SAMPLE_PER_AGENT_
        + ' calls per agent in this window, so the change indicators may be noisy.';
    }
    if (res) res.classList.toggle('ins-small-sample-mode', small);
  }

  function insRenderNeedsAttentionStrip_(data) {
    var strip = $('ins-needs-attention');
    if (strip) { strip.style.display = 'none'; strip.innerHTML = ''; }
    var headEl = $('ins-headline');
    if (!headEl) return;
    // Clear any chips appended on a prior render (reportHeadline_ rebuilds the
    // banner's innerHTML, but guard anyway).
    var prev = headEl.querySelector('.ins-headline-attn');
    if (prev && prev.parentNode) prev.parentNode.removeChild(prev);
    if (headEl.style.display === 'none') return;
    var cards = (data && data.agentData) || [];
    if (cards.length <= 1) return;
    var ts = (data && data.teamStats) || {};
    var teamPct = Number((ts.pct && ts.pct.val) || 0);
    var behind = cards.filter(function (c) { return insClassifyAgent_(c, teamPct) === 'attention'; });
    if (!behind.length) {
      // D3 (#6): an explicit all-clear beats empty space for occasional
      // users -- but ONLY when the team is also flat vs prior (a big team
      // move already carries the headline's story). Same values the
      // headline computes; presentation only.
      var teamDp = Number((ts.pct && ts.pct.deltaPct) || 0);
      if (isFinite(teamDp) && Math.abs(teamDp) <= INS_ALLCLEAR_MAX_PTS_) {
        var ok = document.createElement('div');
        ok.className = 'ins-headline-attn ins-headline-allclear';
        ok.textContent = 'Steady period — no agent is behind the team average, and the team answer rate is within ±'
          + INS_ALLCLEAR_MAX_PTS_ + ' pts of the prior period.';
        headEl.appendChild(ok);
      }
      return;
    }
    var chips = behind.map(function (c) {
      var pct = Number((c.metrics && c.metrics.pct && c.metrics.pct.val) || 0);
      var gap = Math.round(teamPct - pct);
      var sub = '<span class="ds-attn-chip-metric">' + (gap > 0 ? gap + ' pts behind' : 'behind') + '</span>';
      return '<button type="button" class="ds-attn-chip" data-agent="' + escapeHtml(c.name) + '"'
        + ' title="Jump to ' + escapeHtml(c.name) + '’s card">'
        + '<span class="ds-attn-chip-name">' + escapeHtml(c.name) + '</span>' + sub + '</button>';
    }).join('');
    var row = document.createElement('div');
    row.className = 'ins-headline-attn ds-attn-chips';
    row.innerHTML = chips;
    headEl.appendChild(row);
  }

  // A1: scroll to + pulse an agent's card by name (the strip chip target).
  // Reuses the .qs-spotlight accent-ring pulse (reduced-motion aware via CSS).
  function insSpotlightAgentCard_(name) {
    var wrap = $('ins-agent-cards');
    if (!wrap || !name) return;
    var el = wrap.querySelector('[data-ins-agent="' + escCssId_(name) + '"]');
    // A regressed agent whose card is in the collapsed quiet group won't be
    // found in the main grid -- expand it so the target exists, then retry.
    if (!el) {
      var det = $('ins-quiet-details');
      if (det) {
        det.open = true;
        var qc = $('ins-quiet-cards');
        el = qc && qc.querySelector('[data-ins-agent="' + escCssId_(name) + '"]');
      }
    }
    if (!el) return;
    try { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
    el.classList.remove('qs-spotlight');
    void el.offsetWidth;
    el.classList.add('qs-spotlight');
    setTimeout(function () { el.classList.remove('qs-spotlight'); }, 2600);
  }

  function insRenderReport_(data, opts) {
    insLastData = data;
    // D1: apply the density class + toggle state before painting so the
    // Simple gating is in effect for everything below (incl. SWR pre-paints).
    insSyncDensity_();
    // D3: one-time first-run intro. R7 (I-3, owner): shown ONCE, period --
    // the first render auto-marks it seen, so it never re-nags on later
    // entries even if the user doesn't click Got it (the dismiss button still
    // hides it immediately this session). Best-effort on storage errors
    // (private mode -> shows each visit, the pre-R7 behavior).
    (function () {
      const card = $('ins-intro-card');
      if (!card) return;
      let done = null;
      try { done = localStorage.getItem('cdr.ins.intro.v1'); } catch (e) {}
      card.style.display = done ? 'none' : '';
      if (!done) { try { localStorage.setItem('cdr.ins.intro.v1', 'done'); } catch (e2) {} }
    })();
    insCloseEditPopover_();
    // I1: belt-and-suspenders -- ensure the launcher's auto-generate loading
    // pane is hidden whenever a report renders. Its ~120px skeleton, if left
    // visible, reads as a large blank band above the results.
    launcherHideLoading_('ins-launcher-loading');
    insRenderEditingLine_(data);
    // Date line: label the window so the range doesn't read as arbitrary --
    // name the launcher-default shape ("last 30 days") when it matches, and
    // always show how many workdays the window actually represents.
    (function () {
      const meta = data.meta || {};
      const bits = [data.dateLabel || ''];
      if (meta.from === launcherIsoDaysAgo_(30) && meta.to === launcherIsoDaysAgo_(1)) {
        bits.push('last 30 days');
      }
      const wd = insWorkdaysLabel_(meta.currentWorkDays, meta.from, meta.to);
      if (wd) bits.push(wd);
      $('ins-results-date').textContent = '(' + bits.filter(Boolean).join(' · ') + ')';
    })();
    insSyncPeriodBar_(data.meta);   // I4: reflect the rendered window on the slider
    const cmp = $('ins-compare-line');
    if (cmp) {
      const mode = data.meta && data.meta.comparisonMode;
      const basis = mode === 'custom'
        ? 'Comparing against the selected prior window: '
        : 'Comparing against the immediately-preceding period: ';
      // Inline the different-window-lengths caveat right here (next to the
      // basis line) as a warn glyph + bold label whose explanation lives in
      // a hover tooltip -- lighter than the old standalone banner.
      const priorWd = insWorkdaysLabel_((data.meta || {}).priorWorkDays,
        (data.meta || {}).priorFrom, (data.meta || {}).priorTo);
      cmp.innerHTML = escapeHtml(basis) + escapeHtml(data.priorDateLabel || '')
        + (priorWd ? escapeHtml(' (' + priorWd + ')') : '')
        + insLengthFlagHtml_(data.meta) + insOverlapFlagHtml_(data.meta);
    }

    // Team insights callout (reuse the IR block; relabel to "Team insights").
    // I3: limited to % Answered (rings) + Abandoned % -- the volume + talk-time
    // insights are dropped (owner request; client-side filter so the shared
    // buildTeamInsights_ / digest are unaffected). Abandoned % is added here
    // from queue health (buildTeamInsights_ is DQE-only and never produced it).
    const host = $('ins-team-insights');
    if (host) {
      const ins = (data.teamInsights || []).filter(function (x) {
        return /^Answer rate/.test(String((x && x.text) || ''));
      });
      const qh = data.queueHealth;
      if (qh && qh.totals && Number(qh.totals.totalCalls) > 0) {
        const cur = Number(qh.totals.abandonedPct);
        const prv = (qh.priorTotals && qh.priorTotals.abandonedPct != null)
          ? Number(qh.priorTotals.abandonedPct) : null;
        if (prv != null && isFinite(prv) && Math.abs(cur - prv) >= 1) {
          const up = cur > prv;
          const prvStr = (qh.priorTotals && qh.priorTotals.abandonedPctStr) || (prv.toFixed(1) + '%');
          ins.push({ type: up ? 'negative' : 'positive',
            text: 'Abandoned % ' + (up ? 'rose' : 'fell') + ' ' + Math.abs(cur - prv).toFixed(1)
              + ' pts vs prior (' + qh.totals.abandonedPctStr + ' vs ' + prvStr + ').' });
        } else if (cur >= 5) {
          ins.push({ type: 'negative',
            text: 'Abandoned % is ' + qh.totals.abandonedPctStr + ' — over the 5% threshold.' });
        }
      }
      host.innerHTML = ins.length
        ? irInsightsBlock_(ins).replace('<div class="ir-insights-label">Insights</div>',
                                        '<div class="ir-insights-label">Team insights</div>')
        : '';
    }

    // Roster-only caption on the rollup.
    const cap = $('ins-rollup-cap');
    if (cap) {
      const fl = (data.meta && data.meta.queueOnlyAgentCount) || 0;
      cap.textContent = fl > 0 ? '(roster only · ' + fl + ' floater' + (fl === 1 ? '' : 's') + ' excluded)' : '';
    }

    // Team KPI tiles -- the shared ds-kpi tile (ex-Performance Report), with
    // 12-month sparklines from the server's trendData (same series
    // shape PR's prRenderKpis_ consumes).
    const t = data.teamStats || {};
    const series = (data.trendData && data.trendData.series) || [];
    const sparks = {
      rung:     series.map(function (s) { return s.rung; }),
      missed:   series.map(function (s) { return s.missed; }),
      answered: series.map(function (s) { return s.answered; }),
      pct:      series.map(function (s) { return s.pct; }),
      ttt:      series.map(function (s) { return s.ttt; }),
      att:      series.map(function (s) { return s.att; }),
    };
    $('ins-kpi-row').innerHTML = [
      // Team (roster) rollup -- the priority metrics first. Total Rung +
      // Total TTT were dropped (low signal); Longest Wait lives in Queue
      // health. Missed keeps its warn valence; volume/rate are neutral/pos.
      dsKpiTile_('% Answered (rings)', t.pct, 'pos', sparks.pct,     (THEME.accent || '#4E79A7')),
      dsKpiTile_('Answered',     t.answered, 'neu', sparks.answered, IR_VOLUME_COLORS.answered),
      dsKpiTile_('Missed (rings)', t.missed, 'neg', sparks.missed,   IR_VOLUME_COLORS.missed),
      dsKpiTile_('ATT (per call)', t.att,    'neu', sparks.att,      (THEME.muted  || '#9C755F')),
    ].join('');

    insRenderLengthWarning_(data.meta);
    insRenderQueueHealth_(data.queueHealth);
    // Temporal abandon heatmap companion to Queue health (sourced from
    // inbound_calls). Admin only -- getInboundHeatmap inherits the inbound
    // report's vetting gate, so managers never call it and the panel stays
    // hidden for them (same gate as the QCD report's heatmap). Skipped on
    // the SWR pre-paint -- the live repaint fetches it once.
    // D1: in Simple the heatmap's host section is hidden -- skip the fetch
    // (insSetDensity_ fires it when the admin switches to Detailed).
    if (USER.role === 'admin' && data.meta && !insIsSimple_()) {
      if (!(opts && opts.swr)) loadAbandonHeatmap_('ins-heatmap', data.meta.department || '', data.meta.from, data.meta.to);
    } else if (USER.role !== 'admin') {
      var insHeat = $('ins-heatmap'); if (insHeat) { insHeat.style.display = 'none'; insHeat.innerHTML = ''; }
    }
    reportHeadline_('ins-headline', 'insights-results', insHeadline_(data));
    insRenderNeedsAttentionStrip_(data);
    // I4: the 12-month trend chart moved OUT of the collapsed Team-detail to
    // its own always-visible section at the bottom of the report, so it renders
    // in the main pass now -- measure-guarded (insDrawTrendChart_), since this
    // pass can run before the results container is shown on first paint.
    // The share doughnut still lives inside the Team-detail <details>, so it
    // stays deferred (renders at zero height while collapsed) -- only rendered
    // here when the section is already open; the toggle handler renders it on
    // first open. Queue health + heatmap already ran above (DOM/CSS-grid).
    // D1: Simple SKIPS the trend + share draws (not render-then-hide --
    // insDrawTrendChart_ gives up after 30 hidden frames and the chart would
    // never exist; insSetDensity_ builds both on the switch to Detailed).
    if (!insIsSimple_()) {
      insDrawTrendChart_(data);
      if (insDetailOpen_()) {
        insRenderShareChart_(data.agentData || []);
      }
    }
    insRenderSmallSampleNote_(data);   // D3 (#7): annotation only, both modes
    insRenderAgentCards_(data.agentData || [], data.meta, data.teamStats);
    // Quick-start chip landing: scroll to + spotlight the section that
    // answers the clicked question (one-shot; a small delay lets the page
    // swap / layout settle first). An SWR pre-paint consumes it too --
    // scrolling on the instant paint beats waiting for the live pass.
    if (insScrollPending_) {
      const target = insScrollPending_;
      insScrollPending_ = null;
      // A2: if the target section moved inside the collapsed Team-detail
      // (e.g. the "abandons" chip -> ins-queue-health), open it + render its
      // deferred charts so the spotlight lands on a visible element, not a
      // zero-height collapsed panel.
      const tEl = $(target);
      const det = $('ins-team-detail');
      if (tEl && det && det.contains(tEl)) {
        // D1: the chips promise a section Simple hides (e.g. "abandons" ->
        // Queue health inside Team detail) -- honor the promise by switching
        // to Detailed first, then opening the collapsed panel.
        if (insIsSimple_()) insSetDensity_('detailed');
        if (!det.open) {
          det.open = true;
          insRenderDeferredCharts_();
        }
      }
      setTimeout(function () { qsSpotlight_(target); }, 200);
    }
  }

  /**
   * Share-of-answered doughnut (ported from the Performance Report so
   * PR can retire without losing the view). Built client-side from
   * agentData (each card already carries answered.val for the range);
   * slices sorted largest-first, datalabels suppressed under 4% of
   * total (PR's threshold). Hidden when fewer than 2 agents answered.
   */
  function insRenderShareChart_(cards) {
    const wrap = $('ins-share-wrap');
    if (!wrap) return;
    const slices = (cards || [])
      .map(function (c) {
        return { label: c.name, value: Number((c.metrics && c.metrics.answered && c.metrics.answered.val) || 0) };
      })
      .filter(function (d) { return d.value > 0; })
      .sort(function (a, b) { return b.value - a.value; });
    if (insShareChartInstance) { try { insShareChartInstance.destroy(); } catch (e) {} insShareChartInstance = null; }
    if (slices.length < 2) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-share-chart');

    const colors = slices.map(function (_, i) { return IR_CHART_COLORS[i % IR_CHART_COLORS.length]; });
    const plugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];
    insShareChartInstance = safeChart_($('ins-share-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: slices.map(function (d) { return d.label; }),
        datasets: [{
          data: slices.map(function (d) { return d.value; }),
          backgroundColor: colors,
          borderColor: THEME.paperCard,
          borderWidth: 2,
        }],
      },
      plugins: plugins,
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                const pct = total > 0 ? (ctx.parsed / total) * 100 : 0;
                return ctx.label + ': ' + ctx.parsed + ' (' + pct.toFixed(1) + '%)';
              },
            },
          },
          datalabels: {
            display: function (ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              return total > 0 && (ctx.dataset.data[ctx.dataIndex] / total) >= 0.04;
            },
            color: THEME.paper,
            font: { family: "'IBM Plex Mono', monospace", size: 11, weight: '500' },
            textAlign: 'center',
            // #2: name the slice on the donut itself (truncated to fit), not
            // just in the right-side legend, so each slice is self-identifying.
            formatter: function (value, ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              const pct = total > 0 ? (value / total * 100).toFixed(1) : '0';
              const name = String((ctx.chart.data.labels || [])[ctx.dataIndex] || '');
              const shown = name.length > 13 ? name.slice(0, 12) + '…' : name;
              return shown + '\n' + value + ' (' + pct + '%)';
            },
          },
        },
      },
    });
  }

  /**
   * Queue health section (QCD-into-Insights consolidation). Renders
   * queue-level KPI tiles (with deltas vs the same prior window the
   * rest of the report compares against) + a per-queue table with the
   * 5%-threshold benchmark tint and expandable violation dates.
   * Hidden when the server sent null (unmapped dept / missing sheet,
   * or a pre-v4 cached payload).
   */
  // Phase 3: in-place per-queue DQE missed-ring drill from the Queue-health
  // per-queue expand. Toggles a labeled list of the no-ring abandoned calls the
  // Missed report attributes to this queue for the current Insights window
  // (getMissedCallsSlice queue filter). Guarded on the slot's data-open flag so
  // a stale response can't paint a closed slot.
  function insQhMissedSig_() {
    const meta = (insLastData && insLastData.meta) || {};
    return (meta.department || '') + '|' + (meta.from || '') + '|' + (meta.to || '');
  }

  function insQhMissedDrill_(btn) {
    const slotEl = btn.parentNode && btn.parentNode.querySelector('.ins-qh-missed-slot');
    if (!slotEl) return;
    if (slotEl.getAttribute('data-open') === '1') {           // toggle closed
      slotEl.innerHTML = ''; slotEl.removeAttribute('data-open');
      btn.classList.remove('is-open');
      return;
    }
    const meta = (insLastData && insLastData.meta) || {};
    if (!meta.department || !meta.from || !meta.to) return;
    const queue = btn.getAttribute('data-qh-queue') || '';
    initClipboardOnce();   // wire the delegated .pid-journey handler (idempotent)
    slotEl.setAttribute('data-open', '1');
    btn.classList.add('is-open');
    // Round 4: serve from the gate's prefetched whole-window slice when it
    // matches -- instant, and the CASE-INSENSITIVE queue match sidesteps
    // QCD-vs-DQE queue-name case drift (the "button doesn't work" report).
    const c = insQhNoRingCache_;
    if (c && c.sig === insQhMissedSig_()) {
      const ql = queue.toLowerCase();
      const entries = c.entries.filter(function (e) {
        return e.source === 'queue' && String(e.who || '').toLowerCase() === ql;
      });
      slotEl.innerHTML = missedSliceListHtml_({ meta: c.meta, entries: entries },
        'No-ring abandons · ' + queue);
      return;
    }
    slotEl.innerHTML = dsRingsHtml_('Loading missed detail…');
    google.script.run
      .withSuccessHandler(function (resp) {
        if (slotEl.getAttribute('data-open') !== '1') return;
        slotEl.innerHTML = missedSliceListHtml_(resp, 'No-ring abandons · ' + queue);
      })
      .withFailureHandler(function (err) {
        if (slotEl.getAttribute('data-open') !== '1') return;
        slotEl.innerHTML = '<div class="status status-error">'
          + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
      })
      .getMissedCallsSlice({ department: meta.department, from: meta.from, to: meta.to, queue: queue });
  }

  // Round 4: gate + count the per-queue no-ring drill buttons on REAL data.
  // ONE whole-window getMissedCallsSlice per (dept, window) resolves every
  // queue's no-ring abandon count: zero-count buttons stay hidden, the rest
  // reveal with "(N)" in the label, and the prefetched entries serve the
  // click instantly. Best-effort: a failed prefetch reveals the plain
  // buttons (old behavior) rather than losing the drill.
  let insQhNoRingCache_ = null;   // { sig, byQueue: {lcQueue: n}, entries, meta }
  function insQhNoRingGate_() {
    const tbody = $('ins-qh-tbody');
    if (!tbody || !tbody.querySelector('.ins-qh-missed')) return;
    const meta = (insLastData && insLastData.meta) || {};
    if (!meta.department || !meta.from || !meta.to) return;
    const sig = insQhMissedSig_();
    const apply = function () {
      const c = insQhNoRingCache_;
      if (!c || c.sig !== insQhMissedSig_()) return;   // stale response guard
      tbody.querySelectorAll('.ins-qh-missed').forEach(function (b) {
        const wrap = b.closest('.ins-qh-missed-drill');
        const n = c.byQueue[String(b.getAttribute('data-qh-queue') || '').toLowerCase()] || 0;
        if (wrap) wrap.style.display = n ? '' : 'none';
        if (n) b.innerHTML = '&#8627; no-ring abandons (' + n + ')';
      });
    };
    if (insQhNoRingCache_ && insQhNoRingCache_.sig === sig) { apply(); return; }
    google.script.run
      .withSuccessHandler(function (resp) {
        const byQueue = {};
        const entries = (resp && resp.entries) || [];
        entries.forEach(function (e) {
          if (e.source !== 'queue') return;
          const k = String(e.who || '').toLowerCase();
          byQueue[k] = (byQueue[k] || 0) + 1;
        });
        insQhNoRingCache_ = { sig: sig, byQueue: byQueue, entries: entries,
                             meta: (resp && resp.meta) || {} };
        apply();
      })
      .withFailureHandler(function () {
        tbody.querySelectorAll('.ins-qh-missed-drill').forEach(function (w) {
          w.style.display = '';
        });
      })
      .getMissedCallsSlice({ department: meta.department, from: meta.from, to: meta.to });
  }

  function insRenderQueueHealth_(qh) {
    const wrap = $('ins-queue-health');
    if (!wrap) return;
    // F8: a compute failure (qh.error) is shown as an explicit "unavailable"
    // note rather than hidden -- hiding would be indistinguishable from the
    // legitimate "no mapped queues" case and could mask a real data problem.
    if (qh && qh.error) {
      wrap.style.display = '';
      const tEl = $('ins-qh-tiles');
      if (tEl) tEl.innerHTML = '<div class="ds-note">Queue health is temporarily unavailable — '
        + 'the queue data could not be loaded. The rest of this report is unaffected.</div>';
      const tbEl = $('ins-qh-tbody'); if (tbEl) tbEl.innerHTML = '';
      const capEl = $('ins-qh-cap'); if (capEl) capEl.textContent = '';
      const fcEl = $('ins-qh-forecast'); if (fcEl) fcEl.style.display = 'none';
      const dEl = $('ins-qh-daily'); if (dEl) { dEl.style.display = 'none'; }
      return;
    }
    // insights v18 (QCD retirement): an UNMAPPED dept renders the explanatory
    // hint (+ admin Dept Config CTA) the retired QCD modal used to show --
    // this section is now where a manager learns their dept needs mapping.
    if (qh && qh.unmapped) {
      wrap.style.display = '';
      const uEl = $('ins-qh-tiles');
      if (uEl) {
        const isAdmin = (USER.role === 'admin');
        uEl.innerHTML = '<div class="ds-note">No queues are mapped for this department, so its '
          + 'queue data can’t be surfaced yet. '
          + (isAdmin
              ? 'Assign its A_Q_* queues in Dept Config — it auto-discovers queues seen in the data and flags the unmapped ones.'
              : 'Ask an admin to map its A_Q_* queues in Dept Config.')
          + '</div>'
          + (isAdmin
              ? '<div style="margin-top:8px;"><button class="btn btn-secondary" id="ins-qh-unmapped-cta" type="button">Open Dept Config</button></div>'
              : '');
        const cta = $('ins-qh-unmapped-cta');
        if (cta) cta.addEventListener('click', function () {
          const trigger = document.getElementById('dept-config-btn');
          if (trigger) trigger.click();
        });
      }
      const tb2 = $('ins-qh-tbody'); if (tb2) tb2.innerHTML = '';
      const cap2 = $('ins-qh-cap'); if (cap2) cap2.textContent = '';
      const fc2 = $('ins-qh-forecast'); if (fc2) fc2.style.display = 'none';
      const d2 = $('ins-qh-daily'); if (d2) d2.style.display = 'none';
      const sec2 = $('ins-qh-secondary'); if (sec2) sec2.innerHTML = '';
      return;
    }
    if (!qh || !qh.totals) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';

    const cap = $('ins-qh-cap');
    if (cap) cap.textContent = '(' + (qh.queues || []).length + ' queue'
      + ((qh.queues || []).length === 1 ? '' : 's') + ' · same window as the rollup above)';

    // Days-to-violation forecast on the daily series (shared helper --
    // same regression the QCD Report renders).
    const fc = $('ins-qh-forecast');
    if (fc) {
      const html = (qh.trend && qh.trend.dailyTotal)
        ? abandonForecastHtml_(qh.trend.dailyTotal) : '';
      fc.innerHTML = html;
      fc.style.display = html ? '' : 'none';
    }

    const t = qh.totals, p = qh.priorTotals;
    // I8: tint the Abandoned % + Violations tile VALUES (were plain black).
    // Abandoned % uses the 5% company standard (benchValueCls_ symmetric --
    // green under 5, warn at/over); Violations MTD is green at 0, warn once
    // any day this month crossed 5% (the per-queue rows carry the finer
    // light/strong gradient).
    const violMtd = Number(qh.violationsMtd) || 0;
    const violValCls = violMtd > 0 ? ' bm-over' : ' bm-target';
    const tiles = [
      inboundKpiTile_('Queue calls', fmtNumber(t.totalCalls), '',
        p ? inboundDelta_(t.totalCalls, p.totalCalls, 'neu', false) : ''),
      inboundKpiTile_('Abandoned %', t.abandonedPctStr, fmtNumber(t.abandoned) + ' abandoned',
        p ? inboundDelta_(t.abandonedPct, p.abandonedPct, 'neg', true) : '',
        benchValueCls_('abandoned %', t.abandonedPctStr, true)),
      inboundKpiTile_('Violations (MTD)', fmtNumber(qh.violationsMtd), 'days over the 5% threshold this month', '',
        violValCls),
    ];
    $('ins-qh-tiles').innerHTML = tiles.join('');

    // Secondary dept-total metrics (#1) -- Answered / Longest wait / Avg answer.
    // A muted line under the headline tiles rather than three more tiles, so
    // the tile row stays focused on the abandon story. Full QCD parity, minus
    // the clutter.
    const sec = $('ins-qh-secondary');
    if (sec) {
      sec.innerHTML = insQhStatStrip_(t.totalAnswered, t.longestWait, t.avgAnswer);
    }

    // The per-queue abandoned-% chart now lives in the consolidated trend
    // chart above (the "Abandoned % by Queue" tab); this section keeps the
    // tiles + the per-queue detail table.
    const tbody = $('ins-qh-tbody');
    if (tbody) {
      tbody.innerHTML = (qh.perQueue || []).map(function (q) {
        const pctCls = benchValueCls_('abandoned %', q.abandonedPctStr);
        const violCls = q.violations > 3 ? ' qcd-warn-strong' : (q.violations > 0 ? ' qcd-warn-light' : '');
        // Tag child sub-queue rows so the separation is visible (seq #5/#1).
        const subTag = q.subDept
          ? ' <span class="dept-qcd-subtag">sub-queue · ' + escapeHtml(q.subDept) + '</span>' : '';
        // 4c: annotate WHERE this queue's abandons come from -- the call
        // source with the most abandoned calls (from the 4a bySource breakdown).
        const tas = q.topAbandonSource;
        const srcLine = tas
          ? '<div class="ins-qh-topsrc" title="Call source contributing the most abandoned calls in this queue for the selected range">'
            + '&#8627; most abandons: <strong>' + escapeHtml(tas.source) + '</strong> ('
            + fmtNumber(tas.abandoned) + ')</div>'
          : '';
        // Consolidation Phase 1 (gap 2): expand a queue row into its FULL
        // per-call-source subtable (+ violation dates) -- the same detail the
        // QCD modal shows, via the shared qcdSourceSubtableHtml_ builder. The
        // violation dates moved off the inline violations-cell <details> into
        // this expand, mirroring the QCD modal exactly.
        const sources = q.bySource || [];
        const hasViolDates = q.violations > 0 && (q.violationDates || []).length;
        // Every queue row is expandable now: the expand always carries the
        // secondary metrics strip (#1: Answered / Longest wait / Avg answer),
        // plus the call-source subtable + violation dates when present.
        const hasDetail = true;
        const chevron = ' <span class="qcd-expand-icon">&#9654;</span>';
        let html = '<tr class="ins-qh-row qcd-expandable">'
          + '<td>' + escapeHtml(q.queue) + subTag + chevron + srcLine + '</td>'
          + '<td class="num">' + fmtNumber(q.totalCalls) + '</td>'
          + '<td class="num">' + fmtNumber(q.abandoned) + '</td>'
          + '<td class="num' + pctCls + '">' + escapeHtml(q.abandonedPctStr) + '</td>'
          + '<td class="num' + violCls + '">' + fmtNumber(q.violations) + '</td>'
          + '</tr>';
        let detail = insQhStatStrip_(q.totalAnswered, q.longestWait, q.avgAnswer)
          + qcdSourceSubtableHtml_(sources);
        if (hasViolDates) {
          // Drill: each date is a chip that jumps to (and flashes) that day's
          // row in the Daily breakdown table below (insJumpToDailyRow_).
          detail += '<div class="qcd-detail-viol"><strong>Violation dates:</strong> '
            + q.violationDates.map(function (iso) {
                return '<button type="button" class="ins-viol-date" data-date="'
                  + escapeHtml(String(iso)) + '" title="Show this day in the Daily breakdown">'
                  + fmtViolDate_(iso) + '</button>';
              }).join(' ') + '</div>';
        }
        // Phase 3 -> round 4: per-queue DQE missed-ring drill (in-place).
        // Rendered HIDDEN and revealed by insQhNoRingGate_ ONLY for queues
        // with at least one no-ring abandon in the window (the gate's one
        // whole-window slice fetch also stamps the count into the label and
        // serves the click instantly) -- an always-on button that mostly
        // answered "none recorded" read as broken (owner report).
        detail += '<div class="ins-qh-missed-drill" style="display:none;">'
          + '<button type="button" class="ins-qh-missed" data-qh-queue="' + escapeHtml(q.queue) + '"'
          + ' title="Show the no-ring abandoned calls the Missed report attributes to this queue (agent-ring lens, DQE)">'
          + '&#8627; no-ring abandons</button>'
          + '<div class="ins-qh-missed-slot"></div></div>';
        html += '<tr class="qcd-detail-row" style="display:none;"><td colspan="5">'
          + '<div class="qcd-detail-wrap">' + detail + '</div></td></tr>';
        return html;
      }).join('');
      // Delegated expand/collapse, wired ONCE per tbody (re-render replaces
      // rows but keeps the tbody element + this listener).
      if (!tbody._insQhExpandWired) {
        tbody.addEventListener('click', function (e) {
          // Violation-date chip -> jump to that day in the Daily breakdown.
          var chip = e.target.closest('.ins-viol-date');
          if (chip && tbody.contains(chip)) {
            e.preventDefault();
            insJumpToDailyRow_(chip.getAttribute('data-date') || '');
            return;
          }
          // Phase 3: per-queue DQE missed-ring drill (in-place toggle).
          var mbtn = e.target.closest('.ins-qh-missed');
          if (mbtn && tbody.contains(mbtn)) {
            e.preventDefault();
            insQhMissedDrill_(mbtn);
            return;
          }
          var row = e.target.closest('.qcd-expandable');
          if (!row || !tbody.contains(row)) return;
          var detail = row.nextElementSibling;
          if (!detail || !detail.classList.contains('qcd-detail-row')) return;
          var open = detail.style.display !== 'none';
          detail.style.display = open ? 'none' : '';
          var icon = row.querySelector('.qcd-expand-icon');
          if (icon) icon.textContent = open ? '▶' : '▼';
        });
        tbody._insQhExpandWired = true;
      }
      // Round 4: resolve which queues actually have no-ring abandons (one
      // whole-window slice fetch) and reveal/count their drill buttons.
      insQhNoRingGate_();
    }

    // Consolidation Phase 1 (gap 3): per-day numeric table (the same rows the
    // QCD modal's daily table shows, via the shared qcdDailyRowsHtml_), in a
    // collapsed <details> to keep the section compact. Hidden when the
    // dept/range has no daily QCD rows.
    const dailyTbody = $('ins-qh-daily-tbody');
    const dailyWrap = $('ins-qh-daily');
    if (dailyTbody) {
      const daily = qh.dailySeries || [];
      if (daily.length) {
        dailyTbody.innerHTML = qcdDailyRowsHtml_(daily, { bar: true });
        if (dailyWrap) dailyWrap.style.display = '';
      } else {
        dailyTbody.innerHTML = '';
        if (dailyWrap) dailyWrap.style.display = 'none';
      }
    }
  }

  // Violation-date drill: open the collapsed Daily breakdown, scroll the
  // day's row into view, and flash it. Silent no-op when the table is hidden
  // or the date isn't in the series (shouldn't happen -- violation dates come
  // from the same window the daily series covers).
  function insJumpToDailyRow_(iso) {
    if (!iso) return;
    const wrap = $('ins-qh-daily');
    const rowsBody = $('ins-qh-daily-tbody');
    if (!wrap || !rowsBody || wrap.style.display === 'none') return;
    const dayRow = rowsBody.querySelector('tr[data-date="' + iso + '"]');
    if (!dayRow) return;
    wrap.open = true;
    try { dayRow.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) { /* best-effort */ }
    dayRow.classList.remove('ins-daily-hit');
    void dayRow.offsetWidth;   // restart the flash animation on repeat clicks
    dayRow.classList.add('ins-daily-hit');
  }

  /**
   * Different-length warning banner (INV-35 semantics, CR pattern).
   * Only reachable with a custom prior window -- the auto-adjacent
   * and YoY windows are always the same length as the current range.
   */
  // Inline different-window-lengths flag for the Insights compare line: a warn
  // glyph + bold label, with the full explanation in a hover tooltip (.gloss ->
  // the styled ds-tooltip). Returns '' when the windows match. Replaces the old
  // standalone ds-note banner so the caveat sits next to "Comparing against...".
  function insLengthFlagHtml_(meta) {
    if (!meta || !meta.lengthMismatch) return '';
    const cur = meta.currentDays || 0, pri = meta.priorDays || 0;
    const tip = 'The selected range is ' + cur + ' days; the comparison window is ' + pri
      + ' days. Volume totals (Rung / Missed / Answered / TTT) aren’t directly comparable — '
      + 'compare the per-day figures on the agent cards instead.';
    return '<span class="ins-length-flag gloss" tabindex="0" title="' + escapeHtml(tip) + '">'
         + '<span class="ins-length-flag__icon" aria-hidden="true">&#9888;</span> Different window lengths</span>';
  }

  // F12: custom prior window overlaps the current range. The overlapping days
  // count toward the current period only, so the prior baseline omits them --
  // surface that as an inline warn glyph + tooltip (mirrors insLengthFlagHtml_)
  // so the comparison isn't silently distorted. Returns '' unless meta.priorOverlap.
  function insOverlapFlagHtml_(meta) {
    if (!meta || !meta.priorOverlap) return '';
    const tip = 'The comparison window overlaps the selected range. Days in both windows '
      + 'count toward the current period only, so the prior baseline excludes them — '
      + 'pick a non-overlapping prior range for a clean comparison.';
    return '<span class="ins-length-flag gloss" tabindex="0" title="' + escapeHtml(tip) + '">'
         + '<span class="ins-length-flag__icon" aria-hidden="true">&#9888;</span> Windows overlap</span>';
  }

  // The standalone #ins-length-warning banner is retired -- the caveat now
  // renders inline in the compare line (insLengthFlagHtml_). Keep this hidden
  // so any stale markup never shows.
  function insRenderLengthWarning_(meta) {
    const el = $('ins-length-warning');
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
  }

  /**
   * Consolidated Insights trend chart (seq #1). One tracked Chart.js
   * instance on `ins-trend-chart`, driven by the sub-tab strip
   * (insActiveTrendMetric: answered / pct / att / queues) and a
   * Monthly/Daily toggle (insTrendView). The "Abandoned % by Queue" tab
   * renders the per-queue abandoned-% lines + own-only dept total + 5%
   * line from data.queueHealth.trend (replacing the old standalone
   * ins-qh-chart). Colors route through THEME / IR_* per INV-42;
   * datalabels off (boolean form, INV-41).
   */
  // -- Trend-point drill --------------------------------------------------
  // Click a point on the consolidated trend chart -> re-run Insights scoped
  // to that bucket (a month on the Monthly view, a single day on Daily).
  // Keeps the agent selection + compare mode; the run goes through the
  // normal runInsReport path (SWR + D1b + stale-guard).
  const INS_MONTHS_ = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5,
                        Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };

  // Resolve an axis label to an {from, to} ISO range, or null when the label
  // doesn't parse. Monthly axes (team + queue) are 'MMM, yy'
  // (Utilities.formatDate); daily axes are 'YYYY-MM-DD' (queue) or 'MM-DD'
  // (team -- year re-derived from the selected window, which is the series'
  // exact span).
  function insTrendLabelToRange_(labelStr, daily) {
    const s = String(labelStr == null ? '' : labelStr).trim();
    if (!daily) {
      const m = /^([A-Z][a-z]{2}),?\s*['’]?(\d{2})$/.exec(s);
      if (!m || INS_MONTHS_[m[1]] == null) return null;
      const first = new Date(2000 + Number(m[2]), INS_MONTHS_[m[1]], 1);
      const last  = new Date(2000 + Number(m[2]), INS_MONTHS_[m[1]] + 1, 0);
      return { from: insIsoOf_(first), to: insIsoOf_(last) };
    }
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return { from: s, to: s };
    const md = /^(\d{2})-(\d{2})$/.exec(s);
    if (!md) return null;
    const meta = (insLastData && insLastData.meta) || {};
    const from = meta.from || '', to = meta.to || '';
    const y0 = Number(from.slice(0, 4)) || Number(to.slice(0, 4));
    const y1 = Number(to.slice(0, 4)) || y0;
    for (let y = y0; y && y <= y1; y++) {
      const iso = y + '-' + md[1] + '-' + md[2];
      if ((!from || iso >= from) && (!to || iso <= to)) return { from: iso, to: iso };
    }
    return null;
  }

  function insTrendPointDrill_(evt, chartObj, daily) {
    if (!chartObj || typeof chartObj.getElementsAtEventForMode !== 'function') return;
    // Require an actual point hit (the Overview chart's convention) so a
    // stray click on empty canvas never re-runs the report.
    const hits = chartObj.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
    if (!hits || !hits.length) return;
    const ds = chartObj.data.datasets[hits[0].datasetIndex];
    if (ds && ds.label === '5% threshold') return;   // reference line, not data
    const range = insTrendLabelToRange_((chartObj.data.labels || [])[hits[0].index], daily);
    insDrillToRange_(range);
  }

  // Shared drill tail (trend-point click + the #10 calendar day click):
  // sync the form dates (agents + compare mode kept) and re-run.
  function insDrillToRange_(range) {
    if (!range) return;
    const meta = (insLastData && insLastData.meta) || {};
    if (range.from === meta.from && range.to === meta.to) return;   // already this window
    if ($('ins-from')) $('ins-from').value = range.from;
    if ($('ins-to'))   $('ins-to').value   = range.to;
    if ($('ins-preset')) $('ins-preset').value = 'custom';
    insScheduleActiveRefetch_();
    insSavePrefs_();
    insSetResultsStatus_('loading', 'Loading '
      + range.from + (range.to !== range.from ? ' – ' + range.to : '') + '…');
    runInsReport();
  }

  // Phase 2 #10: the calendar renderer applies to the TEAM volume/rate tabs
  // over a window long enough to read as a calendar. The <=366-day cap keeps
  // the 'MM-DD' daily labels unambiguous (the same constraint the daily
  // point-drill's year re-derivation relies on).
  var INS_CALENDAR_MIN_DAYS_ = 14;
  var INS_CALENDAR_MAX_DAYS_ = 366;
  // R7 (I-1): the Abd % (queues) tab is calendar-eligible too, backed by the
  // dept-total daily abandoned-% series (queueHealth.dailySeries). ATT stays
  // line-only.
  function insCalendarEligible_(data) {
    const meta = (data && data.meta) || {};
    const span = isoRangeDays_(meta.from, meta.to);
    if (span == null || span < INS_CALENDAR_MIN_DAYS_ || span > INS_CALENDAR_MAX_DAYS_) return false;
    if (insActiveTrendMetric === 'queues') {
      return (((data && data.queueHealth && data.queueHealth.dailySeries) || []).length > 1);
    }
    if (insActiveTrendMetric !== 'answered' && insActiveTrendMetric !== 'pct') return false;
    return (((data && data.trendDaily && data.trendDaily.labels) || []).length > 1);
  }

  // R7 (I-1): why the Calendar option is unavailable right now -- shown as the
  // disabled toggle's hover title so the feature stays discoverable instead of
  // vanishing on ineligible tabs/windows.
  function insCalendarIneligibleReason_(data) {
    if (insActiveTrendMetric === 'att') {
      return 'Calendar view is available on the Answered / % Answered / Abd % tabs.';
    }
    const meta = (data && data.meta) || {};
    const span = isoRangeDays_(meta.from, meta.to);
    if (span != null && span < INS_CALENDAR_MIN_DAYS_) {
      return 'Calendar view needs a report window of at least ' + INS_CALENDAR_MIN_DAYS_ + ' days.';
    }
    if (span != null && span > INS_CALENDAR_MAX_DAYS_) {
      return 'Calendar view supports report windows up to ' + INS_CALENDAR_MAX_DAYS_ + ' days.';
    }
    return 'Calendar view is unavailable here — this tab has no daily series for the window.';
  }

  function insRenderTrendChart_(data) {
    const canvas = $('ins-trend-chart');
    if (!canvas) return;
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-trend-chart');
    if (insChartInstance) { try { insChartInstance.destroy(); } catch (e) {} insChartInstance = null; }

    const metric = insActiveTrendMetric;
    const isQueues = (metric === 'queues');
    const qhTrend = (data.queueHealth && data.queueHealth.trend) || null;

    // Phase 2 #10: Line/Calendar renderer switch. The toggle shows only when
    // the calendar is applicable; picking Calendar swaps the canvas for the
    // day-grid (same trendDaily series, second renderer -- no new data) and
    // returns early. The insTrendRender pref survives ineligible tabs/windows
    // (they just render the line).
    const calendarOk = insCalendarEligible_(data);
    const renderToggle = $('ins-trend-render-toggle');
    if (renderToggle) {
      // R7 (I-1): keep the toggle VISIBLE but disabled when ineligible (it
      // used to vanish entirely, which read as "the calendar view is gone").
      renderToggle.style.display = '';
      renderToggle.classList.toggle('is-disabled', !calendarOk);
      renderToggle.title = calendarOk ? '' : insCalendarIneligibleReason_(data);
      renderToggle.querySelectorAll('.seg-btn').forEach(function (b) {
        const on = (b.getAttribute('data-render') || 'line')
          === (calendarOk ? insTrendRender : 'line');
        b.classList.toggle('active', on);
        b.setAttribute('aria-checked', on ? 'true' : 'false');
        b.disabled = !calendarOk && (b.getAttribute('data-render') === 'calendar');
      });
    }
    const useCalendar = calendarOk && insTrendRender === 'calendar';
    const calHost = $('ins-trend-calendar');
    const canvasWrap = $('ins-trend-canvas-wrap');
    if (calHost) calHost.style.display = useCalendar ? '' : 'none';
    if (canvasWrap) canvasWrap.style.display = useCalendar ? 'none' : '';
    // R7 (I-1): the chart wrap is fixed-height (420px) for the canvas; let it
    // grow in calendar mode -- the old all-weeks calendar CLIPPED past the
    // first month inside it (the "only shows the first month" symptom).
    if (calHost) {
      const cw = calHost.closest('.ir-chart-wrap');
      if (cw) cw.classList.toggle('ir-chart-wrap--cal', useCalendar);
    }
    const dlBox = $('ins-datalabels-box');
    if (dlBox) dlBox.style.display = useCalendar ? 'none' : '';
    if (useCalendar) {
      const vt0 = $('ins-trend-view-toggle');
      if (vt0) vt0.style.display = 'none';   // calendar is inherently daily
      const qmw0 = $('ins-queue-metric-wrap');
      if (qmw0) qmw0.style.display = 'none';
      const head0 = $('ins-trend-header');
      const tm0 = data.meta || {};
      if (head0) head0.textContent = 'Daily calendar'
        + (tm0.from && tm0.to ? ' · ' + isoDateShort_(tm0.from) + '–' + isoDateShort_(tm0.to) + ' (selected window)' : '');
      insRenderTrendCalendar_(data);
      return;
    }

    // Daily availability + Monthly/Daily toggle visibility. Queues view
    // uses the QCD daily series; the team metrics use trendDaily.
    const hasDaily = isQueues
      ? !!(qhTrend && (qhTrend.dailyLabels || []).length > 1)
      : !!(data.trendDaily && (data.trendDaily.labels || []).length > 1);
    const toggle = $('ins-trend-view-toggle');
    if (toggle) toggle.style.display = hasDaily ? '' : 'none';
    if (!hasDaily && insTrendView === 'daily') insTrendView = 'monthly';
    const daily = (insTrendView === 'daily') && hasDaily;

    // gap 1: the per-queue metric sub-selector is only meaningful on the
    // By Queue tab -- show it there, hide it on the team-metric tabs.
    const queueMetricWrap = $('ins-queue-metric-wrap');
    if (queueMetricWrap) queueMetricWrap.style.display = isQueues ? '' : 'none';
    const qMetricLabel = { abandonedPct: 'abandoned % by queue',
      totalCalls: 'total calls by queue', violations: 'violations by queue' };

    // #4 + gap 1, MERGED (C-1): ONE header writer. These were two consecutive
    // writers to the same element -- the second unconditionally clobbered the
    // #4 explicit range label, so it never rendered. The trend spans a
    // DIFFERENT window than the report header (12 months in Monthly, the
    // selected window in Daily), so label its range explicitly, plus the
    // by-queue metric suffix when the By Queue tab is active.
    const headerEl = $('ins-trend-header');
    if (headerEl) {
      const tm = data.meta || {};
      headerEl.textContent = (daily
          ? ('Daily team trend' + (tm.from && tm.to ? ' · ' + isoDateShort_(tm.from) + '–' + isoDateShort_(tm.to) + ' (selected window)' : ''))
          : ('12-month team trend' + (tm.to ? ' · through ' + isoDateShort_(tm.to) : '')))
        + (isQueues ? ' — ' + (qMetricLabel[insQueueMetric] || 'by queue') : '');
    }

    const fmtMin = function (val) {
      const n = parseFloat(val); if (isNaN(n)) return '';
      const m = Math.floor(n);
      const s = Math.round((n - m) * 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    };
    const insShowLabels = !!($('ins-show-datalabels') && $('ins-show-datalabels').checked);

    let chartConfig;
    let spotlightOpts = null;   // set on the multi-queue By-Queue view

    if (isQueues) {
      // By Queue (gap 1): one line per queue + own-only dept total, for the
      // metric the sub-selector picks (insQueueMetric). Abandoned % is the
      // default and adds the 5% threshold line + % formatting (the QCD
      // violation rule); Total Calls / Violations are integer counts with no
      // threshold line. Hidden gracefully if there's no queue trend (unmapped
      // dept / QCD unavailable).
      if (!qhTrend || !(qhTrend.labels || []).length) {
        canvas.style.display = 'none';
        return;
      }
      canvas.style.display = '';
      const qMetric = insQueueMetric || 'abandonedPct';
      const isPct = (qMetric === 'abandonedPct');
      // Abandoned % reads the default/legacy series; the other metrics read
      // trend.metrics[qMetric] (server-side, gap 1).
      const mSrc = isPct ? qhTrend : ((qhTrend.metrics && qhTrend.metrics[qMetric]) || {});
      const labels   = daily ? qhTrend.dailyLabels : qhTrend.labels;
      const totalSer = daily ? (mSrc.dailyTotal || []) : (mSrc.total || []);
      const perQueue = daily ? (mSrc.dailyPerQueue || {}) : (mSrc.perQueue || {});
      const fmtVal = function (v) { return isPct ? (Number(v).toFixed(1) + '%') : fmtNumber(v); };
      const qNames = Object.keys(perQueue);
      // Round 4 (owner): this tab read visually different from the team tabs
      // (thin flat multi-lines vs their filled single curve). A SINGLE-queue
      // dept -- the common case -- now renders in the same filled
      // single-series style as the team tabs; multi-queue keeps the
      // comparative multi-line look (fills would occlude, the Overview-chart
      // convention) but with the same line weight/curve as the rest.
      const singleQ = qNames.length === 1;
      const datasets = qNames.map(function (q, i) {
        const c = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
        return singleQ
          ? { label: q, data: perQueue[q], borderColor: c,
              backgroundColor: function (ctx) { return irGradientFill_(ctx.chart, c); },
              borderWidth: 2.2, tension: 0.4, fill: true,
              pointBackgroundColor: c, pointBorderColor: THEME.paperCard,
              pointBorderWidth: 1.5, pointRadius: 3, pointHoverRadius: 5 }
          : { label: q, data: perQueue[q], borderColor: c, backgroundColor: c,
              borderWidth: 2.2, pointRadius: 2.5, tension: 0.4, fill: false };
      });
      if (qNames.length > 1 && totalSer.length) {
        datasets.push({ label: 'Dept total', data: totalSer,
          borderColor: THEME.ink, backgroundColor: THEME.ink,
          borderDash: [5, 4], borderWidth: 1.4, pointRadius: 0, tension: 0.25, fill: false });
      }
      if (qNames.length > 1) {
        spotlightOpts = isPct ? { skipLabel: '5% threshold' } : {};
      }
      if (isPct) {
        // Violation-day markers (ported from the retired QCD chart, #6):
        // points at/over 5% render warn-colored + enlarged on every %
        // series so "which days/months breached" reads at a glance.
        const warnC = THEME.warn || '#c66b4b';
        datasets.forEach(function (ds) {
          const base = ds.borderColor;
          const baseR = ds.pointRadius || 1.5;
          ds.pointBackgroundColor = ds.data.map(function (v) { return Number(v) >= 5 ? warnC : base; });
          ds.pointBorderColor     = ds.pointBackgroundColor;
          ds.pointRadius          = ds.data.map(function (v) { return Number(v) >= 5 ? 4.5 : baseR; });
        });
        datasets.push({ label: '5% threshold', data: labels.map(function () { return 5; }),
          borderColor: THEME.muted, borderDash: [3, 4], borderWidth: 1,
          pointRadius: 0, fill: false, order: 99 });
      }
      chartConfig = {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          onClick: function (evt, items, chartObj) { insTrendPointDrill_(evt, chartObj, daily); },
          plugins: {
            datalabels: {
              display: insShowLabels,
              align: 'top', anchor: 'center',
              backgroundColor: THEME.paperCard,
              color: function (c) { return c.dataset.borderColor; },
              borderColor: function (c) { return c.dataset.borderColor; },
              borderWidth: 1, borderRadius: 2,
              font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
              formatter: function (value, c) {
                if (c.dataset.label === '5% threshold' || value == null) return '';
                return fmtVal(value);
              },
            },
            // Multi-queue legend gets the shared spotlight (hover-dim +
            // click-to-pin, ported from the retired QCD chart) so one queue's
            // line can be isolated; the 5% threshold stays out of the dimming.
            // Round 4: a single-queue view hides the one-item legend (the
            // team tabs are legendless too); multi-queue keeps the
            // spotlight legend.
            legend: Object.assign({ display: qNames.length > 1, position: 'bottom',
              labels: { boxWidth: 18,
              filter: function (item) { return item.text !== '5% threshold'; } } },
              (qNames.length > 1 ? chartSpotlightLegend_() : {})),
            tooltip: {
              filter: function (ctx) { return ctx.dataset.label !== '5% threshold'; },
              callbacks: {
                label: function (ctx) {
                  return ctx.dataset.label + ': ' + (ctx.parsed.y == null ? '-' : fmtVal(ctx.parsed.y));
                },
                footer: function () {
                  return 'Click the point to reload for this ' + (daily ? 'day' : 'month');
                },
              },
            },
          },
          scales: {
            x: { ticks: { maxRotation: 0, autoSkip: true } },
            y: { beginAtZero: true, ticks: { callback: function (v) { return isPct ? (v + '%') : fmtNumber(v); } } },
          },
        },
      };
    } else {
      // Team metrics: answered / % answered / avg talk time.
      const src = daily ? data.trendDaily : data.trendData;
      const labels = (src && src.labels) || [];
      const series = (src && src.series) || [];
      let dataPoints, color, label, isPercent, isMinutes;
      if (metric === 'pct') {
        dataPoints = series.map(function (s) { return Number((s.pct || 0).toFixed(1)); });
        color = THEME.accent || '#4E79A7'; label = '% Answered'; isPercent = true;
      } else if (metric === 'att') {
        dataPoints = series.map(function (s) { return Number(((s.att || 0) / 60).toFixed(2)); });
        color = THEME.muted || '#9C755F'; label = 'Avg Talk Time'; isMinutes = true;
      } else {
        dataPoints = series.map(function (s) { return s.answered; });
        color = IR_VOLUME_COLORS.answered; label = 'Answered';
      }
      canvas.style.display = '';
      chartConfig = {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: label, data: dataPoints, borderColor: color,
            backgroundColor: function (ctx) { return irGradientFill_(ctx.chart, color); },
            tension: 0.4, fill: true,
            pointBackgroundColor: color, pointBorderColor: THEME.paperCard,
            pointBorderWidth: 1.5, pointRadius: 3, pointHoverRadius: 5,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: function (evt, items, chartObj) { insTrendPointDrill_(evt, chartObj, daily); },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              label: function (ctx) {
                if (isPercent) return label + ': ' + ctx.parsed.y + '%';
                if (isMinutes) return label + ': ' + fmtMin(ctx.parsed.y);
                return label + ': ' + ctx.parsed.y;
              },
              footer: function () {
                return 'Click the point to reload for this ' + (daily ? 'day' : 'month');
              },
            } },
            datalabels: {
              display: insShowLabels,
              align: 'top', anchor: 'center',
              backgroundColor: THEME.paperCard,
              color: color, borderColor: color,
              borderWidth: 1, borderRadius: 2,
              font: { family: "'IBM Plex Mono', monospace", size: 10, weight: '500' },
              formatter: function (value) {
                if (value == null) return '';
                if (isPercent) return Number(value).toFixed(1) + '%';
                if (isMinutes) return fmtMin(value);
                return value;
              },
            },
          },
          scales: {
            y: {
              beginAtZero: true,
              suggestedMax: isPercent ? 100 : undefined,
              ticks: { callback: function (val) {
                if (isPercent) return val + '%';
                if (isMinutes) return fmtMin(val);
                return val;
              } },
            },
          },
        },
      };
    }

    insChartInstance = safeChart_(canvas.getContext('2d'), chartConfig);
    if (spotlightOpts && insChartInstance) {
      chartSpotlightStash_(insChartInstance, spotlightOpts);
    }
  }

  /**
   * Phase 2 #10: calendar-day grid renderer over the SAME trendDaily series
   * the Daily line view plots -- "which DAYS were good/bad" (the abandon
   * heatmap answers "when in the day"; both are labeled so they read as
   * complementary). Weekday columns only (Mon-Fri -- the work-window
   * convention; weekends carry no DQE data). Cell color pivots on the
   * existing benchmarks: Answer % on the 92% target (sage at/above, warm
   * ramp below), Missed as a warn intensity ramp. The number stays IN the
   * cell so color is never the only cue; a weekday with no data (holiday /
   * no rows) renders muted. Click a day -> reload the report for it (the
   * trend-point-drill convention, via insDrillToRange_).
   */
  // R7 (I-1): the months ('YYYY-MM') a from..to window intersects, oldest first.
  function insCalMonthsInWindow_(fromIso, toIso) {
    const out = [];
    const fp = String(fromIso || '').split('-');
    const tp = String(toIso || '').split('-');
    if (fp.length !== 3 || tp.length !== 3) return out;
    let y = +fp[0], m = +fp[1];
    const endY = +tp[0], endM = +tp[1];
    let guard = 0;
    while ((y < endY || (y === endY && m <= endM)) && guard++ < 24) {
      out.push(y + '-' + (m < 10 ? '0' + m : String(m)));
      m++; if (m > 12) { m = 1; y++; }
    }
    return out;
  }

  function insCalMonthLabel_(ym) {
    const p = String(ym || '').split('-');
    if (p.length !== 2) return ym || '';
    return new Date(+p[0], +p[1] - 1, 1, 12)
      .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function insRenderTrendCalendar_(data) {
    const host = $('ins-trend-calendar');
    if (!host) return;
    const meta = (data && data.meta) || {};
