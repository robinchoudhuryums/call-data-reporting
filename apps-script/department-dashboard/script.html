  // -- Outlier Fix modal (admin-only) ---------------------------------
  // The only admin UI that triggers WRITES from the dashboard. The
  // server-side OrphanFix.gs enforces the security model (assertAdmin
  // + input validation + LockService + audit log); this client is
  // just the form layer.
  //
  // Naming note: the feature is labeled "Outlier Fix" in user-
  // facing copy (button, modal title, empty states). The file name
  // (OrphanFix.gs), sheet names (Agent Alias Overrides, Orphan
  // Fix Log), audit-log action values (alias-add, rename, rename+
  // alias), and JS internals (initOrphanFix, ofRenderOrphans_, etc.)
  // all keep the original "Orphan" naming so existing sheet data
  // doesn't have to migrate. Search either term to find the
  // feature.

  let ofLastInit = null;

  function initOrphanFix() {
    const btn   = $('orphan-fix-btn');
    const modal = $('orphan-fix-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      ofLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);
  }

  function ofLoadInit_() {
    $('of-loading').style.display = '';
    $('of-body').style.display = 'none';
    ofSetStatus_(null);
    google.script.run
      .withSuccessHandler(function (data) {
        $('of-loading').style.display = 'none';
        $('of-body').style.display = '';
        ofLastInit = data || { orphans: [], rosterNames: [], aliases: [], log: [] };
        ofRender_(ofLastInit);
      })
      .withFailureHandler(function (err) {
        $('of-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getOrphanFixInit();
  }

  function ofRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('of-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    ofRenderOrphans_(data.orphans || [], data.rosterNames || []);
    ofRenderAliases_(data.aliases || []);
    ofRenderLog_(data.log || []);
  }

  function ofRenderOrphans_(orphans, rosterNames) {
    const tbody = $('of-orphans-tbody');
    if (!tbody) return;
    if (!orphans.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No outliers in the last 180 days. Every agent name in DQE '
        + 'Historical Data maps to a roster entry. &#x1F389;'
        + '</td></tr>';
      return;
    }
    // Build the roster-name <option> list once; reused per row.
    const optionsHtml = '<option value="">(pick canonical name)</option>'
      + rosterNames.map(function (n) {
          return '<option value="' + escapeHtml(n) + '">' + escapeHtml(n) + '</option>';
        }).join('');

    // Dept options for the "new hire" add-to-roster flow.
    const deptOptionsHtml = '<option value="">(pick department)</option>'
      + ((ofLastInit && ofLastInit.departments) || []).map(function (d) {
          return '<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + '</option>';
        }).join('');

    tbody.innerHTML = orphans.map(function (o, idx) {
      const exts = (o.sampleExts || []).map(escapeHtml).join(', ') || '<span class="al-empty-inline">-</span>';
      // Two rows per orphan: the main row, plus a hidden inline form for
      // the "this is actually a NEW EMPLOYEE" flow -- adds them to a
      // dept's DO NOT EDIT! column instead of renaming to someone else.
      return '<tr data-orphan-idx="' + idx + '">'
           +   '<td>' + escapeHtml(o.name) + '</td>'
           +   '<td class="num">' + o.rows + '</td>'
           +   '<td>' + escapeHtml(o.lastSeen || '') + '</td>'
           +   '<td>' + exts + '</td>'
           +   '<td><select class="of-row-select" data-idx="' + idx + '">'
           +     optionsHtml
           +     '</select></td>'
           +   '<td class="of-action-cell">'
           +     '<button type="button" class="btn btn-secondary of-row-apply" '
           +       'data-idx="' + idx + '" disabled>Apply</button> '
           +     '<button type="button" class="btn btn-secondary of-row-addnew" data-idx="' + idx + '" '
           +       'title="This isn’t a misspelling of an existing agent — it’s a new employee. Add them to a department’s roster.">New hire…</button>'
           +   '</td>'
           + '</tr>'
           + '<tr class="of-add-row" data-add-idx="' + idx + '" style="display:none;">'
           +   '<td colspan="6">'
           +     '<div class="of-add-form">'
           +       '<span class="of-add-label">Add <strong>' + escapeHtml(o.name) + '</strong> to roster:</span>'
           +       '<select class="of-add-dept" data-idx="' + idx + '">' + deptOptionsHtml + '</select>'
           +       '<input type="text" class="of-add-exts" data-idx="' + idx + '" '
           +         'placeholder="extensions (comma-separated)" '
           +         'value="' + (o.sampleExts || []).map(escapeHtml).join(', ') + '">'
           +       '<button type="button" class="btn of-add-confirm" data-idx="' + idx + '" disabled>Add to roster</button>'
           +       '<span class="of-add-hint">Writes one &ldquo;Name, ext1, ext2&rdquo; cell to the bottom of that dept’s DO NOT EDIT! column. Extensions are required. Audited to Orphan Fix Log.</span>'
           +     '</div>'
           +   '</td>'
           + '</tr>';
    }).join('');

    // Wire selects to enable Apply when a non-empty value is chosen,
    // and Apply buttons to fire the rename.
    tbody.querySelectorAll('.of-row-select').forEach(function (sel) {
      sel.addEventListener('change', function () {
        const idx = sel.getAttribute('data-idx');
        const applyBtn = tbody.querySelector('.of-row-apply[data-idx="' + idx + '"]');
        if (applyBtn) applyBtn.disabled = !sel.value;
      });
    });
    tbody.querySelectorAll('.of-row-apply').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const orphan = (ofLastInit.orphans || [])[idx];
        const sel = tbody.querySelector('.of-row-select[data-idx="' + idx + '"]');
        const canonical = sel ? sel.value : '';
        if (!orphan || !canonical) return;
        ofConfirmAndApply_(btn, orphan, canonical);
      });
    });

    // "New hire…" toggles the inline add-to-roster form; the confirm
    // button enables once a dept is picked AND the ext field is non-empty.
    tbody.querySelectorAll('.of-row-addnew').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = btn.getAttribute('data-idx');
        const row = tbody.querySelector('.of-add-row[data-add-idx="' + idx + '"]');
        if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
      });
    });
    const refreshAddConfirm = function (idx) {
      const dept = tbody.querySelector('.of-add-dept[data-idx="' + idx + '"]');
      const exts = tbody.querySelector('.of-add-exts[data-idx="' + idx + '"]');
      const confirm = tbody.querySelector('.of-add-confirm[data-idx="' + idx + '"]');
      if (confirm) confirm.disabled = !(dept && dept.value && exts && exts.value.trim());
    };
    tbody.querySelectorAll('.of-add-dept').forEach(function (sel) {
      sel.addEventListener('change', function () { refreshAddConfirm(sel.getAttribute('data-idx')); });
    });
    tbody.querySelectorAll('.of-add-exts').forEach(function (inp) {
      inp.addEventListener('input', function () { refreshAddConfirm(inp.getAttribute('data-idx')); });
      // Sample exts may have prefilled the field -- refresh once now.
      refreshAddConfirm(inp.getAttribute('data-idx'));
    });
    tbody.querySelectorAll('.of-add-confirm').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const orphan = (ofLastInit.orphans || [])[idx];
        const dept = tbody.querySelector('.of-add-dept[data-idx="' + idx + '"]');
        const exts = tbody.querySelector('.of-add-exts[data-idx="' + idx + '"]');
        if (!orphan || !dept || !dept.value || !exts || !exts.value.trim()) return;
        ofConfirmAndAddToRoster_(btn, orphan, dept.value, exts.value);
      });
    });
  }

  function ofConfirmAndAddToRoster_(btn, orphan, dept, exts) {
    const msg = 'Add "' + orphan.name + '" to the ' + dept + ' roster with extension(s) '
              + exts + '?\n\nThis writes one cell to the DO NOT EDIT! sheet. Their '
              + orphan.rows + ' existing data row' + (orphan.rows === 1 ? '' : 's')
              + ' will match immediately (the orphan name becomes the roster name), and '
              + 'future imports canonicalize against it. The action is audited to Orphan Fix Log.';
    if (!window.confirm(msg)) return;

    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Adding…';
    ofSetStatus_('loading', 'Adding ' + orphan.name + ' to the ' + dept + ' roster…');

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false; btn.textContent = prev;
        ofSetStatus_('success',
          'Added "' + orphan.name + '" to ' + dept
          + (res && res.cell ? ' (cell ' + res.cell + ')' : '')
          + '. Overview updates immediately; other views may take up to 30 minutes (cache TTL).');
        showToast('Added to ' + dept + ' roster', 'success');
        ofLoadInit_();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        ofSetStatus_('error', 'Add failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .addOrphanToRoster({
        name:       orphan.name,
        department: dept,
        extensions: exts,
        notes:      '',
      });
  }

  function ofConfirmAndApply_(btn, orphan, canonical) {
    const msg = 'Rename "' + orphan.name + '" to "' + canonical + '" in '
              + orphan.rows + ' historical row' + (orphan.rows === 1 ? '' : 's')
              + '?\n\nThis modifies past data in DQE Historical Data. An '
              + 'alias will also be added to Agent Alias Overrides so the '
              + 'next daily build keeps the mapping. The action is audited '
              + 'to Orphan Fix Log.';
    if (!window.confirm(msg)) return;

    btn.disabled = true;
    const prev = btn.textContent; btn.textContent = 'Applying…';
    ofSetStatus_('loading', 'Applying rename: ' + orphan.name + ' -> ' + canonical + '…');

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false; btn.textContent = prev;
        const n = (res && res.renamed) || 0;
        ofSetStatus_('success',
          'Renamed ' + n + ' row' + (n === 1 ? '' : 's')
          + '. Alias added so future imports map correctly. '
          + 'Overview updates immediately; other dashboard views may take up to 30 minutes (cache TTL) to reflect the change.');
        showToast('Renamed ' + n + ' row' + (n === 1 ? '' : 's'), 'success');
        ofLoadInit_();
      })
      .withFailureHandler(function (err) {
        btn.disabled = false; btn.textContent = prev;
        ofSetStatus_('error', 'Rename failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .applyOrphanRename({
        fromName:     orphan.name,
        toName:       canonical,
        alsoAddAlias: true,
        notes:        '',
      });
  }

  function ofRenderAliases_(aliases) {
    const tbody = $('of-aliases-tbody');
    if (!tbody) return;
    if (!aliases.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="al-empty">'
        + 'No aliases yet. Aliases get added automatically when you Apply '
        + 'a rename above.'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = aliases.map(function (a) {
      const activeCls = a.active ? 'al-active-yes' : 'al-active-no';
      const activeLbl = a.active ? 'Yes' : 'No';
      const removeBtn = a.active
        ? '<button type="button" class="link-btn of-alias-remove" '
          + 'data-old="' + escapeHtml(a.oldName) + '" title="Deactivate this alias">Deactivate</button>'
        : '';
      return '<tr>'
           +   '<td>' + escapeHtml(a.oldName) + '</td>'
           +   '<td>' + escapeHtml(a.canonicalName) + '</td>'
           +   '<td><span class="al-active ' + activeCls + '">' + activeLbl + '</span></td>'
           +   '<td>' + escapeHtml(a.addedBy || '') + '</td>'
           +   '<td>' + escapeHtml(a.addedAt || '') + '</td>'
           +   '<td>' + removeBtn + '</td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.of-alias-remove').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const oldName = btn.getAttribute('data-old');
        if (!window.confirm('Deactivate alias for "' + oldName + '"? The pipeline will stop mapping this raw name on the next build. Historical rows that were already renamed stay renamed.')) return;
        btn.disabled = true;
        ofSetStatus_('loading', 'Deactivating alias…');
        google.script.run
          .withSuccessHandler(function (res) {
            const n = (res && res.removed) || 0;
            ofSetStatus_('success', 'Deactivated ' + n + ' alias row'
              + (n === 1 ? '' : 's') + '.');
            ofLoadInit_();
          })
          .withFailureHandler(function (err) {
            btn.disabled = false;
            ofSetStatus_('error', 'Deactivate failed: '
              + (err && err.message ? err.message : String(err)));
          })
          .removeAgentAlias({ oldName: oldName });
      });
    });
  }

  function ofRenderLog_(log) {
    const tbody = $('of-log-tbody');
    if (!tbody) return;
    if (!log.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No outlier-fix actions logged yet.</td></tr>';
      return;
    }
    tbody.innerHTML = log.map(function (e) {
      return '<tr>'
           +   '<td>' + escapeHtml(e.timestamp || '') + '</td>'
           +   '<td>' + escapeHtml(e.admin || '')     + '</td>'
           +   '<td>' + escapeHtml(e.action || '')    + '</td>'
           +   '<td>' + escapeHtml(e.fromName || '')  + '</td>'
           +   '<td>' + escapeHtml(e.toName || '')    + '</td>'
           +   '<td class="num">' + (e.affectedRows == null ? '-' : escapeHtml(String(e.affectedRows))) + '</td>'
           +   '<td>' + escapeHtml(e.notes || '')     + '</td>'
           + '</tr>';
    }).join('');
  }

  function ofSetStatus_(kind, msg) {
    const el = $('of-run-status');
    if (!el) return;
    if (!kind) { el.style.display = 'none'; el.textContent = ''; return; }
    el.className = 'status status-' + kind;
    el.textContent = msg;
    el.style.display = '';
  }

  // -- Dept Config modal -----------------------------------------------
  // Admin-only, no-redeploy authoring for the per-dept QCD queue map,
  // Overview sub-queue nesting, and team-avg exclusions. Mirrors the
  // Outlier Fix modal: load init -> render discovered queues +
  // per-dept effective config -> inline edit form -> save/deactivate.
  // Server (DeptConfig.gs) validates every save.

  let dcLastInit = null;
  let dcEditDept = null;

  function initDeptConfig() {
    const btn   = $('dept-config-btn');
    const modal = $('dept-config-modal');
    if (!btn || !modal) return;

    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      dcLoadInit_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    // Static edit-form buttons (wired once; the form is populated per
    // dept by dcOpenEdit_).
    const saveBtn = $('dc-save-btn');
    if (saveBtn) saveBtn.addEventListener('click', dcSave_);
    const deactivateBtn = $('dc-deactivate-btn');
    if (deactivateBtn) deactivateBtn.addEventListener('click', dcDeactivate_);
    const cancelBtn = $('dc-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', dcCloseEdit_);
  }

  function dcLoadInit_() {
    $('dc-loading').style.display = '';
    $('dc-body').style.display = 'none';
    dcSetStatus_(null);
    dcCloseEdit_();
    google.script.run
      .withSuccessHandler(function (data) {
        $('dc-loading').style.display = 'none';
        $('dc-body').style.display = '';
        dcLastInit = data || { departments: [], rosterByDept: {}, effective: [], rows: [], discoveredQueues: [], unmappedCount: 0 };
        dcRender_(dcLastInit);
      })
      .withFailureHandler(function (err) {
        $('dc-loading').textContent = 'Error: '
          + (err && err.message ? err.message : String(err));
      })
      .getDeptConfigInit();
  }

  function dcRender_(data) {
    if (data.spreadsheetUrl) {
      const link = $('dc-open-sheet');
      if (link) link.href = data.spreadsheetUrl;
    }
    // Department datalist for the Overview-parent input.
    const dl = $('dc-dept-datalist');
    if (dl) {
      dl.innerHTML = (data.departments || []).map(function (d) {
        return '<option value="' + escapeHtml(d) + '"></option>';
      }).join('');
    }
    dcRenderDiscovered_(data.discoveredQueues || [], data.unmappedCount || 0);
    dcRenderEffective_(data.effective || []);
  }

  function dcRenderDiscovered_(queues, unmappedCount) {
    const badge = $('dc-unmapped-badge');
    if (badge) {
      if (unmappedCount > 0) {
        badge.textContent = unmappedCount + ' unmapped';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
    const tbody = $('dc-discovered-tbody');
    if (!tbody) return;
    if (!queues.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="al-empty">'
        + 'No queue names found in QCD Historical Data (last 180 days).'
        + '</td></tr>';
      return;
    }
    tbody.innerHTML = queues.map(function (q) {
      const mapped = q.mappedTo
        ? '<span class="al-active al-active-yes">' + escapeHtml(q.mappedTo) + '</span>'
        : '<span class="al-active al-active-no">unmapped</span>';
      return '<tr>'
           +   '<td>' + escapeHtml(q.queue) + '</td>'
           +   '<td class="num">' + (q.rows || 0) + '</td>'
           +   '<td>' + escapeHtml(q.lastSeen || '') + '</td>'
           +   '<td>' + mapped + '</td>'
           + '</tr>';
    }).join('');
  }

  function dcRenderEffective_(effective) {
    const tbody = $('dc-effective-tbody');
    if (!tbody) return;
    if (!effective.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="al-empty">No departments found.</td></tr>';
      return;
    }
    const cell = function (str) {
      return str ? escapeHtml(str) : '<span class="al-empty-inline">-</span>';
    };
    tbody.innerHTML = effective.map(function (e, idx) {
      const source = e.hasRow
        ? '<span class="al-active al-active-yes">sheet</span>'
        : '<span class="al-active al-active-no">default</span>';
      return '<tr data-dc-idx="' + idx + '">'
           +   '<td>' + escapeHtml(e.dept) + '</td>'
           +   '<td>' + cell((e.qcdQueues || []).join(', ')) + '</td>'
           +   '<td>' + cell(e.overviewParent || '') + '</td>'
           +   '<td>' + cell((e.teamAvgExcludes || []).join(', ')) + '</td>'
           +   '<td>' + cell((e.queueExtOverrides || []).join(', ')) + '</td>'
           +   '<td>' + source + '</td>'
           +   '<td><button type="button" class="link-btn dc-row-edit" data-idx="' + idx + '">Edit</button></td>'
           + '</tr>';
    }).join('');

    tbody.querySelectorAll('.dc-row-edit').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const idx = Number(btn.getAttribute('data-idx'));
        const e = (dcLastInit.effective || [])[idx];
        if (e) dcOpenEdit_(e);
      });
    });
  }

  function dcOpenEdit_(eff) {
    dcEditDept = eff.dept;
    const nameEl = $('dc-edit-dept-name');
    if (nameEl) nameEl.textContent = eff.dept;
    $('dc-edit-qcd').value      = (eff.qcdQueues || []).join(', ');
    $('dc-edit-parent').value   = eff.overviewParent || '';
    $('dc-edit-excludes').value = (eff.teamAvgExcludes || []).join(', ');
    $('dc-edit-qext').value     = (eff.queueExtOverrides || []).join(', ');
    $('dc-edit-notes').value    = '';
    // Deactivate only makes sense when a sheet row exists for the dept.
    const deact = $('dc-deactivate-btn');
    if (deact) deact.style.display = eff.hasRow ? '' : 'none';
    $('dc-edit-section').style.display = '';
    $('dc-edit-qcd').focus();
  }

  function dcCloseEdit_() {
    dcEditDept = null;
    const sec = $('dc-edit-section');
    if (sec) sec.style.display = 'none';
  }

  function dcSave_() {
    if (!dcEditDept) return;
    const req = {
      dept:              dcEditDept,
      qcdQueues:         $('dc-edit-qcd').value,
      overviewParent:    $('dc-edit-parent').value,
      teamAvgExcludes:   $('dc-edit-excludes').value,
      queueExtOverrides: $('dc-edit-qext').value,
      active:            true,
      notes:             $('dc-edit-notes').value,
    };
    const saveBtn = $('dc-save-btn');
    if (saveBtn) saveBtn.disabled = true;
    dcSetStatus_('loading', 'Saving config for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function (res) {
        if (saveBtn) saveBtn.disabled = false;
        const warns = (res && res.warnings) || [];
        if (warns.length) {
          dcSetStatus_('success', 'Saved ' + dcEditDept + '. ⚠ ' + warns.join(' ')
            + ' Double-mapped queues are tolerated but usually a config mistake — '
            + 'remove the queue from one dept if unintended.');
          showToast('Saved ' + dcEditDept + ' — queue mapped to 2+ depts', 'success');
        } else {
          dcSetStatus_('success', 'Saved ' + dcEditDept
            + '. Changes take effect on the next request (Overview refreshes immediately; report caches within ~30 min).');
          showToast('Saved config for ' + dcEditDept, 'success');
        }
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        if (saveBtn) saveBtn.disabled = false;
        dcSetStatus_('error', 'Save failed: '
          + (err && err.message ? err.message : String(err)));
      })
      .saveDeptConfig(req);
  }

  function dcDeactivate_() {
    if (!dcEditDept) return;
    if (!window.confirm('Deactivate the override row for "' + dcEditDept
        + '"? This reverts the dept to the built-in defaults.')) return;
    const deact = $('dc-deactivate-btn');
    if (deact) deact.disabled = true;
    dcSetStatus_('loading', 'Deactivating override for ' + dcEditDept + '…');
    google.script.run
      .withSuccessHandler(function (res) {
        if (deact) deact.disabled = false;
        const n = (res && res.removed) || 0;
        dcSetStatus_('success', 'Deactivated ' + n + ' override row'
          + (n === 1 ? '' : 's') + '. Reverted to defaults.');
        showToast('Reverted ' + dcEditDept + ' to defaults', 'success');
        dcLoadInit_();
      })
      .withFailureHandler(function (err) {
        if (deact) deact.disabled = false;
        dcSetStatus_('error', 'Deactivate failed: '

    const search = $('ins-agent-search');

    // Per-card IR drill-through (delegated on the modal so it covers

    // Trend-metric sub-tabs (same pattern as the PR trend chart).

      subTabs.querySelectorAll('.pr-trend-subtab').forEach(function (b) {

    // Export dropdown -- same pattern as Individual / Performance.
    const exportBtn  = $('ins-export-btn');

    if (exportBtn && exportMenu) {

      });
      exportMenu.addEventListener('click', function (e) {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.getAttribute('data-action');
        insSetExportMenuOpen_(false);
        if (action === 'csv')        insDownloadCsv_();
        else if (action === 'copy')  insCopyImage_();
        else if (action === 'email') insEmailImage_();
        else if (action === 'print') insPrint_();
      });
      document.addEventListener('click', function (e) {
        if (exportMenu.style.display === 'none') return;

  /**
   * Resolves the "Compare against" selection to an explicit prior
   * window (mirrors IR's irResolvePriorRange_, with ins-* element
   * ids). Returns:
   *   null              -> prevPeriod: omit priorFrom/priorTo and let
   *                        the server compute the INV-28 auto-adjacent
   *                        window (keeps the cache key 'auto').
   *   { from, to }      -> explicit window to send (yoy / custom).
   *   { error }         -> custom mode with missing/invalid dates.
   */
  function insResolvePriorRange_(from, to) {
    const mode = $('ins-compare-mode') ? $('ins-compare-mode').value : 'prevPeriod';
    if (!mode || mode === 'prevPeriod') return null;
    if (mode === 'custom') {
      const pf = $('ins-prior-from') ? $('ins-prior-from').value : '';
      const pt = $('ins-prior-to')   ? $('ins-prior-to').value   : '';
      if (!pf || !pt) return { error: 'Pick prior start and end dates (or switch Compare against to a preset).' };
      if (pf > pt)    return { error: 'Prior start must be on or before prior end.' };
      return { from: pf, to: pt };
    }
    if (mode === 'yoy') {
      const p1 = from.split('-'), p2 = to.split('-');
      const ps = new Date(Number(p1[0]) - 1, Number(p1[1]) - 1, Number(p1[2]), 12);
      const pe = new Date(Number(p2[0]) - 1, Number(p2[1]) - 1, Number(p2[2]), 12);
      return { from: insIsoOf_(ps), to: insIsoOf_(pe) };
    }
    return null;
  }

  // Wire the Compare against dropdown: show/hide custom inputs and
  // preview the resolved window in the hint (mirrors irInitCompareMode_).
  function insInitCompareMode_() {
    const sel = $('ins-compare-mode');
    if (!sel) return;
    const refresh = function () {
      const mode = sel.value;
      const showCustom = (mode === 'custom');
      if ($('ins-prior-from-wrap')) $('ins-prior-from-wrap').style.display = showCustom ? '' : 'none';
      if ($('ins-prior-to-wrap'))   $('ins-prior-to-wrap').style.display   = showCustom ? '' : 'none';
      const hint = $('ins-prior-hint');
      if (!hint) return;
      const from = $('ins-from').value, to = $('ins-to').value;
      if (!from || !to) { hint.textContent = ''; return; }
      const prior = insResolvePriorRange_(from, to);
      if (!prior) { hint.textContent = ''; return; }   // prevPeriod: server hint suffices
      if (prior.error) { hint.textContent = prior.error; return; }
      // INV-35-style form-side warning when a custom window's length
      // differs >= 1.2x from the current range (CR's S18 pattern).
      let lengthNote = '';
      const dayCount = function (a, b) {
        const pa = a.split('-'), pb = b.split('-');
        const da = new Date(Number(pa[0]), Number(pa[1]) - 1, Number(pa[2]), 12);
        const db = new Date(Number(pb[0]), Number(pb[1]) - 1, Number(pb[2]), 12);
        return Math.floor((db - da) / 86400000) + 1;
      };
      const curDays = dayCount(from, to);
      const priDays = dayCount(prior.from, prior.to);
      if (curDays > 0 && priDays > 0
          && Math.max(curDays, priDays) / Math.min(curDays, priDays) >= 1.2) {
        const ratio = (Math.max(curDays, priDays) / Math.min(curDays, priDays)).toFixed(1);
        lengthNote = ' (the ' + (priDays > curDays ? 'prior window' : 'selected range')
                   + ' is ' + ratio + 'x longer — volume totals won\'t be directly comparable)';
      }
      hint.textContent = 'Comparing against ' + prior.from + ' to ' + prior.to + '.' + lengthNote;
    };
    sel.addEventListener('change', function () { refresh(); insSavePrefs_(); });
    ['ins-from', 'ins-to', 'ins-prior-from', 'ins-prior-to'].forEach(function (id) {
      const el = $(id);
      if (el) el.addEventListener('change', refresh);
    });
    refresh();
  }

  function insShowForm()    { launcherHideLoading_('ins-launcher-loading'); $('insights-form').style.display = ''; $('insights-results').style.display = 'none'; insSetFormError(''); }
  function insShowResults() { launcherHideLoading_('ins-launcher-loading'); $('insights-form').style.display = 'none'; $('insights-results').style.display = ''; }
  function insSetFormError(msg) {
    const el = $('ins-form-error'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }

  function insIsoOf_(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')
      + '-' + String(d.getDate()).padStart(2, '0');
  }
  function insSetDefaultDates() {
    if ($('ins-from') && $('ins-from').value) return;   // keep restored/last value
    const today = new Date();
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    if ($('ins-from')) $('ins-from').value = insIsoOf_(first);
    if ($('ins-to'))   $('ins-to').value   = insIsoOf_(today);
  }
  function insApplyPreset() {
    const v = $('ins-preset').value; insSavePrefs_();
    if (v === 'custom') return;
    const today = new Date(); let s, e = new Date(today);
    if (v === 'thisMonth')        { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth')   { s = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                                    e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last30')      { s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'last3Months') { s = new Date(today); s.setMonth(today.getMonth() - 3); }
    else if (v === 'last12Months'){ s = new Date(today); s.setFullYear(today.getFullYear() - 1); }
    else if (v === 'lastYear')    { s = new Date(today.getFullYear() - 1, 0, 1);
                                    e = new Date(today.getFullYear() - 1, 11, 31); }
    if (!s) return;
    $('ins-from').value = insIsoOf_(s);
    $('ins-to').value   = insIsoOf_(e);
    insScheduleActiveRefetch_(); insSavePrefs_();
  }

  // -- Picker (mirrors the IR picker; reuses the shared helpers) ----------
  function insEnsureRoster() {
    const dept = getRequestedDept();
    if (!dept) { $('ins-agent-loader').textContent = 'No department selected.'; $('ins-agent-list').style.display = 'none'; return; }
    const from = $('ins-from').value, to = $('ins-to').value;
    const rangeKey = from + '|' + to;
    if (insLastRoster.dept === dept && insLastRoster.agents.length && insLastRoster.rangeKey === rangeKey) {
      insRenderAgentList(); return;
    }
    $('ins-agent-loader').style.display = ''; $('ins-agent-list').style.display = 'none'; $('ins-generate-btn').disabled = true;
    google.script.run
      .withSuccessHandler(function (data) {
        insLastRoster = {
          dept: dept,
          agents: (data && data.agents) || [],
          activeAgents:   (data && data.activeAgents)   || null,
          activeFloaters: (data && data.activeFloaters) || null,
          rangeKey: rangeKey,
        };
        insRenderAgentList();
      })
      .withFailureHandler(function (err) {
        $('ins-agent-loader').textContent = 'Error loading roster: ' + (err && err.message ? err.message : String(err));
      })
      .getInsightsReportInit({ department: dept, from: from, to: to });
  }
  function insScheduleActiveRefetch_() {
    if (insActiveFetchTimer) clearTimeout(insActiveFetchTimer);
    insActiveFetchTimer = setTimeout(function () {
      const dept = getRequestedDept(); if (!dept) return;
      const from = $('ins-from').value, to = $('ins-to').value;
      if (!from || !to || from > to) return;
      const rangeKey = from + '|' + to;
      if (insLastRoster.dept === dept && insLastRoster.rangeKey === rangeKey) return;
      google.script.run
        .withSuccessHandler(function (data) {
          insLastRoster.activeAgents   = (data && data.activeAgents)   || null;
          insLastRoster.activeFloaters = (data && data.activeFloaters) || null;
          insLastRoster.rangeKey = rangeKey;
          const checked = irGetCheckedAgents_($('ins-agent-list'));
          insRenderAgentList();
          irApplyCheckedAgents_($('ins-agent-list'), checked);
          insUpdateGenerate();
        })
        .withFailureHandler(function () { /* keep existing grouping */ })
        .getInsightsReportInit({ department: dept, from: from, to: to });
    }, 350);
  }
  function insRenderAgentList() {
    const list = $('ins-agent-list');
    $('ins-agent-loader').style.display = 'none';
    if (!insLastRoster.agents.length) {
      list.innerHTML = '<div class="ir-agent-empty">No agents on this department\'s roster.</div>';
      list.style.display = ''; $('ins-generate-btn').disabled = true; return;
    }
    list.innerHTML = irBuildAgentListHtml_(insLastRoster.agents, insLastRoster.activeAgents, insLastRoster.activeFloaters);
    list.style.display = '';
    if (insListChangeHandler_) list.removeEventListener('change', insListChangeHandler_);
    insListChangeHandler_ = function () { insUpdateGenerate(); insSavePrefs_(); };
    list.addEventListener('change', insListChangeHandler_);
    if (insPendingAgentSelection_) { irApplyCheckedAgents_(list, insPendingAgentSelection_); insPendingAgentSelection_ = null; }
    insUpdateGenerate();
    // Overview question-launcher flow: the picker render is the race-free
    // point to select the whole active roster and run. One-shot.
    if (insLauncherAutoRun_) {
      insLauncherAutoRun_ = false;
      insToggleAgents(true);
      if (!$('ins-generate-btn').disabled) runInsReport();
    }
  }
  function insToggleAgents(on) { selectAllActiveAgents_($('ins-agent-list'), on); insUpdateGenerate(); insSavePrefs_(); }
  function insUpdateGenerate() {
    const boxes = $('ins-agent-list').querySelectorAll('.ir-agent-cb:checked');
    $('ins-generate-btn').disabled = boxes.length === 0;
  }

  function runInsReport() {
    const dept = getRequestedDept(); if (!dept) { insSetFormError('No department selected.'); return; }
    const from = $('ins-from').value, to = $('ins-to').value;
    if (!from || !to) { insSetFormError('Pick a start and end date.'); return; }
    if (from > to) { insSetFormError('Start date must be on or before end date.'); return; }
    const agents = irGetCheckedAgents_($('ins-agent-list'));
    if (!agents.length) { insSetFormError('Select at least one agent.'); return; }
    // Resolve the comparison window. prevPeriod -> null (server's
    // INV-28 auto-adjacent default); yoy/custom -> explicit dates.
    const prior = insResolvePriorRange_(from, to);
    if (prior && prior.error) { insSetFormError(prior.error); return; }
    insSetFormError('');
    const req = { department: dept, from: from, to: to, agents: agents };
    if (prior) { req.priorFrom = prior.from; req.priorTo = prior.to; }
    // Queue health sub-queue scope (checkbox lives in the results pane;
    // default checked = INV-51 rollup when not yet rendered).
    const qhCb = $('ins-qh-include-sub');
    if (qhCb && !qhCb.checked) req.queueHealthOwnOnly = true;
    const gen = $('ins-generate-btn'); const prev = gen.textContent;
    gen.disabled = true; gen.textContent = 'Generating…';
    google.script.run
      .withSuccessHandler(function (data) {
        gen.disabled = false; gen.textContent = prev;
        insSavePrefs_(); insRenderReport_(data); insShowResults();
      })
      .withFailureHandler(function (err) {
        gen.disabled = false; gen.textContent = prev;
        insShowForm();   // dismisses the launcher loading pane if active
        insSetFormError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getInsightsReport(req);
  }

  function insRenderReport_(data) {
    insLastData = data;
    $('ins-results-date').textContent = '(' + (data.dateLabel || '') + ')';
    const cmp = $('ins-compare-line');
    if (cmp) {
      const mode = data.meta && data.meta.comparisonMode;
      const basis = mode === 'custom'
        ? 'Comparing against the selected prior window: '
        : 'Comparing against the immediately-preceding period: ';
      cmp.textContent = basis + (data.priorDateLabel || '');
    }

    // Team insights callout (reuse the IR block; relabel to "Team insights").
    const host = $('ins-team-insights');
    if (host) {
      const ins = data.teamInsights || [];
      host.innerHTML = ins.length
        ? irInsightsBlock_(ins).replace('<div class="ir-insights-label">Insights</div>',
                                        '<div class="ir-insights-label">Team insights</div>')
        : '';
    }

    // Roster-only caption on the rollup.
    const cap = $('ins-rollup-cap');
    if (cap) {
      const fl = (data.meta && data.meta.queueOnlyAgentCount) || 0;
      cap.textContent = fl > 0 ? '(roster only · ' + fl + ' floater' + (fl === 1 ? '' : 's') + ' excluded)' : '';
    }

    // Team KPI tiles -- reuse the Performance Report tile, now with
    // 12-month sparklines from the server's trendData (same series
    // shape PR's prRenderKpis_ consumes).
    const t = data.teamStats || {};
    const series = (data.trendData && data.trendData.series) || [];
    const sparks = {
      rung:     series.map(function (s) { return s.rung; }),
      missed:   series.map(function (s) { return s.missed; }),
      answered: series.map(function (s) { return s.answered; }),
      pct:      series.map(function (s) { return s.pct; }),
      ttt:      series.map(function (s) { return s.ttt; }),
      att:      series.map(function (s) { return s.att; }),
    };
    $('ins-kpi-row').innerHTML = [
      // Rung / Answered deltas render NEUTRAL here (volume moves with call
      // traffic, not performance); Missed keeps its warn valence. PR keeps
      // the legacy coloring until it's retired -- the parity test pins
      // numbers, not badge colors.
      prKpiTile_('Total Rung',   t.rung,     'neu', sparks.rung,     IR_VOLUME_COLORS.rung),
      prKpiTile_('Missed (rings)', t.missed, 'neg', sparks.missed,   IR_VOLUME_COLORS.missed),
      prKpiTile_('Answered',     t.answered, 'neu', sparks.answered, IR_VOLUME_COLORS.answered),
      prKpiTile_('% Answered',   t.pct,      'pos', sparks.pct,      (THEME.accent || '#4E79A7')),
      prKpiTile_('Total TTT',    t.ttt,      'neu', sparks.ttt,      (THEME.muted  || '#9C755F')),
      prKpiTile_('ATT (per call)', t.att,    'neu', sparks.att,      (THEME.muted  || '#9C755F')),
    ].join('');

    insRenderLengthWarning_(data.meta);
    insRenderQueueHealth_(data.queueHealth);
    reportHeadline_('ins-headline', 'insights-results', insHeadline_(data));
    insRenderTrendChart_(data);
    insRenderShareChart_(data.agentData || []);
    insRenderAgentCards_(data.agentData || [], data.meta, data.teamStats);
  }

  /**
   * Share-of-answered doughnut (ported from the Performance Report so
   * PR can retire without losing the view). Built client-side from
   * agentData (each card already carries answered.val for the range);
   * slices sorted largest-first, datalabels suppressed under 4% of
   * total (PR's threshold). Hidden when fewer than 2 agents answered.
   */
  function insRenderShareChart_(cards) {
    const wrap = $('ins-share-wrap');
    if (!wrap) return;
    const slices = (cards || [])
      .map(function (c) {
        return { label: c.name, value: Number((c.metrics && c.metrics.answered && c.metrics.answered.val) || 0) };
      })
      .filter(function (d) { return d.value > 0; })
      .sort(function (a, b) { return b.value - a.value; });
    if (insShareChartInstance) { try { insShareChartInstance.destroy(); } catch (e) {} insShareChartInstance = null; }
    if (slices.length < 2) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-share-chart');

    const colors = slices.map(function (_, i) { return IR_CHART_COLORS[i % IR_CHART_COLORS.length]; });
    const plugins = (typeof ChartDataLabels !== 'undefined') ? [ChartDataLabels] : [];
    insShareChartInstance = new Chart($('ins-share-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: slices.map(function (d) { return d.label; }),
        datasets: [{
          data: slices.map(function (d) { return d.value; }),
          backgroundColor: colors,
          borderColor: THEME.paperCard,
          borderWidth: 2,
        }],
      },
      plugins: plugins,
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                const pct = total > 0 ? (ctx.parsed / total) * 100 : 0;
                return ctx.label + ': ' + ctx.parsed + ' (' + pct.toFixed(1) + '%)';
              },
            },
          },
          datalabels: {
            display: function (ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              return total > 0 && (ctx.dataset.data[ctx.dataIndex] / total) >= 0.04;
            },
            color: THEME.paper,
            font: { family: "'IBM Plex Mono', monospace", size: 11, weight: '500' },
            textAlign: 'center',
            formatter: function (value, ctx) {
              const total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              const pct = total > 0 ? (value / total * 100).toFixed(1) : '0';
              return value + '\n(' + pct + '%)';
            },
          },
        },
      },
    });
  }

  /**
   * Queue health section (QCD-into-Insights consolidation). Renders
   * queue-level KPI tiles (with deltas vs the same prior window the
   * rest of the report compares against) + a per-queue table with the
   * 5%-threshold benchmark tint and expandable violation dates.
   * Hidden when the server sent null (unmapped dept / missing sheet,
   * or a pre-v4 cached payload).
   */
  function insRenderQueueHealth_(qh) {
    const wrap = $('ins-queue-health');
    if (!wrap) return;
    if (!qh || !qh.totals) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';

    const cap = $('ins-qh-cap');
    if (cap) cap.textContent = '(' + (qh.queues || []).length + ' queue'
      + ((qh.queues || []).length === 1 ? '' : 's') + ' · same window as the rollup above)';

    // Sub-queue toggle: only meaningful for parent depts. State mirrors
    // the server's effective scope (checkbox change re-runs the report).
    const subWrap = $('ins-qh-sub-wrap');
    if (subWrap) {
      subWrap.style.display = qh.hasSubQueues ? '' : 'none';
      const cb = $('ins-qh-include-sub');
      if (cb) cb.checked = qh.includeSubQueues !== false;
    }

    // Days-to-violation forecast on the daily series (shared helper --
    // same regression the QCD Report renders).
    const fc = $('ins-qh-forecast');
    if (fc) {
      const html = (qh.trend && qh.trend.dailyTotal)
        ? abandonForecastHtml_(qh.trend.dailyTotal) : '';
      fc.innerHTML = html;
      fc.style.display = html ? '' : 'none';
    }

    const t = qh.totals, p = qh.priorTotals;
    const tiles = [
      inboundKpiTile_('Queue calls', fmtNumber(t.totalCalls), '',
        p ? inboundDelta_(t.totalCalls, p.totalCalls, 'neu', false) : ''),
      inboundKpiTile_('Abandoned %', t.abandonedPctStr, fmtNumber(t.abandoned) + ' abandoned',
        p ? inboundDelta_(t.abandonedPct, p.abandonedPct, 'neg', true) : ''),
      inboundKpiTile_('Violations (MTD)', fmtNumber(qh.violationsMtd), 'days over the 5% threshold this month', ''),
      inboundKpiTile_('Longest wait', t.longestWait, '', ''),
    ];
    $('ins-qh-tiles').innerHTML = tiles.join('');

    insRenderQueueHealthChart_(qh);

    const tbody = $('ins-qh-tbody');
    if (!tbody) return;
    tbody.innerHTML = (qh.perQueue || []).map(function (q) {
      const pctCls = benchValueCls_('abandoned %', q.abandonedPctStr);
      const violCls = q.violations > 3 ? ' qcd-warn-strong' : (q.violations > 0 ? ' qcd-warn-light' : '');
      const violCell = q.violations > 0 && (q.violationDates || []).length
        ? '<details class="ins-qh-viol"><summary>' + q.violations + '</summary>'
          + '<div class="ins-qh-viol-dates">' + q.violationDates.map(escapeHtml).join(', ') + '</div></details>'
        : String(q.violations || 0);
      return '<tr>'
        + '<td>' + escapeHtml(q.queue) + '</td>'
        + '<td class="num">' + fmtNumber(q.totalCalls) + '</td>'
        + '<td class="num">' + fmtNumber(q.abandoned) + '</td>'
        + '<td class="num' + pctCls + '">' + escapeHtml(q.abandonedPctStr) + '</td>'
        + '<td class="num' + violCls + '">' + violCell + '</td>'
        + '</tr>';
    }).join('');
  }

  /**
   * Compact Queue health trend: one monthly abandoned-% line per queue
   * + a dashed dept total (multi-queue only) + the faint 5% threshold
   * baseline (the QCD violation rule -- same convention as the Overview
   * chart's 92% line). Colors via THEME / IR_CHART_COLORS (INV-42);
   * datalabels off in boolean form (INV-41). Hidden for pre-v5 cached
   * payloads (no trend key) or when there's nothing to plot.
   */
  function insRenderQueueHealthChart_(qh) {
    const wrap = $('ins-qh-chart-wrap');
    if (!wrap) return;
    const trend = qh && qh.trend;
    if (!trend || !trend.labels || !trend.labels.length) {
      wrap.style.display = 'none';
      const tgl = $('ins-qh-view-toggle');
      if (tgl) tgl.style.display = 'none';
      if (insQhChartInstance) { try { insQhChartInstance.destroy(); } catch (e) {} insQhChartInstance = null; }
      return;
    }
    // Daily view only offered when the range has 2+ days of data
    // (single point isn't useful as a line -- QCD's convention).
    const hasDaily = (trend.dailyLabels || []).length > 1;
    const toggle = $('ins-qh-view-toggle');
    if (toggle) toggle.style.display = hasDaily ? '' : 'none';
    if (!hasDaily && insQhView === 'daily') insQhView = 'monthly';
    const daily = insQhView === 'daily' && hasDaily;

    const labels   = daily ? trend.dailyLabels : trend.labels;
    const totalSer = daily ? (trend.dailyTotal || []) : (trend.total || []);
    const perQueue = daily ? (trend.dailyPerQueue || {}) : (trend.perQueue || {});
    const queueNames = Object.keys(perQueue);
    if (!queueNames.length && !totalSer.length) {
      wrap.style.display = 'none';
      if (insQhChartInstance) { try { insQhChartInstance.destroy(); } catch (e) {} insQhChartInstance = null; }
      return;
    }
    wrap.style.display = '';
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-qh-chart');
    if (insQhChartInstance) { try { insQhChartInstance.destroy(); } catch (e) {} insQhChartInstance = null; }

    const datasets = queueNames.map(function (q, i) {
      const color = IR_CHART_COLORS[i % IR_CHART_COLORS.length];
      return {
        label: q,
        data: perQueue[q],
        borderColor: color,
        backgroundColor: color,
        borderWidth: 1.8,
        pointRadius: 1.5,
        tension: 0.25,
        fill: false,
      };
    });
    if (queueNames.length > 1 && totalSer.length) {
      datasets.push({
        label: 'Dept total',
        data: totalSer,
        borderColor: THEME.ink,
        backgroundColor: THEME.ink,
        borderDash: [5, 4],
        borderWidth: 1.4,
        pointRadius: 0,
        tension: 0.25,
        fill: false,
      });
    }
    datasets.push({
      label: '5% threshold',
      data: labels.map(function () { return 5; }),
      borderColor: THEME.muted,
      borderDash: [3, 4],
      borderWidth: 1,
      pointRadius: 0,
      fill: false,
      order: 99,
    });

    insQhChartInstance = new Chart($('ins-qh-chart').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          datalabels: { display: false },
          legend: { position: 'bottom', labels: { boxWidth: 18,
            filter: function (item) { return item.text !== '5% threshold'; } } },
          tooltip: {
            filter: function (ctx) { return ctx.dataset.label !== '5% threshold'; },
            callbacks: { label: function (ctx) {
              return ctx.dataset.label + ': ' + (ctx.parsed.y == null ? '-' : ctx.parsed.y.toFixed(1) + '%');
            } },
          },
        },
        scales: {
          x: { ticks: { maxRotation: 0, autoSkip: true } },
          y: { beginAtZero: true, ticks: { callback: function (v) { return v + '%'; } } },
        },
      },
    });
  }

  /**
   * Different-length warning banner (INV-35 semantics, CR pattern).
   * Only reachable with a custom prior window -- the auto-adjacent
   * and YoY windows are always the same length as the current range.
   */
  function insRenderLengthWarning_(meta) {
    const el = $('ins-length-warning');
    if (!el) return;
    if (!meta || !meta.lengthMismatch) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.innerHTML = '<strong>Different window lengths:</strong> '
                 + 'the selected range is ' + (meta.currentDays || 0) + ' days, the comparison window is '
                 + (meta.priorDays || 0) + ' days. '
                 + 'Volume totals (Rung / Missed / Answered / TTT) aren\'t directly comparable; '
                 + 'compare the per-day figures shown on the agent cards instead.';
    el.style.display = '';
  }

  /**
   * 12-month team trend line for the Insights modal. Single tracked
   * Chart.js instance; metric picked by insActiveTrendMetric (same
   * sub-tab strip the PR trend uses). Colors route through THEME /
   * IR_VOLUME_COLORS per INV-42; datalabels stay off (boolean form,
   * INV-41) -- the sparklines + tooltip carry the values.
   */
  function insRenderTrendChart_(data) {
    const canvas = $('ins-trend-chart');
    if (!canvas) return;
    refreshChartTheme();
    destroyOrphanedChartOnCanvas_('ins-trend-chart');
    if (insChartInstance) { try { insChartInstance.destroy(); } catch (e) {} insChartInstance = null; }

    const labels = (data.trendData && data.trendData.labels) || [];
    const series = (data.trendData && data.trendData.series) || [];
    let dataPoints, color, label, isPercent, isMinutes;
    if (insActiveTrendMetric === 'pct') {
      dataPoints = series.map(function (s) { return Number((s.pct || 0).toFixed(1)); });
      color = THEME.accent || '#4E79A7';
      label = '% Answered';
      isPercent = true;
    } else if (insActiveTrendMetric === 'att') {
      dataPoints = series.map(function (s) { return Number(((s.att || 0) / 60).toFixed(2)); });
      color = THEME.muted || '#9C755F';
      label = 'Avg Talk Time';
      isMinutes = true;
    } else {
      dataPoints = series.map(function (s) { return s.answered; });
      color = IR_VOLUME_COLORS.answered;
      label = 'Answered';
    }
    const fmtMin = function (val) {
      const n = parseFloat(val); if (isNaN(n)) return '';
      const m = Math.floor(n);
      const s = Math.round((n - m) * 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    };

    insChartInstance = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: label,
          data: dataPoints,
          borderColor: color,
          backgroundColor: function (ctx) { return irGradientFill_(ctx.chart, color); },
          tension: 0.4, fill: true,
          pointBackgroundColor: color,
          pointBorderColor: THEME.paperCard, pointBorderWidth: 1.5,
          pointRadius: 3, pointHoverRadius: 5,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                if (isPercent) return label + ': ' + ctx.parsed.y + '%';
                if (isMinutes) return label + ': ' + fmtMin(ctx.parsed.y);
                return label + ': ' + ctx.parsed.y;
              },
            },
          },
          datalabels: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: isPercent ? 100 : undefined,
            ticks: {
              callback: function (val) {
                if (isPercent) return val + '%';
                if (isMinutes) return fmtMin(val);
                return val;
              },
            },
          },
        },
      },
    });
  }

  // Delta badge mirroring prKpiTile_'s logic for the per-agent card grid.
  function insDeltaBadge_(stat, valence) {
    const s = stat || { deltaPct: 0, type: 'volume' };
    const isPct = s.type === 'pctPoints';
    const dp = Number(s.deltaPct || 0);
    if (Math.abs(dp) < 0.05) return '<span class="pr-delta pr-delta-neu">–</span>';
    let cls = 'pr-delta-neu';
    if (valence === 'pos')      cls = dp > 0 ? 'pr-delta-pos' : 'pr-delta-neg';
    else if (valence === 'neg') cls = dp > 0 ? 'pr-delta-neg' : 'pr-delta-pos';
    const arrow = dp > 0 ? '▲' : '▼';
    const suffix = isPct ? ' pts' : '%';
    return '<span class="pr-delta ' + cls + '"><span class="pr-delta-arrow">' + arrow + '</span> '
         + Math.abs(dp).toFixed(1) + suffix + '</span>';
  }

  /**
   * Per-agent cards, enriched with the analytics ported from Compare
   * Ranges: improved/regressed/mixed classification (left-border
   * color via the shared deltaClassify_), a "vs Team" badge comparing
   * the agent's improvement score to the team's, sort control
   * (default answered-desc / name / biggest improvers / regressors),
   * and a collapsible quiet-agents section (deltaIsQuiet_) so the
   * visible grid is the notable movers. Per-day sublines render on
   * volume/time metrics when meta.lengthMismatch (custom prior of a
   * different length).
   */
  function insRenderAgentCards_(cards, meta, teamStats) {
    const wrap = $('ins-agent-cards'); if (!wrap) return;
    const toolbar = $('ins-cards-toolbar');
    const det = $('ins-quiet-details');
    if (!cards.length) {
      wrap.innerHTML = emptyStateHtml_('&#128100;', 'No agents to compare',
        'No selected agent had activity (or matched this department) in the range.');
      if (toolbar) toolbar.style.display = 'none';
      if (det) { det.style.display = 'none'; $('ins-quiet-cards').innerHTML = ''; }
      return;
    }
    if (toolbar) toolbar.style.display = cards.length > 1 ? '' : 'none';

    const teamScore = deltaImprovementScore_(teamStats || {});
    const enriched = cards.map(function (c) {
      return {
        card: c,
        score: deltaImprovementScore_(c.metrics),
        direction: deltaClassify_(c.metrics),
        quiet: deltaIsQuiet_(c.metrics),
      };
    });
    const main  = enriched.filter(function (x) { return !x.quiet; });
    const quiet = enriched.filter(function (x) { return  x.quiet; });

    let sortedMain = main;
    if (main.length > 1 && insCardSort !== 'default') {
      sortedMain = main.slice();
      if (insCardSort === 'name') {
        sortedMain.sort(function (a, b) {
          const an = (a.card.name || '').toLowerCase();
          const bn = (b.card.name || '').toLowerCase();
          return an < bn ? -1 : an > bn ? 1 : 0;
        });
      } else if (insCardSort === 'improvers') {
        sortedMain.sort(function (a, b) { return b.score - a.score; });
      } else if (insCardSort === 'regressors') {
        sortedMain.sort(function (a, b) { return a.score - b.score; });
      }
    }

    const renderCard = function (x) { return insBuildCard_(x, teamScore, meta); };
    wrap.innerHTML = sortedMain.map(renderCard).join('');

    if (det) {
      if (quiet.length > 0) {
        det.style.display = '';
        det.querySelector('.cr-quiet-summary').textContent =
          'Show ' + quiet.length + ' quiet agent' + (quiet.length === 1 ? '' : 's')
          + ' (no notable changes)';
        $('ins-quiet-cards').innerHTML = quiet.map(renderCard).join('');
      } else {
        det.style.display = 'none';
        $('ins-quiet-cards').innerHTML = '';
      }
    }
  }

  function insBuildCard_(x, teamScore, meta) {
    const c = x.card;
    const isFloater = c.matchedViaQueue && !c.matchedViaRoster;
    const chip = isFloater ? sourceChipHtml_(c) : '';
    // Floaters keep their warn-tinted border (the QUEUE signal wins
    // over the classification tint); everyone else gets the
    // improved/regressed/mixed left border (CR pattern).
    const dirClass = isFloater ? ''
                   : x.direction === 'improved'  ? ' ins-card-improved'
                   : x.direction === 'regressed' ? ' ins-card-regressed'
                   : ' ins-card-mixed';
    const vsTeam = crVsTeamBadge_(x.score, teamScore);
    const debugAttrs =
      ' data-direction="' + x.direction + '"'
      + ' data-score="' + (x.score == null ? '' : x.score.toFixed(1)) + '"';
    const metricDefs = [
      ['Rung', 'rung', 'pos', 'volume'], ['Missed', 'missed', 'neg', 'volume'],
      ['Answered', 'answered', 'pos', 'volume'], ['% Ans', 'pct', 'pos', 'rate'],
      ['TTT', 'ttt', 'neu', 'time'], ['ATT', 'att', 'neu', 'rate'],
    ];
    const metrics = metricDefs.map(function (m) {
      const st = (c.metrics && c.metrics[m[1]]) || { formatted: '-' };
      return '<div class="ins-metric">'
           +   '<div class="ins-metric-label">' + m[0] + '</div>'
           +   '<div class="ins-metric-val">' + escapeHtml(String(st.formatted)) + '</div>'
           +   '<div class="ins-metric-delta">' + insDeltaBadge_(st, m[2]) + '</div>'
           +   insMetricPerDay_(st, m[3], meta)
           + '</div>';
    }).join('');
    // Drill-through to the Individual Report (same agent + same window,
    // auto-generated via irDrillToAgent_) -- IR is the per-person deep
    // dive; the card is the summary.
    const irLink = '<button type="button" class="ins-card-ir-link" data-agent="' + escapeHtml(c.name) + '"'
      + ' title="Open this agent&#39;s Individual Report for the same date range">IR &#8599;</button>';
    return '<div class="ins-card' + (isFloater ? ' ins-card-floater' : '') + dirClass + '"' + debugAttrs + '>'
         +   '<div class="ins-card-head"><span class="ins-card-name">' + escapeHtml(c.name) + '</span>' + chip + vsTeam + irLink + '</div>'
         +   '<div class="ins-card-grid">' + metrics + '</div>'
         + '</div>';
  }

  /**
   * Per-day subline on volume/time metrics when the comparison
   * windows differ in length (meta.lengthMismatch): "cur/day vs
   * prior/day". Rates (% Ans, ATT) are already length-independent.
   */
  function insMetricPerDay_(st, kind, meta) {
    if (!meta || !meta.lengthMismatch) return '';
    if (kind !== 'volume' && kind !== 'time') return '';
    if (st == null || st.val == null || st.prev == null) return '';
    if (!(meta.currentDays > 0) || !(meta.priorDays > 0)) return '';
    const fmt = (kind === 'time')
      ? function (v) { return crFormatSecondsShort_(v); }
      : function (v) { return v.toFixed(1); };
    return '<div class="ins-metric-perday">'
         +   fmt(st.val / meta.currentDays) + '/day'
         +   ' <span class="pr-delta-cap">vs ' + fmt(st.prev / meta.priorDays) + '</span>'
         + '</div>';
  }

  function insSetResultsStatus_(kind, msg) {
    const el = $('ins-results-status'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; el.className = 'status'; return; }
    el.className = 'status status-' + (kind || 'info');
    el.textContent = msg;
    el.style.display = '';
  }

  function insSetExportMenuOpen_(open) {
    const btn  = $('ins-export-btn');
    const menu = $('ins-export-menu');
    if (!btn || !menu) return;
    menu.style.display = open ? '' : 'none';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('open', open);
  }

  function insBtnFeedback_(label, holdMs) {
    const btn = $('ins-export-btn');
    if (!btn) return function () {};
    if (!btn.dataset.label) btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = label;
    if (holdMs) setTimeout(function () { btn.innerHTML = btn.dataset.label; btn.disabled = false; }, holdMs);
    return function restore() { btn.innerHTML = btn.dataset.label; btn.disabled = false; };
  }

  /**
   * html2canvas capture for the Insights results (same approach as the
   * PR capture: snapshot the live chart canvas, swap it for an <img>
   * in the clone so the chart pixels survive the render).
   */
  function insBuildCanvas_(onDone) {
    const root = $('insights-results');
    if (!root) return;
    if (insChartInstance) insChartInstance.resize();
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      const canvasMap = {};
      root.querySelectorAll('canvas').forEach(function (cvs) {
        canvasMap[cvs.id] = cvs.toDataURL('image/png');
      });
      html2canvas(root, {
        scale: 2, useCORS: true, backgroundColor: (THEME.paper || '#f6f7f9'),
        onclone: function (clonedDoc) {
          const btns = clonedDoc.querySelector('#insights-results .ir-action-buttons');
          if (btns) btns.style.display = 'none';
          const subTabs = clonedDoc.getElementById('ins-trend-subtabs');
          if (subTabs) subTabs.style.display = 'none';
          const status = clonedDoc.getElementById('ins-results-status');
          if (status) status.style.display = 'none';
          const toolbar = clonedDoc.getElementById('ins-cards-toolbar');
          if (toolbar) toolbar.style.display = 'none';
          // Force the quiet-agents section open so the capture is the
          // complete comparison (mirrors the CR print/export behavior).
          const quiet = clonedDoc.getElementById('ins-quiet-details');
          if (quiet && quiet.style.display !== 'none') {
            quiet.setAttribute('open', '');
            const summary = quiet.querySelector('.cr-quiet-summary');
            if (summary) summary.style.display = 'none';
          }
          Object.keys(canvasMap).forEach(function (id) {
            const cvs = clonedDoc.getElementById(id);
            if (!cvs) return;
            const img = clonedDoc.createElement('img');
            img.src = canvasMap[id];
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            cvs.parentNode.replaceChild(img, cvs);
          });
        },
      }).then(function (canvas) { onDone(canvas); }).catch(exportCaptureFailed_);
    }); });
  }

  function insCopyImage_() {
    const restore = insBtnFeedback_('Capturing…', 0);
    insBuildCanvas_(function (canvas) {
      canvas.toBlob(function (blob) {
        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(function () {
              restore();
              insBtnFeedback_('Copied!', 1200);
            }, function (err) {
              insSetResultsStatus_('error', 'Clipboard copy failed: ' + (err && err.message ? err.message : err));
              restore();
            });
        } else {
          insSetResultsStatus_('error', 'Clipboard API not available in this browser.');
          restore();
        }
      }, 'image/png');
    });
  }

  function insEmailImage_() {
    const restore = insBtnFeedback_('Capturing…', 0);
    insBuildCanvas_(function (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      insBtnFeedback_('Sending…', 0);
      google.script.run
        .withSuccessHandler(function (res) {
          restore();
          insBtnFeedback_('Sent to ' + (res && res.to ? res.to : 'you'), 2000);
          showToast('Report emailed to ' + (res && res.to ? res.to : 'you'), 'success');
        })
        .withFailureHandler(function (err) {
          insSetResultsStatus_('error', 'Email failed: ' + (err && err.message ? err.message : err));
          showToast('Email failed', 'error');
          restore();
        })
        .sendInsightsReportEmail({
          imageBase64: dataUrl,
          dateLabel: insLastData && insLastData.dateLabel ? insLastData.dateLabel : '',
        });
    });
  }

  /**
   * Client-side CSV of the Insights payload: scope lines, the team
   * rollup (current / prior / delta per metric), and one row per agent
   * with each metric's current + prior + delta, plus the
   * classification / improvement-score / quiet / floater columns and
   * per-day normalization columns when meta.lengthMismatch (the CR CSV
   * contract -- this export is the prerequisite for retiring CR's).
   * Every cell routes through csvSafeCell_ (agent names are untrusted
   * CDR-feed input) before the RFC-4180 quoting.
   */
  function insDownloadCsv_() {
    if (!insLastData) return;
    const d = insLastData;
    const meta = d.meta || {};
    const esc = function (v) {
      const s = csvSafeCell_(v == null ? '' : v);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const row = function (cells) { return cells.map(esc).join(','); };
    const deltaStr = function (st) {
      if (!st) return '';
      const dp = Number(st.deltaPct || 0);
      return dp.toFixed(1) + (st.type === 'pctPoints' ? ' pts' : '%');
    };
    const mismatch = !!meta.lengthMismatch;
    const lines = [];
    lines.push(row(['Insights report', meta.department || '', (meta.from || '') + ' to ' + (meta.to || '')]));
    lines.push(row(['Comparison window', (meta.priorFrom || '') + ' to ' + (meta.priorTo || ''),
                    meta.comparisonMode === 'custom' ? 'custom/YoY' : 'immediately-preceding']));
    if (mismatch) {
      lines.push(row(['Note', 'Different window lengths (' + meta.currentDays + 'd vs '
        + meta.priorDays + 'd) — volume totals not directly comparable; see the /day columns']));
    }
    lines.push('');
    lines.push(row(['Team rollup (roster only)', 'Current', 'Prior', 'Delta']));
    const t = d.teamStats || {};
    [['Rung', 'rung'], ['Missed', 'missed'], ['Answered', 'answered'],
     ['% Answered', 'pct'], ['TTT', 'ttt'], ['Avg ATT', 'att']].forEach(function (m) {
      const st = t[m[1]] || {};
      lines.push(row([m[0], st.formatted != null ? st.formatted : '',
                      st.prev != null ? st.prev : '', deltaStr(st)]));
    });
    lines.push('');
    const head = ['Agent', 'Source', 'Classification', 'Improvement score', 'Quiet'];
    const metricCols = [['Rung', 'rung', true], ['Missed', 'missed', true],
                        ['Answered', 'answered', true], ['% Ans', 'pct', false],
                        ['TTT', 'ttt', true], ['ATT', 'att', false]];
    metricCols.forEach(function (m) {
      head.push(m[0], m[0] + ' prior', m[0] + ' Δ');
      if (mismatch && m[2] && m[1] !== 'pct' && m[1] !== 'att') {
        head.push(m[0] + '/day', m[0] + '/day prior');
      }
    });
    lines.push(row(head));
    (d.agentData || []).forEach(function (a) {
      const isFloater = a.matchedViaQueue && !a.matchedViaRoster;
      const cells = [
        a.name,
        isFloater ? 'QUEUE' + ((a.sourceHomes || []).length ? ' · ' + a.sourceHomes.join('/') : '') : 'ROSTER',
        deltaClassify_(a.metrics),
        deltaImprovementScore_(a.metrics).toFixed(1),
        deltaIsQuiet_(a.metrics) ? 'yes' : 'no',
      ];
      metricCols.forEach(function (m) {
        const st = (a.metrics && a.metrics[m[1]]) || {};
        cells.push(st.formatted != null ? st.formatted : '',
                   st.prev != null ? st.prev : '', deltaStr(st));
        if (mismatch && m[2] && m[1] !== 'pct' && m[1] !== 'att') {
          const cur = (st.val != null && meta.currentDays > 0) ? (st.val / meta.currentDays).toFixed(1) : '';
          const pri = (st.prev != null && meta.priorDays > 0) ? (st.prev / meta.priorDays).toFixed(1) : '';
          cells.push(cur, pri);
        }
      });
      lines.push(row(cells));
    });
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'insights_' + (meta.department || 'report') + '_' + (meta.from || '') + '_' + (meta.to || '') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 0);
  }

  function insPrint_() {
    if (insChartInstance) insChartInstance.resize();
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      document.body.classList.add('ins-printing');
      window.print();
      document.body.classList.remove('ins-printing');
    }); });
  }

  function insSavePrefs_() {
    try {
      localStorage.setItem(INS_PREFS_KEY, JSON.stringify({
        preset: $('ins-preset') ? $('ins-preset').value : 'custom',
        from:   $('ins-from')   ? $('ins-from').value   : '',
        to:     $('ins-to')     ? $('ins-to').value     : '',
        compareMode: $('ins-compare-mode') ? $('ins-compare-mode').value : 'prevPeriod',
        priorFrom:   $('ins-prior-from')   ? $('ins-prior-from').value   : '',
        priorTo:     $('ins-prior-to')     ? $('ins-prior-to').value     : '',
        trendMetric: insActiveTrendMetric,
        cardSort:    insCardSort,
        agents: irGetCheckedAgents_($('ins-agent-list')),
      }));
    } catch (e) { /* ignore */ }
  }
  function insRestorePrefs_() {
    try {
      const prefs = JSON.parse(localStorage.getItem(INS_PREFS_KEY) || 'null');
      if (!prefs || typeof prefs !== 'object') return;
      if (prefs.preset && $('ins-preset')) $('ins-preset').value = prefs.preset;
      if (prefs.from   && $('ins-from'))   $('ins-from').value   = prefs.from;
      if (prefs.to     && $('ins-to'))     $('ins-to').value     = prefs.to;
      if (prefs.compareMode && $('ins-compare-mode')) {
        $('ins-compare-mode').value = prefs.compareMode;
        $('ins-compare-mode').dispatchEvent(new Event('change'));
      }
      if (prefs.priorFrom && $('ins-prior-from')) $('ins-prior-from').value = prefs.priorFrom;
      if (prefs.priorTo   && $('ins-prior-to'))   $('ins-prior-to').value   = prefs.priorTo;
      if (prefs.cardSort) {
        insCardSort = prefs.cardSort;
        if ($('ins-card-sort')) $('ins-card-sort').value = insCardSort;
      }
      if (prefs.trendMetric) {
        insActiveTrendMetric = prefs.trendMetric;
        const subTabs = $('ins-trend-subtabs');
        if (subTabs) subTabs.querySelectorAll('.pr-trend-subtab').forEach(function (b) {
          const active = b.getAttribute('data-metric') === insActiveTrendMetric;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      }
      if (Array.isArray(prefs.agents) && prefs.agents.length) insPendingAgentSelection_ = prefs.agents;
    } catch (e) { /* ignore */ }
  }

  // ===================================================================
  // Inbound Report (admin-only) -- Neon-backed inbound_calls analytics:
  // volume + answered/abandoned/on-hold by insurer / dial-in / entry queue.
  // ===================================================================
  let inboundLastData = null;
  let inboundExpandedInsurer = null;   // accordion: at most one open row
  let inboundDrillChart = null;
  let inboundDrillMetric = 'calls';    // 'calls' | 'rate'
  let inboundDrillCache = {};          // insurer -> daily[] (cleared per render)

  function initInboundReport() {
    const btn = $('inbound-report-btn');
    const modal = $('inbound-modal');
    if (!btn || !modal) return;
    const closeBtn = modal.querySelector('.modal-close');
    const backdrop = modal.querySelector('[data-close]');

    function openModal() {
      modal.style.display = '';
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      trapFocus_(modal);
      initModalDragResize_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.addEventListener('keydown', onKeyDown);
      inboundShowForm();
      inboundSetDefaultDates();
      inboundEnsureDeptOptions_();
    }
    function closeModal() {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      releaseFocus_();
      resetModalTransform_(modal.querySelector('.modal-panel') || modal.querySelector('.modal-panel-wide'));
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
      btn.focus();
    }
    function onKeyDown(e) { if (e.key === 'Escape') closeModal(); }

    btn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', closeModal);

    const preset = $('inbound-preset');
    if (preset) preset.addEventListener('change', inboundApplyPreset);
    const fromEl = $('inbound-from'), toEl = $('inbound-to');
    if (fromEl) fromEl.addEventListener('change', function () { if ($('inbound-preset')) $('inbound-preset').value = 'custom'; });
    if (toEl)   toEl.addEventListener('change',   function () { if ($('inbound-preset')) $('inbound-preset').value = 'custom'; });
    const gen = $('inbound-generate-btn');
    if (gen) gen.addEventListener('click', runInboundReport);
    const back = $('inbound-back-btn');
    if (back) back.addEventListener('click', inboundShowForm);
    const csv = $('inbound-csv-btn');
    if (csv) csv.addEventListener('click', inboundDownloadCsv_);
  }

  function inboundShowForm()    { $('inbound-form').style.display = ''; $('inbound-results').style.display = 'none'; inboundSetError(''); }
  function inboundShowResults() { $('inbound-form').style.display = 'none'; $('inbound-results').style.display = ''; }
  function inboundSetError(msg) {
    const el = $('inbound-form-error'); if (!el) return;
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = '';
  }
  function inboundIsoOf_(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function inboundSetDefaultDates() {
    if ($('inbound-from') && $('inbound-from').value) return;
    const today = new Date(); const s = new Date(today); s.setDate(today.getDate() - 30);
    if ($('inbound-from')) $('inbound-from').value = inboundIsoOf_(s);
    if ($('inbound-to'))   $('inbound-to').value   = inboundIsoOf_(today);
  }
  function inboundApplyPreset() {
    const v = $('inbound-preset').value;
    if (v === 'custom') return;
    const today = new Date(); let s, e = new Date(today);
    if (v === 'last7')        { s = new Date(today); s.setDate(today.getDate() - 7); }
    else if (v === 'last30')  { s = new Date(today); s.setDate(today.getDate() - 30); }
    else if (v === 'thisMonth') { s = new Date(today.getFullYear(), today.getMonth(), 1); }
    else if (v === 'lastMonth') { s = new Date(today.getFullYear(), today.getMonth() - 1, 1); e = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (v === 'last3Months') { s = new Date(today); s.setMonth(today.getMonth() - 3); }
    if (!s) return;
    $('inbound-from').value = inboundIsoOf_(s);
    $('inbound-to').value   = inboundIsoOf_(e);
  }

  /**
   * Dept scope options. Managers are pinned to their own dept (the
   * server enforces this regardless); admins get "All departments"
   * (the company-wide view incl. the IVR bucket) plus every dept.
   */
  function inboundEnsureDeptOptions_() {
    const sel = $('inbound-dept');
    if (!sel || sel.options.length) return;
    if (USER.role === 'admin') {
      const opts = ['<option value="">All departments</option>'];
      (USER.departments || []).forEach(function (d) {
        opts.push('<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + '</option>');
      });
      sel.innerHTML = opts.join('');
    } else {
      const d = USER.department || '';
      sel.innerHTML = '<option value="' + escapeHtml(d) + '">' + escapeHtml(d) + '</option>';
      sel.disabled = true;
    }
  }

  function runInboundReport() {
    const from = $('inbound-from').value, to = $('inbound-to').value;
    if (!from || !to) { inboundSetError('Pick a start and end date.'); return; }
    if (from > to) { inboundSetError('Start date must be on or before end date.'); return; }
    inboundSetError('');
    const dept = $('inbound-dept') ? $('inbound-dept').value : '';
    const gen = $('inbound-generate-btn'); const prev = gen.textContent;
    gen.disabled = true; gen.textContent = 'Generating…';
    google.script.run
      .withSuccessHandler(function (data) {
        gen.disabled = false; gen.textContent = prev;
        inboundRenderReport_(data); inboundShowResults();
      })
      .withFailureHandler(function (err) {
        gen.disabled = false; gen.textContent = prev;
        inboundSetError('Error: ' + (err && err.message ? err.message : String(err)));
      })
      .getInboundReport({ from: from, to: to, department: dept });
  }

  function inboundKpiTile_(label, value, cap, deltaHtml) {
    return '<div class="pr-kpi-tile">'
      + '<div class="pr-kpi-label">' + escapeHtml(label) + '</div>'
      + '<div class="pr-kpi-value">' + escapeHtml(String(value)) + '</div>'
      + (deltaHtml ? '<div class="pr-kpi-delta">' + deltaHtml + ' <span class="pr-delta-cap">vs prior</span></div>' : '')
      + (cap ? '<div class="pr-delta-cap' + benchValueCls_(label, cap) + '">' + escapeHtml(cap) + '</div>' : '')
      + '</div>';
  }

  /**
   * Delta badge for an inbound KPI vs the prior window. `isPp` =
   * already-percent metrics (answer/abandon rate) compare as point
   * differences; everything else as relative % (deltaBlock_ semantics:
   * 0 -> 0 is 0, 0 -> nonzero is +100). Renders via the shared
