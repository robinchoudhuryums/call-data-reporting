<style>
  /* Reset + baseline */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.55 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    background: #f9fafb;
    color: #1f2937;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 600; }
  a { color: #1d4ed8; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, select, input {
    font: inherit;
    color: inherit;
  }

  /* Layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }

  /* Header */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 20px;
  }
  .dash-header h1 { font-size: 20px; }
  .dash-header .sub { color: #6b7280; font-size: 13px; margin-top: 4px; }
  .header-meta { font-size: 13px; color: #4b5563; text-align: right; }
  .header-meta .email { font-family: ui-monospace, Menlo, Consolas, monospace; }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .tag-admin   { background: #dcfce7; color: #166534; }
  .tag-manager { background: #dbeafe; color: #1e40af; }
  .tag-none    { background: #fee2e2; color: #991b1b; }

  /* Mock banner */
  .mock-banner {
    background: #fef3c7;
    border: 1px solid #fde68a;
    color: #92400e;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .control input[type="date"],
  .control select {
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    min-width: 140px;
  }
  .control input[type="date"]:focus,
  .control select:focus {
    outline: 2px solid #93c5fd;
    border-color: #3b82f6;
  }
  .btn {
    padding: 7px 14px;
    background: #1f2937;
    color: #fff;
    border: 0;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { background: #111827; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Status */
  .status {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .status-loading { background: #eff6ff; color: #1e40af; }
  .status-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .status-empty   { background: #f3f4f6; color: #4b5563; }

  /* Table */
  .agents {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
  }
  .agents th, .agents td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid #f1f5f9;
  }
  .agents th:first-child, .agents td:first-child { text-align: left; }
  .agents thead th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .agents thead th:hover { background: #f3f4f6; }
  .agents thead th .arrow {
    display: inline-block;
    width: 10px;
    margin-left: 4px;
    color: #9ca3af;
    font-size: 10px;
  }
  .agents tbody tr:hover { background: #f9fafb; }
  .agents tbody td.agent-name { font-weight: 500; color: #111827; }
  .agents .num { font-variant-numeric: tabular-nums; }
  .agents .missed-high { color: #b91c1c; font-weight: 600; }

  .agents tfoot td {
    background: #f9fafb;
    font-weight: 600;
    border-top: 2px solid #e5e7eb;
    border-bottom: 0;
  }

  /* Access denied */
  .denied-card {
    max-width: 560px;
    margin: 60px auto;
    padding: 28px 32px;
    border-left: 4px solid #ef4444;
  }
  .denied-card h1 { font-size: 18px; margin-bottom: 10px; }
  .denied-card p { color: #4b5563; margin: 8px 0; }
  .kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    margin: 16px 0;
    font-size: 13px;
  }
  .kv dt { color: #6b7280; font-weight: 500; }
  .kv dd { margin: 0; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .small { font-size: 12px; color: #6b7280; }
</style>
